  text: 'Отправление "A''cappella ExpreSSS" состоялось из Москвы 22 марта 2003 года
    в 17:00...


    К моменту встречи шестерых профессиональных вокалистов каждый имел за плечами
    опыт сольной, ансамблевой и инструментальной практики. Разные в индивидуальности,
    единые в желании создать что-то новое в жанре акапелла, что-то действительно интересное
    и экстраординарное, интригующее и экспрессивное, интернациональное и эксклюзивное...
    И название пришло само собой: "A''cappella ExpreSSS" - это наше ноу-хау, наш метод
    создавать то самое интересное и экстра, см. выше. И главное - это нравиться...


    Маршрут: кругосветное музыкальное путешествие от Сингапура до Америки через Азию,
    Россию и Европу. Мы мчимся стремительно и энергично, разжигая пламя вдохновения
    силой голосов и красотой гармонии, расцвечивая полотна аранжировок яркими красками
    музыкальных культур всего мира. Да, мы космополитичны и довольно остроумны, и
    профессиональны, и достаточно скромны...


    Стиль: определен недолгим и немучительным творческим поиском. Мы не утверждаем,
    что поем джаз, скорее, не только: нам нравится хорошая популярная музыка, нас
    привлекает фольклор, мы уважаем классику, любим создавать свои песни. И во все
    это мы несомненно привносим ритм&блюз своих сердец, и рок-н-ролл души. Назовем
    это современным акапелла фьюжн (кстати, слово "акапелла" вовсе не означает "без
    музыки")!


    Путевые заметки (Вехи)


    Награда Ward Swingle Award в категории "Лучшая джазовая вокальная группа"(конкурс
    "Vokal Total" 2003, Грац, Австрия)


    Награда CARA (Современная Ассоциация Музыки Акапелла, США) за "Лучший джазовый
    альбом 2004" ("Magic Moment")


    Туры и концерты в Америке, России, Сингапуре, Гонконге, Израиле, Германии, Австрии,
    Бельгии, Голландии, Италии, Швейцарии, Люксембурге и др.


    Фестивали "Montreux Jazz", "Vokal Total", "Jazz Parade", "Solevoci", "Jazz In
    Time", "Славянский базар", "Джазовая провинция" и др.


    Саундтреки к фильмам "Жизнь одна" (музыка А.Рыбникова, специальная премия фестиваля
    "Кинотавр"), "Хиромант" и др.


    Совместные проекты: концерты и записи с популярными исполнителями, композиторами,
    музыкантами, поэтами.


    Расписание движения: плотное: гастроли, концерты, записи, аранжировки, теле- и
    радиопрограммы, нон-стоп и ускорение...


    Друзья и коллеги:


    Мы гордимся многолетней дружбой с "New York Voices" (США); Мы рады знакомству
    и творческому сотрудничеству с "Real Group" (Швеция);


    Есть подозрение, что нашу музыку любят многие, некоторых из них мы знаем лично,
    и рядом всегда есть близкие друзья, чьи имена не так известны, но чья поддержка
    и любовь так неоценимы.


    Спасибо вам всем вместе и каждому в отдельности - мы делаем это для вас!'
