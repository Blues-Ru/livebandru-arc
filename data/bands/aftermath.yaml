  header: группа "The Aftermath"
  text: '"The Aftermath" ("последствия", англ.) - ингушский дуэт сестер Фатимы и Таиты
    Матиевых, основанный в 2004 году. Рожденные и выросшие в Грозном (Чеченская Республика),
    девушки в 1994-1999 гг. покинули родину из-за войны. Последствием этого стало
    желание (и умение!) сестер писать песни, чему не помешало отсутствие у них музыкального
    образования. И в 2012 году бонус-вкладкой журнала "Stereo&Video" вышел в свет
    уже второй альбом проекта - "Charming October". Все его двенадцать песен - авторские
    произведения Фатимы и Таиты. За глубину текстов и мелодичность, сочетание естественности
    с изысканностью и харизму, творчество дуэта высоко оценили авторитетные эксперты.
    Вот цитаты из рецензий:


    "Фатима и Таита также изветсные под именем "The Aftermath" пишут прекрасные песни
    на английском языке и безупречно их исполняют. Это очень свежая и очень живая
    музыка совершенно не характерная для нашей российской сцены."(c) Артемий Троицкий


    "Charming October" - 2-ой альбом группы "The Aftermath", где собраны 12 безупречно
    хитовых песен. Источники вдохновения для сестер - их музыкальная коллекция: The
    Beatles, The Animals, классика ритм-н-блюза и singer/songwriter''ов. При этом
    музыка у них абсолютно своя, не несущая ни капли ощущения "где-то это уже было"
    - Матиевы не копируют готовые конструкции из фолк-рока или акустического блюза,
    а просто хорошо воспринимают этот музыкальный язык и высказывают на нем собственные
    мысли. Иногда кажется, что вещи эти - готовые хиты, стоит только им нарастить
    гитарного "мяса" и ритмической жесткости. Потом понимаешь, что прелесть The Aftermath
    именно в скупости, лаконичности, ощущении недосказанности." (c) главный редактор
    журнала In-Rock Владимир Импалер


    "Есть в этой записи и искренность, и сиюминутность, и непередаваемое ощущение
    жизни и подлинности происходящего. Но самое интересное в группе Aftermath - это
    неповторимая мелодика их песен. Помню, какой-то знакомый музыкант-профессионал
    заметил, что они сочинают как любители - не соблюдая законы композиции. Было бы
    неплохо если бы "серьезные" музыканты вот так же не соблюдали эти законы. Глядишь,
    и музыка у нас в стране стала бы значительно интереснее." (c) главный редактор
    Stereo&Video Magazine Михаил Борзенков


    "Композиции "The Aftermath" объединяет вместе общий стиль, который я уже никогда
    и ни с чем не перепутаю. Этот стиль, словно выдержанное по секретным рецептам
    вино, вобрал в себя солнечное тепло южных кровей, прохладу вечеров и лунный свет
    над горами Северного Кавказа, тишину и нежность девичьих сердец и настойчивость
    в поиске ответов, которой могли бы позавидовать суровые моряки с ветренного туманного
    Альбиона." (c) киноэксперт Сергей Джумаев


    "Осень в блюзовых тонах, или "Charming October".. Название альбому было дано по
    одной из двенадцати песен - "Charming October". Другие одиннадцать связаны...
    нет, не с оставшимися месяцами, скорее - с различными оттенками осеннего настроения,
    настроения сестер Фатимы и Таиты Матиевых. При этом теплое звучание "живых" инструментов
    (гитара, фортепиано, контрабас, виолончель, альт, вибрафон, дахчан-пандар) оказывается
    близким то блюзу, то джазу, то эстетике мюзикла, то классическому камерному ансамблю;
    и все стилевые аллюзии объединяет подкупающая своей искренностью вокальная интонация.
    " (с) эксперт по киномузыке Константин Рычков


    "The album song "Chaming October" not only is the name no. It actually defines
    "The Aftermath". It is their Signature Album. Wonderful." (c) musician, chief
    moderator of guitarnotes.com Mark Schraps'
