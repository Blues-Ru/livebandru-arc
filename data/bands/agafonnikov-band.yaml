  text: 'Коллектив "Агафонников-Бэнд" основан в 2004 году пианистом и композитором
    Владимиром Агафонниковым из потомственной музыкальной династии Агафонниковых.
    Коллектив исполняет smooth jazz, разбавленный фанком и соул музыкой.


    За сравнительно небольшое время существования коллектива у "Агафонников-Бэнда"
    появились преданные поклонники не только в России, но и за рубежом.


    Коллектив участвовал и получал премии на различных престижных джаз-фестивалях
    (джаз-фестиваль в Монтре, джаз-фестиваль в Берлине, музыкальный фестиваль в Польше,
    фестиваль "Джаз-Коктебель" (Россия) и др.)


    Особо значимым событием в истории коллектива стало выступление с великим джазовым
    гитаристом, обладателем нескольких премий "Гремми" Джорджем Бэнсоном в Кремле
    в 2011 году. В 2010 году Владимир Агафонников и его коллектив записал первый сольный
    альбом "Волшебство в Рождество".'
  verified: true
