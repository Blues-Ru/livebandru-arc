  text: 'Группа "ЧЕРНЫЙ ХЛЕБ и Доктор Аграновский" существует на московской клубной
    сцене с 1998 года; ее создали музыканты из профессиональных коллективов, объединенные
    любовью к блюзу в его классическом варианте. Это взрослая, "ветеранская" группа,
    которая пока неплохо выглядит. Основу репертуара составляют черный блюз и спиричуэлз,
    часто собственные версии старых и редко исполняемых вещей, в том числе аранжированных
    для четырехголосия. Это делает "Черный Хлеб" уникальной группой на российской
    сцене. Музыка "Черного хлеба" идет от корней – она камерная, без излишней электрической
    агрессии, но с энергичным и плотным драйвом. Звучание группы, ее сценический имидж,
    манера общения с залом настроены на воссоздание атмосферы блюза 40-х и 50-х годов.


    В 1998-2005 году "ЧЕРНЫЙ ХЛЕБ и Доктор Аграновский" выступали в ЦДХ, в московских
    клубах "Би Би Кинг", "Табула Раса", "Красная площадь, дом 1", "Алабама", "Вудсток",
    "Армадилло", "Джек Рэббит Слимс", "Дом у дороги", "JVL", "eXpat", рязанском клубе
    "Кэрролл" и владимирском "Z-клубе", принимали участие отечественных блюзовых фестивалях
    "БЛЮЗ.РУ", "Московский ежегодный харп-фестиваль", "Дельта Невы". Группа и Доктор
    нередко повлялись в радиоэфирах ("Эхо Москвы", "Культура") и телепередачах.


    В 2004 Доктор Аграновский принимал участие в международном блюзовом фестивале
    Voxstock (Белград), где его 50-минутную программу поддерживал Pera Joe Blues Band.
    Весной 2005 "Черный Хлеб" дал в Центральном Доме Художника в Москве совместный
    концерт с белградскими блюзменами Пера Джо и Владаном Станошевичем. В дальнейшем,
    в рамках программы "ЧИКАГО В МОСКВЕ", организованной фронтменами "Черного Хлеба",
    в Россию приезжали американские блюзовые музыканты - чикагские гитаристы Джон
    Праймер (John Primer, сентябрь 2005), (James Wheeler, февраль 2006), Лурри Белл
    (Lurrie Bell, апрель 2006), Эдди С. Кемпбелл (Eddie C. Campbell, декабрь 2006),
    бостонский харпер Кит Данн (Keith Dunn, февраль 2006), чикагский бас-гитарист
    и певец Боб Строгер (Bob Stroger, сентябрь 2006). В марте 2007 в Москву был приглашен
    гитарист Фил Гай (Phil Guy), в октябре - певец Тейл Дрэггер (Tail Dragger).


    "Черный Хлеб" открывал московские выступления Праймера, Уилера, Белла, Строгера,
    Кемпбелла, Фила Гая, Тейла Дрэггера, играл совместные концерты с Китом Данном.
    Для Доктора было большой честью и не меньшим удовольствием поджемовать с Мадом
    Морганфилдом, старшим сыном Мадди Уотерса, и легендарным Лейзи Лестром, приезжавшими
    в Москву в октябре 2009 и феврале 2010-го.


    ДИСКОГРАФИЯ


    2001 г. - вышел первый CD альбом группы "Тик", который получил внимание прессы
    ( "Семь дней", "Итоги", - "Алфавит") и крутился в блюзовых радиопрограммах ("Весь
    этот блюз" - ЭХО МОСКВЫ, "Доктор Блюз" - РАДИО РОССИИ, "Время слушать блюз" -
    ОТКРЫТОЕ РАДИО и др.).


    2005 г. - вышел DVD концертного выступления ЧХ с сербскими блюзменами в ЦДХ "Two
    For The Show".


    2006 г. - выпущена на CD концертная запись "Алабама", сделанная в одноименном
    московском клубе ( "Семь дней",- "Русский Newsweek").


    Состав 2005-2010:


    Алексей Аграновский - вокал, акустическая гитара, электрогитара. Ex - "СВ & Dr.
    Agranovsky".


    Михаил Ольшаницкий - клавишные, бэк-вокал. Ex - "Удачное приобретение".


    Валерий Серегин - бас-гитара, бэк-вокал. Ex - "Серебрянный рубль", "Old Man''s
    Blues band", "Удачное приобретение", "Антропология".


    Николай Балакирев – ударные, бэк-вокал. Ex - "Серебрянный рубль", "Old Man''s
    Blues band", "Удачное приобретение". Играет в гр. "СерьГа".


    Омар Итковицы – лид-гитара. Гитарист из Буэнос-Айреса, прошедший школу игры с
    музыкантами блюза в Чикаго. С 2009 года группа сотрудничает с ведущими московскими
    блюзовыми гитаристами Вадимом Иващенко, Евгением Немовым, Валерием Гелютой, Александром
    Новоселовым.'
