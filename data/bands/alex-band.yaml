  text: 'Нижегородский музыкальный коллектив ALEX BAND+ существует с 2001 года. Постоянный
    состав сформировался к 2003 году. В настоящее время коллектив представлен Алексеем
    Молевым (альт-саксофон), Вадимом Абрамовым (фортепиано), Максимом Рыбаковым (бас-гитара)
    и Егором Правиловым (ударные). Музыканты исполняют как джазовые стандарты, так
    и авторские композиции.


    Все участники коллектива - выпускники Нижегородского музыкального колледжа им.
    Балакирева. Кроме этого Егор Правилов закончил Нижегородскую Консерваторию им.
    Глинки, а Вадим Абрамов - отделение музыкального образования Нижегородского Государственного
    Педагогического Университета.


    На протяжении нескольких лет коллектив ALEX BAND + постоянно работал в джазовом
    клубе "JAM Prestige", играя на джем-сейшенах с такими известными российскими джазовыми
    музыкантами, как Григорий Файн, Сергей Манукян, Игорь Бутман и многими другими.


    В 2002 году музыканты участвовали в джаз-марафоне "SWING UP". После закрытия клуба
    музыканты выступали на различных площадках Нижнего Новгорода, работая с молодыми
    талантливыми вокалистками.


    С 2007 года коллектив активно сотрудничает с ведущей джазовой вокалисткой Нижнего
    Новгорода ,трижды лауреатом, дважды победителем и обладателем Grand Prix международных
    вокальных конкурсов в Литве и Германии, Яной Тюльковой. Они успешно представили
    свою совместную программу на XVI международном фестивале "Джаз России 2007" и
    в московском клубе "Союз Композиторов" На III международном фестивале вокального
    джаза "Jazz Vocal Action" и на XVII международном фестивале "Джаз России 2008".


    По словам участников коллектива, на их творчество повлияли такие группы, как Shakatak,
    Mezzoforte, Dave Weckl Band и такие музыканты, как Chick Corea, Eric Marienthal,
    Michel Petrucciani, Marcus Miller и Kenny Garrett. Стиль авторских композиций
    можно определить как smooth jazz с элементами фанка и латины.


    В настоящее время можно с уверенностью констатировать тот факт, что именно ALEX
    BAND + представляет инструментальный джаз Нижнего Новгорода, являясь постоянным
    участником различных джазовых событий, привлекая и приобщая к джазу все больше
    молодежной аудитории.'
