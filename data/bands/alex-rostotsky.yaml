  text: 'Бас-гитарист, композитор, аранжировщик, продюсер, создатель проекта "Джаз-бас-театр",
    один из активных организаторов джазовой жизни столицы. Окончил во Ржеве (Тверская
    область) музыкальную школу по классу фортепиано, позже в 1979 году заочно окончил
    дирижерско-хоровое отделение Калининского музыкального училища. В 1976-77 занимался
    в Московской студии музыкальной импровизации (фортепиано и бас-гитара), руководил
    несколькими коллективами в Подмосковье, вошел в ансамбль "Зебра" и в начале 80-х
    годов преимущественно сотрудничал с Юрием Маркиным. Участвовал во многих фестивалях.
    В 1982-86 работал в Московском джазовом ансамбле солистов Владимира Коновальцева,
    выступал также с Алексеем Кузнецовым, Игорем Бутманом, Евгением Рябым, Станиславом
    Коростелевым, Николаем Левиновским, Стасом Григорьевым, Сергеем Гурбелошвили,
    Андреем Кондаковым, Андреем Рябовым, Ренатом Шаймухаметовым, Львом Кушниром и
    другими. С 1996 – музыкальный директор Московского джазового клуба Birdland, а
    в конце 90-х стал (вместе с Михаилом Грином) одним из организаторов фестиваля
    в саду "Эрмитаж". В 90-е годы работал в трио с Владимиром Данилиным и Алексеем
    Кузнецовым, выступал на многих российских фестивалях.


    В 1994 году представил сольную этно-фьюжн-программу "Джаз-бас-театр" – один из
    интереснейших проектов на московской джазовой сцене, в котором участвовали не
    только ведущие российские музыканты-Юрий Парфенов, Павел Чекмаковский, Евгений
    Борец, Иван Волков, Сергей Остроумов, Иван Фармаковский и др.), но и зарубежные
    гости (Билли Кобэм, Майкл Рабиновиц, Кешаб Канти Чоудхури, Аркадий Фиглин, Камаль
    Баллан, Дайяна Херольд, Виктор Джонс). Привлекая к выступлениям своего коллектива
    художников, поэтов, артистов, народных исполнителей и представителей новой импровизационной
    музыки, Алекс Ростоцкий проявил себя как оригинальный талантливый драматург и
    режиссер. Параллельно включался и в традиционные проекты (например, продолжал
    появляться в составе "Супертрио" с Владимиром Данилиным и Алексеем Кузнецовым.
    Среди сочинений Ростоцкого – "Посвящение Шостаковичу", "Круг", "Созвездие Южного
    Креста", Колыбельная у моря", "Москва-Париж, вагон 19", "Осенний натюрморт", "Два
    сна", "Вальс для Ксении", "Майские любовники","Сон Сфинска","Сады Алькасара","Африканская
    деревня","Кривичи" и другие. Композиция "Как во городе-то было во Казани" стала
    саундтреком к голландскому документальному кинофильму. Три его авторских альбома
    - "Once I Loved" (1999, с аккордеонистом Владимиром Данилиным,гитаристом Алексеем
    Кузнецовым,пианистом Яковом Окунем и барабанщиком Эдуардом Зизаком), "Oriental
    Impress" (2000) и "Splashes" (2002) - были отмечены Московской ассоциацией джазовых
    журналистов дипломом профессиональной премии "Джаз''Ухо" в категории "Альбом года".'
