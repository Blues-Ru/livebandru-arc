  reviewer_token: press-release
  header: High School
  text: 'High School - группа, исповедующая редкий стиль харп-хоп. В настоящий момент
    в постоянный состав группы входят:


    Александр Соловьев (губная гармоника, вокал) и Дмитрий Рессер (гитара, вокал).
    Молодая группа, набирающая обороты на территории Москвы, представляет часть концертной
    программы, которая станет основой для программы полугодового тура в Америку, стартующего
    в октябре. Музыканты исполняют как известные образцы чикагских блюзов, так и собственные
    произведения в своем уникальном стиле. Фронтмен группы Александр Соловьев, победитель
    конкурса "Blues.ru 09", уже в свои 20 лет был признан лучшим электрическим харпером
    России. Александр начинал осваивать гармошку под руководством Александра Братецкого
    и вскоре сам начал преподавать, разработав свою собственную методологию обучения
    и самоучителя. Кроме сольных проектов успел посотрудничать как с ведущими блюзменами
    Москвы: Доктор Аграновский, Арсен Шомахов, Вадим Иващенко, Михаил Петрович Соколов,
    Владимир Русинов, Вофка Кожекин, Михаил Мишуриc, Евгений Немов, Владимир Кораблин,-
    так и с DJ Skunk Selecta, DJ Руслан Пресняков, Даниилом Жешковым, Владимиром Пресняковым.
    А. Соловьев не упускает случая пообщаться и поджемовать со всеми зарубежными классиками
    губной гармоники, посещающими Москву. Его превосходное владение звуком и аутентичный
    стиль отмечали Pera Joe, Mud Morganfield, Wolf Mayl, Keit Dunn, Paul Lamb, Eirik
    Bergene, Mitch Kashmar, Bob Stroger, Kid Andersen, Z-Star, Sugar Ray Norcia, Beata
    Kossowska, Richard Gjems, Bad Mamas Boys и многие другие.


    "You''ve got a powerful tongue blocking, it''s so groovy!" (Mitch Kashmar, харпер,
    LA) "I checked out your music, man, it''s so cool, can feel the Big Walter''s
    influence, your harp sounds lot like him sometimes" (Paul Lamb, харпер, GB)


    Дмитрий Рессер известен не только как гитарист и композитор High School, но и
    как экс-продюсер группы The Second Approach, установивший своеобразный рекорд
    c овациями от Дейва Брубека, устроив их гастрольный тур в Америку в возрасте 20
    лет. Помимо группы, Дмитрий участвует в антрепризных постановках театра "Сатирикон"
    и Театра Сатиры совместно с М. Авериным и В. Добронравовым.


    "Man, he gotta be black to sound like this. I wish I could the same at his age"
    (Сharles Dignan, гитарист).


    Groove Bastards.'
