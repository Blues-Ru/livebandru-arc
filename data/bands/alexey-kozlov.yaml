  text: '"Его музыку ни с кем не перепутаешь: сложные, многоуровневые ритмические
    конструкции, непредсказуемые гармонические комбинации, виртуозные импровизации…
    Такую музыку практически невозможно записать, пользуясь обычными нотными знаками.
    Пожалуй, ее вообще невозможно написать каким-либо классическим способом – например,
    сидя за роялем – разве что "сконструировать", следуя специфическим методам "музыкального
    дизайна". - Владимир Радебергер, Джаз.Ру.


    35 лет в этом году исполнилось легендарному ансамблю "Арсенал", пионеру джаз-рока
    в нашей стране. Имя Алексея Козлова было известно в московских джазовых кругах
    еще в 50-е годы, но широкое официальное признание он и его "Арсенал" получили
    лишь к концу 70-х. За время своего существования "Арсенал" приобрел широчайшую
    известность в СССР, неоднократно выезжал за границу, участвовал в теле- и радио
    программах, был участником и лауреатом многих, в том числе и зарубежных, джазовых
    фестивалей. Сейчас в активе "Арсенала" несколько долгоиграющих пластинок, одна
    из которых - "Created with our own hands" была выпущена также в США компанией
    "East Wind Records". В 1995-м вместе с Тамарой Гвердцители ансамбль покорил ньюйоркцев
    на концерте в Карнеги-Холле. "Арсенал" всегда был экспериментальной платформой
    для новых стилей. Разные люди помнят "Арсенал" коллективом, напоминавшим то "Оркестр
    Махавишну" Джона Маклафлина, то необычным "продвинутым" вокально-инструментальным
    ансамблем, то типичным комбо современного европейского джаза, то почти рок-группой,
    активно использующей в своих представлениях, например, брейк-данс.


    "Творческий метод "Арсенала" - пост-модерн. Мы предпочитаем нарочитую смесь разных
    музыкальных жанров. Эдакий коллаж из маленьких музыкальных отрезков, неожиданно
    соединенных между собой. В развитии композиций меняются стили, ритмика..." (Алексей
    Козлов, Российская газета)


    Летом 2009 года мэтр Алексей Козлов вновь удивляет общественность, собрав новый
    состав знаменитой группы "Арсенал", который переходит к более утонченной эстетике,
    развивая идеи стиля "New Emotional Music". Это не означает полный отказ от предыдущего
    "Funky-fusion". Скорее возможен возврат к ранним формам фанки-джаза, не говоря
    уже о более современном осознании "World-music" и "ECM". При всем этом основной
    принцип "Арсенала" остается неизменным – объединение импровизаторов, вносящих
    каждый свой вклад в легендарный проект, созданный Алексеем Козловым. Биография
    Козлова пестрит громкими событиями и внушительными достижениями. Человек, двигавший
    в такой стране, как СССР такую сомнительную (с точки зрения правящей партии) музыку,
    как джаз с 1957 года, не может иметь маленького послужного списка – это понятно.
    Удивляет другое: энергия и жизнелюбие этого человека и музыканта. Легенда русского
    джаза по субботам в джаз клубе "Союз Композиторов"! Изысканное блюдо для настоящего
    музыкального гурмана.'
