  text: 'Анатолий Герасимов - это один из наиболее известных в мире российских джазовых
    музыкантов, композитор, аранжировщик, саксофонист и флейтист. Рассказывая в 1991
    году о биографии Герасимова, знаменитый джазовый критик Алексей Баташев резюмировал:
    "Дела, как и у многих джазменов, не шли, и в один прекрасный день Анатолий Александрович
    Герасимов, русский, холостой, беспартийный, пошел в синагогу, придумал себе еврейскую
    бабушку, но вместо Тель-Авива улетел в Нью-Йорк".


    Он стал солистом оркестра самого Дюка Эллингтона, с которым познакомился еще во
    время нашумевшего визита оркестра в СССР. В его дальнейшей творческой биографии
    – сотрудничество с оркестром Тэда Джонса и Мэла Льюиса, участие в проектах Джако
    Пасториуса, Чета Бейкера, Джона Скофилда, Элвина Джонса и других представителей
    высшего эшелона мирового джаза. К началу 80-х годов Герасимов добился того, чего
    не достигал еще ни один русский музыкант - стал звездой джазовой сцены Нью-Йорка.
    Был включен в знаменитую энциклопедию "Jazz Legends", выпустил множество пластинок
    с различной по своей жанровой направленности музыкой. Был участником большинства
    американских и французских джазовых фестивалей.


    В 1993 году Герасимов окончательно переселился в Париж. Здесь его творчество приобрело
    более "этнический" и экспериментальный характер; Герасимов сотрудничал с Питером
    Хэммилом, Карлосом Насименту, много работал для кино и телевидения. С 1995 года
    музыкант вновь начал часто посещать Россию, принял участие в записи альбома "Жилец
    вершин" проекта "Хвост и Аукцыон", а затем и вовсе перебрался на историческую
    родину на постоянное жительство. В 1997 году Россия возвратила Герасимову гражданство.
    Ставший в свое время одним из первых покинувших Россию джазовых музыкантов, Герасимов
    стал и одним из первых "возвращенцев".


    Герасимов никогда не был "человеком одного состава": помимо его работы с собственными
    проектами (в которые он активно привлекает молодых и многообещающих исполнителей),
    маэстро регулярно выходит на сцену с самыми полярными исполнителями – от утонченного
    джазового традиционалиста Игоря Бриля до непредсказуемого мастера губной гармоники
    Вовки Кожекина. Очень показателен в этом плане был его юбилей, прошедший в октябре
    2005 года в рамках второго международного фестиваля "Джаз в Старом Городе": такого
    числа гостей, представляющих самые разные возраста и стили, не собирал на свои
    праздники, наверное, ни один из отечественных джазменов.'
