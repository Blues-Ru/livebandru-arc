  header: Огнеопасное женское трио из самого сердца Франции
  text: 'Anatomie Bousculaire - огнеопасное женское трио из самого сердца Франции.
    Эти три на вид хрупкие парижанки за несколько лет своей карьеры завоевали внимание
    и признание во всех уголках Европы, и уже успели побывать и влюбить в себя российских
    слушателей. Их песни поражают своим нестандартным звучанием и сумасшедшим драйвом.
    Это горячая смесь гранжа, синти и рок-н-ролла.


    Их первый концерт состоялся в 2003 году в тематическом клубе Le Pulp в Париже.
    В течение трех лет музыканты сочиняли, записывались, играли концерты, обрастая
    поклонниками, но в тоже время - пребывая в музыкальном андеграунде. Все как должно
    быть у молодой рок-группы. Так продолжалось до 2006 года, когда чудесным образом
    Anatomie Bousculaire получили премию на Los Angeles Music Awards в категории "лучшая
    гранж-группа года" за свою песню Rictus.


    Первый полноценный альбом DANS LES BACS группа выпустила в мае 2009 года. С тех
    пор они расширили свою гастрольную географию, не раз слетав за океан и став любимицами
    ньюйоркской публики.


    Anatomie Bousculaire - это Сесиль, Энн и Алис.


    Сесиль - это насыщенный гранжевый звук гитарных рифов, неоднозначный, по-рокнрольному
    хриплый, но в тоже время нежный женский голос, утонченная, но без сахара, бунтарская
    поэзия.


    Энн - талантливая лид-гитара, от харизматичной и сексуальной игры которой бросает
    в дрожь.


    Алис - тяжелые шаманские барабанные ритмы и душераздирающий скрим.


    Их музыка - не что иное, как трансформация французской поэзии, обрамленной современным
    звучанием электронных инструментов.'
