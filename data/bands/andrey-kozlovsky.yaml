  reviewer_token: press-release
  text: 'Известный российский "бард поющий блюз", композитор, автор гимна Грушинского
    фестиваля (на слова Виталия Калашникова), член жюри различных фестивалей и просто
    гениальный музыкант. Услышав его песни однажды заболеваешь ими навсегда. Выступал
    в составе дуэта "Баранов и Козловский" вместе с виртуозным гитаристом Андреем
    Барановым. Записывал альбомы и выступал с концертами совместно с музыкантами групп
    "ГрАссМейстер", "Станция Мир", Вовкой Кожекиным, Сергеем Клевенским.


    В настоящее время Андрей Козловский продолжает писать и исполнять свои песни,
    не только в жанре "классической" авторской песни, но и роковые и блюзовые композиции.


    И если кто-то из вас и не вспомнил еще, кто такой Андрей Козловский, то достаточно
    произнести названия его песен "Лифт на родину Мао", "Акула", "Я и мой кот", "Не
    горюй", "Полный вперед", чтобы вы воскликнули "Ах, так это тот самый!"'
