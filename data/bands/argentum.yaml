reviews:
- id: 18
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  header: группа АРГЕНТУМ
  text: 'АРГЕНТУМ играли гранж, поп-рок, альтернативу... Сейчас ценители группы считают,
    что Аргентум – это современный русский рок, не отстающий от нашего сложного времени.
    Хотя основной упор ребята делают на музыкальные решения, тем не менее их тексты
    совсем не просты. Творчество группы нацелено на людей с активной жизненной позицией,
    не сдающихся бурному течению. Для тех кто любит жить и знает что все не так уж
    и плохо на самом деле.Характерно для группы то что их творчество предствляет собой
    жгучую смесь стилей Кино и Нирваны. С 2009 года Аргентум активно выступают в клубах
    Москвы. В конце этого года группа планирует выпустить новый альбом, и отметить
    свое 10 летие!


    Автор: Алексей Кот-В-Камышах Малинин'
  verified: true
  created: '2010-08-25'
  is_press_release: true
