  reviewer_token: press-release
  text: '"Ария" - российская группа, играющая в жанре хеви-метал, музыка которой выдержана
    в стиле групп новой волны британского хеви-металла.


    "Ария" является одной из старейших и самых успешных метал-групп России. Лауреат
    премии Fuzz 2007 года как лучшая live-группа. Ее бывшими участниками были образованы
    многие другие известные группы ("Мастер", "Кипелов", "Маврин", "Артерия"), которые
    вместе составляют плеяду, называемую "семейка Арии".


    Большая часть текстов группы написана поэтами Маргаритой Пушкиной и Александром
    Елиным.'
