  header: '"На самом деле,  я большой лентяй" - интервью'
  text: '<b>В Москве отыграл серию концертов блюзовый гитарист из Канады Арсен Шомахов</b>


    <i>Это не первое мое интервью с гитаристом из Нальчика Арсеном Шомаховым. Вернее
    - теперь из Канады. И это не первое его выступление в России после эмиграции.
    Одно остается постоянным: он русский за границей и... иностранец в России. </i>


    <i>Договариваемся об интервью на полвосьмого вечера в столичном клубе "Би Би Кинг".
    Прихожу раньше - в 19, в заведении никого. Набрасываю в блокноте вопросы. Мимо
    с гитарой невозмутимо проходит Арсен.</i>


    <b>- Арсен, ты почему так рано?</b>


    - Привет! Да привык готовиться заранее, группа попозже подъедет.


    <b>- Ты, вижу, с новой гитарой?</b>


    - Да. Хочешь, покажу?


    <b>- Класс, а почему такая легкая?</b>


    - Ну, с виду вроде обычный "Fender Stratocaster", а на самом деле копия "Fender
    Stratocaster ''62 "Сustom shop". На заказ делал... Действительно легкая, звонкая.


    <b>- Круто, сядем-поговорим?</b>


    - Конечно.


    <i>Садимся за стол, включаю диктофон. Арсен выглядит уставшим после перелета.</i>


    <b>- Настроение есть?</b>


    - Ну...нормальное настроение. Вчера было хуже. Из-за перелета я был никакой. Не
    понимал, где день, где ночь. Еще утром была видеосъемка... Первый концерт прошел
    нормально. Но я конечно чувствовал усталость...Так, кто тут до нас сидел (изучает
    клубные таблички на столе): "Deep Purple", "ZZ Top", "Gipsy Kings"... Неплохо.


    <b>- Арсен, а почему так плотно играешь в этот раз? Вчера концерт, сегодня - два,
    завтра еще один...</b>


    - Время ограничено, а в Москве новый блюзовый клуб открылся. Вернее, заново открылся
    - "Дом у дороги", надо и там сыграть...


    <b>- То есть, сейчас отыграешь и поедешь на вторую площадку?</b>


    - Да. Вроде близко. Одна проблема - контрабас, из-за него все сложности, большой
    и тяжелый.


    <b>- Контрабас - это принципиально?</b>


    - Да, искал басиста, чтобы играл и на бас-гитаре и на контрабасе.


    <b>- Кто сейчас играет с тобой?</b>


    - Басист - Брюс О''Нил. Барабанщик - Чип Харт. С Брюсом мы работаем лет шесть.
    С Чипом - года четыре.


    <b>- А это дорого - везти забугорную команду в Москву?</b>


    - Дорого. Но им захотелось увидеть другую страну. Тем более, у барабанщика в России
    нашлись родственники, с которыми захотелось встретиться. Ну и басист очень хотел
    в России побывать.


    <b>- Дорогой перелет?</b>


    - He дешевый...


    <b>- В прошлый раз ты прилетал в Россию с семьей. Возил их в Нальчик. Сейчас так
    же?</b>


    - Да, такая же схема. У сына каникулы сейчас, весенние. Вот и решили выбраться.


    <b>- Он же барабанщик, насколько я помню? Играет блюз?</b>


    - Играл. Был период, когда он перестал заниматься барабанами. Потом снова начал,
    но, правда, сейчас он играет другую музыку: метал, панк-метал.


    <b>- Ого. А вот эти твои концерты в Москве - это чисто столичная история? По России
    не поедете?</b>


    - Да, только Москва. Посмотрим, возможно сделаем концерт в Нальчике, но не по
    России. Мои ребята уезжают раньше, а я - в Нальчик. Потом назад, в Ванкувер.


    <b>- В Канаде в семье по-русски говорите?</b>


    - Да, по-русски, а сын все больше по-английски.


    <b>- Скажи честно - скучно жить в Канаде?</b>


    - Нет! Ванкувер - замечательный город. Очень красивый, особенно природа - океан,
    горы. Я себя здесь чувствую очень комфортно.


    <b>- Политика есть на местном ТВ, как сейчас на российских телеканалах?</b>


    - Все то же самое, что у вас! Но я всю политику выключаю - все эти дебаты...


    <b>- В чем различие публики в музыкальных клубах там и здесь?</b>


    - Там блюзовая музыка более понятна и знакома, особенно людям среднего и старшего
    возраста, и им привычно под нее танцевать. Здесь, мне кажется, такая музыка больше
    на любителя. Чаще сидят и слушают. На самом деле, мне интересно и то, и другое.


    <b>- А если едят?</b>


    - И хорошо, если едят. Не вижу проблемы.


    <b>- Тебя не раздражает?</b>


    - Раздражает, когда люди болтают перекрикивая музыку. Иногда смотришь записи звезд
    - например, Джеффа Бека - билет стоит не мало, а люди просто сидят и громко болтают.
    Думаешь, мне бы на ваше место...


    <b>- Фестивали. Как ты к ним относишься?</b>


    - Люблю. Но фестивали не происходят каждый день. Но, конечно, здорово, когда тебя
    на них зовут.


    <b>- Клубы. Вот пустой зал и...</b>


    - Играю. Даже в пустом клубе. Есть вещи, которые от меня не зависят: реклама -
    я ее не раскручиваю, афиши, зал... Но есть чисто моя работа.


    <b>- У тебя есть менеджер?</b>


    - Я занимаюсь всем сам. Есть агент, с которым время от времени работаю.


    <b>- У тебя 5 альбомов...</b>


    - Да, сейчас собираю материал для шестого.


    <b>- Ты так же смешиваешь серф, джамп-блюз, джаз?</b>


    - Так и есть. Еще рок, фанк и прочее.


    <b>- Тот же лэйбл - "Blues leaf"?</b>


    - Да.


    <b>- Что впереди?</b>


    - Трудно предугадать, как изменится моя музыка. Я об этом не задумываюсь. С возрастом
    меняются вкусы, и часто оказываешься под влиянием самых разных музыкантов. Моя
    музыка будет меняться, но в ней, как всегда, будет присутствовать грув, который
    заставлять людей двигаться, танцевать. Ведь блюз - танцевальная музыка.


    <b>- Сегодня это звучит странно...</b>


    - Да. Но когда-то это было так! Под блюз танцевали. Еще раз скажу - в Канаде на
    блюз сегодня ходят много людей среднего и старшего возраста, и они танцуют под
    блюз.


    <b>- Успехи?</b>


    - Уже несколько лет работаю со своим трио в одном клубе. У нас своя публика, сейчас
    регулярно приглашаем специальных гостей, известных в Ванкувере музыкантов. В прошлом
    году ездили в Мемфис, выступали на Mt. Baker Rhythm and Blues Festival, этим летом
    едем на престижный канадский Мount Tremblant International Blues Festival.


    <b>- Ты манипулируешь людьми со сцены? Есть какая-то концепция ведения концерта?</b>


    - Я не манипулирую публикой. Я просто следую за своим настроением. Если настроение
    хорошее, я полон сил, есть драйв, я в духе, то и выступление удается...


    <b>- То есть, бывают неудачные концерты?</b>


    - Бывают выступления менее энергетически насыщенные, приходится менять песни или
    их последовательность.


    <b>- То есть сет-лист редактируется в процессе?</b>


    - Да. Все зависит от настроения.


    <b>- Ты когда-то говорил, что нельзя играть много, чтобы не прогореть.</b>


    - Да я и сейчас скажу - нельзя. Теряешь свежесть. Чем меньше концертов я делаю,
    тем более они уникальные, что ли.


    <b>- Кухня музыканта - как рождается песня и так далее. Можешь об этом рассказать?</b>


    - А кухня вообще не интересна. Чем меньше люди знают о тебе, тем лучше. Это то
    же самое, что смотреть на картину и думать: а что там художник имел в виду? Как
    он думал, как жил? Важно - что сейчас именно вы чувствуете. Картина, музыка, кино
    - они вам сейчас нравятся или нет? Остальное не важно. Я, на самом деле, стал
    скептически относиться к избыточному интересу к внутреннему миру музыканта, к
    "кухне". Кому это важно? Люди часто наделяют произведения искусства тем, чего
    в нем нет. Надо просто наслаждаться, быть с этим искусством здесь и сейчас.


    <b>- То есть продукт важнее внутреннего мира автора?</b>


    - Конечно.


    <b>- Одно время ты увлекался Холмстромом (Rick Holmstrom - американский гитарист)...</b>


    - С возрастом увлечения меняются, детской восторженности кем-либо уже нет, и это
    естественно. В последнее время я, чаще слушаю джазовую музыку. Вот например Телониуса
    Монка (Thelonious Monk) переслушиваю постоянно...


    <b>- А почему пианиста?</b>


    - Не важен инструмент, важна музыка.


    <b>- А как же гитаристы?</b>


    - Изучать одних только гитаристов скучно: я часто слушаю "духовиков", пытаюсь
    имитировать рифы саксофона, трубы... На самом деле, я большой лентяй. Вечно откладываю
    все на завтра. Кажется, все сложнее находить время, чтобы, как раньше, часами
    сидеть с гитарой, заниматься, работать над новыми идеями, новым материалом...
    но, на самом деле, это всего лишь лень. Слава богу, есть главное - музыка. Она
    не отпускает тебя. Иногда бывает так - музыка уходит, вроде все в порядке без
    нее, но потом ты чувствуешь: эту дыру нельзя ничем закрыть. Музыка - это... это
    нечто очень хорошее! И я сейчас пытаюсь делать так, чтобы каждый день прожить
    просто хорошим человеком. Передать то, что происходит в голове и в сердце, через
    гитару и голос. Только одно это само по себе очень и очень неплохо. <p align="right">Беседовал
    Алексей Щеголев.'
