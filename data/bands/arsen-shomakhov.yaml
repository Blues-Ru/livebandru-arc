  reviewer_name: пресс-релиз
  reviewer_token: press-release
  header: 'Арсен Шомахов: Нужно играть, потому что не играть невозможно! - интервью'
  text: '<b>Блюзовый гитарист из Нальчика Арсен Шомахов - музыкант с парадоксальной
    творческой биографией. Влюбился в музыку в детстве, но выбрал самый невостребованный
    в СССР музыкальный стиль. Играл без особого успеха с группой на немногочисленных
    площадках родного города, но, приехав в Москву, ошеломил столичную блюзовую сцену
    уровнем профессионализма. Не успев насладиться успехом в России, эмигрировал в
    Канаду... Результат - последний альбом Арсена "On the Move" вошел в список 25
    блюзовых дисков, наиболее часто звучавших на радио в 2010 году. А еще - номинация
    на национальную канадскую блюзовую премию "Maple Blues Awards", плотный график
    гастролей и участие в десятках фестивалей.</b>


    <b>Интервью состоялось на пороге 2011 года, мы общались с музыкантом по интернету.
    Арсен, а теперь уже мистер Shomakhov, вспоминает школьные годы, армейскую юность
    и переезд в Москву, а также первую гитару и, конечно, рассказывает о своем покорении
    Америки.</b>


    - Арсен, приветствую тебя от всех российских поклонников твоего творчества! В
    каком жизненном настроении ты сейчас находишься? У тебя полноценная жизнь блюзмена,
    жизнь эмигранта, канадского "бюргера" или все сразу вместе взятое?


    <b>- Привет! Сейчас я в позитивном жизненном настроении, я в процессе интеграции
    в канадское блюзовое сообщество. У меня есть желание и возможность продолжать
    музыкальную деятельность, чему я очень рад.</b>


    - За границей ты все еще чувствуешь себя россиянином? Или напротив - образно говоря,
    постепенно теряешь национальность?


    <b>- Я чувствую себя самим собой. Точно также, как и до переезда в Канаду. Я здесь
    всего 2,5 года, но приехал сюда уже сформировавшейся личностью, так что вряд ли
    что-то потеряю, скорее - буду приобретать новое...</b>


    - Арсен, могли бы мы вернуться назад, в СССР? В какой семье ты вырос, и повлияли
    ли родители на тебя в плане музыки? Читал, что твой старший брат и его коллекция
    классического рока впечатлили тебя больше всего.


    <b>- Я очень горжусь своей семьей. Мой дед - известный и уважаемый человек, детский
    поэт и писатель. В прошлом году отмечалось столетие со дня его рождения. Для меня
    он всегда был и остается эталоном скромности, мудрости и позитивного отношения
    к жизни. Родители всегда поддерживали мои музыкальные устремления, я спокойно
    относился к увлечению "шумной" западной музыкой, за что им очень благодарен...
    Мои старшие братья играли в группах, слушали рок. Все это стимулировало желание
    играть, слушать музыку, искать новые записи.</b>


    - А вообще у тебя было интересное детство? Тебя считали сорви-головой или примерным
    мальчиком, который прилежно учился в школе?


    <b>- Детство было интересное, в нем были музыка, книги и друзья, чего еще желать?
    Я старался быть примерным, но не всегда это удавалось. Больших проблем родителям
    я никогда не создавал. В памяти остались виниловые пластинки, огромный катушечный
    магнитофон "Днiпро", который я использовал как ламповый усилитель для гитары,
    "настоящая" ударная установка, которую брат как то принес домой, школа, много
    всего...</b>


    - Правда ли, что твоим первым музыкальным инструментом было пианино? Ты ходил
    в музыкальную школу? Когда ты осознанно захотел заниматься музыкой, и был ли это
    блюз? Неужели ты помнишь, как в 4 года впервые услышал "Basin Street Blues" Армстронга
    (это я подсмотрел в одном из твоих интервью)?


    <b>- Моим первым инструментом были барабаны, вернее - диванные подушки, которые
    раскладывались особым образом, имитируя хай-хэт, рабочий, томы... Особенно нравилось
    дубасить по подушкам под "When The Levee Breaks". Правда, соседи из квартиры снизу
    иногда теряли терпение и требовали прекратить издевательство. Меня отдали в музыкальную
    школу, но родители сжалились и позволили мне бросить ее, в связи с отсутствием
    интереса (к этюдам Гедике). Позже я стал самостоятельно осваивать пианино. Ну,
    а потом стал бренчать на гитаре... Я очень хорошо помню, что мы с братом часто
    слушали пластинку Армстронга, при этом держали в руках ракетки для бадминтона,
    имитируя игру на банджо ;))). Очень запомнился его "рычащий" голос, а еще его
    фото в белоснежной рубашке с трубой.</b>


    - Как ты умудрился в 12 лет открыть для себя Мадди Уотерса и Хаулина Вулфа? Да
    еще в Нальчике тех лет? Тем более поразительно, почему в эти же годы тебя интересовали
    такие сложные для восприятия гитаристы, как Роберт Фрипп и Джон МакЛафлин! Где
    ты это вообще раздобыл во времена Советского Союза?


    <b>- Я уже толком и не помню... Кто-то приносил записи брату, а еще были советские
    пластинки - кажется, сборник черного блюза. Фриппа и МакЛафлина я открыл намного
    позднее, когда стал студентом, друзья принесли послушать, и меня зацепило... Особенно
    любил ранний "Кримсон".</b>


    <b>- </b>Когда ты "заболел" Стиви Рэй Воэном? Прошла ли болезнь сейчас?


    <b>- Кажется, в 90''ом. Как только я услышал Scuttle Buttin''- я моментально заболел.
    А когда посмотрел Live at El Mocambo - еще больше... Болезнь, правда, прошла давно...
    Сейчас я больше фанат Джимми Вона, обожаю его лаконичную игру и звук.</b>


    - Я читал, что в 12 лет у тебя появилась акустическая гитара. А в 16 - электрогитара,
    и это была копия "Фендера". Что это был за инструмент и действительно ли его украли?


    <b>- Да, у меня была "ленинградская" акустическая гитара (стоила в те времена
    аж 40 рублей). Она перешла мне в наследство от братьев. Позднее я самостоятельно
    изготовил из подручных материалов белый "Лес Пол", но к игре он оказался не пригоден
    ;)), а потом скопил денег на немецкий "Лид Стар". Эта копия "Фендера" была моей
    первой настоящей электрогитарой, впоследствии похищенной из нашей репетиционной
    комнаты.</b>


    - Так у тебя была рок-группа в школе?


    <b>- Еще какая! Мы вдохновлялись хард-роком и поэзией Эдгара По. Репетировали
    дома у нашего басиста, устанавливали 2 пионерских барабана (стащили из ленинской
    комнаты), тарелки и хэт. Гитары включали в стереосистему... Мы наслаждались звуками,
    а иногда даже записывались... А еще я помню, как мы с моим другом проработали
    все летние каникулы на кожгалантерейной фабрике, чтобы купить ударную установку!</b>


    - Как сложилась твоя судьба после школы? Насколько я знаю, ты пошел служить в
    армию и там собрал музыкальную группу.


    <b> - После школы я учился на ИнЯзе, после второго курса служил в армии - ну,
    и продолжил учебу после увольнения. В армии, кстати, я играл в крутой рок-группе!
    На бас-гитаре играл известный московский гитарист Михаил Клягин. Мы даже альбом
    записали под названием "Army Club". Я думал, запись была утеряна, но недавно Миша
    прислал чудом сохранившиеся несколько треков. Не помню, что за гитара на той записи
    - "Тоника" или "Аэлита". ;)</b>


    - Наверное, хороший английский у тебя появился как раз после после вуза?


    <b>- Вероятно, еще и музыкальный слух помог поставить произношение.</b>


    - В 1987 году ты собрал "Регтайм". Как родилась команда и кто в нее вошел? Где
    вы репетировали? Правда ли, что "Регтайм" - была единственной блюзовой командой
    в городе? Вы имели успех?


    <b> - Приятель моего брата пригласил меня поиграть на гитаре в рок-группе. Там
    на подмене играл басист Аслан Жантуев. Мы быстро сошлись с Асланом, однажды к
    нам заглянул его друг Султанбек Мамышев (Бек), который тогда только уволился из
    армии. Мы сыграли небольшой джем и поняли, что нам интересно играть вместе...
    Название "Регтайм" появилось позднее. Репетировали в университете, на "точках"
    и в студиях у друзей - в общем, где удавалось. "Регтайм" и в самом деле была единственной
    блюзовой группой - мы имели определенный успех, но играть регулярно не могли.
    Музыка, конечно, денег не приносила, у всех была работа днем и музыка вечером...</b>


    - Что за музыку вы тогда играли - по воспоминаниям, это была смесь рока, джаза
    и блюза. Кто были тогда твои музыкальные кумиры? Остались ли они для тебя кумирами
    и сегодня?


    <b> - Играли все, что нравилось тогда: "ЛЗ", "ДП", Хендрикс, СРВ, Сантана, Клэптон,
    но интереснее всего всегда было делать собственные вещи... Конечно, сейчас музыкальные
    пристрастия поменялись, это естественный процесс, на смену рОковым и фьюжн-гитаристам
    пришли блюзовые и джазовые: Charlie Christian, Wes Montgomery, Freddie King, Charlie
    Baty, Vidar Busk, Ronnie Earl, Rick Holmstrom, Junior Watson, Alex Schultz, Kid
    Ramos... список можно продолжать... За ними, вероятно, последуют другие.</b>


    - "Рэгтайм" - типичное гитарное трио с блюз-роковым репертуаром. Но, в отличие
    от многих российских групп такого формата, твоя команда не пыталась просто копировать
    стандарты. В вашем случае вам интересна была музыкальная идея и работа над ней,
    что доказывают ваши записи тех лет. Откуда вырос такой подход к материалу?


    <b> - Не знаю ;)... Это казалось совершенно естественным... О высоких стандартах
    я не задумывался, просто делал то, что нравилось, что было интересно... Взять
    стандарт и просто скопировать его казалось скучным... Поэтому я всегда старался
    сделать так, чтобы песня звучала как своя, менял аранжировку, темп и т.д. </b>


    - И вот еще загадка. Как вы из провинциальной группы, да еще из такого совсем
    "неблюзового" региона России смогли стать яркой фигурой на российской блюзовой
    сцене? Как могла команда, выросшая в полной изоляции от российских блюзовых центров,
    выработать такое качество исполнения?


    <b>- Огромную роль в этом сыграл интернет... Моя знакомая Маша Мирошниченко отправила
    наши записи Федору Романенко (www.blues.ru), который заинтересовался услышанным.
    С помощью Федора и Андрея Евдокимова (радиопередача "Весь это блюз") "Регтайм"
    стал появляться с концертами в Москве, "засветился" на ТВ-канале "Культура", попал
    на фестиваль блюза в Питере. Ну и, несомненно, группа тоже приложила массу усилий:
    регулярные занятия музыкой (на грани фанатизма), регулярные репетиции и постоянное
    прослушивание музыки...</b>


    - Расскажи, пожалуйста, когда ты понял, что нужно переезжать в Москву, и как ты
    вошел в столичное блюзовое сообщество?


    <b>- Мысли о переезде у меня возникали часто, но практически это сделать удалось
    только в 2007-м. Вошел в сообщество, как мне кажется, без особых сложностей, у
    меня были и остаются добрые отношения со многими московскими музыкантами и любителями
    блюза.</b>


    - Ты помнишь, как вы записали свой первый альбом "Heavy Steppin''"? Это был по
    преимуществу блюз-рок? Но ведь и влияние джаз-рока Джона Скофилда было тоже заметно.
    Как удалось избежать банальностей в исполнении материала?


    <b> - Помню, записывали быстро, кое-что получилось удачнее, что-то не совсем...
    "Heavy Steppin''" сделана под влиянием Скофилда и Хендерсона... Ну, а насчет банальностей
    - не мне судить.</b>


    - Ты разделяешь мнение критиков, что твой второй диск "Troublemaker" стал прецедентом
    для российской блюзовой сцены, поскольку 7 из 10 песен были не "каверами", а твоими
    успешными авторскими произведениями? Откуда в них появились фанковые ритмы?


    <b> - Я не очень хорошо знаком с российскими блюзовыми записями... Но раз такое
    мнение прозвучало, возможно, так оно и было. Фанковые ритмы (была такая передача
    "Мелодии и ритмы зарубежной эстрады" ;) меня всегда увлекали, они и на первом
    альбоме присутствуют....</b>


    <b>Помню, как Федор предложил "разрезать" песню "Troublemaker" пополам. Мне эта
    идея не понравилась, но, поразмыслив, я согласился, и получилось интересно.</b>


    - Как ты попал в книгу американского исследователя Майкла Урбана "Блюз приходит
    в Россию" (Michael Urban - "Russia Gets The Blues")?


    <b> - Если не ошибаюсь, Урбан работал над книгой в России вместе с Андреем Евдокимовым.
    Андрей, вероятно, упомянул о существовании блюзовой группы из Нальчика. Позднее
    я связался с Майклом и попросил его написать рецензию к нашему третьему альбому
    "Dangerous".</b>


    - "Dangerous" вышел в 2006 году на американском лэйбле "Blues Leaf records". Но
    с президентом компании Джо Морабия (Joe Morabia) ты познакомился задолго до этого.
    В ноябре 2004-го он был в Москве, а еще раньше, в 2003-м, ты сделал с ним интервью.
    Не мог бы ты рассказать об этом знакомстве?


    <b>- Да, однажды я послал свои демо-записи на несколько американских лейблов и
    получил ответ от Джо, которому мое демо понравилось. Мы поддерживали связь, и
    в результате он приехал в Москву, послушал меня с группой, появился на радио эфире
    у Андрея Евдокимова, рассказал о своих музыкантах и о планах на будущее. В следующем
    году "Dangerous" вышел на Blues Leaf.</b>


    - Сотрудничество с "Blues Leaf" было твоим первым "настоящим" контрактом? Ты читал
    о себе первые положительные отзывы в музыкальных журналах "Blues Revue", "Guitar
    One", "Downbeat Magazine"?


    <b>- Первым, на самом деле, был альбом "Heavy Steppin''" на "Dialog Music". Альбом
    "Dangerous" стал первым "заокеанским" альбомом. Он действительно получил хорошие
    отзывы, как, впрочем, и два предыдущих альбома. Критики хорошо отзывались о моей
    гитарной игре, о стилевом разнообразии... Положительные отзывы всегда ободряют!
    Хочется работать над собой еще больше.</b>


    <b>К слову, я недавно смотрел интервью со Стив Ваем, и мне очень понравился один
    момент, где он говорит, что работает не над недостатками, а над своими сильными
    сторонами, развивая их и "не замечая" недостатки. Интересный подход!</b>


    - В феврале 2005 г. ты принял участие в 21-м фестивале "International Blues Contest"
    в Мемфисе. Если не ошибаюсь, это был твой первый выезд за границу. Я читал о твоих
    впечатлениях - как вы ехали на машине из Нальчика в Москву и попали в пробку под
    Ростовом, как вернулись назад и поехали поездом, как в конкурсе вам помогали американские
    блюзмены, одалживая тарелки и педали для барабанной бочки... И вдруг вы услышали,
    что в Америке не все так гладко с традиционной музыкой. Например, что очень много
    клубов вышло из бизнеса, что с трудом покрываются расходы, а группы не могут заработать.
    Тебя это сильно тогда обескуражило?


    <b> - Я бы не сказал, что обескуражило, я тогда был очарован всем происходящим,
    и не особо задумывался об этом... Напротив, я получил заряд, желание заниматься
    музыкой дальше. Что касается молодых афроамериканцев, их эта музыка, кажется,
    не интересует вовсе.</b>


    - Был еще фестиваль "Arkansas Blues And Heritage Festival". Ты стал первым нашим
    соотечественником, попавшим на сцену фестиваля. Это было действительно волнительно,
    или все же "там" фестивали проходят в простой, "рабочей" атмосфере?


    <b> - Это было волнительно для меня, но для людей "там" это привычная вещь...
    Многие очень любят именно этот фестиваль и приезжают издалека... </b>


    - Не мог бы ты несколько слов сказать о норвежском фестивале "Dark Season Blues
    Festival", в котором ты тоже принимал участие?


    <b> - Шпитцберген - самое неожиданное место для фестиваля блюза, но очень красивое!
    Полярная ночь наступает через несколько дней после окончания фестиваля, поэтому
    он и называется "DarkSeasonBluesFestival"</b>


    - Расскажи, пожалуйста, о своем знакомстве с такими музыкантами, как Rick Holmstrom
    и Mitch Kashmar.


    <b>- Я открывал концерты Рика и Митча в Норвегии и в России. Оба - замечательние
    музыканты и очень приятные люди. Я большой фанат Рика, у меня есть почти все его
    записи. Обожаю его гитарный саунд и стиль. Он играл на старом "Stratotone", у
    этой гитары гриф - как бейсбольная бита. Толстый гриф всегда хорошо звучит. Особенно
    если играет Холмстром ;)).</b>


    - Правда ли, что твой третий альбом попал в горячую ротацию на австралийские радиостанции,
    и это привело к знакомству с таким музыкантом, как Wolf Mail? Как родилась идея
    совместных гастролей по Франции и России?


    <b> - Альбомы "Troublemaker" и "Dangerous", действительно, были в ротации в австралийском
    блюзовом радио. И вот однажды я получил письмо от менеджера Уолфа Мейла, в котором
    он предложил поучаствовать в европейских гастролях Уолфа и просил помочь с организацией
    концертов в Москве. С этого началось наше знакомство. Уолф - музыкант-трудяга,
    в нем столько энергии! С моей помощью Уолф записал в Москве концертный ДВД.</b>


    - Фестиваль "Arkansas Blues & Heritage Festival", который прошел 4-6 октября 2007
    года - читал твой очерк, это все еще была блюзовая экзотика, или ты стал понимать,
    что Америка - это "твое" место?


    <b> - Могу лишь сказать, что я обожаю атмосферу блюзовых фестивалей. А "KingBiscuit"
    мне особенно нравится. В этом году традиционное название фестиваля было ему возвращено
    после многолетней судебной тяжбы с какой-то фирмой.</b>


    - Когда ты понял, что нужно эмигрировать из России? Как происходили сборы, были
    ли сомнения?


    <b> - Кажется, стал подумывать об этом в 2006-м... Не то, чтобы у меня возникло
    желание эмигрировать... Просто в течение нескольких лет обстоятельства складывались
    так, что захотелось кардинальных перемен. В общем, я как бы все время плыл по
    течению... Решиться было не просто, но другой перспективы я тогда не видел...</b>


    - Ты помнишь первые месяцы в Канаде? Кто тебе помогал? Ты сразу перевез свою семью?
    Как вы устроились?


    <b> - Мы переехали сразу всей семьей. Первые месяцы мне помогали друзья, которых
    я знал еще по Нальчику. Я им очень благодарен. Мой знакомый (на "Myspace" - опять
    же o пользе интернета!) гитарист Стив Козак здорово помог мне с музыкальными контактами.
    Стив всю жизнь играет блюз и знает всех в этой теме на западном побережье... Мы
    часто играем вместе на джемах, он очень позитивный человек. В принципе, я нормально
    устроился, мне здесь очень нравится. Единственная проблема - частые дожди. Зато
    зима мягкая и почти беcснежная!</b>


    - Твой новый сайт теперь на английском: я вижу, что с тех пор, как ты уехал, у
    тебя было много событий - тебя приглашают на множество фестивалей, ты записал
    новый альбом, вошел в чарты радиостанций...


    <b> - На самом деле, 2010-й был удачным годом для меня. У меня есть группа, есть
    лэйбл, я покатался по фестивалям, записал, как мне кажется, интересный альбом.
    "On The Move" вошел в список 25 блюзовых дисков, наиболее часто звучавших на радио
    в 2010 году. В конце концов, я получил номинацию нa национальную канадскую блюзовую
    премию "Maple Blues Awards"! Это очень вдохновляет.</b>


    - Ты ведешь активную жизнь в социальных сетях, открыт для общения. Кто твои новые
    друзья в "гитарно-блюзовом" мире теперь?


    <b> - Есть легендарные люди: Ронни Эрл, Рик Эстрин, Боб Марголин, Дюк Робиллард,
    Рик Холмстром, Чарли Бейти. Они открыты к обшению с любителями блюза.</b>


    - В последнем твоем альбоме "On The Move" много элементов свинга и джамп-блюза.
    Почему произошел такой поворот, и кто для тебя ориентир в этой "старой" музыке?


    <b> - Ориентиров много: от T-Bone Walker и Charlie Christian до Junior Watson
    и Jimmy Vaughan. Мне давно хотелось записать нечто подобное, в конце концов, мне
    это удалось! Теперь мне хочется сделать что-то совсем другое... Но пока рано об
    этом говорить.</b>


    - Расскажи, пожалуйста, о своем теперешнем оборудовании и инструментах?


    <b> - Гитары "Fender Strat Plus Deluxe" и "Harmony Roy Smeck", комбик - "Fender
    Deluxe Reverb", н екоторое время пользовался гитарой "Gibson ES-339" - она мне
    очень понравилась... Но, честно говоря, я сейчас меньше заморачиваюсь на эту тему.
    Меня больше интересует творческая сторона, чем техническая.</b>


    - Твоему сыну будет скоро 11 лет, если не ошибаюсь. И ты в свое время говорил,
    что он неплохо играет на барабанах...


    <b> - Он классный блюзовый барабанщик! Играет в блюзовой группе, где он самый
    молодой участник, я несколько раз джемовал с ними... Надеюсь, он не потеряет интереса
    к музыке...</b>


    - Можно я процитирую один момент? "У меня не было и нет никакой уверенности в
    том, что наша музыка кому-то по-настоящему нужна. Раньше был беспочвенный юношеский
    задор и оптимизм: нужно играть, потому что не играть невозможно. Сейчас - стадия
    некой психической зависимости от процесса, как, скажем, от наркотиков или табака.
    Что будет дальше - затрудняюсь предположить". Это говорил ты в одном из интервью
    почти 10 лет назад, когда вы только выбирались из провинции. Как бы ты сейчас
    ответил на вопрос о своем музыкальном будущем?


    <b> - Нужно играть, потому что не играть невозможно!</b>


    - Что бы ты хотел передать своим российским поклонникам, и когда нам ждать тебя
    с гастролями?


    <b> - Спасибо огромное за интерес к моей музыке! Я с нетерпением жду встречи на
    концертах. Когда это получится, пока точно не могу сказать... Надеюсь, что в самом
    ближайшем будущем</b>!


    Беседовал Алексей Щеголев.'
