  text: 'Эш Уилсон - один из самых ярких вокалистов, гитаристов и композиторов в современной
    блюзовой музыке Британии, известный сотрудничеством с такими звездами, как Уолтер
    Траут, Шон Уэбстер, Хью Колтман, Иэн Сигал, Пит Гэйдж, Mountain, Dr. Feelgood,
    The Animals и др.


    Благодаря родителям Эш в раннем возрасте познакомился с блюзом, и его увлечение
    музыкой Мадди Уотерса, Сона Хауса, Эрика Клэптона и Альберта Кинга вдохновило
    его и его старшего брата-барабанщика Фила на создание собственной группы The Melt.
    Уже к его 14 годам стало очевидным его стремление стать великим артистом, как
    его герои. Эш Уилсон начал карьеру профессиоанльного блюзмена в 16 лет. После
    трех лет, проведенных в нескончаемых гастролях с такими звездами, как: Walter
    Trout, Mountain, Doctor Feelgood и The Animals, группа The Melt накопила достаточно
    материала и выпустила тепло принятый критиками одноименный альбом, удостоенный
    в 2000 году звания "Дебютный альбом года" по версии журнала Blues In Britain.
    Это доказывает, что уже в возрасте 17 лет Эш был уже одаренным гитаристом, вокалистом
    и сонграйтером. Позднее, вместе с братом Филом основал инди-рок группу Infamous
    Vampires, с большим или меньшим успехом выступала на европейских фестивальных
    сценах. Поскольку "большого прорыва" не случилось, в 2014 году Эш принял приглашение
    стать полноправным членом Sean Webster Band, принял участие в двух гастрольных
    турах и записи альбома "See it through". Позднее он принял приглашение присоединиться
    к Jesse Davey''s Big Blues Band, записал партии ритм- и соло-гитары и пел на альбоме
    "Big Blues Album" и стал соавтором песни "The Revalator". Позднее он присоединился
    к гастрольной группе певицы Sari Beth Schorr, заняв в составе место, оставленное
    блистательным блюзменом Иннисом Сайбаном, бывшим гитаристом Роберта Планта.


    Имея в активе более пятнадцати лет творческих коллабораций и записавшись в качестве
    приглашенного музыканта или члена группы на нескольких альбомах, а также солидный
    запас авторского материала, Эш Уилсон все никак не мог собраться и силами и выпустить
    свой сольный альбом. Наконец, в 2017 году - он решился на создание проекта под
    собственным именем. Дебютный альбом "Broken Machine" - это прорыв, краеугольный
    камень, которым он начал мостить дорожку к всемирной славе. Это водораздел, поделивший
    его карьеру на "до" и "после". "Этот альбом - несомненное достижение для Уилсона,
    как с точки зрения многообразия музыкальных стилей, так или иначе имеющих блюз
    в своей основе, так и с точки зрения профессиональных вершин, достигнутых им в
    качестве гитариста/вокалиста и автора песен" Blues In Britain. "Broken Machine
    - это альбом, который просто необходимо иметь в коллекции!" Blues Matters Magazine


    Благодаря его прежним блестящим работам и успеху дебютного альбома он уверенно
    входит в весьма тесный круг выдающихся блюзовых музыкантов. Согласно опросу, проведенному
    в декабре 2017 года авторитетным журналом TotalGuitar и ведущим порталом MusicRadar
    среди музыкальных промоутеров, журналистов и читателей, в котором приняло участие
    более 135 тысяч человек, Эш Уилсон оказался на 15 строчке рейтинга "17 лучших
    блюзовых гитаристов мира сегодня" http://www.musicradar.com/news/the-17-best-blues-guitarists-in-the-world-right-now


    "Уилсон по нашему мнению - один из величайших современных блюзовых музыкантов,
    несомненный гитарный талант и восходящая звезда первой величины" MNPR Magazine


    Концерты пройдут с 4 по 9 декабря. Не пропустите!'
