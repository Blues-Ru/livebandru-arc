  text: 'Петербургская леверсная арфистка и композитор Анастасия "Ася" Сергеева -
    один из тех музыкантов, которые стремятся сочетать несочетаемое, постоянно экспериментируя
    со стилем, звуком, балансируя между историей и современностью, традицией и авангардом.


    За последние несколько лет Ася принимала участие во многих крупных события петербургской
    фолк-музыкальной сцены, таких как фестивали "Самайн 2009 и 2010", "День Святого
    Патрика", "Волынщик 2010", и сотрудничала со многими известными фолк-музыкантами
    города, однако до сих пор обижается, когда направление, в котором она работает
    причисляют к фолк-музыке, а саму ее называют "кельтской арфисткой"


    "Я никогда не ставила целью точное следование тем или иным жанровым законам и
    правилам, никогда не пыталась сказать "вот тут я играю кельтику, тут – джаз а
    тут академическую музыку – это хорошее занятие для критиков, а в один конкретный
    момент времени можно быть либо музыкантом, либо критиком. Мне проще сказать, что
    я просто играю музыку, как ее слышу и как ее понимаю. И мне всегда невероятно
    приятно, когда я вижу, что людям эта музыка нравится"'
