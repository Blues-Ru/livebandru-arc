reviews:
- id: 295
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Стильный Московский (вокально-инструментальный, калорийно - диетический,
    генетически не модифицированный, эстрадно не симфонически - джазовый, рафинированно
    - не пастеризованный, культурно - дикорастущий) ретро-джаз ансамбль АВОКАДО БАНД
    исполняет авторскую и не авторскую, авторски аранжированную и уникально инструментованную
    танцевальную музыку джазового характера. Мастерски вплетая Swing и Latino в различные
    стили, эпохи и направления. Иностранные поклонники коллектива формулируют стиль
    группы как: Russian and American swing music. Инструментальный состав: вокал,
    гитара, аккордеон, контрабас (бас-гитара), барабаны.


    Дискография: АВОКАДО БАНД - МоскваBillyГрад- 2012


    AVOCADO BAND называют свой собственный стиль замысловатым словосочетанием Moscowbilly
    - "Jazz - Blues - Swing - Twist - Rock & Roll & Billy" - смешение самых популярных
    музыкальных стилей середины ХХ-го века. Феерический коктейль танцевальных ритмов:
    здесь и гангстерский свинг 40-х., зажигательные рок-н-роллы 50-х, задорные твисты
    60-х, душевный блюз, и отвязное кантри. /Журнал "Московский музыкант"/'
  verified: true
