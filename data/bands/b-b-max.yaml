  header: Релиз группы
  text: 'Рок музыка всегда ассоциировалась в первую очередь с гитарами. Зачастую для
    многих стилей именно мастерство гитаристов придает группам уникальное звучание
    и узнаваемость. Юрий Максимов. Виртуозный гитарист, вокалист, автор инструментальной
    музыки и песен, аранжировщик. Его отличие - чистый, сильный собственный стиль
    игры, который не спутаешь ни с кем другим. Его истина - поиск глубины в музыке:
    уход от поверхности познания так глубоко, где можно достать самую дорогую жемчужину.
    Cочный, эмоциональный вокал в сочетании с гитарным шоу создают уникальность концертного
    действа. Неожиданный, дерзкий: он не терпит монотонности. Концерты блюз - рокера
    B.B.Max незабываемы! Виртуозная игра гитариста на толстых струнах. Зрители не
    успевают заметить, откуда у него появляются новые слайды, как стаканы превращаются
    в смычки, а левая и правая рука неожиданно меняются ролями... и все это не ради
    изумления публики, а ради извлечения самых неожиданных звуков - орган, скрипка,
    волынка, банжо и гитара само собой! И не удивляйтесь, если в блюзовой или роковой
    композиции Вы неожиданно узнаете нотки из классических произведений Римского-Корсакова
    или Хачатуряна. Музыканты группы B.B.Max создают собственные рецепты хорошей музыки,
    смешивая ингредиенты из разных стилей и направлений: блюза, ритм-н-блюза, джаза
    и хард-рока. Записано четыре компакт-диска: "Oldy" (2001), "Joker" (2003), "Smokebreak"
    (2006), Live in Club (2011г). В Москве группу можно увидеть на клубной сцене -
    Б2, B.B.King, Гринвич, Дом у дороги, Доктор Скотч, Defaqto и др.


    В разные годы Юрий Максимов работал с такими группами как Max Band, Дубль 5, Цемент,
    Хобби, Arnis Mednis & EX PATRIOTS, Hot dog''s blues band. Выступал в концертах
    с группами АЛИСА,Чиж и Ко, В.Зинчук, Песняры, А.Свиридова, Моральный Кодекс, Чайф,
    Веселые картинки. Участвовал в студийных записях многих музыкантов в Прибалтике,
    Дании, Швеции, Норвегии, Финляндии. B.B.MAX принимал участие в фестивалях в Литве,
    Эстонии, Дании, Финляндии.


