reviews:
- id: 15
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Группа Backstage - это одна из первых российских групп, ориентирующихся на
    формат джем-бэнда - то есть на синтез блюза, фанка, соула, рока и т.п. с ярко
    выраженным импровизационным началом. Участники группы - опытные музыканты, зарекомендовавшие
    себя в известных российских коллективах.


    В 2007 году в составе группы Николая Арутюнова музыканты Backstage аккомпанировали
    легенде британского рока Питу Брауну в ходе его московских гастролей. (Браун -
    соавтор таких хитов Cream, как White Room, Politician и Sunshine Of Your Love,
    а также бессменный соратник Джека Брюса, продюсер и музыкант).


    В 2008 году Backstage записали альбом Take Cover, где хорошенько "оторвались"
    на любимых каверах))).


    Недавно группа к великой всеобщей радости добавила в состав клавишника и в настоящее
    время работает над оригинальным материалом для второй пластинки.'
  verified: true
  created: '2010-08-06'
