  text: 'Bad Bimbos - музыкальный коллектив, объединивший четырех опытных и самобытных
    московских музыкантов, искренне любящих рок-музыку! Безбашенный драйв, сочетающийся
    с мастерством исполнения, а яркая, дерзкая, насыщенная программа не оставят равнодушными
    ни истинных ценителей классических рок-хитов, ни поклонников блюза, фанка и даже
    регги! Вам будет приятно увидеть уже знакомые лица в новой гремучей смеси!


    В составе Bad Bimbos: Анастасия Концевая (ex-Crossroadz, ex-Н. Арутюнов и Funky
    Soul и др.), Юрий Новгородский (Н. Арутюнов и Funky Soul, Backstage, Dr. Nick
    и мн. др.), Алексей Тишин (Н. Арутюнов и Funky Soul, Alice Lange, ex- Hristo Kirillov
    & Know How и мн. др.) и Евгений Гудков (Ник. Арутюнов и Funky Soul).'
