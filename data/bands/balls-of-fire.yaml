  text: 'Группа "Balls of Fire", созданная пять лет назад, сейчас по-настоящему популярна
    среди ценителей подлинной классики рок-музыки. На своих концертах "Balls of Fire"
    исполняет песни Santana, Lenny Kravitz, INXS, Rolling Stones, Prince, AC/DC, Heart,
    Stereophonics, Soundgarden, Allannah Miles, Van Halen, Living Colour, EMF, 4Non
    Blondes и многое другое.


    Шоу состоит из двух получасовых отделений. Каждое отделение музыканты играют в
    оригинальных костюмах, активно общаются с публикой, демонстрируют технические
    трюки. Каждый, кто хоть раз слышал и видел "Balls of Fire" отзываются о них, как
    о группе высочайшего уровня, несущей мощный позитивный заряд. Коллектив состоит
    из музыкантов, принявших участие в создании множества известных в России проектов.


    Леонид Гуткин играл на бас-гитаре в легендарной группе "Автограф", в составе которой
    принял участие в прогремевшем на весь мир концерте "LIVE AID", играл на фестивалях
    с участием таких звезд, как Сантана, Джеймс Тейлор, Chicago. После распада группы,
    Леонид открыл свою студию в Лос-Анжелесе и занимался продюсированием . Вернувшись
    в Москву, он возглавил компанию Крем-рекордз, занимающуюся продвижением таких
    артистов, как Дельфин и Данко.


    Маша Кац тоже известна не только в России, но и за ее приделами. Именно она под
    псевдонимом Юдифь стала первой россиянкой, выступившей на конкурсе "Евровидение".
    Маша работала с группой "Квартал", ее голос звучит в песнях "Лиги блюза", во многих
    альбомах самых популярных российских исполнителей: Аллы Пугачевой, Филиппа Киркорова,
    Алсу, Валерия Меладзе, Софии Ротару, Анатолия Крупнова. Уже несколько лет Маша
    преподает в собственной школе пения, учениками которой, к примеру, являлись участники
    мюзикла "Метро".


    Александр Лев - вокалист и гитарист-виртуоз. Он долгое время работал за границей,
    где выступал как соло-гитарист. Сейчас Александр, помимо работы в "Balls of Fire",
    занимается саунд-продюсированием таких артистов, как Наташа Королева, Игорь Саруханов,
    группа "Любовные истории" и музыкальных телевизионных проектов.


    Игорь Хомич является однми из самых востребованных сессионных гитаристов, принимавшем
    участие в записях большого количества альбомов самых известных эстрадных исполнителей
    страны. Играл в коллективах Кристины Орбакайте, Ларисы Долиной, группе "Калинов
    Мост" и многих других. 3а ударные в "Balls of Fire" отвечают лучшие барабанщики
    страны.


    Коллектив выступает в лучших клубах Москвы, на частных и корпоративных мероприятиях.
    (Mersedes-Benz "People In Motion" party; Open-air презентация Chrysler 300 на
    Рублевском шоссе; 50-летний юбилей А.Гафина, вице-президента "Альфабанка"; открытие
    салона "Харлей-Дэвидсон" в Москве и многие другие). Часто на сцене, "джэмующими"
    вместе с музыкантами группы, можно увидеть таких гостей, как Андрей Макаревич,
    Евгений Маргулис, Николай Арутюнов, Андрей Державин, Алексей Романов. В мае 2005
    г. группа приняла участие в гала-концерте Международной Выставки "Клуб и Музыка"
    в Кремле.


    Время неумолимо бежит, одна эпоха сменяет другую, но музыка не исчезает, она –
    вечна. Музыка созданная в золотую эпоху рок-н-ролла тому подтверждение. Композиции
    многих легендарных коллективов в оригинале, к сожалению, услышать уже не возможно.
    Но если вспоминать прошлое и слушать кавер-версии, то только в исполнении настоящих
    профессионалов - группы "Balls of Fire".'
