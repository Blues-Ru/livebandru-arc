  header: Banderas Blues Band
  text: 'Стиль в котором сейчас играет Banderas Blues Band - можно охарактеризовать
    как Blues Modern. Современная, более роковая трактовка блюза, мощный гитарный
    саунд, четкий заводной ритм на блюзовой основе, внушительный взрывной вокал, перемежающийся
    со звуками блюзовой губной гармошки и яркие авторские песни - стали визитной карточкой
    ВВВ. Владимир Бандерас - лидер группы. В далекие 90-е, завоевав звание лауреата
    фестиваля Червона Рута 97 со своим авторским проектом Аномалия, и доказав всем,
    кто в него верил, состоятельность своих музыкальных идей, он окончательно решил
    расстаться с архитектурой и бизнесом, став на тернистый путь музыканта. Попробовав
    свои силы в разных стилях и направлениях современной музыки, пройдя огонь, воду
    и медные трубы, он обрел свое громкое имя и нашел себя, став одним из самых известных
    блюзменов Украины. В настоящее время Владимир принимает участие во втором сезоне
    Теле-шоу Голос Країни, где представляет город Харьков. Его бенд постоянно гастролирует
    по городам бывшего Союза. Репертуар коллектива постоянно обновляется. В программе
    много интересных авторских песен, а так же восхитительные кавер-версии для любителей
    классики рока и блюза - ZZ Top, Led Zeppelin, Deep Purple, Pink Floyd, Tito &
    Tarantula, Depeche Mode, Rolling Stones, Eric Clapton, Stevie Ray Vaughan, Muddy
    Waters, Jimi Hendrix, Willie Dixon, Lonny Mack, Savoy Brown, Carlos Santana, Beatles
    и др. За плечами километры дорог, сотни больших и малых сцен, море благодарных
    зрителей, а впереди новые встречи, новые песни и новые впечатления. Мы будем рады
    увидеть на концертах своих старых друзей и обрести новых. Приходите сами, зовите
    друзей: Обещаем - БУДЕТ ЗДОРОВО!


    Современный состав Banderas Blues Band - это классическое блюзовое трио: Владимир
    Бандерас - вокал, гитара, губная гармошка. Александр Канищев - бас гитара, Александр
    Кучерин - барабаны


