  text: Группа играет в основном чикагский блюз (Chicago Blues) и электрический дельта-блюз
    (Electric Delta Blues). Исполняет авторскую музыку, а также композиции таких великих
    блюзменов, как Мадди Уотерс (Muddy Waters), Бадди Гай (Buddy Guy), Джуниор Уэллс
    (Junior Wells), Джон Ли Хукер (John Lee Hooker), Роберт Джонсон (Robert Johnson),
    Джеймс Браун (James Brown), Би Би Кинг (B.B.King), а также блюзовые и рок'н'ролльные
    темы "The Rolling Stones", "Led Zeppelin", "The Doors", "Nazareth".
