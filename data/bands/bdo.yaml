  text: '24 мая состоится последнее выступление Большого Джазового Оркестра в этом
    сезоне на сцене Домжура. В состав Оркестра входят молодые таланты - единомышленники
    в музыке, которые являются студентами и выпускниками ведущих музыкальных вузов
    России, таких как РАМ им. Гнесиных, МГК им. Чайковского, солисты ведущих джазовых
    биг-бэндов Москвы, лауреаты многочисленных джазовых конкурсов и фестивалей. Оркестр
    исполняет традиционную джазовую музыку 30-х – 60-х годов 20 в., как в оригинальных
    аранжировках так и в новых, написанных талантливым пианистом и арранжировщиком
    Евгением Сивцовым (Россия-США) специально для Большого Джазового Оркестра.


    Оркестр дебютировал в октябре 2010 года на сцене Центрального Дома Журналиста.
    В декабре выступил на праздновании 13-летия интернет-портала ДЖАЗ.РУ, а в апреле
    2011 года получил гран-при на международном конкурсе молодых исполнителей "Усадьба-Джаз".
    Создатели Оркестра Дарья Антонова и Петр Востоков.&#65279;'
