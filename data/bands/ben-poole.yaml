- id: 474
  reviewer_id: 10
  reviewer_name: Алексей Щеголев
  reviewer_token: alllexxx
  header: Диплом вместо музыки публике не подсунешь - интервью
  text: '<b>В Москве отыграл серию концертов британский блюзовый гитарист Бен Пул.</b>


    <i>"Классное место!", - говорит Бен Пул, спускаясь в стилизованную под вагон метрополитена
    столовую в самом центре Москвы. Сегодня четверг, а значит - рыбный день по советской
    традиции. Уха, морской окунь, пюре, салат из свежей капусты и брусничный морс
    - комплексный обед, классика жанра. За все про все - 240 рублей, или 3,5 фунта,
    то есть почти даром. Это в России хлеб едят вприкуску, по английской традиции
    булку надо разломить и обмакнуть в суп... <br> - Каков план? - спрашивает Бен.<br>
    - Обед, потом клуб "Би.Би.Кинг", а пока интервью.<br> - Ок. Отличная еда тут!
    Двукратный обладатель "British Blues Awards" молодой гитарист Бен Пул дает четыре
    концерта в российской столице. Невысокий бородатый крепыш излучает позитивную
    энергию: в свои 30 объездил полмира (в России - уже второй раз, впервые отметился
    аншлаговыми концертами в Москве и Питере в сентябре 2014 года в рамках фестиваля
    <a href="http://www.hotdraftproductions.com/2014-past-production">Большое Британское
    Блюзовое Вторжение</a>), не пропускает ни один важный блюзовый фестиваль, тур
    расписан до конца года. Успешен, востребован, не женат. Что тут скажешь - "восходящая
    звезда".</i>


    <b>- Почти все статьи о тебе начинаются примерно одинаково: "Восходящая звезда
    британского блюза...". Но давай взглянем на факты: в 21 год ты играл с Джеффом
    Беком (Jeff Beck), и он аплодировал тебе; играл с Гэри Муром (Gary Moore), с Ричи
    Коценом (Richie Kotzen) и другими знаменитостями. Прибавим участие в многочисленных
    фестивалях, постоянные гастроли по Европе. Что надо еще сделать такого, с какой
    знаменитостью сыграть, чтобы о тебе наконец перестали писать как о "восходящей"
    звезде?</b>


    - Хороший вопрос! Да, я играю уже достаточно давно, но я все еще молод - и внешне
    и внутренне. В блюзе принято говорить об успехе в гораздо более зрелом возрасте.
    Звезды стиля - наверху, а я пока "под поверхностью", в андеграунде. Видимо, надо
    прорываться на более крупные площадки и фестивали. Публика по инерции идет за
    раскрученным именем, за прессой, иногда даже не доверяя своему мнению. Потом,
    не надо забывать, что кроме "великих" сейчас в блюзе - много молодых талантов,
    конкуренция сильная.


    <b>- Давай проверим, достаточно ли подробно я изучил твою биографию. Отец - профессиональный
    музыкант, играешь с 9 лет. Первая гитара - классика, нейлоновые струны, фингерстайл.
    Блюз-роком увлекся, когда в 12 лет услышал "Voodoo Child" Джими Хендрикса (твоя
    версия этой композиции на www.youtube набрала полмиллиона просмотров). В 13 -
    первая электрогитара (Strat Squier). Затем изучение кантри, увлечение соулом и
    R&B... Дикая смесь! Ко всему, ты дипломированный гитарист. Скажи, так в итоге
    ты зарабатываешь на жизнь только музыкой?</b>


    - Да, все верно. Я могу играть в очень разных жанрах, но в данный момент играю
    преимущественно блюз, блюз-рок. И да - шесть или семь последних лет я зарабатываю
    на жизнь только музыкой. Что касается моего музыкального образования - диплом
    вместо музыки публике не предъявишь.


    <b>- Ты помнишь свой первый профессиональный концерт?</b>


    - Мне было 16. Тогда я впервые сыграл за деньги. Заведение на 100 человек, билеты
    по 8 фунтов, публика - родственники, друзья, случайные посетители, первые честно
    заработанные 800 фунтов... Тогда я сказал себе: "Вот это круто!"


    <b>- А было такое - вышел на сцену, а зал пустой?</b>


    - Бывало и такое, но я все равно играл, иногда до 5 утра. К счастью, это было
    один или два раза в жизни. Система выступлений в Британии разная. Например, в
    самых знаменитых клубах администрация заведения платит группе фиксированный гонорар,
    и та играет чуть ли не до утра. Кто-то играет три сета по часу. Я, как правило,
    играю один сет длиною в два часа, в том числе - то, что называется "на бис". Оплата
    - процент от продажи билетов.


    <b>- В каком-то из интервью ты сказал, что если бы у тебя была машина времени,
    то ты отправился бы в 11 июля 1983 года в клуб "El Mocambo", в Торонто - на концерт
    Стиви Рэй Воэна (Stevie Ray Vaughan). Расскажи, как у тебя складывались отношения
    с музыкой СРВ и как удалось избежать копирования его стиля? Согласись, в эту ловушку
    попали многие - сотни гитаристов-клонов продолжают старательно подражать ему.</b>


    - Стиви - он по-настоящему тронул мою душу. Здесь и восторг, и страсть, и эмоции.
    Это не традиционный блюз, там много от рока, от Хендрикса. Как я избежал ловушки?
    Во-первых, я никогда не играл на Стратокастере, чтобы уж точно не быть похожим
    даже в звуке. Во-вторых, в какой-то момент я запретил себе слушать Стиви Рэй Воэна,
    чтобы исключить копирование, он и так уже сидит внутри меня. И в-третьих, я искал
    собственный звук и стиль. Есть много парней, играющих в похожем на Стиви стиле,
    в техасской манере - например, Кенни Уэйн Шеппард (Kenny Wayne Shepherd) и другие.
    Но я специально слушаю разный блюз и музыку других стилей - даже поп-музыку и
    металл, чтобы найти те оттенки, которых нет внутри жанра.


    <b>- Джон Мэйер (John Mayer), Джо Бономасса (Joe Bonamassa) и подобные им приводят
    в блюз совсем далеких от него слушателей, популяризируют его. Ты играешь смесь
    из блюза, рока, ритм-н-блюза, соул и фанка - с той же целью? Или просто любишь
    разнообразие?</b>


    - Нет, не специально - это я так чувствую, я так слышу. Дело в том, что нельзя
    искусственно получить успех - и публика, и журналисты, и продюсеры слышат и видят,
    где настоящее искусство, а где фальшивка, фэйк. Народ понимает, когда артист его
    обманывает. Если чувство есть, если ты даешь энергию, то в это верят, идут на
    твой концерт. Сымитировать нельзя.


    <b>- Песня - это не просто копия, которую ты повторяешь из концерта в концерт?
    Мог бы ты рассказать о том, какую жизнь проходит каждая композиция - как она рождается,
    как трансформируется? Когда ты понимаешь, что ее пора представлять публике?</b>


    - Сначала рождается музыка, не слова. Обычно это риф или фраза, которую я наигрываю
    на акустической гитаре, кручу ее туда-сюда. Потом приходит понимание, какой могла
    бы быть эта песня, дальше - слова и т.д. В сет-листе у меня всегда есть песни,
    которые еще не записаны на альбоме. И сегодня они присутствуют, некоторые "доходят"
    уже третий год - мы играем их, улучшаем, и, возможно, скоро запишем их. Ну, а
    что насчет копирования песни из выступления в выступление, то просто физически
    невозможно сыграть нота в ноту одну и ту же композицию! Тем более, если, как сегодня,
    я играю с совершенно новой группой из Москвы - каждый музыкант привносит в песню
    что-то свое.


    <b>- Гэри Мур однажды дал тебе совет. Он сказал, что паузы в соло важнее, чем
    ноты. Он имел в виду, что в песне нужно оставить место для дыхания и того, что
    нельзя передать звуком. Совет все еще актуален для тебя?</b>


    - Есть разные гитаристы. Кто-то берет количеством нот. Кто-то и хотел бы брать
    количеством нот, да не может. А есть Питер Грин (Peter Green) и Эрик Клэптон (Eric
    Clapton) - у которых нужно учиться паузам в соло.


    <b>- Что у тебя вытатуировано на руках?</b>


    - "Voodoo Chilе" Хендрикса. Вот: "Well, I stand up next to a mountain, And I chop
    it down with the edge of my hand", ну и так дальше (задирает футболку - тату переходит
    на тело). А здесь - ноты основного рифа "Voodoo Child" (показывает правое плечо
    с нотами).


    <b>- Будешь добавлять что-то еще?</b>


    - Конечно! (смеется). Место, в принципе, еще есть.


    <p align="right">Беседовал Алексей Щеголев.


    <p align="right">Глубокая признательность Борису Литвинцеву за помощь в организации
    интервью.'
