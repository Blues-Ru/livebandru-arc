  text: 'Гитарист и певец Бен Пул еще совсем молод, но уже собрал множество номинаций
    и дважды получил British Blues Awards. Записал несколько альбомов, Не раз объехал
    с гастролями всю Британию, Континентальную Европу и США. Играл и записывался почти
    со всем живыми легендами современного блюза, многие из которых посчитали за честь
    добавить свои соло к композициям предпоследнего весьма успешного альбома Бена
    ''Time Hаs Come'' и последнего ''Anytime You Need Me". Тридцатилетний Бен Пул
    заслуживает определения одного из самых выдающихся блюзовых гитаристов, появившихся
    в Британии за долгое время. В декабре 2017 года авторитетный журнал TotalGuitar
    и ведущий портал MusicRadar проводили опрос среди журналистов и читателей, в котором
    приняло участие более 135 тысяч человек. По результатам голосования Бен Пул оказался
    на 14 строчке рейтинга 17 best blues guitarists in the world right now. http://www.musicradar.com/news/the-17-best-blues-guitarists-in-the-world-right-now
    Альбом 2018 года ''Anytime You Need Me'' собрал все мыслимые номинации, в том
    числе "Best Blues Rock Album Of 2018. The Top 20 Albums" и занимает в списке 8-ю
    строчку! http://bluesrockreview.com/2018/12/top-20-albums-of-2018.html


    "У Бена действительно огонь в крови - это слышно в каждом соло. У него потрясающее
    грифовое вибрато, и он способен бесконечно тянуть бендом несколько струн разом
    так, что от трения вот-вот задымится гриф под пальцами... Бен впечатляет своим
    звуком, задушевностью и сценической подачей. Следующий Джо Бонамасса?" ''TotalGuitar''
    magazine


    О нем, не скрывая восхищения, говорили "старшие товарищи", признанные гитарные
    мастера.


    "Это чертовски поразительно! Мне нравится, как играет это парень!" - Джефф Бэк.


    "По-настоящему великолепный гитарист!" - сказал о Бене после совместного концерта
    несколько лет назад Гэри Мур.


    "Невероятно! Звучит очень свежо, не часто услышишь кого-то из молодежи, кто бы
    страстью и подачей напоминал бы тех, кто вдохновлял меня в дни моей юности. Вот
    увидите, у парня большое будущее! Потрясно!" Ричи Котцен


    "Этот молодой человек, без сомнения, подлинный талант и восходящая звезда и заслуживает
    всяческой поддержки. Не пропустите его концерт, когда он будет на гастролях поблизости."
    ‘BLUES MATTERS'' MAGAZINE


    Когда вы слышите подобные характеристики от одних из самых лучших гитаристов мира
    и одного из главных музыкальных журналов Британии, будьте уверены - эти ребята
    знают, что говорят - чтобы сказать подобное, они действительно должны были услышать
    нечто потрясающее!'
