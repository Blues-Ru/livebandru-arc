  text: 'Best Blues Jam - это грандиозный еженедельный фестиваль живой музыки. Основой
    Best Blues Jam являются лучшие молодые блюзовые музыканты Москвы, к которым в
    качестве специальных гостей присоединяются настоящие звезды и мастера жанра. Во
    время концерта на сцене создаются новые группы и рождаются интереснейшие музыкальные
    идеи. Уникальной особенностью Best Blues Jam является возможность лично пообщаться
    с музыкантами, что создаст у вас ощущение полноправного участия в действии.


    Каждую среду мы с нетерпением ждем вас!


    Начало в 20-00. Вход СВОБОДНЫЙ!


    М. Кантемировская, Пролетарский пр-т, дом 20, строение 1. Тел.: 325-71-11'
