  reviewer_token: press-release
  text: 'Новое имя на профессиональной московской клубной сцене. Состав был создан
    в 2008. Несмотря на то, что состав существует недавно, он состоит из музыкантов
    с колоссальным опытом концертных выступлений, изысканным вкусом исполнительского
    мастерства, подчеркнуто-педантичным отношением к собственному имиджу.


    Избрав за эталон стиль исполнения и экспрессию лучших джазовых биг-бэндов 40-50
    х. годов и ранних исполнителей рокабилли и рок-н-ролла, новый коллектив заявил
    о себе как лучший в России джайв-оркестр.


    Также "Betty Boop Lovers" являются организаторами самой популярной в Москве танцевальной
    вечеринки, которая проходит каждый вторник в старейшем московском джаз клубе "Синяя
    птица". В настоящее время "Betty Boop Lovers" усердно трудятся над своей первой
    пластинкой, выпуск которой планируется в 2009 году.


    Выступление "Betty Boop Lovers" - это всегда событие. Коллектив буквально потрясает
    публику нескончаемой энергией и обаянием, а мастерство музыкантов раскрывается
    с каждым концертом, завоевывая сердца не только любителей джайва и буги-вуги,
    но и "неискушенной свингом" аудитории.'
  verified: true
