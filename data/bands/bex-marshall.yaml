reviews:
- id: 384
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Уроженка Лондона БЭКС МАРШАЛЛ - певица, сонграйтер, гитаристка - это просто
    ураган,"музыкальное торнадо"! Можно не сомневаться в том, что ее выступление не
    оставит равнодушной публику независимо от того, исполняет ли она свои проникновенные,
    страстные, чувcтвенные песни сольно в маленьком клубе или в составе группы от
    пауэр-трио до биг-бэнда на главной сцене крупнейшего фестиваля.


    Неоднократно номинированная на British Blues Awards в категории "Best Female Vocalist",
    она потучила награду в 2008 и пришла к финишу второй в 2013. Ее фирменный гитарный
    стиль - сплав блюз-роковых риффов, кантри-блюза, рэг-тайма, игры слайдом и "корневого"
    фингерпикинга.


    Бэкс Маршал много и успешно гастролирует по Британии, Континентальной Европе,
    странам Северной и Южной Америки, особенно часто в США и Бразилии, причем в Штатах
    с оригинальным составом Big Brother and The Holding Company!


    Последний, обласканный критиками и горячо принятый поклонниками, студийный альбом
    Бекс Маршалл "The House оf Mercy" в 2013 году занимал высокие позиции в чартах
    по обе стороны Атлантики, достиг шестой строчки Top-20 в Британии и надолго закрепился
    в Top-40 в Штатах!


    Во второй приезд Бекс Маршал в Россию в феврале 2018 года, она была одним из участников
    представительного Beatles Fest, отыгала несколько концерта в московских клубах
    и в ЦДХ, а также выступила с эксклюзивным акустическим сетом на презентации книги
    Эркина Тузмухамедова.


    Третий тур Бэкс Маршал с успехом прошел в начале августа 2019 года.'
