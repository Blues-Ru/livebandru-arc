  header: '"Би-2" с праздничным концертом в Санкт-Петербурге'
  text: 'В этом году настоящие мужчины Северной столицы смогут отметить свой праздник
    на четыре дня раньше срока: петербургский концерт "Би-2" 19 февраля в "Зале Ожидания"
    украсят песни из саундтрека к фильму "О чем говорят мужчины". Для тех, чья молодость,
    как и у героев фильма, пришлась на конец 80-х, станет подарком эстетика нью-вейва,
    на которую опиралась группа при работе над саундтреком.


    Молодому поколению, эти годы не заставшему, на концерте тоже будет интересно:
    прозвучит и многое из альбома "Лунапарк", содержащего боевой и энергичный диско-панк
    - а это уже музыка XXI века, знакомая современным подросткам. Без хитов, прославивших
    группу, разумеется, тоже не обойдется: зрители услышат знакомые и любимые песни,
    такие как "Полковнику никто не пишет", "Серебро" и др.


    Специальным гостем концерта станет группа "Zvonok Hip-Rock", которую основали
    в 2009 музыканты "Би-2" Андрей Zvonok (гитара) и Борис Лифшиц (барабаны). В 2010
    в ее состав вошел Антон Минц (программирование, синтезаторы), и музыка стала взаимодействием
    трех стихий: барабанов, гитары и синтезаторов. В отличие от "Би-2", в ней нет
    вокала - зато есть танцевальный грув, техничные барабанные брейки и виртуозные
    гитарные соло, густой рок-звук с риффами и психоделическая электроника. "Zvonok
    Hip-Rock" наглядно показывает, что кругозор участников "Би-2" куда шире привычной
    песенной рок-музыки, и от них можно ожидать совершенно неожиданных ходов.


    Билеты уже в продаже!


    Начало концерта: 20:00.


    Клуб "Зал Ожидания": наб. Обводного канала, 118, ТЦ "Варшавский экспресс".


    Билеты в продаже с 10 января: в кассе клуба "Зал Ожидания": (812) 333-10-68, www.clubzal.com,
    vkontakte.ru/club6098738 во всех театральных кассах города, а также на bileter.ru,
    kassir.ru, muzbilet.ru, biletsofit.ru.


    Входной билет - 1000 рублей (первые 100 билетов), VIP - 1800рублей, супер VIP
    - 2500 рублей.'
