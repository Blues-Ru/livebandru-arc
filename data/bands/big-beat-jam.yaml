  header: Воскресный Big Beat Jam в клубе Олимпиада-80
  text: 'Участники Big Beat Jam – это лучшие силы современного российского джаза.
    Молодые и уже успевшие прославиться, они не зазнались и приходят к нам по воскресеньям.
    Просто поиграть, устроить продолжительный импровиз, оторваться с друзьями в кругу
    друзей. Это и есть Big Beat Jam! Предлагаем вам присоединиться к нашей компании:
    Гульнара Аскарова, Юрий Топчий, Николай Моисеенко, Алексей Кравцов, Борис Ионов,
    Алексей Наджаров, Сергей Гейер, Марк Юсим, Борис Голик и многие-многие другие.
    Вход свободный.'
