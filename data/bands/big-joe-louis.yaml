  header: Знакомьтесь - Big Joe Louis
  text: 'Биг Джо Луис и Его Короли Блюза (Big Joe Louis & His Blues Kings) выпустили
    свою дебютную LP пластинку в 1989 году - "первый пресс" был сметен с прилавков
    всего лишь за четыре дня! Ветеран саунд-продюсер этой пластинки Майк Вернон (Mike
    Vernon) говорил об этой сессии: "Работать с Биг Джо Луисом было реальным испытанием
    для меня, и он тот человек, по которому я буду скучать меньше всего на свете.
    Уберите его от меня подальше... но - это было круто, как не было ни скем другим
    по эту сторону моря.." В 1992 году новый альбом, вышедший на LP и CD, спродюсированный
    снова Майком Верноном на лейбле Dutch Tramp, отражал возросшую популярность группы
    в Европе. С выходом альбома в его поддержку прошла серия аншлаговых концертов,
    в том числе в одном из лучших Амстердамских клубов "Paradiso Club", которые были
    записанны на пленку и отсняты для телевидения - компиляция из записей легла в
    основу 2CD, выпущенного в июне 1992 года. Осенью 1995 группа закончила свой третий
    студийный альбом с участием приглашенных гостей, в числе которых был и Джон Праймер
    (John Primer, ex-Muddy Waters/Magic Slim guitarist). Группа также записалась с
    легендой Миссиссиппи Дельта Блюза Дэйвидом "Ханибой" Эдвардсом (David "Honeyboy"
    Edwards), а сам Биг Джо Луис записался с Ван Моррисоном (Van Morrison) и Джулсом
    Холландом (Jools Holland). В течение двух лет начиная с 2000 года Биг Джо Луис
    сотрудничал с Легендарной британской ритм-н-блюзовой группой Тhe Big Town Playboys
    в качестве вокалиста.


    Биг Джо Луис родился на Ямайке и к началу 70-х перебрался в Великобританию. Короли
    Блюза он основал в начале 1989 года, и группа Биг Джо Луис и Его Короли Блюза
    заняла свое место на блюзовой сцене - изъездив вдоль и поперек Великобританию
    и Ирландию, Западную и Восточную Европу и Скандинавию, исполняя в неповторимом
    стиле собственную версию настоящего даун-хоум блюза на лучших концертных площадках.
    Сотрясший северную землю Норвегии, скандинавский тур Биг Джо Луиса неожиданно
    завершился незапланированными концертами в России в октябре 1993 года (он был
    снят для российского телевидения на концертах в Мурманске), а Биг Джо Луис был
    одним из первых западных музыкантов, кто принес блюз на Российскую землю. Выступления
    группы в Болгарии в 1996 году были приняты с энтузиазмом. В 1998 и 1999 году гастроли
    группы по Соединенным Штатам сопровождались исключительно восторженными отзывами.
    Группа Биг Джо Луис и Его Короли Блюза записали многочисленные радио и ТВ сессии
    по всему миру, и в течение последних трех лет активно гастролировали - в Южной
    Африке, Польше, Финляндии, Франции, Бельгии, Норвегии, Швеции, Швейцарии, Новой
    Зеландии и даже Египте, а также дважды приняли участие в фестивале Mustique Blues
    Festival на Карибах.


    British Blues Awards: Биг Джо Луис - Best Male Vocalist 1993, 1994


    British Blues Awards Nominations: Best Male Vocalist 1995, 1996, 1997, 1998, 1999,
    2001 Best Guitarist 1993, 1994, 1995, 1996, 1997, 1998, 1999 Best Band 1993, 1994,
    1995, 1996, 1997, 1998, 1999


    Группа Биг Джо Луис и Его Короли Блюза является выбором №1 для поддержки блюзовых
    групп и музыкантов из США, играющих традиционный и даун-хоум блюз в их гастролях
    по Великобритании и континентальной Европе.


    Биг Джо Луис & His Blues Kings сопровождали в их гастролях и выступали совместно
    со множеством легенд блюза, в том числе:


    EDDIE C CAMPBELL - DAVID "HONEYBOY" EDWARDS - CAREY BELL - LARRY JOHNSON - KENNY
    NEAL - EDDIE BURKS (RIP) - BIG BOY HENRY (RIP) - R L BURNSIDE (RIP) - LAZY LESTER
    - BIG BAD SMITTY (RIP) - BIG LUCKY CARTER (RIP) - LARRY McCRAY - BIG JACK JOHNSON
    - ROOSEVELT "BOOBA" BARNES (RIP) - HOMESICK JAMES - JOHN PRIMER - BIG CLARA McDANIEL
    - BENNIE SMITH - THE ELDORADOS - REV CHARLIE JACKSON - CHICK WILLIS - LOUISIANA
    RED - MUD MORGANFIELD'
