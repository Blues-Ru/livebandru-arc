  header: Билл Трояни и его стойкий иммунитет к дурной музыке
  text: 'Уильям Трояни, Билл или Билли, как его зовут друзья, родился в Нью-Йорке
    в 1949-м году. Он начал играть на басу в 11 лет и вскоре обратился к р-н-б-музыке
    и блюзу. В двадцатилетнем возрасте Билл уже был профессиональным музыкантом. Проживая
    постоянно на восточном берегу, он гастролировал и записывался с такими музыкантами
    как Эдди Киркланд, Том Расселл и Попа Чабби.


    В конце 90-х Билла Трояни поневоле занесло в Норвегию, куда он переехал вслед
    за своми детьми - норвежцами наполовину. В Осло он начал музыкальную карьеру заново,
    что не помешало ему стать ведущим скандинавским басистом блюза, ритм-н-блюза и
    корневой музыки. Этому способствовали богатый опыт и поистине энциклопедические
    знания всей американской музыки 20-го века, Билл играл все блюзовые, р-н-б и джазовые
    бессмертные стандарты, и даже эстраду на американских свадьбах.


    В 1999-м году Билл Трояни основал хаусбенд главного блюзового клуба Осло "Muddy
    Waters" вместе с молодым гитаристом Кидом Андерсеном, который нынче звездит в
    Калифорнии с Риком Эстриным и Найткетс. Хаусбенд играл в клубе до нескольких раз
    в неделю с разными норвежскими блюзменами вплоть до закрытия клуба в 2006-м. В
    то же время группа была основой для гастролей для десятков американских артистов.
    Знание корневой музыки и опыт позволяют Биллу за одну-две интенсивные репетиции
    подготовить и аранжировать новый материал.


    В кажестве сайдмена Билл Трояни переиграл и записался с значительной частью норвежских
    блюзменов. Был глубоко почитаем в узких блюзовых кругах в Осло, Москве и даже
    Владимире. А с 2007-года Билл и его соратники по хаусбенду начали выступать и
    записываться под узнаваемым названием Billy T Band. На пластинках A Little Mixed
    Up (2008), L.O.V.E. (2010) и Mo-Billy-T (2012) есть свои песни и с любовью отобраннаю
    классика блюза, соул и р-н-б. Причем, за последние две пластинки группа маленьких
    блюзовых клубов получила две норвежских Грэмми - Spellemannprisen 2010 и 2012.
    По этому случаю им пришлось купить костюмы, чтобы красоваться на фоне поп-звезд
    на национальном телевидении.


    Постоянный член ритм-секции - молодой барабанщик Александр Петтерсен начал играть
    с 12-ти. Он оказался настолько талантлив, что буквально через несколько лет попал
    в хаусбенд Muddy Waters. Вместе с Биллом они много раз приезжали в Россию, аккомпанируя
    американцам и норвежцам - Джуниору Ватсону, Митчу Кашмару, Рику Холмстрому, Киду
    Андерсену, Алексу Шульцу, Видару Бюску.


    Гитарист Хокон Хэйе - специалист по вест-коаст-блюзу, р-н-б и вест-сайд блюзу
    Чикаго. Его конек - чувство стиля, сдержанность, лаконичность и лишь иногда -
    стильная несдержанность. В многочисленных блюзовых составах Осло Хокон играл роль
    аккомпанирующего гитариста рядом с яркими солистами, создавая основу аранжировок.
    Но параллельно он играл и пел свои любимые песни в своей группе Hakon Hoye & The
    Honey Tones, состав которой на сегодняшний день удобно совпадает с Billy T Band.


    Еще один участник группы - гитарист Ян Йоханнессен, которого все зовут просто
    Фредди. Хотя его второе имя - Фредрик, он получил произвище в честь великого гитариста
    Фредди Кинга. Воистину, норвежский Фредди играет с драйвом и звуком американского
    классика. Гитарные партии Фредди придают песням эмоциональность и экспрессию,
    оставаясь достаточно сложными.


    Опыт профессионала Билла Трояни в том, что жизнь сталкивала его как с гениальными,
    так и с миллионами кошмарных музыкантов, что навсегда отбило желание и всякую
    возможность играть плохую музыку. Действительно, вкус Билла безупречен. Он подбирает
    для своей группы и поет скрытые досель от современного слушателя песни-жемчужины
    из сокровищницы р-н-б, блюза и корневой американской музыки 20-го века. А группа
    придает песням молодое и яркое звучание.


    Концерты Billy T Band 7-8 февраля 2014 в <a href="http://www.blueshouse.ru">Доме
    у Дороги</a> организованы <a href="http://www.blues.ru/club/">Клубом Blues.Ru</a>.'
