reviews:
- id: 167
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  header: BILLY's BAND С ТЕАТРАЛИЗОВАННОЙ ПРОГРАММОЙ bEiNg tOm wAits
  text: 'Billy''s Band впервые на сцене театра Комедии им.Акимова с театрализованной
    программой "Being Tom Waits/ Игры в Тома Уэйтса".


    Теперь даже трудно себе представить, что квартет Billy''s Band начинался, как
    "шутка для друзей", андеграундный проект для безнадежно алкоголизированной подвальной
    богемы. Уже более 3 лет прошло с выхода альбома "Being Tom Waits/ Игры в Тома
    Уэйтса", являющегося саунд-треком к одноименному спектаклю-концерту. Он стал не
    просто бестселлером, а фактически визитной карточкой группы, где группа подводит
    итог своей творческой юности и воздает должное великому Тому Уэйтсу, своему учителю.


    Концерт-спектакль состоит из песен и лирических отступлений о "псах дождя", "теплом
    пиве и холодных женщинах", "шоколадном Иисусе" и "грустных валентинках", где причудливые
    образы Уэйтса переплетаются с не менее причудливыми порождениями фантазии самого
    солиста - Билли Новика. Здесь звучат песни самого раннего, "уэйтсовского периода",
    - периода "развеселого отчаянья", как говорит Билли.


    "Играть Тома Уэйтса - все равно что бороться с аллигатором. Или ты получаешь пару
    новых сапог, или ты - труп. Когда Billy''s Band берется за Уэйтса, его гений,
    его своеобразие, его антикварный шарм никуда не исчезают, они блестят, как кожа
    этих самых сапог". Это лишь один из отзывов о недавнем выступлении санкт-петербургской
    группы Billy''s Band на джазовом фестивале в Рочестере. Концерт выдержан в фирменном
    ключе "сидячих" концертов Billy''s Band", создающих неподдельное ощущение реальной
    жизни со всеми ее перипетиями, радостями и горестями. Именно настроение, которое
    создает группа на своих выступлениях - то, что привлекает на концерты множество
    людей, которые хотят ощутить взрыв эмоций и приблизиться к тому, что и называется
    "живая" музыка.


    14 ИЮНЯ - С-ПЕТЕРБУРГ - bEiNg tOm wAits - Tеатр Комедии им Акимова. 19.00. Билеты
    в системе театральных касс Спб. http://spb.kassir.ru/spb/db/text/249320508.html


