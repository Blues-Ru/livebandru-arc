  header: БЛЮЗ В ГОЛОВЕ - Тетрализованная программа Billy's band
  text: Billy's band приглашает на свое театральное шоу "Блюз в голове". Это музыкальный
    перфоманс, жанр которого не так просто определить. Песни знаменитой группы погружены
    в литературное пространство лирических отступлений главного героя, солиста группы
    Билли, его фирменных "чаток". Замечательные театральные декорации и органично
    вплетенные в действие видеоинтсталляции в сочетании с особой манерой исполнения
    бенда, шаг за шагом переплавляют брутальный лиризм солиста в полную нюансов и
    задушевности историю. Это шоу доставит удовольствие любителям театра, как новая
    и неожиданноая сценическая форма, созданная на высоком профессиональном уровне.
    Для тех кто бывал на клубных концертах бенда, будет открытием насколько тонким
    и глубоким может быть исполнение группы, известной своей энергетикой и драйвом.
    Но и те кто уже видел шоу не будут разочарованы. Перфоманс постоянно развивается,
    от постановки к постановке меняются декорации, музыкальные номера и лирические
    отступления. Концерт состоится в Санкт-Петербургском ТЮЗе им.А.А. Брянцева. Начало
    в 19.00 Режиссер - Алла Резникова, декорации - Гала Филатова и Сергей Фролов,
    видеоарт - Макс Тигай.
  verified: true
  created: '2011-06-06'
