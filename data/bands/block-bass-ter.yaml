  text: 'Квартет Block[BASS]ter создан композитором и музыкантом Антоном Силаевым
    в июне 2014г.


    "Работа над музыкой в кино - определенные рамки, которые зависят от многих факторов.
    Это по-своему интересные и нужные для рабочего процесса ограничения, но появляется
    множество музыкальных идей, которые довольно сложно воплотить в кино, при этом
    они тоже нуждаются в реализации. Так и появилась идея собрать "Block[BASS]ter",
    - рассказывает Антон.


    Два акустических баса: туба и контрабас - смелое и нетривиальное решение, органично
    сочетающееся с мелодическими линиями трубы, ритмами ударных и звуками различных
    электронных устройств.


    Музыка Block[BASS]ter объединяет в себе TripHop, Downtempo, Electrojazz, Cinematic
    Jazz, Ambient, Minimalism, Experimental, свободная импровизация.


    О музыкантах:


    Антон Силаев - кинокомпозитор, мультиинструменталист, основным инструментом которого
    является труба. Профессионально и мастерски владея традиционными способами звукоизвлечения,
    Антон постоянно экспериментирует со своим инструментом, препарируя его, пропуская
    звук через различные электронные устройства и приборы, меняя его до неузнаваемости.


    Антон Силаев - автор музыки ко многим известным документальным и художественным
    фильмам. Его работа в картине Марины Разбежкиной "Яр" отмечена престижным призом
    им.М.Таривердиева кинофестиваля "Кинотавр" за лучшую музыку. Записал и выпустил
    два сольных альбома: "Mixing point Mockва" (2003г), "Imaginary landscapes with
    wind" (2012г). Участник совместных записей и выступлений с такими известными музыкантами,
    как Хан Беннинг (Han Benning, Голландия), Дзюн Кавасаки (Jun Kawasaki, Япония),
    Владимир Волков, Сеинхо, Рада&Терновник (Россия), Саадет Туркез (Saadet Turkoz,
    Швейцария), Сергей Старостин (Россия), Spooky Action (США), Алексей Борисов, Юрий
    Яремчук.


    Дмитрий Сапарин - интересный и востребованный российский музыкант, играющий на
    духовом басовом инструменте - туба. Сотрудничает с уличными театрами "Огненные
    люди" и "Высокие братья", с Творческой мастерской "Black square", Театром им.Н.И.Сац.
    Играл в коллективах "Fortuna brass band" и "Bubamara brass band", группой "Точки
    над Е". Лидер собственного проекта "Тinto Brass Band".


    Анатолий Кожаев - российский музыкант, владеющий контрабасом и бас-гитарой. Лауреат
    многочисленных фестивалей и конкурсов ("Тольятти Джаз", г.Тольятти, 2000 г; "Джаз
    Парнас", г.Санкт-Петербург, 2001, 2002 г; "Lionel Hampton International Jazz Festival"
    (Moscow Idaho, USA 2009), где играл вместе с Monty Alexander, Claudio Roditi,
    Benny Green, Clayton Cameron и др). Сотрудничает с огромным количеством музыкантов,
    такими как Яков Окунь, Евгений Гречищев, Алина Ростоцкая, Петр Востоков, Александром
    Осейчуком, Олег Киреев, Олег Бутман, Павел Воля, Алексей Ивашенко, Фредерик Белинский
    и др. Кроме того, Анатолий как актер и музыкант снимался в кинофильмах "Карнавальная
    ночь 2 или 50 лет спустя", "Дублер", "Оттепель", "Петр Лещенко. Все, что было...".
    Основатель сайта "bigjazzbook.ru".


    Петр Талалай - барабанщик. Лауреат Всероссийского конкурса джазовых исполнителей.
    В качестве сессионного музыканта работал с выдающимися мастерами отечественной
    джазовой сцены: Владимиром Чекасиным, Александром Ростоцким, Германом Лукьяновым,
    Мирабом Гогнидзе, Юрием Маркиным, Игорем Бутманом, Давидом Голощекиным, Александром
    Осейчуком, Братьями Бриль, Алексеем Беккером, Андреем Кондаковым, Алексеем Кругловым
    и многими другими. Сотрудничал с семикратным лауреатом премии Grammy Полом Уинтером
    (Paul Winter, США), являлся участником программы "Открытый Мир" (Monterey Jazz
    Festival), в рамках которой музицировал в концертных выступлениях с Джимми Хитом
    (Jimmy Heath, США) и Кристианом МакБрайдом (Christian McBride, США). Играет в
    группах: "Ансамбль Средиземноморской Деконструкции", "Goat''s Notes", 7/8", "Московский
    Violinjazz Квартет", "Open Trio" и "Tрио Одиссея (Odyssey Trio)". Создатель и
    лидер собственного проекта "Priot Ensemble".'
