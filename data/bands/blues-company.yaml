  text: 'Момент из интервью Тошо Тодоровича, вокалиста и гитариста, основателя группы
    Blues Company: - Когда мы начали играть блюз профессионально, до нас в Германии
    был только один такой блюзбэнд. Сейчас у нас сотни и сотни любительских и полупрофессиональных
    групп, и 40 или 50 работают профессионально. В: И чему научил вас блюз? - Страсти
    и дисциплине.


    Коротко и емко.


    Без страстной преданности блюзу невозможно продержаться в этом бизнесе 36 лет.
    И без дисциплины - тоже!


    Тодор (для друзей Тошо) родился в ФРГ. Родители его бежали из коммунистической
    Югославии, и, что такое вынужденная эмиграция, он испытал на собственной шкуре,
    как и многие блюзмены на родине блюза. В детстве учился играть на классической
    гитаре, играл в ансамбле народного танца. И еще подростком ходил в клубы, где
    собирались любители блюза, обменивались пластинками, новостями и спорили об истории
    джаза и блюза. Поскольку дома блюзовых пластинок не было, Тошо впитывал блюз здесь,
    а репетировал уже по памяти. Волей не волей - выработал собственный стиль.


    Германию часто навещали с гастролями блюзовые музыканты. Обстоятельства вынуждали
    путешествовать их сольно, и в каждой стране набирать новую группу сопровождения.
    И когда в Германию приехал легендарный вокалист и саксофонист Эдди "Клинхед" Вилсон,
    Тошо, будучи гитаристом молодым, талантливым и не претендующим на сказочные гонорары,
    получил приглашение... Опыт "живого" исполнения блюза оказался просто ошеломляющим
    и изменил его жизнь. В том же 1976 году он и открыл "Блюзовую Компанию", ставшую
    теперь древнейшим из существующих блюз-бэндов Германии.


    Путь не был устлан розами - а у кого из блюзменов был? Однако настойчивость, преданность
    любимому блюзу в сочетании с тем самым профессионализмом принесли результаты.
    В первую очередь благодаря Blues Company город Оснабрюк теперь называют блюзовой
    столицей Германии. Далековато от Миссиссиппи и Чикаго? Но именно песня Blues Company
    звучит в голливудском фильме L.A. Blues (2007 г.).


    У Blues Company заметны параллели с их почти-тезками из Великобритании Blues Band.
    Обе группы отличались на старте роковой горячностью, обе пришли к блюзу лиричному
    и мелодичному. Параллели, но не повтор. К тому же Blues Company на три года старше!


    Кстати, об истории. Как раз когда "Горбушка" была не просто рынком, а эпицентром
    прогрессивной музыкальной жизни Москвы, альбомыBlues Company пользовались там
    "большим спросом". Так что для "олдовых" меломанов московские концерты будут очень
    долгожданной встречей.


    А в дискографии группы теперь более 20 альбомов! И за плечами несчитанные тысячи
    концертов, и один самый особенный - когда они отрывали гастроли БиБиКинга, короля
    блюза.


    Вместе с Тошо Тодоровичем приезжает гитарист Майк Титре, играющий в Blues Company
    c 1980 г. А на московском единственном(!) концерте их поддержит наша ритм-секция:
    барабанщик Антон Дашкин и бас-гитаристка Галина Киселева.


    "История блюза еще не закончена, - говорит Тошо. - Хотя ей более ста лет, она
    все продолжается и продолжается, потому что музыканты-творцы по всему миру стремятся
    дополнять и развивать ее, стараются поднять блюз на новый уровень".


    Это он говорит на словах... А поет вот что: "Запечатать бы блюз в бутылку, да
    забросить подальше в море"... Одной этой строчки достаточно, чтобы не пропустить
    его концерт. Потому как в ней - сугубо естественное восприятие природы блюза...
    Забросить бы его подальше, да нет такой бутылки, чтобы весь его туда впихнуть,
    закрыть и позабыть.'
