  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Леван Ломидзе является первым российским гитаристом, признанным на родине
    Блюза.


    2002 году был подписан долгосрочный контракт с Вашингтонским Блюзовым сообществом
    о проведении 5 туров по США, включая выступления на самых престижных блюз фестивалях
    Америки. В общей сложности было проведено более 100 концертов.


    На фестивале "Blues Sur Sein 2000" (Франция) Леван был награжден призом симпатии
    зрителей, а Blues Cousins названа лучшей среди 57 групп..


    По результатам опроса слушателей передачи "Доктор Блюз" (Открытое Радио) – Леван
    Ломидзе был признан лучшим российским блюзовым музыкантом года.


    2005 году американская компания Jazz Stream Records выпустила "живой" альбом Левана
    – "Live in USA". Последний факт явился настоящим прорывом московского блюза.


    По оценке журналов Audio Video, Music Box, Guitars.ru Леван признан одним из 10-ти
    лучших гитаристов России.


    Леван награжден мэром Москвы за акцию "Рок против наркотиков".'
  verified: true
  created: '2010-08-05'
  is_press_release: true
