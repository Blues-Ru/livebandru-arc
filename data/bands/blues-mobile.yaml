  reviewer_token: press-release
  header: '"Music Without Borders"'
  text: 'TIM BOGERT, CARMINE APPICE & VOVA MOGELADZE present BLUES MOBILE BAND with
    new music project "MUSIC WITHOUT BORDERS", reinventing themselves in the blues-rock
    genre, and basing their work on the principles of musical expression without any
    political, military, racial, or religious limitations. While their sound is truly
    original and reflects each member''s unique wealth of technical talents, it does
    reflect deep respect towards musicians: Stevie Ray Vaughan, Jimi Hendrix, B. B.
    King, Eric Clapton, Rory Gallagher, Alvin Lee, John Mayall and Johnny Winter.'
