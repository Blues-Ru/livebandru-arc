  header: Steady Rollin' Bob Margolin
  text: 'Осенью 2012 года в Россию приедет блюзмен Боб Марголин. Кроме нескончаемой
    череды собственных достоинств, он так же знаменит тем, что очень долго время играл
    в группе Мадди Уотерса.


    Гастроли организуются Владимиром Русиновым и группой The Jumping Cats в качестве
    аккомпанирующего состава. The Jumping Cats уже провели в России успешные гастроли
    таких известных современных блюзовых музыкантов как John Nemeth, JW Jones, Kirk
    Fletcher.'
  verified: true
  created: '2012-09-08'
