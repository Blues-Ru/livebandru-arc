reviews:
- id: 313
  reviewer_id: 2
  reviewer_name: Андрей Евдокимов
  reviewer_token: andrei-evdokimov
  header: Steady Rollin' Bob Margolin
  text: 'Уникум к нам едет... Прям состоящий сплошь из блюзовых достоинств.


    Загвоздка в том, что "блюзовые достоинства" - набор неоднозначный, обычно в нем
    не только положительные качества. Но наш гость несет лишь лучшие из них, потому
    он и уникум - БОБ МАРГОЛИН.


    Среди его достоинств - могучий электро-слайд, гитарный звук мощный и протяжный,
    густой и жгучий; и когда нота застывает в напряжении, в ней слышен живой пульс
    и бьется блюзовый ритм. Марголин завораживает слушателя, чередуя стремительные
    нотные пассажи с ошарашивающими слайдовыми раскатами. Зная свое ремесло досконально
    (все ж таки опыт работы более четырех десятилетий), в концертах не перебирает
    знакомые рецепты, а только следует настроению - своему и публики. Захочет пугнуть,
    как малых деток страшной сказкой - утробно рыкнет, а размякнет душой - так и понежничает
    с залом... Знает на зубок всю классику жанра от архаичной акустики до громокипящей
    чикагской электрики. За прошедшие годы работал со всеми из великих блюзменов послевоенной
    поры. А теперь и сам начал вытягивать на авансцену талантливую молодежь.


    Неутомим в своих блюзовых странствиях, откуда его блюзовое прозвище Steady Rolling
    - как все в блюзе, и оно с двойным дном: означает и стабильность игры, и плавность
    хода... Да и просто в рифму получается... Марголин никогда не берет отпуск, колесит
    по Штатам, не дает Европе закиснуть, стремиться донести живой блюз до самых отдаленных
    уголков мира. Живчик и заноза, витальный пассионарий в музыке, Марголин еще и
    кропотливый историк, доскональный рубрикатор, буквоед в теории и архивариус фактологии,
    неутомимый публицист. Впрочем, и потешных историй, блюзовых анекдотов, он тоже
    великий коллекционер и щедрый рассказчик. Прибавьте к портрету неизбывную любовь
    к собакам всех мастей, собакам собственным, и всем псам этого мира.


    Вот и получается уникум БОБ МАРГОЛИН.


    Тут бы еще добавить, что блюзмен он от рождения, а родился в Дельте Миссиссиппи...
    Ан нет. Блюз у него благоприобретенный, и не сразу все так удачно сложилось. Ну,
    может, только то, что собак любил с детства... Родился он белым-белым, не пахал
    на плантациях от зари до зари, а учился в Бостонском университете, рок-н-роллы
    стал играть, чтобы понравится девочкам... Но все же напоролся на блюз. И робким
    блюзовым школяром оказался в 1973 году в блюзбэнде Мадди Уотерса, главного чикагского
    блюзмена. Сначала был на посылках, подай-принеси, потом стал выполнять на сцене
    самую простую работу. Имея пышные кудри, за чуб не был оттаскан. Но Мадди не был
    милым и заботливым наставником. У него вообще был уникальный метод преподавания:
    крик "Не так!!!" (Wrong!!!) он изобильно приправлял непечатными выражения и такими
    изобретательными и образными, что человек попроще бросил бы гитару навсегда и
    уехал обратно в Бостон работать счетоводом. Но Марголин, видать, был не так прост,
    а Мадди, когда понял это, все равно не показывал ему, как надо, чтобы было "так":
    кто умный, тот сам поймет, а кто дурак - тому бесполезно объяснять! И вот как
    удачно сложилось - оба оказались умными. Марголин - потому что понял сам, как
    надо, а благодаря учительству Мадди мы и теперь можем услышать игру слайдом точно
    в духе Мадди Уотерса, но абсолютно оригинальную, а не копию. Потому как в блюзе
    копиисты не нужны, а нужны только индивидуальности.


    Боб Марголин проходил практику у Мадди Уотерса с 1973 года. Играл несколько лет
    напару с Джонни Уинтером. В 1980-м, когда Мадди стал отходить от концертной дейтельностью,
    стал выступать с другими участниками его блюз-бэнда в проекте The Legendary Blues
    Band (англ., "Легендарный блюз-бэнд"), мутил собственные проекты, записал гору
    альбомов, ведет радиопрограммы и ежемесячную колонку в главном блюзовом журнале
    Blues Revue, был участником дюжин "звездных" проектов. Последнее, кстати, тоже
    школа Уотерса: он играл только с мастерами блюза, каждый в его бэнде был "звездой",
    и мог самостоятельно провести концерт.


    В Москве Боб Марголин выступает впервые. Приезд уникума организован группой Владимира
    Русинова the Jumping Cats, каковая и будет сопровождать Боба Марголина в московских
    концертах.'
