  reviewer_name: пресс-релиз
  reviewer_token: press-release
  header: 'Boogie Child Let us introduce the band:'
  text: 'Blues Rock, Blues, Rock, Rock n Roll


    Максим Чижиков - бас-гитара, вокал Андрей Бранделис - гитара Владислав Баракин
    - барабаны, перкуссия


    Владислав Баракин и Максим Чижиков начали играть вместе в 1993 году. С тех пор
    каждый успел поработать на сцене и записать (сессионно) много музыки в различных
    коллективах. Музыкантов всегда объединяло желание исполнять блюз, ритм-энд-блюз,
    блюз-рок. В 2009г группа меняет название на Boogie Child. В 2014 г., спустя 15
    лет, в коллектив вернулся давний товарищ: Андрей Бранделис Boogie Child- московская
    блюз-рок группа, которая в своем творчестве продолжает традиции англо-американских
    исполнителей 60-70 х годов. Музыка, которую мы играем, дает большую свободу самовыражения.
    Знаменитые, а так же редкие композиции представлены в неожиданных, непредсказуемых
    аранжировках. Мы не копируем, а лишь предлагаем Вам свое видение песен любимых
    авторов. Зажигательные boogie, размеренные shuffle и проникновенные баллады в
    стиле Stevie Ray Vaughan и Gary Moore. Песни Creedence Clearwater Revival, The
    Animals, The Rolling Stones, The Doors, Willie Dixon, Muddy Waters, Bo Diddly,
    James Brown, Chuck Berry, Jimi Hendrix, Freddy King, а еще funk и многое другое
    от классики рок-н-ролла и ритм-н-блюза до классики хард рока и тяжелого блюза!
    Оригинальное звучание, воссоздание на сцене атмосферы "золотых лет" блюз-рока,
    импровизаций в духе Cream и Led Zeppelin. А также свой собственный, авторский
    материал, выдержанный в лучших традициях жанра. Вместе с Boogie Child Вы сможете
    отправиться в путешествие на Мустанге 1965 года по Rout 66 или Highway 61, через
    тот самый, знаменитый Crossroads, и дальше по Highway To Hell чтобы провести вечер
    в местечке под названием La Grange о котором рассказывали ZZ Top. Не имеет смысла
    слишком много говорить о музыке-ее надо слушать. И так же можно танцевать)) Ждем
    Вас на своих концертах!'
