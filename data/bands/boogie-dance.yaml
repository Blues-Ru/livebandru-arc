  header: '"Boogie Dance" (Днепропетровск)'
  text: 'Если по каким-либо причинам вы не смогли попасть в Детроит, или посетить
    Чикаго в те вечера, когда в местных клубах гремел "Swing" и танцпол содрогался
    под ногами танцоров "Boogie", не отчаивайтесь! "Cotton Bar" – то место куда приходит
    Америка, если вы не приходите к ней. Brian Setzer, Big Bad Voodoo Daddy, Royal
    Crown Rewue, Cab Calloway. Вы услышите их, стоит лишь прийти на концерт "Boogie
    Dance". В составе бэнда: Глеб Копалин – vocal, Михаил Лышенко – upright piano,
    Вадим Пачуев – bass, Дмитрий Литвиненко – drums; и золотая духовая секция: Евгений
    Коренченко – trumpet, Владимир Евдокиенко – alto sax, Игорь Наумов – tenor sax.
    Не забудьте взять с собой любимую шляпу, и не бойтесь "засидеть" брюки. Вы просто
    не сможете сидеть. "Boogie Dance" – танцуют все!


    P.S. Убедительная просьба, автоматы Томпсона оставлять охране на входе!'
