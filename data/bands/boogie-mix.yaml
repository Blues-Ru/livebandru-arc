reviews:
- id: 217
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Если коротко и без пафоса - мы просто играем блюз для людей с хорошим вкусом
    и ироничным отношением к себе... и как истинные блюзмены, делаем это с удовольствием.
    А если длинно и с пафосом, то... "Уникальность коллектива - в его лидере. Александр
    Паклин, гармошечник, юный блюзовый гений - в свой 21 год зарекомендовал себя как
    музыкант мирового уровня. Летом 2010 года Александра приглашал выступить на одной
    сцене Bob Margolin http://www.bobmargolin.com (лидер-гитарист легендарного Muddy
    Waters). А в мае 2011 года, Adam Gussow http://www.modernbluesharmonica.com приглашал
    его на фестиваль Hill Country Harmonica в Mississippi, USA http://www.hillcountryharmonica.com.
    Также, с апреля 2010 года, согласно статистике производителя губных гармоник Seydel
    1847, Александр входит в число лучших губногармонистов мира и является эндорсером
    этой компании. Подробная информация: http://www.seydel1847.de/epages/Seydel1847.sf/de_DE/?ObjectPath=/Shops/Seydel/Categories/Artists/Alle_Kuenstler/Alexander_Paclin1
    В июне 2011 года группа успешно выступила на Международном фестивале свободного
    творчества "Пустые Холмы" под Калугой (русский Вудсток) и Московском блюзовом
    клубе "Дом у Дороги".'
  verified: true
  created: '2011-09-15'
  is_press_release: true
