  text: 'Сотни гармонических находок и смелых тембровых сочетаний, тысячи вариаций
    на излюбленные стандарты, бесчисленное множество исполнительских индивидуальностей
    и импровизационных манер...


    Способен ли сегодняшний джаз, перепробовавший столько идей и выразительных средств,
    чем-то удивить искушенного слушателя? Участники "BRUSHUP" с уверенностью доказывают:
    да, предлагая собственное уникальное видение стиля. Их фирменный рецепт успеха
    – искрометный фьюжн, порожденный миксом изысканной классики джаза, зажигательного
    фанка и рока, плюс солнечная энергетика музыки бэнд-лидера группы, гитариста Юрия
    Щеткина. Самобытность коллектива определена и нетривиальным составом, включающим
    скрипку (Константин Ильицкий) – редкую, но всегда столь эффектную гостью джазовых
    проектов. В сочетании с гитарой, бас-гитарой и ударными она привносит в звучание
    ансамбля особое очарование и пронзительный терпкий колорит. В зависимости от замысла
    композиции в музыкальную ткань вливается духовой инструмент: саксофон – олицетворение
    стихийности и свободы джазового искусства, или чистый тембр флейты. Но неизменным
    остается одно – неповторимая, наэлектризованная положительными зарядами, атмосфера,
    созданная музыкой "BRUSHUP".'
