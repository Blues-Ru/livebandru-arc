reviews:
- id: 291
  reviewer_id: 5
  reviewer_name: Константин Колесниченко
  reviewer_token: konstantin-kolesnichenko
  header: О группе
  text: 'Группа Bullet Blues Band начала свое существование более 7 лет назад в городе
    Днепропетровске. И с первым концертом "Буллеты" выступили на первом днепропетровском
    фестивале-джеме блюза и гармоники в Коттон Баре (г. Днепропетровск) в 2008 году.
    Далее ребята постепенно, но уверено зарабатывали себе репутацию, выступая в разных
    городах Украины (Киев, Запорожье, Миргород, Кременчуг, Мелитополь, Бердянск и
    др) и всевозможных фестивалях (Киев "Бочка-блюз фестиваль", дважды на Jammin Bluez
    в Запорожье, Первый Украинский Международный Фестиваль Губной гармоники, "Дырокол"
    и др). В послужном списке группы уйма концертов вместе с другими замечательными
    блюзовыми исполнителями: Макс Таврический, Кит Данн, Гай Дэвис, Мишурис Блюз Бенд,
    Hobot & Co, Max Vatutin Trio, Ivan Blues, Умка и др. Каждый концерт группы - это
    отличная возможность окунуться в атмосферу классики блюза и заряд положительных
    эмоций.'
