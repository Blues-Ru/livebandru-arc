reviews:
- id: 59
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  header: Пресс-релиз группы "Капитан Дик"
  text: '"Капитан Дик" - одна из самых старых и известных коммерческих групп г. Новосибирска,
    уже зарекомендовавшая себя в творческой среде, а также на клубной сцене и больших
    концертных площадках Новосибирска и регионов.


    Музыка "Капитанов" - это экспрессивная смесь рок-н-ролла, блюза и классического
    рока 80-х, а также большой пласт собственных, авторских песен лидера группы Вадима
    Денисова.


    Каждое выступление группы "Капитан Дик" - это уникальное сочетание профессионализма
    музыкантов, авторских аранжировок в подаче музыкального материала и неповторимая
    атмосфера настоящего рок-концерта.


    В послужном списке "Капитанов" совместные выступления с такими группами как "Пикник",
    "Крематорий", "Несчастный случай", "Crossroads", "Иван-Кайф", "Ленинград", "Ария"
    и "Парк Горького", совместные джем-сейшены с легендарными "Scorpions", немецкой
    группой "Feedlers Green" и блюзменом Джеймсом Виллером. В свое время группа "Капитан
    Дик" играла на открытии культовых для Новосибирска баров New-York Times, Pub 501
    и клуба Rock City, с кем продолжает сотрудничать и до сих пор. Также группа дает
    концерты в других городах Сибирского региона (Томск, Красноярск, Барнаул, Кемерово),
    имеет там свою публику, участвует в различных фестивалях.


    Лидер группы Вадим Денисов является дипломантом 1-го городского фестиваля профессиональных
    музыкальных групп (1999 г.), дипломантом конкурса "Лица года -2007" фестиваля
    "Парад Сибирской Культуры" в номинации "За вклад в развитие музыки".


    Состав группы: Вадим Денисов (вокал, гитара), Вячеслав Сазонов (клавишные инструменты),
    Андрей Лавринович (бас-гитара), Валерий Фомин (ударные инструменты).'
  verified: true
  created: '2010-11-02'
