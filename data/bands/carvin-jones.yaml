  text: 'Уроженец Техаса, выросший в Фениксе, Аризона, европейский житель, гитарист-виртуоз,
    шоумен и певец CARVIN JONES впитал госпел, соул и блюз, что называется, с молоком
    матери. Еще подростком он выбрал для себя единственно возможную карьеру - неутомимого
    гастролера-блюзмена. В бесконечных турах по Техасу и Аризоне, позднее по всем
    Штатам и в Европе, Карвин отточил мастерство гитариста и обратил не себя внимание
    не только критиков и публики, но старших коллег по цеху, заслужив восторженные
    отзывы Эрика Клэптона, Алберта Коллинза, Бадди Майлза. В январе 2001 года журнал
    Guitarist опубликовал Top 50 greatest Blues Guitarist who Ever Walked the Earth
    и включил в этот престижный список Карвина Джонса и сопроводил высказываниями
    о нем великих блюзменов. "Carvin Jones is a young cat out of Phoenix who I think
    is the next up-and-coming blues player" - Eric Clapton "Carvin Jones is one of
    the brightest young stars on the blues scene today" - Albert Collins "The New
    King of Strings is Carvin Jones" - Buddy Miles


    Карвин Джонс выступает и записывается в формате блюз-пауэр-трио и регулярно выпускает
    альбомы первосортного качества. Треки с альбомов I''m What You Need и The Carvinator
    много ротировались на американских и европейских радиостанциях. А концертный DVD
    Carvin Jones Band - Proximamente - Live in Spain, записанный испанской телекомпанией,
    стал международным бестселлером. Последний блюз-роковый альбом "What a Good Day!"
    вышел в январе 2018 года и быстро набирает популярность.


    Карвин "Carvinator" Джонс приезжает в Россию впервые! Не пропустите!'
