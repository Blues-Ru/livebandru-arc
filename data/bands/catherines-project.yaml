  header: молодой успешный джаз-проект,
  text: который уже стал известным в московских джазовых кругах, благодаря неповторимому
    звучанию ярких, неординарных музыкантов и интересному собственному репертуару.
    На данный момент коллектив дает концерты на таких площадках как Джаз Арт Клуб,
    джазовый салон "Консорт", клуб "Китайский летчик Джао Да", Бар "Бурбон" и др.
    Джазовых флейтистов в России не так уж много. Гораздо меньше, чем, скажем, саксофонистов.
    И даже чем трубачей. А по-настоящему хороших - совсем мало. Чтобы их перечислить,
    достаточно пальцев одной руки. Джазовая флейта - словно коробка с большим количеством
    маленьких вкусных конфет Послушав одну композицию, Вам захочется еще и еще, и
    сложно будет остановиться. Только в отличие от коробки конфет радость, которую
    приносит джазовая флейта, не содержит калорий!.
