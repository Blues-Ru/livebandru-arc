  header: '"Джаз-оттопырка" группы Chiefs Band в Китайском летчике Джао Да'
  text: '7 ноября в клубе "Китайский летчик Джао Да" состоится умопомрачительная музыкальная
    феерия, ведь на сцене будут "джазовые хулиганы" из Минска, группа Chiefs Band!


    В этот день все любители по истине "живой" музыки, если кто-то пока не знаком
    с творчеством группы Chiefs Band, откроют для себя совершенно новые стили музыки,
    такие как "бульба-фанк" и "джаз-оттопырка". Вас ждет вечер в атмосфере невероятной
    экспрессии и неповторимой энергетики, которые буквально фонтанируют из участников
    коллектива!


    Помимо качественного, профессионально исполненного музыкального материала, участников
    этого зажигательного "фанк-о-джазового" мероприятия ждут приятные сюрпризы, подарки
    и призы от группы Chiefs Band!


    Группа Chiefs Band приглашает отслушать "бульба-фанка" и "джаз-оттопыриться" 7
    ноября в клубе "Китайский летчик Джао Да"!


    Присоединяйтесь к группе Chiefs Band: вконтакте: http://vk.com/chiefsband на facebook:
    https://www.facebook.com/chiefsband


    Следите за новостями и приходите на концерт: 7 ноября в 21:00 Клуб Китайский летчик
    Джао Да м. Китай-Город, Лубянский проезд д.25 тел. (495) 624 56 11 сайт: http://msk.jao-da.ru'
  verified: true
  created: '2013-01-16'
  is_press_release: true
- id: 306
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: '"Chiefs Band" - это единственный в своем роде, заводной и умопомрачительный
    бульба-фанк оркестр под руководством Александра Мышкевича. Музыканты этого творческого
    коллектива живут музыкой, а музыка живет в них! Они играют от души и для души!


    "Чернокожие придумали джаз и блюз, а мы "бульбяны" фанко-джаз. Они же там работали
    на кукурузных и хлопковых плантациях, а мы на картофельных", - так объясняет сам
    Александр возникновение музыкального стиля коллектива. "Chiefs Band" - это особая
    разновидность музыкальной кухни. Главная особенность ее творческой рецептуры -
    невероятная экспрессия, фантастический драйв и сумасшедшая энергетика! Творческим
    кредо ансамбля стал авторский джаз-фанк - энергично и профессионально исполненный.
    Музыкальный язык команды - многогранная импровизация саксофона, дерзкая труба
    и мелодичный тромбон, темпераментная бас-гитара, ритмичные барабаны вместе с гармоничным
    вокалом.


    Весной 2012 года группа "Chiefs Band" выпустила свой дебютный альбом под названием
    "Jazz Pirates", скрупулезная работа над которым длилась в течение года.


    Официальная презентация альбома "Jazz Pirates" состоялась 31 мая, на родине музыкантов
    в Беларуси, в самом популярном на данный момент минском клубе, в баре "Койот",
    взорвав всю столичную общественность, собрав полный зал поклонников "бульба-фанка"!


    На данный момент группа "Chiefs Band" востребованный музыкальный коллектив не
    только на территории своей страны, в родной Беларуси, они активно гастролируют
    в странах Западной Европы, а также являются желанными гостями в России!'
  verified: true
  created: '2012-08-01'
  is_press_release: true
