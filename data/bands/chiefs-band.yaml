  header: '8 февраля группа "Chiefs Band" в клубе Форте:'
  text: 'Родоначальники "бульба-фанка", минская группа "Chiefs Band" готовится снова
    зарядить столичную публику своей сумасшедшей энергетикой! Ведь каждое выступление
    "джазовых хулиганов" это невероятная экспрессия и фантастический драйв, это восторг
    и взрыв эмоций!


    На этот раз музыканты выступят в легендарном клубе "Форте", который входит в 20-ку
    лучших джазовых клубов Москвы! За время работы на сцене клуба выступило огромное
    количество известных музыкантов и коллективов. Вот всего лишь несколько имен:
    Алексей Козлов и "Арсенал", Игорь Бутман, Георгий Гаранян, Анатолий Кролл, ансамбли
    "Аквариум", "Песняры", "Машина времени", Роберта Гамбарини (США), Кортни Пайн
    (США), Дебора Браун (США), Тим Стронг (США), группы: "Smokie", "Deep Purple",
    "Slade" и многие другие.


    Сегодня клуб "Форте" остается верным своим традициям, ориентируясь на музыку в
    стиле джаз, джаз-рок, блюз, фанк и соул. Здесь собираются люди, которых объединяет
    бескорыстная любовь к хорошей музыке!


    8 февраля клуб "Форте" наполнится солнечной энергией, позитивом и сумасшедшим
    драйвом! Эту неповторимую атмосферу создаст умопомрачительный единственный в своем
    роде "Бульба-фанк оркестр под руководством Александра Мышкевича", группа "Chiefs
    Band"!


    Сольный концерт группы "Chiefs Band": 8 февраля, 20:00 Клуб "Форте": ул. Б. Бронная
    18, ст. метро "Пушкинская", "Тверская" Телефон: (495) 694-08-81'
  verified: true
  created: '2013-10-30'
  is_press_release: true
