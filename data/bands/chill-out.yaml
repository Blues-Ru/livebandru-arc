  text: 'Разве можно играть не блюз? Парни из петербургской группы The Chill Out уже
    больше 10 лет отвечают на этот вопрос песнями великих мастеров: от Джона Ли Хукера
    до Чака Берри. Концертные площадки, на которых ребятам посчастливилось выступать,
    так же разнообразны, как и репертуар группы. Под их блюз танцевали школьницы на
    стадионах и заключенные в тюрьме строгого режима. Не смотря на то, что участники
    бэнда абсолютно белые, афроамериканская музыкальная культура все глубже укореняется
    в их сердцах с каждым зажигательным ритмом, который они воспроизводят на сцене.
    Выход на публику всегда сопровождается диким эмоциональным взрывом лидера группы.
    Это всегда стопроцентная отдача. Как бы не казалось парадоксально, но именно перед
    обезличенной толпой получается не просто раскрыть свою душу, а вывернуть себя
    на изнанку.'
