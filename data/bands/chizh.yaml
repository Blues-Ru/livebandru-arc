  header: Сергей Чиграков (Чиж)
  text: 'Из досье "Огонька" (N21, 20 мая 1996)


    Сергей Чиграков, более известный, как Чиж родился 6 февраля 1961 года в г. Дзержинске.
    На сцене с 14 лет - играл на бас-гитаре в местном ВИА. В родном городе окончил
    музыкальную школу и училище. Потом учился в Ленинградском институте культуры и
    в джазовой студии Ленинградской же консерватории - по классу аккордеона и в качестве
    барабанщика соответственно. Затем работал концертмейстером в дзержинских ДК, попутно
    играя на гитаре и распевая фальцетом в металлической группе. Через некоторое время
    последовало приглашение из Харькова от А. Чернецкого, результатом которого явилась
    группа "Разные люди", в которой Чиж вскоре занял место солиста - это было связано
    с болезнью Чернецкого. В 1993 году Чиграков, не выдержав существования в одном
    коллективе двух солистов одновременно, записывает в Ленинграде сольный альбом.
    В качестве сессионных музыкантов с ним работают "дядя Миша" Чернов, Н. Корзинин
    и Б.Г. Гребенщиков, как оказывается, Чижа впервые и разглядел - еще в составе
    "Разных людей" на фестивале "Соловки" - после чего начал то и дело петь чижовские
    песни (ту же "Хочу чаю", к примеру). В декабре 1993-го Чиж выступает на фестивале,
    "Аквариум" представляет", а весной 1994-го и вовсе перебирается в Питер, где к
    лету того же года сколачивает постоянный состав "Чиж и Ко", а к осени уже начинает
    давать концерты. Фестиваль "Поколение-94" отмечает "Чиж и Ко" спецпризом продюсерского
    жюри, телеканал "Доброе утро" показывает их широкой публике, а клуб "Московский"
    в ноябре устраивает первое московское выступление группы. Затем следуют гастроли
    и выступления по столичным залам - начиная с Горбушки и заканчивая "Лужниками"...'
