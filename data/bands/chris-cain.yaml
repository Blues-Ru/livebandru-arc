  text: 'Крис Кейн сам научился играть на гитаре в восемь лет и еще до совершеннолетия
    начал выступать на профессиональной сцене. Крис поступил на музыкальное отделение
    San Jose City College и вскоре начал преподавать джазовую импровизацию.


    Кейн играет не только на соло- и бас-гитаре, но и на фортепиано, кларнете, альт-
    и тенор-саксофонах.


    Глубокий вокал и виртуозную игру на гитаре Криса Кейна часто сравнивают с БиБи
    Кингом и Альбертом Кингом, при этом он создал собственный уникальный стиль, узнаваемый
    с первой ноты.


    В 2018 году калифорнийский музыкант Крис Кейн номинирован на премию Blues Music
    Awards, как лучший гитарист года.


    - - - - - -


    "Крис Кейн - один из моих любимых блюзовых музыкантов всех времен и один из самых
    недооцененных. Он влиял на мое творчество с тех пор, как я взял в руки гитару.
    Кейн - это волшебное звучание, убойный голос и песни" Джо Бонамасса'
