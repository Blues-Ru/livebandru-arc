  header: Cleanhead Phil Speat при поддержке Евгений Ламба Трио
  text: 'Для ценителей традиционного (не путать с "архаичным") блюзового вокала -
    в Москву с программой "Big Daddy Blues" приезжает Клинхэд Фил Спит (на фото).
    Для первого знакомства стоит зайти на его сайт и убедиться, что поет он смачно
    и стиль держит точно! Его манера идет от знаментых блюз-шаутеров, представляет
    напрасно забытые традиции стиля Кэнзас-сити, и сегодняшнему слушателю дает (без
    преувеличения) редчайшую возможность услышать блюз накануне того эпохального момента,
    когда одна ветвь жанра ушла на север, в Чикаго, а другая - на запад, в солнечную
    Калифорнию.


    Закавыка в том, что на сайте Клинхеда его биография начинается с программного
    заявления, что блюз-рок, и особенно "гитарой генерированный" блюз - это профанация
    стиля! Однако в Москве он будет выступать в сопровождении питерского гитарного
    трио п/у Евгения Ламба. Этот коллектив регулярно играет "трибьюты" Джими Хендриксу.
    Казалось бы, идеологически им не по пути... Однако, в массе имперсификаторов хендриксовской
    гитарной анархии Евгений Ламба не замечен - играет вдумчиво, и, если надо, не
    торопясь. А в этой справке сообщается, что музыкальные интересы нынешнего трио
    Евгения и вовсе базируются на дохендриксовской эпохе. К тому же, в Санкт-Петербурге
    Клинхэд Фил Спит уже выступал вместе с трио Евгения Ламба - так что им не впервой
    встречаться на одной сцене! Добро пожаловать!'
