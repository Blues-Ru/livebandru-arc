  text: 'Лицо современного блюз-рока никогда не было бы таким, как сегодня, без КОКО
    МОНТОЙЯ (Coco Montoya). Мало сказать, что он внес огромный вклад в этот стиль
    и при жизни провозглашен одним из классиков и главных законодателей современной
    блюзовой моды. Этот американский гитарист, кроме того, сделал блюз-рок понятным
    и близким для всех!


    Сценическая карьера Коко (вначале вместе с легендарным блюзменом Альбертом Коллинзом,
    а потом и с патриархом британского блюза Джоном Мэйаллом в составе Bluesbreakers,
    где его предшественниками были не кто-нибудь, а Эрик Клэптон, Питер Грин и Мик
    Тэйлор!) принесла ему огромный опыт и дала уникальную возможность развиться как
    неординарному музыканту и отточить свой собственный стиль. Музыкальный "почерк"
    Монтойя легко узнаваем. В звуке гитары Коко чувствуется душа его первого учителя,
    Альберта Коллинза, интеллигентность Джона Мэйалла, легкость Би Би Кинга. Это блюз-рок
    с уклоном в "попсовость" - в лучшем понимании этого слова! Поэтому композиции
    Монтойя любимы самым широким кругом слушателей. Не удивительно, что почти все
    его альбомы стали бестселлерами и фигурировали на верхних строчках блюзового чарта
    Billboard. Сам Джон Мэйалл говорит о Монтойя, как об "одном из самых лучших блюзовых
    гитаристов, которых вам когда-либо приходилось слышать"! Интересная особенность
    в технике исполнения Монтойа заключается в том, что он является левшой, но при
    этом может играть на перевернутой "праворукой" гитаре. Стоит ли говорить, что
    таких примеров в современном блюзе - единицы!


    Монтойя привлекли в блюзе душевное тепло, подлинная страсть и интересные истории.
    Все это он воплощает и в собственном творчестве. У вас есть великолепный шанс
    почувствовать, что сегодня, здесь, сейчас существует настоящая музыка - надо только
    сделать шаг к ней на встречу. И концерт КОКО МОНТОЙЯ (Coco Montoya), который впервые
    приезжает в Россию с единственным концертом 29 сентября в концертном зале "МИР",
    - прекрасная для этого возможность!'
