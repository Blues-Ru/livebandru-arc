  text: 'Corey Harris - "Гитарист с изумительным вкусом и сумасшедшей слайдовой техникой.
    К тому же он грандиозный певец и еще композитор", - так охарактеризовал игру музыканта
    Брюс Иглауэр, президент самой авторитетной независимой блюзовой компании "Alligator
    Records". Большинство музыкальных критиков ставят Кори Харриса в один ряд с Keb
    Mo и Youngblood Hart, как выдающегося представителя акустического Дельта блюза.


    В 1995 году гитарист, певец и композитор Кори Харрис выпустил на лейбле "Alligator"
    свой первый альбом "Between Midnight And Day", его сразу провозгласили хранителем
    блюзовой традиции. Второй диск, "Fish Ain''t Bitin''", только подкрепил его репутацию
    молодого, но уже зрелого акустического блюзмена. "Возвращение в ушедшую эру",
    - так писал о нем журнал "Blues Revue", однако сам музыкант полагал иначе. "Я
    не ограничиваю себя одним и тем же и стараюсь менять все, что я делаю", - говорил
    он. И следующие его проекты, "Greens From The Garden" и "Vu-Du Menz", подтвердили
    это высказывание.


    Кори Харрис выступал, записывался и гастролировал с такими звездами как, Buddy
    Guy, Taj Mahal, R.L.Burnside, Ali Farka Toure, John Jackson, Wilco, Natalie Merchant,
    Henry Butler , "The Dave Matthews Band" и многими другими. Причем Дэйв Мэттьюс
    попросту включил Харриса в состав бэнда и они играли вместе все сеты. Затем начались
    сольные гастрольные поездки по Америке, Европе, Японии... и вот теперь по России.


    Кори Харрис - Профессор музыки в Bates College.'
