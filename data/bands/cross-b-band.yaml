  text: '15 декабря 2006 г. – дата рождения группы CROSS B. BAND. К уже работавшим
    вместе Сергею Смирнову (гитара), Милошу Вячеславу (бас), Шишпаренку Виталию (губная
    гармошка) присоединились Нестеренко Дарья (вокал), Волков Алексей (ударные).


    Спустя два месяца группа дебютирует на сцене одного из минских клубов. Публика
    очень тепло приняла искрометный texasblues в исполнении CROSS B. BAND.


    Осенью группа принимает участие в международном фестивале "Рок кола 2007", где
    Сергей Смирнов был признан лучшим гитаристом феста. 18 ноября 2007 г. группа принимает
    участие в фестивале "Минск Блюз 2007".В рамках феста жюри выбрало 2-х лучших гитаристов,
    одним из которых стал Сергей Смирнов.


    4 июля 2008 г. CROSS B. BAND в полном составе отправляются в северную столицу
    России Санкт-Петербург на ежегодный международный фестиваль "Блюз Дельты Невы"
    представить Беларусь. 5 июля в Юсуповском саду ребята представили свое видение
    блюза питерской публике.


    Осенью 2008 года группа переживает нелегкие времена – уходит Дарья. Но ребята
    продолжают работать и двигаться в выбранном направлении. Вскоре место у микрофона
    занимает уже известная в музыкальных кругах Blues Woman Воскресова Ирина, которая
    зажигает новую искру в творчестве коллектива.


    И снова в составе CROSS B BAND перемены.


    20 января 2010 года ребята представили поклонникам блюза очаровательную фронтWoman
    Валерию Якушеву.


    Группа успешно концертирует по Беларуси и за ее пределами! 10 июля 2010 года коллектив
    отправляется в Санкт-Перербург на VIII Международный Фольклорный Блюзовый Фестиваль
    BLUES ДЕЛЬТЫ НЕВЫ!'
