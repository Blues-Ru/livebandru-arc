reviews:
- id: 502
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  header: О группе
  text: 'Cross-Eyed Cats играют блюз во всем его разнообразии, одинаково органично
    звучат "в электричестве" с духовой секцией и в камерном формате акустического
    трио. В их репертуаре около ста песен разного времени: от 30-х и 40-х годов прошлого
    столетия до наших дней. Есть и целые тематические программы, посвященные творчеству
    мастеров блюза (T-Bone Walker, Muddy Waters, Albert King), а также отдельным направлениям
    в блюзе и ритм-энд-блюзе. Высокое исполнительское мастерство, безупречное чувство
    стиля, эмоциональная подача, гармоничное сочетание импровизации и бережного отношения
    к оригинальным аранжировкам делают выступления Cross-Eyed Cats яркими и запоминающимися.'
  verified: true
  created: '2019-01-10'
  is_press_release: true
