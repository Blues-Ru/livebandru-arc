  text: 'Впервые в России известный бизнесмен сделал карьеру музыканта и получил в
    дар гитару легендарного Эрика Клэптона.


    Известный российский бизнесмен Владимир Аветисян (лидер группы D.Black) получил
    в дар от выдающегося английского музыканта Эрика Клэптона гитару с автографом.
    Таким образом Эрик Клэптон выразил поддержку проекту "Claptomania", реализованному
    российской ритм-энд-блюзовой группой. В программу "Claptomania" вошли самые известные
    композиции Эрика Клэптона в интерпретации музыкантов D.Black, выпущен одноименный
    альбом.


    В настоящее время группа активно гастролирует в России и Европе. С успехом прошло
    недавнее турне по Великобритании, в ходе которого Владимир Аветисян и его группа
    получили приглашение в офис Эрика Клэптона, где и состоялось вручение гитары.


    Публика на концертах D.Black неизменно отмечает профессионализм музыкантов, а
    многие слушатели как в Европе, так и в России не подозревают о том, что лидер
    группы больше известен как топ-менеджер.'
