reviews:
- id: 382
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Уроженка городка Халлавингтон в графстве Уилтшир, жительница курортного Брайтона,
    ДАНИ УАЙЛД - певица, гитаристка, сонграйтер - с юных лет обнаружила в себе страсть
    к музыке и способности к сочинительству. Ее вкусы в музыке развивались под влиянием
    кантри, блюза, госпела и соул.


    Дани Уайлд с юных лет много гастролирует от родной Британии до Штатов и Канады,
    от континентальной Европы до Африки, и выступает как в скромных клубах, так и
    на сценах наиболее престижных полщадок, таких как Royal Albert hall или B.B.King
    Blues Club на Таймс-Сквер в Нью-Йорке.


    Ради того, чтобы записать ее альбомы 2009 и 2012 года к пульту вновь встал ветеран-продюсер
    Майк Вернон!


    А по результатам 2013 года Дани Уайлд заняла почетное третье место в номинации
    "Best British Blues Female Vocalist"'
