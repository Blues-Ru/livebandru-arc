  text: 'Лауреат Европейской премии им. Густава Малера, Заслуженный артист России,
    Даниил Крамер – выдающийся джазовый пианист с классическим образованием, смелый
    экспериментатор и один из главных популяризаторов джаза в России.


    Он заинтересовался джазовой импровизацией еще в годы обучения в Государственном
    музыкально-педагогическом институте им. Гнесиных. В 1982 году он получил I премию
    на конкурсе фортепианных джазовых исполнителей в Вильнюсе (Литва). С 1984 года
    Даниил Крамер ведет интенсивную гастрольную деятельность. Его разнообразный репертуар
    покорил публику во многих странах мира. Он выступал в Испании, Франции, США, Финляндии,
    Чехии, Словакии, Италии, Германии, Швеции, Венгрии, Польше, Австрии, Австралии,
    странах Африки и Центральной Америки. Крамер участвует в таких крупных международных
    джазовых фестивалях, как Munchner Klavier sommer (Германия), Manly Jazz Festival
    (Австралия), European Jazz Festival (Испания), Baltic Jazz (Финляндия), Foire
    de Paris (Франция). Он является почетным членом сиднейского профессионального
    джаз-клуба (Professional Musicians''Club) и джаз-клуба в г. Хаппаранда (Швеция).


    В 1994 году Даниил Крамер впервые в истории Московской консерватории открыл класс
    джазовой импровизации; тогда же он начал сотрудничать с Благотворительным фондом
    "Новые имена", курируя классико-джазовое направление. Впоследствии Крамер занял
    пост заведующего эстрадно-джазовой кафедрой в Московском институте современного
    искусства.


    Даниил Крамер – организатор серий популярных концертных программ "Джазовая музыка
    в академических залах", "Вечера джаза с Даниилом Крамером", а также профессиональных
    джазовых конкурсов в России. Крамер виртуозно сочетает мелодии самых разных композиторов
    (в том числе и собственные), превращая их в новое, самостоятельное произведение.
    При этом мелодии, перетекая одна в другую, рождают ощущение органичного единства
    подлинной музыки. Даже подробный рассказ о творчестве Маэстро даст лишь самое
    приблизительное представление о "джазе Даниила Крамера". Это как раз тот случай,
    когда лучше один раз услышать...'
