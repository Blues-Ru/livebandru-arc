  reviewer_token: press-release
  text: 'Уроженец английского городка Кроули и житель курортного Брайтона, ДЭННИ ДЖАЙЛЗ
    - певец, гитарист, сонграйтер, лидер блюз-рокового пауэр-трио Danny Giles Band
    или The DGB.


    "Похоже, Дэнни Джайлз - большая надежда "белого" блюз-рока!"..Blues and soul Magazine


    "Скорострельность Ингви Малмстина, динамику Даймбэга Дэррела и тон Уолтера Траута
    - Дэнни Джайлз объединяет в мощной блюзовой подаче. Мы наблюзаем рождение новой
    звезды блюз-рока!" Pete Feenstra, Classic RОСК Magazine U.K.


    После окончания Академии Современной Музыки в Гилдфорде, где он учился у Гатри
    Гована, Дэнни активно гастролирует со своей группой и с замечательным молодым
    харпистом Уиллом Уайлдом. Он с группой - желанный гость на крупнейших блюзовых
    фестивалях в Британии и континентальной Европе. В мае 2014го Дэнии впервый приезжал
    в Россию и отыграл несколько аншлаговых концертов в Москве и Ст.Перербурге, в
    сентябре того же года он приезжал во второй раз и был хэдлайнером Фестиваля джаза
    и блюза в Рыбинске, а в начале июля 2016 года, вместе с коллегами по The DGB,
    был хэдлайнером Блюз-байк фестиваля Total Flame в Суздале. Четвертый тур Дэнни
    состоялся весной 2017 года, а пятый - в сентябре 2018 года.


    За последние 8-10 лет Дэнни Джайлз получил несколько номинаций British Blues Awards
    "Best Young Artist", "Best Guitarist", записал с The DGB успешный дебютный альбом
    More is More, подписал контракт с мэйджором и готовит к выходу второй альбом.


    Звучание блюз-рокового пауэр-трио The DGB мгновенно узнаваемо. Их стиль - это
    уходящий корнями в блюз, очень современно и динамично сыгранный старый добрый
    классический рок. Их шоу отличают ураганная подача, яркие запоминающиеся мелодии,
    убойные риффы и мощнейший грув. Отдавая должное ценностям прошлого, твердо стоя
    на ногах в настоящем и уверенно глядя в будущее, парни сочетают виртуозное мастерство
    исполнителей с великолепными авторскими работами. Полторы дюжины оригинальных
    песен и несколько десятков кавер-версий блюз- и рок-хитов - основа их репертуара.
    Грядущий релиз нового альбома несомненно выведет The DGB на новую, более высокую
    орбиту.


    Дэнни Джайлз много записывается как сессионный музыкант и преподает гитарное мастерство
    и саундпродакшн в BIMM Brighton и частным порядком. Как Дэнни все это успевает
    при его плотном гастрольном графике - непонятно, но зато совершенно ясно, что
    концерты Дэнни Джайлза в конце августа-начале сентября 2019 года не стоит пропускать
    не только любителям блюза и блюз-рока, но и тем, кто помнит и любит Британский
    ритм-н-блюз 60-х в духе Yardbirds и Cream и классический рок 60-70-х в духе Jimi
    Hendrix и Led Zeppelin.


    Один из концертов его российского тура весной 2017 года был профессионально записан
    на видео, и к его новому, уже пятому по счету визиту смонтированная и отитрованная
    видео-версия концерта вышла в формате DVD/2CD. Презентация состоялась на первом
    концерте тура 2018 года в Концертном зале ЦДХ 26 сентября 2018 года.


    Новый 6-й российский тур Дэнни Джалза пройдет в конце августа-начале сентября
    2019 года. Не пропустите!'
