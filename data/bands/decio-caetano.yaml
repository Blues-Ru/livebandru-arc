- id: 392
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Уроженец Параны, хлопковой столицы Бразилии, гражданин Мира и житель Лондона,
    певец, гитарист-виртуоз, сонграйтер - ДИСИО КАЭТАНО объездил с концертами и фестивальными
    выступлениями обе Америки и всю Европу... Всю, да не всю! В России Дисио Каэтано
    будет выступать впервые. Это вообще довольно странно, что при столь напряженном
    гастрольном графике (у Дисио по 200-220 концертов в год!) он нашел время для приезда
    в Москву.


    Как бы-там ни было, его сплав по-Стиви- Рэй-Воновски бескомпромиссного электрического
    блюз-рока, энергичного свинга с босса-новой и коренными бразильскими национальными
    ритмами наверняка придется по вкусу нашим знатокам и ценителям прекрасного...


    Купите билет зарaнее!!!'
