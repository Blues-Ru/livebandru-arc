  text: 'Дэррил Холл - уникальный басист: его специальность - менеджмент, а играть
    на контрабасе он учился самостоятельно. Тем не менее, его талант позволил ему
    перебраться из Филадельфии в Нью-Йорк и, занимаясь на этот раз исключительно музыкой,
    занять нишу рядом с ведущими басистами джазовой Мекки. Дэррил играл в группах
    таких всемирно известных имен, как Хэнк Джонс, Малгрю Миллер, Кенни Баррон, Рави
    Колтрейн, Бенни Голсон, Даян Ривз. Недавно Дэррил Холл переехал во Францию, где
    с успехом начал пропагандировать настоящий американский джаз с влияниями фанка
    и госпел-музыки. Несмотря на то что Ральф Бауэн, Дэррил Холл и Дональд Эдвардс
    неоднократно выступали вместе на одной сцене, концерт в России - особенный: американцам
    предстоит играть новые русские стандарты, а значит... Ничего стандартного ждать
    не приходится! Когда импровизационную музыку исполняют музыканты такого уровня,
    выступление обещает превратиться в по-настоящему захватывающее действо.'
