  header: Deitra Farr (USA) - Королева чикагского блюза едет в Россию!
  text: 'Deitra Farr, неподражаемый вокал которой называют огненным и будоражащим
    душу, уже давно признана лучшей вокалисткой Чикаго, в том числе по версии уважаемого
    журнала Living Blues Magazine. За годы ее карьеры Deitra номинировалась на звание
    лучшей блюзовой вокалистки года на W.C. Handy Awards, Living Blues Critics Awards,
    British Blues Connection Awards, Les Trophees France Blues awards и другие топовые
    блюзовые премии десятки раз.


    Она родилась, выросла и начала заниматься музыкой в Чикаго - городе, который уже
    давно прочно завоевал репутацию блюзовой Мекки, и здесь же выпустила свой первый
    сингл Won''t Support Me. Песня в исполнении 18-летней девчонки тут же стала мега-популярной
    и попала в Cashbox Top 100 R&B. Кстати, 30 лет спустя сингл переиздали и он снова
    пошел гулять по радиостанциям всего мира.


    Полноценную профессиональную блюзовую карьеру Farr начала только шесть лет спустя,
    выступая в на блюзовых площадках США и Канады и гастролируя с Sam Lay Blues Band.
    Позднее она два года работала в качестве солистки легендарной группы Mississippi
    Heat и даже записала с ними два альбома.


    Первый сольный альбом Deitra Farr выпустила только в 1997 году. Работа на CD The
    Search is Over велась в Лондоне. В 2005 году в свет вышел альбом Let it Go!


    Как известно, талантливый человек талантлив во всем. Deitra не только объехала
    с гастролями весь мир, выступая в Англии, Финляндии, Норвегии, Канаде, Голландии,
    Австралии, Франции, Германии, Словении, Греции, Италии, Израиле, Португалии, Швеции,
    Аргентине, Бразилии, Польше, Японии, Испании, Чехии, ОАЭ и многих других странах.
    Farr к тому же - весьма известный поэт, писатель и художник. Артистка также имеет
    степень по журналистике и ведет авторские колонки в таких престижных изданиях,
    как Chicago Daily Defender, The Chicago Blues Annual, Italian blues magazine il
    Blues и, конечно, Living Blues Magazine.


    В 2000 году Deitra Farr провела большие европейские гастроли с Lil Ed и Blues
    Imperials. В 2003 она шесть недель давала концерты в Великобритании с Otis Grand
    и Bobby Parker. Год спустя певица провела еще один европейский тур с Jody Williams
    и Andrew "Jr. Boy" Jones. С 2006 по 2010 год вместе с Zora Young и Grana Louise
    певица гастролировала с большим проектом The Women of Chicago Blues.


    2013 год Deitra Farr провела в очередном турне по Европе с талантливыми музыкантами
    Raphael Wressnig''s Soul Gift. Наконец, настал черед и России! В марте 2014 года
    королева чикагского блюза приезжает в нашу страну! Аккомпанировать певице будут
    четыре музыканта из Аргентины.


    Не упустите шанс послушать чикагскую блюз-диву, которой рукоплещет весь мир!'
