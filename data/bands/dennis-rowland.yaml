  text: Деннис Роуланд, певший 7 лет в легендарном оркестре Каунта Бейси, энергичный
    симпатяга - афроамериканец, в творчестве которого гармонично сосуществуют стандартный,
    "классический" джаз и ритм-энд-блюз, фанк, даже типичная поп-музыка, а также обращения
    к стилистике эстрадно-джазового шоу. "Он - как многогранный бриллиант, с каждой
    композицией поражающий все больше и больше". Построенная на контрасте шоу программа,
    чередующаяся яркими вставками, талантливая драматическая игра, многообразие музыкальных
    интонаций Дениса Роуланда, обладающего огромным голосовым диапазоном, поднимают
    публику на ноги...зал взрывается рукоплесканиями! Изумительная энергетика, восхитительное
    шоу! Настоящий черный шоумен Старой Закалки!
