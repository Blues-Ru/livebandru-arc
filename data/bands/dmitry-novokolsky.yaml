  text: Кантри-певец, гитарист и гармонист Дмитрий Новокольский родился 25 января
    1973 года в Москве. Начал заниматься музыкой в 1988 году. Именно в то время стал
    играть на гитаре и писать свои первые песни. В 1991 году, в самый разгар перестройки,
    примкнув к рок-н-ролльной тусовке, которая медленно выходила из подполья, начал
    выступать на Арбате с Денисом Мажуковым и Олегом Усмановым (экс-"Мистер Твистер").
    Два года спустя познакомился с Джоном Андерсоном (американским дипломатом, в то
    время работавшем в Москве) и благодаря этому человеку близко познакомился с блюзом,
    научившись играть на губной гармонике. В 1994 году собрал собственный кантри-блюзовый
    коллектив "B.A.C.K."(при содействии музыкантов первого состава "Off Beat", ранее
    игравших в группе "Браво"),который стал одним из пионеров кантри-блюза в пост-советское
    время. Дебют этого коллектива состоялся в январе 1995 года в "Арбат Блюз Клубе"(этот
    клуб в 1993 году создали Джон Андерсон и Александр Царьков - люди, которые дали
    новую "жизнь" многим блюзовым и рок-н-ролльным музыкантам того времени и, по сути,
    вывели эту музыку из "полуподполья").Помимо выступлений в составе "B.A.C.K.",Дмитрий
    Новокольский вел на кабельном телевидении авторскую программу "Двери"(1995-1996
    гг). Гостями его передач были Вилли Токарев, Армен Григорян, Александр Ф. Скляр,
    Валерий Сюткин, балетмейстеры Наталья Касаткина и Владимир Василев, Николай Арутюнов
    ("Лига Блюза"), Ольга Арефьева и группа "Ковчег", "Манго-Манго" и многие другие...В
    2000 году коллектив распался и Дмитрий какое-то время играл как губной гармонист
    в "Off Beat" приняв участие в записи их пластинки "That''s What I Am".В июле 2000
    года стал лидер вокалистом кантри-рок группы "Apple Jack", -единственного в России
    коллектива, исполняющего современный кантри-рок. Коллектив выступал в Германии,
    Дании, Голландии, Польше (2-е место на фестивале Кантри-Европа в Мрангово (2003
    год),США и Канаде, а также во многих российских городах (Сургут, Новосибирск,
    Кострома, Нижний Новгород, Липецк, Калуга, Иваново, Белгород...). Группа ежегодно
    участвует в Пущинском фестивале (г.Пущино). Новокольский выступал как сейшн-музыкант
    со такими известными коллективами, как "Off Beat","Scolder Blues Band", "Dr.Nick"
    и др. В январе 2012 года Дмитрий Новокольский покидает "Apple Jack Band" в котором
    он проработал почти 12 лет и полностью посвящает себя сольной студийной и концертной
    работе в направлениях "рутс", "фолк-рок" и "мэйнстрим". В сентябре 2012 года вышел
    альбом совместно с гитаристом Юрием Кривошеиным "That Job Is Over"
