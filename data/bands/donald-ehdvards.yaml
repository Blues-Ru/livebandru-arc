  text: Барабанщик Дональд Эдвардс, постоянный участник мемориального оркестра легендарного
    контрабасиста Чарли Мингуса Mingus Big Band и Mingus Dynasty, не раз выступал
    в составе квартета Ивана Фармаковского. Музыканты сотрудничают с 2008 года - именно
    тогда они впервые сыграли вместе на сцене известного нью-йоркского клуба Iridium.
    Когда возник вопрос о записи второго альбома Ивана Фармаковского "The Way Home",
    место барабанщика без обсуждений было отдано Дональду Эдвардсу.
