  header: группа Dr. Nick (Москва, с 1994 года)
  text: 'Началось все с того, что в августе 1994 года Дмитрий и его американский друг
    Джо ДиКарло (Joe DiCarlo) начали репетировать программу, состоящую, в основном,
    из традиционных блюзов и фолк-песен. Вскоре коллектив стал выступать в различных
    концертных точках Москвы, включая такие клубы, как "Кризис Жанра" и B.B. King.
    С появлением новых музыкантов Коллина Олдэма (Colin Oldham) и Сергея Слуцкого,
    у Джо сформировалась идея, которая заключалась в том, что в поиске нового звучания
    для классических блюзовых номеров используются только акустические инструменты.
    Название Dmitri Johnson String Quartet полностью соответствовало его задумке.
    Основные направления музыки: дельта-блюз, блюз-рок, фолк и фолк-рок.


    В начале 1995 года состав группы выглядел так: Джо ДиКарло (гитара, добро, вокал),
    Дмитрий Казанцев (гитара, вокал), Колин Олдхам (виолончель, вокал), Сергей Слуцкий
    (бас-гитара). Через некоторое время в группе появился перкуссионист Эдвард Кинан
    (EdwardKeenan) и гитарист Ник Рислэнд (Nick Riesland). В связи с переменами (в
    составе группы, направления музыки, др. обстоятельств) коллектив был переименован
    в Dead Shrimps в честь композиции Dead Shrimp Blues Роберта Джонсона, исполняемой
    группой.


    Название Dead Shrimp пугало владельцев клубов и потенциальных слушателей, видимо,
    вызывая ассоциации с панк-культурой, и поэтому в 1995 году Дмитрием Казанцевым
    было предложено назвать группу Dr. Nick в честь одного из участников группы. Ник
    Рислэнд работал врачом посольства США в Москве, и был старше и колоритнее всех
    в коллективе. Новое имя группы прижилось и удержалось даже после того, как Ник
    покинул группу. Сегодня эта история уже практически забыта, и теперь на концертах
    Dr. Nick зрители иногда по ошибке обращаются к Диме: "Николай!".


    Постепенно американцы уезжали из России, и состав группы продолжал меняться. Вместо
    Джо и Ника пришли Грэг Смит (Greg Smith) и Саша Никишин, на ударных играл Дмитрий
    "Ветеран" Честных. С отъездом Джо на родину поменялся и стиль – звучание все больше
    уходило в сторону более сложного, прифанкованного и психоделического блюз-рока.


    Состав менялся вплоть до октября 1998 года, когда Дмитрий Казанцев уехал в Нидерланды.
    В течение двух лет группа играла в "Кризисе Жанра" без Дмитрия, но в конце 2000
    года он вернулся в Москву и возобновил свою деятельное участие в группе. С 2001
    года основой коллектива являются два Дмитрия – Казанцев и "Ветеран". На ударных
    в группе играют лучшие из лучших: Антон Дашкин, Дмитрий Севастьянов, Андрей Шатуновский,
    Эдуард Зизак, Сергей Ефимов, Игорь Игнатов, Виктор Анисимов, Dave Grout… На губной
    гармошке время от времени играет Сергей "Джон" Сорокин – прекрасный московский
    музыкант, известный по группе Evergreens. С Dr. Nick часто выступает органист
    Гриша Сандомирский – лидер группы "Лампа Ладино".


    Группа выступает в клубах и пабах столицы, а также на фестивалях и музыкальных
    акциях ("Blues.ru – Весь этот блюз", "Путинка-блюз", "Фестиваль бас-гитары Bazz
    Day", "Блюз-фестиваль имени 100-летия Джона Хенри Барби", "Фолк-рок вечер в Ритм-н-блюз
    кафе", блюз-фест в Клубе "Икра", блюз-фест в клубе "Высоцкий", открытые джем-сейшны
    в Бурбон Стрит Баре (по вторникам) и акустические фолк-блюз-джемы в "Доме у дороги"
    по понедельникам).


    В ноябре 2005 года группа выпустила свой первый Made At Home на российском лейбле
    BluesTime. На пластинке 14 композиций: 12 из них написаны Дмитриями, а еще 2 –
    обработки традиционных фолк-блюзов.


    Второй альбом 2nd Time Around вышел в 2007 году. В работе над диском принимали
    участие: Казанцев, Ветерана, Григорий Сандомирский, Сергей Сорокин, а также другие
    музыканты. Все песни на этой пластинке написаны группой.


    Третий диск увидел свет в 2009 году. На альбоме лишь одна своя композиция + 11
    каверов. В записи принимали участие: Казанцев, Ветеран, Денис Назаров, Ольга Олейникова,
    Андрей Шатуновский, Гриша Сандомирский, Сергей Сорокин, Руслан Чифуров и другие.


    В сентябре 2010 года в составе произошли изменения. Вместо Ветерана на бас-гитаре
    стал играть Денис Назаров (он также играет на гитарах и подпевает), а также в
    группе постоянно стала играть и петь Ольга Олейникова (вокал, перкуссия, ударные,
    флейта, kazoo).


    Дмитрий Казанцев


    Дмитрий Казанцев родился 26 декабря 1971 года в Москве. Музыкальная биография
    Дмитрия Казанцева берет начало в середине 80-х, еще со школы, когда бабушка и
    дедушка подарили ему приличную акустическую гитару, и Дмитрий начал учиться играть.
    На тот момент кумирами были: Beatles, Rolling Stones, Creedence Clearwater Revival,
    Simon & Garfunkel, Doors, Bob Dylan, Led Leppelin, Cream и другие.


    С конца 80-х Дмитрий занимается англоязычным блюзом и роком. Первым его серьезным
    проектом был коллектив White Spirit – уже в 1993 году был выпущен первый альбом
    под названием No More Spirits. Тем не менее в 1994 году White Spirit развалился.


    Также Дима играл в таких группах, как Crazy Men Crazy, Cry Baby, The Friends,
    No Problem, а также в Sky Stranger (Виктор Анисимов – ударные; Денис Малышев –
    клавишные, Слава Шин – гитара).


    После развала группы White Spirit, Дмитрий решил круто поменять жизнь – бросил
    музыку и устроился на работу графическим дизайнером. К счастью, музыку он бросил
    не совсем и ненадолго, и уже осенью 1994 года на свет появился новый коллектив,
    который теперь широко известен московской публике под названием Dr. Nick.


    Помимо участия в работе группы Dr. Nick Дмитрий Казанцев параллельно играл в составе
    группы Cry Baby вместе с Никишиным (гитара, вокал), "Ветераном" (бас-гитара),
    Романом Гегартом (гармошка, вокал) и Игорем Иванковичем (ударные). Вместе с Дмитрием
    Новокольским (группы The B.A.C.K. и Apple Jack) существует проект под интересным
    названием Buenos Dimas (фолк-кантри-блюз-рок и рок-н-ролл). Дмитрий также принимает
    участие в проекте "Чернусь", где Казанцев пишет музыку ко многим песням Дмитрия
    Чернуся, а также занимается звукорежиссурой, продюсированием и аранжировками.
    На фирме "Снегири" вышли уже три альбома этого проекта – "Она" (2004), "Он" (2005)
    и "Люди Рок-н-ролл". Он также сотрудничают с российским фолк-рокером Егорычем
    (уже выпущены два его альбома).


    Казанцев играет на различных гитарах, поет и пишет свои композиции. В его репертуар
    входят сотни англоязычных композиций. Дима – заядлый меломан и ценитель хорошего
    звука; в его коллекции – тысячи виниловых пластинок и компакт-дисков различных
    жанров и стилей.'
