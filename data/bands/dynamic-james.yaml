- id: 8
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Группа была основана в Москве замечательным гитаристом, аранжировщиком и
    продюсером Виталием Дмитренко.


    В составе Dynamic James профессиональные музыканты, у каждого из которых за плечами
    огромный опыт работы в различных музыкальных жанрах и стилях. Основная направленность
    коллектива - Blues Old School.


    Первая концертная программа "T-Bone Walker Tribute", записанная живьем на выступлениях
    в клубах "Дом у Дороги" и "Джаз таун", сразу получила признание критиков и любителей
    блюза.


    Вот уже полтора года группа является самым джемообразующим коллективом Москвы,
    проводя блюзджемы в лучших клубах: Синяя Птица, Ритм-энд-Блюз кафе, Б-2, FM-Club,
    Double Bourbon Bar.


    На данный момент у группы обширный репертуар и несколько вариантов состава.


    В репертуаре:


    1.Традиционный блюз 40-50-60х: BB King, Muddy Waters,Freddy King, Willie Dixon,T-Bone
    Walker и др. 2.Композиции в стиле кантри, свинг, фанк, соул. 3.Блюзовые авторские
    композиции.


    Группа Dynamic James выступает на V.I.P., светских и деловых мероприятиях, презентациях,
    выставках, престижных клубных площадках, частных и корпоративных праздниках.


    Варианты концертных выступлений:


    1. Дуэт (гитара, вокал) 2. Трио (гитара, бас-гитара, вокал) 3. Квартет (вокал,
    гитара, бас-гитара, барабаны) 4. Квинтет (саксофон, бас-гитара,гитара, барабаны,
    вокал) 5. Большой Джем-состав с программой "Звезды блюзовых джемов" (саксофон,
    бас-гитара,гитара, барабаны, губная гармоника, несколько вокалистов)'
