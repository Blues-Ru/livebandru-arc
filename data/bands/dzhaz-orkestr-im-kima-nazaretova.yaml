  header: Джазовый оркестр имени Кима Назаретова
  text: 'Джазовый оркестр имени Кима Назаретова с 1 января 2008 года является коллективом
    Ростовской государственной областной филармонии.


    Художественный руководитель оркестра - заслуженный деятель Всероссийского музыкального
    общества, заведующий кафедрой эстрадной и джазовой музыки Ростовской государственной
    консерватории (академии) им. С. В. Рахманинова, профессор Петр Назаретов, музыкальный
    руководитель и дирижер - заслуженный деятель Всероссийского музыкального общества
    Аркадий Олейников, лауреат международных и всероссийских джазовых фестивалей.


    В состав оркестра входят как маститые ростовские музыканты, выступавшие еще под
    руководством самого Кима Назаретова, так и талантливая молодежь - выпускники и
    студенты Ростовской консерватории. Среди солистов оркестра: Олег Великанов, Евгений
    Белин, Анатолий Кирничный, Анатолий Романенко, Кристина Крит, Юрий Подкользин,
    Егор Попов, Владимир Семенюк. Солисты-вокалисты: Татьяна Куделько, Алла Тырон
    и заслуженный артист России Георгий Каменский. С оркестром сотрудничает известная
    джазовая вокалистка Ирина Родилес (Москва),


    В репертуаре оркестра - музыка различных стилей и жанров: джазовые пьесы начала
    ХХ века, хиты эры свинга, неувядаемые мелодии Гленна Миллера, Бенни Гудмена, Каунта
    Бейси, Дюка Эллингтона, оригинальные аранжировки хитов Джона Леннона и Пола Маккартни,
    Стива Уандера, Эндрю Ллойда-Уэббера, джаз-роковые композиции, латино-американская
    музыка, а также произведения советских и современных российских композиторов.


    Творческие планы оркестра им. Кима Назаретова связаны с дальнейшим изучением зрительских
    интересов к популярным произведениям, включением новых композиций в свой репертуар,
    привлечением к сотрудничеству известных солистов и талантливых молодых исполнителей,
    а также с расширением географии гастролей. Все это подчинено главной цели, - возродить
    былую славу оркестра Кима Назаретова в России и за рубежом когда коллектив выступал
    под непосредственным руководством Маэстро.


    "Ким Назаретов был величайшим джазовым маэстро, мастером своего дела, крупнейшим
    музыкантом и мерилом Человека с большой буквы... Для меня всегда Ростов был Назаретовым,
    а Назаретов был Ростовом."


    Мурад Кажлаев, народный артист СССР, композитор


    "Биг-бэнд Кима Назаретова стал "оркестровым университетом" для музыкантов. Ким
    Назаретов был одним из инициаторов профессионального джазового образования...
    Он, безусловно, оставил после себя яркий след в истории джаза."


    Алексей Баташев, заслуженный деятель искусств России'
