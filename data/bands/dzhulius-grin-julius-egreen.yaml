  text: 'В период расцвета ритм''н''блюза, в 60-е годы прошлого века, Джулиус Грин
    был участником оригинального состава ритм''н''блюзовой группы The Mad Lads. Одно
    время он был солистом легендарной черной вокальной группы The Platters, те самые,
    что первыми спели песню Only You, и после них, кто ее только не пел и не поет.
    The Platters были официально призваны в Зал славы вокальных групп в 1998 году
    и в Зал славы рок-н-ролла в 1990 году. Джулиусу Грину и его бэнду рукоплескали
    залы стран Южной и Латинской Америки, Африки, Англии, Испании, Италии, Швеции
    и Хорватии. Диапазон жанров, подвластных его неординарному таланту широк: блюз,
    джаз, соул, фанк, госпел, рэггей и рок '' н '' ролл. Своей искренней, экспрессивной
    и неповторимой манерой исполнения Джулиус Грин с первых тактов завоевывает сердца
    любой аудитории: будь то небольшой уютный клуб или огромное пространство стадиона.'
