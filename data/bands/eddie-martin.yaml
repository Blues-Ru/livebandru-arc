reviews:
- id: 380
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Уроженец Лондона, житель тихого британского городка Фрум - ЭДДИ МАРТИН -
    человек-оркестр, певец, гитарист, харпист, сонграйтер, шоумен, лидер собственной
    группы, саундпродюсер. Человек неуемной творческой энергии, искрометного юмора,
    безупречной гитарной техники, мастер вокала и кудесник губной гармоники. Вот о
    нем пишет авторитетный журнал "Blues in Britain": "Где бы ни играл Эдди Мартин
    - в маленьком клубе или на большой фестивальной сцене, как человек-оркестр, в
    составе пауэр-трио или в биг-бэнда - он неизменно превосходит ожидания!" "Просто
    один из лучших блюзовых гитаристов, которых рождала Британия со времен Эрика Клэптона..."
    What''s On in London'
  verified: true
  created: '2013-12-20'
  is_press_release: true
