  text: 'Джаз-квинтет "Эдельвейс" - лидер клубного джаза в Москве – существует уже
    7 лет. В репертуаре ансамбля множество джазовых композиций в собственных аранжировках,
    авторские пьесы. Квинтет использует разные формы концертной деятельности: это
    и развлекательные программы, и лекции-концерты (например, "История вокального
    джаза ХХ века").


    Коллективом записана музыка к нескольким кино- и телефильмам. Он неоднократно
    выступал в мероприятиях, организованных Фондом культуры России. В репертуаре есть
    специальная программа киномузыки в джазовой интерпретации, исполненная впервые
    на Неделе датского кино в Москве в 2002 г. В марте 2003г. коллектив выступил в
    Кремлевском Дворце Съездов вместе с симфоническим оркестром в программе "Russian
    Rock in Classic".


    В сентябре в Голландии выходит новый альбом группы "Эдельвейс" с авторскими аранжировками
    известных джазовых тем и собственных композиций. В мае на "Тон-студии" Мосфильма
    коллектив записал новый двойной альбом "Heartaches", который выйдет в конце этого
    года.'
