  text: 'Эд Губайдуллин. Гитарист, композитор, аранжировщик. Лидер группы "Edison
    band" Исполнитель блюзов, песен в стиле кантри, блюграсс, хард-рок.Edison band
    Мощная гитара и истинно мужской вокал.Классика жанра: Dire Straits.Eric Clapton.Chris
    Rea.Joe Cocker.Elvis Presly.Louis Armstrong.J J Cale.B B King.Deep Purple.ZZ Top,Pink
    Floyd и др. FINGERPICKING... Самый популярный во всем мире стиль игры на гитаре
    (основатели стиля легендарные гитаристы такие как: Чет Эткиинс, Джери Рид, Мэрил
    Трэвис, Том Брэш, Томми Эмануель и др.'
