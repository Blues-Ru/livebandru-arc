  reviewer_token: press-release
  header: Новый московский проект европейского инструментального джаза Екатерины Рамжаевой.
  text: '"Kate & Friends" - это новый московский проект европейского инструментального
    джаза Екатерины Рамжаевой. Екатерина - молодая очаровательная саксофонистка и
    разносторонний музыкант, композитор и преподаватель, а так же выпускница престижнейшего
    музыкального колледжа Америки "Berklee College of Music" (Boston) по специальности
    Jazz Composition. В Америке Екатерина обучалась у именитого тромбониста Hal Crook,
    участвовала в совместных проектах c такими музыкантами как Ed Tomassi, Ken Cervenka,
    Ross Hoyt и Brian Benton. В Бостоне она записала свой первый альбом "Under the
    Umbrella of Music", в котором приняли участие полные стипендиаты Berklee и выпускники
    Boston Conservatory.


    Многочисленный призер и участница международных джазовых фестивалей, лауреат конкурса
    "Рояль в Джазе", Екатерина приобрела широкую популярность как преподаватель, а
    так же первый альт и сопрано саксофонистка в джазовом Биг Бенде "C-Jam Club Jazz
    Orchestra"(http://www.cjamclub.com)


    "Kate & Friends" исполняет авторскую музыку участников коллектива и модные современные
    джазовые стандарты в авторских аранжировках. В состав входят известные топовые
    музыканты:


    Федор Сенчуков (тромбон) - cолист "Класс-Центр Бэнда", проекта Аркадия Шиклопера
    и Юрия Парфенова, музыкант "Академик Бэнда" Анатолия Кролла. В составе различных
    групп участвовал в фестивалях "Усадьба Джаз" (Архангельское), "СКИФ" (Санкт-Петербург),
    "Десять свечей" (Нанси, Франция), "Выставка мировой музыки" (Севилья, Испания),
    "Jazz Sous le Pommiers" (Франция), "Zommer Van Antver" (Бельгия) и других


    Александр Горох (гитара) - победитель всеросийских конкурсов джазовых исполнителей
    "Многоликая гитара - 2012" и "Джаз XXI века. Новое поколение" Выпускник московского
    областного колледжа искусств по классу гитары Головни.Н.М. Учавствовал в фестивалях
    Джаз над Волгой, Фестос, Усадьба-джаз


    Рамина Мишина (фортепиано/клавишные) - в этом году заканчивает РАМ им. Гнесиных,
    лауреат конкурса пианистов "Рояль в джазе", "музЭнерго", "Весенний джаз" (Латвия).
    Композитор и лидер коллектива "PlayMod";


    Олег Шарафединов (бас-гитара/контрабас) - московский сессионный и студийный бас-гитарист,
    контрабасист. Участник Ruslan Shariff, ансамбля Александра Бисерова, "Новый Курьер",
    преподаватель колледжа "Консорт";


    Аркадий Баклагин (барабаны, перкуссия) - педагог ГМУ Эстрадного и Джазового Искусства,
    участник шоу "Zildjian-Day ‘2005" в Москве. Работал в ансамбле "Арсенал" Алексея
    Козлова, группе Тамары Гвердцители, Квартете Александра Пищикова, в настоящее
    время - в оркестре нар. арт. России Левона Оганезова. С 2012 года - официальный
    эндорсер компании Zildjian.


    Бэнд ведет активную концертную деятельность, регулярно выступает на самых престижных
    джазовых площадках Москвы - Клуб Алексея Козлова, Клуб Эссе, Ресторан Чайковский
    и т.д.


    Также недавно принимал участие в интерактив-шоу "Романов Лайв" у диджея Русского
    Радио Дмитрия Романова (romanovlive.ru)


    В апреле этого года ребята стали резидентами портала звуки.ру (http://www.zvuki.ru/A/P/68449/)
    и первого джазового радио (1jazz.ru), записи находятся в постоянной ротации на
    этом радио'
