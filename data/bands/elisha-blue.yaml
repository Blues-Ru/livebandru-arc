  text: '"Элайша Блю - тяжеловес блюз-роковой гитары, с малолетства выступавший вместе
    с легендами чикагского блюза в диапазоне от Джона Ли Хукера и Алберта Кинга до
    Бадди Гая и Алберта Коллинза - украшение и одно из достояний британской блюзовой
    сцены. Если увидите афишу с его именем где-нибудь в радиусе 200 миль от вашего
    дома - бросайте все, садитесь за руль и отправляйтесь туда. Поверьте, оно того
    стоит!" Пит Финстра, Get Rady To Rock.


    Элайша Блю родился в Филадельфии, США, рано остался сиротой и находился под опекой
    государства до совершеннолетия. С 12 лет он начал играть на гитаре, и уже через
    год был довольно зрелым гитаристом. В 13 лет он ухитрился сбежать из-под опеки
    и автостопом отправился в Калифорнию, увлеченный идеей влиться в среду хиппи и
    битников Сан-Франциско. Со своим видавшим виды Эпифоном подмышкой, он два года
    жил во Фриско и играл по барам и клубам, а частенько на углу за мелочь, оттачивая
    и шлифуя свое гитарное мастерство. В 15 лет он отправился на юг Калифорнии, в
    Лос-Анжелес, где спустя короткое время по дороге на местный фестиваль был обнаружен
    органами опеки и отправлен в сопровождении офицера по надзору обратно в Филадельфию.
    Еще спустя полтора года он вновь сбежал из под опеки, но в этот раз отправился
    в Чикаго, где вскоре после прибытия прочно обосновался ну Уобаш и Кларк стрит
    и начал играть с такими музыкантами, как Коко Тэйлор, Саннилэнд Слим, Алберт Коллинз,
    Джон Ли Хукер и Алберт Кинг. В 19 лет он вновь отправился в Лос-Анжелес, где вскоре
    встретил гастролировавших Кэри и Лурри Бэлл, с которыми он успел поиграть в Чикаго
    двумя годами ранее. В 20 лет, получив приглашение, он стал полноправным участником
    их группы и, с начала 1982 года гастролировал с ними по Штатам, Британии и Континентальной
    Европе. Его гитару можно услышать на студийных и концертных альбомах 1982-1984
    годов. Гастроли по Европе и Британии в составе Carey & Lurrie Bell Band расширили
    кругозор Элайши, равно, как и круг полезных знакомств. Вскоре он покинул группу
    Бэллов и решил самостоятельно отправиться в Европу. В январе 1985 года Элайша
    перебрался через океан, и после нескольких месяцев гастролей между Лондоном и
    Амстердамом, окончательно осел в Лондоне, где он начал регулярно играть по клубам
    Сохо и Ковент Гардена. Став резидентом Town and Country Club, он играл на разогреве
    у Джонни Уинтера, Бадди Гая, Джуниора Уэллса и др., в составе хаус-бэнда с бывшими
    участниками Thin Lizzy. Спустя некоторое время он перебрался в Амстердам, и вскоре
    в Берлин по приглашению Сидни Селби, известного как Guitar Crusher, где записал
    с ним совместный альбом. В 1990 Элайша женился на жительнице Лондона, и британская
    столица стала для него окончательно родной. В 1991 году он объединил усилия с
    Эндрю Роачфордом и записал с ним альбом "Get ready!", вышедший на лейбле Columbia.
    В течение 90-х годов он частенько гастролировал с Роачфордом по Британии, Европе
    и Австралии, в 1993-м выступил с ним на Уэмбли на "Smash Hits Winner''s Party",
    и в 1997-м записал с ним альбом "Feel". Позднее Элайша играл и записывался с членами
    Skunk Anansie, Chaka Khan, сотрудничал Теренсом Трентом Д''Арби, благодаря помощи
    которого записал в Мюнхене свой первый ЕР с собственным песенным материалом. С
    2000 года Элайша Блю окончательно осел в Лондоне, сосредоточившись на семье и
    сочинении собственных песен. Он частенько записывался как сессионный гитарист,
    много гастролировал по Британии, резидентно выступал в нескольких лондонских клубах,
    где собирал армию поклонников и заработал репутацию одного из самых зрелищных,
    драйвовых и харизматичных блюзовых музыкантов Лондона и окрестностей. В январе
    2019 года состоялся его первый приезд в Россию.


    С Элайшей Блю (гитара/вокал) выступали Денис Назаров (бас/бэк-вокал) и Егор Горкин
    (барабаны).


    Первый его концерт в Клубе Козлова был записан "вживую" на винтажном аналоговом
    оборудовании в формате 38/2 stereo.


    В конце апреля 2020 года Элайша скоропостижно скончался в Лондонской клинике...'
