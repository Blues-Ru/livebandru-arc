  header: Эрик Харстад в Москве
  text: 'По прошествии многих лет Эрик Харстад стал одним из передовых блюзовых музыкантов
    Норвегии. Длинной музыкальной карьере сопутствовало большое число выступлений
    во многих блюзовых клубах и фестивалях Норвегии, и сегодня он известен как ветеран
    норвежской блюзовой сцены. За последние 20 лет Эрик Харстад был членом таких коллективов
    как "Male Blues Band" и "The Buzz Brothers" и прочно занял место в истории норвежского
    блюза. За это время он выпустил два собственных альбома.


    Эрик Харстад в первый раз приедет в Россию. В составе его трио выступит еще один
    опытный блюзовый музыкант, исполнитель на губной гармонике и басист Эйрик Бергене.
    Бергене хорошо известен российским любителям блюза, а в Норвегии он закрепил за
    собой звание одного из лучших гармонистов во всей стране. Вместе с ударником Ярославом
    Писаревым из Санкт-Петербурга трио представит слушателям традиционный блюз и свинг
    высочайшего качества.


    Слушатели, которые еще не слышали музыку Харстада, могут приготовиться к уроку
    блюзового чувства и музыкальной техники. Каждая сыгранная им нота полна смысла,
    а сам он показывает необычайное уважение к музыке.'
  verified: true
