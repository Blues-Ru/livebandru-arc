  text: '"Голосу Ив присущи красивые, плавные переливы и чувство юмора, которые порой
    глубоко трогают слушателя. Она искусно свингует и никогда не злоупотребляет техникой
    скэта. Ив очень осторожно обращается с музыкальным материалом, не торопя лирическую
    часть, позволяя мелодии литься, прекрасно ощущая всю композицию в целом." - джаз
    критик Jazz Times.'
