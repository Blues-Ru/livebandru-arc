  header: '"Jazz Town Band" Евгения Борца'
  text: '"Jazz Town Band" Евгения Борца – союз молодых талантливых музыкантов – возник
    сравнительно недавно, но уже сейчас без преувеличения является одним их сильнейших
    мэйнстримовых коллективов на российской джазовой сцене. В настоящем составе –
    ведущие джазовые музыканты Москвы: Тимур Некрасов (тенор-саксофон), Артем Ковальчук
    (труба), Михаил Савин (сопрано-саксофон), Евгений Борец (фортепиано), Сергей Хутас
    (бас), Александр Зингер (барабаны). На счету коллектива – участие в джазовых фестивалях
    и совместные выступления с такими звездами мирового джаза как "Jazz Town Band"
    и Владимир Пресняков-старший, Алан Харрис, Синтия Скотт, Дон Брейден, Алекс Сипягин
    и др.


    Успех коллектива во многом объясняется и харизматической личностью Евгения Борца
    – пианиста, композитора, аранжировщика и руководителя "Jazz Town Band". Его музыкальный
    авторитет, виртуозное владение инструментом, блестящее знание традиций классической
    школы и нестандартность джазового мышления вот уже несколько лет собирают вокруг
    себя талантливых и креативных музыкантов.'
