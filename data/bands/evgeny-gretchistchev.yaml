  reviewer_token: press-release
  text: 'Евгений Гречищев - выпускник джазового факультета МГУК, джазовый пианист,
    аранжировщик, композитор, лауреат нескольких джазовых фестивалей, Пианист Евгений
    Гречищев педагог, воспитавший не одно поколение джазовых пианистов, автор учебника
    для джазовых пианистов "Jazz Continuo".


    Евгений Гречищев много концертирует в составе собственного трио и последние 8
    лет является лидером джазового ансамбля "The Moscow Jazz Passengers". Пишет музыку
    для фортепиано, малых ансамблей, а так же музыку для театра (одна из наиболее
    известных работ - музыка к пьесе "Антимиры" по А. Вознесенскому).'
