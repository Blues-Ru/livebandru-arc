  reviewer_token: press-release
  header: Пресс-релиз
  text: 'FA''ATA - содружество музыкантов, возникшее в 2010 году в Нижнем Новгороде.
    Группа играет интуитивную музыку, однако формально стилистику исполняемых композиций
    можно отнести к импровизационному этно-трансу. В выступлениях могут участвовать,
    помимо основного состава группы, приглашенные сессионные музыканты, актеры театров
    пластики, огненных шоу и другие персонажи. Музыканты FA''ATA используют обширный
    арсенал различных предметов и музыкальных инструментов (профессиональных академических,
    этнических, инструментов собственного изобретения). В выступлениях применяются
    как традиционные мотивы и ритмы, так и приемы шумового и трансового характера,
    горлового пения, электронные сэмплы, вокальные импровизации, а так же элементы
    фрик-шоу. FA''ATA сотрудничает, в частности, с фольклорно-этнографическим ансамблем
    "Свети-Цвет" (Ниж-ний Новгород), группой "Турбодзен" (Москва), Сергеем Летовым,
    театром пластики и пантомимы "Малиновая Гряда", "Театром Птиц", театром огня "Fire
    Life", творческим объединением "Желтое Солнце" и другими музыкальными и немузыкальными
    проектами. Участники группы выступали на этнофестивалях: "Шарабан 2010" (Нижний
    Новгород), "Крутушка 2010" (в составе ансамбля "Свети-Цвет") (Казань), Первом
    Московском Международном Фестивале Варгана в марте 2011, Фестивале Им-провизации
    "ТО-НЕ-ЗНАЮ-ЧТО 2011" (Нижний Новгород), Фестивале Варгана на "Пустых Холмах 2011",
    являются участниками проекта "Ночь спонтанного танца - Нижний Новгород", играли
    на серии вечорок "Нижегородский этносейшн". C апреля 2011 в составе группы играет
    Сергей Орлов (Crimson Butterfly): http://vkontakte.ru/crimsonbutterflyband http://crimsonbutterfly.bandcamp.com/'
