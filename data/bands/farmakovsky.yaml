  text: 'Иван Фармаковский родился 1 февраля 1973 г. в Москве. Интерес к музыке проявился
    рано и необычайно выразительно - первые слова "мама" и "папа" Иван не проговорил,
    а пропел, постукивая в такт ладонями. С этого момента вопрос о дальнейшей судьбе
    ребенка для родителей был решен. С 5 лет он занимался в детской музыкальной школе
    при студии Д/К "Москворечье", едва ли не единственном в стране учреждении, где
    джазовая музыка наравне с классической была основной дисциплиной учебного плана.
    Родом же из детства и любовь к футболу, и преданность московскому "Спартаку",
    игры которого юный пианист старался не пропускать.


    Однако, именно увлечение джазом определило дальнейшее творческое направление:
    в 1988 году он поступает на эстрадно-джазовое отделение в музыкальное училище
    им.Гнесиных в класс профессора И.М. Бриля, затем продолжает образование у мэтра
    отечественного джаза в Российской академии музыки им. Гнесиных.


    Профессиональную концертную деятельность Иван Фармаковский начал еще в студенческие
    годы в качестве лидера своего ансамбля - с музыкантами Алексеем Николаевым (тенор-саксофон),
    Антоном Ревнюком (бас) и Дмитрием Севастьяновым (барабаны). Первые выступления
    этого квартета на столичных площадках, поездки на международные джазовые форумы
    и фестивали в России и за рубежом Иван совмещал с сочинением собственной музыки.
    В 1991 году музыкант в составе лучших студентов (среди них - А. Николаев (тенор-саксофон),
    И. Иванушкин (бас), Я. Окунь (фортепиано, барабаны)) вместе с педагогом по ансамблю
    Н.Л. Батхиным приглашен в летнюю джазовую школу в г. Дублин (Ирландия), которой
    руководил выдающийся американский саксофонист Дэйв Либман. В 1994 году - награжден
    1-ой премией на II Всероссийском конкурсе джазовых исполнителей в Ростове-на-Дону.
    В 1997 году творческий союз Фармаковского, Николаева, Ревнюка, Севастьянова, исполнявший
    в основном композиции Ивана, стал лауреатом международного джазового конкурса
    в Бельгии "Europe Jazz Contest". Московская концертная жизнь протекала в прежнем
    русле на нескольких джазовых площадках, где молодой артист выступал как с друзьями-однокурсниками,
    так и в качестве сайдмена, пианиста ритм-секции, аккомпанирующего известным джазовым
    музыкантам.


    Признание и известность пришли к Ивану после сольного концерта с великим саксофонистом
    Бенни Голсоном (зал Дома Союза Композиторов, 1998 г.). С этого момента, по словам
    музыканта, "наступила новая пора - пора зрелости и становления". Буквально через
    пару дней Игорь Бутман, который присутствовал на концерте, пригласил Ивана в свой
    ансамбль. С этого времени Иван стал участником квартета, а позже и Биг-Бэнда Игоря
    Бутмана. Затем наступила эпоха "Ле Клуба", легендарного московского джаз-клуба,
    в котором за время его существования выступило множество всемирно известных джазменов
    - со многими из них Ивану удалось играть на одной сцене.


    Круг музыкантов, с которыми выступал и продолжает сотрудничество Иван Фармаковский,
    впечатляет. Среди известных американских исполнителей - Бенни Голсон, Джек ДеДжонетт,
    Крисчен МакБрайд, Куртис Фуллер, Ренди Брекер, Бил Эванс, Уинтон Марсалис, Эл
    Джеро, Райан Кайзор, Крейг Хэнди, Шеймус Блейк, Винсент Херринг, Эрик Мариенталь,
    Джо Локк, Рон Афиф, Бэн Шер и другие.


    Из наших соотечественников - Валерий Пономарев, Станислав Григорьев, Виктор "Арзу"
    Гусейнов, Алексей Кузнецов, Анатолий Соболев, Герман Лукьянов, Игорь Бутман, Алекс
    Сипягин, Александр Ростоцкий, Владимир Данилин, Георгий Гаранян, Виктор Епанешников,
    Давид Голощекин и многие другие.


    В 2009 году Иван Фармаковский выпустил в качестве бэндлидера и композитора дебютный
    альбом, записанный в одной из самых известных студий Нью-Йорка, "Sear Sound",
    в составе интернационального квинтета. Райан Кайзор (труба), Игорь Бутман (тенор-саксофон),
    Угонна Окегво (контрабас), Джин Джексон (барабаны) - вот имена тех всемирно известных
    музыкантов, которые приняли участие в записи альбома Ивана Фармаковского "Next
    To The Shadow", явившим собой индивидуальный подход музыканта к традиционному
    хард-бопу и джазовому мейнстриму. Альбом был по достоинству оценен как российскими
    джазовыми знатоками, так и западными критиками.


    Следующий творческий этап не заставил себя долго ждать: после успешного выступления
    квартета Ивана Фармаковского с саксофонистом Дмитрием Мосьпаном, басистом Антоном
    Ревнюком и барабанщиком из США Дональдом Эдвардсом на фестивале "Триумф Джаза
    2010" коллектив записал новый альбом с лиричным названием "The Way Home" ("Дорога
    Домой"), который вышел летом на лейбле Butman Music и презентация которого состоится
    в ноябре 2010 года. В альбом вошли как авторские композиции Ивана Фармаковского
    и Дмитрия Мосьпана, так и джазовые аранжировки Фармаковского на известные советские
    песни.


    Сейчас пианист выступает на российских концертных площадках с новой программой,
    состоящей из собственных композиций Фармаковского и джазовых аранжировок на всеми
    любимые песни советских лет в трио c Антоном Ревнюком (контрабас) и Алексеем Кравцовым
    (барабаны).'
