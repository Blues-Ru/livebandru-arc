  header: FelisBand
  text: 'Группа FelisBand образовалась летом 2014 года в Москве, и уже с самых первых
    выступлений сумела заявить о себе как о ярком явлении на столичной клубной сцене.


    Впечатляет стилистическое разнообразие репертуара группы - здесь и свинг, и блюз,
    и соул, и фанк, и шаффл, и проникновенные баллады, и зажигательные афро-карибские
    и латиноамериканские ритмы.


    На концертах коллектива традиционные афроамериканские песнопения - спиричуэлс
    и госпелы - сменяются классическими джазовыми темами и популярными хитами мировой
    эстрады разных лет в джазовом прочтении. И все это в необычных, подчас экспериментальных
    аранжировках - которые, однако, не нарушают традиций, а как бы расширяют и обогащают
    их.


    В составе группы опытные профессиональные музыканты - но мастерство здесь не выставляется
    напоказ, превращая джаз, как это часто бывает, в подобие спортивных соревнований,
    а служит лишь средством создания неповторимой, завораживающей атмосферы звучания.


    Звуки инструментов - барабанов, гитары и бас-гитары - сплетаясь в единое целое,
    несут в себе главную изюминку коллектива - голос загадочной Felis с необычным
    тембром и яркой, эмоциональной подачей.


    Все это позволяет слушателю в, казалось бы, знакомых, уже многократно исполненных
    произведениях увидеть новые стороны, почувствовать неожиданные грани и открыть
    для себя свежие музыкальные образы.'
