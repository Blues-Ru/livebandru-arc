  text: Группа Foggy Dew была основана в 1999 году в Ростове-на-Дону. Группу основал
    певец и музыкант Александр Джалашов. Основным направлением в работе коллектива
    является исполнение ирландских народных песен (пивных, патриотических песен, баллад
    и танцевальных композиций). Отличительной особенностью коллектива является исполнение
    ирландской музыки с использованием исключительно ирландских инструментов и традиционных
    аранжировок, что выделяет Foggy Dew как единственную российскую группу, исполняющую
    традиционную ирландскую музыку.
