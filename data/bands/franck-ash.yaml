  header: Знакомьтесь - Franck Ash
  text: 'Фрэнк Эш (Franck Ash), привлеченный с юных лет "черной" музыкой и вообще
    американской культурой, уже к 12 годам развил в себе способности к пению и игре
    на гитаре. Его любовь к музыке развивалась с детства, продолжалась в юности -
    в 1985 Фрэнк стал профессиональным музыкантом.


    В 1986 он был нанят играть на разогреве у одного из ведущих американских блюзменов
    - Лютера Эллисона (Luther Allison). В 1988 Фрэнку был присужден приз в знаменитом
    Нью-йоркском APPOLLO ТНЕАТRЕ за победу в Amateur Night Show (Эмэтор Найт Шоу),
    и с тех пор он частый гость этого шоу. После нескольких выступлений на фестивале
    в Гарлеме Фрэнк получил возможность выступать в ведущих блюз-клубах Нью-Йорка.
    Это, в свою очередь, привело к серии интервью на NВС в Нью-Йорке и АВС в Калифорнии.


    Наряду с концертами в Нью-Йорке Фрэнк Эш регулярно выступал в клубах и на фестивалях
    по всей Европе. Кроме того его пригласили играть на разогрева у легендарного Доктора
    Джона (DОСТОR JOHN).


    Наряду с совершенствующимися навыками профессионального исполнителя, Фрэнк обнаружил
    в себе способности к сочинению собственных пьес. В 1993 году французский режиссер
    Доминик Мой (Dominik Moll) подписал с Фрэнком контракт на сочинение и исполнение
    саунд-трека для своего знаменитого фильма INTIMITE.


    В 1994 выступление Фрэнка в New-Morning Club в Женеве было отснято для телевидения
    и неоднократно транслировалось европейскими каналами МСМ и Muzzik TV. В 1995 году
    Роберт Крэй (RОВЕRТ СRАY) подписал с Фрэнком контракт на поддержку своих выступлений
    в ходе своего "Some Rainy Morning Tour". Наряду с выступлениями со своей собственной
    группой, Фрэнк работал в качестве гитариста и лидера группы великого Скримин Джея
    Хоукинса (SCREAMIN'' JAY HOWKINS), работа с которым включала выступление на 13-м
    Блюзовом Фестивале в Чикаго (13-th СНIСАGО Вlues Fest) в 1997 году, запись альбома
    "AT LAST" в Мемфисе и концерт в знаменитой Парижской Олимпии, записанный и изданный
    в виде альбома "LIVЕ АТ ТНЕ OLYMPIА" и продолжалась вплоть до самой смерти Скримин
    Джея в феврале 2000.


    В 1996 году Фрэнк Эш появился в телевизионной программе церемонии закрытия Олимпийских
    игр в Атланте. Там же были записаны несколько интервью с Фрэнком и состоявшееся
    в ходе гала-концерта живое выступление Фрэнка. Вышедший в 1999 году дебютный альбом
    Фрэнка "ТНIS МUST ВЕ LOVЕ" повсеместно получил высокую оценку критиков и получил
    награду French Academy of Jazz, а сам Фрэнк в 2000 году получил награду EUROBLUES''a
    как ВЕSТ ЕURОРЕАN АRTISТ.


    На протяжении своей более чем 25-летней профессиональной карьеры Фрэнку довелось
    поиграть со многими легендами блюза, среди которых, кроме упомянутых выше, Тадж
    Махал (Taj Mahal), Роббен Форд (Robben Ford) и Мэджик Слим (Magic Slim)


    Полные энергии и драйва, виртуозные выступления Фрэнка на многочисленных блюзовых
    и джазовых фестивалях Европы и Северной Америки снискали Фрэнку любовь и преданность
    поклонников. Фрэнк продолжает расширять и совершенствовать свой уникальный и разнообразный
    репертуар - наряду с классикой жанра он исполняет на фестивалях и в клубах собственные
    композиции и находит время для работы в студии.


    В 2003 году вышел его альбом "ВЕYОND ТНЕ СLOUDS " с авторскими композициями Основой
    уникального, неповторимого, отличающегося оригинальным звучанием, стиля Фрэнка
    Эша являются блюз в органичном сплаве с соул, ритм-энд-блюзом и фанком.


    Открыть для себя все лучшее, чего смог добиться в своем творчестве Фрэнк Эш, можно
    прослушав его вышедший в 2011 году концертный альбом "Caught In The Act - Live
    In London", подтверждающий его статус одного из самых интересных и самобытных
    блюзменов современной Европы.


    Фестивали, в которых принял участие Фрэнк Эш


