  header: Пятое пришествие
  text: 'В первые два своих визита в Россию - в феврале и в октябре 2013 года Фрэнк
    Эш - бывший бэнд-лидер Лютера Эллисона и Скимин-Джея Хокинса, любимец публики,
    герой блюз-рока и фанка, гитарист-виртуоз и одаренный соул/блюз певец объездил
    с аншлаговыми концертами города Золотого Кольца - Ярославль, Кострому, Рыбинск,
    Череповец, Углич, Иваново, а также выступил в Москве, Тюмени и Сургуте.


    Третье пришествие Фрэнка состоялось в конце мая 2016 года и стало возможным благодаря
    тому, что его забукировали в качестве одного из хэдлайнеров XI Международного
    Фестиваля "Архангельск-BLUES". Тур начался в Ст.Петербурге в рамках праздования
    Дня Города. Программа на три дня пребывания в Питере - интервью и выступление
    на Радио IMAGINE, концерт в клубе Jimi Hendrix, выступления на круизном теплоходе
    под разводными мостами, концерт в ресторане-клубе "Портъ-АртурЪ". После своего
    хэдлайнерского выступления на Фестивале "Архангельск-BLUES", Фрэнк Эш отправился
    в Москву, где выступил на Радио МАЯК и дал большой концерт на сцене концертного
    зала ЦДХ.


    Спустя 16 месяцев, в следующий, четвертый приезд в конце октября 2017 года Фрэнк
    отыграл несколько клубных концертов в Москве, один из которых был профессионально
    снят на видео для последeющего издания.


    Пятый российский тур Фрэнка с успехом прошел в конце декабря 2019 года.


    В апреле 2022 года Фрэнк Эш приедет в Россию с концертами в шестой раз. Презентация
    нового релиза ''Franck Ash & Friends, Live in Moscow'' в формате DVD/2CD сотоится
    на концертах Фрэнка в Москве и Ростове-на-Дону.


    Не пропустите!'
