  header: Интервью Franck Ash к осеннему туру 2013.
  text: '- Фрэнк, это будут твой второй визит в Россию и второй тур. Твои ожидания
    изменились с прошлого раза?


    Да нет... те же ожидания. Надеюсь, мне посчастливится, и люди снова придут на
    мои концерты, и я смогу снова разделить с ними все эти особые моменты сопереживания
    и сотворчества. В прошлом туре публика была очень добра ко мне - мне не забыть
    теплый прием в Москве и в туре по "Золотому кольцу".


    - А чего конкретно ты ждешь от нового этого тура?


    Ну, я надеюсь, что жажда слушать по настоящему живую музыку по-прежнему велика.
    Жду новую и "старую" публику. Надеюсь увидеть много знакомых лиц.


    - Что ты можешь сказать о музыкантах, с которыми будешь играть в новом туре?


    Жаль, что Алекс Бояринцев из Рыбинска, очень талантливый клавишник, техничный,
    который играл со мной весь прошлый тур, не смог сопровождать меня в этом туре.
    Поэтому в это раз я изменил конфигурацию группы на "POWER TRIO. Я частенько использую
    такой формат и мне нравится энергия, точность в подробностях, чистота и прозрачность
    звука, не перегруженного звучанием многочисленных инструментов, и, конечно же,
    свобода, которую дает мне, как солисту такой формат. Барабанщик Саша Половинкин
    - я играл с ним всего несколько песен в качестве гостя джема в Ритм-Блюз Кафе
    и сразу почувствовал его грув и энергию. Могу с уверенностью сказать, что он очень
    техничный, драйвовый барабанщик.. Эффективный. Не красуется, а играет. Мне с ним
    комфортно, похоже, мы чувствуем на сцене те же грувы и биты, и он понимает мои
    импровизации. Галя Киселева - поющая басистка, с которой мне так же довелось сыграть
    всего пару песен в том же джеме в Ритм-Блюз Кафе. Этот тот случай, когда сразу
    чувствуешь взаимопонимание и взаимопритяжение. Мне показалось, она чувствует то
    же самое. А еще у нее хорошая школа и она легко и изящно импровизирует. В данном
    случае можно сказать, что "Меньше - это больше!" Посмотрим, как все пройдет. Думаю,
    получится отличный состав. Ожидаются специальные гости.


    - Какова твоя миссия?


    Миссия? Да, ладно!... Я музыкант, на каждом концерте я выкладываюсь, делаю все
    возможное, чтобы достучаться до каждого из зрителей. Каждый вечер я хочу показать
    публике все лучшее, на что я способен, и если это не удалось... значит я недостаточно
    выкладывался... Если ты называешь "миссией" стремление хорошо играть хорошую музыку
    - ОК, тогда это моя миссия, это то что я делаю уже больше 25 лет и намерен делать
    и впредь. Это моя работа, и она мне нравится.


    - Почему для тебя важно приезжать в Россию снова и снова?


    Россия - огромная страна, а я пока видел так мало. Мне всегда было интересно приехать,
    но вот что-то раньше не складывалось... Теперь, если не считать волнующего полета
    в Сибирь, весь тур пройдет в Москве и, надеюсь, в Ст.Петербурге. После поездки
    по городам "Золотого Кольца" я долго рассматривал карту России и понимаю, что
    есть еще множество мест, куда можно поехать. Я и приеду снова и снова. - Каковы
    наиболее яркие впечатления из первой поездки по России? И что было самым худшим?
    Пожалуй, главное, это реакция публики. Я помню невероятно теплый прием, который
    мне устроила публика в Рыбинске, Угличе, Костроме и Иваново - народ, похоже, не
    избалован там частыми визитами музыкантов из Европы или Штатов. Надеюсь все же,
    что теплый прием я заслужил не "происхождением", а своей музыкой и работой на
    сцене. Справедливости ради надо сказать, что хорошо принимали меня везде, где
    мне довелось играть. А худшее впечатление - от российских дорог...


    - Фрэнк, ты много гастролируешь по миру и довольно опытный путешественник. Как
    считаешь, ты смог бы самостоятельно обследовать достопримечательности центра Москвы
    или тебе понадобится гид?


    В туре ты один день здесь, другой там - перед глазами калейдоскопом проносятся
    впечатления. Ты не так долго в каждом городе, чтобы иметь возможность рассмотреть
    подробности и привыкнуть к обстановке настолько, чтобы начать ориентироваться.
    На самом деле у меня не совсем благополучно с "чувством направления" - даже в
    Лондоне, в местах, где я раньше не был, я легко теряюсь. Выручает только GPS-навигатор.
    Едва ли я смогу исследовать Москву самостоятельно и мне определенно понадобится
    гид. Более того, я совсем не читаю и не говорю по-русски (во всяком случае пока)
    и совершенно теряюсь в московском метро. Не знаю куда идти и как спросить, если
    потеряюсь...


    - Что интересного удалось увидеть в прошлый раз, и есть ли место, куда ты непременно
    хотел бы сходить?


    Из прошлого тура остались в памяти бескрайние заснеженные просторы севера России
    и живописные храмы и домики в деревеньках по дороге из одного города в другой.
    В этом туре я достаточно много времени проведу в Москве - хочу побольше увидеть.
    Почувствовать дух истории этого великого города. В прошлый раз было слишком холодно,
    чтобы подолгу оставаться на открытом воздухе - было не до достопримечательностей.
    Надеюсь, удастся восполнить этот пробел.


    - Есть ли что-то, что тебе особенно хотелось бы увидеть, почувствовать или пережить
    в России?


    Люди говорят "на другой стороне - и трава зеленее". Увидит ли Россия во мне новую
    восходящую звезду на международной блюзовой сцене? Ладно, шучу. Интерес, внимание
    публики к тому, что я делаю в музыке, как я выступаю на сцене, всегда вдохновляли
    меня. То, как меня принимают в России, то, что промоутеры и владельцы заведений
    приглашают меня снова, вселяет уверенность, что меня ждут, что моя музыка нужна.
    И я благодарен за это и публике, и промоутерам, и клубам. Возможно, однажды организаторам
    фестивалей захочется пригласить меня, и я сыграю для еще большего числа людей.
    Поживем - увидим.'
