- id: 445
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'FunCOOLio - коллектив из Латвии, исполняющий музыку в стиле Instumental funk
    / fusion / acid jazz. Год основания: 2007. Название коллектива состоит из двух
    слов: "funk"- (название стиля) и "Coolio" - известный R''n''B исполнитель, популярный
    в 90-х годах ХХ века. Музыканты FunCOOLio имеют опыт работы в известных латвийских
    коллективах: Dandelion Wine, оркестр русских народных инструментов "Садко", Labveligais
    Tips, Keksi, Mirage Jazz Orchestra. Ансамбль исполняет свои оригинальные композиции
    используя уникальный звук органа Хаммонда (Hammond organ) а также эффекты и структуру
    композиций, применяемые в электронной музыке. Харизматичные рижане знают толк
    в музыкальных коктейлях - именно поэтому стилистически их можно отнести именно
    к фьюжну. Смело экспериментируя с пропорциями, они смешивают фанк, джаз, босса-нову
    и множество других направлений, что чревато талантливейшими импровизациями, крепкой
    сценической сцепкой и неминуемо задорной атмосферой, царящей на их выступлениях.
    Они ловко сочетают техническую академичность и доступность формы, уверенно балансируя
    между музыкой для ушей и тела - не танцевать на их концертах очень сложно. Не
    влюбиться в их обаяние - невозможно. Дебютный альбом коллектива увидел свет 9
    августа 2014 года. Впервые был представлен широкой публике на джазовом фестивале
    "Jazz in the Ruins 2014" в городе Гливице (Польша). Альбом номинирован на Латвийскую
    Национальную Музыкальную премию "Золотой микрофон 2014" в категории "Лучший джазовый
    альбом". В 2015 году FunCOOLio участвали в проекте „Made in Latviа: Jazz/Funk".
    Целью данного проекта является аранжировка в стиле Jazz/Funk песен известных латвийских
    композиторов (Prata Vetra, Instrumenti, Lauris Reiniks, Dzelzs Vilks и др.). В
    этом же году запланирован выпуск CD, состоящего из аранжировок песен в исполнении
    ведущих групп Латвии в стиле Jazz/Funk.'
