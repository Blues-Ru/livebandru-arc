  text: Группа "Гастарбайтер Блюз" образована в Липецке в январе 2000 года. Олег Федченко
    (барабаны) и Роман Застрожин (губная гармоника, вокал), слушая в автомобиле записи
    Мадди Уотерса, приняли решение собрать коллектив, играющий блюз. Кроме вышеназванных
    музыкантов в группу вошли Владимир "Солдат" Сокольский (бас-гитара) и Сергей "Петрович"
    Казьмин (гитара). В таком составе группа появилась перед публикой "на разогреве"
    выступления коллектива Бориса Булкина Stainless Blues Band (Москва) 23 декабря
    2000 года в клубе "Ночной квартал", после чего, спустя месяц, Владимир Сокольский
    уехал в Москву, а Сергей Казьмин на некоторое время оставил музыку. На смену им
    в группу пришли Александр "Граф" Чеботарев (бас - гитара) и Дмитрий Кравченко
    (гитара). В этот период, во время одной из посиделок на кухне и появляется название
    "Гастарбайтер блюз", так как все музыканты, играющие в коллективе, скорее всего,
    и были гастарбайтерами от блюза. После некоторого количество успешных концертов
    в Липецке, группу покидает Александр "Граф" Чеботарев и ему на смену приходит
    Валерий "Нос" Лазарев. В этот же период в коллектив приходит Кирилл "Мазл" Голиков
    (вокал). Успешная концертная деятельность вновь была прервана, в связи с отъездом
    Валерия Лазарева в Москву. На смену ему приходит Денис "Пэпс" Нечаев, затем Максим
    "Макс" Катрук, а спустя некоторое время, Дмитрий "Еж" Григорьев меняет у микрофона
    Кирилла Голикова. Бесконечная смена бас-гитаристов продолжилась - на смену Максу
    приходит Алексей Калягин, которого, в свою очередь, меняет Юрий Мантуров. В таком
    составе группа дает несколько успешных концертов в Липецке, Воронеже, Харькове
    после чего группу покидает Юрий Мантуров. Бас-гитара оказывается в руках у Гордея
    Харитонова, затем у Сергея Калинкина. С новым бас-гитаристом группа выступает
    в Воронеже, Одессе, Харькове, Белгороде, Москве, Донецке, Киеве, Рязани, Ростове-на-Дону,
    Краснодаре не забывая и про родной город.
