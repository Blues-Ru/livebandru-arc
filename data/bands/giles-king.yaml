  text: 'Многократный номинант на British Blues Awards, Джайлз Кинг заслуженно считается
    одним из лучших блюзовых исполнителей Великобритании, который записывался и гастролировал
    с "Lightnin" Willie & Poorboys и Hokie Joint среди прочих. Он начал свою карьеру
    более двадцати лет назад, когда присоединился к знаментиому на весь Лондон джему
    в Weavers Arms, где играл с такими блюзменами, как Иэн Сигал, Мэтт Скофилд, Эрл
    Грин, Юджин Хайдэуэй Бриджес, Сэм Хэар и др.


    Лайтнин Вилли, планируя в конце 90-х свой первый тур по Великобритании, попросил
    Джайлза присоединиться к его гастрольному коллективу. Партнерство продолжалось
    почти десять лет и привело к хэдлайнерским выступлениям на фестивалях Stanley
    Blues, Colne Blues Festival, Burnley Blues Fest и многих других. Позднее, Джайлз
    имел честь выступить на сцене легендарного BB King Blues Club в Голливуде, а осенью
    2014 года отправился в Лос-Анджелес, чтобы записать свой альбом "Tracks".


    Как участник Hucklebuck, Джайлз резидентно выступал в знаменитом блюзовом клубе
    "Ain''t Nothing But..." в Лондоне, а также в турах по всей стране. Он записывался
    со многими ведущими артистами Британии, в том числе с Иэном Сигалом на его альбоме
    "Meat & Potatos", с первым гитаристом Jethro Tull Миком Абрамсом и гитаристом
    The Hoax Джоном Эймором, регулярно выступал на BBC в шоу "Drive Time" Джона Уолкера
    и программе Paul Jones Blues, а во время американских гастролей - на многих радиостанциях
    по всей Америке.


    "Чего этот парень не знает о гармонике, не стоит знать" Blues In Britain Magazine
    Выступавший недавно в клубе "100" Иэн Сигал, представил Кинга в качестве гостя
    шоу, как самого одухотворенного исполнителя на гармонике в стране. Пол Джонс,
    радиоведущий BBC Radio 2, неоднократный обладатель British Blues Awards как лучший
    блюзовый харпист, сказал о Джайлзе Кинге: "Чудесная эмоциональная гармоника, великолепный,
    очень индивидуальный тон, и все такое" Кинг, шестикратный номинант и обладатель
    British Blues Awards наряду с такими мастерами, как Пол Лэмб, Пол Джонс, Уилл
    Уайлд и Джайлз Робсон, набирает очки в качестве потенциальной легенды блюзовой
    гармоники, неизменно демонстрируя эмоциональность, артистизм и ураганную подачу,
    собственный узнаваемый стиль во всем техническом блеске.


    Джайлз Кинг и его старая группа Hokie Joint в 2007-2015 гг часто выступали на
    фестивальных сценах в Британии и Континентальной Европы, в 2014 Hokie Joint подписала
    контракт с голландским звукозаписывающим лейблом Coolbuzz, который перевыпустил
    дебютный альбом ‘The Way It Goes.. Sometimes''


    В 2017 году Джайлз гастролировал по Великобритании в удостоенной наград театральной
    постановке The WHO "Тоmmy", где он играл за Пита Таунсенда.


    В настоящее время Джайлз выходит на сцену в качестве фронтмена собственной группы
    Goofa Dust, заканчивает запись дебютного альбома, выход которого намечен на начало
    лета 2019 года, а также играет в туре с сыном Мадди Уотерса Мадом Морганфилдом.


    Это первый приезд Джайлза Кинга в Россию. Не пропустите!'
