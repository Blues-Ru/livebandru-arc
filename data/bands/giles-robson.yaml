  text: 'Джайлз Робсон - лидер группы "Giles Robson & The Dirty Aces" - один из самых
    ярких британских блюзовых гармонистов последних лет. Авторитетные критики ставят
    его, что называется, на одну доску с такими звездами, как Пол Лэмб, Джайлз Кинг
    и Пол Джонс. В 2012-м он был назван лучшим британским харпистом в результате опроса,
    проведенного среди критиков журнала Blues Matters, а в 2014 вновь номинирован
    на British Blues Awards. В январе 2014го Джалз Робсон открыл аншлаговымим концертами
    в Москве и Питере программу фестиваля The Great BRITISH RHYTHM&BLUES INVASION
    Festival http://www.hotdraftproductions.com/ С тех пор прошло почти пять лет -
    за это время его пути с Грязными Тузами разошлись, Джайлз набрал новый состав,
    записал и выпустил в 2016 году дебютный сольный альбом, горячо принятый публикой
    и критиками, много гастролировал, в том числе и в России, причем сразу же после
    своего аншлагового выступления на LONDON Blues Fest-2016 на престижной О2 Arena!
    В апреле 2017 он вновь приезжал с новой программой и отыграл несколько концертов
    в Питере, Москве и Дубне с московской группой Folkline. В декабре того же года
    с успехом прошел четвертый тур Джайлза Робсона. А уже в январе Джалз улетел в
    Нью-Йрк, чтобы в студии в Вудстоке записать акустический альбом традиционного
    акустического блюза с мульти-номинантом на Grammy Awards гитаристом и певцом Джо
    Луисом Уокером и прославленным блюзовым/джазовым пианистом Брюсом Катцем. Вышедший
    в сентябре 2018 альбом Journeys to the Heart of the Blues плотно ротируется на
    радио по обе стороны Атлантики и стал одним из претендентов на престижную Blues
    Music Awards 2019 года, причем сразу в двух номинациях, в одной из которых "Лучший
    Альбом Акустического Блюза" награду получил! Новый, записанный в Штатах альбом
    Робсона Don''t Give Up on the Blues, вышел в сентябре 2019 и еще до официального
    релиза собрал ворох восторженных рецензий и вошел в пятерку самых продаваемых
    блюзовых альбомов на сайте Amazon.


    Почитаем прессу последних трех-четырех лет:


    "Герой блюзовой гармоники Британии!" Classic Rock Blues Magazine


    "Феноменальный талант!... Робсон - лидер в равной мере и популяризации блюзовой
    гармоники среди молодого поколения, и продолжатель славной традиции, способный
    удовлетворить вкусы знатоков, он - маэстро гармоники на вершине успеха" Blues
    Revue, USA


    "Козырной туз в колоде, неубиенный козырь британского блюза" Ruta 66, Spain


    "Сплав превоклассного исполнения на гармонике с отвязным ритм-блюзом" рецензия
    в Classic Rock на студийный альбом For Those Who Need the Blues, попавший в 10
    лучших блюзовых альбомов 2016 года


    "Да это же Джо Бонамасса блюзовой гармошки!..." Musicopolis, Spain


    "Один из лучших исполнителей на гармонике, каких только видел свет! Точка." The
    Blues Kitchen, Camden, London


    "Блюзовое сообщество признало Джайлза Робсона Новым Мастером блюзовой гармоники,
    и мне остается только согласиться" Back To The Roots, Belgium


    "Исполнение Джайлза феноменально и совершенно своеобразно, и ставит его в ряд
    самых великих харпистов не планете" Music In Belgium.


    "Мне нравятся великие исполнители на гармонике. И Джайлз Робсон - один из них"
    Sugar Blue, обладатель Grammy


    "Гармоника Джайлза Робсона может быть охарактеризована как "изысканная". Этот
    парень наверняка может стать лучшим харпистом на блюзовой сцене. The Dirty Aces
    - очуменная команда! Kак только вы слышите их, то сразу же понимаете редкостную
    добротность. Они умудрились ухватит самую суть блюза, не впадая в маньеризм подражательства"
    The Daily Express'
