  text: 'Знаменитый кубинский пианист, которого называют "одним из лучших приобретений
    американского джаза 1990-х годов".


    Гонсало родился в Гаване 27 мая 1963 года в семье музыкантов. Его отец - пианист,
    композитор и бэндлидер Гильермо Рубалькаба играл в оркестре Энрики Джорин, создателя
    ча-ча-ча; его дедушка Якобо Рубалькаба был композитором, и два его брата тоже
    были музыкантами. Гонсало, одаренный ребенок, уже в возрасте 6 лет играл на ударных
    в оркестре у своего отца, а игре на пианино начал обучаться двумя годами позже,
    как он однажды сказал в воспоминаниях, чтобы "просто порадовать свою мать".


    Пианист и композитор Гонсало Рубалькаба уже был молодым феноменом с многообещающей
    карьерой на его родной Кубе, когда в 1985 году его открыл Диззи Гиллеспи. В 1999
    году журнал "Piano & Keyboard" признал его одним из лучших пианистов 20 века,
    наряду с такими фигурами как Гленн Гульд, Марта Аргерих и Билл Эванс. Взяв два
    Грэмми и два Латинских Грэмми, он утвердился в мире джаза.'
