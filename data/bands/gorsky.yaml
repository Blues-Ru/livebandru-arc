  text: 'Группа "Квадро" создана в 1984 году в городе Москве известным джазовым пианистом
    и композитором В.Горским, который с 1977 по 1983г. был клавишником и музыкальным
    руководителем джаз-рок ансамбля "Арсенал" (Худ. рук.- Алексей Козлов) Группа очень
    быстро завоевала популярность, как в России, так и в других странах Европы и Азии.
    Постоянно гастролирует, принимает участие в международных фестивалях джазовой
    музыки: в Токио, Париже, Варшаве, Берлине, Братиславе, Будапеште, Стамбуле, Москве,
    Киеве, Петербурге, Киеве. Состав группы менялся, но неизменно сохранялся высочайший
    профессиональный уровень музыкантов.


    Cтилистический диапазон коллектива очень широк - это некий сплав таких музыкальных
    направлений, как: джаз, рок, фанк, латино, классика и этническая музыка. Но основой
    всех композиций группы является яркая, запоминающаяся мелодия и, несомненно, живая
    и виртуозная импровизация


    "Квадро" - частый гость популярных теле- и радиопрограмм. В репертуаре коллектива
    композиции: Stanly Clarke, Herbie Hancock, Keith Jarrett… Но большинство композиций
    принадлежит В. Горскому, который по рейтингу музыкального агентства "Интермедиа"
    и "Турне" назван лучшим клавишником России 1994-2004 гг. Также его имя упоминается
    в Мировой антологии джаза, изданной в 1991 году в Нью-Йорке.


    Коллектив выпустил несколько пластинок и компакт-дисков. Постоянно гастролирует
    по России и Европе, Азии и США.'
