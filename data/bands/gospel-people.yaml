  header: The Gospel People - Золотой Состав Гарлемского Хора - "Исторический тур"
    - Большое Вокальное Шоу
  text: '"Это шоу можно сравнить только с мощнейшей океанской волной. С первых нот
    музыка переворачивает твое сознание с ног на голову! Кем бы ты ни был - ты влюбишься
    в Госпел. Ты захочешь окунаться в этот неистовый океан звуков снова, и снова,
    и снова... а затем просто откажешься выходить на берег". - Арета Франклин, певица.


    "The Gospel People" - музыканты, с которыми Пол МакКартни перезаписывал легендарный
    альбом "Yellow submarine".


    "The Gospel People" - потрясающие вокалисты, которые неоднократно выступали на
    одной сцене с такими знаменитостями, как Дайана Росс, Аврил Лавин, U2, Гарри Белафонте,
    Синди Лаупер, "Gorillaz" и прочими артистами, которые ценят, любят, и сами часто
    исполняют заводные хиты в стиле Госпел.


    Можно с уверенностью сказать, что на этой музыке вырос весь мировой шоу-бизнес.
    Лайонел Ричи и Стиви Уандер, Арета Франклин и Уитни Хьюстон, Майкл Джексон и Кристина
    Агилера... Список артистов, которые учились петь по нотам евангельских мелодий
    - поистине огромен. Но единственное имя, которое сегодня достойно пристального
    внимания: "The Gospel People". Начиная с 1986 года эта потрясающая вокальная компания
    показывает всему миру - как должен звучать настоящий американский Госпел. Дебют
    коллектива в легендарном джаз-клубе Нью-Йорка "Cotton Club" был встречен, как
    праздничный салют: криком восторженной толпы. С тех пор - музыканты ни разу не
    разочаровали уважаемых зрителей. Во время своих выступлений, "The Gospel People"
    демонстрируют публике сам дух джаза, его историю, его прошлое и будущее. Все это
    Госпел. Музыка, с которой чернокожие американцы когда-то протягивали руки в молитвах.
    Музыка, с которой сегодня люди всех цветов кожи протягивают руки друг другу и
    взамен получают только радость и счастье. Энергичная, сильная, заводная, закрученная
    в божественном свинге - музыка, покорившая каждого, кто однажды своими ушами слышал
    евангельский хор. Такие великие хиты, как "Amazing Grace" или "Oh, Happy Day"
    - одним своим названием запускают в памяти саундтрек из любимых кинофильмов. Достаточно
    вспомнить супер кассовую кинокомедию с Вупи Голдберг "Действуй Сестра"! Школьный
    хор тогда вырвал победу на национальном конкурсе именно с этими шедеврами в стиле
    Госпел. Есть они и в репертуаре "The Gospel People"!


    "Черные сливки Нью-Йорка" - так сегодня называют уникальных артистов из "The Gospel
    People". Все они - жители Гарлема, центра евангельской музыки США. Ведь изначально,
    госпел - это музыкальное обращение к Богу. Обращение в стиле блюз. Но музыка развивается
    и сегодня в любой церкви Гарлема можно запросто услышать не только Блюз, но даже
    RAP и R&B. Именно из этих церквей и были отобраны солисты лучших евангельских
    хоров, чтобы войти в новый состав "The Gospel People" для участия в мировом туре:
    Дэйдра Валентайн, Оуэн Никсон, Эрнест Вон, Брайтни Джонс, Би Джи Райс-Хаббард,
    Ернест Мередит. Во главе проекта - создатель, музыкальный директор и один из лидеров
    "The Gospel People" Чарльз Грэйт.


    Сегодня в музыкальном истеблишменте его имя знает каждый. Человек на миллион долларов!
    Записи, которые продюсирует Чарльз Грэйт, уже 20-ть лет занимают высшие строчки
    музыкальных госпел-чартов и получают самые престижные награды в своем уникальном
    жанре. С 2012 года весь мир покорила его невероятная программа под названием "Историческое
    шоу".


    В "Историческом Шоу", артисты из "The Gospel People" расскажут историю рождения
    удивительной музыки Госпел. Два часа пронзительных мелодий, которые способны затронуть
    за живое даже самую бесчувственную душу. Мистер Чарльз Грэйт в этом уверен. Он
    уже видел, как это происходит в лучших концертных залах Чикаго, Лас-Вегаса, Нью-Йорка,
    Парижа, Осло, Амстердама, Берлина, Мадрида, Стокгольма, Рима, Праги... И вот,
    наконец, очередь дошла до Москвы.


    "Наслаждайтесь!" Единственное "Историческое Шоу" "The Gospel People" в российской
    столице стоится именно под этим девизом. Любимые певцы трех континентов выйдут
    на сцену Московского Дома Музыки 28 ноября 2013 года. В этот день в Светлановском
    Зале вас будет ждать настоящий живой океан звуков, в который захочется окунаться
    снова, снова, и снова...'
