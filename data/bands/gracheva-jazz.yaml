  text: 'Одна из самых горячих певиц в Москве в настоящее время, Александра Грачева
    электризует аудиторию своей виртуозный техникой и сладкой фразировкой. Изучив
    вокал и фортепиано у лучших практиков из академии Гнесиных, Александра попробовала
    себя на многих музыкальных дорогах: участвовала в экспериментальном трип-хоп проекте,
    записывала джинглы для радио и телевидения, но всегда возвращалась к своей первой
    любви - джазу. Александра сочетает совершенное знание американского songbook со
    способностью легко импровизировать в традиции великих скэт-исполнителей: Эллы
    Фитцджеральд, Бобби МакФеррина и Ди Ди Бриджуотер, а также испытывает огромное
    уважение к более современной музыке нестандартных художников Фрэнка Заппы, Тори
    Амос и Бьорк. Результат этого синтеза стоит того, чтобы его услышать.'
