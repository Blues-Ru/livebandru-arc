reviews:
- id: 426
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Гвин Эштон родился в Уэльсе, в девятилетнем возрасте впервые взял в руки
    гитару, в возрасте 10 лет переехал с родителями в Австралию. В 15 лет создал собственную
    команду и отправился в путь, а уже в 17 лет играл на разогреве у молодых, набирающих
    популярность AC/DC. Записал добрую дюжину альбомов, на которых с ним записывались
    такие звезды, как Дон Эйри (Deep Purple, Whitesnake, Rainbow, etc.), Robbie Blunt
    (ex-Robert Plant), Kim Wilson, Chris Glen/Ted McKenna, Mark Stanway, Brendan O''Niell
    и др. Гвин Эштон объехал весь мир, гастролируя со Status Quo, Гэри Муром, Джеффом
    Беком, играл на одной сцене с Б.Б.Кингом, Бадди Гаем, Рэем Чарлзом, Миком Тэйлором,
    Питером Грином, Робином Трауэром, Рори Галлахером, Джеффом Хили, Джонни Винтером,
    Canned Heat, The Yardbirds, и др.


    Лет 20 назад Эштон вернулся в Британию, записывает собственные альбомы и работает,
    как сессионный музыкант, но он не может подолгу сидеть на одном месте, он непрерывно
    гастролирует по миру - от Штатов, Канады, Аргентины и Бразилии через Западную
    и Восточную Европу до Японии, Австралии и Филиппин.


    Гвин получил несколько номинаций на British Blues Awards, в 2015м его торжественно
    ввели в австралийский Rock''n''Roll Hall of Fame. Гвин желанный гость на многочисленных
    фестивалях по обе стороны Атлантики. Впервые он побывал в России летом 2014го,
    сыграв несколько клубных концертов в Москве и с успехом выступив на фестивале
    Total Flame SUZDAL-Fest.


    В марте 2016 Гвин Эштон вернулся в Европу после двухмесячного тура по Австралии.
    Несколько концертов в Британии, затем продолжительный тур по Континентальной Европе,
    который открылтся концертом в новейшем зале-тысячнике GORS латвийского города
    Резекне в рамках международного блюзового фестиваля Great British Blues Invasion,
    при участии мастера блюзового харпа, кудесника вокала и блестящего шоумена Rollo
    Markee, хорошо известного московской публике, а также литовского блюз-квинтета
    The ROAD Band под предводительством Александра Белкина.


    Апрельский 2016 года визит Гвина Эштона в Москву - уже второе его появление в
    России, он в совместном туре с Ролло Марки дал one-man-band-концерты в Питере
    и Москве.


    С тех пор у Гвина вышло еще три альбома - Ragas, Jugs & Mojo Hands (2016), Solo
    Elektro(2017), Sonic Blues Preachers (2019). С клипом на песню "She Won''t Tell
    Me" c альбома Solo Elektro, Гвин Эштон ворвался на 3е место в престижном Classic
    ROCK Tracks of the Week! https://www.loudersound.com/features/tracks-of-the-week-83


    Гвин Эштон выступает сольно, как one-man-band, а также в дуэте с барабанщиком
    как two-men-blues-army и в составе пауэр-трио (Гитара/вокал/гармоника +бас +ударные).'
