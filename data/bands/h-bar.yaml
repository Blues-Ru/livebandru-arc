  header: 'Группа "H-bar": рок-н-ролл, РГГУ и африканский танец'
  text: Группа "H-bar" играет настоящий рок-н-ролл, блюз и немного кантри, делая все
    это с хорошим драйвом. Харизматичный лидер группы Александр Казанков - легенда
    отечественной кантри-рок музыки, в прошлом участник легендарных групп "Неприкасаемые"
    и "Кукуруза". А вдобавок - преподаватель социальной антропологии РГГУ. Иногда
    исполняет на своих концертах боевой африканский танец. Песни группы на русском,
    английском, испанском, португальском, шведском и венгерском языках. С успехом
    играют блюз- и рок-н-ролл в столичных клубах. Под их музыку хорошо и весело пить
    крепкое пиво, азартно хлопая заводным ритмам.
