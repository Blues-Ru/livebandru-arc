  header: Хокон Хэйе и его сны о Калифорнии
  text: 'Норвежский гитарист Hakon "The Hawk" Hoye (Хокон Хэйе) родился в Осло в 1971
    году. Его отец был музыкантом, поэтому сам Хокон начал играть на саксофоне в 9
    лет, но вскорости переключился на гитару. Блюз всегда был у Хокона любимым жанром,
    и с начала 2000-х он стал активнейшим участником главной блюзовой тусовки Норвегии,
    образовавшейся вокруг клуба Muddy Waters.


    Хокон - мастер традиции, свинга, р-н-б и вест-коаст блюза. Он помешан на Калифорнии,
    говорят, тратит все свои сбережения на то, чтобы пожить там каждый год несколько
    недель. Хокон коллекционирует крутые винтажные гитары и ламповые усилители и знает
    все о старом звуке 50-х.


    У Хокона отличный вкус и чувство стиля, умеренность и умение не спешить, он мастер
    гитарного аккомпанемента, поэтому его все время приглашают популярные солисты
    в качестве сайдмена. Партия Хокона обычно - основа аранжировки, но во многих песнях
    он выходит вперед и тогда, хоть и ненадолго, становится по-калифонийски жарко.
    Во многих составах Хокон сотрудничал с Биллом Трояни, включая постоянное участие
    в Billy T Band с 2007 года. За записанные при участии Хокона Хэйе две пластинки
    Билли Ти Бэнд получил норвежские Грэмми - Spellemannprisen 2010 и 2012.


    Параллельно выступлению в различных группах Хокон получал особое удовольствие,
    играя свои самые любимые песни в собственной The HoneyTones. Вершина этого проекта
    на сегодняшний день - выпущенная в конце 2013 года в соавторстве с Биллом Трояни
    яркая пластинка "''Bout Time". Большинство вещей Хокон и Билл написали вместе,
    и только пара треков - кавера ритм-н-блюза. Пластинка только-только вышла, еще
    горяча и будет представлена 7-го февраля в Москве в Доме у Дороги.


    Концерты Hakon Hoyey и Billy T Band 7-8 февраля 2014 в <a href="http://www.blueshouse.ru">Доме
    у Дороги</a> организованы <a href="https://blues.ru/club/">Клубом Blues.Ru</a>.'
