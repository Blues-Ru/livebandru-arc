  text: 'Группа "HALEO" свои первые песни написала и записала на Кубе, своей солнечной
    Родине, где музыка танец, зажигательные ритмы являются неотъемлимой частью существования.


    И это было не так давно.


    Создавалась группа друзьями и сверстниками по музыкальной школе, друзьями друзей
    по "баррио" и просто талантливыми музыкантами. Желание самовыразиться в музыке
    было столь велико, что преодолевало невозможность иметь настоящие инструменты,
    так бас гитара была воспроизведена по чертежам, найденным в Технике Молодежи,
    ударная установка привлекала внимание, своим разношерстным видом, так как собиралась
    по частям, собранным то тут, то там, да и на одолженных гитарах тоже играли.


    Но время шло, приходили одни и уходили другие, инструменты постепенно принимали
    професиональный уровень, оттачивалось мастерство исполнителей, накапливался материал,
    и вот вышел первый альбом под названием "Libre".


    В 2006 году группа перебралась в Москву вслед за своим лидером - кубинцем с русскими
    корнями. Первые концерты в клубе Б2 принесли ребятам признательность и поддержку
    публики, что еще раз укрепило в сознании, что они на верном пути. Это признание
    можно объяснить родственностью душ таких разных народов, как народы Кубы и России.
    Так или иначе, второй альбом "Caminalo" был принят и востребован.


    Пытаясь определить стиль музыки, группу относят к этно-фолк-фъюжн исполнителям,
    но прежде всего это хорошая музыка, где и драйв, энергетика и харизма льются через
    край, остается только послушать.'
