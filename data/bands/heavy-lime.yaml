  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: Группа Heavy Lime ведет начало исчисления своей жизни с 13 апреля 2012 года.
    По началу музыканты начали играть архаичные дедушкины англоязычные блюзы и рокнроллы,
    но со временем повернули больше в сторону фанка и соула - в целом это все равно
    музыка стареньких 60х, пропущенная через призму участников бэнда. Так же музыканты
    утверждают, что своей музыкой - они передают настроение почтенных и достопочтенных
    лентяев, что и выражено в дебютном альбоме "Domination of Lazyness".
