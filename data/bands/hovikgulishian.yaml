  text: 'Горячий Блюз-рок в исполнении темпераментного южного парня. Овик Гулишьян
    - трудоголик, когда дело касается музыки. Самоучка мульти-инструменталист, певец,
    автор песен, продюсер, летом 2015-го выпустивший крупный релиз, свой первый номерной
    альбом "It''s Still Called The Blues". Несколькими месяцами ранее состоялась премьера
    клипа на одноименную песню, которая вошла в пластинку. В июле 2015 года Овик и
    его группа приняли участие в знаковом для всего российского байк-сообщества VIII
    ежегодном международном блюз-байк фестивале в Суздале. Сегодня певец и гитарист
    является одним из самых востребованных музыкантов своего жанра, с большим успехом
    выступая в родной Москве и по всей России: от Санкт-Петербурга до Сургута, от
    Екатеринбурга до Краснодара.'
