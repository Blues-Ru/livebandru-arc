  header: Российский Блюз - Овик Гулишьян
  text: 'Задаваясь вопросом насколько Блюз популярен в Армении, мы расширили круг
    поиска "наших" любителей Блюза "не у нас". Оказалось, что и среди представителей
    дисапоры есть достойные пропагандисты Блюза. Предлагаем вашему вниманию интерьвью
    с талантливым, ярким человеком, нашим соотечественником - Блюзменом из России
    Ованесом Гулишьяном.


    <b>Кто повлиял на твой музыкальный вкус, и почему именно блюз?</b>


    Такое ощущение, что любовь к этой музыке была просто заложена в меня. Природу
    этого феномена я не знаю, т.к. никакого прямого и косвенного отношения к блюзу
    я не имею. Но эта музыка трогала мое сердце еще тогда, когда я даже не совсем
    понимал, что это такое. Мне было лет 6-7 когда я случайно наткнулся на новостной
    сюжет про толстого дедушку с большой черной гитарой. Очень ясно помню это событие.
    И в конце сюжета (по всем канонам ТВ) шeл небольшой лайв концертной записи, секунд
    на 15-20. Тогда я просто замер и мне хотелось, что бы эта музыка продолжалась
    бесконечно...


    <b>Немного биографии для ознакомления. Как начиналась твоя музыкальная карьера?</b>


    В начале, естественно, был двор, вино и ночные посиделки. Потом техника исполнения
    прогрессировала и, по мере этого требовались более сложные упражнения. Пройдя
    грандж, хэви и новомодные гаражные тяжести я достаточно быстро пришел к совсем
    слегка перегруженному звучанию пентатоники. Вектор был определен и дальше уже
    были только ньюансы. До переезда в Москву еще лет 5 я занимался исключительно
    дома, просто или под минусы. Потом играли с друзьями в местном рок- клубе, находящемся
    в подвале Дома Культуры, в лучших традициях советского строительства с роскошной
    мозаикой на фасаде здания. Было нас там всего человек 7-8 имеющих отношение к
    музыке. Остальные человек 30 там просто тусовались, иногда приводя с собой некоторое
    количество друзей. Мы регулярно там бухали и не скрывая удовольствия исполняли
    для публики волю и разум и heart shaped box вперемешку с I got my eyes on you.
    Веселые были времена. Но играть на сцене настоящего клуба и по взрослому я начал
    только в Москве. Это был 2006-й год. Я приехал в замечательный клуб "Дом у Дороги",
    там по воскресеньям проводится открытый блюзовый джем, где люди абсолютно с улицы
    (с учетом их музыкальной вменяемости) могут подняться на сцену и поиграть. В тот
    день я, как, собственно, человек с улицы подошел к ведущему джемов Мише Мишурису,
    представился и попросил поучаствовать в джеме. Был вагон адреналина и еще потом
    тысячу раз. Благодаря Мише и ЮрИванычу (владельцу клуба) эти джемы существуют
    до сих пор и кроме того, что приносят массу приятных эмоций еще и позволяют получить
    бесценный опыт выступления перед публикой, который никаким зеркалом не заменишь.


    <b>Как насчет музыкального образования?</b>


    Музыкального образования у меня нет, первые аккорды выучил по самоучителю. Первую
    гитару мне подарил отец. Это была акустика производства Бобровского гитаростороительного.
    С ней я был счастлив! Помню, как по 5 часов в день пропадал в комнате с гитарой,
    чтобы победить барэ, флажолеты и 3 вида "боев" . Был этап стачивания ладов, после
    чего гитара сначала отправилась в шкаф, но фактически - на помойку. На ее смену
    пришла уже электрогитара и советская примочка, которую вынося мусор я нашел близ
    помойки, добросовестно оставленную кем-то за ненадобностью возле трансформаторной
    будки. Так начался новый этап.


    <b>Нынешний коллектив музыкантов, история создания, где в основном выступаете?</b>


    С большинством людей московского блюза я познакомился в "Доме". На данный момент
    наш коллектив состоит из профессиональных музыкантов, которые одновременно играют
    в нескольких бэндах. Увы или ура, но этот момент диктует специфика страны и способа
    вписывания в ее культуру данного жанра. Сегодня выступаем в нескольких московских
    блюзовых клубах, среди которых B. B. King, Bourbon street, Double Bourbon и любимый
    сердцу Дом у Дороги.


    <b>Твои музыкальные предпочтения: конкретный Блюз стиль, исполнители, композиции?</b>


    Больше всего люблю электрический гитарный блюз: Albert Collins, Albert King, B.B.
    King, Johnny Guitar Watson, Lurrie Bell, Phil Guy, Ronnie Earl. Так-же близок
    сердцу элегантный и бархатный джаз. В целом же слушаю достаточно разнообразную
    музыку, для меня особо не существует каких-то штампов и стилей, есть хорошее сочетание
    которое хочется слушать снова и снова.


    <b>Ованес, есть ли у тебя собственные произведения, аранжировки?</b>


    Из собственных сочинений только какие-то наброски, показывать их нет никакого
    смысла. В клубах играем блюзовую классику в собственной интерпретации.


    <b>Новые проекты, перспективные планы идеи?</b>


    Пока в планах только клубная деятельность. Перспективы у блюза в России очень
    не однозначные и рассчитывать на серьезную профессиональную деятельность не приходится.
    С другой стороны мы всегда открыты для интересных мероприятий. Мы открыты для
    людей и смотрим вперед для плодотворного сотрудничества с клубами, концертными
    площадками и фестивалями. Относительно недавно вышел наш первый диск, который
    был записан live на репитиционной базе и получил название Samokatnaya street.
    Диск доступен для <a href="http://www.multiupload.com/FP7TDYGCZ7">свободного скачивания</a>
    и <a href="http://soundcloud.com/gulishian/sets/samokatnaya-street-cd">онлайн
    прослушки</a>.


    <b>Ованес, спасибо большое за интервью, искренность и предоставленное время.</b>


    26-ти летний музыкант пожелал успехов сайту, и отметил, что с удовольствием примет
    наше приглашение выступить в Ереване, воплотив тем самым свою заветную мечту -
    побывать на своей исторической Родине, на которой пока еще не был...


    Гаяне Даниелян


