  text: 'Говард Леви - музыкант, для которого не существует границ. Его музыкальные
    путешествия приводили его в джаз, поп и рок, в мировую музыку и латино, в классику
    и фолк, блюз, кантри, в театр и в кино. Он запечатлен на сотне компакт-дисков,
    получил "Грэмми" (1997) и Премию Джозефа Джефферсона (1986) за "Лучшую музыку
    к пьесе", множество раз выступал на американском и европейском телевидении и радио.


    Известный в широких кругах как самый продвинутый гармонист, играющий на диатонике,
    Леви исполняет полностью хроматические стили на стандартной десятидырочной диатонической
    гармошке, чем производит революцию и выводит этот инструмент на совершенно новый
    уровень. Помимо этого, он - состоявшийся пианист и композитор, владеющий множеством
    других инструментов, включая флейту, окарину, мандолину, саксофон и перкуссию.


    Говард состоял в основанной им же группе "Bela Fleck and Flecktones". Он участвовал
    в турне и записал два альбома с Кенни Логгинзом (Kenny Loggins), а также создал
    группу "Trio Globo" вместе с Юджином Фристеном (Eugene Friesen) и Гленом Велецем
    (Glen Velez). Кроме того, Говард выступал и/или записывался с Долли Партон (Dolly
    Parton), группой "Стикс" (Styx), Бобби Макферрином (Bobby McFerrin), Полом Саймоном
    (Paul Simon), Джоном Прайном (John Prine), Пакито Де Ривьера (Paquito D''Rivera),
    Кеном Нордайном (Ken Nordine) и многими другими, а также в Европе - с такими людьми,
    как Раби Абу Халил (Rabih Abou Khalil) и Майкл Рисслер (Michael Riessler).


    В 2003 году Леви выпустил джазовый компакт-диск "The Molinaro/Levy Project Live"
    в дуэте с пианистом Энтони Молинаро (Anthony Molinaro), лауреатом премии Наумберга.
    В 2002 году Говард исполнил "On the Other Side..." (концерт в составе трио с кларнетистом
    и аккордеонистом) с Баварским Государственным Оркестром Радио ("The Bavarian State
    Radio Orchestra") в немецком Мюнхене. В 2001 году Говард был привлечен Филармонией
    Иллинойса ("The Illinois Philharmonic") к созданию "Концерта для гармоники", первого
    концерта, когда-либо написанного для диатонической гармоники. После дебюта он
    исполнял его еще 9 раз, планируются и дальнейшие выступления.


    Гармоника Говарда звучит в таких фильмах как "Семейное дело" ("A Family Thing"),
    "Стриптиз" ("Striptease") , "Время убивать" ("A Time to Kill"), "Разговор начистоту"
    ("Straight Talk") и "Вьетнам: долговременное прибытие" ("Vietnam, A Long Time
    Coming").


    В танцевальном мире Говард работал вместе с индийским танцором Рани Рамашвами
    (Ranee Ramaswamy) в программе "Where the Hands Go, The Eyes Follow", которая представляла
    собой сочетание фотографии, поэзии, танца и музыки. Шоу происходило вживую при
    участии поэтов Роберта Блая (Robert Bligh) и Колмэна Баркса (Coleman Barks). В
    2004 году он выступал вместе с членами танцевальных коллективов "The Hubbard St."
    и "Joffrey Ballet" в постановке "Moody Hollow", хореографом которой выступила
    Лори Сталлингз (Lauri Stallings).


    Что касается театра, то Леви получил Премию Джозефа Джефферсона за музыку к пьесе
    Брехта "Господин Пунтила и его слуга Матти" ("Puntila and his Hired Man") в 1986-м.
    В 1997 году он написал музыку к моноспектаклю с Бонни Колок (Bonnie Koloc) "Сказки
    Трашмании" ("Tales From Trashmania").


    "Играя длинное соло, в котором странным образом техника барокко сочетается со
    свингом, а обрывки сентиментальных песенок - с блестящей джазовой импровизацией,
    Леви выдает в этим начальном соло столько идей, сколько многим музыкантам хватает
    на все выступление." (Howard Reich, "The Chicago Tribune")


    "Говард Леви - это открытие; порой трудно поверить, что он играет просто на гармонике,
    потому что играет он с экспрессией и глубиной саксофониста". (Geoff Dyer, "The
    London Observer")


    "Возможно, он самый серьезный новатор в технике игры за всю историю этого инструмента..."
    (Kim Field, Harmonicas, Harps, and Heavy Breathers, Simon & Schuster)'
