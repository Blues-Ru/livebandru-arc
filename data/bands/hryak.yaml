  text: '"ХРЯК" - музыкальная группа, образованная в Киеве в 2007 году Хомяковым Романом
    и Матирка Виталием.


    В песнях группы доминирует бытовая тематика, в музыке - направления постпанк и
    бытовой алко-панк. В конце 2007 года к ним присоединился бас-гитарист Лен Кирилл
    (Ворм, Октябрь). С ударниками было сложно, подыгрывали знакомые, но Летом 2008
    года место за ударной установкой занял старый приятель, играющий параллельно еще
    в двух командах - блюзовой "The Roads" и реггей "Properganja", Вадик Жовнер (Смертник).


    Первый концерт состоялся 12-го марта 2010 года в киевском клубе "Ленин". Отыгранной
    программе сопутствовал успех, с тех пор группа получила некоторую известность
    и стала приглашаться на другие музыкальные мероприятия . Летом 2010 года Лен Кирилл
    покидает группу в связи с желанием играть несколько иную музыку, и место за бас
    гитарой занимает Хомяков Роман, вторым гитаристом становится Мацюх Алексей. В
    этом составе группа продолжает репетировать в доме-студии Алексея на Русановских
    Садах и готовится к записи дебютного альбома.'
