reviews:
- id: 387
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Коренной Лондонец, певец, гитарист, сонграйтер и сторителлер - ИЭН СИГАЛ
    достиг всем мыслимых для представителей своего поколения британских блюзменов
    высот: неоднократный номинант и обладатель British Blues Awards "Best Male Vocalist",
    "Best Blues Album", "Best Original Blues Song", "Best Acoustic Artist", а его
    группа - "Best Blues Band". Его альбомы (в октябре 2013 вышел новый, шестой по
    счету) сразу после выхода разлетаются, как горячие пирожки и стремительно взлетают
    к вершинам чартов, а на концерты билетов не достать.


    Иэн Сигал - участник знакового The LONDON BLUES Festival''13 в лондонском Альберт-Холле
    и хэдлайнер еще двух дюжин самых представительных фестивалей. Концерты Иэна Сигала
    из разряда событий, которые ни за что не хотелось бы пропустить... Позаботьтесь
    о покупке билетов заблаговременно и не говорите потом, что вас не предупредили!!!'
