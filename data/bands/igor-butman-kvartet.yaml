  text: 'Игорь Бутман руководит не только биг-бэндом и двумя джазовыми клубами, но
    и собственным джазовым квартетом. Квартет Игоря Бутмана группа в группе, участники
    квартета пианист Антон Баронин, контрабасист Виталий Соломонов и барабанщик Эдаурд
    Зизак составляют ритм-секцию Биг-бэнда Бутмана.


    Квартет, возникший вместе с Биг-бэндом в 1999 году, сразу же нарекли "торговой
    маркой" российского джаза. И тому есть все основания: например, выступление квартета
    в кремле перед лидерами двух стран Президентом США Биллом Клинтоном и Президентом
    России Владимиром Путином в июне 2000 года и перед Председателем КНР Цзян Цзэминем
    в июне 2002 года. Когда Эдуард Зизак начал сотрудничать с Игорем, он был уже очень
    опытным музыкантом, за плечами у него было несколько лет работы в МКС Биг-бэнде
    Анатолия Кролла. Игра в составе квартета позволила Эдуарду найти новые выразительные
    средства, отточить свое мастерство и стать признанным лучшим барабанщиком в российском
    джазе.


    В 90-х годах контрабасист Виталий Соломонов, работая во многих известных джазовых
    коллективах, приобрел репутацию очень надежного и разностороннего музыканта. Виталий
    играет с Игорем уже более десяти лет, а также пишет арандировки для квартета.
    Пианист Антон Баронин присоединился к квартету в 2000 году. Антон, выпускник московской
    консерватории имени П. И. Чайковского и продолжатель славных традиций российской
    школы академического фортепиано, - чуткий партнер в ансамблевой игре и незаурядный
    импровизатор.


    Начиная с 1999 года, квартет стал выступать на фестивалях в Германии, Франции,
    Италии, Финляндии, Болгарии и Турции. Затем последовали гастроли в Израиле и США,
    где квартет выступал в самых известных джазовых клубах - Birdland, Smoke и Regattabar,
    а также принимал участие в прямом эфире телеканала NBC. Во время американских
    гастролей квартета в мае 2002 года в звукозаписывающей студии в Нью-Джерси был
    записан альбом "Prophecy" ("Пророчество"), впоследствии выпущенный мейджор-лейблом
    Universal Music Russia. Презентация этого альбома состоялась в джазовых клубах
    "Birdland" в Нью-Йорке и "Le Club" в москве в июне 2003 года.'
