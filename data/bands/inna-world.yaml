reviews:
- id: 43
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  header: Проект "INNA WORLD" или Произнесите вслух
  text: 'Проект "INNA WORLD" – винтажное путешествие в блюз. И произнося название
    вслух, вы улавливаете, как имя солистки указывает на внутренний мир блюза – а
    он нарративный, нервный, нюансный. Новая программа включает в себя кавер-версии
    мировых хитов от 20-х до 90-х и собственные композиции.


    "Inna World" – выразительный мир блюза, но не только. Для солистки проекта Инны
    Тудаковой сегодня нет песен, которые невозможно спеть. После выхода двух альбомов
    критики называли Инну "русской Пиаф и Дженис Джоплин", поражаясь заряженности
    исполнения, а масс-медиа изящно писали, что у нее нет "ни пола, ни потолка", имея
    в виду особую манеру исполнения "мужских" песен Вертинского и Петра Лещенко.


    В новой программе рядом стоят джоплиновская "Ball and Chain" и блюз-посвящение
    "Джанис", почти уже "ветхозаветная" холлидеевская "These Foolish Things" и зимний
    французский шепоток от Henri Salvador, казалось бы, неожиданная здесь, пружинящая
    "Say, say, say" Джексона/Маккартни и свежий винтажный блюз "Легко", от кокеровской
    "Summer in the city" летят искры, а "Ain''t No Sunshine" так вообще никто никогда
    не пел.


    Несколько языков, жанровые переплетения – все это внешние проявления "Inna World",
    внутренние можно уловить только сердцем.'
  verified: false
