  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Иннис Сайбан - великолепный, что называется "в своем праве", музыкант, бывший
    гитарист Роберта Планта, изумительный гитарист-виртуоз. Что ему делать с этой
    виртуозностью на концертах, понятно - его супербыстрые пассажи идут "на ура",
    а медленные и печальные доводят до умиления.


    Вот Фрагмент рецензии на последний студий диск Сайбана на портале BluesNews.ru:
    "Сайбан силен блюз-роковыми записями, и там все очевидно - он крут, играет как
    бог, и все такое. Последний же диск "Lost in Wilderness" другого рода. Свое умение
    обходиться с нотами и струнами британец вложил в концепцию "виртуозен разнообразно".
    Вы будете листать треки диска, переходя от быстрого к медленному, от мелодичного
    к грубому. Кстати, мелодичность и странный, как бы "масляный", пластичный звук
    - фирменные фишки Инниса. Кто-то скажет, что вокал - не самая сильная его сторона
    (хотя кто на вокал в блюзе обращает внимание, когда речь идет о слингере?). В
    превосходной "Double Trouble" наш герой нашел способ вытянуть нужные ноты с должным
    рыданием, не испортил надрывный плач-песню классика Отиса Раша. Построение альбома
    - в чем-то слегка концептуального - подчеркивают камерные акустические вставки
    на гитаре, отнюдь не такие уж беглые, как остальное, представляющие род мини-интермедий
    перед следующим фрагментом пластинки. 6-минутная баллада "Lost In The Wilderness"
    - сильнейший трек пластинки, родственный музыке Led Zeppelin, высвечивающий все
    лучшее в авторе, - минорная тема, в которой абсолютный контроль гитариста над
    инструментом переплетается с его талантом создавать превосходную мелодию, следуя
    "урокам" бывшего босса - Роберта Планта."


    А вот о нем пишет Rolling Stone: "На гастролях с Плантом я чувствовал себя ребенком",
    вспоминает Иннис Сайбан, блюзмен со стажем и ярый фанат Led Zeppelin, которому
    в 1993-94 годах посчастливилось в качестве гитариста сопровождать Роберта Планта
    в туре "Fate of Nations". - "У тебя даже паспорта нет на руках и тебе не надо
    принимать никаких решений Тур-менеджер - твой учитель, а ты ученик", - смеется
    он. Спустя два десятилетия Сайбан прибыл в Россию на фестиваль "The Great British
    Rhythm&Blues Invasion" уже с собственной программой. Одним из самых ярких эпизодов
    своей биографии Сайбан называет концерт в Бостоне, когда ему пришлось играть в
    присутствии Джимми Пейджа. "Он стоял в кулисах, и у меня, когда я играл его соло,
    было ощущение, что я в постели с чужой женой", - смеется гитарист. Сегодня он
    гастролирует по всему миру, выступая в компании звезд и никому не известных местных
    музыкантов. "Пару лет назад в одном блюзовом клубе в Канзас-Сити, где я оказался
    единственным белым парнем, я разговаривал с местными музыкантами о блюзе, о Клэптоне
    и Гэри Муре и они называли этих белых ребят своими вдохновителями. Было очень
    смешно - для меня-то иконой всегда был Би Би Кинг."


    В свой второй приезд в Россию в начале января 2015 года после серии аншлаговых
    концертов в Москве и Ст.Петербурге в сентябре 2014 г, Иннис Сайбан приурочил к
    выходу нового альбома. В программе второго тура - собственные композиции, классика
    блюза и рок-н-ролла в авторской аранжировке, а так же вещи из репертуара Роберта
    Планта и Led Zeppelin. Несмотря на запрос от публики на приезд Инниса в Россию,
    плотный гастрольный график с собвственным бэндом, в составе Sari Schorr & the
    Engine Room, и последние полтора года с составе Malone/Sibun band не позволял
    ему вырваться на гастроли в Россию. Но в августе 2019 года, точно подгадав под
    перерыв в гастрольном графике, Иннис Сайбан вновь приедет в Москву (как минимум!),
    чтобы порадовать своих поклонников взрывным, бескомпромисснывм блюз-роком. Как
    и в предыдущих тукрах, поддержку Сайбану окажут музыканты московской группы Plumbum
    DreamZ, прекрасного Led Zeppelin-трибьют-проекта. Не пропустите!'
