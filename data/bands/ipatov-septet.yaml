  header: Септет Вячеслава Ипатова - Jazz for Blues Fans
  text: '13 марта в четверг Септет Вячеслава Ипатова из Санкт-Петербурга представит
    в блюзовом клубе Дом у Дороги специально подготовленную программу "Джаз для любителей
    блюза". Основой будут горячие и эмоциональные хиты свинга и бибопа 40-50-х годов
    20-го века, музыка, которая зажигает любовь к джазу у молодых людей.


    Рассказывает Федор Романенко (blues.ru):


    Мы обсуждали, как сделать программу Дома у Дороги разнообразной и показать друзьям
    лучшее, что звучит вокруг. Наша клубная культура очень сегментирована, поэтому
    любые возможности расширить кругозор тех, кто любит живую музыку, очень ценны.
    Все от этого только выиграют, люди начнут чаще ходить на концерты, будет больше
    клевых музыкантов, которых они готовы слушать.


    Говорили о том, как заинтересовать хорошим джазом многоопытных завсегдатаев ДуДа,
    которые уже повидали лучших блюзменов мира. Я сам очень люблю слушать как блюз,
    так и джаз, поэтому у меня есть некоторое представление о существенных различиях
    жанров и том, какие т.н. "выразительные средства" джазе близки к блюзу, поэтому
    будут хорошо восприниматься блюзовыми фанами. Это - яркий свинговый ритм, запоминающиеся
    темы, эмоциональность в соло, драйв, напряжение и неустойчивость. Наверное, это
    вещи, которые сохранились из общих "черных" корней джаза и блюза. Скорее всего,
    не подойдет усложненная гармония, многослойность импровизаций и пр. Легко воспринимаемые
    жанры - smooth-джаз, эстрада, ранний свинг и диксиленд - нас также не очень интересовали
    в этом контексте.


    Разобраться сильно помог главный редактор jazz.ru Кирилл Мошков, в процессе длинной
    переписки он сориентировал нас на соул-джаз, свинг, бибоп, хардбоп и вообще дал
    неоценимые компетентные консультации. Задача, тем не менее, оставалась сложной.
    Сейчас эти жанры не на пике популярности, вообще, многие джазмены после того,
    как переболеют Чарли Паркером в юношестве, начинают играть более сложную и, одновременно,
    спокойную музыку.


    Решение пришло совершенно неожиданно. Я приехал на один день в Питер и, сделав
    свои дела, ночью случайно попал в эпицентр питерской джазовой жизни - в "Джаз
    Бар Дом 7". Там каждую субботнюю ночь проходят "свинговые джемы" молодых питерских
    джазменов. Хаус-бендом в тот вечер был Квинтет Вячеслава Ипатова, но через сцену
    прошло примерно 15 разных музыкантов. Все это продолжалось 4.5 часа нонстопом,
    и я могу сказать, что не пропустил ни одной ноты, и большего эстетического и спинномозгового
    удовольствия я очень-очень давно не получал! Молодые музыканты (всем по 20 с лишним
    лет) играли любимую музыку, от которой они все еще прутся со страшной силой. У
    меня было настоящее ощущение, что я попал в Гринвич Вилладж в Нью-Йорке конца
    40-х.


    Конечно же, я захотел получить дозу живого джазового наркотика еще раз, а, главное,
    поделиться нежданной радостью с друзьями. Это было идеальным решением нашей задачи,
    поэтому мы позвали ребят в Москву, в Дом у Дороги. Слава нам пообещал, что они
    с компанией очень постараются заразить вас своей любовью к свингу и бибопу.


    Состав Септета Вячеслава Ипатова


    <li>Вячеслав Ипатов (20) - саксофон</li> <li>Эльмира Ильясова (18 ;) - вокал</li>
