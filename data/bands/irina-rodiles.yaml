  reviewer_token: press-release
  text: 'Ирина Родилес - одна из самых ярких певиц в мире московского джаза. Имея
    прекрасное музыкальное образование и богатый опыт, Ирина постоянно пробует что-то
    новое и необычное: певица играла в еврейском музыкальном театре Юрия Шерлинга,
    озвучивала художественные и мультипликационные фильмы.


    Ирина Родилес участница многих российских и международных фестивалей, где она
    выступала с такими составами, как "Джаз Галерея" Николая Панова, биг-бэнд Tallinn
    Brass, оркестр Георгия Гараняна, джаз-оркестр Олега Лундстрема, ансамбль братьев
    Ивановых, ансамбль Ивана Фармаковского и др.


    Ирина записала совместные пластинки с биг-бэндом Tallinn Brass и МКС-биг-бэндом
    Анатолия Кролла.'
