  text: 'Ирина Сурина - одна из лучших кантри - фолк певиц России, с великолепным,
    узнаваемым тембром голоса, своеобразной манерой пения.


    Начала учиться музыке в московской музыкальной школе им. Гнесиных по классу скрипки.
    Получила профессиональное образование в музыкальном училище, как вокалистка. По
    окончании училища в 1989 году стала солисткой в, уже известной тогда, первой Российской
    кантри-группе "Кукуруза", в составе которой, неоднократно гастролировала по многим
    городам бывшего СССР, Чехословакии и Польши.


    В период с 1991 по 1994 год, как солистка "Кукурузы", И. Сурина совершает 8 гастрольных
    туров по США, где голос Ирины был положительно отмечен многими музыкальными критиками
    Америки. Неоднократно группа принимала участие в самых значимых кантри-блюграсс
    фестивалях США: "Merle Watson Memorial Fest" (Wilkesboro, NC), "Rocky Grass" (Lyons,
    CO) и многих других. Семь раз Ирина пела на сцене знаменитого Grand Ole Opry в
    г. Nashville (TN). У группы состоялось пять прямых эфиров в программах TNN (Tennessee
    Nashville Network) - "Nashville Now". Два из шести альбомов "Кукурузы" были записаны
    и выпущены в Америке. В России Ирина Сурина с "Кукурузой" принимала участие в
    фестивалях кантри музыки "Фермер", в телепередачах "Шире круг", "Счастливый случай",
    "Программа А", "Свежий ветер", "Сто к Одному", "Час совы", "Добрый вечер" с Игорем
    Угольниковым, "Два Рояля".


    В 1999 г. Ирина Сурина принимала участие в одном из крупнейших европейских фестивалей
    кантри-музыки в Мрангово (Польша) и стала обладательницей Grand Prix в конкурсе
    исполнителей "Кантри Европа 99".


    В 2000 г. Ирина окончательно покидает "Кукурузу" и собирает свой коллектив. В
    настоящее время с успехом работает со своей сольной программой на различных сценических
    площадках.'
