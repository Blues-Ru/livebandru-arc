  reviewer_token: press-release
  text: 'Ivanov Vibe Band - молодой и перспективный коллектив, представитель джазовых
    музыкантов нового поколения. Каждый концерт проекта - это эмоциональный диалог
    между "живым" вибрафоном, контрабасом, клавишными и барабанами. От концерта к
    концерту команда успешно развивается и уже успела получить признание на площадках
    таких фестивалей, как "До.дж" (Украина, Донецк) и "Этносфера" (Россия, Москва).


    Автором музыки является вибрафонист Иннокентий Иванов, его композиции несут в
    себе яркую смесь стилей и направлений (этно-фьюжн, латина и джаз-рок).'
