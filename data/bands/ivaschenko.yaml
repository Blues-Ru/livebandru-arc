  reviewer_token: press-release
  text: '<a href="http://s359.photobucket.com/albums/oo40/fingerpicker75/?action=view&amp;current=IMG_4552.jpg"
    target="_blank"><img src="http://i359.photobucket.com/albums/oo40/fingerpicker75/IMG_4552.jpg"
    border="0" alt="Photobucket"></a> Вадим Иващенко родился в 22.04.1975 в городе
    Ростов-на-Дону. Являлся одним из лучших ростовских ритм-н-блюзовых музыкантов.
    С 2001 года активный участник московской блюзовой и рок-н-ролльной сцены. Сотрудничал
    со многоими музыкантами, среди которых: Михаил Мишурис, Михаил "Петрович" Соколов,
    "Мистер Твистер", Доктор Аграновский, Дмитрий Казанцев и многие другие. Неоднократно
    играл джемы с известными американскими и европейскими Блюзменами, такими как Дюк
    Робиллард, Лейзи Лестер, Кит Данн, Джеймс Уиллер, Джон Праймер, Лурри Белл, Перо
    Джо, "Румфул оф блюз", Уолтер Траут, Чарли Бэйти и другими. В настоящее время
    выступает с собственной группой. Вадим Иващенко - безусловно один из самых ярких
    и интересных российских гитаристов. Импровизируя свободно и разнообразно, он демонстрирует
    в своих соло знание наследия самых разных блюзовых столпов электрогитары - от
    Би би и Фреди Кингов до Кларенса "Гейтмаута" Брауна и Стиви Рея Воэна. Превосходно
    обращается со слайдом, вызывая в памяти великих Элмора Джеймса и "Хаунтдога" Тэйлора.
    Наиболее комфортно Вадим чувствует себя в свинговой, джамп-блюзовой манере а-ля
    Тайни Краймз, Билл Дженнингс, Чарли Бэйти и Холливуд Фэтс. В последнее время Вадим
    демонстрирует увлечение мастерами кантри-гитары, и теперь в его соло можно услышать
    скорострельные пассажи в духе Альберта Ли, твэнговые завывания Джеймса Бертона,
    и даже фингерпикинг Чэта Эткинса и Мерла Тревиса. Кроме всего прочего Вадим -
    превосходный шоумен. В его арсенале - масса трюков, таких например, как застовляющая
    зал реветь перепалка супружеской парочки, озвученная в лицах посредством гитары
    в лучших традициях Алберта Коллин за. Вадим постоянно выступает со своей группой
    в основных московских блюзовых и джазовых клубах.'
