  text: 'Джек Джей Хатчинсон (Jack J Hutchinson) - лондонский гитарист и певец. Журнал
    BLUES by Classic Rock, не слишком щедрый на похвалу авансом, так написал о его
    британском туре 2015 года в поддержу дебютного альбома: "Это надо видеть! Этот
    парень рожден петь соул и блюз!". В 2015 и 2016 годах Хатчинсон был дважды номинирован
    на престижную British Blues Awards.


    Хатчинсон родился в 1982 году в Лестере, провел юность на северо-западе, прежде
    чем переехать в Лондон в 2005 году. Он делил сцену с некоторыми из самых известных
    музыкантов по всему миру, включая группу The Boom Band, где представлены Мэтт
    Тейлор, Маркус Бонфанти, Джон Эймор и Пэдди Милнер. Он также играл на разогреве
    у Dr. Feelgood, Ian Siegal и Big Boy Bloater.


    Джек много работал, как сессионный музыкант с несколькими известными проектами
    в студии Universal и Mоloco Studios в Лондоне. В октябре 2016 года Хатчинсон был
    участником BluesFest London в престижном зале O2, в лайн-апе которого также фигурировали
    Джефф Бек, Bad Company, Билл Уайман, Роберт Плант и Van Morrison, где сыграл три
    сета. Также в 2017 и 2018 гг. Джек играл на блюзовой сцене фестиваля Ramblin''
    Man Fair.


    Хатчинсон на сегодняшний день выпустил несколько сольных альбомов - дебютный "Feathers
    and Fools", два EP "Get It Back" и "Unplugged", оба из которых вошли в iTunes
    Blues Chart, в начале 2017 года в составе Jack J Hutchinson''s - Boom Boom Brotherhood
    он выпустил "Set Your Heart For The Sun", следом вышел сольный "Paint No Fiction".
    EP "Get It Back" достиг 26-го места в чарте Amazon, "Paint No Fiction" входил
    в первую десятку в чартах ITunes в США и хорошо раскупался поклонниками в Британии,
    Австралии, Швеции, Германии, Японии и Канаде. В 2017-19 годах Джек в содружестве
    с гитаристами Майком Россом и Троем Редферном играл супер-группе RHR - Redfern
    Hutchinson Ross, и за и 2018-19 они записали и выпустили два альбома.


    В 2019 к Джеку Хатчинсону с "Who Feeds the Wolf" пришел большой успех. Треки "Justified",
    "Haunted Bones" и "Kiss Your Ass Goodbye" были влючены в список Classic ROCK Tracks
    of the Week и по результатам голосования на сайте журнала занимали призовые места.
    Добрый десяток его песен был представлен на дисках-приложениях к журналам Classic
    Rock и BLUES by Classic Rock и регулярно попадали в чарт "40 лучших блюзовых композиций
    месяца", публикуемый ежемесячно Ассоциацией Независимых Радиовещателей Британии
    IBBA, получив признание критиков в ряде публикаций, включая журналы Blues In Britain
    и Blues Matters. Его хит ‘Get It Back'' также представлен на сборнике Krossborder
    Rekords: The Best British Blues, Kompilation Vol. 2, а "Justified" попал в CD-сборник
    Classic ROCK - Best of 2019.


    Вот что писала пресса последние пару лет:


    "Жесткий, крутой, прямой. Он реально жжет! Это надо видеть! Хатчинсон рожден,
    чтобы петь соул и блюз " (BLUES Magazine, by Classic Rock)


    "Все, что есть хорошего в современном блюзе" (Blues in Britain magazine) "На самом
    деле - это очень хорошо. Хатчинсон - просто ураган! " (Пол Джонс, радиоведущий
    BBC Radio 2)


    "Время от времени я слышу песню, которая заставляет меня замереть и слушать, не
    пропуская ни звука, и волосы на затылке встают дыбом. Именно это произошло, когда
    я услышал новый сингл Джека Джей Хатчинсона "If You Let Me Love You". - (Клайв
    Ролингс, радиоведущий IBBA, постоянный автор журнала Blues Matters!),


    "Потрясающая новая работа Хатчинсона - ревущая гитара и обжигающий вокал" (Wasser-Prawda
    Magazine, Poland)


    "Хатчинсон ухитряется существовать в двух эпохах сразу - он и отголосок прошлого
    и взгляд в будущее. С возрождением современных джемовых блюз-групп, активно действующих
    в США и Великобритании, способность Хатчинсона совмещать амплуа певца/композитора,
    пишущего прекрасный материал, и востребованного сессионного музыканта дает ему
    преимущество перед многими другими молодыми артистами" (Blues Rock Review)


    Впервые Джек Хатчинсон приезжал в Россию в июне 2017 года. Один из его концертов
    в Ритм-Блюз Кафе был профессионально записан на видео.


    К новому туру Джека в июне-июле 2020 года будет доступен релиз DVD/CD ''Jack J
    Hutchinson & Friends. Live in Moscow'' Концерты пройдут с 26 июня по 5 июля. Не
    пропустите!'
