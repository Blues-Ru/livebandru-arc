reviews:
- id: 271
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Участники фестивалей "Усадьба.Джаз" в Архангельском, Джаз в саду Эрмитаж,
    Lady in Jazz, ВДОХ, Jazz Dance Orchestra - наш ответ Palast Orchester, Nouvelle
    Vague и Карен Соуза; они фактически совершили своего рода революцию в российской
    джазовой культуре, поставив перед собой нелегкую задачу - приучить тех, кто привык
    к поп-музыке, полюбить именно джаз.


    Следуя традициям Пола Анки и Макса Раабе, Jazz Dance Orchestra со вкусом вплетают
    популярные мотивы песен Стинга, Moloko, Рианны, Black Eyed Peas, Майкла Джексона
    и Мики в джазовое полотно, да так, что некоторые приевшиеся хиты звучат ничуть
    не хуже и уж точно свежее оригинала.


    Jazz Dance Orchestra не ограничивает себя рамками: традиционный джаз, свинг, фанк,
    лаунж, русские народные песни, классическая музыка - кажется, что им под силу
    все. В музыкальных экспериментах коллектива любят принимать участие такие звезды
    как Игорь Бутман, а сам коллектив регулярно принимает участие в ведущих телевизионных
    шоу, к примеру, в "ПрожекторПэрисХилтон" на Первом канале они стали практически
    резидентами.


    Тысячи скачиваний на различных ресурсах в сети Интернет - чем не подтверждение
    успеха Jazz Dance Orchestra? Причем многие Интернет-пользователи даже не предполагают,
    что это - российский коллектив, играющий в лучших западных традициях. Сейчас Jazz
    Dance Orchestra активно работают над записью нового альбома, куда войдут авторские
    композиции, а также любимые слушателями хиты, по-новому аранжированные.'
