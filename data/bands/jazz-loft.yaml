  header: The Jazz Loft - Джазовый чердак в Москве
  text: 'В Москве открылось место, похожее на легендарный клуб в Новом Орлеане "Preservation
    Hall". Где выступают музыканты преданные классическому джазу. Здесь нет заранее
    составленной программы концерта и нет подготовленных аранжировок. Музыка рождается
    в присутствии зрителя. Зритель - своей реакцией на происходящее, становится автором
    концерта.


    Меня спрашивают многие тубисты, как научится правильно аккомпанировать и играть
    джаз? На этот вопрос однозначно я ответить не могу. Можно углубиться в теорию,
    в учебные пособия, в прослушивание музыкальных записей. Но эффективнее, конечно
    - это индивидуальные занятия, так как на уроке можно точно определить в какой
    стадии готовности находится ученик для дальнейшего обучения. Такая возможность
    появилась для Столичных тубистов, которые желают научиться аккомпанементу и импровизации
    на тубе. Приходите, слушайте, смотрите. Моя туба будет для всех открыта. Учитесь
    слушать. Подсматривать за исполнителем - это очень хороший старт для новичка.


    Теперь и в Москве, каждый может стать свидетелем рождения уникальных джазовых
    номеров и импровизаций в старом стиле диксиленд.


    Каждую среду, в 19:30 на уютном "чердаке" Rhythm & Blues Cafe вас ждет живой Новоорлеанский
    джаз в исполнении музыкантов, играющих без микрофонов и нот!'
