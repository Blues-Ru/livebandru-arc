  header: 'Jazzamor (Германия): российские концерты ко Дню святого Валентина'
  text: 'Концертное агентство Bird Art представляет: 11 февраля в петербургском клубе
    "Зал Ожидания" и 12 февраля в московском клубе "16Тонн" - концерты немецкой группы
    Jazzamor ко Дню святого Валентина. Специальный гость петербургского концерта -
    группа Non Cadenza с первым выступлением 2011 года.


    Ровно 10 лет назад вокалистку Беттину Мишке и клавишника Роланда Гроша соединила
    любовь к джазу 60-х годов. Идея смешения мягкого джазового звучания той эпохи,
    гитар, босса-новы и удивительного женского вокала привела к созданию коллектива
    Jazzamor, успевшего на сегодняшний день объездить половину мира и выпустить (с
    одинаковым успехом) четыре альбома, включающих песни на немецком, английском,
    французском и португальском языках.


    Мировой релиз первой пластинки группы "Lazy Sunday Afternoon" состоялся в 2002
    году после почти годовой работы в студии. Расслабленный easy listening чередовался
    с эмоциональной босса-новой, демонстрируя полное единство музыки и эмоций. К слову,
    композиция "Way back" с дебютного альбома группы стала официальной мелодией рекламной
    кампании Nikon.


    Второй альбом, получивший название "A Piece of My Heart", несмотря на схожую стилистику,
    демонстрировал совершенно иную музыкальную концепцию: он был построен на контрасте
    между электроникой и акустическими "живыми" инструментами, комбинация которых
    и создавала ту самую уникальную "частицу сердца" Jazzamor. В 2006 году вышел диск
    "Travel (in Order Not to Arrive)" - музыкальное путешествие вокруг света за 80
    минут, наполненное историями о дальних странах и городах. Каждая песня этого альбома
    посвящена одной из мировых культур и рассказывает о них национальным языком, народными
    инструментами, этническими ритмами.


    Последний на данный момент, четвертый альбом группы - "Beautiful Day" - был записан
    за восемь недель. 12 композиций пластинки в большей, чем ранее, степени отражают
    события и эмоции, связанные с личной жизнью основателей Jazzamor - Беттины и Роланда.
    "Мы оба решили поделиться тем, что происходит в жизни. Каждый из нас переживал
    расставания и начинал все сначала. Эти песни - о личном", - говорит Беттина Мишке.


    В интервью музыканты Jazzamor нередко признаются, что в далекой России их музыка
    востребована едва ли не больше, чем в родной для группы Германии. Минималистичные
    аранжировки, гитарные босса-новы, электронный саунд, контрабас, обильная перкуссия,
    ясный вокал и запоминающиеся невесомые мелодии, иногда звучащие совсем просто.
    Это почти поп-музыка, ироничная и игривая. Это больше, чем джаз. Это Jazzamor!


    Начало концерта в Петербурге: 20:00. Начало концерта в Москве: 21:00.'
