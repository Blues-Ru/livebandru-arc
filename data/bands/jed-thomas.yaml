reviews:
- id: 416
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Вот уже три десятилетия виртуоз Джед Томас играет эклектичный вариант блюз-рока,
    густо замешивая британский ритм-блюз конца 60-х с чикаго-стайлом, вест-коаст-свингом,
    дельта-стайл-фингерпикингом и слайдом. Все эти три десятилетия он гастролирует
    по Британии, континентальной Европе и Штатам, деля сцену с такими "грандами" как
    Бадди Гай, Рори Галлахер Бэнд, Nine Below Zero, Джо Бонамасса, etc.


    В 2013-м году, после почти 15-летнего перерыва в студийной pаботе и выхода альбома
    "RED TOP", с у него вышел долгожданный релиз, восторженно принятый критиками и
    активно ротировавшийся на блюз-радиостанциях по обе стороны Атлантики - альбом
    "It''s About Bloody Time", принесший ему две номинации на British Blues Awards
    2014.


    В начале 2015 вышел новый релиз "Emerald Blue", альбом, под завязку наполненный
    блюз-роком, свингом и кантри-блюзом. В 2016-17 гг Джед преподавал, концертировал
    и работал над новым материалом, и зимой-весной 2018 года вышло сразу еще два альбома
    "As The Crow Flies" и "Magic Carpet". С этим материалом Джед Томас много гастролировал
    по Британии и Континентальной Европе.


    В планах у Джеда после окончания гастрольного сезона - перевести дух и снова засесть
    в студии, чтобы завершить запись продолжения, как бы "второго тома" альбома 2013
    года, поскольку материала опять накопилось предостаточно, и похоже, он будет называться
    "It''s About Bloody Time Too!"


    В Декабре 2019 года Джед Томас приедет в Россию впервые. Не пропустите!'
