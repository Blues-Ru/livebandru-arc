  text: 'Рожденный в Канаде певец и гитарист Джимми Си (Jimmу С) осваивал и развивал
    свой неповторимый, "фирменный" стиль игры, гастролируя по Западному Берегу из
    родного Ванкувера до Сан-Франциско. Перехав в Токио, Джимми Си познакомился с
    американским блюзовым певцом Миссиссиппи Джоном Л. Уотсоном (Мississippi John
    L. Watson), что привело к совместным выступлениям и записи совместного альбома
    в Лондоне в 1999 году. Это была хорошая школа. С тех пор Джимми Си сделал "торговой
    маркой" свою манеру играть "блюз с улыбкой", а группа Джимми Си и Блюздрэгонз,
    которую Джимми собрал в начале 2000 года, заслуженно пользуется репутацией одной
    из самых зрелищных, драйвовых и много концертирующих блюзовых групп Лондона и
    окрестностей. Играя репертуар, включавший в себя классические блюзы Роберта Джонсона
    (Robert Johnson) и Ти-Бон Уокера (Т-Bone Walker), великих Королей блюза - Алберта,
    Фредди и Би.Би. Кингов (Albert, Freddy and B.B. King), они пошли дальше - к музыке,
    которую именовали Британским Блюзовым вторжением, оставившим Северную Америку
    у себя в кильватере, музыку групп от Роллинг Стоунз (Rolling Stones) до Крим (Cream),
    от Джими Хендрикса (Jimi Hendrix) до Дорз (The Doors) и Степпенвулф (Steppenwolf).
    Они декларировали, что не являются "блюзовыми пуристами", но, не будучи "Грандами
    блюза", видят свою миссию в том, чтобы, как Мадди Уотерс (Muddy Waters) и Руфус
    Томас (Rufus Thomas) - развлекать, веселить и заставлять танцевать публику. Как
    сказал о них критик Билл Томас (Bill Thomas) - "...они знают, как подогреть атмосферу
    в зале!.."


    Впервые Джимми побывал в России в июле 2008 года, когда был одним из хэдлайнеров
    фестиваля Neva Delta BLUES в Питере. В первом туре по России, состоявшемся в 2010-м
    Jimmy C познакомил российских любителей блюза с авторским материалом, а также
    с результатом своих 25-летних размышлений на тему классических блюзовых и блюз-роковых
    стандартов, которых хватило бы на 7-8 часов непрерывного блюз-джема. Тур 2011
    года расширил границы до Урала (Екатеринбург) и Западной Сибири (Тюмень и Сургут).
    К туру 2011-го был приурочен выпуск 2xDVD/2xCD "Jimmy C & Friends - Live In Moscow"
    - профессионально снятый командой StyleTV двухчасовой концерт и часовой джем,
    состоявшийся в московском клубе Мюзик Таун 5 ноября 2010 года. Третий по счету
    тур Jimmy C состоялся со 2 по 14 октября 2012 года, концерты прошли в Костроме,
    Ярославле, Иваново, Сургуте и, конечно, в Москве. В туре 2012г. Jimmy C сопровождали
    музыканты московской группы The Boneshakers. Программа каждого выступления состояла
    из двух сетов по 45-50 минут: один сет собственного материала, второй - рок-н-ролльные,
    блюзовые и блюз-роковые стандарты и рок-классика. В четвертом туре в октябре 2013
    года Джимми вновь играл с Boneshakers и проехал с концертами по городам Золотого
    Кольца. Пятый по счету тур состоялся в середине ноября 2017 года.


    В седьмой раз артист приедет в Москве осенью 2018 года - шестой российский тур
    пройдет с 16 по 21 октября. Jimmy C вновь привезет в Россию свой фирменный "солнечный
    блюз" - с неизменной улыбкой на лице.


    Выдержки из статьи в журнале BLUES IN BRITAIN, 2002 г. Канадец Джимми Си (Jimmy
    С) - неизменная улыбка, копна кудрявых волос и хлещущая через край энергия - исполняет
    ли он гитарное соло, поет ли, или играет на гармонике, как например в "Mojo Working"
    - его счастливая манера исполнять блюз с улыбкой заражает радостью и его друзей
    по группе, и аудиторию. Присутствовать на его выступлениях радость и удовольствие
    - играет ли он медленный блюз Стиви Рэй Воэна "Техаs Flооd", переключается ли
    на бодрую "Еverу Day I Наvе Тhе Вlиеs", отдает ли дань уважения Джимми Хендриксу
    с собственными версиями "Неу Jое", "All Along the Watchtower" и "Firе". Джимми
    Си также исключительно хорош, когда аккомпанирует удивительному дополнению в лице
    саксофониста Антонио Лоренцо (Antonio Lorenzo). Очевидный посвященным серьезный
    классический и джазовый бэкграунд Антонио Лоренцо позволяет ему своей игрой точно
    соответствовать настроению исполняемых блюзовых стандартов, таких как "Wang Dang
    Doodle" или "Woke Up This Morning", а в таких вещах, как "Реter Gunn" и "Mustang
    Sally" - создавать "основное блюдо" - свой неповторимый фирменный саунд. Его саксофон
    придает группе еще одно - четвертое-пятое-шестое? - дополнительное измерение...
    В сет-листе группы в основном кавер-версии классических блюзовых номеров, в которых,
    тем не менее, довольно много "личного", и некоторое количество оригинального материала
    от Джимми Си, но все же не настолько много, чтобы блюзовые пуристы и ревнители
    чистоты жанра досадливо поморщились или отвернулись от них... Забавно: в их музыке
    столько драйва, "приглашения" двигаться, танцевать, что ему совершенно невозможно
    противостоять, и вскоре обнаруживаешь, что хоть сам и не собирался, но уже пританцовываешь
    под их музыку вместе со всеми. У них есть некий секрет, отмычка, особый прием
    - разогреть аудиторию и повести ее за собой, как, например, с их версией Tore
    Down"". Но даже на самой вершине, в самом зените своего выступления они мастера
    неожиданно еще прибавить - и отнюдь не в громкости звучания, a в уровне драйва,
    в производимом эффекте, как например в своей версии "Sweet Home Chicago". И более
    того - играя свою забойную версию "Вorn to Be Wild" в финале своего выступления,
    они избегают того, чтобы стать чрезмерно серьезными - и получают мой голос. Я
    голосую за них! Если вы живете или часто бываете по делам в Лондоне - проверьте
    афишу на ближайшую неделю - быть может Джимми Си и Блюздрэгонз играют где-то в
    клубе поблизости. Сходите на их представление, я знаю - вы непременно еще вернетесь!..
    Дэррел Парсонс (Darrel Parsons)


    Джимми Си - участник многочисленных блюзовых фестивалей. Только за 2008-2010 годы
    он с успехом выступал на: Mis Mas (Chech republic) - 2006, 2007, 2008, 2009; Mijas
    Blues festival (Spain) - 2009; Dundee Blues bonanza! (Scotland) 2009, 2010, 2011,
    2012, 2013. В июле 2008 года Джимми впервые побывал в России - он выступал на
    сцене Международного Фестиваля "Блюза Дельты Невы" в Ст.Петербурге. Вот отзывы
    о его выступлении:


    Владимир Русинов (Jumping Cats): Джимми Си на фестивале Дельта Невы - 2008. ...Послушали
    Jungle Jam - роковую группу с мощным женским вокалом, они сыграли например Black
    Dog (Led Zeppelin) и даже Personal Jesus (Depeche Mode) в виде жесткого блюзрокового
    шаффла. Потом к группе присоединился клевый англичанин Jimmy C, который с очень
    хорошим вокалам и игрой на гитаре выдал подряд сет из хитов таких как: Hey Joe,
    Hit the Road Jack, Johnny B.Goode, Mojo Working, и т.д.'
