- id: 55
  reviewer_id: 8
  reviewer_name: Борис Литвинцев
  reviewer_token: boris-litvintsev
  header: Интервью для Blues.Ru к московским гастролям 2010
  text: 'В преддверии российского тура Jimmy C, известного канадского блюзмена, проживающего
    в Лондоне, Борис Литвинцев взял интервью специально для сайта Blues.Ru.


    Б.Л. – Известно, что ты начинал карьеру музыканта, играя блюз по клубам западного
    побережья от родного Ванкувера до Сан-Франциско. Те годы были, бесспорно, хорошей
    школой. Кто из великих блюзменов прошлого оказали на тебя наибольшее влияние?


    Jimmy C – Я люблю многих великих блюзменов прошлого, но наибольшее влияние на
    меня оказали два музыканта – Элберт Кинг (ALBERT KING) и Ти-Бон Уокер (T-BONE
    WALKER). Элберт Кинг – своей чистой и отточенной фразировкой, а Ти-Бон Уокер –
    уникальной способностью позволить своей электрогитаре выйти во "фронт" всей группы,
    оставаясь ее частью, и звучать при этом плотным, "сырым" звуком.


    Б.Л. – Во времена гастролей по западному побережью Америки с кем из известных
    людей пришлось поиграть?


    Jimmy C – Западное побережье – это те места, где я вырос, где окончил музыкальный
    колледж. Первые годы с играл преимущественно со своими друзьями и однокашниками
    по колледжу, гастролируя в разных составах с севера на юг и обратно. Мне тогда
    посчастливилось играть с такими людьми, как, например, Джимми Рид (JIMMY REED),
    Отис Раш (OTIS RUSH), Джордж Торогуд (GEORGE THOROGOOD), Джимми Роджерс (JIMMY
    RODERS), Гитар Шорти (GUITAR SHORTY) и многими другими. Играя с музыкантами такого
    уровня, я набрался ценнейшего музыкального и житейского опыта, а самое главное
    – я получил от них особенный взгляд на музыку вообще и на блюз в частности, и,
    что важнее всего – я осознал, что блюз дает музыканту перспективу и способность
    "долговечности", "долгожительства" – ведь блюз, подобно благородному вину, делается
    с возрастом лишь лучше! Блюз – это тот вид деятельности, то искусство, которое
    не имеет "срока годности", ограничений по возрасту – можно играть блюз всю жизнь
    – пока тебе есть, что сказать людям, пока им интересно, пока не умрешь…


    Б.Л. – А твой "японский" период? Как вообще получилось, что ты оказался в Токио?


    Jimmy C – Ха!... в один прекрасный день мне позвонил товарищ-музыкант, который
    давно уже перебрался в Японию, и сказал мне, что я просто обязан "прилететь в
    Токио и осмотреться". В то время Япония была уже по настоящему богатой страной,
    экономика была на подъеме, а обосновавшийся там мой товарищ успел ко времени нашего
    телефонного разговора стать обладателем нескольких самых из самых замечательных
    гитар (1958/9LES PAULS, 57 STRATS, 60''S GIBSON 335''S) – я в те годы о таких
    сокровищах мог только мечтать! – да и вообще оказалось, что Токио это очень блюзовое
    место, и чуть ли ни у каждого блюзмена в распоряжении целая коллекция редких,
    уникальных коллекционных гитар. После моего приезда в Токио и участия в нескольких
    блюзовых джемах мне посчастливилось познакомиться и поиграть со многими известными
    японскими блюзменами – с "Тэдом" ("TAD") , Хиса Накакадо (HISA NAKAKADO), и знаменитым
    Мистером БЛЮЗ (MR.BLUES). Очень важной для меня была встреча и сотрудничество
    и проживавшим тогда в Токио чернокожим американским блюзменом "Хай-Тайдом" Хэррисом
    ("HI TIDE- HARRIS") – он научил меня не только гитарным блюзовым "фишкам", он
    научил меня тому, как надо вести себя на сцене: его выступления начинались с медленного
    тягучего блюза, который играл, сидя на табурете, 70-летний ссутулившийся старик,
    а заканчивались так, как будто ему не больше 30-ти, и он, подпрыгивая и пританцовывая
    на сцене под свою зажигательную музыку, "зажигал" по-полной!… Невероятно, но факт
    – с каждой новой песней градус эмоционального напряжения в зале и прыжки "Хай-Тайда"
    Хэрриса становились все выше – как будто высокий прилив, неумолимо накрывающий
    волнами берег – должно быть по этому его и прозвали "Хай-Тайд", т.е. "Высокий
    Прилив". Куда бы я не отправлялся с тех пор, с кем бы и где бы не играл – я стараюсь
    делать то же самое. В этом и состоит магия и мощь блюза.


    Б.Л. – Твой "Лондонский" период – с кем пришлось поиграть? Резидентом каких клубов
    ты был и являешься теперь?


    Jimmy C – Я побывал в Лондоне с коротким туром (играл на разогреве у "Джон Мэйолл
    БлюзБрэйкерс" (JOHN MAYALL BLUES BREAKERS) и случайно столкнулся с одним из своих
    кумиров: моя встреча с легендарным музыкантом, еще с 60-х годов записывавшимся
    на DECCA, американским певцом "Миссиссиппи" Джоном Л. Уотсоном (Mississippi John
    L Watson) была несомненной удачей и привела к совместным выступлениям по всей
    Британии в составе THE ODDESSY BLUES BAND.


    Джон Л. считал, что мой стиль как нельзя лучше подходит для его новых идей – и
    я принял участие в записи совместного альбома в Лондоне в 1999 году. После того,
    как группа распалась, я собрал собственный коллектив и играл по клубам Лондона
    и окрестностей. После нескольких успешных выступлений в культовом лондонском клубе
    "AIN''T NOTHIN'' BUT… the Blues Bar", я получил приглашение стать резидентом этого
    клуба и вот уже около 10 лет стабильно играю там 2-3 раза в месяц. Резидентство
    в таком клубе открывает для музыканта множество возможностей – я был участником
    многочисленных блюзовых фестивалей, за последние пару лет: дважды на DUNDEE BLUES
    FESTIVAL 2009/2010 (SCOTTLAND), MIJAS BLUES FESTIVAL 2009 (SPAIN), Международном
    фестивале блюза "Дельта Невы" (NEVA DELTA BLUES 2008, ST.PETERSBURG, RUSSIA).


    Б.Л. – Скажи, каковы были твои ожидания от первого появления в России в качестве
    одного их хэд-лайнеров "Дельта Невы-08"? Насколько они разошлись, или, напротив,
    совпали с реальностью?


    Jimmy C – Мои ожидания были довольно наивными и основывались на классическом "западном"
    стереотипном представлении о России. Однако с первого знакомства с музыкантами,
    с которыми я выступал на фесте, с первого дня фестиваля я осознал насколько высоко
    исполнительское мастерство русских блюзменов, а вокалисты, в отличие от тех же
    японцев, обладают не только прекрасными вокальными данными, но и глубоко понимают
    англоязычный блюз и вкладывают душу и страсть в исполнение. При том, что очевидно,
    английский не является для них родным языком, большинство из русских участников
    фестиваля "Дельта Невы" пели стандарты с такой страстью, как будто это их собственные
    песни и их собственные переживания. Я был весьма впечатлен!


    Б.Л. – Я что ты можешь сказать о русских блюзменах, с которыми тебе выпал шанс
    играть и джемовать вместе?


    Jimmy C – Как я и сказал раньше, уровень исполнительского мастерства соответствует
    весьма высокому стандарту. Надеюсь, что новые концерты с русскими блюзменами позволят
    мне вернуться домой с новыми идеями.


    Б.Л. – Чего ты ждешь от своего второго российского тура?


    Jimmy C – Если бы я мог пережить и испытать в этом туре то, что пережил во время
    своего первого тура в 2008-м, я считал бы, что 2-й тур не менее успешный, чем
    первый. Кроме того, в прошлый приезд Москва в расписание тура не попала, а мне
    хотелось бы увидеть Москву и все ее достопримечательности.


    Б.Л. – Джимми, а что можешь сказать о российской публике, о тех, кто приходил
    на твои выступления в 2008-м? Есть ли на твой взгляд отличие между русской публикой
    и более привычной тебе европейской/американской/британской?


    Jimmy C – Сказать по правде, люди – всегда люди, и если они чувствуют что-то в
    музыке, они всегда реагируют… если музыка трогает, она трогает всех, независимо
    от национальности. Кроме того музыка, и блюз не исключение, это интернациональный
    язык общения и часто экспрессия значит больше, чем слова песни… На самом деле,
    сильно от исполнителя зависит – удастся создать атмосферу в зале или нет.


    Мой личный опыт говорит, что если музыка несет заряд позитива, если зовет "давайте
    танцевать и получать удовольствие", то язык не имеет значения – люди поймут и
    примут этот призыв. Если музыка говорит "тише, успокойтесь, прислушайтесь, задумайтесь"
    – люди поймут и последуют призыву в любой стране, независимо от языка… А принимали
    меня в России на "ура!", надеюсь, и в этот раз так будет.


    Б.Л. – Джимми, а каков твой главный "месседж", который ты посылаешь публике со
    сцены? Что ты хочешь сказать людям своей игрой, своим творчеством?


    Jimmy C – Ну, на самом деле, у меня нет никакой "сверх-идеи"… я просто пою и играю
    песни, которые я люблю - и своего сочинения, и классические "стандарты". Все,
    что я пытаюсь делать, – это постараться, чтобы люди, приходящие на мои концерты,
    почувствовали себя лучше, чем до концерта, и, уходя домой, уносили в себе частичку
    того позитива, что я несу им со сцены, и делились им со своими близкими, как делюсь
    со своей публикой я.


    Б.Л. – Не могу не задать стандартный вопрос – какие планы на ближайшее будущее?
    Новый альбом, может быть ДВД, или новые туры/фестивали в 2011-м?


    Jimmy C – У меня записан весь новый материал для нового альбома, идет работа по
    мастерингу и сведению, надеюсь весной 2011, где-то к апрелю работа будет завершена.
    Во время московских концертов мы планируем записать кое-что, а клубе МЮЗИК ТАУН
    будет полномасштабная видео-съемка… если получится неплохо – возможно и "живой"
    ДВД выпустим…


    Б.Л. – Ну, ладно, не скромничай! Желаем успехов во втором московском туре!


    Jimmy C – Спасибо! С нетерпением жду встречи со старыми друзьями-блюзменами, с
    которыми джемовал на фесте "Дельта Невы" два года назад, и с искушенной московской
    публикой. Приходите – будет весело!


    Интервью, перевод – Борис Литвинцев.'
  verified: true
