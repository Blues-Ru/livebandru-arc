  header: Интервью для Блюз.Ру к гастролям 2011 г
  text: '-БЛ: Джимми, ровно год прошел с твоего последнего визита в Москву в ноябре
    2010 - с каким настроением ты возвращаешься в Россию?


    -Дж.Си: Я с нетерпением жду возвращения в Россию - и это будет мой третий визит.
    Я чувствую, что могу воспринять культуру России в новом свете, поскольку в этом
    туре я смогу посетить гораздо больше городов - тур захватывает Урал, Сибирь, старинные
    русские города Центра России на легендарном Золотом Кольце, и. конечно Москву.
    Думаю, этот тур позволит мне увидеть гораздо больше, чем прежде и поделиться своей
    музыкой с гораздо большей аудиторией.


    -БЛ: А что нового произошло в твоей жизни за истекший год?


    -Дж.Си: У меня много нового материала и работал с ним в Лондонской студии и в
    родном Ванкувере, но у меня не было возможность закончить работу к началу нового
    российского тура - я всю весну и лето гастролировал... Однако. Те, кто придет
    на мои концерты, смогут услышать что-то из нового репертуара - русская публика
    будет первой, кто услышит новый материал в "живом" исполнении, еще до выхода официального
    релиза. А еще в России закончен пост-продакшн двухчасового двухдискового ДВД с
    концертом, записанным в прошлогоднем туре, на концерте в московском клубе МюзикТаун
    - мы сделаем презентацию официального релиза ДВД почти день в день - 2 ноября
    2011 там же, в МюзикТауне. Приглашаю всех - зрителей на концерт, музыкантов на
    джем!


    -БЛ: Ты упомянул о гастролях - где ты выступал за прошедший год?


    -Дж.Си: В истекшем году я побывал с концертами, не считая лондонских клубов, где
    я выступаю резидентно, во многих местах... достаточно упомянуть самые крупные
    гастроли - блюзовый фест Dundee Blues в Шотландии, юг и центр Франции, Германия,
    Канада, Португалия, Греция... кстати, везде подписаны контракты на выступления
    в будущем году.


    -БЛ: Джимми, как ты считаешь, от чего география твоих гастролей столь широка?


    -Дж.Си: Жить в Лондоне и резидентно играть в лучших лондонских клубах, это большое
    преимущество - я встречаю множество людей со всего мира на своих концертах и джемах,
    и многие из них приглашают меня приехать играть к ним в город, в их страну. В
    случае, когда это не просто вежливое выражение восторга и благодарности, а деловое
    предложение - гастролям суждено состояться. Собственно, именно так я и приехал
    впервые в Россию, помнишь? Ведь все началось с твоего приглашения в 2007, кажется?


    -БЛ: Да так и было, и твое первое выступление состоялось на питерском Международном
    Блюзовом Фестивале "Дельта Невы" в июле 2008-го. Помнится, ты говорил, что это
    был бесценный жизненный опыт...


    -Дж.Си: Со своего первого выступления я вынес и бережно храню очень теплое чувство
    о первой встрече с русской публикой - очень чуткой, знающей и сопереживающей.
    Но что еще важнее, я с удивлением и радостью обнаружил, что российские блюзмены
    играют блюз ничуть не хуже своих коллег из стран с развитой блюзовой традицией.
    Поэтому я не только с воодушевлением жду новой встречи с русской публикой, но
    и с восторгом предвкушаю удовольствие играть с русскими блюзменами, и с теми,
    с кем я хорошо знаком, и с теми, кто придет поджемовать со мной в каждом из клубов
    в каждом из городов этого тура. Надеюсь, что с нетерпением ожидаемый, третий по
    счету тур по России обогатит меня новыми знакомствами и новыми впечатлениями и
    я смогу увезти с собой в Лондон частичку России в свой душе.'
