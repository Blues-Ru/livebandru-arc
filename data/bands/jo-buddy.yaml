  text: 'Впервые в России!


    Автор песен, гитарист и певец Джо Бадди (Jo'' Buddy) - подлинное явление в блюзе
    и рок-н-ролле не только для Финляндии, но и для всего музыкального мира. Его расслабленная
    музыка - она и надмирная, и абсолютно земная, она исходит от корневого стиля,
    но не имеет временных границ!


    Насыщенный и пряный гамбо рок-н-ролл от Джо Бадди включает в себя в самых изысканных
    сочетаниях такие стили как swamp boogie, down home blues, rock''n''roll, surf
    & sarage rock, jump blues, zydeco, New Orleans rhythm & blues, gospel, soul, ragtime,
    swing, country, ska, rock steady, heartfelt ballads... и даже отголоски западно-африканских
    ритмов и испанского фламенко!


    Его обширный репертуар состоит из собственных песен мирового уровня, звучащих
    как ни у кого другого. Джо - фанат музыки, он живет ей и всем другим хорошим,
    что есть в жизни. И, выходя к публике, заряжает ее своим волшебством; делает то,
    что умеет лучше всего - поет и играет, как может только он!


    30 лет в музыке с тысячами шоу по всему миру и записей в студиях сделали 49-летнего
    Джо Бадди одним из уважаемых и востребованных музыкантов своего поколения. За
    эти годы он сыграл на одной сцене с невероятным количеством великих мастеров музыки
    - с Big Jay McNeely, Maceo Parker & Horny Horns, Howard "Louie Bluie" Armstrong,
    Lazy Lester, Eddy Clearwater, Louisiana Red, Oliver "La La" Morgan, Jim Kweskin,
    Chris Thomas King Band, Kim Wilson, The Fabulous Thunderbirds, Gene Taylor, Lee
    Oscar, Doyle Bramhall Sr., Junior Watson, Rick Holmstrom, Larry Taylor, Richard
    Innes, Fred Kaplan,Bob Margolin, David Maxwell, Bob Corritore, The LeRoy Brothers,
    Lurrie Bell, Bill Sims, Seasick Steve, Carlos Guitarlos, Bob Brozman, T.J. Wheeler,
    Lynwood Slim, R.J. Mischo, Diz & the Doormen, Doug McLeod, Nathan James, Wiley
    Cousins, Little Victor, Big Joe Louis, Black Voices,Sven Zetterberg, Knut Reiersrud
    Band, Danny Marks, Carlos del Junco, Trick Bag, Jim''s Combo,Knock Out Greg &
    Blue Weather, Cajun du Nord - и это не весь список!


    Отметим, что в Москву Джо Бадди зазвали постоянные резиденты Клуба - группа The
    Jumping Cats, одна из самых интересных движущих сил блюзовой сцены России! (При
    поддержке "котов" с огромным успехом и резонансом прошли российские таких мировых
    звезд как Bob Margolin, John Nemeth, Kirk Fletcher, JW Jones и многих других.)'
