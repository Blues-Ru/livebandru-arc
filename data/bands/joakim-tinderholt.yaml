  text: '29-го и 30-го ноября 2013 года в Москве пройдут концерты великолепного норвежского
    музыканта Joakim Tinderholt.


    Joakim Tinderholt - невероятно мощный блюзовый певец и гитарист. Его отличают
    тончайший вкус и яркое концертное шоу, изумительный блюзовый голос и эмоциональная
    гитара. Joakim убежденно чтит и хранит традиции настоящего стиля и, несмотря на
    свой молодой возраст, глубоко впитал энергию и характер традиционного блюза. Со
    своей группой он объехал с концертами всю Норвегию, в том числе был участником
    самых крупных международных фестивалей - Notodden Blues Festival, Dark Season
    Blues Festival, Color Blues Festival.


    В Россию Joakim приезжает не впервые и, как всегда, поддерживать его концерты
    будут друзья - одна из самых заметных блюзовых групп России The Jumping Cats.


    The Jumping Cats регулярно дают впечатляющие сольные концерты в самых стильных
    музыкальных клубах и барах Москвы и России. Музыканты неоднократно организовывали
    незабываемые для всех ценителей настоящей музыки гастроли зарубежных музыкантов.
    Ребята играли в рамках российских турне с Bob Margolin, John Nemeth, Kirk Fletcher,
    JW Jones и многими другими музыкантами. В прошлом году The Jumping Cats записали
    в Норвегии свой первый диск "On the Roof" , который выпустили и презентовали в
    июне этого года.


    Для московских концертов музыканты подготовили уникальную программу. Определенно,
    грядущие концерты обещают быть запоминающимся музыкальным событием в жизни города,
    которое никак нельзя пропустить.


    Встречаемся на концертах Joakim Tinderholt & The Jumping Cats 29-го ноября в "Доме
    у дороге" и 30-го ноября в Speakeasy Bar Jack Rose!'
