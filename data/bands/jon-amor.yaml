  header: Jon Amor - Гулливер Британского блюз-рока
  text: 'Двухметровый Jon Amor - один из ведущих британских блюз-роковых гитаристов
    последних 20-25 лет. Неоднократный номинат и обладатель British Blues Awards в
    нескольких номинациях.


    Он - лидер группы The Hoax, лидер двух своих side-проектов AMOR и Jon Amor Blues
    Group, а последние пять лет - еще и участник новой блюз-роковой супер-группы The
    Boom Band, организованной зимой 2013/14 года при участии его друзей гитаристов
    Маркуса Бонфанти, Мэтта Тэйлора, клавишника Падди Милнера и еще ряда звездных
    музыкантов. The Boom Band в 2014 году выпустил одноименный студийный альбом, в
    том числе и лимитрованный релиз на виниле, и получил несколько номинаций на British
    Blues Awards. Ежегодно накануне Рождества проект давал несколько аншлаговых концертов
    в Британии, причем первый концерт в легендарном лондонском клубе HalfMoon Putney
    был записан и издан на альбоме The Moon Goes Boom, а в предновогоднем концерте
    The Boom Band принимали участие в качестве специальных гостей легенды британского
    ритм-блюза Ван Моррисон, Уилко Джонсон и Пол Джонс.


    В активе у Джона Эймора несколько альбомов, записанных в составе The Hoax, включая
    последний 2013 года, за который он был номинирован на British Blues Awards 2014
    в трех номинациях - как лучший гитрист, лучшая группа и лучший сонг-райтер, плюс
    пять сольных альбомов и неисчислимое множество альбомов, в которых он принял участие
    в качестве специального гостя или сессионного музыканта.


    Его стилю присущи в равной степени и пулеметная скорострельность соло, и чеканные
    риффы, и тонкий лиризм.


    Впервые Джон Эймор приезжал в Росиию летом 2014 года и отыграл несколько концертов
    в Москве и Ст.Петербурге.


    Второй тур Эймора в России состоялся с 24 по 28 апреля 2019 года.'
