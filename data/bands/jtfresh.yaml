  header: Квинтет из Киева, играющих настоящий main stream.
  text: 'И, казалось бы, кто может делать это лучше американцев?.. Однако, есть такие
    люди, и среди нас! Люди знающие как завладеть вниманием даже самых искушенных
    слушателей. Их выступление - это всегда лучшие джазовые темы и оригинальные авторские
    пьесы. Добавьте ко всему этому неожиданные музыкальные цитаты, остроумно вплетенные
    то тут то там, и вот он - "J.T.Fresh"!


    Каждый из них заслуживает отдельного разговора, но, как это и должно быть, ни
    кто не расскажет о музыкантах больше, чем музыка, которую они играют. В их соло
    нет случайных нот. Слушая" J.T.Fresh", в буквальном смысле окунаешься в красивые
    мысли и позитивные эмоции.


    P.S. "J.T.Fresh" – пейте охлажденным и не забудьте закусить!'
