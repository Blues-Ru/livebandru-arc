  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Уроженец портового Бристоля и житель Лондона, певец, гитарист, сонграйтер,
    саунд-продюсер, поражающий воображение человек-оркестр, лидер блюз-роковой команды
    24 PESOS - ДЖУЛИАН БЕРДОК, чей страстный, глубокий вокал и техничная гармоника
    моментально узнаваемы, виртуозно владеет акустикой, добро, резонаторной гитарой,
    слайдом, электрогитарой и странными, разнообразными эффектами. Он исключительно
    хорош и как бэнд-лидер, и как one-man-band.


    Его группа 24 PESOS - неоднократный номинант и обладатель награды British Blues
    Awards в номинации "Best Blues Band", а сам он, как сольный исполнитель - номинант
    на British Blues Awards в номинации "Best Acoustic Act".


    Джулиан постоянно гастролирyет как сольный артист или вместе с группой, резидентно
    выступает к ведущих британских и европейских блюз-клубах и на крупнейших блюзовых
    фестивалях от Норвегии до Испании.


    В декабре 2014 Джулиан впервые приехал в Россию и дал несколько концертов в Москве
    и Саратове.


    В конце июня 2015 состоялся второй визит Джулиана в Россию - он отыграл три концерта
    в Москве и пару хэдлайнеских выступлений на Блюз-Байк Фестивале Total Flame в
    Суздале.


    В августе-сентябре 2016 Джулиан приезжал в Россию в третий раз, сыграл несколько
    концертов в Москве и Саратове, сыграл на благотворительном мероприятии в Резиденции
    Посольства Великобритании, а также выступил одним из хэдлайнеров фестиваля Koktebel
    Jazz Party, где взял приз зрительских симпатий.


    В августе-сентябре 2017 Джулиан приезжал в Россию в червертый раз, сыграл несколько
    концертов в Москве и Ст.Петербурге, вновь в Резиденции Посольства Великобритании,
    вместе с давним другом Тоддом Шапвиллом выступил на радио "ЭХО Москвы" и принял
    участие в съемках материала для будущих ТВ-серий "Приключения Британцев в России".
    Пятый тур Джулиана прошел осенью 2018 года. Один из концертов - в зале ЦДХ - был
    профессионально записан на видео. Материал готовится к выпуску в формате DVD/2CD.
    Шестой российский тур прошел с 24 по 29 сентября 2019 года.


    В ноябре 2019 года был официально выпущен на физическом носителе и на всех цифровых
    платформах долгожданный новый альбом 24PESOS "Flesh & Bones", треки с которого
    с конца лета находились в ротации на британских радиостанциях, и спустя месяц
    альбом занял 10-ю строчку в списке из 40 наиболее ротируемых блюзовых альбомов
    2019 года по версии IBBA - Ассоциации Независимых Радиовещателей Британии.


    Седьмой тур Джулиана с материалом с нового альбома с успехом прошел с 12 по 16
    февраля 2020, за месяц до пандемии.


    Очередной, восьмой тур Бердока по России пройдет с 18 марта по 3 апреля, причем
    в Москве - эксклюзивно в клубе МАГНУС ЛОКУС. Не пропустите!'
