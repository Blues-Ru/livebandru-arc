reviews:
- id: 22
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  header: Jumble Tone
  text: 'Jumble Tone - современное сочетание музыкальных оттенков во всем разнообразии
    их настроений: от нежной романтики до безудержного веселья, от меланхоличной мелодии
    до бешеного ритма в стиле свинг. Море позитива и ярких красок, эмоции гитарного
    соло и энергия ритм-секции, а сильный женский вокал раскроет Вам все нюансы музыкальных
    настроений.


    Музыканты Jumble Tone – смелые экспериментаторы, талантливые исполнители, выходят
    за рамки традиционности и рушат границы стилей. Свежий взгляд, оригинальная подача,
    умение сохранить индивидуальность музыкального произведения, представив его в
    новом свете.


    На концертах группы чувствуется жизнь – музыка забирает в мир, где разные стили
    живут в гармонии. Отважьтесь вспомнить и заново насладиться великими хитами прошлого,
    окунуться в настоящее и заглянуть в будущее.'
  verified: true
