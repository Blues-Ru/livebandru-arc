  text: 'Очень известная в московских клубах группа.


    Концертные выступления группы отличает музыкальное и эмоциональное разнообразие,
    максимальная самоотдача музыкантов, постоянные импровизации в шоу и музыке.


    Основу музыкального репертуара и самой манеры исполнения составляет блюз, музыканты
    свободно переходят во многие смежные стили, такие как серф, свинг, рокеннрол и
    соул.


    Группу отличает высокое качество исполнения и внимательное отношение к звуку.
    Звук группы - натуральный, сильно вдохновленный звуком американской музыки 50х
    и 60х годов. (используются соотвествущие инструменты, усилители, техники звукоизвлечения),
    но иногда на концерте можно услышать и очень неожиданные вариации со звуком и
    стилями.


    Уже многие годы группа постоянно выступает во всех основных блюзовых клубах москвы,
    таких как Дом у Дороги, B.B. King, Music Town, Ритм-н-Блюз Кафе и пр, сменив за
    это время сотню песен в своем репертуаре и постоянно развиваясь.


    Очень часто с группой выступают многие известные музыканты, при этом любое совместное
    выступление тщательно подготавливается.


    В настоящий момент группа дает регулярные концерты в клубе Дом у Дороги, где каждую
    неделю представляет полностью новый сет с приглашенными музыкантами.


    Группа свободно раскачивает как маленькие клубы, так и огромные open-air.


    Группа играет ради музыки и никогда не халтурит. А после концертов "Прыгающих
    Котов" у слушателей начинается прилив сил, припадки позитива, хорошего настроения
    и всеобщей радости. Побочных эффектов нет. Послужной список


    Группа ведет "Прыгающие Вторники" в главном блюзовом клубе "Дом у Дороги". Гостями
    Прыгающих Котов уже были: <ul><li>Сергей Воронов - вокал, гитара (группа The Crossroadz)
    <li>Сергей Манукян - вокал, клавишные <li>Владимир Кожекин - вокал, губная гармошка
    (группа Станция Мир) <li>Феликс Лаухти - скрипка (группа Funky Family) <li>Иван
    Жук - вокал, гитара (группа Наеховичи) <li>Владимир Демьянов - вокал, гитара (группа
    Blues Doctros) <li>Тимофей Копылов - вокал, шоу (группа Blackmailers) <li>Тимур
    Ведерников - стил гитара (ген.продюссер фестиваля "Мамакабо") <li>Александр Родовский
    - виртуозная джазовая гитара. <li>Григорий Сандомирский - орган (группа Lampa
    Ladino) <li>Екатерина Щелкова - вокал (группа Old Fashioned Blues Project) <li>Юрий
    Новгородский - гитара, вокал. (Funky Soul Арутюнова и не только) <li>Артем Жульев
    - саксофон (группа Jazzfabrique) <li>Юрий Каверкин - вокал, гитара (группа The
    Dirty Dozen) <li>Петр Репин - вокал, клавишные (супер-монстр) <li>Николай Сырцев
    - бас-гитара (группа Disen Gage) <li>Даниил Жешков - вокал, гитара (группа ChillOut
    Band, С.-Петербург) <li>Федор Романенко - вокал, гитара (создатель сайта blues.ru)
    </ul>


    В марте 2009, во время своего выступления в Доме у Дороги одни из самых востребованных
    современных блюзовых исполнителей - Enrico Crivellaro и Brian Templeton пригласили
    на сцену всю группу The Jumping Cats целиком и исполнили с группой небольшой,
    но невероятно мощный сет. Сама группа получила крайне высокую оценку от профессионалов
    мирового уровня.


    В октябре 2008, группа аккоманировала классику трационного блюза Keith Dunn в
    клубе B.B.King.


    По просьбе компании "Музторг" коллектив представил блюзовую музыку на выставке
    "Музыка-Москва 2008"


    В сентябре 2008 группа самостоятельно организовала совместные российские гастроли
    с норвежским мастером блюзового вокала Joakim Tinderholt.


    31-го августа 2008 года группа открывала фестиваль "Свинговый Бум" на открытом
    воздухе в Горбушке, где собрала несколько сотен слушателей из случайно проходивших
    мимо людей.


    The Jumping Cats успешно приняли участие в пятом московском международном фестивале
    блюза в парке Лефортово, где выступали такие звезды мирового блюза, как Kenny
    Neal, Lil''Ed & The Blues Imperials и Eric Sardinas.


    С огромным успехом группа выступила на фестивале "Блюз на Веранде-2008" в городе
    Вологда.


    Группа участвовала в фестивале "Дельта Невы-2008" в Санкт-Петербурге, где получила
    самые положительные отзывы от организаторов и американских хедлайнеров фестиваля.


    Группа провела мощнейшее afterparty "Пустых Холмов-2008", где с группой джемовали:
    Z-Star, Иван Жук, Владимир Кожекин, Юрий Каверкин, Алексей Силуянов.


    Группа участвовала в фестивале "Пустые Холмы 2008", а ее лидер Владимир Русинов
    являлся составителем (арт-директром) и ведущим блюзового сета фестиваля.


    В мае 2008 года Владимир Русинов выступил коротким самостоятельным сетом в Redwood
    Bar (Los Ageles, CA) с группой Rick Holmstrom''а (Stephen Hodges - drums, Jeff
    Turmes - bass).


    Группа участвовала в международном фестивале "Мамакабо 2007" в Коктебеле, Крым.


    Владимир Русинов является автором трех-гитарного музыкального проекта Guitarrmaggeddon.ru
    (Владимир Русинов, Арсен Шомахов, Дмитрий Красивов). В таком составе у проекта
    было два фестивальных выступления в качестве хедлайнеров: "Гитарный Фестиваль
    в ЦДХ - 2006" и "Пустые Холмы - 2007", также существует клубная запись из "Дома
    у Дороги". Основой данного проекта всегда была группа The Jumping Cats.


    Совместный с Алексеем Силуяновым инструментальный блюзовый проект СилуяноВРусинов
    выступал на фестивале "Пустые Холмы - 2007".


    Группа The Jumping Cats становилась основой для клубных и фестивальных выступлений
    норвежского гармониста Эйрика Бергине в 2005ом и 2006ом году. В 2006 году эти
    высупления прошли в рамках совместного проекта "Владимир Русинов & Eirik Bergene".


    В 2006ом году группа впервые выступила на фестивале "Пустые Холмы".


    В 2006ом году Владимир Русинов выступил со своим персональным сетом на фестивале
    "Никола-Ленивец".


    В 2005ом и 2007ых годах группа выступала на фестивале "Свинговый Бум" в клубах
    Б2 и Б1, где была высоко оценена организатором - Олегом Усмановым (ex Мистер-Твистер)
    и танцорами свинга. Как результат Владимир Русинов был неоднократно приглашен
    в группу Олега "Пижоны" в качестве сессионого музыканта (Москва, Томск, Украина).


    В 2005ом году группа The Jumping Cats перекрестным образом джемовала с группой
    Paul Lamb - практически все музыканты обоих групп сыграли друг с другом.


    В 2005ом году в журнале "Guitars Magazine" выходит большая статья Владимира Русинова
    о классических гитарных усилителях фендер.


    В 2005ом году группа вела блюзовый джем звезд в рамках общего гитарного фестиваля
    в ЦДХ.


    В 2004ом году группа выступала в ДК "Горбунова" в Fender Party вместе с такими
    группами как "Crossroadz" и "Браво".


    В 2003ем году Владимир Русинов победил в первом всеросийском гитарном конкурсе
    "Русский Хендрикс".


    Группа участвовала во всех фестивалях blues.ru с 2002ого года.


    Также за последние годы Владимир Русинов много и успешно джемовал со многими известными
    блюзовыми музыкантами: John Primer, Lurrie Bell, Eddie C. Cambpell, Phil Guy,
    Vidar Busk, Kid Andersen и многими другими.'
