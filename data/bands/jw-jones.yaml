  header: 16-19 марта 2011 - гастроли JW-Jones в Москве!
  text: 'Один из самых лучших блюзменов Канады, гитарист и вокалист JW-Jones приезжает
    в Россию!


    Jones представит песни с последнего альбома "Midnight Memphis Sun", а также новые
    композиции, которые можно услышать только на его живых выступлениях. JW Jones
    активно выступает по всему миру (Штаты, Европа, Австралия и Бразилия) , зрители
    давно признали его шоу одним из наиболее энергичных и впечатляющих на блюзовой
    сцене.


    JW-Jones выступал совместно со многими блюзовыми звездами современности (The Fabulous
    Thunderbirds, Little Charlie & The Nightcats, Rod Piazza, Anson Funderburgh with
    Sam Myers, The Mannish Boys и легендарным Hubert Sumlin).


    Один из Братьев Блюз, известный актер и пропагандист блюза, Dan Aykroyd после
    выступления вместе с группой JW-Jones сказал: "Изумительная группа, я играл с
    лучшими!"


    На новом диске JW-Jones "Midnight Memphis Sun", вышедшем в 2010 году, в качестве
    специальных гостей записались такие признанные легенды блюза как Hubert Sumlin
    и Charlie Musselwhite. На предыдущих дисках в качестве гостей сыграли David ''Fathead''
    Newman (саксофонист Ray Charles), Little Charlie Baty, Junior Watson, Colin James
    и Kim Wilson, который также был продюсером диска "My Kind of Evil" в 2004ом году.


    В 2009 году, один из главных гитарных журналов "Guitar World Magazine" выпустил
    диск "Guitar Masters Vol. 2", на котором Jones оказался в компании таких артистов
    как B.B. King, Jimmy Page, Jeff Beck, Carlos Santana.


    Группа JW-Jones получила национальную канадскую награду the Maple Blues Award
    за "Лучший концерт электрического блюза". В этом году Jones получил награду Blues411
    в номинации "Лучший блюзовый вокалист".


    <a href="http://www.jw-jones.com">www.jw-jones.com</a>


    В середине марта JW-Jones впервые доберется до России и даст умопомрачительные
    концерты вместе с группой <a href="http://www.bluescats.ru">"The Jumping Cats"</a>.


    "The Jumping Cats" - одна из наиболее ярких российских блюзовых групп. Они неоднократно
    выступали на международных и российских фестивалях и аккомпанировали западным
    музыкантам в российских турах.


    <a href="http://www.bluescats.ru">www.bluescats.ru</a>'
