  reviewer_token: press-release
  header: Kamchatka
  text: Шведское пауэр-трио KAMCHATKA на сегодняшний день является одной из самых
    интересных современных блюз-роковых команд старой школы. Музыка группы представляет
    собой сплав сочного психоделического тяжелого блюза времен Хендрикса и Cream со
    стоунер-роком от Kyuss и прогрессивом от King Crimson, записанный под впечатлением
    от суровой северной природы.
