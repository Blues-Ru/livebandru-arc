  text: 'Блюз зародился в конце XIX века в дельте Миссисипи, а известный московский
    блюзмен Юрий Каверкин родился в середине ХХ века в Тбилиси. Его фирменный стиль
    – блюзовая архаика с элементами тяжелого блюза. Юрий исполняет оригинальные кавер-версии
    известных блюзовых композиций Джона Ли Хукера, Хаулин Вульфа, Лайтнин Хопкинса,
    Мадди Уотерса и других классиков жанра. Также в его репертуаре довольно много
    собственных композиций, пользующихся большой популярностью и признанием среди
    многочисленных поклонников его таланта.


    Каверкина специально приглашают на гитарные блюзовые и джазовые фестивали, чтобы
    показать начинающим гитаристам-технарям, коих немало среди публики, как можно
    вкусно "не уметь" играть на гитаре. Недаром Юрия так любят и западные блюзовые
    гастролеры, с удовольствием джемующие с ним. Один из его туров в Питере, например,
    поддержал своим участием Кейт Данн, известный американский исполнитель на губной
    гармонике. Кроме Москвы и других городов России, Юрий Каверкин с большим успехом
    выступал в Сербии (фестиваль Voxstock) и Израиле.'
  verified: true
