  text: '"...удивительно гармоничное сочетание стилей – от джаза 20-х годов до музыки
    Джона Колтрейна..." Бад Шэнк, Arts & Entertainment, США


    "...Киреев словно рожден с пониманием того, как нужно это играть на саксофоне."
    Ховард Мендел, Президент Ассоциации Джазовых Журналистов, США


    "Русский саксофонист завоевал репутацию мощного, свингующего музыканта с неистощимой
    энергией" The Express Star, Великобритания


    На сегодняшней сцене джазового мейнстрима ("основного течения"), перенасыщенной
    талантливыми и хорошо образованными музыкантами, выделиться непросто. Классический
    джаз постепенно возрождается, приобретает все больший вес в среде уверенных в
    себе и успешных в жизни слушателей. Музыка, которую джазовые радикалы поспешили
    объявить умершей еще в 1970-х, вновь сильна и популярна; и, разумеется, каждому
    обращающемуся к ней исполнителю приходится делать выбор: развлекатель он или художник,
    реставратор традиций или новатор, последователь или автор. И, собственно говоря,
    зарабатывает ли он себе на жизнь ремесленничеством или видит в этой музыке настоящее
    высокое искусство. Этот выбор потому и серьезен, что мейнстрим воспринимается
    обычно как музыка устоявшаяся, не допускающая резких новаций и экспериментов.


    Олег Киреев – из тех музыкантов, чья любовь к мейнстриму рождалась еще в годы
    его относительного упадка, когда в мире считалось правильным экспериментировать
    с этникой, джаз-роком или электроникой. Олег создавал свои первые мейнстрим-проекты,
    не упуская из виду эти современные тенденции, и во многом именно поэтому западная
    пресса называет саксофониста "революционным"; однако то, что на первый взгляд
    производит впечатление революции – на самом деле последовательное и осознанное
    развитие идей, берущих свое начало именно в классическом джазе.


    Первый полноценный период мейнстрима в творчестве Олега Киреева начался на рубеже
    80-х и 90-х, когда он, добившись в СССР признания с этно-джазовой группой "Орлан",
    перебрался на несколько лет в Польшу и сконцентрировался на современном джазе.
    Знаменитая польская школа скорректировала его почерк, и на стыке двух национальных
    школ (джазовой польской и этнической российской) родился тот голос, который и
    прославил Киреева по-настоящему. Голос, взявший все лучшее от джазовой традиции,
    свободно пользующийся современным музыкальным языком и соблюдающий баланс между
    старым и новым.


    Записанный в 1994-м альбом "Romantic", на котором Киреев впервые высказался именно
    в мейнстриме, сразу обратил на себя внимание: американский саксофонист Бад Шэнк,
    впечатленный этой работой, пригласил Олега учиться в США. Киреев открывает для
    себя родину джаза, играет в ансамбле наиболее успешных выпускников школы Шэнка,
    выступает на фестивалях в Портленде и Сиэтле, завязывает творческие связи с многими
    великолепными джазменами Америки – и все это время доказывает на практике, что
    классический джаз жив, интересен, перспективен. Пресса отмечает его одновременное
    соответствие канонам старой саксофонной школы и современность, уважение к традиции
    и наличие собственных идей. В 1996-м квартет Киреева получает диплом "За выдающееся
    выступление" на фестивале в Монтре (!), а вскоре после этого выходит записанный
    в Польше альбом "Song For Sonny" - пожалуй, самое удачное на сегодня произведение
    Киреева как мейнстримового музыканта, записанное при участии специального гостя,
    пианиста Иоахима Менцеля. Эта работа открывает для Киреева новую страну – Великобританию.
    Показанная в 1997-м на Бирмингемском джаз-фестивале программа альбома приводит
    к тому, что его называют "сюрпризом" и "экстраординарным тенористом". Успешно
    прошло и фестивальное выступление в Лондоне, после которого визиты Киреева на
    Альбион делаются такими же регулярными, как и в другие страны.


    Подобно многим великим джазменам, Олег не боится экспериментировать в классическом
    джазе с малыми составами: крайне интересен, например, его дуэт с известным гитаристом
    Александром Виницким. Что до его собственного коллектива, то постепенно Олег собирает
    вокруг себя ведущих российских специалистов по музыке времен расцвета джаза, время
    от времени обновляя коллектив за счет "молодых львов" - музыкантов нового поколения,
    имеющих блестящую школу американского образца, охотно приглашая гостей, исполняя
    как стандарты, так и авторскую музыку. Параллельно развиваемые проекты в области
    этнического джаза, world music, smooth jazz''а позволяют ему оставаться на виду
    у самой разнообразной аудитории.


    Совмещая карьеру музыканта с деятельность организатора, Олег формирует "лицо"
    лучшего джаз-клуба современной Москвы. Именно здесь его ансамбль получает постоянную
    прописку и завоевывает любовь слушателей, постоянно совершенствуя программу и
    проводя своеобразные абонементы, посвященные творческому наследию великих джазовых
    музыкантов. Квартет и трио Олега много и плодотворно работает с ведущими современными
    музыкантами США, гастролирующими в России. Разнообразие творческих концепций,
    которые привозят эти музыканты в Россию, их прошлого, даже самих их инструментов
    позволяют ансамблю Олега получать совершенно уникальный опыт взаимодействия с
    "передовой" современного джаза.


    Киреев ездит в гастрольные туры, не уступающие по масштабу турам мировых джазовых
    звезд. Так, после 20-дневных гастролей по Польше о нем появилась большая статья
    в легендарном журнале "Jazz Forum". С Олегом сотрудничают музыканты из разных
    стран, олицетворяющие сегодняшнее состояние импровизационной музыки, и это сотрудничество
    часто имеет по-настоящему интернациональный характер. В ближайшем будущем ему
    предстоит, например, польский тур с американским пианистом Китом Джаворсом, к
    которому внимательно присматривается весь джазовый мир: подобно самому Кирееву,
    это музыкант, способный смотреть на классический джаз как на действительно актуальное
    искусство.


    Сегодняшний Олег Киреев – это музыкант мирового уровня, чья национальная принадлежность
    уже не играет для коллег и промоутеров особой роли. Он играет на совершенно разных
    сценах, в совершенно разных странах, исполняет оригинальную музыку в совершенно
    разных стилях (от классического джаза до world music) – и при этом никогда не
    изменяет себе, не позволяя искусству превратиться в коммерцию. "Невероятно добротный,
    мягкий, полный воодушевления, стильный и высококлассный" - так говорят о звуке
    его саксофона американцы. "Энергетика - коллекционная. Гибкость - поразительная.
    Эрудиция – широчайшая" - так говорят русские.'
