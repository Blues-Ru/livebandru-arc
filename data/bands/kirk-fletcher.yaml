  reviewer_token: press-release
  header: Kirk Fletcher при поддержке The Jumping Cats
  text: 'Kirk Fletcher - фигура яркая в современном блюзе. Фигура крупная: в свои
    тридцать шесть это круглощекий мужчина в самом расцвете сил, с могучими руками
    и быстрыми точными пальцами. Слегка флегматичный только на первый взгляд, он излучает
    термоядерную внутреннюю энергетику, еще только готовясь к выходу на сцену. На
    сцене он выдает ураган эмоций и стремительный круговорот музыкальных идей и виртуозной
    игры. Как раскрученный волчок, он сочетает скорость и баланс.


    По возрастным меркам, заданным блюзовыми патриархами, он только еще начинающий,
    но и в начале пути успел достичь много. У Флетчера потрясающая жанровая эрудиция,
    позволяющая ему играть современный блюз, черпая из глубин блюзовой истории. Старинные
    вудуистские напевы кладет на фанковую решетку, новаторскую гитарную импровизацию
    ведет под весомый чикагский саунд. Великолепный истинно блюзовый вокалист, он
    проживает каждое слово в песне. Вальяжен, небрежен, неистов или в глубокой тоске
    - завораживающе выразителен. А его гитара рассказывает истории без слов: чувственный
    звук, струны на нерве, своеобразие без единой банальной ноты.


    На гитаре играет с восьмилетнего возраста - не захотел отставать от старшего брата.
    Жалящий саунд Алберта Кинга еще в детстве привлекал его, но не менее, чем завлекал
    его жалостливый саунд Попса Сэплза. И, конечно, уроженец Калифорнии, он никак
    не избежал влияния бурного развития джамп-блюза Западного побережья последних
    десятилетий, когда смешались свинг и ритмический откат назад, танцевальное лихачество
    и чисто джазовая изысканность исполнения.


    В общей массе блюзовых гитаристов нынешнего поколения, которых вечно сносит в
    одну крайность, Флетчер в равной мере успевает повсюду: феноменальным образом,
    в своей музыке он и традиционалист и первопроходец одновременно.


    Долго ждать признание Кирку Флетчеру не пришлось. Эл Блейк, Джуниор Уатсон и Ким
    Уилсон стали его друзьями-товарищами. В 25 лет он выпустил дебютный альбом, где
    традиционные трели мандолин чередовались с синтезаторными дабовыми заморочками.
    Что у другого показалось бы эклектикой, у Флетчера выходит абсолютно органичной
    смесью. Он вошел в высшую лигу, аккомпанируя Чарли Масселвайту, играл в составе
    вечно-возрождающийхся "Фэбьюлос Сандербердз". И с тех пор успел поиграть с лучшими
    из лучших: волшебной Янивой Магнесс, виртуозным Робенном Фордом, философичным
    Ронни Ирлом, форейтором блюзовой гармоники Марком Хэммелом, приятным во всех отношениях
    Ларри Карлтоном... Список можно продолжать - имя Кирка Флетчера встречается во
    многих из интереснейших блюзовых проектов последних полутора десятка лет. С четью
    проявил он себя и участием в ансамблях ветеранов блюза: Джеймса Коттона, Пайнтопа
    Перкинса, Хьюберта Самлина, Моджо Бафорда и других. Флетчер столь разносторонен
    что успевает повсюду, всюду к месту, и, конечно, продолжает гнуть свою линию:
    гастролирует как солист по Штатам и всему миру, выпускает сольные пластинки.'
