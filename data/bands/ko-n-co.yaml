  header: '"Ко & Со".'
  text: 'Этот коллектив – детище четырех прекрасных музыкантов, знакомых завсегдатаям
    "Коттон-бара" по работе в разных составах. Олег Косько – piano. Об этом человеке
    стоит сказать отдельно. Олег Косько – пианист из старой когорты музыкантов, с
    которых начинался современный джаз как таковой, и не только в нашем городе, но
    и в Союзе. Переиграв в абсолютно разных стилях (от джаз-рока и фолк-джаза до smooth-джаза
    и блюз-рока), Олег Косько вернулся к традиционному свингу. И будь Дюк Эллингтон
    или Нэт "Кинг" Коул живы, думаю, они бы искренне порадовались тому, как под пальцами
    музыкантов из "Ко & Со" обретает вторую жизнь их наследие. Тем более что коллектив
    исполняет не только стандарты, но и музыку самого Олега Косько. А она уникальна!


    P.S. "Ко & Со" – это испытанная временем музыка для понимающих людей.'
