  text: 'Знаменитый пианист из Санкт-Петербурга Андрей Кондаков, создатель международного
    проекта "Brazil All Stars" представляет "Вечер бразильской босса-новы", Вместе
    с Андреем выступят ударник джазового оркестра Игоря Бутмана Эдуард Зизак и участник
    "Brazil All Stars" бразильский бас-гитарист Sergio Brandao.


    Серджио Брандау – один из самых влиятельных басистов в США, большая звезда, уровня
    Виктора Бэйли или Маркуса Миллера. В начале 80-х Брандау прославился в составе
    группы флейтиста Хэрби Мэна. С тех пор выступает с ведущими американскими джазменами,
    записывает альбомы, гастролирует, участвует в фестивалях.


    Идея создания проекта "Андрей Кондаков и Brazil All Stars" возникла в Нью-Йорке
    в 1999 году, когда пианист и композитор Андрей Кондаков познакомился и впервые
    выступил в популярном в Гринвич Виллидж месте Zinc Bar с замечательными бразильскими
    музыкантами: басистом Серджио Брандаo (Sergio Brandao), перкуссионистом Эдсоном
    "Кафе" да Сильва (Edson "Caf&#233;" da Silva) и барабанщиком Пауло Брага (Paulo
    Braga). Выяснилось, что эти три музыканта часто играют вместе в различных комбинациях.
    Они уже вошли в историю бразильской музыки и джаза благодаря концертам и записям
    с великим Антонио Карлосом Жобимом, Джаваном, Деодато, Милтоном Нашименту, Херби
    Меном, Таней Марией. В апреле 2000 года был организован тур для этого проекта
    по России и запись музыкального альбома, который вышел под названием "Старые и
    новые бразильские истории". Тогда музыканты с успехом выступали и в Санкт-Петербурге.
    В 2003 году проект был представлен в рамках 1-го Санкт-Петербургского Международного
    Петропавловского джазового фестиваля, а в 2006 году музыканты были приглашены
    выступить на международном джазовом фестивале в Коктебеле. Кроме того, в последние
    годы музыканты тесно сотрудничают и периодически выступают в разных клубах в Нью-Йорке
    и на различных площадках в России и на Украине.'
