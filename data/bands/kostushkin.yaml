  text: Михаил Костюшкин - саксофонист, композитор. В 1972 - партнер Д.Голощекина
    в Ансамбле джазовой музыки, затем участник и солист оркестра И.Вайнштейна. С 80-х
    гг. преподавал в музыкальном училище им. М.П. Мусоргского и организовывал малые
    составы, в которых играли многие "бывшие" питерцы - Д. Колесник, А. Рябов, Е.
    Губерман, вместе с П. Корневым организовал квартет "Арс-нова". Автор целого ряда
    творческих проектов, к осуществлению которых привлекал известных петербургских
    музыкантов. Этому музыканту присущи безупречный вкус в трактовке джазовой классики
    и в то же время тонкое ощущение современного джаза.
