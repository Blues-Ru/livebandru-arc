  text: 'Высокий профессионализм, музыкальная одаренность – да. Обаяние, красота и
    женственность – да! Творческая энергия и креативное мышление – да!!! Может ли
    современная поп-дива обладать всеми этими качествами? Конечно! И это могут подтвердить
    поклонники певицы и композитора Кристины Аглинц. На нашей эстраде часто появляются
    певицы-однодневки –после "прокрутки" одного или нескольких клипов они, как правило,
    бесследно исчезают из памяти зрителей. Почему? Наверное, все-таки, кроме финансовых
    вложений и хороших знакомств нужно, чтобы певица дарила зрителям свою душу и профессиональное
    мастерство!


    Музыкальное образование Кристины Аглинц позволяет с уверенностью сказать – музыке
    она посвятила свою жизнь окончательно и бесповоротно. Игре на фортепиано начала
    обучаться в 5 лет, примерно тогда же начала петь. Музыкальное училище Кристина
    окончила в родной Самаре, затем продолжила обучение в Москве, в Российской Академии
    Музыки имени Гнесиных (красный дипломом по классу фортепиано). О серьезном подходе
    Кристины к непростому и во многом элитному виду искусства – игре на фортепиано
    – свидетельствуют победы в престижных музыкальных конкурсах. В 1992 году Кристина
    получила Вторую премию на Всероссийском конкурсе пианистов, а в 1996 году завоевала
    третью премию на Международном конкурсе пианистов в Греции (Афины). В 1997 году
    началась ее вокальная карьера. Кристина Аглинц была в качестве гостя приглашена
    на 8-й Международный фестиваль "Славянский базар", где с большим успехом пела
    в сопровождении оркестра Александра Клевицкого. Кристину стали приглашать на телевидение
    – причем сразу на центральные каналы: в программы "Добрый вечер", "Лестница в
    небо", "Два рояля" и многие другие.


    Карьеру певицы Кристина начала с наиболее сложного и глубокого вокального жанра.
    Конечно, это был джаз – любимый с самого раннего детства (кстати, отец Кристины
    – известный джазовый музыкант).


    Поистине Звездным часом для Кристины как для джазовой певицы стало участие во
    Всемирном чемпионате по искусствам (World Championship in performing art), где
    она представляла Россию. Там она стала обладательницей золотой медали в номинации
    джаз-вокал и завоевала Кубок, как лучшая вокалистка мира во всех номинациях чемпионата!
    Стать обладательницей такого титула на родине джаза – в Америке – это говорит
    о многом. До настоящего времени Кристина единственная обладательница столь высокого
    титула в России. Сейчас красивый и сильный голос Кристины Аглинц (диапазоном в
    4 октавы!) звучит на концертах и фестивалях, в клубах и на крупнейших сценических
    площадках Москвы и всей России. Кристина не считает себя исключительно джазовой
    певицей – в ее репертуаре замечательные современные эстрадные песни в модных аранжировках,
    рассчитанные как на взрослую, так и на молодежную аудиторию.


    Музыку Кристина Аглинц пишет сама – причем на таком высоком уровне, что ее песни
    с удовольствием исполняют звезды нашей эстрады: И. Кобзон, В.Толкунова, Л.Серебрянников,
    М.Девятова, появляются новые совместные работы с В.Пресняковым-старшим. Успешно
    развивается сотрудничество Кристины с лучшими поэтами-песенниками (С.Алиханов,
    И.Брусенцов, А.Вулых). Самым ярким, несомненно, является творческий дуэт с Народным
    артистом России Ильей Резником. Кристину с удовольствием приглашают на популярные
    теле-шоу и музыкальные передачи – она частый гость программы "Жизнь прекрасна"
    на канале СТС – ее выступления всегда эмоциональны, позитивны. Кстати, с виртуозным
    пианистом и бессменным аккомпаниатором всех программ "Жизнь прекрасна",Левоном
    Оганезовым, Кристина участвует в различных концертных программах. Е.Крылатов,
    И.Резник, Э.Ханок, А.Клевицкий, Г. Гаранян, Н.Денисов всегда рады видеть Кристину
    на своих творческих вечерах и концертах.


    Кристина Аглинц – автор музыки гимна спортивного комплекса "Лужники" и "Олимпийского
    марша", который транслируется на Первом канале в поддержку нашей сборной на зимних
    Олимпийских играх в Турине. "Олимпийский марш" будет поддерживать наших спортсменов
    на олимпиаде в Пекине. На эту песню, ставшую официальной песней сборной России,
    снят видеоклип с участием знаменитых российских чемпионов. Специально для Президентского
    полка была написана песня "Кавалергарды". Она звучит в исполнении Кристины, Президентского
    оркестра и хора Дважды Краснознаменного Академического ансамбля песни и пляски
    Российской Армии имени А.В. Александрова.


    Эта элегантная, молодая и стильная певица – еще и обладательница правительственных
    наград и даже медалей "За служение Отчизне", "Честь и Доблесть"! Кристина Аглинц
    член общественного совета Академии управления МВД РФ. Она участвует в концертных
    программах на высоком правительственном уровне, с радостью пишет музыку и выступает
    на благо спортивного и военно-патриотического развития России.


    Сегодня, как и всегда, Кристина Аглинц полна творческих идей и новых планов по
    продвижению своих, несомненно, интересных и успешных творческих проектов.'
