  reviewer_token: press-release
  text: Ксения Федулова - молодая, харизматичная певица и гитаристка, относительно
    недавно появившаяся на блюзовых сценах Москвы. Не торопясь, но очень уверенно
    она завоевывает сердца тех, кто неравнодушен к сильному вокалу и позитивной энергетике.
    Плюс ко всему эта дама недурно играет на гитаре и спокойно себя чувствует на одной
    сцене с корифеями Российской блюзовой сцены. Вообщем, всех любителей хорошего
    блюза и рок-н-ролла милости просим на концерты. А тех, кто считает что блюз -
    дело неженское, тем более ждем с нетерпением, дабы развеять устоявшееся мнение.
  verified: true
  created: '2011-05-01'
