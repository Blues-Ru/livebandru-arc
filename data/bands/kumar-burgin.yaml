  text: 'Впервые в Россию приезжает поразительный музыкальный союз, объединяющий в
    себе двух ярчайших представителей блюза Чикаго и блюза западного побережья Соединенных
    Штатов. Гитарист и вокалист, ветеран Чикагского блюза - Джонни Бергин за свою
    карьеру успел сыграть и записаться с многими классиками жанра из города ветров.
    Его последний, шестой альбом "Greetings from Greaseland", записанный в Калифорнии,
    раскрыл его как поразительного фронтмена и был высоко оценен критиками.


    Аки Кумар - восходящая звезда блюзовой гармоники и прекрасный вокалист, крайне
    уважаемый музыкант и ведущий практически всех блюзовых джемов в регионе Сан-Франциско.
    На счету Аки отличные записи и участие во множестве крупных блюзовых фестивалей
    в США. А его последняя, крайне удивительная запись "Aki Goes to Bollywood" сделала
    его знаменитым.


    Вместе, Джонни и Аки - мощнейшее блюзовое сотрудничество, комбинирующее самые
    восхитительные элементы блюза Чикаго и блюза Западного Побережья. Их сотрудничество
    уже принесло свои плоды в виде множества успешных турне в США и Европе. А теперь
    они приедут в Россию при помощи группы The Jumping Cats, которые не перестают
    находить и привозить в Россию интересных артистов из самого сердца международного
    блюзового сообщества.'
