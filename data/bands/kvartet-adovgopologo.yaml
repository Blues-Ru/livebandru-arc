  text: 'В составе "Igor Butman Big Band" Александр Довгополый выступает с такими
    звездами, как: Eric Marienthal, George Benson, Gary Burton, Billy Cobham, ансамблем
    "New York Voices", Randy Brecker, Joe Lovano, Joe Locke, Paul Bollenback, Toots
    Thielemans, De Dee Bridgwater, Kevin Mahogany, Dave Valentine ("Caribbean Jazz
    Project"). Осенью 2003 года Александр вместе с оркестрами Игоря Бутмана и Уинтона
    Марсалиса выступил в престижном "Alice Tully Hall" в Нью-Йорке , где исполнил
    соло в блюзе "Ready Go" вместе с баритон-саксофонистом Joe Temperley. Это выступление
    было отмечено рецензентом газеты "New York Times", а также принимал участие в
    записи новых альбомов Биг-Бэнда "Eternal Triangle","Moscow @ 3 p.m.", "Карнавал
    Джаза" с Ларисой Долиной. Осенью 2003 года Александр организовывает клубный танцевальный
    siscohouse проект "CRAZZY SAX". В августе 2004 года Александр со своим проектом
    принимает участие сразу в двух крупных фестивалях Москвы - это "Джаз Фестиваль
    в Саду Эрмитаж" и "Летний Ле-Фестиваль". В 2004 году Александр запускает новый
    проект "SMOOTH JAZZ PARTY" в "Ле Клубе" и "Jazz Town", приглашает в дополнение
    к существующему составу новых талантливых музыкантов молодого поколения. Концепция
    программы основывается на стилистике SOUL, FUNK, Fusion, Smooth Jazz, Jungle,
    Bossa-Nova.


    5 июня 2005 года Александр приглашен на Джазовый Фестиваль в Архангельском с проектом
    "CRAZZY SAX".


    С осени 2009 года начинает сотрудничество с группой "Vision Of Sound"и активные
    концертные выступления в клубе "Олимпиада 80" (http://visionofsound.ru/).


    В 2010 году входит в состав ковер-группы "Rhythm Zone" (http://rhythmzone.ru/).


    В данное время идет запись и подготовка к выпуску сольного альбома. А так же концертные
    выступления с авторской программой "Самба Дождя" в составе: Антон Давидянц – бас
    гитара, Павел Чекмаковский- гитара, Дмитрий Илугдин - клавишные, Петр Ившин -
    ударные (http://www.myspace.com/alexanderdovgopoly).'
