  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Артем Айвазян, Arishata и Laya Bam Band - одна из известных российских групп,
    работающих в стиле modern jazz, которые появились на российской джазовой сцене
    за последнее время. Laya Bam Band - настоящие экспериментаторы от джаза: группа
    трубача Артема Айвазяна активно использует электронику и прибегает к самым неожиданным
    творческим решениям. Музыканты славятся умением органично сращивать фанк, диско,
    рок и современную электронную музыку, а обладательница чувственного и подвижного
    голоса Arishata - способностью завести зал с пол-оборота и повелевать публикой
    до последней минуты концерта.'
