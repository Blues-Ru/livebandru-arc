  header: '"Le Noir"'
  text: Что же это за штука такая - джаз?.. Сколько существует разных определений
    - одни сводятся к сухому аналитическому разбору, другие к романтическим рассуждениям
    - но ни одно из них не раскрывает сути этого явления. Сама идея дать определение
    слову "джаз" не имеет смысла, настолько разноплановое и широкое это понятие. И
    это больше логично, чем удивительно – джаз создан людьми в жажде к свободе, в
    стремлении разрушить рамки. В этом его загадка и отгадка, в этом его сила и залог
    успеха. Сегодня, при таком огромном разнообразии музыки, которая зовется джазом,
    очень хорошо просматривается, что главная отличительная черта его вовсе не ритмика,
    гармония или мелодика. Здесь просто принципиально новый подход к написанию и исполнению
    музыки, здесь скорее свобода использования ритмики, гармонии и мелодики. Какая-то
    особая, необъяснимая свобода... Это то, что затягивает и удерживает, то, что может
    увлечь на всю жизнь. … то, что собственно с нами и произошло. Мы оказались в удивительном
    музыкальном мире, где мы можем делать все, что угодно. Создается впечатление,
    что Le Noir разгадал какой-то тайный шифр (нашел правильный подход) и теперь,
    за какую бы музыку мы не брались – от мейнстрима до кулджаза и бибопа, от латины
    до поп-музыки и R'n'B – это всегда джаз! И в нашем понимании это вовсе не безвкусие
    или распыление! Размах стилей столь велик, потому что нам интересно попробовать
    очень многое, увидеть как ведет себя джаз в самых разных проявлениях, исследовать
    его настолько глубоко, насколько нас хватит. Но самое приятное для Le Noir делиться
    всем, что мы накопили, доносить до каждого слушателя это волшебное настроение
    джаза, ощущение свободы! Если вам близки наши стремления, если вы открыты для
    нового и для старого, отправляйтесь с нами в путешествие в Неизведанное…
