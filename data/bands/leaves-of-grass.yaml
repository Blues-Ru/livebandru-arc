  text: 'Казанский коллектив "Листья травы" - долгожитель сравнительно динамичной
    российской блюзовой сцены.


    История этой группы началась еще в 1992 году, когда публика впервые обратила внимание
    на молодого гитариста Влада Листкова. За прошедшее с тех пор время менялись названия,
    музыканты, отчасти - даже сама стилистика, но сам Листков, утвердившийся в качестве
    лидера, последовательно вел проект вверх.


    О "Листьях травы" говорят сегодня как об одном из наиболее концептуальных коллективов,
    развивающих электрический блюз в России, а казанские фанаты группы давно опасаются
    понимания музыкантами того очевидного факта, что в рамках родного города им уже
    тесно.


    Дискография группы: <li>Мoment of joy (2000)</li> <li>Laces out (2004)</li> <li>Game
    on (2006)</li> <li>Live (2007)</li> <li>Acoustic heart (2007)</li> <li>Blues (2009)</li>
    <li>Live (2009)</li>'
