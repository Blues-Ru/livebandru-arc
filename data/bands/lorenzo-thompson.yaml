  header: Rhythm Blues Cafe о гастролях Lorenzo Thompson
  text: 'Такого у нас еще не случалось! Были знаменитые артисты, но чтоб таким крутым
    звездным составом!!!


    Эксклюзивные концерты!


    Lorenzo Thompson (Чикаго, США) в сопровождении:<br> Omar Esteban Itcovici - гитара,
    Аргентина<br> Jose Luis Pardo - гитара, Испания<br> Machi Romanelli - клавиши,
    Аргентина<br> Евгений Ринкевич - бас-гитара, Россия<br> Gonzalo Martino - барабаны,
    Аргентина


    Lorenzo Thompson - всемирно известный блюзовый вокалист из Чикаго. Вы не найдете
    ни одного блюзового клуба в Америке, где не знали бы его имя. За плечами 60-летнего
    блюзмена десятки туров в США и сотни концертов по всей Европе. Последние 15 лет
    без Lorenzo Thompson не обходится ни один Chicago Blues festival!


    Если вы спросите Thompson''а, когда он начал петь, то наверняка услышите, что
    он делает это, сколько себя помнит. С раннего детства он исполнял госпел в церковном
    хоре вместе со своей бабушкой, а немного повзрослев, услышал музыку Howlin Wolf,
    Muddy Waters, B.B.King и других мастеров блюза и навсегда в него влюбился.


    Lorenzo Thompson играл с такими звездами блюза как Pinetop Perkins, Hubert Sumlin,
    Melvin Taylor, Buddy Scott, Aaron Burton, Willie Kent, Jimmy Lee и многими другими.
    Любой свой концерт Lorenzo Thompson превращает в одну большую вечеринку и каждый,
    кто хоть раз его видел, возвращается на его концерты снова и снова!


    Omar ItcoviciOmar Esteban Itcovici - аргентинский блюзмен, гитарист, виртуозно
    исполняющий "корневой" чикагский блюз. Свою музыкальную карьеру Itcovici начинал
    во всемирно известной блюзовой группе Albert King Tribute Band из Буэнос-Айреса.


    На протяжении четырех лет, с 2004 по 2008 годы, Omar выступал с одной из главных
    российских блюзовых команд - "Черный хлеб" Алексея Аграновского.


    Omar Itcovici хорошо знаком российским любителям блюза не только как блестящий
    гитарист, но и как человек, благодаря которому, в Россию приезжали и выступали
    культовые блюзмены из Чикого, среди которых Lazy Lester, Mud Morganfield (Muddy
    Waters jr.), Phil Guy, James Wheeler, Eddie C. Cambell, Lurrie Bell, Tail Dregger,
    John Primer и многие другие.


    С полной ответственность можно сказать, что именно благодаря Omar''у было "прорублено
    окно" в Чикаго - город, давший миру Великих исполнителей блюза!


    Гитарист, певец и композитор Jose Luis Pardo - живое доказательство тому, что
    для того чтобы понимать блюз и жить им, совсем не обязательно родиться в Северной
    Америке. Буэнос-Айрес, где родился и вырос музыкант, никак не может претендовать
    на звание блюзовой Мекки, тем не менее сегодня Jose Pardo заслуженно считается
    одним из лучших блюзовых гитаристов мира.


    Он начал учиться играть на гитаре в 10 лет после того, как однажды ночью поймал
    себя на том, что вот уже два часа играет соло Брайана Мэя на воображаемой гитаре,
    которую в реальности заменяла ручка от швабры. Сегодня Pardo 30. Он живет в Мадриде
    и объехал с турами США, Францию, Германию, Испанию, Аргентину, Бразилию, Чили,
    Португалию и Колумбию. Он выступал на крупнейших блюзовых фестивалях мира: от
    США до Африки, от Бельгии до Индии. В апреле 2007 года на престижнейшем Jacksonville
    Blues Festival in USA выступление Jose Luis Pardo произвело такое ошеломляющее
    впечатление, что его тут же попросили сыграть на закрытии вместе с легендарной
    Muddy Waters Band. А ведь испанский гитарист был единственным неамериканским музыкантом,
    выступавшим на фестивале!


    Jose Pardo играл в лучших блюзовых группах Аргентины, включая всемирно известную
    Albert King Tribute Band. С ней Pardo записал два альбома ("We play the blues
    for you", "Live at FIdelius") и совершил свой первый международный тур. В 2001
    году группа провела тур, посвященный 10-ой годовщине смерти Albert King''а, отыграв
    серию концертов в легендарном Blues Citty Caffe и других культовых клубах Мемфиса.
    Имена музыкантов Albert King Tribute Band и Jose Luis Pardo не сходили с первых
    полос газет.


    Pardo играл с такими выдающимися исполнителями блюза, как Koko Taylor, Magic Slim,
    Peaches Staten, Billy Branch, John Primer, Michael Powers, Super Chicken Johnson,
    Ray Killer Allison. Он записал два альбома с блюзовыми вокалистами Lorenzo Thompson
    и Willie Buck.


    В 2004 году Jose Luis Pardo создал собственную группу Jose Luis Pardo and the
    Mojo Workers, с которой успешно гастролирует по всему миру, и выпустил три альбома:
    "As the years go passing by" (2004), "That&#180;s Right" (2007) и "Country and
    City Blues" (2009).


    Последний альбом, в который вошли композиции в стилях кантри-блюз, электро-блюз,
    госпел, соул и свинг, музыкальные критики назвали не больше не меньше "захватывающей
    энциклопедией блюза". После выхода "Country and City Blues" в январе 2009 года
    все знатоки блюза признавали: "Игра Jose Luis Pardo - это новое слово в блюзовой
    гитаре". Великий Bob Margolin, гитарист самого Muddy Waters, прослушав этот альбом,
    сказал: "Браво! Я впечатлен. Этот парень понимает язык блюза и играет с настоящей
    глубиной и страстью!". А этот человек уж точно знает, о чем говорит.


    Вот только некоторые отзывы о творчестве Jose Luis Pardo: "Когда я впервые услышал
    Jose, он просто сшиб меня с ног! Это полный восторг: видеть как молодой парень,
    мальчик, играет как настоящий профи! А ведь он, в самом деле, профи!" Michael
    Burks. USA


    "Он настоящий монстр! Для меня просто счастье слышать, как он играет. Он один
    из немногих, кто действительно понимает и играет блюз" Little Charlie Baty. USA.


    "... у него реально мертвая хватка. Со свирепой непринужденностью Pardo справляется
    с классикой Robert Johnson, BB и Albert King и даже Chuck Berry, вслед за которым
    он отдает предпочтение гитарам Gibson" Livin Blues Magazine USA'
