  reviewer_token: press-release
  text: 'LORNA и JULES FOTHERGILL - основная движущая сила группы Northsyde , получившей
    в 2014 году сразу шесть номинаций на British Blues Awards! Группа исчисляет свое
    начало с 2005 года, и называлась она поначалу Funkydory.


    Ослепительная Лорна Фозегилл - "лицо" группы, автор всей лирики и большинства
    песен. Ее динамичный и мощный вокал кто-то из критиков описал как "встречу Роберта
    Планта и Ареты Франклин, в присутствии Джэнис Джолин", обязанности гитариста и
    аранжировщика в группе исполняет ее муж Джулиан, или попросту Джулз. Они познакомились
    лет 17-18 назад на каком-то джеме и решили объединить усилия и таланты и сделать
    собственную группу, и впоследствии объединили и судьбы, поженились. Музыка, повлиявшая
    на вкусы членов группы исключительно разнообразна - возможно, поэтому стиль группы
    кажется немного эклектичным, но зато он мгновенно узнаваем.


    С 2006 года группа записала три студийных альбома (дебютный 2006 года еще под
    старым названием Funkydory), развивая и совершенствуя найденный уникальный саунд.
    Второй альбом 2009 года Mercy''s Medicine занимал высокие позиции в чартах и много
    ротировался по радио, обратив на группу внимание критиков и фестивальных промоутеров.
    Четыре года плотных гастрольных туров по родной Британии и континентальной Европе,
    выступление на разогреве у таких "звезд" как Джо Бонамасса, с которым они объехали
    всю Британию и выступали на крупнейших европейских фестивалях, дали группе бесценный
    опыт и армию поклонников. Последний релиз, альбом 2013 года The Storyteller''s
    Daughter вполне заслуженно принес группе сразу шесть номинаций на British Blues
    Awards! Каждый из участников группы был номинирован на звание "лучший по профессии",
    сама группа на "Best Band", а релиз получил номинацию на "Best Album". Небывалый
    успех!


    Вот что о них написал Classic Rock - The Blues Magazine: "Невероятный напор густого,
    тяжелого блюза, зубодробительные риффы - Northsyde великолепно сыграны, и виртуозны
    индивидуально. Джулз - однозначно, лучший лид-гитарист, о котором вам не доводилось
    слышать, а голосу Лорны позавидует любой блюз-роковый вокалист, неважно мужчина
    или женщина! Бесподобная ритм-секция - заполняющий все пространство, густой как
    мед, бас Иэна, подкрепленный мощным грувом барабанов Хэйдена Дойла - и вот полная
    картина!" The Blues Magazine - August 2012


    Лорна и Джулз дважды приезжали в Россию с концертами - осенью 2014 и весной 2015
    года.


    В апреле 2018 был запланирован их приезд в третий раз, но судьба распорядилась
    иначе... 1 марта 2019 года Джулз Фозергилл проиграл битву с крайне агрессивной
    формой рака...


    В ноябре 2021 года Лорна Фозергилл набрала новый состав и объявила о продолжении
    концертной деятельности Northsyde.'
