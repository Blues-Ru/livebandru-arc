  text: 'М-АРТель - джаз-рок группа и творческое объединение, с 2010 года создающее
    уникальные музыкальные проекты. Среди них:


    -Точка Сборки (главный проект с авторской инструментальной музыкой в стиле фьюжн.
    Вышло 2 альбома на культовом лейбле ART Beat.) -I Love 60s (Небанальные кавер-версии
    хитов 60-х с женским вокалом)


    -Органавты (Старый добрый джаз на знаменитом органе Hammond)


    Группа выступала на фестивалях Усадьба Jazz в Архангельском, Среда Джаза, Open
    Air на Кузнецком. Давала многочисленные концерты на таких площадках как Билингва,
    Союз Композиторов, Дума, Китайский летчик Джао Да и пр. Является постоянным резидентом
    клубов Hidden Bar, ЖурФак, клуб Алексея Козлова, Мастерская.


    Автор, идейный вдохновитель и бессменный участник М-АРТель - профессиональный
    музыкант, саксофонист и ученик знаменитого Александра Осейчука - Михаил Леванов.'
