  text: 'Американско-русский блюз-рок бэнд "Мамас Бэд Бойс" (Mama''s Bad Boys) был
    основан в Амстердаме на рубеже конца 80-х начала 90-х годов минувшего столетия.
    Основателем стал гитарист, певец и композитор из Калифорнии Ламар "Кинг Би" Чейс
    (Lamar ''King Bee''Chase; Oakland, California).


    На протяжении своей музыкальной карьеры Ламар делил сцену с такими блестящими
    партнерами, как Ловэлл Фолсон, Д.Д. Мэлоун, музыканты легендарных бэндов Эры Фанка
    "Тауэр оф Пауэр", "Слай энд Зэ Фэмили Стоун", "Пойнтер Систерс" и бэнд Карлоса
    Сантаны (Lowell Folson, J.J. Malone, Tower of Power, Sly&the Family Stone, Pointer
    Sisters, Carlos Santana).


    Имя второго сооснователя группы - Отис Рахим Хорнсби (Otis Rahim Hornesby, New
    Jersey) - басист, певeц и композитор с не менее яркой творческой биографией за
    плечами.


    Он сотрудничал с такими звездами, как Джимми Рид, Филлис Хайман и Нэнси Уилсон(Jimmy
    Reed, Phyllis Hyman, Nancy Wilson).


    Третьим участником группы несколько лет назад стал бывший питерский музыкант,
    живущий в Амстердаме Толик Смирнов (Tolik Smirnoff) - экс. барабанщик русских
    гитарных гигантов Александра "Царя" Старостенко (Sasha ''Tsar'' Starostenko)и
    Валерия "Кинга Би" Белинова (Val ''King B'' Belin).


    Музыка и шоу группы позволяют слушателю окунуться в неповторимую атмосферу Америки
    времен расцвета творчества чернокожих блюзмэнов первого поколения. Звучанию группы
    присущи жесткость рок-аранжировок лучших образцов классического блюза и свингующий
    мелодизм собственных композиций.


    Фанки Рокин Блюз (Funky Rockin'' Blues) - так сами музыканты окрестили свой стиль.


    Мama''s Вad Вoys - единственный уникальный настоящий блюз-бэнд топ-класса, состоящий
    из американцев и русских!'
