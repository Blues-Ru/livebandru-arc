reviews:
- id: 391
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Итальянец по рождению, гражданин Мира и житель Лондона - певец, гитарист
    и сонграйтер Эмануэль МЭННИ ФИЦОТТИ - редкий виртуоз-многотаночник, прекрасно
    управляющийся и с акустикой, добро и слайдом, и с перегруженной эффектами электрогитарой.


    Известен не только как автор-исполнитель, но и как основатель и участник успешных
    трибьют-проектов на творчество таких легенд классического рока 60-70-х, как JIMI
    HENDRIX и LED ZEPPELIN. Иногда работает дуэтом со своим другом Уиллом Джонсом.


    На регулярные гастроли по континентальной Европе ездит со своей "стaрой" итальянской
    группой, а России сыграет c лучшей ритм-секцией столицы.'
  verified: true
  created: '2014-01-12'
  is_press_release: true
