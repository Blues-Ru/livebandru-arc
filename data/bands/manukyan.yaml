  text: 'Сергей Манукян родился в Грозном 15 марта 1955 г. Дебютировал в оркестре
    Гостелерадио ЧИАССР в качестве барабанщика еще в подростковом возрасте. Дебют
    на большой джазовой сцене в качестве вокалиста произошел на джазовом фестивале
    в Риге в 1981 году. Критика назвала тогда Манукяна "мастером скэта и джазовым
    певцом номер один". Начав свою музыкальную деятельность в 12-летнем возрасте,
    играя в джазовых оркестрах родного города, Сергей не мечтал о сольной карьере,
    но судьба распорядилась иначе. Музыкант много и успешно работал барабанщиком в
    составе трио А. Шишкина в Горьком (ныне Нижний Новгород). После первого признания
    началась большая гастрольная жизнь, фестивали приносили лауреатство и известность.


    Вскоре Сергей стал осваивать пение и клавишные инструменты. Первый международный
    конкурс вокалистов в Польше принес ему награду и известность за рубежом.


    В 80-е Манукян переселился в Эстонию и долго успешно работал в Таллинне в составе
    джаз-рок-группы "Авиценна".


    Уже в конце 80-х годов Сергей Манукян начал сотрудничать с известными именами
    на Западе: на студии Warner Вrothers - с Ричардом Элиотом, от студии Capitol он
    получил предложение записать альбом; тогда же Фрэнк Заппа (Frank Zappa) использовал
    музыку Манукяна в своем проекте. Сотрудничество с мировыми знаменитостями в советско-американском
    проекте "Music Speaks Louder Than Words", в том числе с Синди Лоупер, Майклом
    Болтоном, группой Earth Wind & Fire и другими, принесло Сергею знакомство с Голливудом.


    В 1989 году Сергей Манукян получил Гран-при на первом Всесоюзном телевизионном
    музыкальном конкурсе "Ступень к Парнасу", а также "Приз зрительских симпатий".
    С 1991 г. живет и работает в Москве. В 1994 году был награжден высоким званием
    "Лучший джазовый музыкант года" и премией "Овация". В 2005 г. основал собственный
    Фонд развития джазового искусства.'
