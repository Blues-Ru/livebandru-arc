reviews:
- id: 390
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Уроженец и житель Лондона МАРКУС БОНФАНТИ - певец, гитарист, сонграйтер и
    стори-теллер. Eго концерты, будь то сольные или в составе группы от трио до биг-бэнда
    - это всегда бешеный напор страстей, зубодробителый драйв, тонкий лиризм и недюжинная
    виртуозность владения и голосом, и гитарой - хоть электрической, хоть акустикой.


    Трижды номинированный на British Blues Awards "Best Male Vocalist", он был 2-м
    в 2012 и 3-м в 2011, 2013, получил "Best Acoustic Act" в 2013 и пришел к финишу
    вторым в 2012.


    Его фирменный стиль - сплав блюз-рока, соула, фанка и кантри. Последний, восторженно
    принятый студийный альбом "Shake The Walls" с момента выхода в 2013-м неуклонно
    поднимается в чартах.'
  verified: true
  created: '2014-01-11'
  is_press_release: true
