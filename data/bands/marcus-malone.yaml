reviews:
- id: 386
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Уроженец американского Детройта, Мичиган, и житель Лондона, певец, сонграйтер,
    стори-теллер, гитарист - МАРКУС МЭЛОУН хорошо известен клубной и фестивальной
    публике по обе стороны Атлантки.


    Пять сольных альбомов, записи с самыми именитыми блюзменами, успешные американские
    и европейские туры - чего еще желать? К чему стремиться?


    МАРКУС МЭЛОУН до сих пор ни разу не был в России и считает, что посетить Москву
    и Ст.Петербург с концертами и заодно в качестве туриста - это то, к чего стоит
    желать, к чему стоит стремиться! И -хей-хей!!! - Маркус едет в Россию!


    В своем первом российском туре МАРКУС МЭЛОУН представит искушенной публике все
    лучшее, чего он достиг за свою почти 30-летнюю карьеру блюзмена.'
  verified: true
  created: '2013-12-23'
  is_press_release: true
