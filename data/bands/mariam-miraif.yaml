  text: 'МИРАЙФ - это прежде всего Мариам и Армен Мерабовы, талантливая супружеская
    пара, признанные звезды российского джаза и их творчество интересно не только
    простым слушателям, но и музыкантам, которые приходят на их концерты и слушают
    их.


    Так сегодня об этой уникальной вокалистке говорят ее коллеги: Брайан Мэй, Александр
    Панайотов, Сергей Манукян, Николай Носков, Дима Билан, Ричи Коул...


    Мариам Мерабова. Леди Голос. Голос, проникающий в самую душу. Голос, способный
    расплавить даже самое черствое сердце.


    Голос Мариам – искусство, поданное с искусством. С искусством джаза. В ее вокальной
    манере растворился, кажется, весь Новый Орлеан, вперемешку с Нью-Йорком, Москвой
    и Ереваном. Недаром говорят, что восточные люди – особо восприимчивы к тонким
    материям. Когда-то ее вдохновляли пейзажи родной Армении, чья столица сложена
    из розовых камней на фоне белоснежного Арарата. Она училась быть классической
    пианисткой, но ее уже дожидалось призвание – быть певицей джаза. Однажды она оставила
    рояль и встала перед микрофоном. Диплом училища имени Гнесиных с оценкой "отлично"
    доказывает - это был верный поступок. В 1996 году профессор Игорь Бриль пригласил
    одаренную выпускницу на профессиональную джазовую сцену. С тех пор имя Мариам
    Мерабова означает изысканный стиль, безупречное качество и потрясающе глубокое
    чувство музыки.


    В свое время магнетизм ее голоса испытали такие корифеи отечественного джаза,
    как Алексей Козлов и Юрий Саульский, Сергей Манукян и Виктор Двоскин, Олег Киреев
    и Давид Голощекин… По мнению одного из основателей группы "Куин", Брайана Мэя,
    из всех российских певиц только Мариам Мерабова смогла по-настоящему исполнить
    такую сложнейшую партию, как Killer Queen. Знаковая роль в мюзикле "We will Rock
    you" - стала очередным достижением вокалистки. Потом были и Евровидение, и престижные
    джазовые фестивали, и снова Евровидение, где Мариам уже на протяжении нескольких
    лет выступает в качестве бессменной бэк-вокалистки наших исполнителей с пост-советского
    пространства.


    Сегодня – ее любовь, ее энергетика, ее музыка сосредоточены в группе "Мирайф".
    И, конечно же, у нее безупречный английский. Сегодня выступить дуэтом с Мариам
    стремятся самые разнообразные молодые артисты. Например, Александр Панайотов.
    Их совместный сингл "This is a man''s world" - сегодня один из лидеров по скачиванию
    в интернете.


    Мир и кайф – ключевые слова. Из них вместе с мужем и пианистом Арменом Мерабовым
    они сплели название для собственной группы.


    Будучи сыном знаменитого дирижера и композитора Левона Мерабова, Армен с детства
    рос в атмосфере джаза и быстро стал делать успехи в музыке. Его первым инструментом
    был тромбон, и никто не мог предположить, что когда-нибудь Армен сменит его. Переход
    с тромбона на фортепиано для всех явился полной неожиданностью. Изначально одаренный
    необыкновенной музыкальностью, Армен раскрывается как пианист с нестандартным
    и уникальным мышлением. "Пианист Армен Мерабов – отдельная история. Армен – высококлассный
    импровизационный музыкант, очень эмоциональный, пианист необычный с нестандартными
    подходами к исполняемому материалу. Акценты, расставляемые Арменом, волей-неволей
    заставляют взглянуть на произведения под новым углом. Казалось бы, исполняется
    знакомый вдоль и поперек стандарт. Как правило, ходы музыкантов, то, что они сыграют
    в следующий момент времени, угадываемы. "Импровизации", так или иначе, повторяются
    из раза в раз. Но пианист Мерабов непредсказуем. Таинство творится прямо на сцене.
    Прямо здесь и прямо сейчас. А знает ли он сам, что сыграет в следующее мгновение?!
    Музыканты напрягаются и тут же радуются, как дети, поймав изюминку. Из зала вся
    группа вообще кажется единой, очень теплой семьей, отчего возникает ощущение удивительного
    уюта. Уже только это тепло стоит многого..." - пишет о нем пресса.


    История двенадцатилетней давности. Сегодня группа "Мирайф" - это несколько студийных
    альбомов, которые успешно продаются не только в России, но и за рубежом. Это концерты
    на самых заметных площадках России и Европы. "Мирайф", это неизменно живой, насыщенный
    звук. Это эмоции, озвученные богатейшим вокалом Мариам. Удивительно, однако, они
    умеют петь джаз даже по-русски! Мариам и Армен авторы новой программы "Джаз на
    Русском", где автором слов является Мариам, а автором музыки - Армен Мерабов.


    Группа "Мирайф" и Мариам Мерабова. Голос, который не умеет обманывать.


    Максим Тимошин'
