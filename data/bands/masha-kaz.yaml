  header: Биография
  text: 'В 1989 году Маша познакомилась с поэтом Кареном Кавалеряном, по протекции
    которого участвовала в первом телеконкурсе Юрия Николаева "Утренняя звезда", прошла
    только первый отборочный тур. Весь последующий год посвятила занятием вокалу.
    В 1991 году Маша прошла прослушивание и была принята на должность бэк-вокалистки
    в группу "Квартал"[5].


    C 1993 года года сотрудничает в качестве бэк-вокалистки в "Лиге блюза". Вместе
    с клавишником группы Львом Землинским Маша, под сценическим псевдонимом Юдифь,
    записывает англоязычную блюзовую пластинку "Вечный странник" и выигрывает с заглавной
    песней альбома право стать первой российской участницей конкурса "Евровидение".


    После Евровиденья продолжает работать в "Лиге блюза", создает с экс-ударником
    группы "Круиз" Сергеем Ефимовым проект "Красавица и чудовище"


    К 2000 году, получив признание, как российская "Леди блюз" и "Голос России", Маша
    создает собственную звукозаписывающую компанию "Хит Старт"[4]. Записывает альбом
    "Рыжий блюз".


    В 2005 году была бэк-вокалисткой при записи Сергеем Трофимовым диска "Ностальгия",
    а в 2007 - у Григория Лепса на записи диска "В центре Земли"


    За 10 лет записала бэк-вокал более чем в ста восьмидесяти альбомах известных российских
    исполнителей. Голосом Марии поют персонажи русских версий голливудских фильмов
    и мультфильмов.'
