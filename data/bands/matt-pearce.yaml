reviews:
- id: 493
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'MATT PEARCE - гитарист и вокалист известной английской hard''n''heavy группы
    VOODOO SIX, чье творчество ориентировано на поклонников Led Zeppelin, Black Sabbath,
    Free и Jimi Hendrix - всегда тяготел к олд-скульному року и привносил в аранжировки
    V6 блюз-рок, глубоко уходящий в корнями традицию.


    В начале 2018 года МЭТТ ПИРС создал многообещающий фанки-блюз-роковый проект Matt
    Pearce & the Munity и начал работу над дебютным альбомом, получившим символическое
    название ‘Gotta Get Home'', где выступил и продюсером, и аранжировщиком, и гитаристом/вокалистом
    и написал весь материал. Смикшировал альбом не кто иной, как Тони Ньютон, давний
    друг и партнер Мэтта по VOODOO SIX, спродюсировавший и записавший "The Book of
    Souls", последний концертный альбом Iron Maiden. Композиции на альбоме представляют
    полный спектр стилей и жанров, оказавших влияние на Мэтта - рок, блюз, фанк и
    соул.


    В октябре прошлого года - спустя несколько месяцев после начала работы в студии
    и за несколько месяцев до релиза альбома - интернет-портал журнала Classic ROCK
    включил видео на первый сингл ''Set Me Free'' в престижный список Classic Rock
    Magazine Tracks of the Week, и в результате голосования на сайте Loudersound.com
    трек занял 1-е место, обогнав по популярности треки от RIVAL SONS и The Struts!


    В поддержку вышедшего летом 2019 года альбома, который стал заметным событием
    на британской блюз-роковой сцене и плотно ротировался на блюз- и рок-радиостанциях
    в Британии, Matt Pearce & the Munity выступили на крупнейших британских блюзовых
    и рок-фестивалях и запланировали британский и европейский туры, частью последнего
    будет и второй российский тур Мэтта Пирса.


    Автор журнала The BLUES by Classic ROCK, получивший промо-копию альбома, так охарактеризовал
    услышанное: "Это, как если бы Принс играл бы песни Black Crowes, ну, или, если
    угодно - наоборот", а Мэтт добавляет: "Это фанки-соул-психоделик-блюз-рок джем!".


    Концерты Мэтта Пирса пройдут с 14 по 17 ноября. С Мэттом будут играть замечательные
    московские музыканты Денис Назаров на бас-гитаре и бэк-вокале, Антон Ильин на
    клавишах и Данила Ленци на барабанах. Ожидаются специальные гости!'
