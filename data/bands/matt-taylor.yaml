reviews:
- id: 467
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Мэтт Тэйлор хорошо известен на британской блюзовой сцене как один из наиболее
    востребованных и уважаемых гитаристов, певцов, авторов песен и саунд-продюсеров.
    Его дебютный альбом 1995 года Radio City Blues получил две номинации на British
    Blues Connection Award в категориях "лучший альбом" и "лучший гитарист". Он записал
    еще три альбома со своей группой, а также участвовал в ряде коллабораций с такими
    артистами, как Long John Baldry, с которым дважды гастролировал по Британии и
    Континентальной Европе, и The Snowy White Blues Project с которым он в 2008 году
    объездил вдоль и поперек всю Европу и позднее выпустил "живой" альбом.


    The Motives - новый проект Мэтта Тэйлора, ритм-блюзовый квартет, который он основал
    в 2010 году. Каждый член коллектива имел уже весьма солидную репутацию - басист
    Энди Грэм к тому времени уже отработал 12 лет с Иэном Сигалом и получил в том
    же 2010м награду British Blues Awards в номинации "лучший басист года". Клавишник
    Джонни Дайк "отметился" и на сцене, и в студии с огромным количеством топовых
    артистов, среди которых Judie Tzuke, Coco Montoya and Ben E King. Барабанщик Рой
    Мартин поработал практически со всеми в диапазоне от Ареты Франклин до Теа Гилмор
    и много лет отработал в коллективе Патрисии Каас, гастролирую по всему миру. The
    Motives находят свое вдохновение в Нью-Йорке 40-х, Чикаго 50-х и в Лондоне 60-х.
    Уже в январе 2011 года они много работали в студии, периодически прерываясь на
    гастрольные туры, и выпустили дебютную пластинку в начале 2012 года, которая получила
    три номинации на British Blues Awards и в поддержку которой они объездили всю
    Европу, включая тур с Робертом Кэем и три последовательных выступления на London
    Bluesfest в Королевском Альберт-Холле в 2012, 2013 и 2014.


    Мэтт также отец-основатель The Boom Band, британской блюзовой супер-группы, состоящей
    из первоклассных музыкантов, выросших на британской блюзовой сцене. Состав, включающий,
    помимо Мэтта, еще двух гитаристов/вокалистов Джона Эймора (The Hoax, Jon Amor
    Blues Group) и Маркуса Бонфанти (Bonfanti, Ten Year After), клавишника Пэдди Милнера
    (Tom Jones/Jack Bruce/solo), а также гитариста Марка Бутчера и басиста Джонатана
    Нойса (Jethro Tull, Gary Moore, Archive), был выбран Полом Джонсом (The Blues
    Band/BBC Radio 2) в качестве хаус-бэнда для традиционных благотворительных Рождественских
    концертов, в которых играли Van Morrison, Robin Trower и многие другие мировые
    звезды современного блюза. Летом 2014 года The Boom Band записали и выпустили
    ограниченным тиражом на виниле одноименный альбом, мгновенно ставший филофонической
    редкостью. Международный релиз альбома состоялся в апреле 2015 года и собрал несколько
    британских и европейских номинаций, а также многочисленные журнальные обзоры разной
    степени восторженности. В течение 2015-2016 годов The Boom Band выступили на многочисленных
    фестивалях: Ribs''n''Blues (NL), Carlisle Rock & Blues (UK), Southern Blues Night
    (NL), Moulin Blues (NL), Maryport Blues (UK), Huntenpop (NL), London Bluesfest
    (UK) and Flirting with the Blues (NL), а так же отыграли аншлаговые концерты в
    амстердамском зале Paradiso и историческом лондонском клубе Half Moon Putney,
    где был записан горячо принятый критиками и публикой концертный альбом.'
