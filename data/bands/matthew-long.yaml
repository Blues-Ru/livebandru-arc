  text: 'МЭТТ ЛОНГ - фронтмен блюз-роковой группы CATFISH.


    "Oбладатели UK Blues AWARDS''2018 и многократные номинанты British Blues AWARDS
    Catfish заработали себе репутацию отличной живой группы с феноменальным фронтменом,
    24-летним гитаристом/вокалистом Мэттом Лонгом, который играет, поет и сочиняет
    с подлинной страстью к блюзу". The BLUES Magazine


    За первые два года существования, В 2016-17 годы группа Cаtfish и Мэтт Лонг получили
    пять номинаций на British Blues Awards, а в апреле 2018 года группа была награждена
    UK Blues AWARDS''2018 в качестве Best Blues Act (Англия). Два первых их альбома
    достигли №1 в IBBA Blues Airplay Charts, а альбом ‘Broken Man'' был признан IBBA
    - Aссоциацией независимых британских радиовещателей - "альбомом 2017 года" в Британии!
    В 2017-2018 годах уже совершили успешные туры по Голландии, Германии, Франции
    и Испании. После выхода в начале лета 2019 года нового альбома "Burning Bridges"
    Catfish забукированы на многочисленных британских и европейских фестивалях, на
    три больших европейских тура, не говоря о запланированых концертах по всей Британии.


    Несмотря на занятость в основной группе, фронтмен, гитарист и вокалист Мэтт Лонг
    находит время, силы и вдохновение на то, чтобы развивать и сольное творчество
    - он создал амбициозный проект Rough House Trio, играющий дикий, взрывной, непричесанный,
    нашпигованный тяжелыми риффами блюз-рок, граничащий с hard''n''heavy. Новая группа
    позволяет Мэтту реализовать свои авторские амбиции, ориентированные на олд-скульные
    рок-риффы и демонстрировать свое безупречное гитарное мастерство. Группа включает
    партнера по Catfish Адама Пайка на басу и Кэва Хикмана на барабанах. Про Кэва
    надо сказать отдельно: Кэв известен своей работой со многими британскими блюзовыми
    музыкантами - Гвином Эштоном, Крисси Мэттьюзом, Оли Брауном. Наибольшую известность
    Кэв получил в группе Оли Брауна RavenEye, с которой он объездил весь мир и играл
    на разогреве у KISS, Deep Purple, Slash и Джо Сатриани.


    "Catfish - одна из лучших живых групп в Британии сегодня. Качество музыкантов
    выдающееся, и Мэтт Лонг сегодня один из величайших молодых гитаристов... " Журнал
    Blues Matters! August 2017.


    Первый приезд Мэтта Лонга в Россию с концертами состоялся в сетнябре 2018 года.
    Спустя ровно год, в сентябре 2019 Мэтт вернулся в Москву с новой программой.


    За работу в группе Catfish, за послений альбом группы, и по совокупности заслуг
    Мэтт Лонг получил в начале февраля 2022 года целых пять номианций на UK Blues
    AWARDS''2022 в пяти различных категориях!.. Это рекорное количество номинаций,
    которых удостаивался кто либо прежде за всю историю премии, и нет сомнений, что
    в неакольких номинациях Мэтт награду получит.


    Третий российский тур Мэтта Лонга пройдет в начале декабра 2022 года. Не пропустите!'
