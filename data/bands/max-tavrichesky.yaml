  header: ГОРЯЧИЙ БЛЮЗ МАКСА ТАВРИЧЕСКОГО
  text: 'В последний день января в Cotton-баре было по-летнему жарко. Выступал Макс
    Таврический – блюзмен из Киева, человек-оркестр и просто интересный собеседник.
    Макс Таврический – человек непростой судьбы, тот, кого можно назвать блюзменом
    с большой буквы. В его арсенале – акустическая гитара, губная гармошка и волшебный
    голос. За три часа выступления он играл быстрые и медленные блюзы, рок-н-роллы
    и фолк, использовал восемь различных гармошек, выходил на бис и удивлялся, насколько
    тепло его принимают днепропетровские слушатели. После концерта Макс согласился
    остаться еще на день, чтобы поиграть на воскресном джеме. Но никакие слова не
    скажут о нем больше, чем это сделает его музыка.


    - Расскажите о своей музыке. Что для вас значит блюз?


    - Музыка – это тот язык, на котором я разговариваю, национальный язык, это моя
    жизнь, мои мысли.


    - Вы, как многие блюзмены, тоже, наверное, играли в переходах?


    - Конечно. Переходы, улицы - это самая основная школа, которую рекомендую пройти
    каждому блюзмену. Блюз - это, скажем так, культурный пласт намного больше, чем
    музыка исключительно о несчастной любви или об отсутствии денег. Это мировоззрение,
    мировосприятие, особый вид энергии. Есть высказывание: "Блюз – это когда хорошему
    человеку плохо". Оно в корне неверно. Блюз - это когда хорошему человеку уже хорошо.
    Было плохо, а пришел - и с блюзом все стало лучше. Тут работает такая мысль: если
    высказать свою проблему, она перестанет быть проблемой. Чем блюз интересен – это
    тем, что он везде одинаков. Что здесь, что в Японии, что в Штатах. Я не имею в
    виду исполнительский уровень, я имею в виду блюзовые мысли, блюзовый образ жизни.
    Он напоминает нам, что у всех людей по две руки, по две ноги и одна голова.


    - Я знаю, что вы четыре года жили и выступали в Турции. Отличается ли турецкий
    слушатель, турецкий блюз от нашего?


    - Пять лет, если быть точным. Он не бывает турецким, это же блюз. Он становится
    турецким, когда его начинают петь на турецком языке. Таких попыток на моей памяти
    было только две. И блюз перестали быть блюзом, как только зазвучал на турецком.
    Это то же самое, что русскую народную музыку петь на китайском. Зачем переводить
    то, что непосредственно идет с энергетикой ритмики? Русский язык другой, для другой
    музыки. Английский, его фонетика идеально подходят для блюза.


    - С кем из украинских музыкантов вы знакомы?


    - Со Светланой Лободой (смеется). Шутка, конечно. Если серьезно, с помощью джемов
    знакомлюсь с очень многими людьми. Я провожу их в Киеве гораздо реже, чем это
    происходит у вас. У нас хороший джем раз в полгода бывает. Сейчас наблюдается
    единение старого и нового поколения музыкантов. Еще два года назад я думал, что,
    наверное, на мне блюз так и закончится. Не было ни учеников, ни желания ни у кого
    играть эту музыку. Сейчас появились две очень неплохие команды, которые выбрали
    блюз и в нем очень плотно работают. Не бывает так, что музыка хороша, а человек
    – нет. Музыка – это правда, зеркало человека.


    - Майлз Девис сказал: "Зачем спрашивать что-то обо мне, если есть моя музыка?"


    - Он абсолютно прав. Музыка – это резюме музыканта, его жизнь. Родился там-то,
    вырос там-то, ходил там-то – все это есть в его звуках. Любой человек должен жить
    только ради того, что ему нравится, иначе работа превращается в рабство. Надо
    всего лишь хотеть. Нужен стержень. И не бывает побед без поражений. Сначала идет
    очень длинная волна поражений. Она очень многих пугает. Я не помню того момента,
    когда решил стать блюзменом. Я не говорил себе: вот с сегодняшнего дня становлюсь
    музыкантом. Такого не бывает. Смотришь – получается, все больше времени уделяешь
    тому, что нравится. И потом это становится твоей профессией.


    - Учитывая сегодняшнюю ситуацию в музыке, в блюзе, нет никаких сожалений по поводу
    того, чем занимаетесь?


    - Нет, абсолютно. Раньше была неудовлетворенность. А сейчас я всего лишь занимаюсь
    своим делом. А общая ситуация с блюзом в Украине зависит только от блюзовых музыкантов.
    Будут они ездить в другие города, будут играть по всей стране, а не в своих собственных
    городах, – блюз будет развиваться. И вопрос в том, будут ли они вообще играть.
    Блюз – это, прежде всего, общение с аудиторией. Нужно понять, как это делается
    вживую. Для того чтобы уметь пользоваться отверткой, недостаточно купить отвертку,
    нужно уметь закручивать болты. Я помню, что мое окончательное решение играть блюз
    все-таки произошло на концерте. Играла группа "Второе дыхание". Это был 93-й или
    94-й год. Я приехал в Киев по работе или в командировку. Концерт проходил в КПИ,
    тогда играли "Mad Heads" - еще очень молодые. Выступление было хорошим. Потом
    играли "Второе дыхание". Я помню, пошел с ними знакомиться, и у меня с собой была
    гармошка. Я сел в угол за роялем и гармошкой сорвал себе полностью губы. Было
    много крови. Сто со мной произошло в тот момент, я не знаю.


    - Вижу, вам непросто говорить об этом. Скажите, не планируется ли запись альбома?


    - Альбом уже записан. Позавчера мастер закончили. Альбом полностью блюзовый. Я
    на концертах могу "Doors" или Боба Дилана поиграть, людям ведь нравится. Но на
    альбоме – только блюз. Альбом не слишком длинный – всего 37 минут.


    - Есть ли еще такие украинские группы, с которыми вы хотели бы сыграть?


    - Если я хочу сыграть с какой-то группой, я с ними играю. В "Братах Гадюкиних"
    было бы интересно, но у них своя гармошка. "Второе дыхание" - с ними я играл.
    Наверное, любая киевская команда, которая хотя бы 20 минут в своей программе уделяет
    блюзу, со мной однажды играла.


    - Чему ваше сердце принадлежит – гитаре или гармошке?


    - Не хочу обидеть ни один из инструментов. Обеим. Кстати, я был на мастер-классе
    Боба Брозмена, чернокожего музыканта, и он сказал такую вещь: "У вас, европейцев,
    традиция считать на первую долю – это марши". Они же считают на слабую. У них
    другое представление о музыке. И эта слабая доля оправдана. Народные массы, которые
    находились в арьергарде социальной жизни, делали такую музыку, что те, кто считал
    себя авангардом, слушали, не могли оторваться.


    - Но если взять пример Майлза Девиса…


    - Майлз Девис - из богатой семьи. Был такой случай, когда в университете говорили,
    что джаз – музыка бедных и угнетенных, встал Майлз Девис и сказал, что это все
    неправда, что он сам из богатой семьи, но все равно играет джаз.


    - Своей игрой Майлз протестовал против дискриминации чернокожих, доказывал, что
    не только белые могут играть.


    - Ничего он не протестовал. Это был всего лишь Майлз Девис. И музыка – его внутренний
    наркотик.


    - Интересно было бы Майлза застать вживую?


    - Всех интересно было бы застать. Кстати, если поставить такую цель, то надо брать
    билет до Штатов, пока живы классики блюза и джаза, отслеживать, где они выступают,
    и говорить с ними, слушать их игру. Но там ТАКОЙ блюз! Пока у нас строят катапульты,
    там давным-давно воюют ядерным оружием. Но сразу предупреждаю… Вы никогда не были
    на концерте настоящих черных блюзменов? Если есть предрасположенность к блюзу
    - уносит буквально с первых нот. Это космос. У нас в стране блюзовая музыка играется
    так: мы живем, репетируем, опять живем. А они с этой музыкой рождаются.


    - Чарльз Гейл, джазмен, в интервью говорит просто замечательные вещи. Он может
    пойти, сесть, играть в переходе. Концерты бесплатные давать. Для него это нормально.


    - Все дело в том, что для нас это ненормально! Мы думаем: как это – человек такого
    уровня играет в переходе? В Европе все музыканты говорят, что на улице ты зарабатываешь
    больше денег, чем в кабаке. Никогда не поверю, что семи пядей во лбу музыкант,
    такой, как Стинг или Элтон Джон, никогда не играл на улице. Более того, они и
    сейчас любят подшучивать так – сидеть в каком-то баре и совершенно неожиданно
    выйти и сыграть. Рассказывал товарищ: блюзовый клуб - стоит очередь. Что тоже
    не в наших понятиях. 15 фунтов – вход, 8 фунтов – пиво. И очередь ждет, пока столики
    освободятся. Товарищ дожидается, заходит, садится к сцене, смотрит - сидит небритый
    дедушка в свитере вылинявшем, в джинсах с пятнами. Прислушивается, а играет-то
    этот дедушка просто замечательно. Присматривается - а это Эрик Клептон!


    Беседовал Игорь Андрющенко'
