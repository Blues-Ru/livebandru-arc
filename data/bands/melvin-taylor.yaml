  header: '"Melvin Taylor Blues Band" отправляется в турне по Украине'
  text: 'Американский коллектив "Melvin Taylor Blues Band" отправляется в турне по
    Украине. С 1 по 6 октября блюзовый коллектив выступит в пяти украинских городах:
    Ялте, Севастополе, Симферополе, Львове и Киеве. В Севастополе группа Мелвина Тэйлора
    даст концерт 2 октября в Матросском клубе, начало в 19.00.


    Расписание концертов по остальным городам тура:


    1 октября - Ялта, театр им.Чехова, начало в 19.00 3 октября - Симферополь, Крымский
    академический украинский музыкальный театр, начало в 19.00 5 октября - Львов,
    театр им. Заньковецкой, начало в 19.00 6 октября - Киев, Культурно-образовательный
    центр "Мастер Класс", начало в 20.00.


    Вместе с Мелвином нашу страну посетят американские музыканты: пианист Бернелл
    Андерсон (Bernell Anderson), басист Джонни Бенни (Johnnie Bennie) и барабанщик
    Дарвонт Мюррей (Darvonte Murray). Вести все концерты будет известный джазовый
    радиоведущий Алексей Коган.


    Справка. Мелвин Тэйлор – знаменитый американский гитарист и вокалист из "столицы
    блюза" Чикаго. Он выработал свой собственный стиль игры на гитаре, в котором невообразимым
    образом сочетаются взрывная техника легендарного Джими Хендрикса (Jimi Hendrix)
    с утонченным изяществом джазовой манеры Уэса Монтгомери (Wes Montgomery). Музыкальный
    журнал "Rolling Stone" назвал Мелвина "новатором, умело смешивающим джазовые аккорды
    и рок-влияния в своем электрическом блюзе"'
