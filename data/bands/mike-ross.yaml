  text: 'Долгие годы гитарист и саунд-продюсер Майк Росс находился в эпицентре британской
    блюзовой сцены. Известный в блюзовых кругах, как выдающийся сессионный музыкант,
    аранжировщик и звукоинженер, участвовавший в записи более полусотни альбомов друзей-блюзменов,
    он сочинял собственные песни, что называется, в стол. Но в какой-то момент оказалось,
    что первоклассного песенного материала у Майка Росса с лихвой хватит на пару альбомов,
    и, обкатав их на многочисленных концертах в разнообразных дружественных составах
    в лондонских и брайтонских клубах, Майк наконец-то собрал The Mike Ross Band и
    решился на выпуск альбома. Первый, ‘Spindrift'' был записан в 2013 году, увидел
    свет в начале 2014 года и получил высокие оценки критиков и публики. Следующим
    был выпущен концертный альбом, записанный в знаменитом лондонском 100 club на
    Оксфорд-стрит, содержащий примерно в равной пропорции вещи с дебютного альбома
    и новый материал. И, наконец, в декабре 2015 года был закончен мастеринг второго
    студийного альбома ‘Jenny''s Place'', релиз которого состоялся в марте 2016 и
    стал поворотным в карьере Майка Росса.


    Эти релизы получили высшие оценки авторитетных критиков Blues Matters! и Classic
    ROCK, и хорошие ротации на британских радиостанциях, а журнал Blues in Britain
    посвятил Майку пятистраничный репортаж.


    Автор статьи, постоянный автор журнала Blues in Britain Морэй Стюарт написал:
    "Да здравствует интуитивная прозорливость! Казалось бы, череда счастливых случайностей
    привела Майка Росса к решению наконец-то записываться под собственным именем,
    что, в свою очередь, совершенно случайно привело к тому, что однажды я взял в
    руки его альбом. И хвала Господу за это!"


    Этот парень родом с Северо-востока Англии непостижимым образом дистиллировал,
    замиксовал и разлил по своим песням дух Юга и Западного Берега Америки в стиле
    галлюциногенной психоделики раннего Джерри Гарсия, отвязный блюз-рок а-ля Black
    Crowes, прозрачные вибрации акустических номеров Джей-Джей Кейла и Джексона Брауна,
    Зи-Зи-Топовский буги-блюз, Чикаго-стайл и Хукеровский delta-blues, не забывая
    при этом про наследие великих британских блюзменов 60-х в диапазоне от Эрика Клэптона
    до Питера Грина. Все это легко объяснимо - как сессионный гитарист он переиграл
    со многими легендами блюза прошлого и настоящего, записывался с мятежным лидером
    Black Crowes Ричем Робинсоном и легендой кантри Стивом Ерлом. Майк работал с Роско
    Леви, с которым создал играющую плиходелический блюз группу Walrus, и многими
    другими коллегами по британской блюзовой сцене.


    С Троем Редферном и Джеком Хатчинсоном весной 2018 года Майк создал новый проект
    ''RHR - Redfern Hutchinson Ross'', а уже летом новая формация записала дебютый
    альбом Mahogany Drift, релиз которого состоялся в октябре, и уже спустя три недели
    заглавный трек из него занял третье место в рейтинге "Tracks of the Week'' журнала
    Classic ROCK.


    Майк прекрасно чувствует все нюансы жанра и мастерски смешивает разные краски.
    Его гитарные работы виртуозны и стильны, независимо от того, играет ли он на перегруженном
    Gibson, акустической гитаре или винтажном стальном резонаторе 30-х годов. Страстный
    вокал отличается зрелой глубиной, песенное творчество впечатляет и богатством
    аранжировок музыкальной составляющей, и тонкостью и остротой лирики.


    Майк Росс впервые приезжал в Россию в феврале 2018 года и на презентации нового
    альбома представил публике программу из лучших своих композиций. Второй тур состоялся
    в конце марта 2019 года. Третий тур с успехом прошел в конце октября-начале ноября
    2019 года.'
