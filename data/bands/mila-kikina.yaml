  header: Возвращение ушедших песен
  text: Первородные русские песни и корневой рок-н-рольный драйв давно утвердил их
    на нашей сцене. Мила Кикина и проект "Калитку Прикрой" – коллектив, исполняющий,
    в основном, песни малоизвестные, не имеющий ничего общего ни с облегченно-попсовым
    исполнением фольклора, ни с выхолощенными интерпретациями русских народных хоров
    советского образца. Внимательно, интеллигентно подобранный репертуар, необычный
    для фолк-группы состав, качественная техника исполнения и артистичная подача песенного
    материала производит большое впечатление на слушателя. С глубоким уважением к
    первоисточнику, очень бережно группа переводит на музыкальный язык, понятный современному
    слушателю, давно забытые, ушедшие песни.
  verified: false
  created: '2010-10-01'
  is_press_release: true
