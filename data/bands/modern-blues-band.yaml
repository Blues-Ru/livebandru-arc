  text: 'Modern Blues Band - одна из самых популярных блюзовых команд в России. За
    сравнительно недолгую историю своего существования группе удалось самое главное
    - завоевать сердца истинных ценителей блюза. Репертуар Modern Blues Band составляют
    оригинальные интерпретации блюзовых стандартов, классические произведения в стиле
    соула и рока, а также авторские композиции, созданные в лучших традициях джаз
    и рок музыки. Узнаваемый стиль Modern Blues Band отличается энергичной манерой
    исполнения в сочетании с тонким пониманием нюансов блюза.


    Modern Blues Band, основанный 1995 году грузинским музыкантом Гией Дзагнидзе,
    объединил группу профессиональных музыкантов, в разное время выступавших с таких
    популярных коллективах, как биг-бэнд Георгия Гараняна, квинтет Алексея Козлова,
    оркестр Анатолия Кролла, группы Con Alma, Каданс. В настоящее время в состав группы
    входят:


    Гия Дзагнидзе (гитара, вокал)<br/> Сергей Слободин (бас-гитара)<br/> Дмитрий Матюхин
    (ударные)<br/> Евгений Ревнюк (клавишные)


    Modern Blues Band является участником и призером многочисленных блюз, рок и поп
    фестивалей России, Грузии, Дании и других стран. Группу одинаково хорошо принимают
    как на небольших клубных сценах, так и на стадионах крупных городов. В истории
    Modern Blues Band немало совместных выступлений с признанными мэтрами блюзовой
    и джазовой сцены. Так, знаменательным событием в творческой жизни группы стало
    ее выступление со всемирно известным биг-бэндом под управлением Уинтона Марсалеса,
    посвященное дню независимости Америки.


    Особенно успешным для группы стал минувший 2001 год. В марте состоялось совместное
    выступление с ирландской группой "The Taste". В апреле Modern Blues Band принял
    участие в первом московском блюз-фестивале "Весь этот блюз. Blues.ru - 2001".
    В октябре музыканты, пользующиеся особой любовью московской американской диаспоры,
    стали почетными гостями концерта к 10 - летию знаменитого американского журнала
    "Ридерс Дайджест". А в декабре группе Modern Blues Band совместно с командой Crossroads
    выпала честь представлять Россию на втором Международном Музыкальном фестивале
    "Blues Summit", собравшем популярнейших блюзовых музыкантов из США, Великобритании,
    Ирландии, Польши и стран Балтии.'
