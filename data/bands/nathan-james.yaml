  text: 'За свою 20 летнюю карьеру Натан Джеймс никогда не следовал шаблонам и всегда
    выбирал свой собственный путь в музыке. Вооруженный самодельной гитарой из стиральной
    доски, играющий ногой ритм на стомбоксе, сделанном из старого забора, поющий и
    дующий в губную гармонику, он навсегда пленяет своего слушателя. Находясь под
    сильным влиянием многих корневых артистов и стилей, Джеймс с ранних лет начал
    развивать свой собственный стиль. А когда ему было 19 лет, Джеймс Харман, один
    из столпов современного американского блюза, предложил Натану присоединиться к
    своей группе. И этот опыт определил всю дальнейшую карьеру музыканта. В 2007 ом
    году Натан участвовал в International Blues Challenge в Мемфисе с Беном Хернандезом
    и взял первое место. Так же за годы своей карьеры Натан работал с многими другими
    известными музыкантами, такими как: Ким Вилсон, Пайнтоп Перкинс, Билли Бой Арнольд,
    Лэйзи Лестер, Джони Дайер, Рик Холмстром, Джанива Мэгнесс, Марк Хаммил и Гэри
    Примич. Натан выступал со своей музыкой на концертах и фестивалях в Испании, Италии,
    Франции, Голландии, Дании, Норвегии, Швеции, Финляндии, Тайване, Канаде и Мексике,
    не говоря уже о всех Соединенных Штатах Америки. Проект, с котором Натан приедет
    в Россию и выступит с группой The Jumping Cats сочетает в себе элементы акустического
    блюза 20ых годов, электрофицированного Джук Джоинт Кантри и городского блюза 50ых
    смешанного с ритм-блюзом 60ых. Проект вдохновленный музыкой от Тампы Рэд до БиБиКинга
    и Джеймса Брауна! Знание стилей и понимание всех нюансов этой музыки создаст совершенно
    непередаваемую атмосферу на концертах!'
