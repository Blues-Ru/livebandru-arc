reviews:
- id: 53
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  header: New Day Blues Band
  text: 'Группа "New Day Blues Band" была основана 20 марта 2005 года из музыкантов
    ранее уже игравших в различных коллективах города Запорожье. Уже был некоторый
    наработанный материал - который и явился основой для творчества группы. Изначально
    не ставилась идея играть только блюз. И как известно эта, музыка в нашей стране
    не очень распространена. Ранее коллектив носил называние - "Новый день". История
    данного названия столь необычная, сколько и символична и с течением времени лишь
    укрепила и укоренила творческие взгляды всех участников коллектива.


    "Усталый человек приходит домой, после неудачного дня, у него проблемы с личными
    отношениями, предательство друзей, серый и злободневный быт, угнетающее окружение
    окружающего мира; он садиться в одинокой комнате, наливает себе рюмочку дешевого
    и терпкого коньяка, выпускает в пустоту, пронизанную отблеском луны, сизое облако
    сигаретного дыма, берет в руки гитару и сочиняет настоящий блюз, до самого утра...
    Рассвет - символ новой жизни, начала, развития, надежды на лучшее. Настает новый
    день и жизнь меняется к лучшему, все сразу становится на свои места." Так и рождается
    блюз - в предрассветной грусти или дорожной пыли, вселяющий надежду на лучшее.
    Со временем блюз стал основным музыкальным направлением, на которое опирается
    творчество коллектива. В январе 2009 года название коллектива сменилось на "New
    Day Blues Band" и под этим названием группа продолжает работать.


    В процессе существования группы менялось много участников - люди приходили и уходили,
    кому-то не подходили мы, кто-то не подходил нам, но все оставляли частичку своей
    души и мировоззрения в песнях коллектива. Менялись лица, имена, возраст участников,
    инструментальный состав, аранжировки песен... Но однозначно было только одно:
    все что делается - все к лучшему.


    На текущий момент состав участников группы насчитывает 5 человек, а именно: Андрей
    Бедношей (бас гитара, звукорежиссер и администратор группы), Андрей Петренко (ударные
    инструменты, перкуссия), Сергей Шматов (гитара, бэк-вокал), Алексей Медников (губная
    гармошка), Анастасия Зыкова (вокал).


    Музыкальный стиль композиций - блюз, блюз-рок, ритм-н-блюз, русский рок, рок-н-рол,
    кантри-блюз. Группа активно гастролирует, а так же принимает участие в различных
    тематических мероприятиях, фестивалях и музыкальных конкурсах, является основателями
    и организатором ежегодного всеукраинского блюзового фестиваля "Jammin'' Bluezzz".


    "New Day Blues Band" продолжает выступать, ставить и реализовывать свои цели,
    завоевывать сердца аудитории, развивать на просторах нашей страны такое музыкальное
    направление, как блюз и радовать своих поклонников хорошими песнями.


    P.S. На данный момент группа готовит новый музыкальный материал, и уже в ближайшие
    время порадует своих слушателей, новой хорошей музыкой в стили Блюз.'
