  text: 'Олег Бутман начал играть на барабанах в восьмилетнем возрасте, в пятнадцатилетнем
    возрасте его пригласили работать профессионально в известную российскую рок-группу
    "Телевизор". В 1983 году на фестивале "Осенние ритмы" он обратил на себя внимание
    замечательного джазмена Давида Голощекина, и тот пригласил Олега в свой коллектив.
    Еще через несколько лет Олега пригласили в аккомпанирующий состав американской
    звезды, саксофониста Ричи Коула. Впоследствии Олег частенько выступал с американскими
    звездами - и в России, и за рубежом - среди них Джон Фэддис, Билли Тейлор, Гровер
    Уошингтон, Пэт Мэтини. Олег не устает удивлять искушенную московскую публику новыми
    интересными проектами. Один из них - ансамбль "Jazz Passion", весьма востребованный
    на разных концертных площадках городов России и Европы. Работая в ансамбле, Олег
    получил возможность реализовать себя не только как музыкант, но и как композитор.
    В 2009 году на лейбле Butman Music вышел одноменный диск, записанный барабанщиком
    с пианисткой Натальей Смирновой и известными нью-йоркскими музыкантами.


    Обаяние, харизма, яркая, динамичная игра Олега снискали ему славу как среди российских
    коллег, так и в кругах зарубежных звезд джаза. Везде у него масса друзей и единомышленников,
    знаменитые музыканты - вибрафонист Джо Локк, басист Эдди Гомес, пианист Энди Лаверн,
    гитарист Рон Афифф - нередко приглашают его в свои составы.'
