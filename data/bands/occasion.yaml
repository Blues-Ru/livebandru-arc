  reviewer_token: press-release
  text: 'Окейжн, или Оказия по русски. Один из вариантов значения слова okasion -
    одобрение. От авторского "рнб", и "okasion-fusion", до фортепианных миниатюр,
    условно говоря.


    Композиции и слова Андрея Барбашова (клавишные,фортепиано,голос). С вкладом опытных,
    замечательных музыкантов, принимающих в оказии участие. Трио. Но может быть и
    соло, и дуэт, и квартет. В зависимости от времени, места, обстоятельств и внутренней
    тяги.


    А.Б. oкончил Архангельский Музыкальный Колледж по классу фортепиано в середине
    восьмидесятых. В то же времени играл и пел свои вещи в группах ПРОВИНЦИЯ (Северодвинск),
    07 (Ленинград). В 1988 основал арт НЕЧТО, позже переименованное в НЕЧТО ТРАЙЯ,
    группа, которая выступала в числе лауреатов на легендарном питерском всесоюзном
    фестивале Аврора 1990 года, куда была приглашена, благодаря записанным магнито-альбомам
    "Фея П.С.", "Фарфоровый Гость" и "Перевоплощения", которые распространялись и
    имели хождение в кругах любителей субкультурной рок-музыки на территории СССР.


    НЕЧТО (1988-1996) играло "своеобразный припанкованный арт-рок", местами лиричный,
    местами психоделичный. Тогда же случились поездки на фестивали в Польшу и Швецию.
    https://vk.com/artnechto_ok.aziya


    С 1997 года, после переезда в Москву, А.Б. работает по специальности аранжировщика
    и композитора в Колледже Искусств. 2003 - сотрудничество с блюзо-джазовым на тот
    момент Bluesmakers и Петрович & Hot Rod Band, где получил прозвище "Бугимэн" за
    фортепианные буги. С "Хот Род Бэндом" же несколько лет работы в Театре Вахтангова.
    А также с другими известными рнб артистами. Продолжая и там исполнять свои вещи,
    наряду с мировой классикой ритм энд блюза. Также участие в проекте Алексея Уайта
    Белова "Удачное Приобретение" с Андреем Макаревичем в 2011 году.


    В 2008, параллельно образовывается третья группа ОКАЗИЯ /OK.AZIYA. Если в арт
    НЕЧТО /ТРАЙЯ тексты, или слова песен были на русском языке, то в OKASION больше
    на английском. Исключительно из музыкальных соображений. С переходами, порой,
    из одного языка в другой по ходу песни. Форма - от ритм-блюза до джаз-фанка и
    камерного прога.


    В В последнее время имело место быть две стороны, или программы. Одна - пиано
    ритм-блюзовая с перкуссией и гитарой, либо дуэтом. Другая, собственно "окейжн-фьюжн".
    Ru/Eng.


    Выступления на московских фестивалях Пустые Холмы, Свинговый Бум, ПрогДэй. А также
    на фестивалях Этно Баренц Джаз, Архангельск Блюз, Malina Jazz, Беломор Буги. И
    в клубах.


    Люди, учавствовавшие в ОКАЗИИ (ОKASION):


    Андрей Барбашов, Андрей Панкратов, Павел Семилетков, Николай Куликов, Валерий
    Журавлев, Тим Дорофеев, Николай Клишин, Karmen Moxie, Степан Юрлов, и другие.


    В 1987г. основана группа "Нечто". В 1994г. "Нечто Трайя". В 2008г. "ОК.Азия" (OK.Asion,
    или Occasion).


    Люди, принимавшие участие в "НЕЧТО" и "ТРАЙЯ":


    Андрей Барбашов, Игорь Тропин, Вадим Фокин, Герман Голенищев, Евгений Шариков
    (джаз ансамбль "Арсенал"), Сергей Морозов, Михаил Мардер, Сергей Диденко.


    Мир, Любовь и Музыка, расширяющая границы.'
