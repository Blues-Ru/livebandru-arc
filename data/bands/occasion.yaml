  text: 'Андрей Вячеславович Барбашов (д.р. 22.02.1964) - автор-исполнитель, клавишные,
    рояль, голос, гитара, музыка и слова. Из семьи служащих, инженера и врача. Окончил
    северодвинскую музыкальную школу (1971-1979) и архангельский музыкальный колледж
    (1980-1987) по классу фортепиано. Первая рок-группа, исполняющая собственные песни
    была организована в общеобразовательной школе в 1979 году. Служил в армии (1983-1985).
    Учавствовал в ансамбле Провинция (1986-1987) и ленинградской группе 07 (1987-1988),
    где играл и пел свои песни и не только. В 1988 г. выступления на рок-фестивалях
    Мокотовская осень в Варшаве.


    Основатель, автор всей музыки и текстов в группах Нечто (Северодвинск), при поддержке
    Игоря Тропина - ударные, звук. Трайя (Архангельск-Москва) 1988-2006г. И Okasion,
    или Оказия (Москва) 2008г.


    1990 - Нечто (Северодвинск) одни из лауреатов на легендарном всесоюзном ленинградском
    рок-фестивале Аврора, благодаря записанным и разошедшимся по СССР трем "подпольным"
    магнитоальбомам. С помощью писателя Александра Житинского и Петра Сытенкова.


    1995 - Face Front Швеция. Беломор Буги. 1997 - переезд на пмж в Москву. В двухтысячных,
    московские фестивали - Пустые Холмы, Свинговый Бум, Прог Дэй. Архангельск-Блюз,
    и другие.


    В 2008 году основана ОКАЗИЯ/OKASION'
