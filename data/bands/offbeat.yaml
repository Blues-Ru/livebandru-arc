  header: История группы "Off Beat"
  text: 'История группы "OFF Beat" неразрывно связана с ее лидером и вдохновителем
    Денисом Мажуковым.


    Весной 1994 года барабанщик Игорь Данилкин, бас-гитарист Дмитрий Гайдуков и пианист-клавишник
    Денис Мажуков, работая в группе "Браво", узнали о том, что Евгений Хавтан (основатель
    и руководитель этого коллектива) собирается в конце лета сменить часть состава
    коллектива музыкантов группы. В связи с этим, ребята решили создать уже в рамках
    "Браво" свой собственный коллектив, не имеющий аналогов в отечественном шоу-бизнесе.
    Данилкин предложил назвать группу "OFF Beat" (одно из значений этого термина "
    - означает на вторую, слабую долю" (прим.)), что собственно говорит о неслучайности
    выбранного названия.


    И вот после нескольких репетиций, пригласив в состав ветерана рок-н-ролла, гитариста
    группы " Старая Гвардия" Валерия Гелюту, группа дала дебютный концерт в клубе
    "Алябьефф". Это произошло 12-го августа 1994 года. И в то время стало понятно,
    что рождение этого коллектива ознаменовало собой новую эпоху рок-н-ролла в России.


    Уже с осени "OFF Beat" "гремел" в лучших ночных клубах и на престижных концертных
    площадках Москвы, преподнося приятнейший сюрприз не только старой армии "шестидесятников",
    но и стремительно завоевывая поклонников среди современного поколения.


    Успешная концертная деятельность коллектива способствовала тому, что альбом новой
    группы просто обязан был появиться. И в декабре 1994 года "OFF Beat" приходит
    на студию "SNC Records" записывать свой первый диск. Репертуар альбома был подобран
    оригинальным образом; помимо 12-ти классических хитов рок-н-ролла и блюза, Денис
    Мажуков предложил музыкантам записать несколько песен, написанных в свое время
    его знаменитым отцом, композитором Алексеем Мажуковым, в собственной оригинальной
    обработке. Специально для исполнения русскоязычных песен на запись был приглашен
    вокалист Юрий Колесник, кстати уже тогда преподававший вокальное народное творчество
    в Гнесинке. Альбом с одноименным названием "OFF Beat" увидел свет в мае 1995 года.


    К концу 1995 года название коллектива внезапно исчезло с афиш московских клубов
    и из рок-н-ролльной жизни столицы: Гайдуков и Данилкин ушли в шоу-бизнес (посчитав
    вероятнее это дело более прибыльным), а Мажуков уходит с головой в студийную работу.
    Эксперементируя с новыми звуками, музыкальными находками и инструментами, Денис
    делает множество домашних записей в различных музыкальных стилях, помогает в записи
    и концертной работе многим исполнителям, а также на молодежном канале радио "Юность"
    вместе со своим давним другом-единомышленником, пианистом и вокалистом Алексеем
    Блохиным, ведет музыкальную программу о рок-н-ролле и блюзе с незаурядным названием
    "Три правильных аккорда".


    В декабре 1996 года Мажуков знакомится с Денисом Антиповым, человеком который
    убедит и сподвигнет тезку возобновить творческую и концертную деятельность на
    новом уровне, предложив себя в качестве администратора коллектива. Антипов приводит
    в группу молодого бас-гитариста Михаила Ершова и в скором времени становится первым
    официальным менеджером "OFF Beat".


    В феврале 1997 года Мажукову поступило невероятное предложение - открывать концерты
    легенды рок-н-ролла Джерри Ли Льюиса, назначенные в Москве на 21 и 22 марта, в
    ГЦКЗ "Россия". Предложение было незамедлительно принято. "Off Beat" вышел на сцену
    в таком составе:


    Денис Мажуков - вокал, фортепиано Александр Жаворонков - гитара Михаил Ершов -
    бас Виктор "Чак" Костров - ударные


    После концерта состоялась встреча великого музыканта и его талантливого последователя.
    Джерри Ли Льюис, получив в подарок альбом "Off Beat", растрогался и сказал: "Я
    обязательно дам его послушать своим друзьям в Мемфисе". И добавил, по-дружески
    обняв Мажукова: "Ты играешь так же, как я в молодости".


    Тем временем Денис Антипов принимает большое участие в концертной деятельности
    группы. В начале лета 1997 года он на свои собственные средства покупает звуковую
    аппаратуру для коллектива и договаривается со студией в Сокольниках, на которой
    "OFF Beat" записывает помимо классики рок-н-ролла, собственные русскоязычные песни,
    которые, к сожалению так и не были изданы, но звучали на многих музыкальных радиостанциях
    и в прямых радиоэфирах, организацию которых брал на себя Денис Антипов.


    И вот в начале августа происходит еще одно знаменательное событие: Антипов звонит
    Мажукову и ставит его перед фактом: " Завтра ты играешь с Чаком Берри на закрытии
    Международного Кинофестиваля в Москве" (Это был второй приезд знаменитого рок-н-ролльщика
    в столицу.В отличии от первого, (официального) об этом визите не было сообщений
    в СМИ (прим.), тот не верит... На следующий день была репетиция на студии "SNC
    Records", где "отцу рок-н-ролла" были представлены два музыканта, которым выпала
    честь играть с мэтром: Это Александр Торопкин (ударные) из "Crossroads" и сам
    Мажуков. Чак Берри выбором остался очень доволен (как сказал сам Денис, о самой
    репетиции нужно писать отдельную книгу). Поэтому мы не будем заострять на ней
    свое внимание. Вечером того же дня на Пушкинской площади Москвы состоялся этот
    эпохальный концерт, от которого пришли в восторг не только несколько тысяч человек,
    случайно оказавшихся в центре столицы, но и сама "легенда" - он был настолько
    поражен игрой Мажукова, что предложил ему совместное турне по Америке, но к сожалению,
    благодаря российским устроителям, которые имели непосредственное отношение к приезду
    Чака Берри, этим планам не суждено было сбыться.


    В сентябре Антипов организует участие Дениса Мажукова (сольно), как специально
    приглашенного гостя в рамках сольных концертов бывшего контрабасиста легендарных
    "Stray Cats" Ли Рокера. На сцене кафе "ChesterField" Мажуков сыграл и спел несколько
    рок-н-роллов под аккомпанемент самого Ли Рокера и его команды. После концерта
    они познакомились и сфотографировались на память.


    Вторая половина 1997 - 1998 гг. - пик концертной деятельности "Off Beat". Группа
    давала по 30-40 концертов в месяц, гастролировала по всей России (побывали во
    Владимире, Кирове, Ярославле и многих других городах). В начале 1999 года в группу
    пришел Николай Второв - контрабасист и основатель известного в конце 1980-х -
    начале 1990-х годов рокабилли-коллектива "Бриолиновая мечта". Чуть позже к ним
    присоединился барабанщик Евгений Ломакин (в середине 1990-х он играл в группе
    Алексея Блохина "Crazy Man Crazy"), и к лету этого года состав группы был такой:


    Денис Мажуков - вокал, фортепиано Александр Жаворонков и Валерий Гелюта - гитары
    Николай Второв - бас Евгений Ломакин - ударные.


    Незадолго до этого, в мае 1999 года, Николай Тишков (в то время директор культового
    молодежного клуба "Taxman") повез Мажукова в Хельсинки (Финляндия), чтобы познакомить
    с организаторами будущих гастролей группы. Там Денис выступал на городском празднике
    на центральном стадионе, в шоу-программе с четырьмя рок-н-роллами. Толпа из 15
    000 человек пришла в экстаз и танцевала до потери памяти. Во время этой поездки
    Мажуков дал интервью на радио, в прямом эфире, в программе "Доброе утро, Хельсинки"),
    и крупнейшей шведско-финской газете.


    Осенью того же года Денис Мажуков стал готовить к выходу второй альбом. Пластинка
    "That''s What I Am" была записана в ноябре-декабре 1999 года на студии "Акустика"
    в сотрудничестве с прекрасным звукорежиссером Дмитрием Кротовым. Этот альбом представлял
    собой смешение различных стилей: и традиционные рок-н-роллы ("Rip It Up", "Breathless"),
    и кантри-баллады ("Early Morning Rain", "You Don''t Know Me", "Games People Play"),
    и незатейливый вестерн ("Hello Mary Lou"), нашлось даже место для рок-боевичка
    Чарли Рича ("Mohair Sam"). Помимо членов группы "Off Beat" в записи принимали
    участие такие музыканты, как Александр Василенко (талантливый гитарист и автор
    многих учебников-пособий по игре на гитаре), блюзовый гитарист Юрий Кривошеин
    ("Scolder Blues Band"), прекрасная российская певица Маша Кац, кантри-музыкант
    и губной гармонист Дмитрий Новокольский ("Apple Jack"), Андрей Шепелев (добро
    и pedal-steel) из группы "Грассмейстер" и многие другие. Альбом вышел в 2002 году,
    и некоторые поклонники коллектива посчитали его даже более удачным, чем дебютный
    диск.


    В начале осени 2000 года в группу пришел новый директор - Тимофей Коломников -
    и началась очередная волна концертных выступлений "Off Beat". Группа обрела новых
    поклонников и новые знакомства, благодаря появлению 16 ноября в телевизионной
    программе Дмитрия Диброва "Антропология". Среди "новых почитателей" оказались
    люди и "по ту сторону океана": увидев "Антропологию", они пригласили "Off Beat"
    в Нью-Йорк. Коломников взял на себя всю подготовку этой поездки.


    В первой половине 2001 года в коллектив пришли гитарист Александр Василенко и
    бас-гитарист Дмитрий Рыбалов (он появился всего за месяц с небольшим до гастролей,
    и только по этой причине не смог поехать в США). Денис Мажуков, Александр Василенко,
    Николай Второв, Евгений Ломакин (для Николая Второва и Евгения Ломакина это было
    последнее выступление в составе нруппы) - именно в таком составе "Off Beat" отправились
    в конце мая 2001 года на гастроли в Нью-Йорк, чтобы дать концерт в зале "Millenium"
    (на три тысячи человек).


    В Нью-Йорке Денис Мажуков встретил своего давнего друга, Алексея Блохина (он уже
    более четырех лет жил в Америке). Вместе с директором группы, Тимофеем Коломниковым,
    и с участием местных музыкантов они устроили угарный рок-н-ролльный концерт в
    клубе "Orange Bear" на Манхэттене.


    В сентябре 2001 года в коллектив пришел один из легендарных барабанщиков 1970-х
    годов - Алексей Колодий. Теперь состав группы выглядел следующим образом:


    Денис Мажуков - вокал, фортепиано Александр Василенко - гитара Дмитрий Рыбалов
    - бас Алексей Колодий - ударные.


    В начале лета 2002 года, после почти двух лет работы с группой "Off Beat", Тимофей
    Коломников сложил свои полномочия директора. Однако коллектив, оставшись без менеджера
    на долгих четыре года, продолжил концертную деятельность. В июле 2004 года "Off
    Beat" представлял Россию на фестивале "Country Europa 2004" в Мрангово (Польша),
    и занял там 2 место. Эту поездку организовал известный в прошлом джазовый музыкант
    Андрей Зиновьевич Давидович - он немало сделал для становления кантри-музыки в
    России и продвижения ее в Европу.


    В сентябре 2004 года состав "Off Beat" в очередной раз изменился. В команду пришел
    молодой барабанщик Александр Половинкин и возвратился (после четырехлетнего отсутствия)
    Валерий Гелюта. В качестве бэк-вокалистки Мажуков пригласил Кристину Сикорскую
    (дочь легендарного музыканта Алика Сикорского, начинавшего еще в далекие 1960-е)
    - впоследствии она стала клавишницей группы и исполняла несколько вокально-сольных
    композиций и дуэтов с лидером "Off Beat".


    В октябре 2004 года в "Кафе-Блюз" "Off Beat" отметил с небольшим опозданием свое
    10-летие. Участие в празднике принимали Алексей Блохин, Алик Сикорский, Евгений
    Хавтан, Роберт Ленц, группы "Apple Jack" и "Scolder Blues Band", контрабасист
    Алексей "Брат" Вихрев и гитарист Павел Степин (оба - "Mister Twister"), Тимур
    Поповкин и многие другие.


    Весной 2005 года Денис Мажуков задумал записать пластинку, концепция которой -
    дуэты со звездами отечественной эстрады и просто интересными музыкантами. Часть
    работы уже сделана, и остается только с нетерпением ждать выхода в свет этого
    грандиозного альбома.


    В 2006 году в коллектив пришла талантливый директор Виктория Тарновская - коллектив
    возлагает на нее большие надежды.


    Ну что, господа? The Show Must Go On!!!!!!!!!


    Автор - Дмитрий Новокольский'
