  header: Ленинградский диксиленд под управлением Олега Кувайцева
  text: 'Ленинградский диксиленд - один из старейших диксилендов на Евразильском континенте
    и один из лучших ансамблей этого типа в мире. Он был создан в 1958 г. трубачом
    Всеволодом Королевым. Биография ансамбля неразрывно связана с такими музыкантами
    как братья Валентин и Александр Колпашниковы, Эдуард Левин, Борис Локшин, Юрий
    Мирошниченко. Кредо Ленинградского диксиленда - сочетание безупречного следования
    традиции с естественностью игры.


    Начиная с 60-х годов ансамбль с огромным успехом выступал на международных фестивалях.
    Ему рукоплескали в городах Европы и Америки, его знают и любят поклонники джаза
    у нас в России. В свои 50 лет этот прославленный коллектив полон творческих сил
    и желания покорять публику высоким мастерством. В репертуаре Ленинградского диксиленда
    танцевальная музыка 30-х - 50-х гг.'
