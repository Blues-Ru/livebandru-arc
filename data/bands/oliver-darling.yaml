reviews:
- id: 383
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Уроженец Лондона ОЛИВЕР ДАРЛИНГ - молодой, подающий большие надежды певец,
    гитарист, сонграйтер, лидер блюз-роковой команды The Dirty Robbers - уверенно
    себя чувствует в сплаве стилей от корневого акустического блюза с одной стороны,
    рокабилли и свинга с другой, и добротного блюз-рока с долей "южной" перчинки с
    третьей.


    Постоянно сотрудничает еще с двумя "побочными" проектами, выступает с акустической
    программой, записывается как сессионный музыкант и преподает гитарное мастерство!


    Как он все успевает при его плотном гастрольном графике - непонятно, но зато совершенно
    понятно, что концерт Оливера Дарлинга не стоит пропускать не только любителям
    и знатокам блюза, но и тем, кто очарован музыкой 50-60-х и эстетикой нашумевшего
    фильма "Стиляги".'
  verified: true
  created: '2013-12-20'
  is_press_release: true
