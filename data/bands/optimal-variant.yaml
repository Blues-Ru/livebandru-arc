  header: '"Оптимальный  Вариант"'
  text: 'Легендарная московская группа. В России и за рубежом у ансамбля издано более
    15 альбомов и сборников в форматах LP, CD, MP-3, DVD и др. – от виниловой пластинки
    "Эй, Мельник!" (фирма "Мелодия",1991) до CD-сборника в серии "Легенды Русского
    Рока" ("МOROZ Records", 2002). Песни группы звучат в эфире российских и зарубежных
    радиостанций, а так же представлены в фильмах "Улица Яблочных Лет" (Россия, 1998)
    и "Шатун" (Россия, 2002). В 2010г. Компания "Союз Мьюзик" начала выпуск рок-коллекции
    "оптималов". Группа – неоднократный участник программ ведущих российских телеканалов:
    РТР ("Программа А"), НТВ ("Антропология"), ТВЦ ("Дата" и др.), "Дарьял ТВ" ("Ночной
    VJ"), "О2ТВ",канал "Ностальгия" и др. Клип "Налегке" ротировался в эфире телекомпании
    МТV. Музыкальные корни "оптималов"- благословенные 60-70е", золотая"эра рок-н-ролла,
    и особое место здесь занимают "The Beatles": програмными на последнем альбоме
    группы "Гринвич" стали песни "Битлз и "Rolling Stones" и "Плыви над Гангом"( "(посв.Дж.Харрисону).Они
    же,как и "Шутка"(оригинальный русский текст на "Come Together") прочно входят
    в концертный сет-лист.


    Наряду с авторскими песнями группа выступает с пробитловской кавер-программой,
    начиная с первого фестиваля "Битломания" в Днепроднержинске до современных международных
    проектов. Ее клубная версия играется в "Мюзик Тауне", "Би Би Кинге ", "Петровиче",
    "Высоцком", "Джими","Джазмане".


    Инициаторы объявления 2010 года – Годом Джона Леннона в России, под- держанного
    отечественными музыкальным и Битлз-сообществом, кульминацией которого стал фестиваль
    "70 песен Джона Леннона в честь его 70 – летия (по старому стилю).


    Уже 14 лет – с 1997 г. – "Оптимальный Вариант" успешно проводит собственный ежегодно-ежеводно-ежекрышный
    фестиваль "Улица Яблочных Лет", пронизанный летним битловским настроением.


    Лидер группы О!Чилап (Олег Чилап) – поэт, музыкант, журналист (радиостанции SNC,
    VOX, "РаКурс", РОКС, "Говорит Москва", "КП"). На радио давно ведет битловские
    эфиры, сегодня это "Вечер трудного дня" на 97.2 FM. Состоит в Союзе литераторов
    России, где возглавляет секцию авторского рока, лауреат литературной премии "Словесность"
    (за поэтический сборник "Репей''йа", представлявший Россию на нескольких международных
    книжных ярмарках). Является так же соавтором ряда песен группы "Браво". Его книга
    прозы "Восемь Рук Чтобы Обнять Тебя", одни из героев которой-"битлы", стала бестселлером
    ,и особо дорога битлолюбам.


    ПРОЦВЕТАЙТЕ!'
