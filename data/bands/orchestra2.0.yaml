  text: 'Orchestra 2.0 - совершенно нетипичное и неожиданное явление для российской
    джазовой сцены. Минимализм как творческий метод, постмодернизм как идеология,
    ирония как неотъемлемый компонент творчества. Действительно, Orchestra 2.0 можно
    смело назвать самыми настоящими постмодернистами от джаза: в творчестве группы
    почтение к джазовым традициям уживается с роковой бескомпромиссностью, ностальгией
    по аналоговому саунду 70-х годов и зачастую совсем неджазовым репертуаром.


    У Orchestra 2.0 нет дирижера и руководителя, все участники подчеркивают свой равновеликий
    вклад в творчество состава. Музыканты отлично разбираются не только в джазе, но
    и вообще в современной музыке, на джазовый мейнстрим смотрят свободным от догм
    взглядом и не боятся смелых экспериментов по смешению стилей.


    Вот, что говорит один из участников коллектива, пианист Антон Баронин, о названии
    и музыкальной концепции проекта: "Есть расхожее суждение, что оркестр это самый
    совершенный музыкальный инструмент, потому что у него неограниченное количество
    выразительных возможностей, мощное звучание и тд. Но на самом деле, все, что несет
    в себе музыка, от развлекательной функции до воплощения духовных поисков, все
    это может быть выражено усилиями нескольких талантливых музыкантов при помощи
    малого инструментария. Это, конечно, потребует большей изобретательности, но в
    этом и весь интерес. Поэтому наш оркестр это и оркестр, и анти-оркестр одновременно.
    Мы хотим, чтобы художественные идеи выражались с помощью малых средств, но при
    этом обладали оркестровой выразительностью".


    Для Orchestra 2.0 Aphex Twin, Morcheeba, Frank Zappa и Nirvana значат ничуть не
    меньше, чем Чарли Паркер, Телониус Монк, Джон Колтрейн и Майлс Дэйвис. "Джиммисмитовский"
    грув и "эвансовская" рефлексия органично переходят в почти гранжевый накал. Вывернутые
    наизнанку джазовые стандарты спокойно соседствуют с "Staying Alive" The Bee Gees,
    "Blackbird" The Beatles и даже "Smoke on The Water" The Deep Purple, которую вы
    узнаете только ближе к середине пьесы.


    Эклектичный репертуар, остроумные цитаты, невероятное чувство стиля и меры, избегание
    "общих мест" и легкая ирония наверно, это и есть идеальное воплощение постмодернистских
    идей в музыке.'
