  text: '"Закрытие фестиваля порадовало рождением нового российского коллектива. В
    Москве появился Биг-бенд с романтичным названием "Орфей". Им руководит известный
    джазмен – контрабасист, аранжировщик, композитор – Игорь Кантюков. В составе –
    и корифеи джаза, и молодежь. В дебютном выступлении коллектива приняла участие
    молодая певица Анна Бутурлина. В репертуаре Биг-бенда "Орфей" - джазовый мэйн-стрим."
    Телеканал "Культура".


    Биг-бенд "Орфей" был создан 2 июня 2010 года. Презентация нового коллектива состоялась
    в джаз-клубе "Союза композиторов". Оркестр состоит из 17-ти человек, но может
    выступать и малым составом. Джаз – это не просто музыка, а особое состояние души.
    Исполнитель джаза через мелодию налаживает диалог со слушателем, вовлекая его
    в удивительное музыкальное путешествие. Джаз, прежде всего - искусство импровизации,
    то есть музыка, которая рождается прямо на сцене, сию минуту. Игра джазового музыканта
    зависит и от профессиональной подготовки, и от настроения, и от партнеров, и,
    конечно, от аудитории. И это вызывает необыкновенный эмоциональный накал. Все
    музыканты Биг-бенда "Орфей" виртуозно владеют искусством джазовой импровизации.
    Руководитель оркестра Игорь Кантюков и Заслуженный артист России, трубач Виктор
    Гусейнов в прошлом выступали в составе легендарного ансамбля "Мелодия".


    В репертуаре коллектива современная джазовая музыка, "вечнозеленые мелодии" как
    прошлых лет, так и собственные композиции, музыка из кинофильмов, мюзиклов, танцевальная
    музыка, популярные песни советских композиторов, ретро-программы, а также джаз
    с элементами этноса.


    Приоритетом оркестра является свое прочтение известных джазовых композиций. Аранжировки
    музыканты делают сами, хотя всегда готовы к сотрудничеству с лучшими представителями
    этого жанра.'
