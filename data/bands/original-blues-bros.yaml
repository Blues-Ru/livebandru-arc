  header: КОНЦЕРТ THE "ORIGINAL" BLUES BROTHERS В САНКТ-ПЕТЕРБУРГЕ
  text: 'Черные шляпы, строгие костюмы и очки стали их символом, а комедия про остроумных
    братьев-музыкантов - лучшей рекламой их творчества. The "Original" Blues Brothers,
    самый востребованный блюзовый проект мира, приезжает в Петербург, забыв на время
    о самых крутых концертных площадках Лас-Вегаса, Лос-Анджелеса и Нью-Йорка. Для
    российской публики группа в первую очередь известна благодаря голливудскому фильму
    "Братья Блюз" (The Blues Brothers). В 1980 году, после выхода киноленты в прокат,
    в США, Европе и в России начался настоящий блюзовый бум. Музыкальная комедия с
    Дэном Эйкройдом и Джоном Белуши в главных ролях мгновенно приобрела культовый
    статус. В том же году альбом блюзовых братьев "Briefcase Full of Blues" был продан
    в США тиражом более 3,5 миллионов экземпляров. История коллектива началась со
    знакомства Белуши и Эйкройда. Джон Белуши, старший брат актера Джеймса Белуши,
    играл в то время в чикагском театре и ставил комедийные шоу. Встретив однажды
    Дэна Эйкройда, подружился и предложил тому поработать вместе на сцене. Канадец
    Эйкройд возражать не стал - но результатом их творчества стало не комедийное шоу,
    а музыкальная группа и фильм "Братья Блюз". Безусловно, любителям хорошей музыки
    Эйкройд знаком прежде всего по работе в этом фильме, а не по роли в детской комедии
    "Охотники за привидениями". Несмотря на то, что Белуши ушел из жизни довольно
    рано, в возрасте 33 лет, - проект The "Original Blues Brothers" вот уже 40 лет
    сохраняет фирменный стиль "Братьев Блюз": неизменный драйв и острое чувство юмора,
    безупречный ритм и фирменную походку, отточенные жесты, темные очки и строгие
    костюмы. И, разумеется, первоклассный блюз. Эйкройд тоже иногда выступает, уже
    с братом Белуши Джеймсом, в составе дуэта "Братьев Блюз" - Legacy and The Blood.
    Свой первый альбом "Блюзовые Братья" записали еще в сентябре 1978 года. А уже
    следующим летом он приобрел "платиновый" статус, две песни из него вошли в Top-20
    журнала Billboard. Среди современных участников коллектива - его основоположники,
    снимавшиеся вместе с Эйкройдом и Белуши в фильме "Blues Brothers": Стив Кроппер,
    один из "ста лучших гитаристов мира" по версии журнала Rolling Stone, и саксофонист
    Лу Марини. Сейчас The "Original" Blues Brothers активно гастролируют, сохраняя
    традиции своей фирменной блюзовой школы, ведь поклонников хорошего джаза и блюза
    много в каждом городе мира.'
