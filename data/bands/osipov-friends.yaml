  reviewer_token: press-release
  text: '"Осипов Friends" - это созданный весной 2012 г. и ориентированный на фьюжн-стилистику
    музыкальный проект композитора и тенор-саксофониста Анатолия Осипова. Помимо лидера,
    в составе коллектива задействована одна из лучших в нашей стране ритм-секций в
    лице барабанщика Петра Ившина и бас-гитариста Алексея Заволокина; а также быстро
    набирающие известность пианист Алексей Рябухин. В некоторых концертах группы принимает
    участие пятый участник - приглашенный гитарист (Алим Настаев или Михаил Павельев).
    Четверо из пяти участников ансамбля пишут собственную музыку, так что репертуар
    группы "Осипов Friends" состоит по большей части из авторских композиций, плюс
    несколько фьюжн-стандартов. В настоящее время группа работает над своим дебютным
    альбомом.'
