  text: '"Всем гитаристам гитарист! Деликатный, когда это уместно, но не боящийся
    вжарить с максимальной страстью, когда нужно подогреть атмосферу в зале. Вы чаще
    встретите его на сцене в качестве бэндлидера The Red 8, но Оуэн также умеет и
    любит играть сольно в акустике, а его узнаваемый вокальный стиль как нельзя лучше
    подходит и для того и для другого" BluesinLondon.co.uk


    "Оуэн Хоулстон - ветеран лондонской блюзовой сцены и, в первую очередь, известен
    благодаря своей группе The Red 8. Сольно он исполняет собственную версию кантри-блюза,
    аккомпанируя себе на National steel guitar и отбивая в такт басовую линию педалью
    в большой барабан или просто выстукивая каблуком по дощатому настилу сцены. Его
    фингерпикинг-стиль неподражаем, он заполняет зал резонирующей страстью. Аудитория
    с энтузиазмом погружается в магию его музыки, и всех моментально уносит в иное
    пространство-время" Ukblues.org


    Оуэн Хоулстон - базирующийся в Лондоне гитарист, певец, сонграйтер, бэндлидер
    блюз-рокового коллектива The Red 8, в течение многих лет хорошо известен на британской
    блюзовой сцене. Специализируясь на дельта-блюзе, госпел, буги-блюзе и свинге,
    он много гастролировал по Британии и Континентальной Европе, более полутора десятилей
    он стабильно входил в состав хоум-бэнда в одном из самых успешных блюзовых клубов
    Лондона "Ain''t Nothin'' But... Blues Bar", где играл с такими артистами, как
    Иэн Сигал, Эми Уайнхоус, Ролло Марки, Кэти Брэдли и другими. Он частый участник
    многочисленных британских и европейских блюзовых фестивалей, а в 2008 году он
    был одним из участников King Biscuit Blues Festival в Арканзасе,США. Также он
    проводит матсерклассы по особенностям звукоизвлечения блюзовых гитаристов от Роберта
    Джонсона до Эрика Клэптона и Джими Хендрикса.


    Впервые Оуэн Хоулстон приезжал в Россию в декабре 2019 года и отыграл несколько
    концертов в московских клубах. Второй приезд Оуэна в Россию запланирован на апрель
    2022 года.'
