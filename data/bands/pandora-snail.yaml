  header: Группа Pandora Snail
  text: Группа Pandora Snail образовалась 13 декабря, в 2008 году, как инструментальный
    проект. Главная идея группы состоит в том, чтобы воздействовать на слушателя с
    помощью музыки, вызывая в воображении красочные образы и вполне реальные ассоциации,
    тем самым рождая эмпатию. Группа успешно выступает как на фестивалях мейнстрима,
    так и на различных прогрессивных мероприятиях, занимая лидирующие позиции. Стиль
    группы можно охарактеризовать как инструментальный арт-рок с собственными тенденциями
    в сторону мелодики и музыкальной событийности.
