  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Есть разная музыка: веселая, грустная, громкая, тихая, классическая, современная,
    музыка для детей и даже, говорят, для растений... А есть - просто хорошая музыка.
    Музыка и песни, которые хочется слушать, вне зависимости от их жанровой принадлежности.
    Которые на своем простом языке рассказывают о том, что мир - прекрасен, что есть
    места, куда стремится сердце, что существуют простые ценности и радости. Под эту
    музыку можно танцевать, ей можно подпевать, можно заглянуть в себя и задуматься
    над тем, что созвучно услышанному, а можно просто слушать ее в кругу друзей или
    просто хороших людей, отбивая такт и загадочно улыбаться, будто знаешь все наперед.
    Мы приглашаем вас на вечера такой музыки: блюза, фанка, регги, джаза, рок-н-ролла...
    Все легко, непринужденно, весело и очень по-доброму!


    Приходите сами, приводите друзей, будем рады вас видеть!'
