  text: Виртуоз блюзовой губной гармоники Петар Миладинович, известный как "Pera Joe",
    - звезда европейской блюзовой сцены. Родился в 1961 г. в Крушеваце (Югославия),
    начал играть на губной гармонике в 9 лет, а в 19 стал одним из первопроходцев
    балканского блюза. Играл в многочисленных рок- и блюз-бэндах, а также в R'n'B
    и поп-группах Сербии, за что его иногда называют "Pera Joe – the session man".
    Одним из наиболее стабильных проектов в его музыкальной карьере был дуэт с гитаристом
    Homesick Mac, не без юмора называвшийся "самое маленькое трио в мире". Пера Джо
    выпустил несколько собственных CD альбомов и, кроме того, участвовал в многочисленных
    сессионных записях и джемах, в том числе и с такими легендарными музыкантами,
    как Луизиана Ред, Джон Хэммонд, Микки Уоллер, Шугар Блю, Боб Гелдоф, Анна Попович,
    Джонни Марс, Сэм Митчелл. На протяжении 20 лет участвовал в блюзовых и джазовых
    фестивалях в Германии, Швеции, Дании, Венгрии, Италии, Швейцарии. Его авторитет
    в европейском блюзе настолько высок, что на фестивале губной гармоники в Троссингене
    (Германия) Пера Джо постоянно приглашают участвовать в работе жюри, оценивающего
    конкурсантов. Пера Джо дважды приезжал в Россию, его выступления привлекли большой
    интерес московских ценителей блюза.
