  header: by Kismet Records Co. N.Y.
  text: '"Для биографии не вышли лицом, а лицом не вошли в биографию. Начинающий любительский
    ансамбль, собравшийся случайным образом. Впервые встретились на рубеже тысячелетий
    и просуществовали 6 вечеров. Седьмой вечер не просуществовали - напились. В 2009
    г. были отрезаны от больших земель, разведенными Дворцовым и Тучковым мостами.
    Прождали всю ночь, но все-таки нашли в ближайшем прод.маге. за зданием Биржи!
    Тут-то быстренько и слепился сей ВИА, у которого нет ни постоянного состава, ни
    устаканившегося репертуара. Периодечиски пытаются "концертировать". Круг интересов
    весьма богат: читают книги Дарьи Донцовой, слушают магнитолу в маршрутке, регулярно
    включают теле-канал ТНТ в 23:00. Три дня подряд в разных уголках Питера, им на
    встречу попадался замечательный саксофонист Витольд Архаров, который охарактеризовал
    не-до-деятельнсость ансамбЕля милым словосочетанием-находкой "Фанк на стихи Пушкина",
    поразив всех своей сообразительностью. "


    (Рудольф Фукс, Нью-Йорк 2010) ______________________________________________________________________________


