  header: Петрович бэнд
  text: '(Вологда) Коллектив был создан в августе 1994 года под первоначальным названием
    "Уездные хроники"; в состав входили Виктор Колесов (гитара, вокал), Андрей Козловский
    (гитара, вокал), Андрей Малафеевский (бас, губная гармошка) и Андрей Яблоков (ударные).
    "Нас было четверо",- говорит Виктор Колесов,- "измочаленных советским образом
    жизни музыкантов со всем набором пороков и добродетелей. Пить стало не модно,
    пьяниц перестали жалеть, и мы решили завязать и играть только то, что мы по-настоящему
    любим и что под силу. Оказалось - это блюз во всех его проявлениях". Поменяв название
    на "Петрович Бэнд", коллектив начал выступать на концертных площадках Вологды,
    участвовать в джем-сейшнах с иностранными музыкантами, и уже в 1995 году был проведен
    концертный тур по Голландии совместно с группами Stacy Cats и Rocks. "Сделали
    программу каверов и поехали в Голландию",- рассказывает Колесов,- "Русские почему-то
    все время плакали, иностранцы ценили нашу искренность и переходили на водку. Пытались
    угощать нас, но мы брали подарками. Один из них, американская шляпа с зубами -
    мой талисман до сих пор... Один из нас был хорошим поэтом и по-бардовски царапал
    на гитаре свои песни. Мы их заблюзовали, стали ездить на рок-фестивали и бардовские
    тусовки. Появились продюсеры, спонсоры, фаны. Дело пошло..." С 1995 по 1999 группа
    участвовала в международном фестивале ансамблей авторской песни в Пущино, не раз
    становилась лауреатом этого фестиваля и получила приглашения играть в клубах Москвы
    и других городов России. Композиция "Слепые на автостраде" в 1996 году прозвучала
    на радиостанции BBC в программе Севы Новгородцева. Расширялись одновременно стилистические
    границы и фестивальная география "Петрович Бэнда": в 1996-1997 музыканты становились
    лауреатами российского рок- фестиваля "Rock-Line" (Кунгур Пермской области), а
    их композиции входили в ежегодный сборник фестиваля. В 1997 были проведены концерты
    в Финляндии, записан альбом на студии "Мосфильма", а клип "Мой седьмой", записанный
    для вологодской телекомпании "TV-7", стал победителем на конкурсе региональных
    телерадиокомпаний России. В 1998 вышел первый компакт-диск группы - "Нам хватит";
    в 1999 дискография пополнилась вторым альбомом "Уездная хроника", группа регулярно
    выступала в московских клубах "Бункер", "Точка", "Петрович", "Беседка" и приняла
    участие в фестивале "Культурные герои XXI века" (Вологда, ноябрь 1999). XXI век
    в истории "Петрович Бэнда" - это участие в первом российском фестивале "Blues.ru"
    (Москва, клуб "Точка"), совместные выступления в Вологде и Череповце с Евгением
    Колыхановым (группа "ZeeRok", США). В 2004 году в группу был приглашен гитарист
    Игорь Кошкин, а барабанщика Андрея Яблокова заменил Роман Чепиленко. Коллектив
    подготовил новую программу "Загляни в эту ночь", провел серию концертов, посвященных
    десятилетнему юбилею группы. С коллективом сравнительно регулярно сотрудничают
    Александр Селин (перкуссия), Роман Токарев (саксофон), венгр Тибор Оноди (губная
    гармошка, клавишные, Виктор Латкин (губная гармошка). "Петрович Бэнд" принял участие
    в открытии архангельского блюз-клуба "Колесо" в одном ряду с Яном Аккерманом (Голландия)
    и ведущими джазовыми и блюзовыми музыкантами севера России. Виктор Колесов, считающий
    себя исполнителем блюза и ритм-энд-блюза, тем не менее обладает сегодня более
    чем солидным весом и в джазовой среде Вологды. В течение нескольких лет он продюсирует
    регулярные клубные джазовые концерты в местном Доме Актера, выступает на них с
    разными сравнительно кратковременными проектами, проводит летний открытый фестиваль
    "Блюз на веранде", в котором традиционно принимают участие как блюзовые, так и
    джазовые музыканты из Вологды, Москвы, других городов. Для разовых концертов,
    проходящих в залах калибра Вологодской филармонии, им привлекаются исполнители
    из разных городов - среди них, например, пианист Андрей Руденко и саксофонист
    Сергей Баулин из Казани, контрабасист Андрей Дудченко и барабанщик Адель Сабирянов
    из Москвы, вокалистка Вика Андреева из Череповца.


    Дискография "Петрович Бэнда": "Нам хватит" (1998) 1. Слепые на автостраде. 2.
    Не горюй. 3. Наш дом. 4. Акула. 5. Rock&Roll - моя вершина. 6. Ты ушла. 7. Возьми
    себя в руки. 8. Загляни в эту ночь. 9. Нам хватит. 10. Когда на земле весна. "Уездная
    хроника" (1999) 1. Ты крутой. 2. Ты только делаешь вид. 3. Там далеко. 4. Заклинатель.
    5. Вниз по Золотухе. 6. Полный вперед! 7. Очки. 8. Колыбельная. 9. Петрович-Band-Blues.
    10. Случайный блюз.'
