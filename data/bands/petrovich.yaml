  text: 'Звание "Легенда Российского Рока" ко мне приклеилось давно. Уже в начале
    80-х Михаила Соколова, то-бишь меня, представляли со сцены легендой. А как-же
    это случилось?


    Начнем издалека. Я родился в городе Москве, в 1953 году (год смерти Тирана) на
    Таганке в семье военнослужащих. Когда мне было шесть лет, родители развелись,
    что оставило неизгладимый отпечаток на всю жизнь. Мама, оставшись одна с двумя
    детьми, изо всех сил старалась вложить все самое лучшее в своих детишек. Так в
    шестилетнем возрасте я оказался в музыкальной школе имени "Ипполитова-Иванова"
    по классу скрипки. Скажем прямо, дружба с инструментом не состоялась, и проучившись
    два года с мольбой был переведен в класс фортепиано, но и с этим инструментом
    контакт не состоялся.


    "Какая музыка?" - когда все мальчишки после школы по горло в сугробах или на катке.
    Так временно занятия музыкой прекратились, но не надолго. В 1963 году мама приобрела
    специально для моей старшей сестры магнитофонную приставку "Нота", и в доме зазвучала
    музыка " the Beatles", Чака Берри, "Rolling Stones". "Хочу быть Ринго Старром",
    - сказал я, взял мамины вязальные спицы, положил подушку от дивана, включил Битлз
    и начал выбивать пыль. Так продолжалось довольно долго, пока я, пройдя вступительные
    экзамены, не оказался в той же музыкальной школе, но уже по классу ударных инструментов
    педагога Сергея Ходнева. Пришлось по-новому знакомиться с нотами, заниматься постановкой,
    играть "Турецкий марш" на ксилофоне, но самым главным учителем оставался магнитофон.
    Дружба с ударными затянулась надолго, на целые четверть века ...


    Трудно сейчас точно вспомнить все года и даты, все-таки прошло более тридцати
    пяти лет, а точнее, тридцать семь, но ясно одно, что мне очень повезло. Повезло
    во многом. Во-первых, время, когда я родился, было - время перемен. Разделались
    с культом Сталина и наступила хрущевская оттепель. В Москве появились первые БИТ-группы,
    на выступления которых очень хотелось попасть или, хотя бы, постоять под окошком
    - послушать.


    Я никогда не забуду, как мы с моим школьным другом Валерой Лихониным следили за
    моей сестрой. Ведь я краем уха слышал, что она собирается ехать на "сейшен", где
    будет играть группа "Наследники". Это было на Электрозаводской в Медовом переулке.
    Мы пробирались за ней, стараясь, чтоб она нас не заметила. И вот мы на месте.
    Около здания школы или техникума здоровенная толпа молодежи, у некоторых удлиненные
    волосы, джинсы, очки а-ля Джон Леннон. Там-то я впервые и увидел длинноволосого
    парня, которого звали Юра, по кличке "Солнце" (Блондин) - это был предводитель
    московских хиппи. К ним-то я и Лихон в дальнейшем и примкнули.


    Зрелище потрясающее, все на взводе, а группы нет! Вдруг подъехал автомобиль, из
    которого стали вынимать какие-то ящики, над головами проплыл большой барабан серебристо-оранжевого
    цвета. Это были "Наследники", гордые длинноволосые парни лет 16-17. Нас конечно
    с дружком разбирает любопытство, но пускать во внутрь нас никто не собирается.
    Но и ладно, хоть под окошком послушать, мы еще маленькие, хотя челки на глаза
    уже зачесаны. Ждем... Через некоторое время молодежь начинает выходить обратно.
    Слышим разговор: "Сейшена не будет! Директор, увидев толпу длинноволосых, выступление
    запретил". Это - повсеместная ситуация, с которой я сталкивался будучи членом
    московских групп.


    А что такое длинные волосы? Это когда волосы чуть чуть прикрывают уши, и челка
    до бровей. Да, у Юры "Солнце" волосы в тот вечер были чуть длиннее подбородка,
    сейчас это называется "каре". Он казался жутко лохматым. Через несколько лет в
    группе "Удачное приобретение" у меня волосы будут гораздо ниже плеч. Почему, спросите
    вы, разговор все время идет о волосах? Да потому, что время было такое. Длинные
    волосы были визитной карточкой и символом всего нового, знаком, как сейчас модно
    говорить, продвинутости молодого человека, знаком неповиновения родителям и властям,
    символом свободы.


    В хрущевские времена стали просачиваться весточки с запада - БИТ-музыка, длинные
    волосы, всякие шмотки, которые либо привозили из-за границы знакомые, либо можно
    было купить у московской фарцы (спекулянтов). Теория хиппи прочно начала входить
    в умы молодежи шестидесятых годов. Это было замечательное время. Мы начали понимать,
    что живем в прекрасной стране с дерьмовым строем, и лучшее, что мы могли сделать,
    это своим внешним видом, своим поведением и музыкой, которую мы пытались играть
    (хотя и очень плохо на первых порах), взорвать этот социалистический строй с его
    догмами и запретами на все несоветское.


    Мы жили здорово: бегали на концерты БИТ-групп, ездили на природу хипповать, читали
    запрещенные книжки, репетировали какие-то немыслимые произведения, слушали музыку
    и очень много музыки, и вся она нравилась. Но самое главное это то, что тогда
    очень модным был БЛЮЗ!'
