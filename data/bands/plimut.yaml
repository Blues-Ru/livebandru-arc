  header: Роуд-муви группы "Плимут" стартовал в телеэфире
  text: 'Клип "Привет" московской мейнстрим-рок группы "Плимут" в ближайшее время
    начнет ротироваться на телеканалах О2ТВ и "Первый канал. Всемирная сеть. Музыка
    Первого". Ролик будут показывать три-четыре раза в сутки. "Клип сделан очень качественно,
    по западным образцам – чувствуется рука голливудских профессионалов, - рассказывает
    музыкальный директор канала О2ТВ Лариса Багмат. – Кроме того, это история любви,
    неразделенной, несчастной, но очень красивой – то, что зрителям это всегда нравится!"
    Съемки видео, презентация которого состоялась недавно в клубе China-Town-Cafe,
    проходили в пустыне Palmdale Desert (Калифорния), на побережье Малибу, в Санта-Монике
    и Лос-Анджелесе. В лос-анджелесском отеле, фигурирующем в клипе, также снимались
    фильм Вима Вендерса "Отель "Миллион долларов" и видео на песню "Ground Beneath
    Her Feet" U2 из саундтрека к нему. Клип "Привет" снят в духе американских роуд-муви.
    Официальный сайт группы "Плимут": www.plimut.com Группа "Плимут" "Вконтакте":
    vkontakte.ru/club19700191'
  verified: true
  created: '2010-12-02'
  is_press_release: true
