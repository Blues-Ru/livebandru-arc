  header: Плимутский камень стал талисманом группы "Плимут"
  text: 'Звезды экстремального силового шоу "Русские богатыри" - друзья лидера московской
    группы "Плимут" - привезли ему в подарок из Америки кусок знаменитого Плимутского
    камня. Осколок огромного гранитного валуна, у которого, по легенде, высадились
    первооткрыватели Америки, стал талисманом группы, и теперь музыканты будут брать
    его на все концерты. "Путешествуя по Америке, я узнал о существовании Плимутского
    камня и тут же вспомнил о своем друге Плимуте, - рассказывает "богатырь" Александр
    Муромский. – Я отправился в штат Массачусетс, честно выдержал экскурсию по достопримечательным
    местам, взобрался на камень и отломил от него кусок - в подарок!" Участники супергруппы
    "Плимут" - экс-музыканты Земфиры, Чичериной, группы "Конец Фильма" - считают себя
    "брутальными романтиками", поэтому легенда об открытии Америки представляется
    им "аллегорией собственного творчества". Официальный сайт группы "Плимут": www.plimut.com
    Группа "Плимут" "Вконтакте": www.vkontakte.ru/club19700191'
  verified: true
  created: '2010-12-02'
  is_press_release: true
