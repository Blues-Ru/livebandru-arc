  header: На презентации клипа Плимут найдет двойника модели ведьмы Дженис
  text: '16 ноября в China-Town-Cafe московская группа "Плимут" презентует дебютный
    клип "Привет", главную роль в котором исполнила восходящая звезда американского
    кино, участница популярного реалити-шоу MTV "Модельная школа ведьмы Дженис" Эли
    Джейн. Во время презентации "Плимут" проведет среди зрительниц в зале конкурс
    двойников актрисы, известной также по фильмам "Рождество в Беверли-Хиллз" (2009),
    "Запредельная черта" (2009) и сериалу "Кости". Победительница получит памятный
    приз – эксклюзивный диск с записью клипа, а также приглашение принять участие
    в съемках следующего видео группы. "Эли Джейн – не только профессионал, но и настоящая
    блондинка! - улыбается Плимут, лидер и идейный вдохновитель группы. – Она уже
    известна в США, а теперь, после съемок в нашем видео, станет популярной и в России.
    Но мы уверены, что среди наших российских поклонниц найдется немало эффектных
    блондинок, которые смогут соперничать с Эли. Одну из них мы пригласим сняться
    в нашем втором видео а, затем, быть может, покорить Америку!" Съемки клипа "Привет"
    проходили в США: в пустыне Palmdale Desert (штат Калифорния), на побережье Малибу,
    в Санта-Монике и Лос-Анджелесе. В отеле, фигурирующем в клипе, также снимался
    фильм Вима Вендерса "Отель "Миллион долларов" и видео на песню "Ground Beneath
    Her Feet" U2 из саундтрека к нему, а мотель в калифорнийской пустыне также был
    местом создания видео "Telephone" Lady Gaga и Beyonce. Клип "Привет" снят в духе
    американских роуд-муви. Официальный сайт группы "Плимут": www.plimut.com Группа
    "Плимут" "Вконтакте": vkontakte.ru/club19700191'
