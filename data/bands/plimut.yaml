  header: У Плимута выросли крылья
  text: 'Лидер московской группы "Плимут", состоящей из экс-музыкантов Земфиры, Чичериной,
    Дмитрия Четвергова, группы "Конец Фильма" и других, начал брать уроки пилотирования.
    Первое занятие прошло на аэродроме "Пущино" в Московской области. Плимут прослушал
    краткий теоретический курс и впервые сел за штурвал самолета. "Пилотировать самолет
    - непростое занятие и требует мужества, - заметил инструктор Плимута, военный
    летчик второго класса Павел Дубров. - Среди пилотов вы не встретите слабаков -
    только настоящих мужчин, в чьих сердцах есть место и для подвига, и для поэзии.
    Таким людям понравится музыка группы "Плимут" - в ней есть и драйв, и романтика!"
    Плимут планирует продолжить занятия и со временем освоить еще и технику управления
    вертолетом. Это не первое экстремальное увлечение музыканта, он любит спорт и
    занимается роупджампингом, кайтсерфингом и вейкбордингом. Официальный сайт группы
    "Плимут": www.plimut.com. Группа "Плимут" "Вконтакте": vkontakte.ru/club19700191'
