  header: Группа "Плимут" приглашает на свой концерт девственниц
  text: '14 ноября московская группа "Плимут", исполняющая актуальный мейнстрим-рок,
    выступит в FM-Club. Концерт пройдет в Девичий день - старинный русский праздник,
    который, по мнению музыкантов, незаслуженно забыт в наши дни. Желая поддержать
    традиционные ценности, брутальные романтики из "Плимута" приглашают девственниц
    придти на концерт бесплатно. "В такой день как никогда хочется видеть в зале прекрасные
    девичьи лица, - делится вокалист группы, Плимут. - В старину девушки в этот день
    гадали на женихов. Мы предлагаем им не гадать, а просто окунуться в море рок-романтики!"
    Официальный сайт группы "Плимут": www.plimut.com Группа "Плимут" "Вконтакте":
    www.vkontakte.ru/club19700191'
  verified: false
  created: '2010-12-02'
  is_press_release: true
