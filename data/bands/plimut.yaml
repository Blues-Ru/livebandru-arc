  header: Группа "Плимут" пошла по стопам U2
  text: 'Московская группа "Плимут", исполняющая русскоязычный брит-рок "с калифорнийским
    акцентом" в духе The Killers и U2, завершила работу над дебютным видео "Привет".
    Несколько сцен были сняты в мотеле, где ранее снимали свои клипы Beyonce и Lady
    Gaga. Кроме того, часть действия разворачивается в лос-анджелесcком отеле, где
    происходят события фильма Вима Вендерса "Отель "Миллион долларов" (высшая награда
    Берлинского кинофестиваля 2000 года). Здесь же проходили съемки клипа группы U2,
    записавшей саундтрек к фильму. "Снимать клип там же, где великие U2 - это почти
    как столкнуться с легендой, - поделился постановщик ролика, голливудский режиссер
    латвийского происхождения Микс Озолиньш. - В Даунтауне Лос-Анджелеса просто невозможно
    не проникнуться этим творческим, рок-н-ролльным духом. По-моему, группа "Плимут"
    очень органично передала этот дух и в песне, и в видеоряде". Съемки клипа проходили
    в пустыне Palmdale Desert (Калифорния, США), на побережье Малибу, в Санта-Монике
    и Лос-Анджелесе. Главную роль исполнила восходящая звезда американского кино Эли
    Джейн, известная по фильмам "Рождество в Беверли-Хиллз" (2009), "Запредельная
    черта" (2009), сериалу "Кости", а также телешоу "Модельная школа ведьмы Дженис".
    Релиз клипа намечен на конец октября. Официальный сайт группы "Плимут": www.plimut.com
    Группа "Плимут" "Вконтакте": vkontakte.ru/club19700191'
  verified: false
  created: '2010-12-02'
  is_press_release: true
