  header: '"Плимутизация" Москвы начнется с клубов "Art-Garbage" и "B.B. King"'
  text: '22 октября в клубе "Art-Garbage" и 24 октября в "B.B. King" выступит московская
    группа "Плимут", играющая русскоязычный инди-рок с калифорнийским акцентом в духе
    The Killers и U2. Концерты раскроют понятие "плимутизация" - основную концепцию
    творчества группы. "Плимутизация в нашем понимании – это американское качество,
    британский стиль, плюс российская ментальность, - говорит лидер группы Юрий Плимут.
    – Мы поем по-русски, потому что ориентированы на российскую аудиторию. И уверены,
    что в нашей стране достаточно людей, воспитанных на качественной западной музыке
    – это и есть наши слушатели". "Плимут" - супергруппа, состоящая из экс-музыкантов
    Земфиры, Чичериной, Дмитрия Четвергова, группы "Конец Фильма" и др. На концертах
    прозвучат композиции из дебютного альбома, работа над которым ведется в Лос-Анджелесе
    и московских студиях. Адрес клуба "Art-Garbage": Старосадский пер., 5 Адрес клуба
    "B.B.King": ул.Садовая-Самотечная, 4 Начало концертов: 20.00 Официальный сайт
    группы "Плимут": www.plimut.com Группа "Плимут" "Вконтакте": vkontakte.ru/club19700191'
  verified: true
  created: '2010-12-02'
  is_press_release: true
