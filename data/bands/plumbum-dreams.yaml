  text: 'Сегодня, когда рок-ветераны, создавшие в эпоху бунтарских 60-70-х годов целую
    музыкальную вселенную, постепенно сходят со сцены, интерес к первоначальной, нерафинированной
    рок-музыке нисколько не ослабевает. Выросло целое поколение молодежи, которое
    лишено даже теоретических шансов побывать на живом выступлении рок-легенд. В ответ
    на возрастающий спрос, музыканты по всему миру стали создавать трибьют-группы,
    аутентично исполняющие музыку своих кумиров. Не миновало это движение и России.
    Один из таких коллективов, Plumbum Dreams - Led Zeppelin Tribute Band, несколько
    лет назад появился в Москве. Группа была создана в конце 2004 года по инициативе
    большого поклонника Led Zeppelin, гитариста Алексея Сазонова. Первоначально в
    репертуаре группы присутствовали традиционные рок-хиты конца 60-70-х, с некоторым
    преобладанием "свинцовых", но первые же выступления оказались настолько успешными,
    что группа решила целиком сконцентрироваться на величайшем наследии Led Zeppelin.
    Музыканты группы основное внимание уделяют именно концертной стороне деятельности
    Led Zeppelin, для которой характерны мощный звук, обилие импровизаций и неожиданные
    музыкальные решения.


    "Наша цель – не банальное копирование расхожих хитов Led Zeppelin, а осмысление
    всего творчества гениальной четверки. Мы стараемся играть и переживать эту музыку
    как свою собственную, чтобы дать возможность зрителю погрузиться в свободолюбивую
    атмосферу начала 70-х, когда музыка действительно изменяла мир". Все возрастающее
    количество поклонников группы, среди которых не только заматерелые фанаты Led
    Zeppelin, но и большое количество молодежи, говорит о том, что группа весьма успешно
    решает свои задачи и обладает уверенной перспективой занять достойное место в
    набирающем обороты трибьют-движении.'
