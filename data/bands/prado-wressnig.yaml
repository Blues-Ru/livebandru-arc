  header: Igor Prado & Raphael Wressnig (BR / AT) - Бразильский Босс Гитары и Европейский
    Мастер Органа
  text: 'Бразильская гитарная сенсация, Игорь Прадо стал одним из самых популярных
    и востребованных блюзовых музыкантов на международной сцене. Его альбом "Way Down
    South" представляет его лучшие совместные работы с блюзовыми звездами, такими
    как Kim Wilson, Sugaray Rayford, Mud Morganfield, Mitch Kashmar, Rod и Honey Piazza,
    Junior Watson, Monster Mike Welch и другими! Игорь - великий блюзовый певец и
    разножанровый гитарист, он умеет свинговать, играть фанк и грязную блюзовую гитару.


    Игорь влюбился в гитару, когда ему было 11. Он родился левшой и был самоучкой,
    в результате научился играть традиционные блюзовые приемы на перевернутой гитаре
    с тонкими струнами сверху. Это, во-многом, сделало его гитарный стиль уникальным
    и неповторимым. В 2016 году Игорь был номинирован на Blues Music Award, за последние
    годы сыграл на множестве крупнейших фестивалей по всему миру. В своем последнем
    проекте Игорь работает с прославленными бразильскими музыкантами, сплавляя соул,
    фанк, госпел, хип-хоп и элементы бразильской музыки с блюзовой основной.


    Рафаэль Рессниг - не один из ординарных блюзовых органистов. Молодой мастер внушительного
    инструмента расширяет свою экспертизу в музыкальных стилях. Он свободно говорит
    на языках блюза, джаза, соул и фанка, стряпает из них восхитительную музыку смешанных
    жанров благодаря своей пылкой музыкальной фантазии. Рессниг везет свою музыку
    по миру: по всей Европе, в Россию, на Ближний Восток, в Азию, в Африку, на Каррибы,
    в Северную и Южную Америку. Скромный музыкант родом из Австрии записал более 20
    собственных пластинок и поучаствовал примерно на 50 чужих записях. Он давно привлекает
    внимание международных музыкальных критиков, регулярно номинируется как "Best
    Organ Player of the Year" в опросах критиков и читателей журнала DownBeat.


    Прадо и Рессниг записали альбом "The Soul Connection" в Сан-Паоло, Бразилия в
    2016 году. Они приготовили жаркое из музыки соул, олдскульного р-н-б и фанка.
    Этот самостоятельно записанный, спродюссированный и смикшированный альбом - прекрасный
    результат их музыкальной связи. Но сейчас они поднимают сотрудничество на новый
    уровень. Старая и новая школы встречаются в музыке Прадо и Ресснига. В их звуке
    сочетаются аутентичный блюзовый вайб, чувство глубого блюза с современным острым
    фанком, что оставляет неизгладимое впечатление! Вместе они показывают яркий потенциал
    блюза в современном мире и дают слушателям новый способ восприятия этого старого
    жанра.


    "О, да, B-3 Рафаэля очень динамичен, его страсть соизмерима с его техникой и креативностью.
    Он как высоковольтная динамо-машина, но одновременно - удивительно утонченный
    и осознанный музыкант. Мы можем назвать его одним из лучших блюз/джаз/соул операторов
    B-3 в мире." (Downbeat Magazine)


    "Игорь Прадо - высококлассный гитарист. Неудивительно, что этот бразилец был номинирован
    на Blues Music Award в США" (Rolling Stone Magazine)


    Igor Prado & Raphael Wressnig (Бразилия / Австрия) "Бразильский Босс Гитары и
    Европейский Мастер Органа" Igor Prado (Игорь Прадо) - гитара, вокал Raphael Wressnig
    (Рафаэль Рессниг) - орган Hammond B3, вокал Hans-J&#252;rgen Bart (Ханс-Юрген
    Барт) - ударные'
