reviews:
- id: 453
  reviewer_id: 3
  reviewer_name: Федор Романенко
  reviewer_token: fedor-romanenko
  text: 'Федор Романенко (blues.ru):


    Вот моя личная история. Еще в доютьюбную эпоху я со страстью закопался в дебри
    вест-коаст, свингового и джамп-блюза. Приходилось читать обложки компакт-дисков,
    кого-то я случайно встречал на фестивалях. В 2007-м году на меня свалился .mov
    файл вот с этим:


    https://www.youtube.com/watch?v=q_Ls1VkCKus


    Wow, парень со странным именем Игорь и перевернутой гитарой из Бразилии! Кажется,
    была доступна еще только пара песен. Все наши гитаристы запомнили, что, да, кроме
    калифорнийских классиков есть еще крутейший Igor Prado где-то там южнее. Но информация
    из Бразилии просачивалась очень плохо.


    Тем временем, через моих любимых свингово-блюзовых гитаристов Алекса Шульца и
    Энрико Кривелларо я узнал о существовании хаммонд-органиста Raphael Wressnig.
    Он крутел год от года, и когда начали доходить пластинки, я был поражен качеством
    музыки. Все они как музыканты своевременно поддержали расширение моих пристрастий
    от свинга и uptempo-блюза в сторону чуть более мягкого соул-эстетства и фанковых
    грувов, но с сохранением корней, исходных жестких драйва и звука.


    Мы часто возили своих героев на клубные гастроли (https://blues.ru/club/). В результате
    я познакомился с Рафаэлем, и чуть позже мы купили и притащили из Европы настоящий
    Hammond C3! Это гениальнейший (и тяжелейший) инструмент! Ни одной микросхемы,
    только дерево, железо, провода, лампы, колеса и машинное масло.


    Как оказалось, с Игорем произошли похожие творческие изменения. Он выбрался из
    Бразилии в Америку и Европу, записал к тому моменту много фантастически классной
    и близкой по настроению музыки. Без нашей подсказки сошелся именно с Рафаэлем
    и начал с ним делать общую музыку. И вот результат - лучший современный Хаммонд-органист
    в блюзе и самый крутой и мощный блюзовый гитарист вместе. Ого-го, сам не могу
    поверить, насколько это круто! Год назад у нас был концерт в маленьком Доме у
    Дороги, где я впервые увидел Игоря живьем, клуб они практически зажарили.'
  verified: true
  created: '2016-06-29'
