  header: Igor Prado & Raphael Wressnig - "The Soul Connection", пресс-релиз 2017
  text: 'В июле в Москву заедут супер-герои современного соул-блюза - хаммонд-органист
    Raphael Wressnig (Рафаэль Рессниг) из Австрии и Igor Prado (Игорь Прадо) - гитарист
    из Бразилии вместе со своей группой Igor Prado Band.


    Игоря и Рафаэля многое объединяет. Они оба - исключительные инструменталисты,
    но еще важнее то, что они любят звучание и культуру черного блюза, соул, фанка
    и рнб 50-70-х. Бережно и точно воспроизводят классическое звучание, но при этом
    заряжая умопомрачительной энергетикой и украшая современным смешением музыкальных
    стилей. Мы давно наблюдали за каждым из них, они сделали много собственной музыки,
    но удивительно или, наверное, неудивительно, то, что стали играть вместе. Начали
    с совместных концертов и приглашения друг друга гостями на записи, продолжили
    совместным альбомом <a href="https://www.youtube.com/watch?v=IRRQeeDZGAI">"The
    Soul Connection"</a>, вышедшим полгода назад.


    Концерты в московских клубах - исключительная история и фантастическое везение
    для нас, ибо все лето Игорь и Рафаэль заняты на огромных фестивалях в Европе в
    США, где <a href="https://www.youtube.com/watch?v=rta3gJO4Z28">выступают для десятков
    тысяч человек</a>. На больших концертах очень весело, но они не сравнятся с клубными,
    где воздух заряжен по-полной, а <a href="https://www.youtube.com/watch?v=Xsw_ZZmUMco">чудеса
    творятся у тебя под носом</a>.


    Рафаэль Рессниг - гуру хаммонд-органа, 3 раза за последние годы он номинировался
    журналом Downbeat как лучший органист года. Пока даунбит собирается с духом, мы
    давно поняли, что Рафаэль - лучший современный блюзовый органист. В Москве он
    будет выжимать электричество из настоящего Hammond C-3 1959 года. Если вы не слышали
    хаммонд вживую, вас ждет неизбежное потрясение от органного звука, грува и драйва.


    Рафаэль выступает обычно в формате органного трио, у него есть много джазовых
    записей, но ассоциирует себя больше с соул и фанк-музыкой, с грувами органистов
    Jimmy McGriff, Booker T, The Meters. Последняя сольная пластинка Рафаэля "Soul
    Gumbo" записана в Новом Орлеане с местными классиками фанк-соул и р-н-б музыки.
    Рафаэль - яркий энтертейнер, его концерты сопровождаются трюками типа танцев с
    бубном на органе или его поджиганием, что нас ждет на этот раз, заранее точно
    сказать нельзя.


    Игорь Прадо покажет настоящий грязноватый, жирный ламповый гитарный звук, он играет
    как lown-down-dirty-blues, так и совершенно виртуозный свинг, джамп-блюз, соул
    и фанк. Его пластинка 2015 года "Way Down South" записана в Калифорнии на Delta
    Groove Records с кучей американских звезд современного блюза. Поскольку Бразилия
    ближе к США, в Европе он бывает раз в год летом. До России он впервые доедет со
    своей умопомрачительной группой, с ним будут выступать его брат - Юрий Прадо на
    ударных и угарный басист Родриго Мантовани. Вместе с Рафаэлем Ресснигом - это
    бенд мечты, не пропустите!'
  verified: true
