  header: '"Так поют духи, так говорят ветви, так дует ветер"'
  text: '"Рада & Терновник" играют мощнейший этнический рок – в самом исконном и подлинном
    воплощении. Эта музыка как будто произрастает откуда-то из дремучих лесов и топких
    болот, обнажает нерв народной лирики, звучит жутко, порой заупокойно, пробирает
    до костей, до кончиков. "Так поют духи, так говорят ветви, так дует ветер. Бояться
    не надо – мрака тут не больше, чем настоящего света. Это стоит услышать хотя бы
    для того, чтобы понять, что "русская народная" вовсе не означает "блатная-хороводная".
    И еще много для чего".'
