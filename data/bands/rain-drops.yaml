  text: '"RAIN DROPS" - вокальная группа в составе шести человек: сопрано, два меццо-сопрано,
    альт, тенор (он же баритон и ритм-секция) и бас, исполняющие музыку в акаппельном
    жанре, т.е. без единого музыкального инструмента. Основной репертуар группы -
    композиции российской и зарубежной эстрады, насыщенные элементами джаза: "Любовь
    настала" (Раймонд Паулс), "Туман" (А. Укупник), "Aquarela Do Brazil" (Ary Barroso),
    "The girl from Ipanema" (A.C.Jobim), "Got My Mind Set On You" (George Harrison),
    "This Masquerade" ( George Benson) и т.д. Композиции исполняются под собственный
    вокальный аккомпанемент, имитирующий инструментальную фактуру. Кстати, своим названием
    коллектив обязан произведению Б. Баккара, которое так и называется "Rain Drops"
    - "Капли дождя". Музыка этой песни, переложенная в акаппельном варианте, стала
    визитной карточкой вокальной группы. Репертуар постоянно пополняется новыми композициями,
    в том числе и достаточно экспериментальными, так как представить их в необычной
    обработке трудно. К подобного рода экспериментам можно отнести совместный проект,
    состоявшийся в мае и октябре 2004 года, с питерской группой "Ночные снайперы".
    В июле 2003 года группа принимала участие в 1-ом фестивале творчества молодежи
    "Анапа - Арт", завоевав специальный приз за оригинальность жанра и высокую вокальную
    культуру в номинации "популярная музыка". Вокальная группа "RAIN DROPS" принимала
    участие в концертах Витаса, В. Преснякова - младшего, питерской рок группы "Ночные
    снайперы, С. Пенкина, Ф. Киркорова и др. В 2004 - 2005 гг. участники коллектива
    приняли участие в мюзикле "We Will Rock You" по музыкальному материалу группы
    "Queen". В августе-сентябре 2006 года, группа принимала участие (в качестве бэк-вокала)
    в записи, на студии "Status Music, музыкального материла для мюзикла "Mamma Mia".'
