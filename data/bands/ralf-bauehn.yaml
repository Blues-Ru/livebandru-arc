  text: Ральф Бауэн начинал карьеру в составе штатной группы лейбла Blue Note Records,
    был участником квинтета величайшего джазового пианиста Хораса Сильвера, играл
    и записывался в студии с пианистом Мишелем Камило, альт-саксофонистами Кенни Гарреттом
    и Бенни Картером, как лидер выпустил 8 альбомов. "Бауэн - потрясающий музыкант
    с внушительными техническими, равно как и лирическими навыками. Он импровизирует
    с гармонической смышленностью и ритмической прочностью, свидетельствующей о добротном
    теноре пост-колтрейновской и пост-брекеровской эпохи. Однако, в отличие от многих
    своих коллег, он совсем не тривиален. Так что если назвать его "пост-кем угодно",
    это умалит его достоинства", - справедливо подмечает журнал Jazz Times.
