- id: 108
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  header: Как известно, мы народ горячий!
  text: 'Группа "Red Guns" - это разбойники и негодяи, романтики и оптимисты, коварная
    мафия и свободные цыгане. Описать их сложно. Не влюбиться - невозможно! В своих
    песнях они смешивают оттенки самых разных музыкальных стилей. Это и брасс-рок,
    и джаз, и ска-панк, латино, ритм-н-блюз, фанк, регги, хип-хоп...короче говоря,
    лучше один раз услышать! Каждый концерт группы - это всегда яркий и красочный
    коктейль из собственных песен и каверов отечественных и западных коллективов,
    выполненных в неподражаемой манере "Красных стволов".


    Превращая музыку в мощный заряд позитивной энергии, они делают каждое свое выступление
    настоящим праздником, в котором участвует абсолютно каждый, кто пришел на концерт.


    За семилетнюю историю своего существования группа RED GUNS зарекомендовала себя
    как серьезный музыкальный коллектив. Песни RED GUNS неоднократно звучали в эфире
    "НАШЕГО РАДИО", "Нашего радио. Карелия" (г.Петрозаводск), Радио "Культура", Радио
    "России", Радио "Пилот" (г.Тверь), "Дорожное Радио" (г.Ярославль). В 2007 году
    песня "Чикаго" заняла первое место на музыкальном фестивале "Усадьба Джаз" в категории
    "БЛЮЗ". В ноябре 2009 г. группа RED GUNS победила в конкурсе саундтреков к мультфильму
    "ПЛАНЕТА 51", организованным компанией "ПАРАДИЗ" с композицией "НОВЫЕ МИРЫ" Песня
    была записана на студии группы "УМАТУРМАН", а компания "ПАРАДИЗ" сняла на эту
    песню видеоклип. В мае 2010 года в магазинах России и стран СНГ поступил в продажу
    DVD мультфильма "ПЛАНЕТА 51", вышедшего тиражем 100000 экземпляров, куда бонус-треком
    вошел клип группы RED GUNS - "Новые Миры". Red Guns стали настоящим открытием
    на "14 Международном Байк-Шоу" в г. Севастополе в 2010 году.В этом же году они
    выступили на главной сцене фестиваля "Уральский рубеж" в г.Миасс Челябинской области.


    За все это время "Красные стволы" заслужили внимание и похвалу не только любителей
    качественной музыки, но и получили безоговорочное одобрение ведущих музыкальных
    критиков.


    В настоящий момент неутомимые "Красные стволы" записывают новые синглы, снимают
    клипы, участвуют в музыкальных конкурсах, транслируются по радио и ТВ. Неповторимое
    звучание, темпераментное исполнение и выразительная подача делает группу "Red
    Guns" уникальным явлением на российской музыкальной сцене.


    Состав группы:


    Дима Эльред - вокал


    Петр Заздравных - Гитара


    Костей Кандыба - бас


    Меняшкин Кирк - ударные


    Евгений Алимов - труба


    Сергей Моисеев - сакс-тенор


    Андрей Богданов - перкуссия'
