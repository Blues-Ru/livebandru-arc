  header: преcc рилиз
  text: 'RICHIE''S BLUES BAND-это мощное блюз-роковое трио. RBB проповедуют стиль,
    и исполняют номера основоположников этого направления: Jimi Hendrix Exp.,Cream,Steppenfolf,Johnny
    Winter,Allman Brothers,Eric Clapton,The Rolling Stones, Creedence Clearwater Revival,
    Chuck Berry,Muddy Waters,Fleetwood Mac,The Black Crowes и др. RICHIE''S BLUES
    BAND единственное блюз-роковая команда,где каждый из музыкантов вокально исполняет
    свои, отдельные номера. Подбор легендарных песен,убойной аккомпанемент и море
    драйва-вот основа этой команды.В арсенале трио лучшие хиты золотой эпохи рока,конца
    60,начала 70-х годов,но с более современной подачей! На концертах RBB сейсмические
    волны распространяются со скоростью звука,давление которого разрушает шкалу Рихтера
    и оставляет слушателя один на один со стихией!'
