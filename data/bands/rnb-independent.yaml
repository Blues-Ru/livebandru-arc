reviews:
- id: 356
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: Ритм 'н' блюзовый коллектив ориентирован на "черный" саунд Америки 60-70 годов.
    В репертуар группы помимо своих композиций входят кавер-версии на музыку таких
    исполнителей как T-Bone Walker, Johnny"Guitar"Watson, Bobby Womack,а так же на
    материал легендарного Мемфисского лейбла STAX. Rhythm & Blues Independent намеренно
    старается обойти клише заштампованного электроблюза, представив слушателям уникальный
    материал фанка, блюза и соул музыки.
  verified: true
  created: '2013-03-31'
  is_press_release: true
