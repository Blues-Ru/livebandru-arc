  header: Интервью фронтмена THE ROAD DOGS  Сергея Склярова  журналу  " Большой",
    автор - Вячеслав Корсак
  text: '1 На­чиная со вто­рого клас­са, мой стар­ший брат стал зом­би­ровать ме­ня
    му­зыкой. Это бы­ли Que­en, Led Zep­pe­lin, Pink Flo­yd, Na­zareth. По­том бы­ла
    ус­пешно бро­шена му­зыкаль­ная шко­ла. По од­ной при­чине - там та­кую му­зыку
    не иг­ра­ли. Но му­зыка из мо­ей жиз­ни ни­куда не ухо­дила.


    2 Я не счи­таю, что в му­зыке все ска­зано. Ес­ли бы это бы­ло так, то сот­ни
    ты­сяч лю­дей не бра­лись ежед­невно за инс­тру­мен­ты и не пы­тались соз­да­вать.
    Воз­можно, в му­зыке соз­да­но мно­го, но ког­да ее иг­ра­ет че­ловек из Ки­тая,
    Юж­ной Аме­рики, Аф­ри­ки или Анг­лии, он все рав­но де­ла­ет это по-сво­ему.
    Ког­да в прош­лом го­ду ез­дил на кон­церт San­ta­na в Ки­ев, я знал те ве­щи,
    ко­торые он де­лал. Но он их де­лал так, как это мог сде­лать лишь San­ta­na.
    3 Му­зыка - это сво­бода. Все дос­та­точ­но прос­то. Это то, что не при­ем­лет
    гра­ниц, что по­нят­но без пе­рево­да. Это то ощу­щение, ко­торое поз­во­ля­ет
    лег­че и спо­кой­нее про­ходить че­рез неп­ри­ят­ности. Как ни кру­ти, "пес­ня
    стро­ить и жить по­мога­ет". Лю­бая му­зыка не при­ем­лет фаль­ши. По­это­му мы
    и иг­ра­ем толь­ко вжи­вую. Иг­рать вжи­вую не­иск­рен­не - очень тя­жело. 4 Это
    счастье, ког­да твои цен­ности сов­па­да­ют с ин­те­реса­ми масс. Ве­ликие му­зыкан­ты
    от­то­го и ве­ликие, что они сде­лали лю­бимую му­зыку нас­толь­ко по­пуляр­ной,
    что она ста­ла им при­носить день­ги. Од­нажды в бе­зум­ном бре­ду мы уже об­сужда­ли,
    что бы­ло бы ди­ко здо­рово за­нимать­ся толь­ко му­зыкой. Но этим в на­шей стра­не
    не­воз­можно за­раба­тывать день­ги. По край­ней ме­ре, той му­зыкой, ко­торую
    иг­ра­ем мы. 5 Блюз для Бе­лару­си - это вещь в се­бе. Она вне трен­дов. На на­ши
    кон­церты при­ходят лю­ди за 45 и мо­лодежь, ко­торая толь­ко отк­ры­ва­ет блюз
    для се­бя. На­вер­ное, это лю­ди, ко­торые от­ли­ча­ют­ся ка­ким-то внут­ренним
    стерж­нем. Пос­ле кон­цертов с ни­ми что-то про­ис­хо­дит - они рас­хо­дят­ся
    аб­со­лют­но уми­рот­во­рен­ны­ми. Я уве­рен, что ког­да му­зыкант иг­ра­ет от
    ду­ши, зри­тели это улав­ли­ва­ют. Где-то под по­тол­ком стал­ки­ва­ют­ся му­зыка
    и эмо­ции, за­гора­ет­ся иск­ра. 6 Я бы ни­ког­да не ста­вил крест: од­на му­зыка
    нуж­на, а дру­гая - ус­та­рела. Все цик­лично. Ра­но или позд­но че­ловек при­ходит
    к кор­ням, да­же ес­ли он, как я, слу­шал в 8 клас­се Me­tal­li­ca и Sla­yer.
    Мне очень нра­вят­ся J.J. Ca­le, John Ma­yall и, как ни стран­но, Kid rock. Это
    те лю­ди, с ко­торы­ми я бы хо­тел пос­то­ять на од­ной сце­не и, мо­жет быть,
    взять па­ру нот. Не го­ворю про B.B. King''а, по­тому что про бо­гов не го­ворят.
    7 Есть рас­хо­жая вер­сия, что блюз - это ког­да хо­роше­му че­лове­ку пло­хо.
    На мой взгляд, на каж­дом эта­пе че­лове­ку со­путс­тву­ет свой блюз. Блюз - это
    то, как ты се­бя чувс­тву­ешь в нас­то­ящий мо­мент. Это что-то очень ми­молет­ное
    и ус­коль­за­ющее. И ес­ли му­зыкант в си­лах это уло­вить, зри­тель чувс­тву­ет.
    Ес­ли нет - лю­ди не хо­дят на его кон­церты.'
  verified: true
  created: '2012-04-14'
  is_press_release: true
