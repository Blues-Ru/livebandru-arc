  header: The Road Dogs.
  text: 'Участник международных фестивалей Suwalki Blues Festival 2012 ( Польша) http://www.suwalkiblues.com/,
    Minsk Blues 2008 и Minsk Blues 2009 минская группа "The Road Dogs", играющая в
    стиле Magic Old Style Blues Rock, была основана в сентябре 2007 года Вадимом Галиуллиным
    (гитара, вокал) и Сергеем Скляровым (гитара, вокал). К этому моменту Вадим Галиуллин
    уже имел за плечами опыт успешного выступления в составе группы "OLGA & K" в программе
    первого фестиваля "Блюз живет в Минске" в 1996 году и в фестивале "40 лет минскому
    року и блюзу" в 2008 году. Кроме того, Вадим принимал неоднократное участие в
    джемах с такими известными в блюзовых кругах Москвы группами как "Черный хлеб"
    и Доктор Аграновский", "Старая Гвардия" в клубе "B.B.King" (Москва).


    Сергей Скляров, до момента создания группы был известен в кругу своих друзей и
    знакомых как автор и исполнитель собственных песен, имеющих плотную и ярко выраженную
    ритм-энд-блюзовую основу. Сергей исполнял свои песни в небольших клубах городов
    Сент-Этьенна и Ле Пюи (Юг Франции), а также во время многочисленных "квартирных"
    концертов у друзей в Варшаве (Польша). В 2002 году Сергей выступил как продюсер
    записи одного из первых альбомов еще неизвестной в то время группы "Svet & Al
    Boogie Band". В 2008 году к группе присоединяются еще два участника: молодой и
    талантливый барабанщик - Максим Марченко и не менее талантливый бас- гитарист
    Николай Волынец. В настоящий момент группа исполняет песни на английском, польском
    и русском языках, как свой собственный авторский материал, так и кавер-версии.
    Готовится к выходу первый концертный альбом, начата работа над студийным альбомом.'
