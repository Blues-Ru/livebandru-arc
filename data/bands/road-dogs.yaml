reviews:
- id: 358
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  header: 'The Road Dogs: Если музыка становится работой, то это беда! http://euroradio.fm/ru/report/road-dogs-kogda-muzyka-stanovitsya-rabotoi-eto-beda-114617'
  text: 'The Road Dogs: Если музыка становится работой, то это беда!


    В преддверии выхода дебютного альбома музыканты группы рассказали о блюзе в Беларуси,
    своем отношении к каверам и блюзовых фестивалях в Польше.


    Группе уже около пяти лет, их хорошо знают и уважают в белорусском блюзовой тусовке,
    но при этом они не звучат на радио, не появляются на телевидении и до сих пор
    даже не выпускали песен. На беседу в студию Еврорадио пришли гитарист и вокалист
    The Road Dogs Сергей Скляров, гитарист и бэк-вокалист Вадим Галлиулин и барабанщик
    Максим Марченко.


    Еврорадио: Так почему у вас до сих пор нет записей, стадионов поклонников?


    Сергей Скляров: Для начала, привет!)


    Вадим Галлиулин: А теперь отвечаем!


    Сергей Скляров: Мы никогда не гнались за дешевым массовым пиаром, никогда не выступали
    голыми... Мы просто собрались, чтобы играть ту музыку, которая у нас живет очень
    давно. И жаль, что мы не собрались раньше.


    Вадим Галлиулин: Ну, и последний год мы как раз заняты тем, что пишем альбом.
    Почти все вещи уже записаны, осталось сведение, мастеринг, то есть сейчас идет
    финальная стадия. Мы надеемся, что осенью все же порадуем наших поклонников диском.
    Сделаем презентацию, короче, как у людей все будет!)


    Сергей Скляров: Я добавлю о том, почему не записывались. Наверное, первый год
    мы играли ради кайфа, искали свой стиль ... Это громкие слова, но ...


    Вадим Галлиулин: Мы же записывались, Серега! Это была пробная запись. Мы делали
    ее дома у нашего друга, он все отмастерил и свел. Мы забросили треки на радиостанции,
    и они там нормально крутились. С той разницей, что мы не получали с них никаких
    авторских и не говорили, что это The Road Dogs. То есть мы забросили пробный камень,
    чтобы посмотреть, что получится. Удалось, и мы подумали более серьезно к этому
    вопросу подойти и записаться в полном объеме.


    Сергей Скляров: Кстати, тогда на блюзовые форумы России попала наша песня Kiedy
    Bylem Malym Chlopcem на польском языке и там пошла такая тема: "Ребята, посмотрите,
    как классно хохлы поют на польском языке!". Тут уж нам пришлось влезть: "Может,
    хохлы и классно поют по-польски, но мы из Беларуси!)" А потом ... получилось как-то
    так, что нам всегда нравились живые выступления. И мы, наверное, бессознательно
    поставили перед собой цель, достичь определенного качества и количества живых
    выступлений. Пойти тем путем, если народу это нравится, если он приходит на концерты,
    то записывать. И началось, и мы заболели перфекционизмом, страдаем до сих пор,
    не спим ночами ...


    Еврорадио: То есть материала у вас хватало, чтобы записаться?


    Сергей Скляров: Проблема песен в белорусской блюзовой музыке всегда существует.
    Мы с ней боремся тем, что у нас есть запас песен за плечами. Но скоро этот запас
    закончится и придется писать новые.


    Вадим Галлиулин: Я уточню, что проблема не в музыке, а в текстах. Очень сложно
    найти хорошие тексты, и это проблема.


    Еврорадио: А кто у вас автор?


    Сергей Скляров: В основном, тексты мои, а музыка - Вадима!


    Это не будет альбом концептуально выдержанный в определенных рамках.


    Еврорадио: Вы уже несколько раз упоминали о новый альбом. Что будет на диске,
    стилистика, на ваш взгляд?


    Сергей Скляров: То, что мы играем, для меня - сплав южного рока, блюза и фанка.
    То, что играют на свадьбах на границе Техаса и Мексики. У нас нет желания, принимать
    то, что блюз это печально, это всегда "Я проснулся утром, от меня кто-то ушел
    ..." Поэтому мы воспринимаем музыку по-своему. На диске будут свои песни, но мы
    никуда не можем деться от того, чтобы не отдать должное тем людям и песням, на
    которых мы выросли. Это не будут широко известные стандарты. Где-то это будет
    госпел, где-то еще что-нибудь. Будет наш ХИТ ... наши друзья блюзмены говорят:
    "Ребята, это хит!", О песне "Я не умею плавать"


    Вадим Галлиулин: Плавать! (Смеются) это рабочее название, а на самом деле, "Я
    не умею плакать". Это не будет альбом концептуально выдержанный в определенных
    рамках. Там будет разная музыка. И будет сюрприз на белорусском языке.


    Еврорадио: Как раз хотел спросить! Вы поете на русском, польском, английском языках,
    но нет белорусского ...


    Вадим Галлиулин: Мы с Сергеем не владеем белорусским языком настолько, чтобы писать
    на нем по объективным причинам. Мы были освобождены от его изучения еще в школе.
    Мы понаехали!) Поэтому часть текстов мы перевели. У нас есть хорошая знакомая
    Даша, привет Витебску. Она прекрасная молодая поэтесса, ее уже печатали в наших
    белорусскоязычных изданиях


    Сергей Скляров: "Вожык" J


    Вадим Галлиулин: Она перевела часть наших текстов, плюс - мы взяли стихи Янки
    Купалы из школьной программы.


    Если мы перестанем играть каверы, то мы перестанем играть блюз


    Еврорадио: Если вы запишете альбом, перестанете играть каверы?


    Сергей Скляров: Сложный вопрос!


    Вадим Галлиулин: Очень хочется!


    Максим Марченко: Нет!


    Сергей Скляров: Макс не перестанет, так как он их играет постоянно, у него все
    песни похожи (смеются). Тут два варианта: если мы не играем каверы, то мы не играем
    блюз. Это, знаете, как говорят? Если ты учился в Шаолине, то кунг-фу тебе избежать!
    Народно-китайская поговорка. Естественно, мы будем делать упор на свои песни.
    Но возьмите любого блюзового исполнителя - все равно, у него будут одна-две песни
    чужие.


    Вадим Галлиулин: Но это не в нашем понимании каверов. Блюз это ... Это как джазмены
    говорят: Если вы запишите альбом, то вы перестанете играть стандарты? И он испугается,
    мол, а что же тогда играть? Все же, это не рок-музыка. Если бы мы были рок-музыканты
    новых традиций: "это не призвание, это позиция", то тогда - да. А тут мы от стандартов
    никогда не избавимся, так как, во-первых, их знают по всему миру. А во-вторых,
    когда ты выезжаешь за границу, то на белорусскоязычный блюз обращают внимание,
    но реакция совсем другая, чем когда ты играешь песню, которую знают во всем мире.


    Сергей Скляров: Трудно отказаться от всемирного наследия!


    Еврорадио: А у нас же такое отношение, что если каверы, то лабух, если свои песни,
    то музыкант настоящий ...


    Сергей Скляров: Никто нас не называл кавершиками, хотя и было предложение, о котором
    я никому и не говорил, поучаствовать в конкурсе кавер-бэндов.


    Вадим Галлиулин: А! Нет, ну, нет! Мы не пойдем! Мы не кавер-бэнд!


    Максим Марченко: Я, например, не вижу никакой проблемы в том, чтобы играть и свое,
    и каверы. Все известные музыканты играют каверы и не стесняются этого. Это же
    пропускается через собственное видение, и у каждого коллектива получается что-то
    свое, новое. Если ты этого сумел достичь, то все узнают, что это известное произведение
    ... а еще интереснее - не узнают! И говорят: О! Как круто, какой у них свежий
    взгляд! Это нормально!


    Вадим Галлиулин: Просто в нашей стране это приняло какую-то перекрученную форму.


    Сергей Скляров: У нас народ спрашивает: А почему вас так прет? Ведь мы хотим играть,
    потому что мы не играем в ресторанах. Не исполняем "Земля в иллюминаторе" по шесть
    раз в день. Мы играем то, что мы хотим. Поэтому люди, когда приходят, они ловят
    этот драйв! Есть такая очень сложная вещь: когда музыка становится работой, и
    ты играешь не то, что хочешь, то это беда! Не хочу никого обидеть, потому что
    всех страшно уважаю! Но я такое проходил в музыкальной школе, когда меня заставляли
    играть классику, а я увлекался тяжелым роком. Я бросил эту проклятую скрипку и
    ушел.


    Еврорадио: На тему, когда Мик Джаггер сказал, что он никогда в жизни не работал,
    он занимался только хобби, но это хобби принесло ему столько денег, что хватит
    на безбедное существование даже внукам его внуков!


    Я не хочу сказать, что мы такие же как "Роллинги", но в чем-то сходство есть


    Еврорадио: Слышал, что вы планируете выпустить сразу еще и концертный альбом.


    Сергей Скляров: Он находится в большей степени подготовленности, чем студийный.
    Это то, что мы можем легко сделать. Нужно просто поставить пульт и записать любой
    наш клубный концерт. Потом просто обработать немного - и все. Но нам все говорят,
    критики с experty.by говорят: "Когда вы уже дадите свой диск, мы его покритикуем?"
    Не дадим, мы уже боимся!)


    Еврорадио: То есть это не DVD, а CD с концертным звучанием?


    Сергей Скляров: Скорее всего, да! Но если у нас получится, если мы найдем технические
    возможности, то с удовольствием и DVD сделаем. Почему даже на CD согласны? Потому
    что... вот ты вспомнил "Роллингов". Концертные записи "Роллингов" в разы лучше,
    чем студийки. Я не хочу сказать, что мы такие же, как Роллинги, но у нас тоже
    такое дело. Просто люди ловят все, что идет от сцены, они начинают раскрепощаться,
    а это еще больше заводит нас. Именно поэтому концертные записи и видео - это лучше,
    чем клип, но клип нам нужен ...


    Еврорадио: Ну-ну! Продолжайте!


    Сергей Скляров: Клип нам нужен, так как те же наши заморские друзья постоянно
    спрашивают, есть ли у нас видео. Поэтому мы сейчас ищем режиссера.


    Вадим Галлиулин: У нас был один хороший парень, но он сейчас работает в Питере.


    Сергей Скляров: Мы сталкиваемся с тем, что очень много наших знакомых талантливых
    белорусов по непонятным нам причинам начинают уезжать из этой страны. Кто-то едет
    на Восток, кто-то на Запад, но мы пока никуда не едем. Поэтому нам нужно найти
    людей и заставить работать с нами.


    Вадим Галлиулин: Так что, если благодаря Еврорадио такие люди появятся, мы будем
    очень рады.


    В Минске блюз находится в состоянии ... Короче, какой спрос, такое и предложение.


    Еврорадио: Хотелось бы с вами поговорить вообще о блюзе в Беларуси. Как у нас
    с блюзом?


    Вадим Галлиулин: Здесь можно разные параметры рассматривать. Например, количество
    групп на душу населения. Мне кажется, что блюз существует только в Минске. Я не
    знаю блюзовых групп из областных центров. Слышал одним ухом, что якобы есть какая-то
    гомельская команда, а больше ничего и не слышал.


    Сергей Скляров: В Минске блюз находится в состоянии ... Короче, какой спрос, такое
    и предложение. Но мы не в тренде. Можно сказать, что в Беларуси есть два направления
    блюза: белорусскоязычный блюз-рок, который когда-то возглавляли и возглавляют
    до сих пор наши друзья "Крама", Игорь Ворошкевич и компания. Но на этом поле я
    кроме "старых зубров" никого не вижу. Есть Madera Hard Blues, играющие русскоязычный
    блюз. Они тоже по-своему уникальны. Им тоже огромный респект, столько лет гнуть
    свою линию, несмотря ни на что ..! Ну а мы еще не определились (смеются). У нас
    нет желания, присоединяться к какому-то из лагерей. Нам и так все нравится. Например,
    мы исполняем с согласия музыкантов "Крама" " Гэй там, налівай!". Причем, мы играли
    ее вместе с Игорем Ворошкевичем - супер. Нам очень нравится эта песня. Это, как
    кто-то берет и поет Hoochie Coochie Man, а мы взяли " Гэй там налівай!", потому
    что, на наш взгляд, " Гэй там налівай!" Это белорусский Hoochie Coochie Man.


    Вадим Галлиулин: "Крама" - вообще больная тема. Больно говорить о группе, которой
    столько лет и ... Мы удивлены, почему музыканты не соберутся и не сделают, например,
    трибьют "Крамы". Столько замечательных песен. И если у группы существуют проблемы
    с выступлениями, так хоть так ...


    Сергей Скляров: Это было бы интересно! Кстати, я очень критически отношусь к тем,
    кто берет шашку и отсекает, что блюз в Беларуси должен быть только на белорусском
    языке, или только на английском! Или это блюз, а это уже не блюз ... Мне вообще
    противно, когда говорят, что нужно играть так, как кто-то когда-то написал, и
    ни Йоты! В таком случае, изначально, блюз вообще акустический! Если бы Мадди Уотэрс
    не взял в руки Fender Telecaster и не начал играть блюз на электрике, то, думаю,
    ничего не получилось бы. Думаю, его гнобили, за электрогитару, но ...


    Вадим Галлиулин: Помнишь как в фильме "Кадиллак Рекордз"? Когда он стоял на улице
    и играл, а к нему подходят и говорят: "Что ты играешь? Тебя же никто не слышит!
    Возьми ты электрогитару! "И он действительно взял, чтобы хоть как-то перебить
    шум города, машин и т.д.


    Сергей Скляров: Мы считаем, что Беларусь - действительно уникальная страна. Был
    на днях у тещи в западной Беларуси в небольшом городе Ивье. Там поставили памятник
    четырем религиям, которые есть в этом городе. Он четырехсторонний: евреи, католики,
    православные и татары. В принципе, это срез Беларуси.


    Вадим Галлиулин: Это практически наша группа (смеются)!


    Для нас фестиваль в Сувалках - мастер-классы. Мастер-классы по всему.


    Еврорадио: Недавно вы вернулись с блюзового фестиваля в Польше, в месте с интересным
    названием Сувалки. Знаю, что много впечатлений от этой поездки, поэтому предлагаю
    поделиться ими с нами.


    Вадим Галлиулин: Фестиваль там проходит уже в пятый раз, и нам приятно сказать,
    что мы стали первым белорусской группой, которая там выступила.


    Сергей Скляров: Сам фестиваль уникален! Город размером с Барановичи, в который
    на три дня съезжается все блюзовое сообщество Польша, часть немцев, французов,
    норвежцев ... Там такой нормальный Вавилон. Две большие площадки на открытом воздухе,
    три небольшие площадки. В этом году хедлайнером был мало кому известный мужчина
    Гленн Хъюз, какая-то непонятная группа The Yardbirds, остальные участники фестиваля
    тоже мало кому известны (смеются). Мы попали в такую тусовку, с которой не хотелось
    уезжать. Много с кем познакомились, Гленна Хьюза трогали руками (смеются).


    Вадим Галлиулин: Это очень интересно! Город три дня живет блюзом. Блюз начинается
    с утра. С 11-и по клубам идут бесплатные блюзовые завтраки. Вечером в клубах концерт
    стоит денег, а открытые площадки - бесплатные.


    Сергей Скляров: Самая большая площадка и наибольшее количество людей, около 15
    тысяч человек, была, безусловно, на Гленне Хьюзе. Интересно что сцена у них стояла
    на главной улице. Представьте, возле цирка на проспекте будет стоять сцена, а
    на дороге, которая вверх пошла, стоит народ.


    Вадим Галлиулин: Думаю, в Минске пока такое невозможно. В этом году... в следующем
    тоже, а вот дальше посмотрим.


    Сергей Скляров: Мы были хедлайнерами первого дня, так как тяжелая артиллерия подтягивалась
    на другой день. Там очень интересно, там народ ходит из клуба в клуб. Один концерт
    закончился, все побежали в другое место. Но начнем с того, кто был в зале. Большинство
    - от 30 и выше, но эти люди просто отрывались! Они себя вели менее скромно, чем
    наша молодежь.


    Еврорадио: Но получается, что звезды блюза ваше выступление не услышали?


    Сергей Скляров: Не услышали, но началось так называемое сарафанное радио. Те,
    кто был на нашем концерте, записывали нас на телефоны, звонили друзьям ... и потом
    все дни к нам подходили незнакомые люди и говорили: "Ребята, как жаль, что я на
    вас вчера не попал, если будете в Варшаве - приезжайте! "И т.д. Потом начались
    приглашения в разные города: Краков, Ольштын ... Спрашивали про записи ...


    Вадим Галлиулин: Мы, наверное, единственная группа, которая не раздавала свои
    диски. Еще хотелось бы добавить про отношения между музыкантами. Музыканты там
    ходят из бара в бар на концерты друг друга, вылезают на сцену поджемовать. Любой
    музыкант может поджемовать с любым. Можно к любому подойти, поговорить об инструментах,
    о технике игры ... абсолютная открытость, нет того, что бывает в нашей стране,
    когда на тебя некоторые музыканты поглядывают немного свысока.


    Максим Марченко: Ситуация была, когда мы стояли и заворожено смотрели на Гленна
    Хьюза, внезапно в двух метрах от нас я заметил не последнего в блюзе человека,
    гитариста Бадди Вицингтон. Абсолютно спокойно стоит рядом, смотрит концерт. Мы
    с ним поговорили, выразили благодарность за его шоу. А что касается организации,
    то в Беларуси, мне кажется, не всех звезд первой величины так принимают, как нас
    там. Мы ехали впервые на этот фестиваль, ничего о нем не знали, ни как жить будем,
    ни где будем жить ...


    Вадим Галлиулин: Я последний раз талоны на питание получал в школе (смеются).


    Сергей Скляров: А я впервые почувствовал себя важным артистом, так как со своим
    бэджем я проходил везде. Журналистам 5-10 минут, время вышло, и их буквально выбрасывали
    из-за кулис, культурно, аккуратно, но .. А мы - куда угодно, Гленн Хьюз за сценой,
    идем, охрана: "Вы артисты? Проходите!" Реально, этот фестиваль - мастер-класс.
    Мастер-класс по всему. Во-первых, мы выступили и перезнакомились со всеми, кем
    только возможно. Теперь с ними переписываемся. Но самое главное, мы посмотрели,
    как это все должно работать. Нельзя сказать, что у нас фестивалей не было, но
    блюзовых фестивалей на открытых площадках - точно. А если загоняем блюз в закрытое
    помещение, то это все! Сразу начинаются мягкие сидения, гардеробы, ограниченность
    по движению.


    Вадим Галлиулин: Я помню первый минский блюзовый фестиваль, который проводил Геннадий
    Стариков в кинотеатре "Москва". Там стояла охрана ...


    Сергей Скляров: Мало кто знает, что Вадим играл на первом блюз-фестивале в Минске
    и после этого они больше не проводятся (смеются.)


    Вадим Галлиулин: И не такие дела заваливали!) Вот. И когда люди пытались на эмоциях
    встать и потанцевать, охрана их хватала и выводила. Это было абсолютно не понятно.


    Еврорадио: И все же, предложения на концерты за границей вы получили после фестиваля
    в Сувалках?


    Сергей Скляров: У нас сейчас проблема, которая существует у всех белорусских музыкантов
    - виза. Если этот вопрос мы решим и график минских концертов не будет совпадать
    с теми концертами, то мы будем рады. То есть, предложения есть, но пока о них
    говорить мы не хотим, чтобы не сглазить.


    Еврорадио: Тогда, в завершение скажите, когда все же ожидать альбомы и когда искать
    вас на концертах!


    Сергей Скляров: Я наберусь наглости и скажу, что студийный альбом мы должны выпустить
    до Хэллоуина. То есть дедлайн - 31 октября. Нужно издать диск, дать его послушать,
    чтобы люди нашли на нем что-то свое. Если не найдут, то придется ждать следующего
    альбома. Вот мы выпустим диск, и снова придем к вам в гости, чтобы рассказать
    ...


    Вадим Галлиулин:... почему альбом не удался (смеются)


    Сергей Скляров: Ну, а по концертам: блюз-роковый угар начнется первого и пятнадцатого
    сентября в "Граффити". Еще будет очень эксклюзивный концерт, на который я советую
    вам попасть, 15 августа в Re: Public.


    Вадим Галлиулин: Геннадий Стариков устраивает какую-то очередную годовщину фестиваля
    Woodstock.


    Сергей Скляров: Мало кто знает, что Геннадий Стариков когда-то играл на первом
    фестивале Woodstock, и теперь он больше... (смеются)'
