  text: 'По воскресеньям в "Доме у Дороги" проходит не просто лучший, а единственный
    стоящий блюзовый джем в Москве! Это звуковой коктейль, который на ваших глаза
    (больше даже, на ушах, конечно) готовят мастера своего дела, смешивая в нужных
    пропорциях стили и исполнителей, взбалтывая, добавляя перчинку, кислинку, накрывая
    шапкой взбитых сливок, повышая градус, зажигая... но без эксцессов! Это самый
    представительный, самый удивительный и самый настоящий блюз-соул-фанк-роковый
    джем столицы! Это музыкальный вихрь, стилевой ураган, чехарда известных виртуозов
    и новые свежие лица - это настоящий, в нужной степени безбашенный праздник.


    Немного теории (тут можно пропустить и переходить сразу к следующей части, которая
    начинается с рассуждений про свальный грех).


    Удачный джем есть правильная дезорганизация отлично организованного действа. Это
    если с философской точки зрения, поскольку накопления энтропии во вселенной еще
    никто не отменял. А вот с уголовно-процессуальной, это заранее запланированное
    разномастное сборище, именуемое в последствии сплоченное бандой, связанной круговой
    порукой. Здесь своих не выдают, но проштрафившихся наказывают сами. Однако, если
    кто-то заявит, что музыканты просто собираются вместе, чтобы поиграть в свое удовольствие,
    то и он будет прав. Надо только уточнить, кто эти "собравшиеся":


    <li>члены разных коллективов и сугубые индивидуалисты; <li>дюже опытные, начинающие
    и еще все те, кто на пути от вторых к первым; <li>закаленные, коим сам черт не
    брат, и пугающиеся публики, как деревенский жеребенок гудка трактора "Коммунар";
    <li>адепты традиционного вдумчивого блюза, или фанкеры, готовые колбаситься часами,
    отключив всякую мозговую деятельность в угоду основного инстинкта; <li>и еще кого
    только черт принесет...


    И каждый считает своим долгом козырнуть самому и утереть нос товарищу.


    <b>И вот неудачный джем - это свальный грех: унылый и бессмысленный. А удачный
    - благородное ристалище. И результат кажется непредсказуемым: как уж повезет!
    Но в "ДуДе" гарантировано везет всегда.</b>


    Долгая практика джемов в "Доме у Дороги" привела неконтролируемый творческий процесс
    к гарантированно удачным результатам. Чтобы джем был удачный, нужно, чтобы вели
    его настоящие джентльмены удачи. Каковыми и являются Мишурис со товарищи.


    Михаил Мишурис считает, что мы не должны ждать милостей от московской блюзовой
    натуры. Взять их у нее - мишурисова задача. И он с ней справляется. Mishouris
    Blues Band - коллектив заслуженный и надежный. Это такой фундамент, который не
    треснет под натиском, послужит опорой колеблющимся и выстоит в любом бардаке.
    И даже вырулит его к действительно осмысленному и увлекательному действу. Команда
    постоянно на сцене, играя то полным составом, то с гостями, то классику жанра,
    в которой трудно спотыкнутся, то эксперименты, в которых, кажется, невозможно
    не оступиться. И тем не менее, до сих пор обходились без непоправимого ущерба,
    хотя, порой казалось, все - это край. Но все обходится без жертв - не очкуйте,
    с вами опытные инструкторы!


    C 6 вечера и до полного изнеможения слушателей'
