  header: Очарованные блюзом...
  text: '28 февраля и 1 марта в архангельских клубах "Джаз-мастерская" и "Колесо"
    состоялись концерты американского музыканта шведского происхождения Роберта Лайтхауса
    (Robert Lighthouse, гитара, губная гармошка, вокал).


    Публика знала, "на кого" шла: Роберт приехал в Архангельске уже в третий раз.
    С его выходом на сцену – в музее художественного освоения Арктики им. А.Борисова,
    где базируется "Джаз-мастерская" Тима Дорофеева – аплодисменты в зале, не терпящие
    долгих представлений музыканта, но призывающие к музыке! В мае минувшего 2010
    года он участвовал в фестивале "Блюз в Архангельске", играл на этой же площадке.


    Первое отделение – сольное. Звучание, моментально создающее атмосферу бесконечности
    дороги, делало этого парня с гитарой и харпом твоим добрым знакомым. Невероятно
    проникновенное исполнение зачаровывало. Колоритный дуэт гармоники и гитары невольно
    вызывал в мозгу картинки "американского" происхождения: "дыхание" ли природы Дикого
    Запада, кадры ли шумных вестернов или страницы романов Фенимора Купера – у каждого
    собственные ассоциации. Было в этой "узнаваемости" нечто волнующее сердце. Песни
    Роберта по доверительности ничуть не уступили старым добрым блюзам. Четыре из
    тех, что прозвучали, уже записаны на диск "Democracy Blvd", а две – новые. "Сибирский
    экспресс" появился на свет в поезде, по дороге из Новосибирска в Омск. А "Огородный
    сезон" (название – в грубом переводе) навеян пребыванием в деревеньке вблизи Новосибирска,
    когда неторопливый швед копал там огород под чутким руководством своего продюсера.
    Вот тебе и дельта блюз! Так и выясняется, что во все времена и в американской,
    и в российско-сибирской глубинке ничто человеческое "человекам" не чуждо.


    В телефонном разговоре с Николаем Клишиным (бас) обнаружила подтверждение моих
    впечатлений. Он неожиданно вспомнил "дела давно минувших дней": "Мы однажды ездили
    с Резицким (руководитель джаз-группы "Архангельск") в Англию. Знаешь, как англичане
    играют такую музыку?! Это высший пилотаж! И когда вчера немножко поиграли с Робертом,
    я понял, в чем изюминка. Это отличное знание стиля. Это как народная музыка. Вот
    русский может на балалайке так сыграть, как американец – никогда. Осталось чувство,
    что ты столкнулся с первопричиной, первоисточником. Это человек, у которого можно
    учиться. Подаче звука, энергетике, внутреннему состоянию. Я на него смотрю, например,
    он улыбается, значит – доволен. Значит, у меня что-то "идет". Где-то нахмурился,
    значит, что-то не так, начинаешь в себе что-то корректировать, взаимодействовать
    с барабанами. Музыканты такого уровня они же отлично чувствуют "подкладку" ритмическую.
    Общаясь с ним в музыкальном понимании, можешь от него что-то почерпнуть. Таких
    людей мало. Недаром музыканты едут в Нью-Йорк играть джаз, чтобы, общаясь с такими
    людьми, набираться опыта, мелочей каких-то таких профессиональных".


    Значит, снова нам повезло: мастер-класс и "иллюстрации" раннего звучания блюза,
    как говорится, "от первого лица". Впрочем, и наши джазмены снова порадовали. Вторые
    "сэты" в обоих клубах – коллективные. В "Джаз-мастерской" Лайтхаус играет с "New
    Blues Band" в составе: Тим Дорофеев (гитара), Николай Клишин (бас), Валерий Журавлев
    (барабаны). И здесь на "бис" все выдают превосходные соло. А в "Колесе" – выступление
    Роберта совместно с Николаем Клишиным и барабанщиком Олегом Юдановым. После чего
    американец проговаривается, что пора уже внести имена архангельских музыкантов
    в его пресс-релиз.


    В ноябре 2008 года концерт Роберта Лайтхауса состоялся в клубе "Колесо". Первым
    в Архангельске его принимал продюсер Александр Мезенцев. Он думает, "что это один
    из немногих случаев для российской сцены, когда наш слушатель может получить идеальный
    слепок культуры блюза, поскольку в одном лице здесь – певец, гитарист и блюзовый
    гармонист. Все вместе это соответствует тому, кого называют "блюзовый музыкант".
    Это музыканты улиц, больших городов. Они – не "филармонисты", не делают того,
    что называется "большая сцена", но это музыка, которая близка практически всем.
    Многие просто не знают про это, но когда услышат, абсолютно точно "садятся" на
    эту музыку практически навсегда. Очень, очень здорово! Там много души, и это очень
    близко русскому человеку. Потому что сначала русский человек – это душа, а потом
    уже – рок, блюз, джаз... Душа нужна, без нее – никуда..."


    На нынешних концертах Роберт говорит несколько фраз по-русски, а в разговоре с
    ним и продюсером Евгением Колбашевым выясняются любопытные детали. Оказывается,
    что легендарный музыкант обожает сына (о нем – одна из песен), а еще любит природу,
    рыбалку и чтение. Среди предпочтений – русская литература. Самый(!) любимый писатель
    – Федор Достоевский. В первом туре по России он возил с собой "Идиота", и сейчас
    знает почти все его сочинения: "Это лучший писатель, которого я читал когда-либо".
    В Петербурге побывал в его музее.


    Роберт – открытый к общению человек. Считает, что в жизни есть к чему стремиться:
    "создать что-то такое, что сделал Достоевский. Вот есть "Братья Карамазовы" –
    нечто великое. Я пока не дошел до такого уровня..."


    По словам продюсера – Евгения Колбашева, "с 2008 года в России состоялись примерно
    60 концертов Роберта Лайтхауса. Обсуждая концерты, пришли к выводу, что из всех
    самые лучшие – тот, что прошел в Москве 25 февраля 2011г. и здесь в Архангельске
    – в "Джаз-мастерской", 28 февраля. По всем параметрам – как играли музыканты,
    как все звучало, по публике, по состоянию души – эти два концерта самые лучшие".
    И Роберт подтвердил, "да, это все так". "Роберт переиграл с массой людей, – рассказывает
    Евгений, – и не всегда получалось так, как хотелось. Потому что блюз играть не
    так просто на самом деле. Даже джазовые музыканты некоторые не могут. Есть в Новосибирске
    музыканты, которые его устраивают полностью, в Москве. Теперь он услышал архангельских
    музыкантов – Тим Дорофеев и весь его ансамбль – и это было круто! Я считаю, что
    этот северный состав – совершенный для Роберта, с ними можно ездить куда угодно".
    Олегу Юданову понравилось в работе с Робертом то, что на репетиции он разъяснял
    свои требования не техническими терминами, а образами: "Ведь вся музыка – джазовая,
    блюз – это музыка ощущений, тонкостей. Да, есть основное что-то. Но есть неуловимые
    мимолетные ощущения, которые "всю погоду" и делают". В этом музыканты и "совпали".'
