  text: 'Robert Lighthouse – это американский блюзмен, творчество которого престижный
    журнал "Blues Review" охарактеризовал как "совершенное мастерство".


    На сегодняшний день Lighthouse является одним из самых ярких представителей дельта
    блюза* на североатлантическом побережье океана.


    На уникальный стиль музыканта оказали сильное влияние Muddy Waters, Dr. Ross,
    Elmore James, John Lee Hooker и Jimmy Hendrix.


    В начале своей творческой карьеры Robert много путешествовал по стране. Играл
    и познавал основы мастерства в блюзовых мекках Америки – Чикаго и Новом Орлеане.
    Выступал в барах и клубах, играл на улицах. Приехав в Вашингтон Lighthouse попал
    в группу легендарного гармошечника Charlie Sayles. В составе группы музыкант поехал
    на свои первые гастроли по США и Европе, а уже через год Robert Lighthouse начал
    давать сольные концерты.


    Его первая группа называлась "The Crawling Kingsnake". В ней играли такие опытные
    профессионалы-блюзмены, как Clark Mathews и John Perry. Через некоторое время
    Lighthouse попал в поле зрения лидера музыкальной индустрии Вашингтона Wayne Kahn,
    который помог записать первый альбом музыканта "Drive – Thru Love".


    Последний альбом Роберта ("Democracy BLVD") вышел в 2009 году, и так же как "Deep
    Down In The Mud" 2007-го года получил очень хорошие рецензии от самых влиятельных
    зарубежных музыкальных критиков.


    Robert Lighthouse постоянный участник престижных блюзовых фестивалей в Скандинавии
    и США. За свою долгую творческую жизнь успел поработать со многими выдающимися
    блюзовами музыкантами, среди них такие звезды, как Robert Cray, Taj Mahal, Mick
    Fleetfood, David Lindley, John Hammond, музыканты Muddy Waters и Howlin Wolf.


    Robert Lighthouse успешно выступает в Америке и Европе. Впервые выступил в России
    в 2008 году, после чего, уже в июне 2009 году, вернулся в тур по стране и отыграл
    в семи городах от Орла до Томска.


    Отзывы прессы и критиков:<br/> "... играет дельта блюз как самые большие мастера
    ..." – "HOHNER HARMONICA Co"<br/> "... удивительно талантливый блюзмен ..." –
    "Blues Rhythm Magazine"<br/> "... совершенное мастерство ..." – " Blues Review"<br/>'
