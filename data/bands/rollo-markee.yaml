reviews:
- id: 388
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Уроженец, воспитанник и патриот английского Лестера, а ныне житель Лондона
    РОЛЛО МАРКИ - певец, сонграйтер, харпист, резидент главных блюзовых клубов Лондона
    и завсегдатай блюзовых фестивалей приезжает в Россию уже в четвертый раз. В первый
    раз Ролло приезжал в Москву с аншлаговыми концертами а марте 2014. Второй приезд
    Ролло состоялся в конце ноября 2014 - несколько концертов, джем с коллегами по
    цеху, московскими харпистами, фестивальное выступление на "Свинг-Бум!" и эфир
    в студии радиостанции МАЯК http://radiomayak.ru/guests/guest/id/224180/ - Ролло
    уже неплохо знают в столице.


    Ролло вырос в музыкальной семье и всегда тяготел к "аутентичному" звучанию гармоники.
    Его первые уроки игры на гармошке пришлись на школьные годы, и скоро стало очевидно,
    что ученик превосходит своих учителей. Самое больше влияние на него оказал Julius
    Jr., дружбе с которым он посвятил одну из своих композиций.


    Перемещаясь между Британией и Штатами, исколесив со старыми чернокожими блюзменами
    все Восточное побережье, Средний Запад, объездив Дельту Миссиссиппи и Калифорнию,
    Ролло, уже зрелым мастером вернулся в Британию и осел в Лондоне. Номинант на British
    Blues Awards "Best Blues Harpist", автор нескольких сольных альбомов.


    Третий визит Ролло в апреле 2016 - это кочующий мини-фестиваль британского блюза,
    double-headline концерты совместно с Gwyn Ashton. Их тур началсся в Риге и Резекне,
    Латвия, затем были аншлаговые концерты в клубах Ст.Перербурга и Москвы.


    В четвертый раз Ролло Марки приедет в Россию в середине мая 2022 года. Не пропустите!


    MUST SEE!!!'
