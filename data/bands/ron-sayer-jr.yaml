  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Уроженец и житель провинциального английского Нориджа РОН СЭЙЕР-младший -
    потрясающий певец, гитарист, сонграйтер, лидер собственной блюз- роковой команды,
    востребованный саунд-продюсер и сессионный музыкант, бывший басист, ментор и автор
    песенного материала Оли Брауна.


    Рон Сэйер начал играть на гитаре в семь лет, а в десять уже гастролировал по Британии.
    Его музыка - органичный сплав блюза, фанка и рока. Список абсолютных звезд блюза,
    с которыми Рон переиграл за прошедшие годы весьма внушителен, желающие могут посмотреть
    на его веб-сайте. Имея в "коллекции" звание "Best Blues Guitarist" и еще пару
    номинаций на него от British Blues Awards, Рон мог бы, что называется, "почивать
    на лаврах", но он не таков. Рон продолжает не только развиваться и совершенствовать
    мастерство, записываться со "звездами" блюза и джаза, продюсировать и записывать
    собственные альбомы, но и находит время для того, чтобы учить премудростям блюза
    талантливую молодежь. Четыре последних альбома - "Hard To Please", дуэтный с выдающейся
    певицей и пианисткой Шарлоттой Джойс, сольный "Better side", концертник "Live
    at the Little Theatre" и студиный "Sayer & Joyce - Makes You Stronger" занимали
    высокие строчки в блюзовых чартах.


    Впервые Рон Сэйер приезжал в Россию в мае 2014 года, он тогда поставил своеобразный
    рекорд, отыграв шесть аншлаговых концертов за четыре дня, включая незабываемое
    фестивальное выступление на фестивале "Архангельск-БЛЮЗ''2014" Второй приезд Рона
    Сэйера в Россию состоялся в феврале 2015. А уже летом следующего, 2016 года он
    выступал одним из хэдлайнеров Блюз-байк фестиваля Total Flame в Суздале, причем
    вместе со своей женой Шарлоттой Джойс.


    Чертвертый тур Рона был целиком посвящен Москве. С 1 по 5 ноября 2017 Рон сыграл
    четыре концерта, последний концерт был записан как полноформатное профессиональное
    концертное видео + был записан акустический сет для магазина "Мир Музыки"


    Очередной, пятый тур прошел в конце июня 2019 года, на концертах прозвучали лучшие
    авторские композиции и классика блюза и блюз-рока.


    Долгожданный шестой российский тур Рона Сэйера пройдет в мае, а более масштабный
    седьмой тур пройдет в конце сентября-начале октября 2022 года, и в его рамках
    произойдет презентация релиза "Ron Sayer & Friends, Live in Moscow" в формате
    DVD/2CD.


    Не пропустите!'
