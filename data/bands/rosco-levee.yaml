  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Мульти-номинант на British Blues Awards, обласканный критиками и обожаемый
    публикой и колегами-музыкантами гитарист и певц Rosco Levee - лидер Rosco Levee
    Band, Rosco Levee & The Southern Slide и проекта Walrus (совместно с Mike Ross
    и др.) последние 4 года сотрудничает с британской гитаристкой, певицей и автором
    песен Rosalie Cunningham, в прошлом фронтвуман рог-роковой группы Purson.


    Яркий фронтмен-харизматик, Rosco смело замешивает в фирменный крепкий коктейль
    блюз-рок 70-х в духе Роллингов и Цеппелинов, психоделию и соул 60-х, и в этом
    огненном напитке и свингующий Лондон, и корневой Миссиссиппи, и приправлено это
    все хорошей долей Южного саунда. Не раз в обзорах журналистов, пишущих о блюзе,
    Rosco Levee выдерживал сравнения с великими гитаристами прошлго и настоящего -
    в диапазоне от Эрика Клэптона до Пола Коссоффа, а его альбом 2013 года "Get It
    While You Can" получил в обзоре журнала Classic ROCK 9/10! Авторитетный журнал
    The BLUES, "младший брат" Classic ROCK, поставил альбом ''Rosco Levee and The
    Southern Slide'' на 1 место среди блюзовых альбомов Top 50 Albums 2013.


    Сам Роско Леви, его группа и его альбомы получили несколько номинаций на British
    Blues Awards в категориях Best Band, Best Album, Best male vocalist, Best Guitarist.


    Впервые Rosco Levee гастролировал в России в октябре 2017 года и отыграл три аншлаговых
    концерта в Москве. Второй раз он приезжал с концертами в июне 2018. Ровно через
    год, в начале июня 2019 он приезжал в третий раз с серией аншлаговых концертов.


    С весны 2019 года Роско сосредоточился а творческом сотрудничестве со своей избранницей
    Розали Каннингем. резаултатом их партнерства стали два сольных альбома Rosalie
    Cunningham 2019 и 2022 года. Летом 2022 года Роско приедет вновь, на этот раз
    с новой программой.


    Не пропустите триумфальное возвращение Роско в Россию!'
