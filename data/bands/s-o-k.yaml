  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Группа С.О.К.- звезда современного Rock & Reggae. Отец-основатель МакСОК
    прославился на всю Россию своими хитами: "Маршрутка", "Девочка" , "Love", "Одиночество"
    ... Официальной датой рождения "Съешь Оба Куска" принято считать 6 февраля 2000
    года, когда группа дала свой первый большой концерт в городе Санкт-Петербурге
    на фестивале "Петроградский рок", победителем которого стала и получила приз и
    грамоту победителя. Тематическая глобальность у группы присутствовала с самого
    первого альбома. "Мы поем не о ганджа, мы поем о любви!" - торжественно заявил
    МакСОК на одном из первых альбомов, хотя, и о том, и о главном немало сказано
    в песнях группы С.О.К. В целом, концерты группы можно охарактеризовать как праздники
    солнца, любви и коллективного сознания, а так же хоровое пение зала и скопление
    позитивного народа. Иначе говоря, все гениальное - просто.'
