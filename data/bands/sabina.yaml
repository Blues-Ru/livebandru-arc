  header: Cабина Вартанова
  text: Красивая, стильная , искренняя певица, композитор, Сабина Вартанова. Выступает
    со своим музыкальным коллективом. Сабина Вартанова - это талант,естественность,
    чувство стиля, целеустремленность. Музыка Сабины, впитавшая в себя творчество
    Стиви Уандера, Аструд Жилберто, Майкла Фрэнкса, Джорджа Бенсона, Эл Джеро - это
    сочетание таких направлений, как lounge, jazz, soul, r&b, funk и pop создает богатую
    основу для авторской музыки певицы. Ее музыка и проникновенная манера исполнения
    восхищает самых искушенных слушателей! Песни ее звучат на РАДИО ДЖАЗ.
