  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Название "Salt Peanutz" (Соленые Орешки) взято из бессмертного джазового
    стандарта, Великого трубача и композитора 20-го века, основателя стиля "bebop"
    Dizzy Gillespie (John Birks Gillespie). Много лет назад родилась идея создания
    группы со смешным названием "Salt Peanutz", играющей "разные" музыки. Наконец-то
    это случилось!… Началось все летом 2006 года. В проекте приняли участие: бас-гитарист
    Леонид Веденеев, барабанщик Павел Жданов и гитарист Евгений Немов, смененный позже
    Константином Затолочным. Тогда программа почти целиком состояла из инструменталов,
    но весной 2007-го к проекту присоединились музыканты из "Alis Band" – Андрей и
    Ольга Лис, а так же очень талантливый клавишник Бобсон, который уехал, не дождавшись
    нашего первого концерта, а жаль… С тех пор началась "совсем другая песня"… В "Salt
    Peanutz" играют прекрасные музыканты с тонким чувством стиля, мы нашли свое лицо
    и звучание, в этом легко убедиться, посетив наш концерт. В настоящее время предлагаем
    вашему вниманию проект "SALT PEANUTZ" -In Da Funk-, реальный Фанк с настоящим
    современным Нью-Йоркским грувом, с элементами Джаза, Ритм-н-Блюза и World Music.
    Репертуар постепенно обновляется и пополняется собственными композициями, так
    что, до встреч на наших концертах! Искренне ваш Илюха [m''Poongi] Алехин.'
