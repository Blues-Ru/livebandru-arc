  text: 'Александр Братецкий и Евгений Санчилло - профессионалы с впечатляющим послужным
    списком. "Разбуди меня в полночь..."(1987-1994), The Blues Rhythm Section (1995-2000),
    Built For Comfort (1998-2002), The Reputation (2002-2007) и еще целый ряд самых
    разных музыкальных групп, которые создали эти музыканты...


    Россия, Белоруссия, Финляндия, Германия, Италия, Франция, Сербия уже видели их
    выступления вживую. Записи и музыкальные методики этого тандема стали бестселлерами
    в России и известны далеко за ее пределами.


    Их исполнительский и творческий потенциал теперь сконцентрирован в мощном музыкальном
    проекте "Секретная лаборатория". исполняющим эклектик-рок. В нем приняли участие
    виртуозные музыканты - Игорь Сапрыкин (гитара) и Якуб Охтов (барабаны).


    Концерты "Секретной лаборатории" насыщены яркими, необычными импровизациями и
    оставляют светлое, жизнерадостное впечатление у слушателя. Каждое выступление
    является уникальным событием и не похоже на предыдущие.


    ***** Александр Братецкий - исполнитель на губной гармонике № 1 на территории
    всего бывшего СССР и это уже признанный факт не только в России, но и на Западе,
    чему есть бесчисленные свидетельства самых искушенных гуру этого инструмента.


    Начав свой головокружительный взлет в составе легендарной Blues Rhythm Section
    в период блюзового бума середины 90х, Александр стал форвардом и одним из основных
    популяризаторов харп движения в России и странах СНГ.


    На сегодняшний момент он активно записывает CD и DVD со своими уроками и мастер-классами,
    не говоря уже о интереснейших студийных и концертных работах в совместном проекте
    с Евгением Санчилло - Секретная лаборатория, The Reputation и еще целого ряда
    замечательных коллективов и исполнителей.


    Также он ведет преподавательскую деятельность ( по индивидуальной программе для
    каждого обучаемого и в группах ). Александр Братецкий тесно сотрудничает с компанией
    Динатон и образовательной организацией Learnmusic и сетью музыкальных магазинов
    Муздеталь.


    ***** Евгений Санчилло начал свою сценическую деятельность в 1986 году и успел
    создать множество музыкальных проектов и записей достойных отдельного внимания.


    Его почерк стал основой того фирменного звучания, которым славились все коллективы
    под маркой Санчилло. Евгений обладает уникальной манерой исполнения на безладой
    бас-гитаре и контрабасе. Постоянный поиск новых решений , музыкальных форм, творческий
    эксперимент и уважительное отношение к классике музыкальных жанров - вот основы
    идеологии, проповедуемой в проектах Евгения Санчилло.


    Группы с участием Евгения Санчилло - Одинокая Компания, Разбуди меня в полночь,
    Blues Rhythm Section, The Next, The Reputation, проекты дизайн-бюро Lieu Commun
    и многие другие творческие коллективы.


    На данный момент Евгений Санчилло активно выступает и записывает музыкальные альбомы
    в проекте Секретная лаборатория с одним из самых известных российских профессиональных
    исполнителей на губной гармонике - Александром Братецким.'
