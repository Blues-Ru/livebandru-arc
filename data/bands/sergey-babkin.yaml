  header: Сергей Бабкин и K.P.S.S. презентуют альбом  "Свинец"
  text: '12 февраля в клубе "Зал Ожидания" - Сергей Бабкин и K.P.S.S. с презентацией
    альбома "Свинец".


    K.P.S.S.- новый проект, программа и группа Сергея Бабкина. Еще одна ветвь на древе,
    носящем название "Творчество", на котором уже шелестят листвой Театр 19, где Сергей
    работает актером с самого основания, коллектив CLASSIKA (альбомы "СЫН" и "Мотор"),
    бэнд "Взблатнулось", квартет "Аминь.ru" и другие.


    K.P.S.S. не имеет ничего общего с Коммунистической Партией Советского Союза (КПСС).
    Название группы - это первые буквы имен участников: Константин Шепеленко (ударные),
    Петр Целуйко (бас), Станислав Кононов (гитара), Сергей Бабкин (гитара, вокал).


    Музыка K.P.S.S.- отражение тех направлений, которые вдохновляют, прежде всего,
    самих участников группы. Сергею интересно попробовать подобную музыку на себе,
    пропустить через себя, сделать своей и, конечно, вашей!


    Альбом записан на студии "ДОБРОЛЕТ".


    12 февраля - Сергей Бабкин и K.P.S.S. с презентацией альбома "Свинец", клуб "Зал
    Ожидания".


    Начало концерта: 20:00.


    "Зал Ожидания": наб. Обводного канала, 118 (ТЦ "Варшавский экспресс").


    Справки и заказ билетов: клуб "Зал Ожидания": (812) 333 10 68, www.clubzal.com
    , а также во всех театральных кассах города и на kassir.ru, muzbilet.ru, biletsofit.ru,
    bileter.ru.'
