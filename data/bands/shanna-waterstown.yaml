  text: 'Shanna Waterstown росла на Юге, исполняя госпел в баптисткой церкви.


    В годы ее детства самой популярной музыкой был мотаун-соул, госпел и кантри. Уже
    в 11 лет Shanna собрала свою первую группу из соседских ребят и записывала песни
    на магнитофон у себя дома.


    Неудивительно, что Shanna Waterstown стала певицей и объехала с гастролями весь
    мир, выступая в США, Франции, Германии, Швейцарии, Италии, Австрии и многих других
    странах. Она открывала концерты таких легендарных музыкантов, как James Brown,
    Buddy Guy, Maceo Parker, Matt Bianco, Louisiana Red и Mud Morganfield.


    В 2008 году вышел ее первый альбом InsideMyBlues, объединяющий традиции блюза
    и госпела.


    Состав группы поддержки:


    Вадим Иващенко - гитара Юрий Горелов - бас-гитара Николай Добкин - Хаммонд-орган
    Владимир Воеводин - ударные инструменты'
