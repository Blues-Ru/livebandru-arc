  text: Группа Shoo образована в 2010 году и представляет собой результат совместной
    работы молодой певицы Shoo и закаленной фьюжн команды Vision Of Sound (участники
    легендарного "Арсенала" Дмитрий Илугдин (клавиши), Евгений Шариков (бас), барабанщик
    Петр Ившин, перкуссионист Вартан Бабаян и другие). Участники группы Shoo, за короткое
    время выработавшие свой собственный музыкальный почерк, определяют стиль музыки,
    как "абсолютный соул". Музыка, стирающая границы между странами и их культурами,
    объединяет традиции всего мира в единую сферу абсолютной красоты. Важнейшую роль
    в творчестве группы играет визуализация музыки. Таким образом, красоту можно ощутить
    в себе, не только услышав ее звуковое проявление, но и увидев ее на экране.
