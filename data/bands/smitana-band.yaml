reviews:
- id: 39
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'группа "SMITANABAND" исполняет собственные funk/blues/neo-soul вещи, не обходя
    вниманием jazz&blues каноны (aretha franklin, ella fitzgerald, duke ellington,
    telonius monk), а также композиции икон фанка (chaka khan, roy ayers, anita backer),
    создавая для них стильные авторские аранжировки.


    сегодня у группы 2 программы – лаунжевая, мягкая, которая служит прекрасным фоном
    для беседы, и самодостаточные, яркие сеты в стиле jazz&funk, на которые трудно
    не обратить внимание, и очень хочется танцевать. обе программы преимущественно
    на английском языке с редкими вкраплениями русского.


    в 70-х песню "dr. feelgood" пела королева соула и r''n''b – aretha franklin. cпустя
    40 лет группа "SMITANABAND" сделала почти невозможное. вновь подняв песню на отчаянную
    высоту по исполнению и аранжировке, они заставляют публику на своих концертах
    буквально неистовствовать под "д-р все-хорошо".'
  verified: false
  created: '2010-10-01'
  is_press_release: true
- id: 38
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'наташа "смитана" | лидер и основательница группы. главная девушка российского
    фанка, но в этом проекте поет кроме него jazz, blues и neo-soul, и тогда случается
    удивительное. звучат непререкаемые джазовые каноны – ella fitzgerald, duke ellington,
    aretha franklin, telonius monk – но в весьма смелых интерпретациях, где соул стремительно
    переходит в фанк, а в ритм''н''блюз вдруг врывается хип-хоп. это смешение стилей
    легко управляется вокалом смитаны и поддерживается ее пластичностью. на сцене
    смитана с 16 лет, начинала с рэпа и рагга-мафина, став в конце 90-х одной из первых
    девочек-mc в России, прозвучав на радиостанции 106. 8 fm вместе с группой "da
    budz". солистка и автор песен фанк-проекта "C.L.O.N.E."


    александр "урфин" | еще один лидер и основатель группы "smitanaband". ритм и мозг
    группы. до этого создал группы "positive vibrators", "люди собрались" (где пела
    и смитана), "clean tone", является основателем фанк-группы "C.L.O.N.E." и вообще
    продвигал "фанк" как музыкальное направление, когда в россии о нем еще никто не
    знал. играл в проектах "ДаБац" и со многими исполнителями "рэггей" – филиппом
    никаноровым из "карибасов", с герой моралесом, мс звонким и пр., в группе "МАО"
    дюши фанки, с американским саксофонистомс майком эллисом в группе "afromama".
    последние пару лет работал с музыкантами джорджа клинтона, в результате чего вышел
    сингл "regenerator" с участием их покойного вокалиста garry shider и клавишником
    danny bedrosian. они записали вместе 5 треков, 4 из которых вышли в 2010 на его
    альбоме "monsterpeace".'
  verified: false
