reviews:
- id: 111
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  header: BIO
  text: 'группа СОБО покоряет сердца российских слушателей вот уже больше 10ти лет,
    регулярно приезжая с концертами после того, как впервые выступили в Петербурге
    в 2002 году на Международном Фолк Фестивале BLUES Дельты Невы.


    Творчество СОБО по достоинству оценили не только зрители, но и корифеи российской
    рок сцены: Борис Гребенщиков, Алексадер Ляпин, Сергей Воронов, Алексей Романов,
    ведь СОБО, с неизменным успехом гастролируя по всей России: Москва, Петербург,
    Новосибирск, Барнаул, Томск, Красноярск, Екатеринбург, Тюмень, Архангельск, Воронеж,
    Липецк, Нижний Новгород, Брянск, Сургут уже стали известны своим мощным энергетическим
    сплавом блюза, рока, и уникальным звуком слайд-гитары.


    SOBO (СОБО) - ЭТО ИНТЕРНАЦИОНАЛЬНАЯ РУССКО-АМЕРИКАНСКАЯ ГРУППА, СОЧЕТАЮЩАЯ АМЕРИКАНСКОЕ,
    РУССКОЕ И ВОСТОЧНОЕ ВЛИЯНИЯ.


    SOBO известны в Израиле своим мощным и энергетическим сплавом блюза, рока и фанка,
    которые дополняются уникальным звуком слайд-гитары. SOBO - выдающаяся, первая
    в Иерусалиме группа, играющая в стиле блюз-рок. SOBO исполняет свои собственные
    песни, которые обязательно имеют блюзовый привкус, а также кавер-версии известных
    песен.


    SOBO (Southbound Train) была образована в 1995 году Ассафом Ганзманом и Дэниелем
    Криманом.


    В 2002 году SOBO завоевали золотую медаль на блюзовом фестивале Дельта Невы в
    Санкт Петербурге.


    В 2005-м SOBO отправились представлять Израиль на International Blues Challenge
    в Мемфисе.


    В 2007-м SOBO участвовали в московском International Blues Festival в Лефортово.


    В 2010-м году SOBO открывали концерт Джон Ли Хукера младшего в Тель-Авиве.


    В 2011 году SOBO были приглашены хэдлайнерами на блюзовый фестивале Дельта Невы
    в Санкт Петербурге.


    В 2011-14 SOBO проехали с концертами по всей России не один раз: от Барнаула до
    Нижнего Новгорода, Урал, Кузбас, Архангельск, Москва и Питер.


    В 2013 SOBO были приглашены хэдлайнерами на Урал Блюз Фестиваль, Екатиренбург,
    Россия.


    В 2014 SOBO продолжала гастролировать в России и Германии, участвоали в Maywoch
    фестиваль, Германия.


    SOBO выпустили свой третий альбом "Catfish Boogie" в зимой 2014, который получил
    хорошие рецензии в Израиле, России и США


    В разное время SOBO делили сцену с Gov''t Mule, Анна Попович, Джон Ли Хукер-младший,
    Оли Браун, JC Smith, Алвон Джонсон и многими другими известными блюзовыми музыкантами.'
