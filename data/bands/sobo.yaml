- id: 112
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  header: Reviews
  text: 'You sound great!


    <i>Warren Haynes Gov''t Mule, Allman Brothers</i>


    ----------------------------------------------------


    Редко когда удается услышать полнокровный здоровый блюз, без малохольных всхлипов
    и нытья. Радостно, что SOBO пришли и сделали это. Семь футов под килем!


    <i>Борис Гребенщиков, "Аквариум"</i>


    ----------------------------------------------------


    1) Группа знает, что такое ЗВУК. 2) Группа ИГРАЕТ Blues. 3) Группа знает, ЧТО
    она делает. К этому добавлю только, что это - мировой уровень исполнительского
    мастерства блюза. Другими словами - КУЛЬТУРА. Хочется сказать по-матросски, почему-то:
    Так держать, парни!


    <i>Александр Ляпин, "Аквариум", "ДДТ"</i>


    ----------------------------------------------------


    Ну что? Отличный, блюзовый вокал и игра на бас гитаре у Асафа, железный ритм и
    минимум железа у Габи, великолепное владение слайдом и звуком у Дана .... Давно
    не получал такого удовольствия! Есть очень неплохие группы, которые слушаешь (
    я слушаю...), и после пары вещей начинаешь думать о каких-то других делах, строишь
    планы на что-то... SOBO относится к составам, которые сразу же цепляют слушателя
    и держат его до самого завершения концерта... Плотный, густой звук, мощная пульсация,
    короче, - полный кайф.... Они интересны.... И они явно тяготеют к John Lee Hooker
    и Howlin'' Wolf, что для меня вдвойне приятно.... С Даней мне довелось джемануть
    еще в Израиле (спасибо Диме Казанцеву за наводку), и уже тогда стало понятно (мне),
    что вот человек играет конкретно, по блюзу (уж простите..), все в кассу, все по
    теме.. без лишних звуков и выпендрежа... Наверное, без особой рафинированности..
    и это так хорошо, когда нет ее - той особой рафинированности ... Слава Богу, я
    не эстет, и мне нравится простая, здоровая пища... Спасибо SOBO!!!


    <i>Юрий Каверкин, "Dirty Dozen"</i>


    ----------------------------------------------------


    Симпатичная группа, профессионально сочетающая традиционную блюзово-фолковую базу
    с современным звучанием. ... Одним словом, слушать приятно.


    <i>Сергей Воронов, "Crossroadz"</i>


    ----------------------------------------------------


    Мы сегодня ходили на Sobo в БиБиКинг, мне понравилось! Хорошая ритм-секция играла
    очень уверенно, точно и забойно в разных стилях. Качественный вокал у басиста
    + приятное обхождение с публикой. Даня Криман играет слайдом на полуакустической
    гитаре типа national steel просто великолепно. Никакой каши и джема, все песни
    до одной саранжированы. Звук получается довольно драйвовый - забойный.


    Концерт был приятным неожиданно, ибо хороших групп бывает, увы, довольно мало,
    не каждый день ;)) Ура!


    <i>Федор Романенко "www.blues.ru"</i>


    ----------------------------------------------------


    Концерт SOBO меня крепко порадовал. Sobo - великолепны, крепкая, сильная группа,
    все вещи "сделанные" от и до, звучание мощное, ритм-секция выше всяких похвал!
    Даня(гитара, гармоника) творил чудеса! Здорово! За каждой композицией видна кропотливая
    работа, в результате - высший класс!


    <i>Юрий Костин "www.roadhouse.ru"</i>


    ----------------------------------------------------'
