reviews:
- id: 485
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Soul Green - новая московская группа, 2017 года рождения, играет соул, блюз
    и фанк с мощными органом и гитарой. В сет-листе разноообразные инструменталы для
    органного комбо, лиричные соул-хиты и крутые свинговые джамп-блюзовые номера.


    Играет на страте и поет Федя Романенко - основатель сайта blues.ru, организатор
    блюзовых гастролей и обладатель настоящего Хаммонда C3 (на котором сам не умеет
    играть!). Петя Репин - известный в Москве блюзовый пианист, Хаммонд-органист и
    вокалист, фронтмен группы The Junkbusters. Саша Понкратов - бас и Эд Ружанский
    - ударные - опытные участники многих московских блюзовых ритм-секций.


    На концерте Soul Green вы совершите волнующее музыкальное путешествие через Новый
    Орлеан, Мемфис, Детройт на Западное Побережье, и на машине времени из 1960-х в
    2000-е. Известные старые хиты, которые играет Soul Green, и откопанные из ила
    жемчужины разных жанров объединяет то, что в каждой песне есть свой грув, который
    группа заставляет звучать снова, и красота, которой Soul Green жаждет делиться
    с публикой.'
