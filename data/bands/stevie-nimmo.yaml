  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Уроженец шотландского Глазго, гражданин Мира и житель попеременно то Лондона,
    то Парижа - гитарист-виртуоз, певец, сонграйтер СТИВИ НИММО, родной брат Алана
    Ниммо, лидера британской блюзовой группы King King, обладателя British Blues Awards
    "Best Blues Band" - участник нескольких успешных проектов и сольный артист, номинант
    на British Blues Awards "Best Blues Guitarist", и... очень мужественный человек.


    Вот уже четыре года, с тех пор как в 2009 году у него был диагностирован рак,
    Стиви продолжает борьбу со страшным недугом, практически не снижая своей концертной
    активности в составе собственного трио, дуэта с братом Аланом The NIMMO Brothers,
    и как сольный артист, и продолжая уделять время для работы в студии. Недавние
    тесты показали, что в битве с раком пока Стиви Ниммо уверенно побеждает недуг.
    Он справится!


    О себе и о своих песнях он говорит так: "Если у тебя есть что-то внутри, и это
    что-то рвется наружу - неважно, делая тебя при этом счастливым или заставляя грустить,
    то единственная возможность дать этому выход - написать и спеть песню. Я так и
    делаю, и мне удается с этим справится... Пока мне есть, что сказать - я буду "в
    деле"... А мне еще есть, что сказать!"


    О гитарном стиле Стиви можно с уверенностью сказать, что в его гитаре живут очередные
    инкарнации Джими Хедрикса, его тезки Стиви Рэя Вона и Гэри Мура. Это не подражание
    - это воплощение! Бесподобно!!!'
