  text: Стиляги Band - оригинальный музыкальный коллектив, "Стиляги Band", визуально
    и музыкально достоверно, передающий эпоху 50-х годов СССР. Репертуар коллектива
    основан на песнях из кинофильма Стиляги, и украшен стилизованными американскими
    и советскими шлягерами. Яркие характеры, умение коллективом подать музыкальный
    материал , воссоздают афтмосферу сказочного оазиса свободы в СССР. Ты любишь буги-вуги?
    Мы играем буги-вуги лучше всех!
