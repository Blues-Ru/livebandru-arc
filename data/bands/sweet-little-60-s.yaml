  text: 'Уже как 20 лет знакомые и не раз вместе игравшие под разными названиями Владимир
    Савенок и Дмитрий Евдомаха решили в 1997 году поиграть музыку, на которой они
    по-серьезному затащились в глубоко детском возрасте и, поддавшись этому "тлетворному
    влиянию буржуазного Запада", решили стать почему-то именно музыкантами - и стали
    ими . Несмотря на то, что cлова "Rock" в 60-х годах еще не существовало (я - очевидец),
    а так же и про блюз - мало кто тогда здесь догадывался, и музыка, покорившая,
    нас не имела определенного названия (Twist, Shake, R&R, Pop, Beat, Big Beat, Boogie
    ..........) , и тем не менее, в 60ые зародились практически все стили Рок-музыки.
    А во дворах люди с гитарами пели и The Beatles, и Высоцкого - и это не противоречило
    друг другу.


    Первоначальный состав выглядел следующим образом: -- Владимир Савенок – клавишные
    и вокал -- Дмитрий Евдомаха – барабаны -- Игорь Клементьев – бас и бэк вокал Группа
    стала играть по клубам Санкт-Петербурга, стараясь представить свои версии песен
    Элвиса, Чака Бери, Джерри Ли Льюиса, Битлс и многих других. Через некоторое время
    группа решила, что можно расширить состав. И в группу был пригашен гитарист Вадим
    Сергеев (Хампти-Дампти, Сплин и др.). Через некоторое время его заменил Вячеслав
    Черных (Поющие Гитары, Корнелюк и др.). Потом в группу был приглашен саксофонист
    Юрий Куров, и группа в некоторых клубах стала играть в расширенном составе. Питерский
    журналист Андрей Бурлака, послушав коллектив на концерте в клубе JFC сказал, что
    это – единственная группа, которая играет в стиле Нью-Орлеанский Блюз. Игорь Клементьев,
    принимавший участие еще в нескольких проектах вскоре не смог совмещать, и на его
    место пришел Шефченков Сергей (Паша Кашин и др.), однако вскоре он нашел работу
    за рубежом, и с коллективом сотрудничали такие басисты, как Владимир Курганов,
    Александр Маслов, Владимир Чумаков (Времена), Иван Ковалев (Земляне), Владимир
    Всильев "Царь" (Поющие Гитары, Цветы, Круг и др.), Павел Борисов (ДДТ). С 1999
    года басистом в группе стал Владимир Коновалов (Алиса Мон, Вино и др.). Через
    год поменялся барабанщик – им стал Юрий Николаев (Аквариум, Поп Механика, Оркестр
    п/у Бадхена, Федор Чистяков и др.) а так же с коллективом успели посотрудничать
    барабанщики: Вадим Петухов, Игорь Левкин, Михаил Делазари, Роман Николаев (Кукрыниксы),
    Юрий Соколов "Помидор" (Поющие Гитары), легендарная барабанщица Кэт. Так же в
    разные периоды на саксофоне играл Виктор Дунаевский. В 2001 на бас гитаре стал
    играть Наиль Кадыров (Зоопарк, Разные Люди и др.) В 2006 из-за авто катастрофы
    некотрое время не смог работать основатель группы Владимир Савенок, и вместо него
    был приглашен Товарищ Сержант гитарист и вокалист Алексей Смирнов (Кафе). Следствием
    было изменение направления и смена названия на Green River. Впоследствии группа
    "Sweet Little 60-s" была воссоздана в предыдущем и ныне действующем составе: --
    Владимир Савенок – клавишные и вокал -- Дмитрий Евдомаха – барабаны -- Владимир
    Коновалов – бас и бэк вокал -- Вячеслав Черных – гитара


    В группе "Sweet Little 60-s" играли только самые лучшие музыканты, с очень богатой
    послужной историей. И группа всегда звучала на самом высоком уровне. И очень часто
    люди, посещавшие наши концерты, не верили, что мы из России.'
