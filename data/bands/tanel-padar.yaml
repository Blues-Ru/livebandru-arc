  reviewer_token: press-release
  header: Танель Падар Блюз Бенд
  text: 'Можно сказать, что Танель Падар является самой заметной фигурой на эстонской
    музыкальной сцене. Он известен не только как чрезвычайно многогранный певец и
    гитарист, но и как постоянный герой дамских таблоидов, бунтарь и заводила вечеринок.
    Танель - обладатель всевозможных музыкальных наград. Он принимал участие почти
    во всех значимых музыкальных мероприятиях Эстонии в течение последнего десятилетия.
    Музыкант также известен и как ведущий популярных телевизионных шоу, снимается
    в кино и телесериалах.


    В 2001 Танель Падар выиграл Евровидение в дуэте с Дэйвом Бентоном. Хотя его больше
    знают как рок-музыканта, отношения Танеля с блюзом уходят корнями в раннюю юность.
    Его публичная карьера началась в 1999 году в блюзовой группе под названием Speed
    Free, затем в течение четырех лет он играл в самой известной блюзовой банде страны
    Compromise Blue.


    В 2004 Танель организовал свою рок-группу The Sun , которая очень быстро стала
    самой популярной группой в Эстонии и ее успех до сих пор неоспорим. Несмотря на
    постоянную занятость, он неизменно участвует в различных блюзовых проектах, зачастую
    выступая хедлайнером крупнейших блюз- и джаз-фестивалей. Его Blues Band появился
    как временный проекта в 2012 году, но из-за прекрасного исполнения группа завоевала
    теплый отклик у публики, поэтому было принято решение продолжать в виде постоянной
    группы.


    Участники „бэнда" - лучшие блюзмэны Эстонии - всемирно известный композитор Юло
    Кригуль играет на клавишных, популярнейший гитарист Рауль Укареда, один из лучших
    блюзовых басистов страны Арго Тоомель и на барабанах - Кристьян Каллас. Иногда
    его заменяет Майкл Милей из группы Rival Sons.'
