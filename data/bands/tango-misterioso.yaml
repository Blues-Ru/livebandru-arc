  reviewer_name: пресс-релиз
  reviewer_token: press-release
  header: Tango Orchestra MISTERIOSO
  text: 'Tango Orchestra Misterioso - Российский коллектив талантливых музыкантов,
    начавший свою деятельность с 2007 года, оркестр исполняет классические, современные
    и советские танго. Репертуар оркестра составляет танго композиторов : A. Piazzolla,
    O. Pugliese, C. Gardel, A.Troillo, M. Mores, M. Rodriguez, J. Darienzo, F. Canaro,
    A. Bardi, E. Donato M. Joves и других.


    Коллектив выступает на разных площадках от клубов и ресторанов до театров и ведущих
    концертных залов. В 2009 году участвовал в фестивале Российского кино в Берлине.
    С 2009 года в оркестре участвует редкий в России инструмент и "сердце" аргентинского
    танго - бандонеон, так же в состав входят: фортепиано, гитара, скрипка, виолончель
    и контрабас. Tango Orchestra Misterioso, сотрудничает с профессиональными танцорами
    и преподавателями танго Москвы и Санкт - Петербурга. Оркестр постоянно сотрудничает
    с другими профессиональными музыкантами.


    В 2009 году официальный оркестр фестиваля Русского кино в Берлине.


    В 2010 году официальный оркестр фестиваля Аргентинского Танго El Tango del Plata
    в Москве. Tango Orchestra Misterioso выступал на одной сцене с мировыми звездами
    Аргентинского танго такими как: O. Caceres y V. Barboza, O. Farias y S. Fuentes,
    L. Furlan y G. Pisauro.


    Оркестр стремиться чтобы как можно больше людей прикоснулось к волшебному миру
    Танго!


    Состав: Анатолий Сафонов - бандонеон, Яков Четверухин - скрипка, Семен Лашкин
    - виолончель, Мария Размахнина - фортепиано, Юрий Горелов - контрабас'
