  text: 'Когда?


    День рождения ВИА – сентябрь 1997 года. Но официально парни отмечают этот праздник
    25 февраля. Именно в этот день в 1998-м состоялся первый концерт коллектива.


    Кто?


    Александр (Халява) Горлов, в миру Ухтомский - гитара, вокал – массивный бородатый
    запевала. Двигается и танцует нелепо, часто выпивает и пишет удивительные по своей
    наивности тексты.


    Владимир (Шат) Шатунин - бас – энергичный музыкант. В прошлом – сокурсник Халявы
    по институту. С его подачи и начались "Реки".


    Александр (Шурра) Истомин (клавиши, бэки) – настоящий интеллигент, во вредных
    привычках не замечен, инструментом владеет здорово, музыкальные вкусы самые широкие.


    Антон (Sleppa) Слепченко - барабаны - расширил музыкальную палитру коллектива
    еще больше (хотя, казалось бы, куда еще) за счет творческого подхода к ритмическим
    рисункам. Антон занял в группе вакантное после ухода Сергея (Рапапама II) Гончарва
    место, который в свое время заменил за барабанной установкой Андрея Зайцева, игравшего
    в группе с момента ее основания. Вообще при каждом из барабанщиков группа звучала
    по-своему.


    Если Андрей Зайцев проповедовал роковою или даже фанковую ритмическую линию, то
    Сергей Гончаров полностью преобразил звучание песен, переведя их на стезю слабой
    доли. При нем группа гораздо ближе зазвучала к декларируемым ска и реггей стилям.'
