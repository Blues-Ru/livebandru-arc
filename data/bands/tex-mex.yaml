  text: 'Корни нашей музыки - в творчестве великих команд поколения 60-70х: Lynyrd
    Skynyrd, Creedence Clearwater Revival, The Allman Brothers Band, ZZ Top, Rolling
    Stones, Led Zeppelin, Free, Bad Company, а также звезд блюзовой гитары Jimi Hendrix,
    Stevie Ray Vaughan, Johny Winter, и многих других.


    Группа была основана в 1996 году под названием "Black & White". В том же году
    группа стала победителем фестиваля "Живи и помни" среди рок-исполнителей, проводившемся
    в городе Донецке. С 1997 по 2004 год музыканты группы, уже под новым названием
    "TEX-MEX" выступают в Польше, в таких городах, как Краков, Закопане, Катовице,
    Лодзь, Варшава, Торунь, Криница Морска, Гданьск, Сопот, Гдыня. Концерты проходят
    как на больших площадках, так и в малых камерных клубах, вызывая большой интерес
    публики, а также прессы, радио и телевидения. В Польше группа "TEX-MEX" участвует
    в совместных проектах с музыкантами из Польши, Канады, Америки и Белоруссии, работая
    в стилях блюз, рок, кантри, фолк, диксиленд.


    В настоящее время группа работает на киевских площадках, исполняя кавер-версии
    мастеров рока, блюза, кантри-рока, являясь резидентами таких клубов, как "Docker''
    ABC", "Докер-паб", "Jeppsen Blues", "Пивна бочка" и "44". В своей работе "TEX-MEX"
    исповедует такие принципы: драйв, склонность к импровизации, узнаваемость, работоспособность,
    верность стилю и корням.


    Помимо клубной работы, группа работает над созданием собственного музыкального
    материала на русском и на английском языках и ищет способы продвижения своего
    творчества на музыкальных рынках Украины, ближнего и дальнего зарубежья.'
