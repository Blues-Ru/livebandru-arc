  text: 'Группа "Небесная река" существует с 1998 года. За это время музыканты участвовали
    в целом ряде украинских джазовых и других фестивалей, в международных музыкальных
    фестивалях в Италии, Греции, России (Москва), в различных концертах. Они регулярно
    играют в музыкальных клубах Киева, в клубах Милана и Вены.


    Музыку "Небесной реки" можно определить как внестилевую ориентальную, в пределах
    направления New Age (World music). Для нее характерно использование элементов
    этноджаза, которые включают в себя ритмическую основу индийской классической музыки
    (тал), славянскую фольклорную мелодику и элементы джазовой гармонии и импровизации.


    До создания группы каждый из ее четырех участников пребывал в творческом поиске,
    причем, в, казалось бы, непересекающихся направлениях.


    Руслан Пашинский и Валерия Марченко довольно долго пробовали себя в джазе. Они
    участвовали в различных джазовых проектах, играли на фестивалях в джазовых составах
    и т.д. и т.п.


    Профессиональные музыканты Сергей Пучков и Сергей Исаков в прошлом - участники
    рок коллективов. В нынешнем проекте им пригодились знания, почерпнутые в Индии,
    в Академии музыки и искусств, где Пучков осваивал индийский барабан табла, а Исаков
    - индийскую слайд-гитару.


    Итогом поиска музыкантов стал некий синтез музыкальных стилей и культурных традиций
    Востока и Запада.


    Музыка "Небесной Реки" основывается на импровизации. Каждое исполнение неповторимо.
    Оно зависит от внутреннего состояния каждого участника группы.'
