  header: The Smithsonian Jazz Masterworks Orchestra покажет в России аутентичные
    шедевры джаза
  text: 'С 19 по 24 мая в России пройдут гастроли The Smithsonian Jazz Masterworks
    Orchestra ("Смитсоновского оркестра джазовых шедевров") - важнейшего "репертуарного"
    джаз-оркестра американской столицы.


    Смитсоновский оркестр - часть джазовой программы крупнейшего в США музейно-исследовательского
    комплекса в области культуры, Института им. Смитсона (Smithsonian Institution),
    названного при своем создании в 1846 г. в честь британского ученого Джеймса Смитсона,
    завещавшего все свое огромное состояние (сто тысяч золотых соверенов, или полмиллиона
    тогдашних полновесных золотых долларов) на организацию в Вашингтоне "общественного
    заведения для собирания и распространения знаний". В состав Института входит Национальный
    музей американской истории, при котором в 1990 г. был создан биг-бэнд из 13 музыкантов
    - The Smithsonian Jazz Masterworks Orchestra. Во главе оркестра с момента его
    создания стоит выдающийся джазмен, один из создателей американской системы джазового
    образования, композитор и преподаватель - Дэвид Бейкер; исполнительный продюсер
    оркестра - Кеннет Кимери, который также участвует в концертах в качестве перкуссиониста.


    "Смитсоновский оркестр джазовых шедевров" - это своего рода репертуарный оркестр:
    пользуясь хранящимися в музее партитурами ведущих биг-бэндов джазовой истории,
    он готовит целые программы, посвященные тем или иным периодам или персоналиям
    в истории джаза, и исполняет их со всей возможной аутентичностью. В составе оркестра
    - профессиональные джазовые музыканты, живущие в Вашингтоне и его окрестностях:
    саксофонисты Джей Брэнфорд, Шэннон ЛеКлэр, Рэнди Салман и Чарли Янг, тромбонисты
    Сэм Бертис, Билл Холмс и Брент Уоллараб, трубачи Ленни Фой, Джо Уайлдер и Том
    Уиллиам, гитарист Ройс Кэмпбелл, басист Джеймс Кинг и барабанщик Чак Редд.


    Выступления оркестра пройдут в Москве, Казани и Самаре.


    * 19 мая - резиденция посла США "Спасо-хаус" в Москве


    * 20 мая - Казань


    * 22 мая - Самара


    * 24 мая - Москва, Светлановский зал Московского международного Дома музыки.


    Гастроли пройдут под эгидой Двусторонней российско-американской президентской
    комиссии и при поддержке посольства США в Москве.'
