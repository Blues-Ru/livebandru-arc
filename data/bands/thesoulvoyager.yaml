  reviewer_token: press-release
  text: '"... Вы просто обязаны попасть к ним на концерт, ибо никакие аудио и видеоматериалы
    не смогут передать ту атмосферу, которую несет в себе группа. Сильный и уверенный
    голос Софьи Реснянской, классическая блюзовая техника Максима Пальчикова, словно
    взращенная на тех самых хлопковых полях, и пульсирующие жизнью ритмы ударника
    Юрия Карамышева - все складывается в картину, которой Москва пока еще не видела.
    На их выступлениях вы услышите отличный соул - яростный и нежный именно в тех
    местах, где это необходимо. Подборка каверов и многообещающий авторский материал
    убедят самых прожженных скептиков в том, что у этой группы большое будущее. Ну
    а пока вы можете совершенно случайно встретить их в маленьких уютных клубах, где
    люди собираются выпить чашечку кофе и пообщаться в конце трудового дня. Будьте
    уверены, вы надолго запомните эту встречу - даже простое, акустическое выступление
    группы производит самое наилучшее впечатление." (Текст: Олег MoBKiD Миронов, сайт
    modscene.ru)'
