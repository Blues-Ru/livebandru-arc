reviews:
- id: 422
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: TJ NORTON is harmonica player, singer and songwriter from Essex, UK. TJ became
    addicted to the blues after finding a cassette tape of Lightnin Hopkins and learned
    to play harmonica by ear, via listening to recordings and sitting with more experienced
    musicians, just like the old blues players. He left home at age 16, moving to
    London, and was in the USA by the time he was 18. He has been schooled by the
    streets and has many tales to tell. TJ has played with, and for, many great artists
    in the UK, Europe and the USA. Just some of those he credits as influencing him
    via personal connection are, UP Wilson, Eddie Stout, Gary Clarke Jr, Paul Orta,
    Paul Lamb, Paul Oscher, Steve West Weston, Gary Primich, Zach Zunis, Arthur Adams,
    Randy Chortkoff, Pete Townshend, Bob Brunning and many more. He plays like a man
    possessed, with the ability to switch from a beautiful gentle phrase, to full
    bore fat tone highly energetic musical attacks, in an instant. TJ doesnt just
    play music, he lives and literally breathes music!
  verified: true
  created: '2014-09-02'
  is_press_release: true
