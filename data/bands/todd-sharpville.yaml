  reviewer_token: press-release
  text: 'Тодд Шарпвилл, единственный, как про него говорят "blue-blooded bluesman",
    блюзмен голубых кровей, чья родословная прослеживается по прямой мужской линии
    до 14-го века - он и вправду в родстве с британскими монархами, но знаменит он
    отнюдь не этим. Он ворвался на британскую, а затем и на мировую блюзовую сцену
    в начале 90-х как блистательный гитарист-виртуоз, и вскоре заявил о себе, как
    автор замечательных мелодий и проникновенной лирики. После участия в многочисленных
    фестивалях по обе стороны Атлантики, где ему приходилось делить сцену с самыми
    именитыми музыкантами из когорты отцов-основателей блюза, Тодд заслужил весьма
    лестных оценок от корифеев блюза: "Вот это талант!" - Би.Би. Кинг, "Лучший британский
    гитарист со времен Питера Грина!" - Хьюберт Самлин, "..его талант гитариста, певца,
    сочинителя граничит с гениальностью!" - Дюк Робиллард. Он играл и записывался
    с музыкантами в диапазоне от Айка Тернера до Ронни Вуда, от Хьюберта Самлина,
    Чака Берри и Вана Моррисона до Джорджа Майкла и Робби Уильямса.


    В 2014м году два самых ярких британских блюзовых таланта - Тодд Шарпвилл и Дэни
    Уайлд - соединили усилия для эксклюзивного мирового тура с редким в наши дни акустическим
    unplugged-форматом. Две гитары и два вокала. "No Bullshit! Серьезно, в акустическом
    unplugged-дуэте нет бэнда, за чьей коллективной спиной можно спрятаться. Тут все
    без обмана!" - сказал в интервью Тодд.


    В ноябре впервые в России выступил уникальный блюзовый дуэт - Тодд Шарпвилл и
    Дэни Уайлд. Тодд Шарпвилл, получивший в 1994м British Blues Awards за лучший блюзовый
    альбом, а в в 1995м году "обскакавший" в борьбе за British Blues Awards в номинации
    "Best Guitarist" не кого попало, а самого Эрика Клэптона и покойного Гэри Мура,
    выдающийся гитарист-виртуоз, прекрасный мелодист, аранжировщик и автор песен,
    и Дэни Уайлд, певица и гитаристка, автор искренних и страстных блюзовых баллад.
    Тодд и Дэни исполнили в туре вещи из своего бэк-каталога, песни из будущих, еще
    только готовящихся к выпуску альбомов и несколько классических блюзов в авторской
    обработке. Коме того, они появились в эфире радиостанции МАЯК в программе Игоря
    Ружейникова и сыграли несколько композиций в "прямом эфире". Собственные вещи
    дуэта - песни, с предельной искренностью передающие всю глубину человеческих эмоций
    - любовь и боль утраты, страсть, коварство, нежность, благоговейный трепет, печаль
    и ярость. Это песни, вырывающиеся за границы жанра - это не только и не столько
    блюз - тут все оттенки современного блюза от госпела и соул до кантри-блюза, фанка
    и блюз-рока. Весной-летом 2016 года Тодд Шарпвилл записывал в США свой очередной
    блюзовый альбом с участием таких звезд блюза, как Sugar Ray Norcia, Larry McCray,
    Duke Robillard и др. Продюсером альбома выступил его давний друг и коллега Тодда,
    легендарный Дюк Робиллард. Альбом смкширован и готовится к выходу в начале 2017
    года. Сольный тур Тодда Шарпвилла в России запланирован на март 2017 года.


    Todd Sharpville has been a stalwart of the international blues scene for many
    years... BB King: "What a talent" - Hubert Sumlin: "Best British player since
    Peter Green" - Duke Robillard: "His talent as a songwriter, singer & guitarist
    is genius"..


    Having worked with everyone from Ike Turner to Ronnie Wood, he''s largely known
    for his tastefully emotional guitar skills, but he''s currently showcasing a broader
    songwriting prowess, airing songs from his un-released "divorce" album which show
    off his uncanny ability to lyrically capture the rawest of human emotions.. His
    last blues offering (double album "Porchlight") was Britain''s highest selling
    blues export of the year & his shows are renowned as being hugely emotional, energetic
    affairs ("The Bruce Springsteen of the blues" - New York Times) "One of our best
    blues guitarists to date" - Mojo (UK)


    "There are few finer guitarists in the UK than Todd Sharpville......quality stuff
    indeed!" - Juke Blues


    "If you''re a foreign blues fan visiting our capital, don''t go home without seeing
    Todd play..." - Time Out


    "A serious bluesman" - NME'
