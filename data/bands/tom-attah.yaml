  text: 'Уроженец британского Фарнборо и житель Лидса, певец, гитарист, сонг-райтер,
    шоу-мен ТОМ АТТА - хранитель старых блюзовых традиций и созидатель современных
    блюзовых трендов. Будучи специалистом по компьютерным технологиям и электронике,
    консультантом Майкрософт, он постоянно гастролирует и находит время для записи
    в студии и для... написания докторской диссертации, исследующей тему влияния технологических
    инноваций на природу и звучание современного блюза! Кроме того, Том преподает
    музыку в уинвеститетах Манчестера и Лидса. Обладатель богатого, "задушевного"
    голоса, виртуоз - он с одинаковым успехом выступает сольноб в составе собственного
    пауэр-трио и как бэнд-лидер квинтета Tom Attah & Bad Man Clan.


    Его глубоко личные композиции часто ротируются в эфире блюзовых радиостанций Британии,
    а сам он - постоянный участник ведущих европейских, причем не только блюзовых
    фестивалей - от Glastonbury Festival и the Great British Rhythm & Blues Festival
    в Британии до Blues Autour Du Zinc и Blues Au во Франции. Его журналистские работы
    регулярно публикую авторитетные британские музыкальные издания. А еще он постоянно
    проводит блюзовые мастер-классы и читает лекции по истории блюза.


    Том Атта выступал и записывался с такими корифеями блюза, как David "Honeyboy"
    Edwards, Toots & The Maytals, Connie Lush & Blues Shouter, Robin Trower, легендой
    фолк-музыки Wizz Jones и с Oli Brown Band.


    Творчество Тома Атта доказывает, что современный блюз и фолк живы и продолжают
    развиваться. Стихи его песен и манера исполнения перекликаются с "сырой" искренностью
    Роберта Джонсона, вокал напоминает "рычание" Мадди Уотерса, а мелодии сочетают
    в себе и "сложность" Роберта Крэя и "простоту" СиСик Стива.


    Второй, после мини-тура в июле 2014, большой гастрольный тур Тома Атты в конце
    мая 2017 впечатлил размахом - из Питера в провинциальную, почти сказочную Коряжму,
    оттуда в Архангельск на фестиваль "Архангельск-Блюз" и затем в Москву.


    Третий тур Тома Атты запланирован на конец осени 2022 года. Не пропустите!'
