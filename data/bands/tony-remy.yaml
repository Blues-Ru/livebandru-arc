  text: 'TONY REMY - один из самых удивительных, самых восхитительных современных
    гитаристов. способных играть в любом жанре. Очень живой, страстный и неутомимый
    на сцене, креативный и продуктивный в студии звукозаписи, Тони Реми очень изобретателен
    в подходе к аранжировкам классических джазовых и блюзовых стандартов и в сочинении
    собственных вещей.


    Эти качества сделали проживающего в Лондоне гитариста-виртуоза в высшей степени
    востребованным на мировой джазовой и блюзовой сцене. Его остро отточенный, ритмически
    и гармонически выверенный стиль, обогащенный джазовой интуицией и окрашеный блюзовым
    драйвом, отличается страстью и виртуозностью. За 30+ лет профессиональной карьеры
    гитара Тони украсила более полусотни альбомов и многие сотни концертных и фестивальных
    выступлений джазовых, блюзовых и рок-музыкантов с мировым именем - Тони Реми записывался
    и гастролировал с Хэрби Хэнкокком, Энни Леннокс, Крэйгом Дэвидом, Гэри Барлоу,
    М-People, Simply Red, Shakatak, Down To The Bone, Пи-Ви Эллисом, The Jazz Crusaders,
    Коннором Ривзом, Кливлендом Уоткинсом, Ленни Уайтом и многими другими.


    На его музыкальные вкусы сильно повлияли Miles Davis, Weather Report, Steps, The
    Brecker Brothers, а таких гитаристов, как John Scofield, Hiram Bullock, Mike Stern,
    George Benson, Jimi Hendrix и BB King Тони Реми называет своими учителями.


    Автор семи сольных альбомов, Тони Реми продолжает активно записываться и гастролировать.


    В Россию маэстро Тони Реми впервые приезжал в конце мая 2018 года и отыграл хэдлайнерский
    сет на фестивале "Архангельск Блюз-Фест", несколько концертов в московских клубах,
    а также выступил на сцене концертного зала ЦДХ.


    Второй тур Тони Реми с успехом прошел в начале декабря 2019 года.


    Третий тур намечен на начало-середину мая 2022 года. Не пропустите!


    TONY REMY is one of the world''s most exciting guitar players of any genre. His
    hard-edged rhythmically driven approach is enriched with jazz intuition and bluesy
    soul. Live on stage, his relentless invention and incredible raw energy can set
    the crowd on fire.The reputation he has gained within the jazz community worldwide
    is fast making a legend out of this North London musician.


    Tony started his professional music career in 1986, although he was on the Jazz
    scene earlier. He recalls: "I had a band called "Cube 60" in ''84 with Winston
    Clifford, Joe Bashorun and Nick Cohen. We were crazy about Miles Davis, Weather
    Report, Steps, The Brecker Brothers, so we were writing and playing that stuff.
    I also had a rock band called "Secretary Bailey". Then in ''85, "Cube 60" developed
    into "Desperately Seeking Fusion" with Frank Tontoh, Jason Rebello and Julian
    Crampton. That was really my first outing as bandleader".


    Tony released his first solo album "BOOF" in 1993 on the American Jazz/fusion
    label GRP. Tony''s second album "METAMORFOLLOW-G" was released on Alltone Records
    in 1997. Tony''s playing draws on many different guitar styles. Guitarists like
    John Scofield, Hiram Bullock, Mike Stern, George Benson, Jimi Hendrix and BB King
    have all contributed in shaping Tony Remy''s style.


    Tony has toured and recorded with a wide range of musicians which include: COURTNEY
    PINE, JASON REBELLO, JULIAN JOSEPH, FREDDY HUBBARD, JEAN TOUSSAINT, STEVE WILLIAMSON,
    LONNY LISTON SMITH, LENNY WHITE, OMAR, STEPS AHEAD, GARY BARLOW, SIMPLY RED, US3,
    CLEVELAND WATKISS, PEE WEE ELLIS, RONNY LAWS, NELSON RANGELL, CONNOR REEVES, MAYSA
    LEAK, DOWN TO THE BONE, MATT BIANCO, KAREN RAMIREZ, NOEL MCKOY, ANNIE LENNOX,
    CRAIG DAVID, INCOGNITO, M-PEOPLE and many more. Tony has played and recorded a
    live DVD with THE JAZZ CRUSADERS, he recorded with DAVE LEE AKA JOEY NEGRO and
    THE SUNSHINE BAND.


    In 2005 Tony recorded with HERBIE HANCOCK on his album "POSSIBILITIES". Tony appears
    on KAREN RAMIREZ'' album "DISTANT DREAMS" live in Glasgow", and with ANNIE LENNOX
    on "LATER WITH JOOLS HOLLAND MELLOW "DVD (various artists) and her "BARE ALBUM
    JAPANESE IMPORT FEATURING ''COLD'' LIVE" Tony collaborated with NOEL MCKOY on
    his "MIND IS THE KEEPER" (1997), MAYSA LEAK''s album "JAZZ FUNK SCAT" and FRANCIS
    LELLANNE''s album titled "REPTILE".


    Tony played with THE NDR BIG BAND featuring PEE WEE ELLIS. Another band that Tony
    involved with is STONE SOUP "contains nuts" featuring KCB from US3, JULIAN CRAMPTON,
    GEOFF WILKINSON and TONY REMY. Tony is a musical director for DON BLACKMAN and
    RAHSAAN PATTERSON. Tony Remy has been working with PP ARNOLD and is also producing
    a record for her. Tony''s movie credits include writing scores for "PASSION OF
    REMEMBERANCE" (1986), "LOOKING FOR LANGSTON" (1989) both by ISSAC JULIAN, "CAREER
    GIRLS" (1997) by MIKE LEIGH (co-written with actress MARIANNE JEAN BAPTISTE) and
    two short films for the thames festival produced by FLARE FILMS. Tony recorded
    an album with BOB FRANCESCHINI in december of 2006 .


    Tony''s new album "FIRST PROTOCOL", has been released in february 2007. To check
    the page go to www.myspace.com/tonyremyfirstprotocol. Album is available on import
    only in the UK. European and US releases TBA. If you wish to order this album
    click here.


    To view and buy Tony''s other albums go to www.alltone.co.uk.


    Tony has just competed production on TONY MOMRELLE''s new album MESSAGE IN THE
    MUSIC and is producing an album for KAREN RAMIREZ. He is currently working on
    some recordings for IVE MENDES as well as finishing another TONY REMY album. CHECK
    OUT OTHER GREAT PROJECTS TONY''S CURRENTLY INVOLVED WITH, - IT''S A EUROPEAN FUSION
    BAND STREETNOISE - Urbanjazz AND A NEW TRACK IN COLLABORATION WITH THE GRAPE RECORDS
    "THE BASS LINE".


    Tony''s SPONSORS are Peavey amplifiers and signature guitars, Patrick Eggle acoustic
    and electric guitars and Rob Williams guitars.'
