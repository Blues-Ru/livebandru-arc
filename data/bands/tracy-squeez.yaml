  text: 'Группа "TRACY SQUEEZ" основана 26 марта 2010 года из музыкантов уже игравших
    в различных коллективах города Запорожье. Был выбран материал - который и явился
    основой творчества группы. Изначально ставилась задача играть только кавер-версии
    известных рок-коллективов, но ак известно, эта музыка в нашей стране не очень
    распространена. Коллектив назывался - "Snakes''N''Barrels". История названия столь
    необычная, сколько и символична (намек на "Guns''n''roses") и с течением времени
    лишь укрепила творческие амбиции участников коллектива.


    То, что может восприниматься слушателем как "тяжесть" в хард-роке, достигается,
    в частности, за счет специфического звучания электрогитары (с такими эффектами,
    как например, дисторшн и овердрайв) и работы ритм-секции. В музыкальном отношении,
    "утяжеление" рок-музыки началось еще в середине 1960-х годов британскими и американскими
    группами, в числе которых The Kinks, Cream, The Rolling Stones, The Yardbirds,
    The Who и виртуозным рок-гитаристом Джими Хендриксом. Элементы хард-рока присутствуют
    в таких известных композициях как "You Really Got Me" (The Kinks) и "White Room"
    (Cream). Песня "You Really Got Me" считается первой, в которой используется техника
    риффов, что является характерной чертой хард-рокового звучания. Так рождартся
    рок. Поскольку все участники коллектива выросли на такой музыке, то со временем
    хард-рок стал основным музыкальным направлением, на которое опирается творчество
    коллектива. 16 августа 2010 года название коллектива сменилось на "TRACY SQUEEZ".


    В процессе существования группы менялись участники, оставляя частичку своей души
    в песнях коллектива. На текущий момент состав участников группы насчитывает 4
    человек: Тюрин Андрей (автор песен, оранжировок, вокал, гитара), Денис Реутов
    (бас гитара, ), Антон Light (ударные инструменты, перкуссия), Антон Зозул (гитара,
    бэк-вокал).


    В репертуаре коллектива, на данный момент, насчитывается более 20 песен на русском
    и английском языках. Музыкальный стиль композиций - блюз, хард-рок, рок-н-рол.
    Группа активно гастролирует, принимает участие в различных фестивалях и музыкальных
    конкурсах. Главная цель коллектива на сегодня - запись и тираж их первого альбома.


    "TRACY SQUEEZ" продолжает выступать, реализовывать свои цели, завоевывать сердца
    аудитории и радовать своих поклонников драйвовыми песнями.'
