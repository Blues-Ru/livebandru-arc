  text: 'Мультиинструменталист, слайд-гитарист и продюсер - Troy Redfern сочетает
    в себе беспорядочную "сырость" звучания Хаунд Дога Тейлора, свободу формы Сонни
    Шэррока, огненную подачу Джонни Винтера и техническую виртуозность Дэйва Холла
    с заметным присутствием призрака Элмора Джеймса.


    Звезда Троя Редферна стремительно поднимается на блюзовом небосклоне мира, эффект
    разорвавшейся бомбы произвел выход его обласканного критиками альбома 2017 года
    "Dirt Blues Ritual". The Troy Redfern Band - одна из самых зрелищных групп в Британии,
    предлагающая слушателям захватывающий высокоэнергетический, выжигающий предохранители
    блюз, жгучая музыкальность и творческая спонтанность которого не имеют равных.
    А пользующийся оглушительным успехом альбом Mahogany Drift суперпроекта RHR -
    Redfern Hutchinson Ross, который Трой записал и выпустил осенью 2018 года в содружестве
    с нашими давними друзьями Джеком Хатчинсоном и Майком Россом, выводит его на новую
    орбиту.


    В его музыке есть что-то от валлийских маршей. Как говорит о себе сам Трой Редферн,
    он вырос в тени прославленного Майком Олдфилдом хребта Хергест. Блюз в границах
    валлийских долин, зажатых между Бреконом и Херефордом? Возможно ли? Кто-то сошлется
    на не вполне соответствующую географию и климат и скажет, что для блюза Троя Редферна
    Луизиана подошла бы больше - но, похоже, есть что-то в свободном духе и первобытной
    энергетике этой местности, что вдохновляет на то, чтобы сочинять и играть этот
    непричесанный, бесшабашный блюз. Все это прекрасно вписывается в мир Троя Редферна.
    Он взрывной, свободный, полный страсти независимый блюзовый художник, чей свирепый
    стиль слайд-гитары заставляет слушателей цепенеть, а поэтический дар закручивает
    в тугую спираль вневременные темы и внегеографические идеи ради достижения его
    собственной цели. В студии Трой Редферн - самоотверженный перфекционист. Работает
    ли он как one-man-band или в составе трио с мощной ритм-секцией - он кропотливо
    добивается одному ему ведомого тона, изобретает причудливые размеры и строи гитары,
    сочиняет мелодии, оттачивает аранжировки и шлифует сияющие сталью и наполненные
    черным юмором стихи.


    Как бэнд-лидер, на сцене он уверен, что куда бы его не завела спонтанность импровизации,
    его надежно страхует ритм-секция, и он доверяет ей достаточно, чтобы полностью
    отдаться страсти и дойти до предела. Вернувшись в студию с новыми идеями, он в
    поиске идеала вновь и вновь делает все сам, и трудно постичь его неумолимую энергию.


    Редферн - музыкальный провидец и визионер, он отвергает ярлыки и не боится выйти
    за границы, навязанные устаревшими представлениями о рамках того или иного жанра.
    Его мощный талант объединяет свирепое звучание слайд-гитары, продуманный саунд-продакшн
    и страстный вокал. Его независимый от ожиданий публики и диктата индустрии подход
    к блюзу связывает воедино корни дельта-блюза, знакомые каждому эмоции и темы с
    риффами из ушедшей эпохи и современными приемами звукозаписи. Трой ведет нас в
    волнующее музыкальное путешествие с захватывающими перспективами. Он - гитарист,
    для которого тон, подача и страсть являются его рабочими инструментами, и пока
    его голос варьируется от шепота до крика, он балансирует между чистой спонтанностью
    и глубоким грувом.


    "Его музыка физически привлекательна и эмоциональна и достойна определения "инди-блюз",
    она наполнена реальным содержанием и доведенными до грани возможного, виртуозными
    соло. Когда вы слушаете Троя Редферна, его высокооктановый блюз-роковый грув поражает
    вас в сердце прежде, чем мы успеваете это осознать". Pete Feenstra - Blues Matters
    Magazine'
