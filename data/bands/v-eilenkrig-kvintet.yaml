  text: 'Единственный клубный концерт Вадима Эйленкрига в июне! Шоу Вадима Эйленкрига
    - новый смелый и необычный проект популярного джазмена нового поколения! Вадим
    Эйленкриг всегда искусно ведет диалог с публикой: как с помощью музыкальных средств,
    так и без них - за счет отменного чувства юмора и врожденного таланта шоумена.
    Трубач решил сделать свои выступления максимально интерактивными и впервые соединить
    жанр концертного выступления со stand-up show! "Конечно, это не жанр для больших
    концертов, а вот в камерном клубе - это как раз может быть очень интересно. Я
    буду непосредственно общаться с залом, может, это общение меня будет подводить
    к каким-то композициям, или я вообще буду изменять программу," - говорит музыкант.
    К каждому концерту Квинтет Вадима Эйленкрига обещает готовить новую пьесу. Причем
    это будет не просто очередной джазовый стандарт, а известная композиция в специально
    написанной джазовой аранжировке. Также абсолютно на каждый концерт Вадим планирует
    приглашать специальных гостей, по его словам, это может быть выдающийся музыкант,
    вокалист или вокалистка, актер или актриса. Как вы видите, каждое шоу будет настоящей
    премьерой!


    К слову, идею этого проекта подарил Вадиму ... Билл Клинтон, для которого Квинтет
    Эйленкрига выступал осенью 2010 года на Экономическом форуме в Ялте. Музыкант
    делится впечатлениями о встрече: "Все было замечательно, нам аплодировали, Билл
    очень хорошо реагировал. Мы уже почти сели в автобус, когда мне позвонили организаторы
    и попросили вернуться, потому что Клинтон хотел лично нас поблагодарить. Мы вернулись,
    пообщались, я ему подарил свой диск. Мне было приятно, что ему искренне понравилось
    то, что мы играли - ведь он слышал всех великих и по-настоящему знает толк в джазе.
    Билл сказал:"Вы знаете, мне внезапно пришла идея, что если совместить джаз со
    stand up show может получиться очень даже неплохая вещь. Особенно у вас - я видел,
    как на ваши шутки реагирует зал".'
