  text: 'Свою музыкальную карьеру Валерий Каримов начал в качестве вокалиста и бас-гитариста
    в любительской группе. Вскоре он получил приглашение работать в профессиональной
    группе "Сплав" Владимира Батракова (г.Челябинск), которая играла джаз-рок и фьюжн,
    и по духу была близка творчеству американских групп "CHICAGO" и "EARTH, WIND &
    FIRE". Именно в этот период времени Валерий стал лауреатом международного телевизионного
    конкурса песни в г.Юрмале. Затем был приглашен в качестве вокалиста в известную
    группу "РОК-АТЕЛЬЕ" Криса Кельми, с которой записал виниловую пластинку. Далее
    Валерий создает свою группу и записывает с ней альбом "Как пламя и лед", который
    соединил в себе 2 направления: блюз-рок и прогрессив-рок. За рамками альбома группа
    экспериментировала в области фанка и альтернативы. Последующие 6 лет Валерий работал
    в качестве вокалиста в легендарном джаз-роковом ансамбле "АРСЕНАЛ" Алексея Козлова,
    где исполнял композиции в стилях: прогрессив-рок, фьюжн, фанк и джаз. Параллельно
    с работой в "АРСЕНАЛЕ" Валерий создает новую группу.'
