  text: Venger Collective - московский acidjazz - проект, чья популярность стремительно
    растет не только среди любителей легкой музыки, но и среди активных участников
    клубной жизни. Их музыка - это удачное смешение acid jazz, soulfunk и lounge.
    Энергетика, танцевальные ритмы и красивые мелодии воплощают идею создателей коллектива
    о стильной музыке и красивой жизни. Venger Collective - новое рождение эйсид-джаза,
    музыки наслаждений. Первая группа, играющая с стилях acidjazz, funky, которая
    вошла в пятерку финалистов конкурса Евровидение от России. Коллектив был образован
    в 2006 году двумя гитаристами - Александром Лыгиным и Владиславом Венгеровским.
    Их целью стало создание музыки, в основе которой acid jazz, а стимулом послужила
    энергетика Jamiroquai и Incognito. Результат - красивые, нежные, энергичные композиции,
    наполненные теплом и счастьем.
