  text: Виктория Урусова - вокалистка, руководитель ансамбля. Лауреат конкурса молодых
    исполнителей "Осенний марафон" (1998), постоянная участница Парада вокалистов
    ("Мелодии Голливуда и Бродвея"). Одна из самых перспективных молодых вокалисток
    Санкт-Петербурга. В течение нескольких лет певица плодотворно сотрудничает с талантливым
    петербургским пианистом Николаем Сизовым, который известен как тонкий знаток джазовой
    гармонии, прекрасный солист и внимательный аккомпаниатор.
