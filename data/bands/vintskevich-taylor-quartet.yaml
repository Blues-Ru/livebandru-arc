  text: 'Леонид Винцкевич (р. 01.04.1949, Курск) - заслуженный артист Российской Федерации,
    арт-директор ежегодного фестиваля Российского фонда культуры "Джазовая провинция".


    Сегодня это имя известно любителям джаза во многих странах мира. Он выступает
    с такими мастерами джаза как Лембит Саарсалу, Элвин Джонс, Лайонел Хэмптон, Кевин
    Махогани, Валерий Пономарев, Эвелин Уайт, Джон Стоуэлл, Конрад Хервиг, Эва Корнелиус,
    Дэвид Фризер, Юта Глазер, Ярмо Хеккала и многими другими. В 1979г. стремительно
    ворвался в джаз своей самобытной музыкой, пронизанной русским фольклором. Виртуозность
    и изобретательность пианиста, его нестандартное "взрывчатое" мышление, эмоциональность
    получили самую высокую оценку слушателей и критиков. После выступлений в США журнал
    "DOWN BEAT" назвал его музыку "...прекрасным, не замкнутым в себе русским авангардом,
    где Эррол Гарнер не противоречит Сесил Тейлору..."


    На концерте в Клубе Игоря Бутмана пианист выступит со своими не менее известными
    коллегами - американсими барабанщиком Джоэлом Тейлором и басистом Кипом Ридом.
    В составе квартета также выступит сын Леонида - саксофонист Николай Винцкевич.'
  verified: true
