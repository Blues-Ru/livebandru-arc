  text: Vision Of Sound – играет невероятную по красоте музыку фьюжн. Коллектив был
    образован музыкантами легендарной группы "Арсенал" – Дмитрием Илугдиным и Евгением
    Шариковым. Основой их нового проекта стала идея совместных выступлений с лучшими
    отечественными музыкантами и с музыкантами всего мира на российской сцене. "Vision
    of Sound"- это концертная лаборатория, где сочетается множество разных стилей
    и направлений, но неизменной основой всегда является музыка Jazz, Funk и Fusion.
