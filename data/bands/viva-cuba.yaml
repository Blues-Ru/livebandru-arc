  header: Кубинская шоу-группа Viva Cuba
  text: 'Латиноамериканская группа VIVA CUBA (Куба) - зажигательное , фееричное музыкальное
    шоу от мачос с Острова Свободы! Живая музыка в стиле ЛАТИНО Che Guevarra, Besame
    Mucho, Guantanamera и La Bamba заставят вас двигаться в ритме румбы, сальсы и
    меринге... История группы: Через несколько лет после приезда в Россию, профессиональные
    музыканты с Острова Свободы: Гильермо, Эдгардо и Алексис, изначально играющие
    в различных музыкальных коллективах, решают создать свой проект, отличительной
    особенностью которого будет состав группы – 100% Куба (отсюда и название "Viva
    Cuba") и довольно молодой, энергичный и харизматичный состав, где музыканты не
    только играют и поют, но и преподносят сюрпризы своим зрителям, о которых вы узнаете,
    придя к нам на концерт. Поверьте – кубинцы умеют удивлять! Музыкальный коллектив
    Viva Cuba ("Вива Куба!"), обретая своих первых поклонников, успешно выступает
    на площадках столицы, а так же начинает свою гастрольную деятельность по России
    и странам СНГ . В марте 2009 года группа начинает работу над новым проектом "Los
    recuerdos de Santiago", в котором собраны различные популярные латиноамериканские
    мелодии стилей сальса, сон, ча-ча-ча, болеро в джазовой обработке и совсем забытые
    кубинские композиции 50-70х годов.'
  verified: true
