reviews:
- id: 270
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'White Hound Blues Band - это одна из лучших молодых московских команд, исполняющих
    классику блюза и околоблюзовых стилей со своим сложившимся стилем исполнения.
    В первую очередь, группа интересна свежим взглядом на известные композиции, но
    это не подражание классикам блюза, а умное и тонкое переосмысление знакомых и
    любимых вещей. Свои авторские композиции по качеству, пожалуй, не уступают.


    Зрителям очень интересно наличие в группе скрипки (Елизавета Смирнова). Ее не
    так часто можно встретить среди инструментария блюзовых групп, а между тем ее
    партии придают удивительную выразительность исполняемым песням. Еще среди ярких
    привлекательных особенностей группы сочетание хрипловатого чувственного вокала
    (Владислав Бабанов). Гитарными соло White Hound Blues Band может по праву гордиться
    - гитаристу (Евгений Кудряшов) не занимать ни техники, ни скорости, ни экспрессии.
    Работа ритм-секции (Павел Гладышев - барабаны и Сергей Безчастнов - бас-гитара)
    заслуженно придает неповторимый драв и позитивную энергетику. Глядя на выступление
    музыкантов, становится ясно, что участникам коллектива очень нравится играть хорошую
    музыку, и, находясь на сцене, они получают огромное удовольствие просто от того,
    что любят делать.'
