  text: 'Название группы White Night Blues переводится как "Блюз белой ночи". Оно
    созвучно с названием поселка Белыничи, откуда родом лидер группы Юрий Нестеренко.
    Cсылаясь на слова одного из белорусских музыкантов, Юрий охарактеризовал блюз
    следующим образом: "Джаз - это тысяча нот, которые понимают три человека, а блюз
    - это три ноты, которые понимает тысяча человек. Это личные ощущения пребывания
    в музыкальной сфере"'
