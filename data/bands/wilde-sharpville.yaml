  text: 'В 2014м году два самых ярких британских блюзовых таланта - Тодд Шарпвилл
    и Дэни Уайлд - соединили усилия для эксклюзивного мирового тура с редким в наши
    дни акустическим unplugged-форматом. Две гитары и два вокала. No Bullshit! Серьезно,
    в акустическом unplugged-дуэте нет бэнда, за чьей коллективной спиной можно спрятаться.
    Тут все без обмана!


    Итак, впервые в России уникальный блюзовый дуэт - Тодд Шарпвилл и Дэни Уайлд.
    Тодд Шарпвилл, "обскакавший" в 1995м году в борьбе за British Blues Awards в номинации
    "Best Guitarist" не кого попало, а самого Эрика Клэптона и покойного Гэри Мура,
    выдающийся гитарист-виртуоз, прекрасный мелодист и автор песен, и Дэни Уайлд,
    певица и гитаристка, автор искренних и страстных блюзовых баллад. Тодд и Дэни
    исполняют в туре вещи из своего бэк-каталога, песни из будущих, еще только готовящихся
    к выпуску альбомов и несколько классических блюзов в авторской обработке. Собственные
    вещи дуэта - песни, с предельной искренностью передающие всю глубину человеческих
    эмоций - любовь и боль утраты, страсть, коварство, нежность, благоговейный трепет,
    печаль и ярость. Это песни, вырывающиеся за границы жанра - это не только и не
    столько блюз - тут все оттенки современного блюза от госпела и соул до кантри-блюза,
    фанка и блюз-рока.


    Тодд Шарпвилл, единственный, как про него говорят "blue-blooded bluesman", блюзмен
    голубых кровей - он и вправду в родстве с британскими монархами - но знаменит
    он отнюдь не этим. Он ворвался на британскую, а затем и на мировую блюзовую сцену
    в начале 90-х как блистательный гитарист-виртуоз, и вскоре заявил о себе, как
    автор замечательных мелодий и проникновенной лирики. После участия в многочисленных
    фестивалях по обе стороны Атлантики, где ему приходилось делить сцену с самыми
    именитыми музыкантами, Тодд заслужил весьма лестных оценок от корифеев блюза:
    "Вот это талант!" - Би.Би. Кинг, "Лучший британский гитарист со времен Питера
    Грина!" - Хьюберт Самлин, "..его талант гитариста, певца, сочинителя граничит
    с гениальностью!" - Дюк Робиллард. Он играл и записывался с музыкантами в диапазоне
    от Айка Тернера до Ронни Вуда, от Хьюберта Самлина, Чака Берри и Вана Моррисона
    до Джорджа Майкла и Робби Уильямса.


    Дэни Уайлд, уже побывавшая с аншлаговыми концертами а России в феврале 2014го,
    сделала себе имя, представляя в 2007м свой дебютный альбом в Королевском Альберт-Холле
    в дуэте с Джулзом Холландом. Ради того, чтобы записать ее альбомы 2009 и 2012
    года к пульту вновь встал ветеран-продюсер Майк Вернон!


    2014 will see two of the UK''s finest blues exponents on world tour together in
    a rare, unplugged/acoustic format. They''ll be duetting new songs from each of
    their respective upcoming albums, both branching out from the blues genre into
    much broader singer-songwriter territory (encompassing additional shades of country,
    soul, gospel and rock).


    Todd Sharpville has been a stalwart of the international blues scene for many
    years... BB King: "What a talent" - http://upload.wikimedia.org/wikipedia/en/f/ff/Tsandbbking.jpg
    Hubert Sumlin: "Best British player since Peter Green" - Duke Robillard: "His
    talent as a songwriter, singer & guitarist is genius".. . Having worked with everyone
    from Ike Turner to Ronnie Wood, he''s largely known for his tastefully emotional
    guitar skills, but he''s currently showcasing a broader songwriting prowess, airing
    songs from his un-released "divorce" album which show off his uncanny ability
    to lyrically capture the rawest of human emotions.. His last blues offering (double
    album "Porchlight") was Britain''s highest selling blues export of the year &
    his shows are renowned as being hugely emotional, energetic affairs ("The Bruce
    Springsteen of the blues" - New York Times)


    "Wilde burst onto the International blues scene in 2007 opening for Jools Holland
    at The Royal Albert Hall and signing to prestigious blues record label Ruf Records.
    Since then she has toured extensively (playing up to 250 concerts a year) across
    the UK, Europe, America, Canada and Africa. Having worked alongside blues and
    soul royalty from Mike Vernon to Pee Wee Ellis and with four studio albums under
    her belt, she has indeed earned her reputation as a world-class singer and songwriter.
    Inspired by Blues, Country and Gospel, Wilde''s music has topped the I-tunes Blues
    Charts (Number ones in Italy, Austria and Portugal) and the Country music chart''s
    top 40 placing her alongside the likes of Taylor Swift. "The entire audience was
    silenced and caught in the spell of deep emotion... she won the hearts and souls
    of everyone in the crowd - outstanding." Music News Magazine... "A sultry vocal
    that could breathe soul into inanimate objects, make Wilde one gifted lady. Love
    it!" - Guitar And Bass Magazine


    Together, Sharpville & Wilde exude hints of a virtuosic bygone era. Two heavyweight
    lead guitarist/singer-songwriters, slugging it out in harmony, unleashing the
    deepest of emotions into all they do...you won''t want to go home!


    http://www.bluesinthenorthwest.com/index.php/2014/05/17/review-dani-wilde-todd-sharpville-true-blues-club-at-earlestown-rbl-newton-le-willows-friday-9th-may/


    At this premier and spacious venue which is a shrine to the best of blues from
    America and Britain in an authentic copy of a Chicago blues room, we have two
    individual singer songwriters plying their trade together in what turns out to
    be an impressive collaboration. Dani Wilde has graced the stage here for more
    than 7 years as a blues singer/guitarist promoting herself and her albums with
    a distinctive mature powerful style and from such a demure figure. Todd Sharpville
    is a Londoner and over the years has had the good fortune in his amazing career
    to work with a multitude of well -known and established musicians here in Britain
    and in America. These two decided to get together who are excellent musicians
    and entertainers in they own right. The duo sang and played to a select audience
    with material from their past albums, mixed with a few well known rearranged covers.
    Todd is a musician of the highest order and with his acoustic guitar played with
    heart and soul he also played keys accompanying and harmonising with Dani. Dani
    doesn''t let the grass grow under her feet and has been busy recording her new
    album, no title yet, but is near completion and will be out soon. I don''t know
    how long they will be together touring but they are having a ball entertaining
    appreciative audiences nationwide.


    KEITH BLACKLEDGE National & International Music Reviewer'
