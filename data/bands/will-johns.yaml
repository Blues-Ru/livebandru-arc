  reviewer_token: press-release
  text: 'Коренной Лондонец, живущий в курортном Брайтоне, сын британской актрисы Полы
    Бойд (сестры Пати Бойд!) и саунд-продюсера Энди Джонса (ответственного, среди
    прочего, за звук на Led Zeppelin IV и на роллинг-стоунзовском шедевре Exile on
    the Main Street!), виртуоз-самоучка, неоднократный номинант на British Blues Awards
    в номинации "Best Guitarist" и "Best Original Song" - Уилл Джонс идеальный пример
    "семейственности". Еще подростком Уилл начал учиться играть на гитаре, вдохновляясь
    гитарным мастерством своих дядьев - Джорджа Харрисона и Эрика Клэптона. Неплохо
    быть самоучкой-гитаристом, если у тебя такой ментор, как дядя Эрик! Перебравшись
    в конце 90-х в Калифорнию и переиграв с разнообразными звездами блюза всю блюзовую
    классику, Уилл создал с Джесси Вудом (сыном Ронни!) и Трэмпером Прайсом успешную
    совместную группу GLYDA, с которой они много гастролировали по Штатам, Британии,
    Ирландии и континентальной Европе, выпустили дебютный альбом и несколько ЕР.


    Затем в середине 2000-х Уилл принял решение начать сольную карьеру, вернулся в
    Британию, поселился - он страстный рыбак!- в Брайтоне, купил лодку и женился.
    Если он не на гастролях - в погожие дни он рыбачит, а в ненастные придумывает
    новые аранжировки на классику рока и блюза и сочиняет собственные песни, круто
    замешанные на свинге, фанке и соул.


    Филигранная гитарная техника, недюжинные вокальные данные и безупречный вкус отличают
    все произведения Уилла Джонса. Песня "Kissing you" с альбома "Hookes and Lines"
    2012 года была номинирована в 2013м на звание "British Blues Awards - Best Original
    Song", так же как и песня "On My Back" с предыдущего альбома "Count on Me" 2009
    года была номинирована на эту награду двумя годами ранее.


    В 2013 году Уилл основал еще один любопытный многообещающий "семейный" проект
    - пауэр-трио "Sons of Cream" с Малколмом (сыном Джека) Брюсом и Кофи (сыном Джинжера)
    Бэйкером.


    В 2013м были успешный тур по Британии и Европе, затем по США. В связи с желанием
    Кофи Бэйкера остаться в Штатах (у него, как и у отца Джинджера, несносный характер
    и хронические проблемы с нарушением визового режима), он не пожелал присоединиться
    к друзьям, и в их аншлаговом туре по Британии и Европе в феврале-марте 2014 его
    заменил Крис Пэйдж, а группа называлась SonGs of CREAМ. 30.01.2015 SonGs of CREAM
    отыграли единственный концерт в Москве на сцене Центрального Дома Художника, и
    отправились в тур по Поволжью и Мордовии см. http://mordovia.stepoutmedia.com/,
    в ходе которого Уилл и Малколм отыграли благотворительный концерт в тюрьме - см.
    https://zekovnet.ru/zvuki-ru-tyuremnyj-blyuz/ С февраля 2015 коллектив называется
    Fresh CREAM.


    В августе 2015 состоялся третий визит Уилла Джонса в Россию. Он отыграл несколько
    концертов в Москве, в Питере и был одним из хэдлайнеров на Международном джазовом
    фестивале https://www.youtube.com/watch?v=8YwSVfJQtXk


    В марте 2016 года у Уилла Джонса вышел очередной альбом ''Something Old, Something
    New'', на котором одна из песен вдохновлена его российским опытом, а еще на одной
    песне с этого альбома бэк-вокал записала певица Ежевика Спиркина, с чьей группой
    OYME Уилл Джонс сотрудничал в январе 2015го в ходе тура по Мордовии. Весной-летом
    2016 года альбом занимал верхние позиции в Top-40 IBBA (престижного рейтинга Ассоциации
    независимых радиовещателей Британии), достигнув №2 в июне. За альбомом последовали
    Британский и Европейский туры, частью которого стал осенний, четвертый по счету
    российский тур музыканта с высуплениями в Москве и Питере. 25 октября 2016 года
    Уилл Джонс приял участие в подготовке и проведении мемориального концерта памяти
    Джека Брюса "An Evening For Jack" в историческом зале Shepherds Bush Empire, в
    коцерте приняли участие Эрик Клэптон, Малколм Брюс, Пит Браун, Джинджер Бэйкер,
    Стив Хэккетт, Мик Тэйлор, Билли Кобэм, Терри Рид, Берни Марсден, Деннис Чэмберс
    среди прочих.


    В 2017 году, Уилл и Малколм еще раз объединили усилия с Кофи Бэйкером и при участии
    Гленна Хьюза и Роббена Форда совершили Австралийское и Новозеландское турне проекта
    под названием The Music of Cream 50th Anniversary World Tour. Осенью 2018-го этот
    же проект дал первый 45-дневный тур по Штатам, отыграв 40 концертов, а весной
    2019 года проходит вторая часть американского тура из 21 концерта.


    Пятый приезд Уилла Джонса в Россию планировался на осень 2017 года, но из-за технических
    проблем с визой этому не суждено было случиться. Тур перенсли на полгода вперед.


    Весной 2018 Уилл Джонс, неутомимый искатель приключений, виртуоз и харизматик,
    снова приезжал в Москву, чтобы получить новую порцию приключений и отыграть несколько
    аншлаговых концертов.


    17 февраля 2020 года Уилл принял участие в организовааном дядей Эриком мемориальном
    концерте памяти Джинджера Бэйкера, умершего осенью 2019 года. В концерте, состоявшемся
    в лондонском Eventim Apollo Hammersmith, прияли участие Ронни Вуд, Роджер Уотерс,
    Стив Уинвуд, Пол Кэррак, Стив Гэдд, Кофи Бэйкер и др. https://www.youtube.com/watch?v=DTsRRMUfEQw


    Новый российский тур Уилла Джонса 2020 года, как и все остальные, был отменен
    по причине пандемии ковида. Уилл разумно использовал время, проведенное в вынужденной
    самоизоляции и записал альбом Bluesdaddy, который был выпущен в 2021 году и занимал
    высокие позиции в блюз-чартах по обе стороны Атлантики.


    Уже осенью 2021 года, как только ковидные ограничения начали ослабевать, Уилл
    Джонс собрал новый состав The CREAM of CLAPTON Band с которым совершил два американских
    и два европейских тура, традиционно прошедших с аншлагами.


    В настоящее время заканчивается работа над альбомом YIN & YANG, выход которого
    ожидается до конца 2023 года.'
