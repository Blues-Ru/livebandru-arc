reviews:
- id: 459
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: 'Многократный номинант на British Blues Awards!


    Гитарист и вокалист Уилл Уайлд вырос в музыкальной семье, но играть на губной
    гармошке начал довольно поздно - в шестнадцать. По его словам, он "играл, пока
    губы не начинали кровоточить..." Он рос под влиянием корифеев чикагского блюза
    и с молоком матери впитал в себя атмосферу и драйв Мадди Уотерса, Сонни Бой Уильямсона,
    Джон Ли Хукера и Бадди Гая. Хотя музыкальные вкусы Уилла сформировала чикагская
    традиция, но они всегда были устремлены в будущее. Уилл ищет возможности сочетать
    свою страсть к блюзу с любовью к року. Он берет аутентичность старых чикагских
    блюзменов и к музыке, на которой он вырос, добавляет мощь и энергию Led Zeppelin,
    Free и Deep Purple, не теряя при этом душевности и убедительности корневого блюза.


    Уилл записал пять альбомов, три первых студийных - дебютный "Nothin'' But Trouble"
    2008, "Unleashed" 2011 и "Raw Blues" 2013 - авторский материал, четвертый концертный
    - "живая" запись с европейского тура 2015 года "Live in Hamburg". Пятый, последний
    "Bring it on Home", вышедший в марте 2018 года, на котором Уилл Уайлд предстваляет
    авторские обработки классики рока, был назван в числе 5 Albums Pick of the Month
    по рейтингу IBBA - Ассоциации Независимых Блюзовых Радиовещателей Британии.


    Изучив секреты ремесла признанных мастеров жанра и - со всем подобающим уважением
    - Уилл выводит гармонику на новый уровень.


    Томас Руф, владелец известного блюзового лэйбла Ruf Records, на котором издается
    и сам Уилл, и его сестра Дэни, и многие другие актуальные британские и американские
    блюзмены, так говорит про Уилла Уайлда: "Это Джими Хендрикс блюзовой гармоники!"
    А авторитетный журнал Blues in the North West так описывает его живые выступления:
    "Каждое шоу - это настоящий мастер-класс блюзовой гармоники, не имеющий себе равных".


    С момента выхода на профессиональную сцену Уилл был шесть раз номинирован на British
    Blues Awards в категории Вest Harmonica Рlayer. В 2016 году Уилл занял второе
    место, что для молодого музыканта просто отлично. За семь лет профессиональной
    карьеры он успел выступить со звездами - Тадж Махалом, Шерманом Робертсоном, Майклом
    Берксом, Ерлом Томасом и другими. Легендарный британский саунд-продюсер Майк Вернон,
    записывавший в 60-х Эрика Клэптона и Питера Грина, а в середине 2000-х, забыв
    про выход на пенсию, вернувшийся к пульту, чтобы записывать новое поколение британских
    блюзменов, включая и Уилла Уайлда, так говорит о нем: "Какая вдохновенная, захватывающая
    и выразительная игра на гармонике! А какой превосходный вокалист!.." Легендарный
    американский блюз и соул-вокалист Ерл Томас так отзывается о Уилле, с которым
    играл в одном из своих европейских туров: "Уилл Уайлд задает планку для блюзовых
    артистов XXI века!" А британский ветеран блюзовой гармоники, трехкратный обладатель
    British Blues Awards Пол Лэмб говорит со знанием дела: "Уилл выводит блюзовую
    гармошку в другое измерение".


    Это второй приезд Уилла Уайлда в Россию, вперые после осени 2016 года, когда Уилл
    отыграл несколько аншлаговых московских концертов и выступил хэдлайнером блюзового
    фестиваля в Ярославле.


    Не пропустите!'
