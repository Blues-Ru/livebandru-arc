  text: 'WILLIAM JAMES MEAD


    "Своей музыкой The SharpeeZ возрождают сам дух Британского ритм-блюза семидесятых..."
    Пит Финстра, Get Ready to Rock Radio.


    Уильям Джеймс Мид, ветеран блюзовой сцены Британии, основатель группы The Sharpeez,
    участники которой в разное время играли в Rory Gallagher Band, Nine Below Zero,
    и др. Начиная с 1983 года возглавляемая фронтменом Уильямом Джеймсом Мидом группа
    The SharpeeS много гастролировала по Британии и Континентальной Европе, регулярно
    выступая на крупнейших блюзовых фестивалях и клубах в Германии, Нидерландах, Австрии,
    Франции и Испании, деля сцену с такими грандами, как Vаn Morrison, Dr.John, Rory
    Gallagher, Dr. Feelgood, Nine Below Zero, и др. Альбомы группы, начиная с дебютного
    "Strangers" (1983) и заканчивая относительно свежими "Open 4 Surgery" (2011) и
    "Mississippi Thrill" (May 2014) плотно ротировались на британских радиостанциях,
    собрав немало хвалебных рецензий и несколько номинаций. В 2017 году вышел концертный
    альбом "Live at TNMC", и, наконец, в конце апреля 2018 - новый студийный альбом
    ''Wild One'', тепло принятый критиками и занимавший летом верхние строчки в рейтинге
    наиболее ротируемых на блюзовых радиостанциях альбомов IBBA UK Top 40. Презентация
    альбома прошла в мае в историческом лондонском клубе Half Мoon Рutney, где в 60-70
    частенько играли The Rolling Stones, The Who, T.Rex, Van Morrison, Dr. Feelgood
    и др. Площадка была выбрана не случайно - совсем юным гитаристом Билл Мид играл
    там в местном хаус-бэнде и ему случалось выступать на разогреве у Роллингов и
    Марка Болана. Там же в начале 80-х начинал и первый состав the Sharpees.


    Уильям Джеймс Мид - гитарист и вокалист, а также основной автор песен обновленного
    состава группы The SharpeeZ. Его работы отличаются жесткой риффовой структурой,
    характерной до британского ритм-блюза 70-80-х годов, искусными, небанальными соло,
    возвращающими слушателей в эпоху Свингующего Лондона.


    Уильям Джеймс Мид впервые приезжал в Россию в январе 2019 года рамках нового сезона
    круглогодичного фестиваля British Blues Invasion to Russia. Его последний московский
    концерт в JAM-Club''e был профессионально записан на винтажной аналоговой аппаратуре,
    и эта запись послужила основой релиза на виниле и на магнитной ленте в формате
    38/2, 19/2, 19/4 https://reel-to-reel-tapes-russia.com/william-james-mead-preview/


    Второй российский тур Уилльяма Джеймса Мида запланирован на лето 2022 года. Не
    пропустите!'
