  text: 'Вульф родился 29 марта 1967 года в Монреале, Канада. Отрочество провел на
    юге Франции. Свой первый концерт Вульф исполнил в возрасте 14 лет. В 17 лет он
    убежал из дома, чтобы совершить первое турне со своей группой. В тот же год Вульф
    встретил Теда Ньюджета (Ted Nugent), после чего гастролировал с Тэдом некоторое
    время. Встреча с Тэдом произвела большое впечатление на Вульфа. Вульф решил переехать
    в Калифорнию.


    В 19 лет Вульф познакомился с Рэнди Кастилло (Randy Castillo, Рэнди являлся также
    барабанщиком еще пока неизвестного Ozzy Osbourne). После джема в клубе Troubadour
    club в Лос-Анджелесе Рэнди пригласил Вульфа в свою группу. В это же время Вульф
    получил приглашение от известного английского рок-музыканта Билли Айдола.


    Вульф много гастролирует. Дает более 100 концертов в год. Грамотно спланированный
    гастрольный график позволяет Вульфу охватить США, Канаду, Австралию, Европу, Японию
    и Россию. Музыкальная программа Вульфа практически полностью состоит из авторских
    композиций. На счету Вульфа 5 CD с авторским материалом.


    Его стиль можно определить как смесь традиционного блюза и классического соула.
    В манере игры Вульфа чувствуется влияние как блюзовых гитаристов Albert Collins
    и Roy Buchanan, так и соул исполнителей таких как, Curtis Mayfield и Otis Redding.
    Вульф создает мощный и в то же время чистый звук. По мнению журнала Guitar Player
    - Japan, Вульф является бесспорным мастером игры на телекастере.


    В течение 20 лет он постоянно гастролирует и регулярно выпускает альбомы. Выпуск
    его "Live Blues in Red Square" в Москве, и его классической песни "Hello", поднявшейся
    в чартах до 10 места - примеры его большой популярности. Его страсть к настоящему
    глубокому блюзу и к соулу породила очень харизматического и яркого музыканта.
    Том Брэмсон, критик журнала Blues Rockers описывает его "таким образом, исполнение
    на гитаре возвращает нас к Хендриксу и Клэптону. И хотя он, очевидно, был под
    влиянием "богов гитары", он не похож ни на одного из них."'
