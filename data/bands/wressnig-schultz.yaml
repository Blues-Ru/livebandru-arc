  header: Герои Хаммонд-органа и гитары у вас дома!
  text: 'Стоит признать, что Хаммонд-орган, в общем-то, изрядно покруче электрогитары,
    которую мы все мечтали купить в 14. Не только по устройству, но и по звуку, драйву
    и воздействию на внутренности. Но, конечно, приобрести и разместить дома гитару
    куда проще. Поэтому, наверное, нас иногда подташнивает от количества гитарных
    героев, но вживую с настоящим Хаммондом встречался не каждый. Орган Hammond B-3
    известен благодаря рокерам, включая Deep Purple, также активно использовался джазменами,
    но нам более интересна роль органа в блюзе, соул и фанке. Ключевые слова, которые
    вы, наверняка слышали, это - Motown, Stax, The Meters, Booker T & MGs, Jimmy McGriff
    и др.


    Молодой и горячий австриец Raphael Wressnig - главный органный герой в Европе
    сегодня. Он поджигает орган, играет за спиной и топчет инструмент не хуже Хендрикса.
    Только музыка, под которую он зажигает, это не рок, а блюз, фанк, соул и грув.
    При этом, Рессниг старается делать что-то сильно более яркое и эмоциональное,
    чем джазовые органные трио - наследники Джимми Смита.


    Рессниг, с одной стороны, эстет, он любит и воспроизводит все нюансы музыки своих
    учителей из 60-70-х, но, при этом, преподносит старые хиты и грувы с более современным,
    драйвовым и доступным нам звуком. Прямо на прошлой неделе вышла записанная в Новом
    Орлеане с местными чуваками пластинка Рафаэля <a href="https://itunes.apple.com/album/soul-gumbo/id933163405">"The
    Soul Gumbo"</a>, одновременно традиционная и забойная.


    В органном трио Рафаэлю Ресснигу на гитаре обычно аккомпанирует Alex Schultz (США).
    Среди нас нет согласия, одни говорят, что он вообще самый лучший современный блюзовый
    гитарист, другие говорят, что он не более, чем великий, третьи нас не понимают.
    Чтож, о вкусах спорить смысла нет... За басиста в группе играет также Рафаэль,
    причем, ногами (в органных трио органист работает за двойную плату), на ударных
    - австриец Silvio Berger.


    12 ноября группа сыграет в Калуге на родине нашего друга и главного российского
    специалиста по Хаммондам - Стаса Каримова. На прошлых гастролях, как нам кажется,
    Рафаэль Рессниг бесповоротно вытеснил место Джона Лорда в сердце Стаса ;) Стас
    притащит в клуб Крылья свой Hammond A100 с педалями.


    13 ноября в уютном новом Доме у Дороге на втором этаже Джон Донна на Пятницкой.
    Вы будете сидеть в 5 метрах от настоящего (1959 г.) Хаммонда С-3 и колонки Лесли
    122.


    14 ноября - трио выступит на джазовом фестивале в Краснодаре, куда, как раз, надеемся,
    доедет Стас с Хаммондом из Калуги.


    Обязательно приходите в ближайший из вышеупомянутых баров! Сделайте как мы, погоняйте
    засидевшихся мурашек грувом по позвоночнику, почувствуйте вибрацию Хаммонда всеми
    своими внутренними органами!'
