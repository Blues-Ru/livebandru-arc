- id: 428
  reviewer_id: 3
  reviewer_name: Федор Романенко
  reviewer_token: fedor-romanenko
  text: '<a href="http://ru.wikipedia.org/wiki/%CE%F0%E3%E0%ED_%D5%E0%EC%EC%EE%ED%E4%E0">Орган
    Хаммонда</a> - один из самых притягательных и крутых инструментов в музыке 20-го
    века, безоговорочно ценится музыкантами и слушателями за тембр своего звука. Орган
    создал Лоуренс Хаммонд в 30-х годах в США как дешевую замену духовым органам для
    небольших церквей. Результат получился настолько оригинальным и удачным, что Хаммонд-органы
    стали использоваться чаще на сцене и в студии в современной музыке: роке, джазе,
    блюзе и фанке.


    Устройство Хаммонд-органа вызывает восхищение - это сложнейший электро-механический
    инструмент, в котором нет места микросхемам. Внутри постоянно крутится механический
    вал с колесами, на каждом из которых разное количество зубцов. Движущаяся часть
    непрерывно смазывается маслом. Намагниченные зубцы колеса проходят мимо звукоснимателей,
    напоминающих электрогитарные, формируя тон определенной частоты. Делители частоты
    позволяют получить несколько разных нот из одного колеса. А настройки каждой из
    двух клавиатур позволяют смешать несколько разных тонов в пропорциях, получая
    разные тембры.


    Звук из органа попадает в ставшую стандартом для Хаммонда колонку Лесли, внутри
    которой физически крутятся на общей основе два динамика. Звук из них снимается
    статичными микрофонами, а изменение расстояния до них дает фазовые сдвиги, которые
    определяют неплоское, глубокое звучание органа.


    В джазе начиная с 50-х годов стал популярным формат "органного комбо" - орган,
    электрогитара, ударные. Наличие дополнительной педальной клавиатуры позволяло
    органисту играть полноценную линию баса, определяющую гармонию, без привлечения
    контрабасиста. Сочетание глубокого и мощного звука органа и драйва гитары было
    крайне удачным, в таком составе были впервые сыграны многие знаменитые инструменталы.


    Роль органиста в органном комбо - сложна, он играет гармонию, аккомпанимент и
    испровизирует в соло, это умеют делать немногие. После смерти легендарного Джимми
    Смита (Jimmy Smith) несколько лет назад, игравшего с легендами джаза и считавшегося
    также и блюзовым органистом, их стало еще меньше. Но один из них - сравнительно
    молодой австриец Рафаэль Рессниг (Raphael Wressnig) - сегодня с нами. Он владеет
    классическим джазовым органным стилем, является блюзовым музыкантом, записавшим
    <a href="http://raphaelwressnig.com/discography/">15 альбомов</a>, и больше всего
    любит горячий фанк, устраивая настоящий угар на живых концертах.


    Второй солист комбо - гитарист <a href="http://www.blues.ru/bluesmen/Alex_Schultz/">Алекс
    Шульц</a> (Alex Schultz), для знатоков в представлении не нуждается. Карьеру он
    начал в центральной группе вест-коаст блюза 80-90-x - у гармониста <a href="http://www.blues.ru/bluesmen/William_Clarke/">Вильяма
    Кларка</a> (William Clarke). Через группу прошло несколько гитарных легенд, но
    Шульц все-таки остался любимым гитаристом Кларка. Вместе с Кларком в течение небольшого
    периода времени они сделали нечто новое, чего раньше не было. Они создали новый
    современный звук вест-коаст блюза, который захватил в следующее десятилетие умы
    многих музыкантов. Из группы Кларка Алекс ушел к популярному гармонисту Роду Пьяцце
    (Rod Piazza), который записал с Шульцем свои наиболее блюзовые альбомы.


    Шульц вырос в Нью-Йорке, его отец был джазовым критиком, с детства Алекс слушал
    всю классику джаза, это определило его ритмический и гармонический слух. Тем не
    менее, позже Шульца привлекли блюзовые выразительные средства: более простые и
    эмоциональные, возможность воздействовать на слушателя тоном гитары и ритмическим
    напряжением.


    Шульц - разноплановый музыкант: он играет свинговый джамп на студийных записях
    топовых музыкантов вест-коаст блюза, блюзовую гитару с негритянскими вокалистками,
    соул-гитару с <a href="http://www.blues.ru/bluesmen/Tad_Robinson/">Тэдом Робинсоном</a>
    (Tad Robinson), джазовые, поп-соул и фанковые инструменталы в органных комбо.
    В его дискографии около <a href="http://www.alexschultz.com/disc.html">50 альбомов</a>.


    Главное умение Алекса Шульца, в котором ему нет равных, это фантастический тайминг
    и фразировка. Он никогда не играет быстро, а промежутки между нотами настолько
    выверены, что вместе с паузами создают натяжение и вызывают электрический ток
    в позвоночнике.


    Трио сыграет в России инструментальный блюз, аранжировки джазовых тем и заметную
    долю фанка. Алекс Шульц дважды приезжал в Москву с <a href="http://www.blues.ru/bluesmen/Tad_Robinson/">солистами</a>-<a
    href="http://www.blues.ru/fest/harp2006.htm">гармонистами</a>, Рессниг - эпизодически
    выступил в Москве на огромном <a href="http://www.blues.ru/efes/">эфесовском фестивале</a>
    в большом джеме, ударник Сильвио Бергер (Silvio Berger) был у нас с группой итальянского
    гитариста <a href="http://www.blues.ru/bluesmen/Enrico_Crivellaro/">Энрико Кривелларо</a>
    (Enrico Crivellaro).


    Формат трио позволит им показать себя не только как членов группы, но и в роли
    ярких инструменталистов с музыкой, которую они сами любят играть больше всего.
    В органном шоу нам предоставится редкая возможность послушать настоящий Хаммонд
    с Лесли и басовыми педалями в небольшом клубе: в руках настоящего мастера с великолепной
    группой.'
