- id: 224
  reviewer_id: 1
  reviewer_name: пресс-релиз
  reviewer_token: press-release
  text: Неправильные Пчелы - музыкальный коллектив, играющий танцевальный джаз. Ансамбль
    обладает неповторимым звучанием, сочетающим в себе драйв и позитивное настроение
    фанка и соула, мощную энергетику ритм-н-блюза, стильный лаунж и проникновенные
    баллады. Сейчас группа представляет фанковую программу, в которой есть и авторская
    музыка, и композиции икон этого стиля, и неожиданные прочтения мировых хитов.
  verified: true
  created: '2011-09-20'
