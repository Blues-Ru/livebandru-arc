  text: 'Захар Май знаменит мощной гитарной игрой и красивым пением. стиль описать
    тяжело - оно и реггей, и русское-цыганское, и танцевальное-драйвовое, но - одна
    гитара, и один голос. все хвалят.


    песни пишет неприлично хорошо, но очень мало - поэтому, играет не только свое,
    a и вообще все, что нравится - и тоже, до смешного качественно.


    родился в 1969 в Харькове, в 1988 уехал с семьей в Америку, в 2002 вернулся в
    Россию - и с тех пор живет между Москвой и Питером. нигде никогда ничему не учился,
    ибо умный и ленивый.


    в Штатах работал программером, в России некоторое время работал вокалистом группы
    DDT - потом забросил и это, с тех пор несколько раз в месяц играет сольные концерты
    - сходите, если попадете. записывается дома, иногда довольно удачно.


    не пьет алкоголь, не гуляет с женщинами. большой, страшный, всех кусает. сейчас
    записывает три песни МакSим одновременно - ему нравится.'
