  text: Залив Кита существует с 1998 года, базируется в Москве. Играет на грани смешения
    стилей ямайской, афро-кубинской, балканской музыки и городского романса. Лидер
    коллектива - Иван Бурлачко-Шумидуб (гитара, вокал). Гитарист Алексей "Мукусу Це-це"
    Самойленко - постоянный участник и генератор музыкальных идей. Иван Трофимов -
    продюсер и автор текстов. За время своего существования коллектив записал альбом
    "Хорошо", а также музыку к мультфильму "Элька и звездный почтальон".
