  header: ZebraWood Blues Band
  text: 'The ZebraWood - по-настоящему классная группа, в исполнении которой даже
    самые привычные хиты 60х-70х обретают абсолютно новое звучание. Драйв и энергетика
    этих парней завораживает и их хочется слушать снова и снова!


    Группа основана в 2017 году музыкантами выступавших на клубной сцене Санкт-Петербурга
    и России. В основу репертуара положены хиты стиля блюз-рок таких исполнителей
    как: Jimi Hendrix, Stevie Ray Vaughan, Gary Moore, Eric Clapton, B.B. King и новых
    течений Rival Sons, Radio Moscow.'
