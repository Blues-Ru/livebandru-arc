  header: '"Зимавсегда": презентация нового состава и альбома "Доброжелатель"'
  text: 'Музыкальный коллектив "Зимавсегда" был образован в 2009 году в Санкт-Петербурге
    и стал единственным, пожалуй, открытием петербургской клубной сцены 2010 года,
    оказавшегося таким редким на настоящую откровенность. Отправной точкой в истории
    группы стал релиз дебютного альбома "Родилась Сегодня", который был размещен в
    сети для свободного скачивания. В течение прошлого года группа успела многое -
    c успехом презентовать дебютный альбом в культовых московских "16 Тоннах", принять
    участие в фестивалях Urban Sound 2010 (Москва), Baltic Music Fest 2010 (Санкт-Петербург),
    "Индюшата-2010" (Москва), занять первое место в слушательском голосовании программы
    Андрея Бухарина "Уроки Русского" на радио Maximum, стать номинантом премии Артемия
    Троицкого "Степной Волк" в разделе "Дебют".


    Но пришла пора двигаться дальше. Летом на студии Сергея Наветного "ИнтерЗвук"
    музыканты приступили к записи своего второго альбома с рабочим названием "Доброжелатель".
    Сейчас в "доброжелательной" работе находятся десять песен, каждую из которых правильнее
    было бы назвать историями, личными ощущениями их автора о происходящем вокруг
    - печальном и радостном - у человека тонко чувствующего мир, вдохновение появляется
    в самых неожиданных состояниях. Ведь, согласитесь, грусть тоже может быть светлой
    и очищающей. По настроению он получается даже лиричнее и однороднее первой пластинки,
    и, кто знает, может быть, долгая зима навеет новые теплые мысли, что-то изменится,
    и к выходу альбома песен в нем станет больше, чем предполагалось изначально.


    "Слово "доброжелатель" кажется мне очень глубоким и в нынешнем лексиконе, мягко
    говоря, недооцененным, - говорит Евгений Кубынин - певец, композитор и автор текстов
    "Зимавсегда". - Когда я начинал писать альбом, хотелось, чтобы он вышел в духе
    самых удачных вещей с первой пластинки - по крайней мере, по настроению. Сейчас
    получается, что его содержание - это то, как я ощущаю себя теперь, нечто вроде
    творческого отчета о состоянии души и ее переживаниях. Для меня главное - дарить
    публике другие ощущения, делиться энергетикой, а когда я пою, прежде всего, сам
    получаю от этого ни с чем не сравнимое удовольствие. Ведь музыка - настоящая отдушина
    от реальности, способ заглянуть чуть дальше, чем может проникнуть взгляд, попасть
    в другое состояние и, может быть, навсегда измениться. А когда это у нас получается,
    значит, все, что мы придумали, - не зря. И кому-нибудь это обязательно нужно.
    И до чуда осталось совсем чуть-чуть".


    25 февраля, Санкт-Петербург, клуб "Зал Ожидания": презентация нового состава и
    альбома "Доброжелатель" группы "Зимавсегда".


    Билеты уже в продаже.


    "Зал Ожидания": clubzal.com'
