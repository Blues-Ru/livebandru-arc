  text: 'ZOE SCHWARZ - лидер-вокалист, ROB KORAL - гитарист и композитор группы Zoe
    Schwarz Blue Commotion, одной из самых заметных блюзовых групп на британской сцене.
    И группа, и вокалистка Зои Шварц - многократные номинанты на British Blues Awards
    и другие престижные британские и европейские блюзовые премии. В феврале 2018 и
    группа, сама Зои - вновь номинированы на новую награду UK BLUES Awards''2018.


    За неполных семь лет группа выпустила семь альбомов и три EP, восторженно принятных
    и критиками, и публикой, каждый из которых достигал высших строчек в рейтинге
    IBBA (Ассоциации Независимых Радиовещателей Британии)


    Критик журнала Blues Matters! написал о них: "ZSBC за последние пять лет произвели
    форменную революцию на британской блюзовой сцене, освежив жанр собствнным песенным
    материалом и новаторскими аранжировками, а Зои - это просто чудо!"


    Это - их первый визит в Россию. Не пропустите!'
