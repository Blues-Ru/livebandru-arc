  text: 'АРТ-КАФЕ "ЭТРЕ"


    В декабре 2011 года на карте Москвы появилось место, которому суждено было стать
    особенным. И дело не только в его уникальном расположении - пять минут от Храма
    Христа Спасителя и десять шагов от Медиа-Арт Музея.


    И не только в отличной авторской кухне: наш шеф-повар обладает удивительной гастрономической
    фантазией, а бармены угощают гостей вкуснейшими коктейлями.


    Прежде всего, арт-кафе "Этре" отличает от других неповторимая атмосфера, созданная
    необычайной концентрацией творческого духа.


    Здесь звучит живая музыка, представлены работы талантливых художников, фотографов,
    скульпторов.


    А на нижнем этаже - в уютном "Арт-подвале Этре" - демонстрируются фильмы: от артхауса
    и классики до современных шедевров кинематографа.


    Здесь же проходят театральные вечера: спектакли, скетчи, этюды от известных актеров,
    режиссеров и их учеников, а также литературные чтения, мастер-классы, музыкальные
    гостиные.


    Nota Bene: наши цены вас тоже приятно удивят.'
