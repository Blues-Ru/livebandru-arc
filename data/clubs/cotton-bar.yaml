  text: 'Шумный и дерзкий Новый Орлеан, ставший колыбелью зарождения джаза, по сей
    день заставляет трепетать человеческие сердца. Но как не крути, далеко не каждый
    житель весьма известной нам с вами планеты может позволить себе оказаться в самом
    сердце столь манящего и восхитительного мира джазовых и блюзовых музыкантов.


    Но разве это может стать препятствием на пути истинных любителей живого джаза
    и блюза? Как нельзя кстати, в июне 2007 года в центре Днепропетровска открылось
    заведение с весьма незаурядным названием – "Cotton Bar". Одно из самых ярких и
    отличающихся своей индивидуальностью мест, где каждый может прикоснутся к частичке
    джазовой культуры.


    "Cotton Bar" – это то место, где к Вам приходит Америка, если вы не можете прийти
    к ней. В деталях интерьера прослеживается атмосфера 50-60 х годов 20 века.


    Концертные программы музыкантов, дружеская, располагающая к себе атмосфера – это
    всего лишь тысячная доля того, что можно сказать о "Cotton-bar". Захватывающие
    мотивы Джаза и Блюза, изумительная и абсолютно оригинальная кухня, не имеющая
    аналогов и внутреннее ощущение того, что вы находитесь именно там, где должны
    быть – все это "Cotton Bar".'
