  header: Дом архитектора Жоголева - кафе, клуб и мастерская
  text: 'Настоящая творческая кухня без столичного снобизма кипит в нашем городе.
    Галерея, клуб, кофейня, музыкальный салон и Дом архитекторов под одной крышей.
    Скажете, что же это такое? А кто сказал, что культурное пространство одноклеточно?


    В формате нашего города открытие галереи – это авантюра. Это имиджевый бизнес,
    в котором на карту ставятся не деньги, а идея и репутация. И "Дом архитектора
    Жоголева", появившийся в первую очередь как галерея, не проиграл не по одному
    из критериев. На сегодня это одна из самых известных event-площадок достойного
    уровня в Твери. Галерея – место проведения художественных выставок, акций и презентаций
    постепенно превращается в творческий и деловой клуб. Лейтмотивом на этом фоне
    звучит кафе с тщательно подобранным репертуаром музыкального салона, лучшим кофе
    и отличной кухней. В "Дом архитектора Жоголева" может прийти любой: от художника
    до поэта, от студента до бизнесмена – и почувствовать себя членом семьи, живущей
    в одном большом доме искусств.


    Галерея Основные ноты галереи – современный авангард, актуальное искусство, фотография,
    и, естественно, архитектура. Здесь можно увидеть не только тверские фамилии, часто
    выставляются работы приглашенных авторов. Задача – постепенно собрать коллекцию,
    объединить авторов, участвовать в тематических акциях – отечественных и зарубежных.
    Кроме того, придя в "Дом архитектора Жоголева", вы сможете унести не только впечатления,
    но и работы, выставленные на продажу. Эксклюзив.


    Клуб Заглянув в кофейню, можно попасть в настоящий клуб: клуб любителей джаза,
    друзей журнала "Русский репортер", поэтический. И даже более того, стать его постоянным
    членом. В уютных комнатах "Дома Архитектора Жоголева " проводит заседания "Тверской
    деловой клуб" и "Виски-клуб", проводятся пресс-конференции и встречи. А на десерт
    – скоро начнет работать киноклуб, который совместно с Фильмофондом предложит вниманию
    зрителей фильмы, не выходящие на большой экран.


    Кафе Здесь возвращается то время, когда за чашкой кофе собирались поговорить,
    обсудить проблемы и идеи, встретиться с другом, не чувствуя себя посторонним в
    бестолковом грохоте попсы. Кофе, бокал вина и разнообразие блюд всегда будут предложены
    с радушием старых знакомых. В уютном зале можно отметить праздники и юбилеи, корпоративные
    банкеты и замечательные события.


    Музыкальный салон Живая музыка, акустические инструменты и репертуар, формируемый
    выступлениями лучших Российских и зарубежных музыкантов. В основном джаз и классика.
    Но также рок, фолк, авангард и авторская песня.


    Дом архитекторов Архитектурное сообщество не имеет своего Дома архитекторов. Сегодня
    галерея становится архитектурным центром, творческой лабораторией и клубом тверских
    архитекторов. Не всех - только тех, кому это нужно.


    Добро пожаловать в "Дом архитектора Жоголева". Он открыт для Вас ежедневно, с
    утра до полуночи, по адресу бульвар Радищева, 47.


    Узнать музыкальную программу на вечер или предварительно заказать столик можно
    по телефону 34-76-56.


    Клуб находится во дворе дома № 47 по бульвару Радищева в городе Твери.'
