  text: 'Новокузнецкий Губернаторский джаз-клуб "Геликон" - один из крупнейших джазовых
    центров России основан в 1984 году заслуженным артистом России Анатолием Берестовым.


    Джаз-клуб "Геликон", пропагандируя джазовую, классическую и фольклорную музыку,
    на протяжении многих лет является организатором самых различных мероприятий.


    При джаз-клубе работает несколько профессиональных творческих коллективов – джазовый
    оркестр "Новый Кузнецкий биг-бэнд", инструментальный ансамбль "Кузнецкий Диксиленд",
    вокалистка Ольга Юшкова, вокальный квартет Елены Жилиной "Glam jazz quartet".


    На протяжении 24 лет джаз-клуб "Геликон" проводит Международный фестиваль "Джаз
    у Старой крепости" им.А. Берестова, который представил за эти годы звезд Российского
    и мирового джаза. Первый фестиваль был проведен в 1987 году- "Панорама сибирского
    джаза". Гостями джаз-клуба были многие выдающиеся Российские и зарубежные музыканты:
    Бенни Голсон, Куртис Фуллер, Бобби Ватсон, Эдди Гомес, Билли Кобэм, Майк Стерн,
    Игорь Бутман, Давид Голощекин, Даниил Крамер, Михаил Окунь и многие другие. Компакт
    диски и пластинки с записями фестивалей выпускаются Российскими и зарубежными
    фирмами грамзаписи и являются достоянием мировой джазовой культуры.


    Несколько лет назад при джаз-клубе была создана музыкальная джазовая студия, в
    которой учатся более ста пятидесяти детей. "Геликон" стал профессиональным концертно-педагогическим
    центром, занимающимся эстетическим воспитанием детей и взрослых. В декабре 2004
    года Администрация Кемеровской области, оценив заслуги творческого коллектива
    джаз-клуба "Геликон" в развитии музыкального искусства Кузбасса, присвоила почетное
    звание "Губернаторский".


    С мая 2006 года директором Губернаторского джаз-клуба "Геликон" является Ольга
    Юшкова – Лауреат Международных фестивалей, Лауреат Премии Кузбасса.'
