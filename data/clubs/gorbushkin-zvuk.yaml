  text: 'Концертный зал Техномолла "Горбушкин Двор" располагается в секторе H-1 и
    вмещает около 1000 зрителей. Здесь регулярно проходят живые концерты, звучит разнообразная
    качественная музыка от джаза до хип-хопа, проходят презентации и автограф-сессии
    известных и молодых артистов.В теплое время года концерты проводятся также на
    открытой площадке во внутреннем дворе комплекса.


    В рамках проекта на территории "Горбушкиного двора" регулярно проходят музыкальные
    фестивали, где встречаются разные поколения исполнителей и поклонников качественного
    российского рока. Кроме того, здесь организована работа московского Клуба филофонистов.
    А по итогам текущего двадцатипятилетнего юбилейного сезона во внутреннем дворе
    перед входом в Техномолл появится настоящая Аллея славы легенд русского рока.'
