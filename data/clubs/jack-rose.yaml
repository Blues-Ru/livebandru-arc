  text: 'В начале лета "Speakeasy Bar Jack Rose" переехал в центр Москвы. Раньше,
    чтобы попасть в этот уникальный бар, нужно было лично знать его владельцев. Входом
    служила глухая потайная дверь, а секретный адрес сообщали по телефону. Только
    так удавалось погрузиться в уникальную обстановку и атмосферу настоящего "speakeasy"
    бара времен сухого закона. Ценители хорошего алкоголя и фанаты коктейлей в лучшем
    их исполнении - вот кто был завсегдатаем Speakeasy Bar Jack Rose. Что же теперь?


    Больше не надо искать адрес по знакомым, не надо искать на задворках вход. Пятьдесят
    шагов от станции метро Проспект Мира и вы на месте. Теперь "Jack Rose" открыт
    для каждого, кто находится в поисках своего любимого бара в большом городе.


    Джек Роуз сохранил атмосферу "speakeasy" и дружескую обстановку. При этом владельцу
    бара, Геннадию Силиванову, удалось совместить несколько интересных идей в одном
    пространстве. Гостей ждут три просторных зала: уютный и стильный барный, отдельный
    оригинальный для дегустаций и концертный - со своей барной стойкой.


    Каждую пятницу и субботу в баре "Джек Роуз" проходят живые блюзовые и джазовые
    концерты лучших музыкантов Москвы и гастролеров из России и зарубежья. Два-три
    раза в неделю проводятся дегустации элитного алкоголя с подробным рассказом от
    знатаков и амбассадоров, представителей бренда. Кухня работает с утра до позднего
    вечера, готовят там действительно разнообразно и вкусно.


    Владелец бара по-прежнему общается с каждым гостем лично и собственноручно создает
    настоящие шедевры за барной стойкой. И, безусловно, обновленный Джек Роуз уже
    прочно обосновали завсегдатаи, без которых ни один бар никогда не станет атмосферным,
    уютным и родным.


    И вот вам подсказка! Главный секрет Джек Роуз, если хотите проникнуться по-настоящему.
    Не пытайтесь выбрать напиток по меню. Приходите и сразу садитесь за стойку, где
    собрались самые потрясающие мастера барного искусства. Просто скажите бармену
    "Привет! Сделай мне коктейль?", а дальше волшебство начнет происходить само по
    себе. Вы попробуете классические и легендарные напитки, узнаете секреты и историю
    создания каждого коктейля, а в завершение вечера обязательно найдете свой любимый.


    "За лучшими коктейлями в городе только сюда" - так говорит без исключения каждый,
    кто хотя бы раз был в "Jack Rose".'
