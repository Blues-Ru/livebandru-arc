  text: 'Эта история началась в далеком 1996 г. Тогда еще два молодых музыканта Владимир
    Комаров и Дмитрий Галиуллин решили воплотить невероятную по тем временам идею
    – открыть джазовый клуб в Нижнем Новгороде. Это была действительно очень непростая
    задача, ведь тогда в Нижнем Новгороде еще фактически не существовало музыкальной
    среды. Более того, мало кто представлял, что такое джаз вообще. Идея открытия
    такого клуба - заведомо противопоставить себя господствующей ресторанной музыке.


    Так и случилось удивительное открытие первого клуба в Нижнем Новгороде. Результат
    превзошел все ожидания. Это был настоящий взрыв музыки уникальной, неповторимой.


    Молодой клуб свято соблюдал традиции джазовой музыки. Именно это вдохновляло музыкантов
    и слушателей. Это были удивительные концерты джазовых звезд, нижегородских команд,
    настоящие сейшены. Фестиваль на джазовом теплоходе. В сотрудничестве с Вячеславом
    Улановым в городе появилась и прижилась традиция проведения сейшенов почти таких
    же как в Америке!


    Именно здесь отрывались джазовые музыканты до утра, вдохновленные музыкой Miles
    Davis, Lui Armstrong, Charlie Parker.


    Случилось даже невероятное: вдохновленный идеей "Джема", выдающийся джазовый музыкант
    Игорь Бутман открыл "Le Club" в Москве. Можно смело сказать, что именно "Jam Prestige"
    стал диктовать моду на джаз и джазовые клубы в Москве. И прежде всего сюда, к
    нам приезжали корифеи джаза, которых даже в Америке не каждому приходилось видеть
    "живьем". Именно здесь, в "Джеме" они играли свою вдохновенную музыку, которая
    эхом разлеталась по всей России.


    Усилия нижегородских джазовых энтузиастов не пропали даром. Непосильные задачи
    становились реальностью. Многие нижегородские музыканты взяли свой творческий
    старт в Джеме. Произошел всплеск интереса к этой невероятно вдохновляющей музыке.
    Официальные радиостанции и TV-каналы были вынуждены считаться с родившимся музыкальным
    явлением: стали сниматься различные программы.


    Работа клуба была приостановлена в 2006 г. по техническим причинам. Образовавшийся
    музыкальный вакуум продлился до 18 декабря 2010 г. Именно тогда ко всеобщему ликованию
    джазовых музыкантов, любителей джазовой музыки и просто интеллектуальных слушателей
    традиции "Джема" образца 1996 г. были продолжены "Джемом" образца 2010 г., обновленного,
    обогащенного опытом, полным грандиозных творческих планов.'
