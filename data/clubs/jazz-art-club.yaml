  text: 'История "Джаз Арт" Клуба - одного из самых известных и популярных московских
    джазовых клубов началась 30 апреля 1994 г. в здании театра "Вернисаж" на Беговой
    улице. Тогда состоялся концерт ансамбля "Игорь Бриль и новое поколение". С тех
    пор в стенах клуба, где бы он ни располагался, еженедельно проходили концерты
    и jam sessions c участием российских и зарубежных музыкантов. Смысл деятельности
    клуба в отношении музыкантов - дать возможность подняться молодым и поддержать
    пожилых и старых мастеров, в отношении публики - сделать клуб вторым домом, наполненным
    творчеством, дружелюбием, душевным теплом.


    Наряду с регулярной концертной работой "Джаз Арт" Клуб ежегодно проводит крупные,
    ставшие любимыми и традиционными, творческие акции, среди которых Международный
    фестиваль вокального джаза "Джазовые голоса" и "Джаз- Пароход".


    "Джаз Арт" Клуб в содружестве с композитором и музыкантом Юрием Маркиным открыл
    новую страницу в истории мирового джаза, создав театр джазовой оперы, на сцене
    которого было поставлено 8 спектаклей.


    В клубе имеется богатый архив записей наиболее интересных клубных и фестивальных
    концертов, на базе которого создана и развивается эксклюзивная коллекция клубных
    CD и DVD.


    Другое направление деятельности "ДЖАЗ АРТ" КЛУБА - изобразительное искусство.
    За время существования клуба было проведено большое количество персональных выставок
    различных мастеров живописи и фотографии. У клуба есть собственная артколлекция
    живописи, графики, фотографий.


    Важной составляющей, создающей уникальную ауру в клубе, является публика всех
    возрастов. В основном это творческая и техническая интеллигенция, профессиональные
    музыканты, фотографы, художники, представители отечественного и зарубежного бизнеса,
    студенты и школьники.


    Клуб оказывает услуги по организации концертов, музыкального сопровождения различных
    событий, продюссированию выступлений отечественных и зарубежных музыкантов, звукозаписи
    и др.


    Бессменным руководителем "Джаз Арт" Клуба и организатором творческой деятельности
    клуба по всем направлениям является президент клуба Александр Эйдельман.'
