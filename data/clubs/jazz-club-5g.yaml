  header: Jazz It Up
  text: 'В Пятигорске открылся своего рода единственный клуб живой музыки на КМВ!
    Хотя мы и называемся "ДЖАЗ КЛУБ", но в нашем уютном гнездышке нашли теплый прием
    все: от классики до роковых баллад.


    Так что не теряй время, ведь у нас никогда ничего не повторяется. У нас каждый
    вечер и каждую ночь рождается новое. Сама ее величество музыка!


    У нас выступают известные на КМВ группы – джаз бэнд "Опус", "Ниагара", дуэты "Арт
    Классик", "Импро" и "Лэди Джаз", блюзовые команды "Две Луны" и "Эверидж Блюз Бэнд",
    рок группы "Приз", "Crushroad" и конечно Jazz Club Home Band – "Иоанн и Co".


    Оригинальный дизайн выполнен компанией "Симфония камня".


    Вход с 21:00 платный. В билет стоимостью 1000 рублей входит два фирменных коктейля
    "made in JAZZ CLUB" или все, что в нашем меню, на 600 рублей... и, конечно же,
    четыре сессии отличной музыки!'
