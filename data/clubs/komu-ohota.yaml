  header: Ресторан-клуб Кому Охота
  text: 'Ресторан-клуб "Кому Охота" находится в центре Москвы,недалеко от Патриарших
    прудов. Уютный зал ресторана подходит как для частного банкета, так и для корпоративного
    праздника. Vip-зал очень удобен и для деловой встречи и для небольшого банкета.
    В ресторане имеется световое и звуковое оборудование для выступления музыкантов.
    Любители спорта могут посмотреть прямые трансляции за кружкой домашнего пива.
    Каждую пятницу и субботу проходят блюзовые и джазовые концерты, выступления музыкантов
    различных направлений, кулинарные шоу. Адрес: г.Москва, Б.Козихинский пер.д.9\12
    Часы работы: с 11.00 до 23.00 Телефон: +7 (495) 691-85-34'
  verified: true
  created: '2011-02-13'
  is_press_release: true
