  reviewer_token: press-release
  header: Ритм Блюз Кафе
  text: '"Ритм Блюз Кафе" - ПЕРВЫЙ в России музыкальный клуб-ресторан.


    Основан в мае 1998 г., легендарными музыкантами Стасом Наминым и его друзьями
    - Валерием Меладзе и Андреем Макаревичем.


    Культовый клуб с международной репутацией. Фасад здания покрыт огромной уникальной
    фреской из портретов более чем сорока мировых и российских звезд рок-музыки с
    автографами, оставленными некоторыми из них лично. Клуб лично посещали Rolling
    Stones, Ringo Starr, Brian May, Quentin Tarantino,, Status Quo, Depeche Mode,
    Chick Corea, Jean Luc Ponty и др. Редкие фотографии с уникальными автографами,
    музыкальные инструменты, пластинки, вырезки из изданий того времени украшают интерьеры
    залов. Именно в "Ритм Блюз Кафе" прошло официальное открытие музыкального телеканала
    "MTV Россия", after-party первого фестиваля "Максидром" и другие музыкальные события.
    Здесь состоялась неформальная встреча Дмитрия Анатольевича Медведева с российскими
    рок-музыкантами, среди которых: Андрей Макаревич, Алексей Кортнев, Владимир Шахрин,
    Вадим Самойлов и многие другие. Сегодня это одно из немногих мест в городе, где
    можно услышать качественную живую музыку, вкусно поесть и приятно провести время
    в демократической обстановке духа 70-х годов в самом центре. Импровизационные
    джемы и электрические концерты, блюз и джаз, рок''н''ролл, соул. Летняя веранда
    клуба - единственная в Москве с живыми Rhythm&Blues-концертами. Кухня - европейская,
    мексиканская, американская.


    Наш адрес: Староваганьковский пер, д.19, стр.2 Телефон: +7(495)697-78-91'
  verified: true
  created: '2013-06-08'
