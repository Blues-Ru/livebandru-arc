  header: История создания Ритм Блюз Кафе
  text: 'В 1997 году, когда в Москве еще не было клубов и ресторанов, где регулярно
    играла живая рок-музыка, Стас Намин решил воплотить свою давнюю мечту и сделать
    в Москве первый музыкальный клуб с рок-н-ролльным дизайном и "живой" музыкой.
    Еще в 89-м он пригласил к себе в Центр - в Парк Горького, всемирно-известное "Хард
    рок кафе" и оно работало на организованном им международном фестивале в Лужниках.
    Но он решил сделать собственный бренд, придумал оригинальное название, логотип
    и дизайн. Так родился проект московского клуба - "Ритм-Блюз Кафе", который уже
    через несколько лет получил международную репутацию и стал одним из самых известных
    в Москве.


    Начав реконструкцию двухэтажного особняка в Староваганьковском переулке за Библиотекой
    им. Ленина, он пригласил в проект своих друзей Андрея Макаревича, с которым они
    начинали рок-н-ролл еще в 60-х, и Валерия Меладзе, который тогда только начал
    свою карьеру, но сразу стал лучшим представителем отечественной поп-музыки. В
    партнерстве они в мае 1998 года официально открыли первый в стране музыкальный
    клуб-ресторан "Ритм Блюз кафе". Это место стало уникальным и даже единственным
    в мире: профессиональные художники арт-студии Центра Стаса Намина - это и Юрий
    Балашов, и Шура Холоденко, и Ася Николаева - покрыли фасад здания огромной фреской.
    На выполненном в жанре масляной живописи коллаже - портреты более чем сорока мировых
    и российских звезд рок-музыки. Многие из них - Rolling Stones, Ringo Starr, Brian
    May, Quentin Tarantino,, Status Quo, Depeche Mode, Chick Corea, Jean Luc Ponty
    - посетив "Ритм Блюз кафе", оставили на фасаде клуба свои автографы. Редкие фотографии
    с не менее уникальными автографами, также украшают внутренний интерьер клуба (достопримечательностями
    клуба также являются бар на втором этаже внутри розового старинного лимузина,
    идею которого подарил Стасу специально для клуба Квентин Тарантино, а также украшающее
    стену первого этажа единственное в России древо развития отечественной рок-музыки
    с фотографиями всех существовавших и существующих в стране рок-ансамблей). Именно
    в Ритм-Блюз Кафе проходило официальное открытие музыкального канала MTV в России,
    after-party первого фестиваля Максидром и другие важные музыкальные события.


    На открытии "Р.Б.К.", естественно, выступали российские классики жанра - группы
    "Цветы" и "Машина времени", Александр Градский, Борис Гребенщиков, Константин
    Никольский, Владимир Матецкий, Алексей Козлов и многие другие музыканты 60-70
    годов. Специальными гостями открытия клуба были Эрик Белл - гитарист одной из
    самых известный в мире в 70-х группы "Тин Лизи" и бас-гитарист легендарной группы
    "Джимми Хендрикс Экспириенс" Ноэлль Реддинг. Приехавшие в Москву для участия в
    записи на студии SNC альбома "Динозавры" со Стасом Ниминым и другими музыкантами
    60-х. Финалом открытия Ритм-Блюз-Кафе был всеобщий джем.


    Сегодня это одно из немногих мест в городе, где можно услышать очень качественную
    живую музыку, вкусно поесть и великолепно провести время в демократической обстановке
    духа 70-х в самом центре города.


    Ритм-Блюз кафе находится прямо за Библиотекой им. Ленина в Староваганьковском
    переулке, заехать в который можно со Знаменки (последний поворот налево).'
