  text: '"Rosie O''Grady''s" - один из старейших пабов города, трижды за время своего
    существования сменивший адрес и название, сегодня располагается в исторической
    части города в старинном здании на проспекте Мира, буквально в ста метрах от Садового
    кольца и м. Сухаревская.


    Состоит из нескольких залов, которые могут принять в общей сложности до 250 гостей.
    Все залы оборудованы Wi-Fi. Кухня "Rosie O''Grady''s" отличается разнообразием:
    есть и широкий выбор блюд европейской кухни, и специальные блюда от Шефа. Барная
    карта приятно удивит вариантами виски, любителей пенного напитка ожидает выбор
    из 12 сортов пива.


    Весь первый этаж занимает "Ирландский Зал". Днем здесь можно пообедать, а вечером
    собраться большой компанией и продегустировать все сорта ирландского пива или
    посмотреть на больших экранах главные спортивные события, например, игры Лиги
    Чемпионов или Континентальной Хоккейной Лиги.


    Нижний этаж отдан под "Театр Блюза и Рок''н''Ролла им. М.В. Капитановского", в
    котором звучит качественная живая музыка, в основном это блюз, джаз, фанк и рок-н-ролл
    во всех его проявлениях.


    Для деловых переговоров и камерных мероприятий часто используют строгий "Шотландский"
    зал, или "Кельтский" зал с комнатой для бильярда.'
