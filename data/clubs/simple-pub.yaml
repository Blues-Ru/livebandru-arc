    Наши двери всегда открыты для любителей настоящей баварской кухни и ценителей
    качественного европейского пива!


    В нашем ресторане вы сможете приятно расслабиться в большой дружеской компании,
    провести корпоративную вечеринку или организовать деловую встречу. Также мы предлагаем
    большой выбор бизнес-ланчей и постоянно проводим особые мероприятия для наших
    гостей. Ресторан-паб "Simple Pub" работает с 12:00 и до последнего посетителя.'
