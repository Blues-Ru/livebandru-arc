  text: Tommy D lounge bar - гастрономический, светский и музыкальный проект, В его
    основе - тренд жизни легендарного лондонского тусовщика-интеллектуала начала XX
    в. Томаса Дюара. Он был первым рекламщиком, успешным торговцем, светским львом
    и даже шефом лондонской полиции. Этот персонаж сочетал в себе много талантов,
    умудряясь быть одновременно и наивным любознательным первооткрывателем, и редким
    циником, изучая окружающий мир и придумывая свою Вселенную. Этому яркому представителю
    нового типа интеллектуала, охочего до всего самого передового, было мало просто
    остаться в истории. И он добился своего, с успехом провоцируя новые истории -
    до сих пор. В списке его истинных поклонников - Квентин Тарантино и Майкл Оуэн,
    Эдвард Нортон и Вуди Аллен.
