  reviewer_token: press-release
  text: 'Музыкальная Москва уже знает, что такое джаз клуб "Союз композиторов": это
    не просто клуб, это самая авторитетная джазовая площадка столицы на сегодняшний
    день.


    Интерьеры клуба - работа дизайнера Сергея Третьяка, известного такими работами,
    как ресторан "Театро", "Огни", кафе "Скромное обаяние буржуазии", "Black October"
    и многими другими. Великолепная кухня - гастрономическая эклектика с учетом этно-герграфических
    кулинарных трендов. Стоит отметить, что большинство блюд - диетические, они создавались
    вместе со специалистами по рациональному питанию. Клуб располагает богатой коллекцией
    вин и сигар. Клуб оснащен современным звуковым оборудованием с возможностью записи
    живого выступления. Более 110 гостей могут комфортно разместиться в клубе в режиме
    концерта.'
