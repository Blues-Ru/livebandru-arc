  text: 'VietCafe - единственная сеть ресторанов вьетнамской кухни, включающая 7 заведений
    в Москве и 1 - в Рязани. В ресторанах сети часто проводятся концерты джазовых
    исполнителей, которые все желающие могут посетить бесплатно.


    VietCafe удается сочетать, казалось бы, несвязанные понятия: необычную экзотическую
    кухню и приятную музыку, знакомую и близкую каждому гостю. Концерты в ресторанах
    сети - это всегда увлекательное шоу в антураже непринужденного вечера за уютным
    столиком.'
