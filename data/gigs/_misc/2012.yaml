- id: 26903
  date: '2012-04-06'
  time: '19:00'
  band_name: Marimba Plus, Адриан Санчес (Adrian Sanchez) - Испания
  club_name: Дворец Культуры МГТУ им. Баумана
  city_id: 1
  price: 500-1000
  comments: "Дворец Культуры МГТУ им. Баумана\r\n(м. Бауманская, Рубцовская наб.,\
    \ 2/18, тел. (499)-263-62-61)\r\n\r\nБилеты во всех театральных кассах Москвы!\r\
    \n\r\n+++\r\n\r\nКонцерт Viva Flamenco был одним из первых событий официальной\
    \ программы Года Испании в России в 2011 году. И по многочисленным просьбам зрителей\
    \ он вновь прозвучит в Москве, в большом современном концертном зале Дворца Культуры\
    \ МГТУ им. Баумана.\r\n\r\nВ этом проекте соединились традиции фламенко, джазовые\
    \ импровизации, авторская и народная музыка, разноплановый вокал и настоящее музыкальное\
    \ путешествие в ярких красках разных стран. Создав проект \"Этнодрайв\", Marimba\
    \ Plus увлеченно работали с этническими музыкальными традициями разных стран,\
    \ результатом чего в 2012 году стала их новая программа \"Путешествие по миру\"\
    , фрагменты которой также прозвучат в концерте 6 апреля.\r\n\r\nКонцерт \"Viva\
    \ Flamenco!\" - это темпераментное фламенко, зажигающее на сцене глубокие страсти,\
    \ - сама суть испанской души. Самое главное в исполнении фламенко - дуэнде. Это\
    \ слово, буквально обозначающее \"дух\", \"чувство\", \"магия\", передает особое\
    \ состояние, вдохновение исполнителя. Без дуэнде фламенко лишено смысла, ибо не\
    \ может выразить идею настоящей свободы, некогда заложенную вольными таборами\
    \ цыган.\r\n\r\nОдин из лучших исполнителей фламенко - испанец Адриан Санчес (Adrian\
    \ Sanchez) - танцовщик из Гранады, продолжающий традиции \"puro flamenco\", танцовщик\
    \ уникальный, соединяющий в своем творчестве народное фламенко и новые веяния\
    \ культуры фламенко. О своем деле Адриан Санчес говорит так: \" Танец означает\
    \ выражение всех чувств и переживаний души с помощью тела... Танцевать - значит\
    \ уметь выразить себя через движение, в четком шаге, взгляде, через сердце...\"\
    \r\nАдриан в полной мере владеет дуэнде. Его танец делает духовное материальным,\
    \ его тело передает чувства души. Танец Санчеса - это жгучая смесь техники, мужественности\
    \ и внутреннего огня.\r\n\r\nСпециальные гости концерта:\r\n\r\nЮлия Плахотина\
    \ - танцовщица фламенко, президент Российской Федерации Фламенко, руководитель\
    \ комитета фламенко в IDO (International Dance Organization),\r\nАлександр Гайдук\
    \ - гитара;\r\nТатьяна Шишкова - вокал,\r\nГеннадий Лаврентьев - скрипка, табла,\r\
    \nКирилл Россолимо - кахон.\r\n\r\nПодробности:\r\nАнсамбль Marimba Plus www.marimbaplus.ru\r\
    \nОфициальный сайт Адриана Санчеса: www.adrianflamenco.com"
