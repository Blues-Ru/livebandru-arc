  comments: "13 октября в 21.00 - в New Bar (8 марта, 8-д) состоится большой сольный\
    \ концерт дуэта блюзовых гитаристов \"Чемякин & Винтер\"!\r\n\r\nМузыканты снова\
    \ порадуют зрителей программой, состоящей из акустических блюзовых композиций.\
    \ В основе этого вечера - песни мастеров дельта-блюза: Big Bill Broonzy, Robert\
    \ Johnson, Howlin' Wolf, John Lee Hooker и др. Музыка, выдержанная временем, никого\
    \ не оставит равнодушным! Не обойдется и без сюрпризов - в этот раз музыканты\
    \ сыграют в расширенном составе! Вместе с ними на сцену выйдет ритм-секция! Вечер\
    \ обещает быть жарким и интересным!\r\n\r\n\"Чемякин & Винтер\" - акустический\
    \ дуэт профессиональных гитаристов из Екатеринбурга. В 2011 г. музыканты стали\
    \ участниками международного фестиваля \"Блюграсс на Уральских горах\". В июле\
    \ 2012 г. стали организаторами летнего блюзового концерта-фестиваля \"Чемякин,\
    \ Винтер и друзья\". На концертах музыканты всегда создают непринужденную обстановку,\
    \ вовлекая зрителей в происходящее действие.\r\n\r\nБлюз - это всегда особая уютная\
    \ атмосфера, своеобразный музыкальный разговор между близкими по духу людьми.\
    \ \r\n\r\nПриходите, мы вас всех очень ждем!\r\n\r\nЧиВ \r\n\r\nВход - 100 р.\r\
    \nАдрес: (8 марта, 8-д, вход со двора)\r\n\r\nСтраница встречи: http://vk.com/event43603701"
