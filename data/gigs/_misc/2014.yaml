- id: 42855
  date: '2014-04-24'
  time: '19:00'
  band_id: 684
  band_name: Kamchatka
  band_token: kamchatka
  club_name: Volta
  city_id: 1
  price: 800 руб.
  comments: "Шведское пауэр-трио KAMCHATKA на сегодняшний день является одной из самых\
    \ интересных современных блюз-роковых команд старой школы. Музыка группы представляет\
    \ собой сплав сочного психоделического тяжелого блюза времен Хендрикса и Cream\
    \ со стоунер-роком от Kyuss и прогрессивом от King Crimson, записанный под впечатлением\
    \ от суровой северной природы. \r\n\r\nРазнообразие жанров помогает Kamchatka\
    \ создавать непохожие друг на друга альбомы и избегать самокопирования. На последней\
    \ пластинке особенно заметен этот многостилистический микс, в котором каждый может\
    \ найти что-то свое. Новый релиз, \"The Search Goes On\", был записан, по словам\
    \ музыкантов, на одном дыхании. На альбоме много бородатого блюз-рока а-ля ZZ\
    \ Top, тягучего стоунера, ярких риффов и, конечно же, свежих выразительных соло.\r\
    \n\r\nНа российских концертах поклонники шведов смогут услышать не только композиции\
    \ с нового альбома, но и лучшие песни Kamchatka. Любители тяжелого блюза и атмосферного\
    \ психоделик-рока услышат и почувствуют все то, за что любят эту музыку."
