  comments: "финалист конкурса \"УСАДЬБА.ДЖАЗ 2011\"\r\n\r\nОСИПОВ BAND (джаз, фьюжн,\
    \ саксофон) \r\n\r\nАнатолий Осипов - тенор и сопрано саксофоны\r\nНаталья Скворцова\
    \ - фортепиано\r\nАлексей Заволокин - бас-гитара\r\nКонстантин Войнов - барабаны\r\
    \n\r\nОСИПОВ BAND - дебютный проект саксофониста Анатолия Осипова. Основные ингредиенты\
    \ на творческой кухне молодого композитора - современный джазовый фьюжн с элементами\
    \ фанка, госпела и классики. В искренней музыке Анатолия удачно сочетаются творческий\
    \ поиск и верность традициям, энергичные боевики и глубокие баллады. \r\n\r\n\
    Анатолий Осипов родился 10 июля 1987 г. в Самаре.  В 2006 г. он окончил теоретическое\
    \ отделение музыкального училища им. Д.Г.Шаталова и собирался продолжить образование\
    \ в Московской консерватории. Все изменило знакомство с джазовой музыкой. Анатолий\
    \ принялся осваивать саксофон и поступил на эстрадно-джазовое отделение Московского\
    \ Государственного Университета Культуры и Искусств (МГУКИ). \r\nВскоре у молодого\
    \ музыканта появились первые собственные композиции, и осенью 2010 г. Анатолий\
    \ приступил к формированию ансамбля. Композиции Анатолия Осипова пришлись джазовой\
    \ аудитории по вкусу. \r\n\r\nВ апреле 2011 г. группа ОСИПОВ BAND стала финалистом\
    \ престижного конкурса молодых исполнителей \"Усадьба Джаз\", а совсем недавно\
    \ группа (причем в экспериментальном составе!) с успехом выступила на не вполне\
    \ джазовой площадке фестиваля \"Пустые Холмы\".\r\n\r\nНа этом концерте саксофониста\
    \ Анатолия Осипова и барабанщика Константина Войнова поддержат более опытные коллеги\
    \ - хорошо известные джазовым слушателям  басист Алексей Заволокин и Наталья Скворцова\
    \ (клавишные инструменты). \r\nНачало - в 21:00. Вход свободный.\r\n\r\nГруппа\
    \ ОСИПОВ BAND \"в контакте\" - http://vkontakte.ru/club21904856\r\n\r\n/home.php?sk=group_148110538579065&ap=1\r\
    \nПосмотреть видеоролик можно на ютубе: http://www.youtube.com/watch?v=VFGaHrbXLwg\r\
    \nПослушать: http://osipovband.kroogi.com"
- id: 20622
  date: '2011-07-12'
  time: '21:00'
  band_id: 502
  band_name: Живые Люди
  band_token: livepeople
  club_id: 132
  club_name: ArteFAQ
  club_token: artefaq
  price: бесплатно
  comments: "ЖИВЫЕ ЛЮДИ (джаз, фьюжн) \r\n\r\nНаталья Скворцова - фортепиано\r\nЮрий\
    \ Севастьянов - тенор и сопрано саксофоны\r\nМарк Гайдар - контрабас\r\nПетр Талалай\
    \ - барабаны\r\n\r\n\"Живые Люди\" - это не совсем джаз. В первую очередь - это\
    \ авторская музыка Натальи Скворцовой, известного московского джазового композитора\
    \ и импровизатора, осмысленная, прочувствованная, и, в джазовом смысле, переработанная\
    \ ее друзьями и коллегами не менее известными исполнителями Москвы, которые при\
    \ этом остаются живыми людьми. Творческие пути этих музыкантов соединились весной\
    \ 2009 года. Каждый пришел в коллектив со своим опытом, кто-то до этого играл\
    \ фьюжн, фанк, академическую музыку, джазовую традицию и т.д. Но главное - у всех\
    \ было желание добиться традиционными средствами нетрадиционного звучания.\r\n\
    У коллектива все получилось. Их музыка тонкая, нетривиальная, красивая и изящная.\
    \ Она наполнена не только эмоционально, но и образно. Это поднимает мастерство\
    \ музыкантов еще выше. Так высоко, как только может унести вас их музыка.\r\n\r\
    \n\"Совершенно неважно, называть это словом \"джаз\", или \"не джаз\", или каким-то\
    \ еще словом... слышишь... видишь... чувствуешь что-то красивое, и стараешься\
    \ его ухватить за хвост и попытаться воплотить в реальную действительность любыми\
    \ известными и неизвестными тебе способами. Джазовые музыканты - наиболее грамотные,\
    \ универсальные музыканты. Это - люди, которые умеют больше всех, знают больше\
    \ всех, это люди, которые могут играть по нотам, могут - без нот, люди, которые\
    \ могут быть свободны, и одновременно дисциплинированны. Это - просто какие-то\
    \ свободные, живые люди.\" (Наталья Скворцова)\r\n\r\n\"Ансамбль существует уже\
    \ около двух лет, до этого было множество экспериментов, и с музыкантами, и с\
    \ разными стилями, но всегда это оставалась живая очень музыка. Мы очень долго\
    \ пытались определить, вообще, там, стиль или направление, с приставкой \"джаз\"\
    , или без приставки \"джаз\", но в итоге мы так и не пришли к какому-то общему\
    \ решению, как это назвать. Вот. Вообще, наверное, в народе это скорее назовут\
    \ авторским джазом.\" (Юрий Севастьянов)\r\nЯ думаю, что эта музыка может быть\
    \ доступна если на всем, то, ну... большому проценту людей. И вот наша задача\
    \ ее продвигать в массы, в том числе... вот. Думаю, то, что у нас, да и вообще\
    \ в современном мире, такая ситуация сложилась, что это стало такой элитарной\
    \ музыкой, но это, на мой взгляд, неправильно. Джаз - тоже несложная и доступная\
    \ музыка, особенно если так играть: доступно.\" (Марк Гайдар)\r\nНачало - в 21:00.\
    \ Вход свободный.\r\nПосмотреть видеоролики и послушать аудио можно на официальном\
    \ сайте группы ЖИВЫЕ ЛЮДИ - http://livepeopleband.ru/"
