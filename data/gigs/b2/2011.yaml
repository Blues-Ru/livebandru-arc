  time: '21:00'
  band_id: 272
  band_name: Inna World
  band_token: inna-world
  club_id: 40
  club_name: Б2
  club_token: b2
  price: бесплатный
  comments: "ВЕЧЕР СТАНЕТ ЖАРКИМ,\r\nКАК ТОЛЬКО ОНА СКАЖЕТ СВОЕ ПЕРВОЕ \"Ju-u-ust\
    \ le-eave it to me!..\"\r\nА КОГДА ЗАПОЕТ ЭТО: http://www.youtube.com/watch?v=Sl1PQLBikmg\r\
    \nТО ПОТОЛОК КУЛТРЕЙНА И ВОВСЕ ПОДНИМЕТСЯ К ЗВЕЗДАМ!\r\n\r\nВ начале 2000-х критики\
    \ называли Инну \"русской Дженис Джоплин\". Но, пожалуй, это не совсем справедливо.\
    \ И хотя, исполняя на концертах джоплиновскую \"Ball and chain\", Инна всегда\
    \ передает аплодисменты куда-то туда, вверх, в ноосферу, пожалуй, определить Инну\
    \ только лишь как \"русскую Джоплин\" было бы узко.\r\nСама она считает \"мамами\"\
    \ и Эрту Китт, и Софи Такер, и Эдит Пиаф. Нет границ, нет рамок - сплошные сюрпризы,\
    \ поэтому сейчас в этом проекте блюзы, а кто знает, что будет у нее в следующем?\r\
    \n\r\n\"Inna World\" - парадоксальный и выразительный мир не_только_блюза. Новая\
    \ программа включает в себя каверы мировых хитов от 20-х до 90-х и собственные\
    \ композиции. Для солистки проекта Инны Тудаковой сегодня нет песен, которые невозможно\
    \ спеть. Несколько языков, жанровые переплетения - все это внешние проявления\
    \ INNA WORLD, внутренние можно уловить только сердцем.\r\n\r\nВ новой программе\
    \ рядом джоплиновская \"Ball and Chain\" и блюз-посвящение \"Джанис\", почти уже\
    \ \"ветхозаветная\" холлидеевская \"These Foolish Things\" и роскошная, как сама\
    \ Faye Adams, \"Shake a hand\", пружинящая \"Say, say, say\" Джексона/Маккартни\
    \ и жаркий блюз \"Снег\", от кокеровской \"Summer in the city\" летят искры, а\
    \ \"Ain't No Sunshine\" так вообще никто никогда не пел.\r\n\r\nВХОД - СВОБОДНЫЙ!"
