- id: 46369
  date: '2014-09-11'
  time: '20:30'
  band_id: 251
  band_name: Robert Lighthouse
  band_token: robert-lighthouse
  club_id: 5
  club_name: B.B.King
  club_token: bbking
  price: 1000 руб.
  comments: "Robert Lighthouse - это американский блюзмен, творчество которого престижный\
    \ журнал Blues Review охарактеризовал как \"совершенное мастерство\".\r\n\r\n\
    На сегодняшний день Lighthouse является одним из самых ярких представителей дельта\
    \ блюза* на североатлантическом побережье океана.\r\n\r\nНа уникальный стиль музыканта\
    \ оказали сильное влияние Muddy Waters, Dr. Ross, Elmore James, John Lee Hooker\
    \ и Jimmy Hendrix. Любопытно, что многие зарубежные критики в своих отзывах не\
    \ раз писали о Robert'е \"Творчество Lighthous'а - это то, что делал бы сегодня\
    \ Jimmy Hendrix, будь он жив\".\r\n\r\nСвои первые гастроли по США и Европе Robert\
    \ Lighthouse проехал в составе группы легендарного гармошечника Charlie Sayles.\
    \ Через некоторое время после начала сольной карьеры Lighthouse попал в поле зрения\
    \ лидера музыкальной индустрии Вашингтона Wayne Kahn, который помог записать первый\
    \ альбом музыканта \"Drive - Thru Love\".\r\n\r\nПоследний альбом Robert'а (\"\
    Democracy BLVD\") вышел в 2009 году, и так же как \"Deep Down In The Mud\" 2007-го\
    \ года получил очень хорошие рецензии от самых влиятельных зарубежных музыкальных\
    \ критиков.\r\n\r\nRobert Lighthouse - постоянный участник престижных блюзовых\
    \ фестивалей в Скандинавии и США. За свою долгую творческую жизнь успел поработать\
    \ со многими выдающимися блюзовами музыкантами, среди них такие звезды, как Robert\
    \ Cray, Taj Mahal, Mick Fleetfood, David Lindley, John Hammond, музыканты Muddy\
    \ Waters и Howlin Wolf.\r\n\r\nRobert Lighthouse успешно выступает в Америке и\
    \ Европе. Первый его тур в России состоялся в 2008 году, а уже в мае 2012 он отыграл\
    \ в нашей стране свой 100-й, юбилейный, концерт.\r\n\r\nRobert Lighthouse выступал\
    \ в России на блюзовых фестивалях - фестиваль в клубе Jagger (Спб, январь 2010\
    \ г.), фестиваль \"Архангельск - блюз\" (май 2010 г, 2011 г., 2012 г.).\r\n\r\n\
    Более полную информацию о музыканте можно найти на сайте www.robertlighthouse.com"
