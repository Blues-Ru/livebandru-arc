- id: 43320
  date: '2014-04-23'
  time: '20:30'
  band_id: 109
  band_name: The Backstage
  band_token: backstage
  club_id: 5
  club_name: B.B.King
  club_token: bbking
  price: 400 руб.
  comments: "Одна из первых российских групп, ориентирующихся на формат джем-бэнда\
    \ (jam bands) - то есть на синтез блюза, фанка, соула, рока и т.п. с ярко выраженным\
    \ импровизационным началом.\r\n\r\nВ 2007 году в составе группы Николая Арутюнова\
    \ Backstage аккомпанировали легенде британского рока Питу Брауну в ходе его московских\
    \ гастролей. (Браун - соавтор таких хитов Cream, как White Room, Politician и\
    \ Sunshine Of Your Love, а также бессменный соратник Джека Брюса, продюсер и музыкант).\r\
    \n\r\nВ 2008 году Backstage записали альбом Take Cover, где хорошенько \"оторвались\"\
    \ на любимых каверах :) Недавно группа к великой всеобщей радости добавила в состав\
    \ клавишника и в настоящее время работает над оригинальным материалом для второй\
    \ пластинки.\r\nСостав:\r\nЮрий Новгородский - гитара, вокал \r\nЕвгений Глухов\
    \ - бас, вокал\r\nДмитрий Фролов - ударные, перкуссия"
- id: 43322
  date: '2014-04-25'
  time: '20:30'
  band_id: 364
  band_name: Валерий Каримов
  band_token: valery-karimov
  club_id: 5
  club_name: B.B.King
  club_token: bbking
  price: 500 руб.
  comments: 'Валерий Каримов родился в городе Кыштыме Челябинской области, расположенном
    в окружении Уральских гор и живописных озер. Свою музыкальную карьру Валерий начал
    в качестве бас-гитариста в местной любительской группе. Вскоре он получил приглашение
    работать в профессиональной группе "Сплав" Владимира Батракова (г.Челябинск),
    которая играла джаз-рок и фьюжн, и по духу была близка творчеству американских
    групп "CHICAGO" и "EARTH, WIND & FIRE". Именно в этот период времени Валерий стал
    лауреатом международного телевизионного конкурса в г.Юрмале. Одновременно в душе
    музыканта зрело желание петь в эстетике рока, поскольку именно этот жанр был всегда
    ближе ему по духу. Это стремление Валерий отчасти реализовал, работая в известной
    московской группе "РОК-АТЕЛЬЕ" Криса Кельми. В начале 90-х годов часть музыкантов
    иммигрировали за рубеж. Вскоре Валерий создает свою группу и записывает с ней
    альбом "Как пламя и лед", который соединил в себе 2 направления: блюз-рок и прогрессив-рок.
    За рамками альбома группа экспериментировала в области фанка и альтернативы. Последующие
    6 лет Валерий работал в качестве вокалиста в легендарном джаз-роковом ансамбле
    "АРСЕНАЛ" Алексея Козлова, где исполнял композиции в стилях: прогрессив-рок, фьюжн,
    фанк и джаз. Параллельно с работой в "АРСЕНАЛЕ" Валерий создает новую группу -
    Группу Валерия Каримова Специально для клуба "ФОРТЕ" коллективом были подготовлены
    три различные программы: "АКУСТИКА" ,"ДЖАЗ", "БЛЮЗ & РОК". Джаз-программа включает
    песни, которые исполняли FRANK SINATRA, ROAD STEWART, GEORGE MICHAEL, рок-программа
    - LED ZEPPELIN, КING СRIMSON, DEEP PURPLE, QEEN, PAUL McCARTNEY, WALLFLOWERS ,
    AUDIOSLAVE, RADIOHEAD, COLD PLAY, A-HA, EXTREME, блюз - ERIC CLAPTON, JOHNNY LANG
    и другие мировые звезды. Кроме этого, группа исполняет свои авторские русско-
    и англоязычные произведения.'
