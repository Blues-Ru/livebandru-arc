- id: 77479
  date: '2019-03-17'
  time: '20:30'
  band_name: Milena Barrett (Australia)
  club_id: 5
  club_name: B.B.King
  club_token: bbking
  price: 1000-2000 руб.
  comments: Милену Барретт можно назвать одной из самых многогранных вокалисток на
    современной блюзовой сцене. Одни музыкальные критики, описывая ее голос, говорят,
    что так могла бы петь дочь Etta James и Steve Marriot. Другие пишут, что вокал
    Милены сочетает в себе традиционное звучание дельта-блюза и соула и в то же время
    эстетику парижского кабаре 20-х годов. Третьи считают, что музыка Барретт – это
    микс таланта Janis Joplin, бунтарского духа Amy Winehouse и чувствительности Adele.
    Но несмотря на любые сравнения и попытки описать творчество Милены Барретт в знакомых
    образах и ассоциациях, и профессиональные музыкальные критики и обычные любители
    музыки сходятся в одном – это совершенно уникальное явление на современной блюзовой
    сцене, удивительный талант, который просто невозможно уместить в какие-то рамки.
    Где бы не выступала певица – в Лондоне, Мемфисе, Сиднее или Москве – каждый раз
    для слушателей это незабываемый экспириенс, который они готовы переживать снова
    и снова. В 2018 году Милена выиграла австралийский отборочный этап International
    Blues Challenge и в январе 2019 года примет участие в финале одного из самых престижных
    блюзовых конкурсов в мире.
