    блюзовых команд. Музыка бэнда завораживает неповторимой энергетикой всех композиций.
    Именно поэтому Modern Blues Band – это не просто популярная блюзовая команда,
    участник рок и блюз фестивалей Грузии, России, Дании и других стран – это группа,
    услышав музыку которой один раз, хочется слушать снова и снова. Ведь блюз в их
