- id: 76807
  date: '2019-02-13'
  time: '20:30'
  band_name: Delta blues
  club_id: 5
  club_name: B.B.King
  club_token: bbking
  price: 500 руб.
  comments: 'Одни их самых известных блюзовых музыкантов в России: Гия Дзагнидзе из
    Modern Blues Band, Михаил "ПЕТРОВИЧ" Соколов (легенда и родоначальник блюза в
    нашей стране)из Hot Rod Band и Сергей Спицын, сотрудничающий чуть ли не с половиной
    Московских блюзовых команд собрались вместе для возрождения Дельта-блюза (англ.
    Delta blues) - одного из самых ранних стилей блюза. Название его происходит от
    области, где он зародился - Дельты Миссисипи - болотистой местности на северо-западе
    штата Миссисипи (не путать с дельтой реки Миссисипи, расположенной южнее). Название
    "Дельта" скорее не географическое, а историко-культурное понятие. Это место, где
    после расчистки от лесов и осушения болот стали повсеместно выращивать хлопок.
    На бескрайних пойменных полях трудились сотни тысяч рабов, а потом полурабов.
    Основными инструментами, используемыми в дельта-блюзе, являются гитара и губная
    гармоника. Дельта-блюз был впервые записан в конце 1920-х.'
