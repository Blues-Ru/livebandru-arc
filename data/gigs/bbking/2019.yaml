- id: 76814
  date: '2019-02-23'
  time: '20:30'
  band_name: Денис Мажуков
  club_id: 5
  club_name: B.B.King
  club_token: bbking
  price: 1000 руб.
  comments: Денис Мажуков – российский пианист, певец и композитор, рождённый играть
    и петь традиционный рок-н-ролл, буги-вуги и ритм-н-блюз на международном уровне
    именно так, как это и следует делать по самым высоким, классическим стандартам.
    Во всем мире его называют "российским королем рок-н-ролла". Денис – уникальный
    музыкант, способный на своих концертах раскрыть не только целую рок-н-ролльную
    эпоху 50-х годов, а также буги-вуги 30-х, ритм-н-блюз 40-х, кантри 60-х годов
    и множество стилей и жанров, рожденных в те золотые для становления музыки времена!
    Денис Мажуков успешно выступает в США и Европе – в клубах, в концертных залах
    и на фестивалях рок-н-ролла, кантри и джаза. Более того, Мажуков первый и единственный
    музыкант из России, которого регулярно приглашают выступать на европейские международные
    фестивали буги-вуги, как пианиста именно в этом уникальном жанре. О нем отзываются
    как о беспрецедентном виртуозе рок-н-ролльной игры. Филигранная техника, качественный
    звук, колоссальный темперамент, взрывной и в то же время очень музыкальный вокал,
    безупречное чувство стиля – отличительные свойства артиста.
