- id: 79129
  date: '2019-05-25'
  time: '20:30'
  band_name: Маккинли Блэк (США-Германия), Владимир Спиридонов (гитара, Германия)
  club_id: 5
  club_name: B.B.King
  club_token: bbking
  comments: Вход 800 рублей. Американская певица, гитаристка, автор и исполнитель
    собственных песен, Маккинли Блэк сегодня является одной из самых заметных фигур
    на берлинской сцене. Ее сильный и одновременно проникновенный голос мгновенно
    приковывает внимание и остается с тобой навсегда. Маккинли родилась в Массачусетсе,
    США, и, подрастая, впитала в себя многогранную музыкальную культуру родной страны.
    Поэтому неудивительно, что в ее творчестве органично переплелись многочисленные
    жанры, составляющие понятие "американа" - белый фолк, кантри, блюз, соул и другие.&nbsp;Маккинли
    изучала вокал и композицию в колледже, а потом отправилась в дорогу. Изъездив
    Соединенные Штаты вдоль и поперек, она выступала вместе с такими известными артистами
    как Трэйси Чапмен, Эллис Пол и Мартин Секстон. В конце 90-х Маккинли перебралась
    в Европу, и именно там ее творчество нашло настоящее признание. Уже долгое время
    она живет в Берлине, где выступает на самых престижных площадках, таких как Siegessaule,
    Checkpoint Charlie и The Brandenburger Tor.&nbsp;Она сотрудничает с немецкими
    группами направления Ostrock, а также пишет музыку для телевидения, является артистом
    культового лейбла Stockfisch Records - на ее счету шесть альбомов. Маккинли много
    путешествует по миру, и сейчас дает серию клубных концертов в Москве. Специальным
    гостем на них будет ее берлинский коллега и друг, виртуозный гитарист Владимир
    Спиридонов.
