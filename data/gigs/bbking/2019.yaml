  price: 1000-2000 руб.
  comments: <strong>JJ Thames (USA)</strong> МузыкаJJThames– это смесь блюза, госпела,
    фанка и R&amp;B, приправленная ритмами ска и регги. Яркая артистка с прекрасным
    вокалом каждое свое появление на сцене превращает в настоящее шоу. JJ родилась
