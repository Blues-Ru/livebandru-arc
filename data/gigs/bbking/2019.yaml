    джазовом вокале, а также игре на пианино. Девочка впервые вышла на сцену в девять
    лет, а уже в 17 выступала как профессиональная певица. JJ Thames была бэк-вокалисткой
    таких групп, как <strong><a href="https://www.allmusic.com/artist/outlaw-nation-mn0000414119">Outlaw
    Nation</a>, <a href="https://www.allmusic.com/artist/fishbone-mn0000796045">Fishbone</a>,<a
    href="https://www.allmusic.com/artist/israel-vibrations-mn0000776659">Israel Vibrations</a>,<a
    href="https://www.allmusic.com/artist/bad-brains-mn0000075264">Bad Brains</a></strong>
    и выступала на одной сцене с <strong><a href="https://www.allmusic.com/artist/bobby-blue-bland-mn0000081194">Bobby
    "Blue" Bland</a>,<a href="https://www.allmusic.com/artist/peggy-scott-adams-mn0000257181">Peggy
    Scott Adams</a>,<a href="https://www.allmusic.com/artist/willie-clayton-mn0000686522">Willie
    Clayton</a>,<a href="https://www.allmusic.com/artist/denise-lasalle-mn0000199090">Denise
    LaSalle</a></strong> и другими легендарными музыкантами. Дебютный альбом JJ Thames,
    который называется <a href="https://www.allmusic.com/album/tell-you-what-i-know-mw0002615099">Tell
    You What I Know</a> вышел в 2014 году, а в 2018 году певицы закрепила успех диском
    Raw Sugar, который высоко оценили музыкальные критики.
