  band_name: Омар Итковичи & the Russian Bears
  club_id: 5
  club_name: B.B.King
  club_token: bbking
  price: бесплатно
  comments: Омар Итковичи - известный гитарист, который много выступает в США, Латинской
    Америке и России. Им движут две больший страсти - блюз и музыка Боба Дилана. В
    нашей стране Омар известен, в первую очередь, как блюзмен, виртуозно исполняющий
    корневой чикагский блюз. Он организовывал приезд в Россию таких культовых музыкантов,
    как Lazy Lester, Mud Morganfield (Muddy Waters jr.), Phil Guy, James Wheeler и
    сам играл с ними на одной сцене. С 2004 по 2008 годы Omar выступал с одной из
    главных российских блюзовых команд - "Черный хлеб" Алексея Аграновского. Любопытно,
    что при всем этом свою музыкальную карьеру в родном Буэнос-Айресе в 80-х Итковичи
    начинал как раз с исполнения хитов Боба Дилана. Глубоко погружаясь в корневой
    чикагский блюз, Омар никогда не переставал любить и играть музыку Боба Дилана.
    Московская публика отлично помнит проникновенное исполнение дилановской классики
    вроде Like a rolling stone и I'll be your baby tonight - Итковичи всегда находит
    место для одной-двух песен своего кумира.
