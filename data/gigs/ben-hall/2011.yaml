  comments: "18 ноября в пабе \"Ben Hall\" состоится очередной \"Blues Festival\"\
    . В этот раз слушателям будет представлен потрясающий интернациональный американо-израильский\
    \ блюзовый проект SOBO. \r\nМузыканты живут на две страны - Израиль и США, и гастролируют\
    \ по всему миру. Фирменный стиль SOBO - это мощный сплав блюза, рока и фанка,\
    \ дополненный уникальным звуком слайд-гитары Даниэля Кримана. В репертуаре группы\
    \ драйвовые блюз-роковые композиции собственного производства и кавер-версии культовых\
    \ блюзовых песен. \r\n\r\nSOBO (Southbound Train) была образована в 1995 году\
    \ Ассафом Ганзманом и Дэниелом Криманом и с тех пор успела завоевать немало преданных\
    \ поклонников. SOBO Blues Band удостоилась чести открывать концерт Джон Ли Хукера-младшего\
    \ в Телль-Авиве, представляла Израиль на International Blues Challenge в Мемфисе,\
    \ участвовала в российских блюзовых фестивалях \"Дельта Невы\", International\
    \ Blues Festival в Лефортово и многих других."
