  price: 600, 900 руб.
  comments: "22 апреля паб Ben Hall приглашает в гости ценителей блюза. В этот раз\
    \ на сцене появится J.C. Smith (США) - известный блюзовый музыкант, получивший\
    \ высшую престижную награду в 2006 году от калифорнийского \"Bay Area Blues Society\"\
    \ как лучший блюзовый артист года.\r\nПрекрасный гитарист и певец, с шикарной\
    \ энергетикой и харизмой. Начинал как барабанщик в группе \"Back to Back Blues\
    \ Band\", с 2000 года \"перешел\" на гитару.\r\nБольшое влияние на него оказали\
    \ такие мастера как T-Bone Walker, Albert King, Jonni Guitar Walker.\r\nЕго альбом\
    \ Defining Cool номинировался на Грэмми в разделе Лучший традиционный блюзовый\
    \ альбом года.\r\nДругой альбом Pick To Click дошел в национальном хит-параде\
    \ до 25 места, а альбом Thats What Im Talkin about продюсировала еще одна номинантка\
    \ Грэмми Joanna Connor. Гостем на нем был легендарный барабанщик Willie Big Eye\
    \ Smith, который в течении 18 лет играл в группе Мадди Уотерса.\r\nJ.C.Smith гастролирует\
    \ по всему свету - США, Европа, Мексика, вся Южная Америка и пр.\r\nТакже вместе\
    \ с ним выступят блюзмены из Аргентины и Испании - Омар Итковичи и Хосе Пардо,\
    \ уже неоднократно посещавшие Екатеринбург и известные местной аудитории."
