  band_token: crematory
  club_id: 124
  club_name: Ben Hall
  club_token: ben-hall
  price: 850, 1500 руб.
  comments: "Их песни - это миниатюрные черные новеллы с лаконичностью Эдгара По,\
    \ философией Ницше и Кафки, аллюзиями Сальвадора Дали, социальными фантазиями\
    \ Булгакова и откровениями соседа по коммуналке. Одна большая коммунальная квартира\
    \ - это московский андеграунд. Ее жители, герои песен Армена Григоряна, составляют\
    \ сюрреалистический коллаж с сотнями сюжетных линий под полярные звуки от хард-рока\
    \ до джаза, от баллад до этники, от рок-н-ролла до классической музыки.\r\n\r\n\
    Инструментально-аранжировочные сюжеты по разнообразию, динамичностии выразительности\
    \ нисколько не уступают текстовым (а уж на последние,мы давно знаем, Армен Григорян\
    \ один из самых искусных мастеров). Общее настроение перемещается из ритуального\
    \ зала дальше в пекло, а потом снова вернуться в спокойное миролюбивое русло.\r\
    \n\r\nНо любая песня, достигнув кульминации, может обрасти шквальными, артиллерийскими,\
    \ иногда даже припанкованными барабанами и невероятными гитарными пассажами, примоченными\
    \ всеми вообразимыми дисторшнами.\r\n\r\n\"КРЕМАТОРИЙ\" умудрился сделать еще\
    \ один семимильный шаг вперед, оставаясь собой и не пытаясь заигрывать с компьютерно-семплерными\
    \ технологиями. Это, знаете ли, не всем идет."
- id: 27094
  date: '2012-04-13'
  time: '20:00'
  band_name: Александр Ф. Скляр (экс-Ва-Банкъ)
  club_id: 124
