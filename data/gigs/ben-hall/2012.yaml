  price: 1000, 1400, 2000
  comments: "13 апреля в пабе Ben Hall состоится концерт Александра Ф.Скляра\r\n(экс-\"\
    Ва-Банк\"). Со сцены прозвучат лучшие песни за весь период\r\nтворчества Александра,\
    \ а также вещи из последнего альбома 2011 г.\r\n\"Вася-совесть\".\r\n\r\nАлександр\
    \ Ф. Скляр - легенда русского рока, гибкий творец и музыкант, не боящийся и не\
    \ стесняющийся перемен, философ по жизни. Он бросил карьеру дипломата, чтобы стать\
    \ рок-музыкантом. Он был первым человеком\r\nв стране, начавшим продвигать альтернативную\
    \ музыку, и стал основателем движения <<Учитесь плавать>>, давшего жизнь многим\
    \ талантливым исполнителям.\r\nНа сцене Александр Ф. Скляр музыкант, актер и игрок.\
    \ Его концертная программа - калейдоскоп, движение от рока к кабаре, лирическим\r\
    \nбалладам и городскому романсу. На выступлениях Скляра звучат хиты <<Ва-Банка>>\
    \ разных лет, такие как <<Маршруты московские>>, <<Эльдорадо>>, <<За гагарой с\
    \ черным пером>>, <<Пьяная песня>> и многие другие, ставшие визитной карточкой\
    \ Александра на все времена.\r\nОсобое настроение концертам Скляра придает городской\
    \ романс в его исполнении. Это - песни из репертуара Леонида Утесова <<Мишка-одессит>>,\
    \ <<Теплоход>>, <<Одесский порт>> в современных аранжировках, и народно любимые\
    \ - <<Я милого узнаю по походке>>, <<В Кейптаунском порту>>, <<Бомбардировщики>>,\
    \ и, наконец, <<Досуги-Бугги>> Петра Мамонова, <<Не бросай>> группы <<Колибри>>.\r\
    \nВ 2008 году Александр выпустил первый альбом со своим новым составом музыкантов\
    \ <<Песни моряков>>. Через год вышла вторая часть диптиха - <<Песни моряков. Часть\
    \ II>>. А в октябре 2011 года публике был\r\nпредставлен альбом полностью нового\
    \ музыкального материала\r\n<<Вася-Совесть>>. Вобрав в себя лучшее из наработанного\
    \ артистом за 25-летнюю музыкальную карьеру, эта работа прокладывает дорогу в\
    \ будущее. Голос Скляра звучит убедительно, как никогда, а сплоченная\r\nкоманда\
    \ коллег-ветеранов дирижируется опытной рукой продюсерского дуэта Скляр-Белоносов.\
    \ На сцене Александра Ф. Скляра поддерживают\r\nмузыканты-соратники экстра-класса:\
    \ Александр Белоносов - клавишные, Алексей Рыславский - контрабас, Рушан Аюпов\
    \ - баян, Николай Балакирев - барабаны, Денис Скопин - гитара.\r\n\r\nВход 1000\
    \ - 1400 - 2000 р."
