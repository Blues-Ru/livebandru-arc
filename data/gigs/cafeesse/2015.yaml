- id: 53104
  date: '2015-08-22'
  time: '21:00'
  band_name: Вейланд Родд (вокал)
  club_id: 547
  club_name: Эссе Джаз-кафе
  club_token: cafeesse
  comments: "Вейланд родился и вырос в Москве, родители - американские эмигранты,\
    \ волею судеб, повстречавшиеся именно в России. Отец - актер, мать - пианистка\
    \ и композитор, обладательница красивого сопрано. В доме была творческая атмосфера,\
    \ в нем часто собирались известные актеры, певцы, писатели и поэты. \"В такой\
    \ семье невозможно было вырасти равнодушным к искусству\" - делится Родд. Уже\
    \ в раннем возрасте он начал интересоваться итальянским оперным пением, постоянно\
    \ слушал привезенные мамой из Америки пластинки в исполнении Марио Ланца, наизусть\
    \ знал партию каждого инструмента в 1-ом концерте Чайковского. \r\n\r\nПодростком\
    \ стал интересоваться американским джазом, блюзом, соул музыкой в творчестве Луи\
    \ Армстронга, Эллы Фицджеральд, Рэя Чарльза и др. Любил танцевать рок-н-роллы,\
    \ обожал Элвиса Пресли и Пэта Буна. Позже, познакомился с творчеством знаменитых\
    \ исполнителей французского шансона. Был воспитан классической, эстрадной американской\
    \ и французской школой пения, что так благотворно отражается в его творчестве.\
    \ Уже в 20 лет выступал на большой сцене, участвуя в мюзиклах, гастролируя по\
    \ городам с эстрадными коллективами. Выступал как сольно, так и с хорошо известными\
    \ исполнителями, снимался в фильмах. В 80-ых его уже знала широкая аудитория,\
    \ начало 90-ых посветил выездным программам за рубеж. \r\n\r\nОставил шоу бизнес\
    \ 17 лет назад. \"Сценическая жизнь тогда показалась мне уже пройденным этапом\
    \ и, я решил найти себя в других вещах\", - вспоминает Вейланд, - \"Но сейчас,\
    \ музыка снова вошла в мою жизнь, будто бы открыв новое дыхание и, я почувствовал\
    \ желание петь\". В 2011 году с новой программой выступал в клубах Игоря Бутмана\
    \ и в Международном еврейском центре. За годы разлуки со сценой, Родд накопил\
    \ много духовных и эмоциональных сил, расширил диапазон своего голоса. Его мощный\
    \ бас с красивыми обертонами готов радовать Вас снова. Исполняет композиции в\
    \ стиле джаз, джаз-рок, блюз, соул, латино. Мощная энергетика, идущая со сцены\
    \ в зал, яркая индивидуальность и пластика не оставит никого равнодушным."
