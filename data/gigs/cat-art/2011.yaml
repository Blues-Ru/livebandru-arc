  price: 350 рублей
  comments: "Познавательный интерактив для детей и родителей с использованием видео\
    \ на большом экране, концертом настоящей рок-н-ролльной группы и дискотекой.\r\
    \nПеред началом мероприятия зрители рассаживаются на стульях, у детей есть возможность\
    \ устроиться на ковре перед сценой.\r\nВ первой части мероприятия зрители узнают\
    \ о жизни и творчестве Джона Леннона, о группе \"Битлз\" и сольном творчестве\
    \ Джона, о его борьбе за мир.\r\nВесь разговор идет в форме обсуждения с детьми.\r\
    \nКаждый новый факт подкрепляется видеороликом на большом экране 3х4 метра на\
    \ сцене.\r\nВо второй части мероприятия у зрителей будет возможность узнать, как\
    \ устроен звукорежиссерский пульт, как оборудуется сцена для рок-концертов и как\
    \ подключать музыкальные инструменты.\r\nДети смогут пообщаться с музыкантами\
    \ (вопросы из зала - ответы музыкантов) и потанцевать под \"живую\" рок-н-ролльную\
    \ музыку в исполнении питерской группы \"The Yellow Pillow\"!"
