  club_token: cha
  price: 1500-3000
  comments: "From Paris With Love\r\nТак называется самая популярная композиция поп-фьюжн\
    \ группы Dam'nco из Франции, которая 12 мая даст единственный концерт в Москве\
    \ в Центральном Доме Художника на Крымском Валу.\r\nDam'nco - популярнейший коллектив\
    \ Франции, \"новое лицо французского джаза\", как они сами себя представляют.\
    \ В их музыке есть все, чем богата сегодняшняя Франция, страна смешения многих\
    \ культур. Dam'nco это чистый эксперимент, поиск иного в музыке.\r\nПредставит\
    \ Dam'nco московской публике один из лучших барабанщиков мира, основатель и лидер\
    \ этого проекта - Дэмиен Шмитт, выступавший в составах знаменитых Yannick Noah,\
    \ Hadrien Feraud, Alain Caron и великого Jean-Luc Ponty.\r\nДэмиен Шмитт хорошо\
    \ известен российской публике как участник российско-французского проекта Impact\
    \ Fuze с Федором Досумовым и Антоном Давидянцем.\r\nВ составе Dam'nco собраны\
    \ лучшие музыканты Франции - Yann Negritt (гитара), Nicholas Vella (клавишные)\
    \ и Michael Lecoq (клавишные).\r\nВыйдет на сцену в составе Dam'nco и выдающийся\
    \ российский музыкант Антон Давидянц, топовый мировой бас-гитарист, промоутер\
    \ российского тура Dam'nco. Антон Давидянц - музыкант, сотрудничающий с российскими\
    \ и мировыми звездами: Игорем Бутманом, Мариам Мерабовой, Gregory Porter, Virgil\
    \ Donati, Gergo Borlai и многими другими. Из года в год Антон Давидянц знакомит\
    \ российскую публику с самыми значимыми явлениями мировой музыки, организовывая\
    \ туры великих музыкантов, выходя с ними на сцену и проводя аншлаговые мастер-классы\
    \ во многих городах России.\r\nПропустить концерт Dam'nco - нельзя категорически!\
    \ Вас ждет одно из ярчайших музыкальных событий года!"
