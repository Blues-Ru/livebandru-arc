- id: 70443
  date: '2018-02-16'
  time: '19:00'
  band_name: Леван Ломидзе - 25 лет группе "Blues Cousins"
  club_id: 73
  club_name: ЦДХ
  club_token: cha
  price: 1000 руб.
  comments: "16 февраля 2018 года в рамках музыкального фестиваля \"АРТ-Атмосфера\"\
    \ в московском Центральном Доме Художника состоится юбилейный концерт гитариста-виртуоза\
    \ Левана Ломидзе и лучшей блюзовой команды \"Blues Cousins\".\r\n\r\nДва часа\
    \ блюзовые музыканты, покорившие многие площадки России, США и Европы будут дарить\
    \ зрителям драйв и позитив блюз-рока.\r\n\r\nЛеван Ломидзе - блюзовый самородок,\
    \ первый гитарист из России, получивший признание на родине блюза. По результатам\
    \ опроса слушателей на \"Открытом Радио\" Леван Ломидзе единогласно был признан\
    \ лучшим российским блюзовым музыкантом.\r\n\r\nМаргарита Пушкина, \"Московский\
    \ Комсмолец\": \"Леван Ломидзе со своим Blues Cousins буквально всех поставили\
    \ на уши, это было самое горячее выступление!\"\r\n\r\nLloyd Peterson, президент\
    \ фестиваля Mount Baker Blues: \"Меня чуть не сдуло от энергетики, исходящей со\
    \ сцены, во время выступления Blues Cousins!\"\r\n\r\nТех, кто хочет ощутить настоящую\
    \ блюзовую энергетику ЦДХ приглашает на юбилейный концерт Левана Ломидзе 16 февраля\
    \ в 19.00."
  extra_bands:
