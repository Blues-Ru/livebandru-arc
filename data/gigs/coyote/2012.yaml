- id: 24872
  date: '2012-02-02'
  time: '21:00'
  band_name: Cross B Band, Bluesmobile
  club_id: 516
  club_name: Coyote Bar
  club_token: coyote
  comments: "Coyote Bar (Независимости 117 а, ТЦ Александров Пассаж) открывает двери\
    \ для самой чувственной и эмоциональной музыки. \r\nВ рок-баре стартует серия\
    \ блюзовых вечеров. Они будут проходить каждый месяц. Это тематические вечера\
    \ с интересной программой, специально приглашенными гостями, джемами в конце действа.\
    \ \r\nВам представиться уникальная возможность познакомиться с творчеством, интересными\
    \ фактами из жизни легендарных музыкантов, окунуться в атмосферу Блюза и получить\
    \ огромное удовольствие от музыки, которая не подвержена времени. Вы не сможете\
    \ оторвать взгляд от сцены, на нее ступит нога как известных, так и молодых музыкантов\
    \ нашей страны, а также гостей из зарубежья. \r\nВас ждет много Блюза, позитива,\
    \ хорошего настроения! Ведь Блюз - это свобода. Жажда любви, страсти, огненной\
    \ жизни. Мысли будней о том, что принесет завтра и что подарит день сегодняшний.\
    \ Это маленький рассказ о том, как каждый из нас проводит время. Блюз поют люди,\
    \ выражая свои истинные эмоции. В этом сможет убедиться каждый пришедший. Важно\
    \ - не забыть прихватить с собой обаяние и лучезарную улыбку! \r\nУже 2 и 16 февраля\
    \ 2012 года мистер BLUES переступит порог Coyote Bar."
  extra_bands:
