- id: 25984
  date: '2012-03-29'
  time: '21:00'
  band_name: Cross B Band, Пять Пенсов (Россия, Белгород)
  club_id: 516
  club_name: Coyote Bar
  club_token: coyote
  comments: "Вас ждет путешествие в историю зарождения, развитие, БЛЮЗ-РОКА.\r\nМного\
    \ музыки, интересных исторических фактов и хорошего настроения.\r\nСпециальные\
    \ гости:\r\n5 Пенсов (Россия, Белгород)\r\n5 Пенсов - коллектив из Белгорода состоящий\
    \ из опытных музыкантов. Стилистически \r\n5 Пенсов это Rithm'n'Blues and Rock'n'Roll.\
    \ Группа исполняет как ковер версии блюзовых стандартов, так и собственные авторские\
    \ композиции. Группа выступала совместно с лучшими блюзовыми исполнителями России\
    \ (например Николай Арутюнов экс Лига Блюза или Сергей Воронов гр. Кроссроудз).\
    \ В активе коллектива имеется альбом \"По пятьдесят\", но по настоящему оценить\
    \ мощную энергетику группы можно только на живом выступлении.\r\n5 Пенсов - это\
    \ драйв и отличное настроение! 5 Пенсов - это виртуозное исполнение! Искрометные\
    \ рокенролы и душевные блюзы не дадут вам скучать и сидеть на месте."
