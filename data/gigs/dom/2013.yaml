- id: 33855
  date: '2013-03-10'
  time: '20:00'
  band_name: Goat's Notes. Презентация диска "Fuzzy Wonder"
  club_id: 135
  club_name: Дом
  club_token: dom
  price: 400 + free CD
  comments: "Коллектив Goat's Notes представляет свой первый релиз на знаменитом лэйбле\
    \ Leo Records. Сформированный пианистом Григорием Сандомирским и контрабасистом\
    \ Владимиром Кудрявцевым в 2008 году состав стал резидентом почти всех экспериментальных\
    \ площадок Москвы. На сегодняшний день это один из самых отвязных и непредсказуемых\
    \ проектов на российской импровизационной сцене. Их концерты похожи на путешествия\
    \ по неизведанным ландшафтам, стилевым и абстрактным, с почти оркестровой динамикой.\r\
    \n\r\nНа диске представлен совершенно акустический состав (тот же, что и на этом\
    \ концерте), это фрагменты студийных импровизационных сессий . Совершенно ясно,\
    \ что ничего из этих записей живьем мы не услышим. Это будут сюрпризы, которыми\
    \ неизменно насыщено каждое появление Goat's Notes. Свободная форма для свободных\
    \ людей.\r\n\r\n\r\nМария Логофет - скрипка, эффекты\r\nАндрей Бессонов - кларнет\r\
    \nГригорий Сандомирский - фортепиано, мелодика, голос, шумы\r\nВладимир Кудрявцев\
    \ - контрабас\r\nИлья Вилков - тромбон\r\nПетр Талалай - барабаны\r\n\r\nВ рамках\
    \ вечера состоится также премьера французского 30-ти минутного художественного\
    \ фильма \"Жевание мертвых\" по Патрику Керману, где, напротив, музыка ансамбля\
    \ Goat's Notes плотно соединена со структурой и драматургией кукольного спектакля.\r\
    \nВ \"Жевании мертвых\" Патрик Керман дает слово той части населения, что покоится\
    \ на кладбище. Позволяет нам услышать их размышления, воспоминания жизни, воспоминания\
    \ смерти. Спектакль оживляет некоторые из их голосов, монтаж коротких текстов\
    \ заставляет скорее улыбнуться этой, казалось бы мрачной, теме. Над небольшим\
    \ столом-кладбищем появляются кукольные персонажи мертвецов, которым все еще есть,\
    \ что сказать. Декорации и куклы, созданные французской артисткой Мод Юфнажель,\
    \ предстают в особом приближении в фильме Владимира Кудрявцева, а музыка трио\
    \ Сандомирский/Кудрявцев/Логофет дарит нам еще одно чувственное измерение.\r\n\
    \r\n\"Удивительно, но если искать в нашей музыке аналоги Goat's Notes, то отнюдь\
    \ не в новой импровизационной музыке - она генетически увязла во фри-джазе, -\
    \ а именно в этно-джаз-рок-авангарде московского \"Вежливого отказа\" и петербургского\
    \ \"Аукцыона\", которые тоже перешагивают жанровые границы. Первый - с объединением\
    \ \"Персимфанс\" пианиста Петра Айду играет регтаймы Стравинского и раннего кубофутуриста\
    \ Александра Мосолова (известного на Западе автора \"Завода\" - Iron Foundry).\
    \ Питерский \"Аукцыонъ\" в свою очередь, при поддержке земляка Владимира Волкова,\
    \ дает новогодние концерты со струнным оркестром Opus Posth - авангнардной инкаранцией\
    \ \"Академмии старинной музыки\" скрипачки татьяны Гринденко. Вместе они исполняют\
    \ обработки музыки Перселла и собственные сочинения композитора-минималиста Владимира\
    \ Мартынова. Но в Goat's Notes все это сосредоточилось в одном коллективе, как\
    \ в свое время, в \"Матерях изобретения\" Фрэнка Заппы (названия, включая заглавное\
    \ \"Fuzzy Wonder\", тоже в духе его абсурдных текстов). И Goat's Notes - это тот\
    \ случай, когда конечный результат значительнее, чем сумма всех слагаемых.\"\r\
    \nДмитрий Ухов\r\n\r\nНачало в 20.00\t Вход: 400 рублей.\r\nДиск в подарок каждому,\
    \ купившему билет"
