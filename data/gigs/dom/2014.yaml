    \r\nновая импровизационная музыка\r\n\r\nЮг Вансан (Hugues Vincent) - французский\
    \ виолончелист-импровизатор, яркий представитель европейского андерграунда. Его\
    \ небезосновательно сравнивают со знаменитым Томом Корой (Tom Cora) - небезынтересно,\
    \ что Юг сотрудничал с музыкантами группы The Ex, с которой Том записал 2 альбома\
    \ в начале 90-х.\r\n\r\n23 апреля в ДОМе Юг Вансан выступит в первом отделении\
    \ сольно, и в дуэте с блестящим московским электронщиком, композитором и пианистом\
    \ Алексеем Наджаровым.\r\n\r\nВо втором отделении на сцену выйдет уникальный в\
    \ своем роде импровизирующий оркестр, основой которого являются музыканты Goat's\
    \ Notes - московского коллектива свободной импровизации, выпустившего уже два\
    \ альбома на престижной Leo Records. Первый из них - \"Fuzzy Wonder\" получил\
    \ в 2013 году титул Дебют года по версии журнала The New York City Jazz Record.\
    \ В ДОМе к ним присоединятся один из ведущих российский новоджазовых саксофонистов\
    \ Алексей Круглов, прекрасный тенорист Юрий Севастьянов, известный по множеству\
    \ world-music проектов (Tinavie, Инна Желанная и др.) баритонист и корнетист Олег\
    \ Маряхин. \r\n\r\nсостав:\r\n\r\nМария Логофет - скрипка\r\nАндрей Бессонов -\
    \ кларнет\r\nЮрий Севастьянов - тенор-саксофон\r\nАлексей Круглов - альт-саксофон\r\
    \nОлег Маряхин - корнет\r\nИлья Вилков - тромбон\r\nГригорий Сандомирский - фортепиано\r\
    \nВладимир Кудрявцев - бас\r\nПетр Талалай - барабаны\r\n+ гости\r\n\r\nвход 800р.\
