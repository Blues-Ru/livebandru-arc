  club_token: doodah-king
  comments: "В этот холодный вечер ваши сердца согреют искренние слова и правдивые\
    \ ноты. В этот час вы окажетесь в новом мире: познаете полет души, гамму чувств,\
    \ волю неосознанной страсти. Вы обернетесь - и вам мило улыбнется рядом стоящая\
    \ незнакомка. \r\nТакое волшебство может произойти только в особенный день. Им\
    \ станет 20 декабря - совсем немного до Рождества. \r\nВас будут радовать знакомые\
    \ группы:\r\n\"LONG WAY\" (Минск) встряхнут четким блюз-роком, \r\n\"CROSS B.\
    \ BAND\" (Минск) с первых аккордов отправят в Техас,\r\n\"PLACE TO BE\" (Гомель)\
    \ заинтригуют, а\r\nДенис Балахонов (Минск) на миг остановит время и погрузит\
    \ в легкие волны акустики.\r\n\"BLUES BEFORE CHRISTMAS\" каждый год собирает друзей\
    \ в \"Doodah King\" баре. Можно не сомневаться, что в этом году их станет еще\
    \ больше."
