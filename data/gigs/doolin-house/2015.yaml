  comments: "История этих ребят началась в городе Костроме и Ярославле в конце 90-х\
    \ - начале 2000-х гг. \"АРГЕНТУМ\" играли песни похожие на стиль гранж, а часть\
    \ участников из группы \"Особый День\" назывались ранее \"ОгнеопаснО\" и играли\
    \ безбашенный панк-рок... Тогда же эти две группы и познакомились между собой,\
    \ и поняли, что близки по духу... Объединял их тогда один очень харизматичный\
    \ и талантливый парень по кличке Гобс. Сейчас бы его можно было смело назвать\
    \ саундпродюсером))) Он всегда с нами, и наверняка смеется сейчас над нами, глядя\
    \ с небес...\r\nШло время группы пережили не одну реинкарнацию музыкального стиля\
    \ со сменой участников, научились играть, и правильно вести себя на сцене)))\r\
    \n\"Особый День\" остались в Ярославле. АРГЕНТУМ подались в Москву. Не те не другие\
    \ не стали \"суперзвездами\", но остались верны своим идеям: делать только честную\
    \ музыку, которая с годами, как хорошее вино, становится только лучше! \r\nИтак,\
    \ не пропустите!!! Субботний вечер в Москве на Арбате в компании двух супергрупп!!!)))"
