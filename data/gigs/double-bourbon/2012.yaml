  comments: Стосковавшись по старому доброму рок-н-роллу, подустав от засилия электронщины,
    поиска новых звуков и способов их извлечения, несколько абсолютно неадекватных,
    в творческом плане, людей, решили вернуться к истокам живых перегруженных мелодий.
    Так появилась, возможно, самая раздолбайская, но от этого лишь выигрывающая, олдскульная,
    и от этого еще более приятная, обаятельная и зажигательная  the band'а - Fly Mexican
    Airlines. Ничего сверхъестественного вы не услышите - никаких глобальных выпендрежей,
    нереальной техники или подачи - кучка раздолбаев, играющих самый чтонинаестьтотсамый
    старый добрый олдскульный рок-н-ролл! Добротная порция лажи, но ... ОЧЕНЬ душевно
    - это и есть FMA!
