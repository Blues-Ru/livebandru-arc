  price: бесплатный
  comments: "Тамара Оген & Magnet Vox - коллектив, исполняющий музыку на стыке блюза\
    \ и джаза. Этот синтез родился в процессе выступлений и работы над песнями. Минимализм\
    \ инструментального состава трио - фортепиано, бас-гитара, ударные и два вокала\
    \ - насыщается импровизационностью каждой партии. В репертуаре Magnet Vox есть\
    \ как жемчужины стилей блюз и джаз, так и яркие композиции собственного сочинения.\r\
    \n.\r\nТамара Оген создает карту песни с помощью многоуровневых партий фортепиано,\
    \ вбирая в себя разные регистры, ритмы и фактуры исполнения. Золотой ниткой в\
    \ эту схему вплетается голос, дополняя звучание песен. В основе музыкального мышления\
    \ лежат модуляции - путешествия по близким и далеким тональностям, дающие причудливые\
    \ узоры гармонии.\r\n.\r\nВасилий Мотылец строит многогранные басовые партии,\
    \ которые зачастую становятся ведущими в песне. Его политональное мышление позволяет\
    \ создавать яркие, каждый раз новые, мелодические рисунки баса - все зависит от\
    \ полета фантазии, от настроения музыканта. А в самые важные моменты он вступает\
    \ в песню еще и собственным голосом, насыщая партию основного вокала дополнительными\
    \ гармониями.\r\n.\r\nМихаил Данилов раскрывает новые возможности ударных инструментов.\
    \ Добавляя самые разные звуки - браслеты с бубенцами, игра тамбурином по малому\
    \ барабану, - он соединяет воедино разные ритмы и стили. Это позволяет коллективу\
    \ делать самые неожиданные аранжировки известных стандартов, а также создавать\
    \ новое, интересное звучание своих собственных песен.\r\n.\r\nСостав трио:\r\n\
    Тамара Оген - вокал, фортепиано\r\nВасилий Мотылец - бас-гитара, вокал\r\nМихаил\
    \ Данилов - ударные, перкуссия"
