  price: от 700 руб.
  comments: "Себя она называет - \"Леди Z\". Поклонники зовут ее - \"Леди - совершенство\"\
    . На афишах крупнейших джазовых фестивалей ее имя всегда в числе фаворитов - Зения\
    \ МакФерсон. Обладательница уникального, пронзительного вокала - многие музыкальные\
    \ критики сравнивают ее с Ариеттой Франклин и Уинтни Хьюстон. Безупречные внешние\
    \ данные - Зения словно сошла с обложки модного глянца. Потрясающее чувство стиля\
    \ - каждая мелодическая фраза в ее исполнении полна смысла и красоты. Все это\
    \ - лишь скромная часть из восторженных эпитетов, которыми наградила эту темнокожую\
    \ диву пресса и публика по всему миру. Зения МакФерсон. Артистка, которая всем\
    \ своим творчеством олицетворяет титул - Звезда современной джазовой сцены. \r\
    \n\r\nВпрочем, ограничивать музыку Зении МакФерсон рамками исключительно джаза\
    \ не совсем верно. Как и любой талантливый артист, она всегда находится в движении\
    \ к новым профессиональным горизонтам. В ее вокальной манере живо переплетены\
    \ афробит и фанк, R&B, соул и госпел. Внушительный голосовой диапазон в три с\
    \ половиной октавы позволят певице использовать все оттенки своего голоса. Тембральная\
    \ палитра Зении МакФерсон - поражает нюансами. От бархатно нежных блюзовых тонов\
    \ до резких и мощных свинговых нот. Публика в зале, как правило, начинает овацию\
    \ уже после нескольких пассажей в исполнении Леди Z - нет сил сдержать эмоции!\
    \ На одном из американских телешоу, зрителей даже пришлось успокаивать, чтобы\
    \  певица смогла довести свой номер до финала! Поразительное дарование - завоевывать\
    \ и очаровывать публику с первых тактов. Кстати, ее коллеги по музыкальному цеху\
    \ - от публики не отстают. Талантом молодой певицы восхищаются такие прославленные\
    \ мастера, как Херби Хенкок и Дейв Грузин, Джордж Бенсон и Эл Джерроу, Род Стюарт\
    \ и Мэри Джей Бладж... и это лишь первые люди из длинного списка."
