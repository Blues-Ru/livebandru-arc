  comments: "\"Я слышал истинный голос Джаза, и он принадлежит - Гэбриэль Гудман\"\
    \ - продюсер, Стефан Израэль\r\n\r\nГэбриэль Гудман - звезда мирового масштаба.\
    \ Чтобы подчеркнуть ее статус, певицу часто называют \"Джазовой Уитни Хьюстон\"\
    . Сравнение крайне точное. Мощный вокал, окрашенный поразительно яркими красками,\
    \ мгновенно приковывает к себе внимание слушателей! С кем бы ни выступала Гэбриэль\
    \ Гудман, будь то Куинси Джонс или Чака Хан, Ди Ди Бриджуотер или Маркус Миллер,\
    \ Патти Лабель или Уинтон Марсалис, ее искусство - неизменно вызывает овации.\
    \ Своим присутствие Гудман уже украсила десятки крупнейших концертных площадок\
    \ и ведущих джазовых фестивалей. Кстати, ее профессиональный прорыв состоялся\
    \ во время легендарного фестиваля в Ньюпорте. Это было одно из ее первых выступлений\
    \ перед большой аудиторией. Гэбриэль тогда гастролировала в составе группы легендарной\
    \ соул певицы Роберты Флэк. Сольный номер Гэбриэль, классический джазовый хит\
    \ \"My Funny Valentine\", заставил публику аплодировать стоя. 15000 человек, стоя\
    \ под проливным дождем, не отпускали певицу со сцены. Гудман трижды выходила на\
    \ бис! Сама госпожа Флэк потом признавала, что в тот день она видела чудо - рождение\
    \ новой звезды джаза. \r\n\r\nСегодня, Гэбриэль Гудман гастролирует по миру со\
    \ своей новой группой, в которую входят великолепные музыканты. Молодой барабанщик,\
    \ выпускник нью-йоркского университета И Джэй Стриклэнд. Брат-близнец уже знаменитого\
    \ саксофониста Маркуса  Стриклэнда, он стал надежной опорой для ритм-секции. Четкий\
    \ свинг и безупречный метр поддерживает опытнейший российский басист Антон Ревнюк,\
    \ прекрасно знакомый поклонникам джаза. На саксофоне солирует выпускник легендарного\
    \ колледжа Беркли - Николай Моисеенко. За клавишами - восходящая звезда Нью-Йорка\
    \ Максим Любарский.  В свое время, он переехал за океан из Одессы, и сегодня,\
    \ его рояль звучит в составах ведущих джазовых исполнителей. Кстати, именно этот\
    \ состав Гэбриэль Гудман представит на популярном джазовом фестивале \"Усадьба\
    \ Джаз\". Возможно, запись с этого выступления - станет основой для очередного\
    \ альбома певицы. К слову, сейчас она заканчивает работу над своей четвертой пластинкой.\
    \ Первые три альбома - стали настоящим подарком для меломанов. \r\n\r\nНесомненным\
    \ событием станет и концерт Гэбриэль Гудман в арт-клубе \"Дуровъ\". 7 июня одна\
    \ из лучших джазовых певиц наших дней - будет петь только для вас!"
