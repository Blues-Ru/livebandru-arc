  comments: 'Феноменальный мистер Джонс! Так этого музыканта называют на его родине,
    в США. Джесси Джонс мл. не только виртуозно владеет всеми саксофонами (сопрано,
    альт, баритон), он так же мастерски играет на кларнете и флейте. Но и это еще
    не все: мистер Джонс - родоначальник уникального вокального стиля "Скэт Хоп"!
    Симбиоз соула, фанка, классического джаза и R&B. От прочих вокальных техник "Скэт
    Хоп" отличает уникальная манера исполнения - это чем-то похоже на горловое пение.
    Только здесь - больше свинга.  Иногда Джесси поет - прямо сквозь инструмент! Публика
    уже несколько десятилетий в неизменном восторге от концертов Джесси Джонса мл.
    Когда-то, большое будущее этому артисту предсказал его друг, легендарный трубач
    Джон "Диззи" Гиллеспи. Время показывает, что "Диззи" - был на сто процентов прав.'
