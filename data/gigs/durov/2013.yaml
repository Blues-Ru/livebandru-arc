- id: 39158
  date: '2013-11-28'
  time: '20:00'
  band_name: Дебора Дэвис (вокал, США)
  club_id: 137
  club_name: Арт-кафе ДуровЪ
  club_token: durov
  comments: "tMotion представляет:\r\n\r\nДебора Дэвис - одаренная певица, обладательница\
    \ теплого ангельского голоса, очаровавшего публику во всем мире. Она обладает\
    \ многими талантами - поэтесса, актриса, художник, балерина, преподаватель, спортсменка,\
    \ менеджер. Но именно пение принесло ей известность. Она одинаково комфортно чувствует\
    \ себя в разных музыкальных стилях, исполняя джаз, классику, госпел, поп, кантри,\
    \ ритм-энд-блюз, хип-хоп и даже коммерческие джинглы. Ее репертуар включает множество\
    \ известных джазовых стандартов - это баллады, блюзы, латино, свинг. Она постоянно\
    \ работает в Нью-Йорке, а также выступает в Европе и Азии.\r\n\r\nДебора родилась\
    \ в Далласе (Техас) в бедной семье и, не имея в доме магнитофона, слушала чаще\
    \ всего музыку своей собственной души. И с детства очень любила петь. Не имея\
    \ возможности кому-либо подражать и не испытывая ничьих музыкальных влияний, Дебора\
    \ со временем развила свой собственный стиль пения, используя возможности своего\
    \ уникального голоса. Она пела в церквах, местных евангелических ансамблях, на\
    \ школьных утренниках, на конкурсах красоты, записывала джинглы. Образование Дебора\
    \ как певица получила в Университете Северного Техаса, затем получила диплом звукорежиссера\
    \ в Cedar Valley College. Кроме того, она изучала актерское мастерство и танец\
    \ в El Centro College. По окончании учебы Дебора уже выступала на джазовых сценах\
    \ Далласа, сотрудничала с оркестрами и известными солистами, такими, как Бобби\
    \ Хэмфри, Дебра Лос и Анжела Бофилл.\r\n\r\nВ 1986 году Дебора перебралась в Нью-Йорк\
    \ и, помимо увлечения джазом, проявила себя талантливым менеджером, подготовив\
    \ несколько театральных постановок. Индивидуальный стиль и голос Деборы, зазвучавший\
    \ в нью-йоркских клубах, оценили Рэй Браун, Лайонел Хэмптон и Кларк Терри, пригласившие\
    \ певицу к сотрудничеству, а однажды она заменила саму Эбби Линкольн. Кроме того,\
    \ сцену с Деборой делили Фредди Хаббард, Арт Блэйки, Лу Доналдсон, Харолд Мейберн,\
    \ Делфио Марсалис, Джеймс Уильямс, Бенни Грин, Марк Кэри, Крисчен Макбрайд, Питер\
    \ Вашингтон, Рон Аффиф, Расселл Малоун, Джеф Уоттс и др. \r\nЕе выступлениям посвятили\
    \ свои восторженные обзоры New York Times, New York Newsday, Amsterdam News. Она\
    \ пела в самых престижных джаз-клубах, на фестивальных площадках и в концертных\
    \ залах, включая Blue Note, Birdland, Village Vanguard, Sweet Basil, Five Spot,\
    \ Tavern On The Green, Rainbow Room, Windows Of The World, Mt.Fuji Jazz Fest и\
    \ др.\r\n\r\nОна выступала перед представителями ООН и перед президентом Биллом\
    \ Клинтоном. \r\nДебора организовала собственную компанию Manhattan Music Design,\
    \ обслуживающую различные городские мероприятия, записывается на собственном лейбле\
    \ Got My Own Records, а также находит возможности помогать Обществу по борьбе\
    \ с лейкемией, перечисляя в его пользу средства то от марафона на 26,2 мили, то\
    \ от концертов в нью-йоркском клубе Blue Note.\r\n\r\nКонцерт пройдет в рамках\
    \ проекта \"Jazz in Motion\" - еженедельных концертов зарубежных и российских\
    \ звезд джаза."
