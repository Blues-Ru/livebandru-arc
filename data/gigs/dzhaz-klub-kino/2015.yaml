- id: 53023
  date: '2015-08-14'
  time: '20:30'
  band_name: Ночь Фламенко, Jazmin Centeno, Javier Malaguilla, Katerina Che Malaguilla,
    El Glepe, ученики FlamencoCenter
  club_id: 804
  club_name: Джаз-клуб "Кино"
  club_token: dzhaz-klub-kino
  price: 900 руб.
  comments: Испанские страсти, яркие зажигательные номера, атмосфера севильского патио
    и летнее настроение! Лето продолжается! Только на одну ночь Вы очутитесь в самом
    центре Испании - знойной Андалуссии.  Завораживающие плавные движения рук в контрасте
    с искрометным сапатеадо (дробями) и резкими движениями корпуса. Магия ритма, берущая
    свое начало из глубины веков. Сплав культур, рождающий уникальность стиля. Яркие
    эмоции и не поддельная экспрессия, подкрепленные опытом и силой духа. Все это
    - фламенко
- id: 53031
  date: '2015-08-27'
  time: '20:30'
  band_name: Ник Шеффер (саксофон) и Роман Иванов (труба) с программой Tribute to
    Benny Golson
  club_id: 804
  club_name: Джаз-клуб "Кино"
  club_token: dzhaz-klub-kino
  price: 900 руб.
  comments: Вечер свободных импровизаций, вдохновенные джаз-экспромты в исполнении
    известных московских джазовых музыкантов позволят почувствовать, насколько живым
    и гибким может быть джаз. Роман Иванов - первый российский эндорсер Calicchio,
    джазовый трубач с более чем 25-летним стажем игры на трубе и 15-летним стажем
    преподавания. Саксофонист из Латвии - Ник Шеффер окончил в Риге знаменитый музыкальный
    колледж им.Я. Медыня. Играл со многими выдающимися латвийскими и американскими
    джазменами. Музыканты исполнят программу, посвященную творчеству великого американскго
    саксофониста и композитора Бенни Голсона, единственного ныне живущего джазового
    музыканта, написавшего 8 стандартов для джазового репертуара. Эти джазовые стандарты
    нашли свое место в бесчисленные записях на международном уровне на протяжении
    многих лет и до сих пор.
