  time: '20:30'
  band_id: 461
  band_name: Boogie Child
  band_token: boogie-child
  club_id: 37
  club_name: G.A. Blues Club
  club_token: g.a.-blues-club
  price: 400 руб.
  comments: "Boogie Child- московская блюз-рок группа, которая в своем творчестве\
    \ продолжает традиции англо-американских исполнителей 60-70 х годов.\r\nМузыка,\
    \ которую мы играем, дает большую свободу самовыражения. Знаменитые, а так же\
    \ редкие композиции представлены в неожиданных, непредсказуемых аранжировках.\
    \ Мы не копируем, а лишь предлагаем Вам свое видение песен любимых авторов.\r\n\
    Зажигательные boogie, размеренные shuffle и проникновенные баллады в стиле Stevie\
    \ Ray Vaughan и Gary Moore. Песни Creedence Clearwater Revival, The Animals, The\
    \ Rolling Stones, The Doors, Willie Dixon, Muddy Waters, Bo Diddly, James Brown,\
    \ Chuck Berry, Jimi Hendrix, Freddy King, а еще funk и многое другое от классики\
    \ рок-н-ролла и ритм-н-блюза до классики хард рока и тяжелого блюза!\r\nОригинальное\
    \ звучание, воссоздание на сцене атмосферы \"золотых лет\" блюз-рока, импровизаций\
    \ в духе Cream и Led Zeppelin.Не имеет смысла слишком много говорить о музыке-ее\
    \ надо слушать. И так же можно танцевать)) Ждем Вас на своих концертах!"
