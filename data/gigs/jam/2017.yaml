  club_name: JAM Club
  club_token: jam
  price: 500 руб.
  comments: "\"Mr. KingBee\" - это:\r\n\r\n- старый добрый блюз с новым звучанием\r\
    \n- музыка, которая однажды сломала расовые предрассудки\r\n- душераздирающий\
    \ плач губной гармоники и чувственный вокал\r\n- рев струн и пронзающие насквозь\
    \ гитарные соло\r\n- жгучая смесь мощного грува барабанно-басовой секции\r\n\r\
    \nБлагодаря этому мы способны выступать в разных концертных условиях:\r\n\r\n\
    Большие сцены на многотысячных фестивалях, где ноги перестанут вас слушаться под\
    \ Мадди Уотерса; маленькие заведения и анти-кафе, где нужно играть так тихо, что\
    \ сам Сонни Бой Вильямсон II захочет прийти и сказать: - \"One more time\" (с)."
