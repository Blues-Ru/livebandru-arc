- id: 76504
  date: '2019-02-24'
  time: '20:00'
  band_id: 763
  band_name: Тамара Оген & Magnet Vox
  band_token: tamara-ogen
  club_id: 832
  club_name: JAM Club
  club_token: jam
  price: 500 руб.
  comments: "Красота блюза в его гармонии, в его оттяжном свинговом ритме голоса и\
    \ фортепиано, в пружинящем басу, часто берущем на себя роль основного инструмента,\
    \ в пульсирующем ритме ударных, заставляющем то сдержанно постукивать ногой в\
    \ такт, то всем существом отдаваться танцу.\r\n.\r\nМы в \"Magnet Vox\" собираем\
    \ яркий, необычный блюз, бережно аранжируем его и играем на концертах. Наша задача\
    \ - показать эту музыку во всей ее красоте, познакомиться с ней самим и познакомить\
    \ вас, наши дорогие слушатели. J.B.Lenoir, Joe Bonamassa, Nina Simone, Skip James,\
    \ Leroy Carr, Blind Lemon Jefferson - вот лишь немногие из тех, кого мы представляем\
    \ вам на наших выступлениях.\r\n.\r\nНаш коллектив смотрит на музыку как на нечто,\
    \ постоянно движущееся, меняющееся. Импровизация не может быть сыграна дважды\
    \ совершенно одинаково - она как сама жизнь, в ее волнительных неожиданностях\
    \ и цветных поворотах. Партия каждого инструмента в \"Magnet Vox\" - тому подтверждение.\r\
    \n.\r\nНа наших концертах вы услышите удивительные мелодии одного из самых старых\
    \ стилей современной музыки, окунетесь в сильные переживания, прочувствуете вместе\
    \ с нами всю палитру музыкальных красок, которые таит в себе этот загадочный,\
    \ такой простой и все же такой сложный, блюз.\r\n.\r\n\"Magnet Vox\" существует\
    \ с 2018 года, и уже успел зарекомендовать себя на московской музыкальной сцене,\
    \ выступая в популярных клубах столицы. Коллектив принимал участие в международном\
    \ фестивале вокального джаза Jazz Voices 2018 (Москва) и Большом блюзовом концерте\
    \ от фестиваля \"Мосты\" (Санкт-Петербург).\r\n.\r\nСостав трио:\r\n.\r\nТамара\
    \ Оген - вокал, фортепиано\r\nВасилий Мотылец - бас-гитара, вокал\r\nСергей Чекмаренко\
    \ - ударные"
