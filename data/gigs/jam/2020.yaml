    \ благодаря энергичному и проникновенному вокалу Алены Компанец. Амосферой огня\
    \ и страсти музыку обогащает заметный гитарист Москвы - Юрий Новгородский. Фундаментом\
    \ и стальной броней команды является ритм-секция, в составе которой Василий Мотылец\
    \ и Данила Ленци. Смелый грув, мощный вокал, меланхоличные мелодии и песни, большинство\
    \ которых вы еще не слышали! Расскажем вам много блюзовых историй под звуки гитары!\
