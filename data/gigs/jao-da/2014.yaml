- id: 43026
  date: '2014-04-17'
  time: '21:00'
  band_name: Hugues Vincent, Goat's Notes Quartet
  club_id: 23
  club_name: Китайский летчик Джао Да
  club_token: jao-da
  price: 500 руб.
  comments: "HUGUES VINCENT & Goat's Notes Quartet\r\n\r\nЮг Вансан (Hugues Vincent)\
    \ - французский виолончелист-импровизатор, яркий представитель европейского андерграунда.\
    \ Его небезосновательно сравнивают со знаменитым Томом Корой (Tom Cora) - небезынтересно,\
    \ что Юг сотрудничал с музыкантами группы The Ex, с которой Том записал 2 альбома\
    \ в начале 90-х. Вансан обладает собственной неподражаемой манерой и уникальным\
    \ звуком. Его виолончель то поет, то воет, то скрипит и скрежещет. Игра Юга -\
    \ это концентрированная эмоция, дышащая страстью и бешеным внутренним ритмом.\
    \ При этом он порой оказывается необычайно тонок и вдумчив - как, например, в\
    \ своих работах с танцевальными импровизаторами. Звуки его препарированного инструмента\
    \ - особенно в сочетании с электроникой - словно мазки художника, его музыка сродни\
    \ шедеврам абстрактной живописи.\r\nУдивительно разносторонний и интересующийся\
    \ музыкант, Юг Вансан живет между Парижем и Берлином, между Японией и Марокко,\
    \ Бельгией и Тайванем, выступая сольно как виолончелист, электронщик и object\
    \ manipulator, играя в ска-группах и авант-роковых коллективах - в том числе и\
    \ в качестве гитариста. На протяжении своей карьеры Вансан участвовал в проектах\
    \ с Joelle Leandre, Otomo Yoshihide, David S Ware, выступал с Vincent Courtois,\
    \  Jean Francois Pauvros, Luc Ex, Makoto Sato. Он постоянный участник авангардного\
    \ дуэта Bobun и авант-ска группы \"Le pelican frise\". Большую долю творчества\
    \ Юга занимает сотрудничество с исполнителями современного танца - это удивительные\
    \ по красоте и глубине перформансы. \r\nЮг Вансан даст в Москве два абсолютно\
    \ непохожих концерта, давая возможность ощутить разнообразие его талантов.\r\n\
    17 апреля в Китайском Летчике Джао-Да Вансан предстанет в компании музыкантов\
    \ Goat's Notes - непредсказуемого и энергичного московского коллектива свободной\
    \ импровизации. Вас ждет бесшабашное струнное трио с участием Марии Логофет (скрипка)\
    \ и Владимира Кудрявцева (контрабас), живущего последние годы в Париже, и в Москве\
    \ появляющегося пару раз в год. Присоединятся к ним Григорий Сандомирский (клавишные)\
    \ и Петр Талалай (барабаны)"
