- id: 45374
  date: '2014-08-29'
  time: '21:00'
  band_name: Марина Волкова (вокал) и ее группа.
  club_id: 774
  club_name: Jazziz Club
  club_token: jazziz-club
  price: бесплатно
  comments: "Марина Волкова - джазовая певица, композитор, преподаватель вокала. Получив\
    \ академическое музыкальное образование, у одного из лучших преподавателей вокала\
    \ России - Громовой Марины Борисовны, Марина попадает в среду московских джазовых\
    \ музыкантов и навсегда влюбляется в джазовую музыку. Марина начинает слушать\
    \ записи Сары Вон, Эллы Фицджеральд, Кармен Макрей, Билли Холлидей и других великих\
    \ джазовых вокалистов, а также брать уроки вокала у джазовой певицы Ирины Родилес.\
    \ По словам Марины, самой большой тайной в постижении джаза для нее было понятия\
    \ \"свинг\".\r\n\"Я спрашивала всех джазовых музыкантов, что же такое свинг. В\
    \ ответ они просто пожимали плечами. Это вопрос без ответа - свинг можно только\
    \ почувствовать. С тем же успехом я могла спросить их, что такое любовь\". Удивительно,\
    \ что почувствовать свинг и найти ответ на свой вопрос Марине помогла музыка Майкла\
    \ Джексона. Именно его чувство ритма, такое же непереводимое, как и свинг, передало\
    \ Марине чувство свинга. Кроме того, огромное влияние на Марину оказали \"уроки\"\
    \ единственной и неповторимой Сары Вон: \"Я постоянно слушала ее альбом \"Swinging\
    \ Easy\". Чувство свинга и уроки Сары не могли не дать результаты: в 2009 году\
    \ Москву посетила Ив Корнелиус, одна из лучших джазовых певиц США, и на одном\
    \ из своих выступлений спела с Мариной в дуэте известный стандарт  \"All of Me\"\
    . По словам Марины, именно это выступление стало переломным моментом ее карьеры\
    \ - Ив Корнелиус, помогла ей понять, что джаз - именно то, чем она хочет заниматься.\r\
    \n          После этого начинается карьера Марины в качестве джазовой певицы.\
    \ В 2009 году она принимает участие в Первом Московском Конкурсе Джазовых Вокалистов\
    \ Анны Бутурлиной. В том же году Марина начинает работу в лаунж нью-джаз проекте\
    \ \"Perfect Me\" в качестве певицы и композитора. В составе группы в 2011 году,\
    \ Марина участвовала в закрытии 9 Международного Джазового Фестиваля \"Джаз Коктебель-2011\"\
    , а также 2012 году записала альбом Rounds.\r\n         Параллельно с проектом\
    \ \"Perfect Me\" Марина собирает джазовый квартет -Marina Volkola Jazz Band.\r\
    \nВ состав квартета в разное время входят Сергей Васильев, Павел Тимофеев, Роман\
    \ Дмитриев, Владимир Луизо, Давид Ткебучава - одни из лучших молодых джазовых\
    \ музыкантов Москвы. \r\n         Марина является постоянным участником многочисленных\
    \ джазовых фестивалей.\r\nС сентября 2012 года является преподавателем по вокалу\
    \ в Московском театре Луны Сергея Проханова. Ученики Марины - артисты таких известных\
    \ мюзиклов,  как \"Губы\", \"Шантеклер\" и \"Лиромания\".\r\n     В 2013 году\
    \ Марина выступила с Даниилом Крамером на благотворительном вечере. Весной 2013\
    \ года неоднократно выступала на концертах известного джазового пианиста Ваагна\
    \ Айрапетяна. В мае вместе с Ваагном Айрапетяном, Сергеем Васильевым и Павлом\
    \ Тимофеевым записала такие джазовые стандарты, как \"Just You, JustMe\", \"When\
    \ I Fall in Love\", \"Slap That Bass\", которые вышли на диске \"Live from Esse\
    \ Jazz Cafe\" 21 ноября 2013.\r\n         Вокал Марины отличается изысканными\
    \ интонациями и потрясающим чувством свинга. Каждый раз исполняя ту или иную песню,\
    \ она рассказывает свое собственную историю, которую всегда хочется услышать еще\
    \ раз."
