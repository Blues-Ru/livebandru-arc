  price: бесплатно
  comments: Никакого Бродвея, никаких диксилендов. "Евдокия Лерер и..." представляют
    новую программу INDEPENDENT - музыку поколения, которое не захотело жить правильно.
    Хипстеры и битники, пижоны и хулиганы, в Париже и в Нью-Йорке, в клубах и на площадях
    - они делали все, что взбредет в голову и... сделали наш мир таким, каким мы его
    знаем сегодня. Молодые люди вышли на баррикады сексуальной революции, боролись
    с мейнстримом и все переоделись в джинсы. Годар, Луи Маль, Трюффо, Кассаветис
    снимали гениальное кино, а Майлз Дэвис, Чарльз Мингус, Уэйн Шортер сочиняли не
    менее гениальную музыку. Это напрягало истеблишмент. Это было модно. Это было
    круто. Это было про свободу. И нам это нравится. Играем 60-е!
- id: 45371
  date: '2014-08-08'
  time: '21:00'
  band_name: Маримба Плюс
  club_id: 774
  club_name: Jazziz Club
  club_token: jazziz-club
  price: бесплатно
  comments: Музыканты определяет свой стиль как арт-фьюжн - слияние современного джаза,
    этнической, электронной музыки и академических традиций.Неповторимость ансамблю
    придают оригинальный состав (лидирующая маримба - такого в российской музыке еще
    не было) и авторская музыка лидера группы Льва Слепнера, маримбофониста и композитора,
    обладателя первой негосударственной премии высших достижений в искусстве "Триумф"
    2002 г.,а так же победителя Гран При  "За лучший саундтрек 2013" на международном
    кинофестивале "CINANIMA" в Португалии, к анимационному фильму "Моя мама самолет"(Лучший
    детский фильм 2013).В 2012г. в проекте появилась удивительная вокалистка, голос
    фламенко в России 2012/2013г, Татьяна Шишкова и направление world music стало
    основным в творчестве коллектива.Выступления Marimba Plus - это яркие эмоциональные
    шоу, симбиоз драйва и симфонизма.  Ансамбль постоянно экспериментирует, ищет новое
    звучание и сочетание инструментов, приглашает в свои проекты молодых и именитых
    музыкантов, устраивает концерты с показом видеоарта, работает и с симфоническим
    оркестром и с модными диджеями. В 2007 году в ансамбле появилась электронная маримба,
    что раскрыло дополнительные возможности для творчества с использованием современных
    технологий.Музыка ансамбля очень изобразительна, о музыкантах часто говорят, что
    они буквально "рисуют картины".
