- id: 52810
  date: '2015-08-13'
  time: '20:30'
  band_name: Ник Шеффер (саксофон) и Анатолий Текучев (вибрафон) с программой Tribute
    to Lionel Hamton
  club_id: 770
  club_name: Джаз-клуб "Академический"
  club_token: klub-restoran-akademicheskij
  price: 900 руб.
  comments: "Вечер свободных импровизаций, вдохновенные джаз-экспромты в исполнении\
    \ известных московских джазовых музыкантов позволят почувствовать, насколько живым\
    \ и гибким может быть джаз! Мало кому из столичных любителей джаза сегодня неизвестно\
    \ имя талантливого музыканта Анатолия Текучева. Именно под его руками вибрафон\
    \ (который крайне редко встречается на современной сцене) приобретает удивительно\
    \ мелодичное, серебристое и переливающееся звучание. Сложное музыкальное оборудование\
    \ требует особого подхода, и найти его удается не каждому музыканту. Вибрафон\
    \ способен создать незабываемую атмосферу рафинированной релаксации, разительно\
    \ напоминающую стиль \"безоблачных\" праздников периода 60-70 годов прошлого века.\
    \ При этом его звучание нежно и прозрачно, любая погрешность в ритме и звуке особенно\
    \ ощутима...\r\n\r\nСаксофонист из Латвии - Ник Шеффер окончил в Риге знаменитый\
    \ музыкальный колледж им.Я. Медыня. Играл со многими выдающимися латвийскими и\
    \ американскими джазменами.\r\n\r\n13 августа музыканты исполнят программу, посвященную\
    \ творчеству великого американского джазового пианиста и композитора Лайонелла\
    \ Хэмптон, вдохнувшего жизнь в более чем 200 композиций, включая джазовые стандарты\
    \ и симфонические работы. Эти джазовые стандарты нашли свое место в бесчисленные\
    \ записях на международном уровне на протяжении многих лет и до сих пор узнаваемы\
    \ и горячо любимы поклонниками джазовой музыки."
