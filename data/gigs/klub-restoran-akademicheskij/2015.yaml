  comments: "19 сентября в камерной и уютной атмосфере клуба \"Академический\" группа\
    \ \"Лесоповал\" исполнит свои лучшие и любимые песни, а так же представит новые\
    \ композиции с еще не изданного альбома.\r\n\"Серьезные песни о жизни\" - так\
    \ говорят о своем репертуаре питомцы поэта Михаила Танича, артисты группы \"Лесоповал\"\
    . Им есть чем привлечь зрителя. \"Эмоциями, текстами Михаила Танича. Каждый наш\
    \ номер - это практически мини-спектакль с танцами, а не просто исполнение песен!\"\
    \  В 2015-м \"Лесоповал\" отмечает 25-й день рождения. Популярным он стал фактически\
    \ сразу после создания, а хиты 90-х народ обожает до сих пор. Песню \"Белый лебедь\
    \ на пруду\" лесоповальцы называют \"лебединой\" для первого солиста группы Сергея\
    \ Коржакова, трагически погибшего в 1994 году.\r\nМногие считают, что после смерти\
    \ Танича закончилась творческая деятельность группы \"Лесоповал\", но это не так.\
    \ Танич оставил более двухсот стихов, из которых уже записаны 17-й и 18-й альбом\
    \ группы. Самой впечатляющей песней, по оценке слушателей радио Шансон, является\
    \ новая песня \"Мне улыбнись\". Это песня о любви, в ней не затрагивается тема\
    \ тюрьмы. . Звучание группы отличает только живой звук, мощная энергетика, сильный\
    \ вокал и потрясающая лирика Михаила Танича! Музыка \"Лесоповала в лучших традициях\
    \ советской эстрады, отличающейся подлинным мелодизмом, легко синтезирующей и\
    \ народную музыку с бардовским лиризмом, хард-рок, как в композиции \"Зима\",\
    \ с балладностью \"Тайги\" и \"Мне улыбнись\". Хотите лагерного юмора и танцев,\
