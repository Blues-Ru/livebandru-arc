    \ народной культуры.\r\n\r\nЭтери выдающаяся вокалистка, которая обладает чарующим,\
    \ магнетическим, бархатным голосом.  Имя Этери в переводе на русский язык означает\
    \ \"эфир\", и действительно, в ее творчестве мы можем увидеть эту тонкую мифическую\
    \ стихию. В песнях Этери Бериашвили прослеживаются все оттенки человеческих чувств\
    \ и настроений. Передать глубокий смысл каждой композиции ей удается не только\
    \ благодаря тому, что она тонко чувствует музыку, но и благодаря врожденной способности\
    \ с сочувствие и вниманием воспринимать все, что происходит вокруг. \r\n\r\nПевица\
    \ выросла в Грузии и детство, проведенное в этой замечательной стране, наложило\
    \ свой отпечаток на ее стиль исполнения, ведь живя в таком солнечном краю, невозможно\
    \ быть грустным и хмурым. Этери Береашвили  уже более 20 лет поет на лучших сценах.\
    \ Каждый концерт, в котором участвует Этери, превращается в удивительный, светлый\
