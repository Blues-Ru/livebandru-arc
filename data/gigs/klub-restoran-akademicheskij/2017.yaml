    карьеру, Янг, никогда не выступал в Соединенных Штатах, на земле его музыкального
    вдохновения. Его компакт-диск 2007 года "Memphis" (благодаря которому Рой теперь
    частый гость фестивалей и концертов в США) буквально разбудил все мировое блюз-сообщество.
    Теплые, отеческие голосовые интонации Роя заставляют себя почувствовать уютно
