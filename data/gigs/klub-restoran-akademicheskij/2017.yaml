  band_name: Константин Никольский
  band_token: nikolsky
  club_id: 770
  club_name: Джаз-клуб "Академический"
  club_token: klub-restoran-akademicheskij
  price: от 1500 руб.
  comments: "\"О несчастных и счастливых, о добре и зле\" пел соловей в известной\
    \ сказке Андерсена. Сегодня в этой фразе любой узнает и подхватит легендарную\
    \ песню Константина Никольского \"Музыкант\". И не только ее: \"Ночная птица\"\
    , \"Я сам из тех...\", \"Один взгляд назад\", \"Мой друг художник и поэт\", \"\
    Птицы белые мои\", \"От любви к любви\", \"Прошедший день\", \"Я бреду по бездорожью\"\
    \ - автором музыки и слов всех этих песен, вошедших в золотой фонд отечественной\
    \ рок-культуры, является один человек - певец и гитарист Константин Никольский.\r\
    \nНикольский - легенда отечественного рока, один из корифеев жанра, и это не просто\
    \ эпитеты. За несколько десятилетий уникальный стиль Никольского, его сценическая\
    \ харизма, в конце концов, философия, воплощенная в творчестве, стали близки огромной\
    \ армии поклонников - не просто фанатов, но единомышленников, годами хранящих\
    \ верность своему кумиру.\r\nВ далекие 1970-е он стал играть рок-н-ролл, а в начале\
    \ 80-х вошел в состав легендарной группы \"Воскресение\". Музыкант играл в популярных\
    \ группах: \"Атланты\", \"Цветы\", \"Фестиваль\", \"Зеркало мира\". С 1990 года\
    \ Константин Никольский дает сольные концерты, на которых исполняет песни, написанные\
    \ в разное время на свои стихи и на стихи португальского поэта Фернандо Пессоа.\
    \ Музыкальная карьера артиста сложилась без телевизионной рекламной суеты и праздных\
    \ фонограммных тусовок, что, однако, не мешает ему собирать на своих выступлениях\
    \ полные залы в разных городах России на протяжении многих лет исключительно живой\
    \ концертной практики."
