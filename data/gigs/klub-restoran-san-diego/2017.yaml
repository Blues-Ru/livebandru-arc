  comments: "Анатолий Алешин - легендарный вокалист группы \"Аракс\" будет петь песни\
    \ в теплой дружественной обстановке для Вас. Его жизненный путь очень интересен.\
    \ В своем время, для того, чтобы повысить уровень своего вокала,  Анатолий Алешин\
    \ поступил в Гнесинское училище, а начал свою профессиональную деятельность в\
    \ ВИА \"ВЕСЕЛЫЕ РЕБЯТА\" и за время работы в коллективе успел принять участие\
    \ в записи 8 синглов и двух виниловых дисков \"ЛЮБОВЬ ОГРОМНАЯ СТРАНА\" и \"ДРУЖИТЬ\
    \ НАМ НАДО\". Именно в составе этой группы Анатолий Алешин стал известным исполнителем-вокалистом,\
    \ о котором узнал весь Советский Союз. Затем перешел на работу солистом в московскую\
    \ рок-группу \"АРАКС\". Вместе с коллективом записывал синглы с ЮРИЕМ АНТОНОВЫМ\
    \ и виниловые диски \"УЗНАЙ МЕНЯ\" и \"КОЛОКОЛ ТРЕВОГИ\". Легендарная группа прославилась\
