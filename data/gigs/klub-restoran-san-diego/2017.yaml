  band_name: Boogie Woogie Boom. Рок-н-рольная вечеринка
  club_id: 866
  club_name: Клуб-ресторан "Сан-Диего"
  club_token: klub-restoran-san-diego
  price: 500/600 руб.
  comments: "27 июля зажигаем в клубе \"Сан-Диего\" на ул. Школьная, 11 на рок-н-рольной\
    \ вечеринке. Обещаем, будет жарко!  Boogie Woogie Boom исполнит классические хиты\
    \ 20-50-х годов в стилях Rock'n'Roll и piano boogie. Исполнение этих музыкантов,\
    \ буквально, переносит вас в то время, когда фортепианная классика сдалась под\
    \ напором бешеного драйва, в то время, когда пионеры виртуозы, движимые сверхзадачей\
    \ получить оркестровое звучание подручными средствами \"волшебного ящика\" создали\
    \ эту изящную и эмоциональную музыку. Не только музыку, но еще и образ мысли.\
    \ Это трудно описать словами, лучше просто послушать!\r\n\r\nПианистка Юлия Шишкина\
    \ обладает не только великолепной техникой и задором, но и\r\n\r\nнедюжей физической\
    \ силой, необходимой для исполнения такой музыки. Полет ее\r\n\r\nфантазии всегда\
    \ поддерживает гитарист Михаил Клягин. Импровизируя свободно и\r\n\r\nразнообразно,\
    \ он демонстрирует в своих соло знание самых разных гитарных стилей.\r\n\r\nКогда\
    \ же приходит время \"громить рок-н-роллом\", ураганом приносит \"Заю\" (Катерину\r\
    \n\r\nЗаволокину). Гротескная \"Зая\" принимает изломанные позы, закатывает глаза,\
    \ делает\r\n\r\nгубки бантиком, бросает томные взгляды, от души жеманничает, твистует,\
    \ рычит, не жалея ни себя, ни зрителя! Под таким напором не удерживается ни Михаил\
    \ - он закидывает гитару за голову и солирует \"как нечего делать\", ни Юлия,\
    \ которая подрывается и ударяется в безудержный пляс. Группа исполняет как \"\
    вечнозеленые\" хиты эпохи 20-50хх, так и авторский материал."
