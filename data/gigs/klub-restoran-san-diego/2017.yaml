  comments: "Ансамбль Meldis создан в Москве в апреле 2006 года. Репертуар ансамбля\
    \ включает в себя музыку и песни Ирландии, Бретани, Шотландии, а также народные\
    \ и авторские песни на русском языке. Музыка Meldis - это сочетание тонкой лирики\
    \ и живой энергии. Легкость и чистота звучания и завораживающая магия мелодий\
    \ переносят слушателя сквозь века, уникальный по красоте серебристый вокал оживляет\
    \ в памяти волшебные сказания и кельтские легенды. При этом музыканты Meldis умеют\
    \ непринужденно сочетать старинные песенные традиции с современными веяниями мирового\
    \ рока, не используя стандартную рок-н-ролльную ритм-секцию (бас-гитару и барабаны),\
    \ и это делает композиции группы по-настоящему увлекательными. Под эти песни можно\
    \ не только мечтать, но и танцевать.\r\n\r\nНеповторимая особенность Meldis заключается\
    \ в том, что редкий для отечественной сцены инструмент - кельтская арфа - звучит\
    \ здесь не как экзотическая приправа к саунду группы, а интенсивно и равноправно\
    \ используется для создания общего звукового полотна, в котором рока не меньше,\
    \ чем фолка, а драйва не меньше, чем романтики.\r\n\r\nОсновательница проекта\
    \ Meldis - первая в России исполнительница на кельтской (ирландской) арфе Анастасия\
    \ Паписова. Анастасия освоила этот древний инструмент бардов самостоятельно, оттого\
    \ ее иногда сравнивают со знаменитой канадской арфисткой Лориной Маккеннитт. В\
    \ студенческие годы Анастасия научилась играть на гитаре и флейте, а взяться за\
    \ кельтскую арфу ее побудило знакомство с творчеством легендарного бретонского\
    \ арфиста и популяризатора народной музыки Алана Стивелла.\r\n\r\nДебют Анастасии\
    \ Паписовой в качестве кельтской арфистки состоялся на сцене Центрального Дома\
    \ Художника в Москве на первом российском Фестивале кельтской музыки в июне 1998\
    \ года. В августе 2001 года она с успехом выступила в Дублине и Белфасте с сольной\
    \ программой, став, таким образом, первым кельтским арфистом из России, признанным\
    \ на ирландской земле. В 2009 году Анастасия первая и единственная из россиян\
    \ выступила на конкурсе кельтских арфистов \"Camac Trophy\" в рамках главного\
    \ кельтского фестиваля планеты \"Festival Interceltique de Lorient\" и вышла в\
    \ финал, заняв пятое место. В апреле 2016 года Анастасия Паписова была приглашена\
    \ на \"Edinburgh International Harp Festival\" - ее выступление транслировалось\
    \ в прямом эфире шотландского Celtic Music Radio, интернет-вещание которого охватывает\
    \ весь мир.\r\n\r\nТакже Анастасия Паписова выступала в составах ансамблей кельтской\
    \ музыки Воинство Сидов и Si Mhor, стояла у истоков проекта Mervent и до сентября\
    \ 2004 года была его солисткой. В качестве приглашенного музыканта сотрудничала\
    \ с группами Сакмаров-Бэнд, Тол Мириам, Рада & Терновник, Ваганты, Denis Rozov\
    \ Band.\r\n\r\nИдея создания собственного проекта возникла у Анастасии Паписовой\
    \ во время записи сольного альбома \"Отдохни, Волшебник\" (2006), где партии вокала,\
    \ гитары и арфы она исполнила самостоятельно. Концертное воплощение этого материала\
    \ потребовало участия дополнительных музыкантов. Так родился ансамбль Meldis,\
    \ название которого совпадает с творческим псевдонимом Анастасии.\r\n\r\nНа счету\
