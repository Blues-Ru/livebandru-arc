    \ из фильмов \"Шербурские зонтики\" и \"Крестный отец\" и другие столь же навязшие\
    \ в зубах и набившие оскомину. Перспектива играть подобное, пусть даже и в компании\
    \ столь замечательного музыканта, как Сергей Осокин, меня вдохновляла настолько\
    \ мало, что я взял с собою папочку с не так давно снятыми и записанными нотами\
    \ мелодиями любимых мною довоенных фокстротов, вальсов и европейских танго (то\
    \ есть - из репертуара оркестров, которые содержала всякая сколько-нибудь уважающая\
    \ себя гостиница в довоенные времена).\r\n\r\nПосле сыгранных нескольких вступительных\
    \ произведений я предложил Сергею: - А давай поиграем вот это! - и открыл принесенную\
    \ папочку с нотами. - А давай! - воодушевился Сергей, которого перспектива играть\
    \ заигранное вдохновляла не более моего. И мы \"дали\". Читать с листа нас научили\
    \ еще в школе, аккомпанировать друг другу - немного попозже, но тоже хорошо научили,\
    \ аранжировки рождались в реальном времени, как и происходит обычно в таких случаях.\
    \ Публика поглядывала на нас с интересом: что эти двое там с таким удовольствием\
