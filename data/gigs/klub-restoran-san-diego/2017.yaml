  comments: "Артем Лалаян - пианист, композитор и автор проекта   \"Джаз с армянским\
    \ акцентом\". В 1988 году в Нагорном Карабахе был создан квартет джазовой музыки\
    \ \"Амарас\", организатором и идеологом которого стал пианист и композитор Артем\
    \ Лалаян. Квартет стал популярен в Армении благодаря оригинальному и колоритному\
    \ репертуару из авторских композиций.\r\n\r\nНаряду с концертными выступлениями\
    \ квартет \"Амарас\" принимал участие в различных фестивалях и быстро завоевал\
    \ симпатии аудитории, а также привлек внимание зарубежной джазовой индустрии.\r\
    \n\r\nВ 1993 году руководитель коллектива \"Амарас\" Артем Лалаян был приглашен\
    \ в Москву на преподавательскую работу в эстрадно-джазовый колледж им. Гнесиных,\
    \ где продолжил историю группы \"Амарас\", в составе которой играли уже известные\
    \ российские музыканты. В 1994 г. музыкант создал этно-джаз проект \"Джаз с армянским\
    \ акцентом\". Репертуар программы состоял из авторских произведений Артема Лалаяна,\
    \ который со временем обновлялся.\r\n\r\nПроект имел и имеет большой успех в России\
    \ и за рубежом. Продолжая концертировать, Артем Лалаян активно занимался организацией\
    \ музыкальных фестивалей и конкурсов, таких, как \"Джаз коктейль\", \"Джазовый\
    \ марафон\" и др., которые проводились на лучших концертных и клубных площадках\
    \ Москвы.\r\n\r\nВ 2003 году, имея за плечами огромный опыт, массу наработок и\
    \ партнерских отношений как в России, так и за рубежом, руководитель коллектива\
    \ \"Амарас\" Артем Лалаян создал креативную компанию \"Амарас Арт\", которая успешно\
    \ выступала в роли организатора джазовых фестивалей и конкурсов молодых исполнителей,\
    \ а также преуспела в создании и продвижении клубно-ресторанных проектов в Москве.\r\
    \n\r\nПродолжая организаторскую деятельность, претворяя в жизнь различные акции\
    \ как клубных форматов, так и на концертных площадках, Артем Лалаян активно концертировал\
    \ и принимал участие в международных джазовых фестивалях.\r\n\r\nНаряду с творческой\
    \ и организаторской деятельностью в России и на международной арене, Артем Лалаян\
    \ становится сопродюсером известных джазовых музыкантов мирового уровня. Сегодня\
    \ музыкант готовится к европейскому концертному турне с обновленной программой\
    \ \"Джаз с армянским акцентом\". Идея проведения серии концертов обусловлена продолжительным\
    \ перерывом в концертных выступлениях, самобытностью проекта, и была поддержана\
    \ как музыкантами из разных стран, так и аудиторией, которая является индикатором\
    \ востребованности  авторской музыки Артема Лалаяна."
