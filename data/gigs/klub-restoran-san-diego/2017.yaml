  club_id: 866
  club_name: Клуб-ресторан "Сан-Диего"
  club_token: klub-restoran-san-diego
  price: 800/1000 руб.
  comments: "рио Игоря Молчанова и Юрий Рябов с программой \"Фрэнк Синатра и не только\"\
    .\r\nЮРИЙ РЯБОВ.\r\nЮрий Рябов музыкант с большим опытом выступлений. Он является\
    \ приверженцем стиля evergreen, в его репертуаре бессмертные композиции золотой\
    \ эры джаза. Все началось еще в детстве, именно тогда Юрий влюбился в гитару и\
    \ довольно быстро освоил игру на ней, аккомпанируя себе.\r\nЮрий Рябов окончил\
    \ институт культуры, дирижерский факультет. Его первым творческим испытанием и\
    \ успехом стала работа над пластинкой Александра Зацепина в 1980 г. Тогда пришло\
    \ признание Рябова, как певца, как музыканта. Он стал сотрудничать с популярными\
    \ в те времена эстрадными коллективами, такими как ансамбли \"Поющие сердца\"\
    , \"Ярмарка\".\r\nЕго мягкий, изысканный баритон стал визитной карточкой на многих\
    \ концертных площадках России и за рубежом. В 1988 г., когда открылись границы\
    \ для советских музыкантов, Юрий отправился за рубеж и стал работать в Финляндии,\
    \ Франции и Великобритании, где с успехом выступал на концертных площадках и в\
    \ ресторанах. Зарубежный опыт обогатил репертуар Юрия Рябова, произношение и знание\
    \ английского языка. Знатоки музыки evergreen считают, что Юрий Рябов является\
    \ одним из самых ярких российских исполнителей, поющих на языке оригинала. Достаточно\
    \ послушать его CD \"The Еvergreen Hits\", чтобы убедиться в правоте такого заключения.\r\
    \nНесомненными авторитетами и кумирами музыканта были и остаются Энди Вильямс,\
    \ Энгельберт Хампердинк и, конечно, Фрэнк Синатра, 100-летний юбилей которого\
    \ отмечают во всем мире. Именно ему посвящает свое выступление на фестивале Юрий\
    \ Рябов. Ему аккомпанирует трио Игоря Молчанова в составе:\r\n\r\nИГОРЬ МОЛЧАНОВ.\r\
    \nПолучил музыкальное образование в муз. школе в Москве по классу фортепьяно и\
    \ аккордеон.\r\nУчастник студенческих ансамблей во время учебы в техникуме и авиационном\
    \ институте.Служил в военном оркестре и ансамбле песни и пляски в ГСВГ (Группа\
    \ Советских войск в Германии). В 70 -х годах - клавишник в ВИА \"Эврика\" г.Химки.\
    \ Работал в Московском объединении музыкальных ансамблей (МОМА). Участник междкнародного\
    \ фестиваля \"JAZZ VOISES\" - 2015 в Москве (организаторы - ДЖАЗАРТКЛУБ и джаз-кафе\
    \ \"ЭССЕ\").\r\nАЛЕКСЕЙ ГАГАРИН.\r\nУдарные инструменты. В 1981г. закончил муз.уч.им.\"\
    Октябрьской Революции\" теперь ГНЕСИНКА там же преподавал.Играл:АлександрАйзенштадт.\
    \ Игорь Бриль.Николай Левиновский \"АЛЛЕГРО\".Герман Лукьянов \"КАКДАНС\". Ирина\
    \ Отиева.Лариса Долина.Сергей Манукян.Алексей Козлов \"АРСЕНАЛ\".\r\nМАЛЬЯН ГРИГОРИЙ.\r\
