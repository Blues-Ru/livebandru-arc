    \ музыка ансамбля абсолютно непредсказуема: созерцательная лирика в один момент\
    \ сменяется дикими танцами, переходящими в песни неведомых народов, минималистическое\
    \ музицирование взрывается безумной какофонией. Наполненные юмором и самоиронией\
    \ выступления коллектива не дают слушателю расслабиться ни на секунду.\r\n\r\n\
    Музыка, которая \r\nрождается из непосредственного взаимодействия, контакта между\
    \ этими музыкантами полна строгости и иронии, безумного напряжения и лирики, самозабвенной\
    \ экспрессии и медитативности. Каждый концерт \r\nпревращается в неповторимое\
    \ приключение, в котором невозможно \r\nпредсказать развитие событий. В каком-то\
    \ смысле это передвижная \r\nлаборатория звука и стиля, где раз от раза ставится\
