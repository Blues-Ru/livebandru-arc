- id: 34130
  date: '2013-03-06'
  time: '20:00'
  band_id: 546
  band_name: Goat's Notes
  band_token: goatsnotes
  club_id: 598
  club_name: Клуб Алексея Козлова
  club_token: kozlovclub
  price: pay what you want
  comments: "Накануне официальной презентации своего первого релиза на знаменитом\
    \ лейбле Leo Records, российско-французский импровизационный коллектив Goat's\
    \ Notes сыграет абсолютно необыкновенный концерт!\r\nНа сцену Клуба выйдут практически\
    \ все музыканты, сотрудничавшие с проектом в последнее время, а именно:\r\nМария\
    \ Логофет - скрипка, эффекты,\r\nАндрей Бессонов - кларнет,\r\nОлег Маряхин -\
    \ труба, саксофоны,\r\nЮрий Севастьянов - саксофон,\r\nИлья Вилков - тромбон\r\
    \nГригорий Сандомирский - фортепиано, мелодика\r\nВладимир Кудрявцев - контрабас\r\
    \nКирилл Паренчук - барабаны, перкуссия, сопрано-саксофон\r\nПетр Талалай - барабаны,\
    \ электроника\r\nПеред зрителями предстанет уникальный импровизирующий оркестр\
    \ с двумя барабанщиками и внушительной духовой секцией. А публику, разумеется,\
    \ ждут сюрпризы, которыми насыщено каждое появление Goat's Notes, чья музыка есть\
    \ \"свободная форма для свободных людей\".\r\nСформированный пианистом Григорием\
    \ Сандомирским и контрабасистом Владимиром Кудрявцевым в 2008 году состав стал\
    \ резидентом почти всех экспериментальных площадок Москвы. На сегодняшний день\
    \ это один из самых спонтанных  и непредсказуемых проектов на российской импровизационной\
    \ сцене. Его концерты похожи на путешествия по неизведанным ландшафтам -  стильным\
    \ и абстрактным, с почти оркестровой динамикой.\r\nИ, в качестве бонуса, - отзыв\
    \ о Goat's Notes одного из наших лучших джазовых критиков, Дмитрия Ухова:\r\n\"\
    Удивительно, но если искать в нашей музыке аналоги Goat's Notes, то отнюдь не\
    \ в новой импровизационной музыке - она генетически увязла во фри-джазе - а именно\
    \ в этно-джаз-рок-авангарде московского \"Вежливого отказа\" и петербургского\
    \ \"Аукцыона\", которые тоже перешагивают жанровые границы. Первый - с объединением\
    \ \"Персимфанс\" пианиста Петра Айду играет регтаймы Стравинского и раннего кубофутуриста\
    \ Александра Мосолова (известного на Западе автора \"Завода\" - Iron Foundry).\
    \ Питерский \"Аукцыонъ\" в свою очередь, при поддержке земляка Владимира Волкова,\
    \ дает новогодние концерты со струнным оркестром Opus Posth - авангардной инкаранцией\
    \ \"Академии старинной музыки\" скрипачки Татьяны Гринденко. Вместе они исполняют\
    \ обработки музыки Перселла и собственные сочинения композитора-минималиста Владимира\
    \ Мартынова. Но в Goat's Notes все это сосредоточилось в одном коллективе, как\
    \ в свое время, в \"Матерях изобретения\" Фрэнка Заппы (названия пьес Goat's Notes,\
    \ включая заглавную \"Fuzzy Wonder\", тоже в духе его абсурдных текстов). И Goat's\
    \ Notes - это тот случай, когда конечный результат значительнее, чем сумма всех\
    \ слагаемых\""
