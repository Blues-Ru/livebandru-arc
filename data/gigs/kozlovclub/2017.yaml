    \ выйдут еще два музыканта джаз-оркестра Игоря Бутмана, оба - с мировой славой:\
    \ гитарист Евгений Побожий и Сергей Корчагин (бас-гитара и контрабас).\r\nА также\
    \ Вячеслав Быстров (пианист и клавишник многих коллективов Москвы и Санкт-Петербурга)\
    \ и Александр Потапов - один из самых востребованных барабанщиков страны, участник\
    \ проектов \"Вечерний Ургант\", \"Баста\", Guru Groove Foundation и других."
- id: 65462
  date: '2017-06-07'
  time: '20:00'
  band_id: 448
  band_name: C-Jam Club Jazz Orchestra
  band_token: cjc-jazz-orchestra
  club_id: 598
  club_name: Клуб Алексея Козлова
  club_token: kozlovclub
  price: 800-1000
  comments: "В возрожденном Клубе Алексея Козлова - возрожденный \"C-Jam Club Jazz\
    \ Orchestra\"!\r\nОркестр, созданный в 2005 году - один из самых значимых проектов\
    \ Георгия и Дмитрия Горбовых, основателей знаменитой молодежной джазовой студии\
    \ C-Jam Club.\r\nВ 2005-2011 гг. C-Jam Club Jazz Orchestra Георгия Горбова был\
    \ в числе самых успешных биг-бендов: в первом же своем сезоне взял спецприз \"\
    Джаз-Фестоса\", стал лауреатом ряда других фестивалей, заявил себя проектом, который\
    \ надолго и всерьез. В списке его побед - три Гран-при \"Джаз-Фестоса\", по два\
    \ звания лауреата Международных фестивалей \"Джалитон\" и Musicfest, где он выступал\
    \ хэдлайнером, плюс награды лауреата фестиваля В.Спивакова и многих других. Оркестр\
    \ выступал в ММДМ и Концертном зале им. Чайковского, во множестве культурных центров\
    \ и клубов столицы, играя, как правило, при аншлагах. И, разумеется делил сцену\
    \ с именитыми друзьями оркестра - дал серию концертов со звездой мирового джаза,\
    \ трубачом Валерием Пономаревым, блеснул в проекте с ирландским композитором Брайном\
    \ Ирвайном (современная экспериментальная музыка), спецгостями концертов были\
    \ Алексей Заволокин, Алина Ростоцкая, Владимир.Капырин, Наталья Скворцова, Олег\
    \ Грымов и др.\r\nВ 2011 году C-Jam Club Jazz Orchestra ушел на летние каникулы,\
    \ летом того же года закрылась репетиционная база, каникулы затянулись на шесть\
    \ лет.\r\nК счастью, в этом году студия \"C-Jam Club\" переселилась в новое здание\
    \ с залом для оркестровых репетиций - и Оркестр был собран вновь! В состав вернулись\
    \ ветераны (Георгий Горбов, Виктор Геравкер, Екатерина Рамжаева, Андрей Антонов),\
    \ к ним примкнули известные музыкальной Москве инструменталисты и вокалистки (Анатолий\
    \ Осипов, Иван Акатов, Вячеслав Кейзеров, Андрей Липатов, Мария Одинокова, Магдалена\
    \ Тамайо), и возрожденный Оркестр открыл свой новый 7-й сезон туром по московских\
    \ клубам и суперконцертом с Валерием Пономаревым в Доме Кино.\r\nИз нового пресс-релиза\
    \ Оркестра:\r\n\"Музыка, которую мы играем, ориентирована, в первую очередь, на\
    \ креативную молодежь и интеллектуальный средний класс. Мы знакомим с ней тех,\
    \ кто готовы открыть для себя новые вехи в музыке. Мы играем музыку, которую интересно\
    \ и слушать, и играть. Наконец, мы делаем эту музыку модной!..\r\nМы приглашаем\
    \ на концерт 7 июня всю нашу публику, которой было сполна, всех, кто открыл для\
    \ себя оркестр в этом сезоне, всех, кто играл с нами, ездил на гастроли, фестивали,\
    \ к морю, на шашлыки, тусил в клубах и зажигал на танцполе, всех, кто ностальгирует\
    \ по юности с \"C-Jam Club Jazz Orchestra\" - всех, чью жизнь мы делали и делаем\
    \ лучше!\"\r\nВ программе концерта:\r\n- репертуар нового, 7-го по счету концертного\
    \ сезона;\r\n- опенинг из знаменитого мультсериала \"Симпсоны\";\r\n- funk-хиты\
    \ прошлых сезонов Оркестра."
