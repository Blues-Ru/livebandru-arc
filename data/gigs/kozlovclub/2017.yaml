    \"Число Пи\" - так называлась самая известная композиция NoName Band. Она и дала\
    \ этому коллективу новое имя.\r\nПроект, как утверждают его участники, \"исследует\
    \ музыкально-математическое устройство космоса, возникающего внутри каждого музыканта\
    \ коллектива и образующегося в слиянии различных творческих характеров при поиске\
    \ гармонии сфер, гармонии мира.\"\r\nМузыка проекта насыщена красочными аллегориями\
    \ и метафорами, аранжировки следуют мировым традициям джаза и классики, удачно\
    \ сочетая их с современными средствами выразительности и собственными, новооткрытыми\
    \ приемами музыкального языка.\r\nВ настоящее время \"Музыкальное сообщество Число\
    \ Пи\" работает над дебютным альбомом. А также дает живые концерты своих концептуальных\
    \ произведений и музыкальных медитаций.\r\n8 июня на новую сцену Клуба выйдут:\r\
    \nАльберт Фокин - клавишные,\r\nБорис Ионов - барабаны,\r\nДмитрий Фомин - бас,\r\
    \nАлексей Полубабкин - электрогитара,\r\nСалман Абуев - труба,\r\nЕгор Шаманин\
    \ - тенор саксофон,\r\nВероника Шрамко - вокал."
