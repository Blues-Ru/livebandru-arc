  date: '2017-05-31'
  time: '20:00'
  band_name: Scott Henderson Trio
  club_id: 598
  club_name: Клуб Алексея Козлова
  club_token: kozlovclub
  price: 1000-3000
  comments: "Клуб Алексея Козлова возвращается: первый официальный концерт на новом\
    \ месте!\r\nВечером 31 мая на новую сцену Клуба, расположившегося по адресу: ул.\
    \ Маросейка, дом 9/2, \"Left Bank\", выйдет живая легенда музыки фьюжн - гитарист\
    \ Scott Henderson.\r\n\r\nНачинал Скотт в годы расцвета блюз-рока, учась на слух\
    \ у Led Zeppelin, Джеймса Брауна, Джеффа Бека, Джими Хендрикса, Ритчи Блэкмора,\
    \ Альберта Кинга и Бадди Гая. Классическое гитарное образование получил в \"Guitar\
    \ Institute Of Technology\" Лос-Анджелеса, затем ушел в работу с группой Чика\
    \ Кореа, Жаном-Люком Понти, Джеффом Берлином и Джо Завинулом. А в 1984-м вместе\
    \ с басистом Гэри Уиллисом собрал группу Tribal Tech, с которой записал 10 альбомов\
    \ (в том числе знаменитый \"Rocket Science\"). Наградами на пути к славе стали\
    \ звания \"Джазовый гитарист #1\" от журнала \"Guitar World\" (1991) и \"Лучший\
    \ джаз-гитарист-1992\" от журнала \"Guitar Player\".\r\nВ 1994 году Хендерсон\
    \ выпустил первую сольную пластинку \"Dog Party\" - лучший блюз-альбом года по\
    \ версии \"Guitar Player\". Высшие оценки прессы получил и второй блюзовый альбом\
    \ \"Tore Down House\" (1997) с вокалом гениальной Тельмы Хьюстон. Самой же зрелой\
    \ и значимой работой Скотта считается его сольный альбом \"Well To The Bone\"\
    \ (2002), записанный с Кирком Ковингтоном (барабаны, вокал) и басистом Джоном\
    \ Хамфри. Успех альбома трио закрепило аншлаговым туром по Северной и Южной Америке,\
    \ Европе и Японии.\r\n\r\nПолный зал Клуба Алексея Козлова маэстро собирал уже\
    \ трижды - концертами HBC SuperТрио (Scott Henderson/Jeff Berlin/Dennis Chambers)\
    \ и в трио с Трэвисом Карлтоном и Аланом Херцем.\r\n31 мая вместе со Скоттом на\
    \ сцену Клуба выйдут барабанщик Арчибальд Лигоньер (Archibald Ligonniere) и бас-гитарист\
    \ Ромэн Лабэ (Romain Labaye)."
- id: 65416
  date: '2017-06-01'
  time: '20:00'
  band_name: Dmitry Ilugdin Trio
  club_id: 598
  club_name: Клуб Алексея Козлова
  club_token: kozlovclub
  price: 500-1000
  comments: "\"Это современный европейский джазовый мейнстрим, вписывающийся в любую\
    \ звуковую среду - концертную, клубную, в джазовые радиостанции и даже в жанр\
    \ contemporary. Это легкая музыка в хорошем смысле слова, при этом погружающая\
    \ слушателя в недавнюю музыкальную историю. Но \"возраста\" у нее нет - талант\
    \ и профессионализм актуальны всегда\". (Дмитрий Ухов о музыке Dmitry Ilugdin\
    \ Trio)\r\n\r\nПервый официальный концерт российских музыкантов в новом здании\
    \ Клуба Алексея Козлова.\r\nКратко о лидере Трио.\r\nПианист и композитор Дмитрий\
    \ Илугдин - лауреат молодежной премии \"Триумф\", музыкант знаменитого \"Арсенала\"\
    \ (с 1999-го по 2009 гг.), творческий партнер Алексея Козлова в течение последних\
    \ 16 лет, автор музыки к игровым и документальным фильмам, участник многих музыкальных\
    \ проектов, абсолютно состоявшаяся творческая личность из инструментальной элиты\
    \ России.\r\n\r\nВ 2012 году Дмитрий собрал инструментальное трио и выпустил на\
    \ рекорд-лейбле ArtBeat Music свой дебютный альбом \"Никитский Бульвар\". Проект\
    \ и музыка Дмитрия, которую можно смело отнести к современной европейской джазовой\
    \ культуре, сразу же получили множество положительных отзывов - как от экспертов,\
    \ так и от простых любителей музыки.\r\nВдохновившись успехом, Трио приступило\
    \ к активному концертированию на площадках Москвы и других городов, а в 2015 году\
    \ музыканты выступили на самом масштабном российском джазовом фестивале \"Усадьба-Джаз\"\
    . В настоящее время Трио работает над выпуском второго альбома.\r\n\r\nИ еще,\
    \ не менее важное: партнеры Дмитрия - контрабасист Виктор Шестак (справа на фото)\
    \ и один из самых востребованных российских барабанщиков Петр Ившин - также музыканты\
    \ экстра-класса, гордость нашей инструментальной музыки.\r\n\r\nВывод: не пропустите\
    \ этот концерт!"
