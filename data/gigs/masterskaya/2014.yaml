  time: '20:00'
  band_id: 694
  band_name: М-АРТель
  band_token: m-artel
  club_id: 174
  club_name: Мастерская
  club_token: masterskaya
  price: 400 руб.
  comments: 22-го октября на сцене московского клуба Мастерская творческая группа
    М-Артель представит джаз-панк сюиту "Озорные панкушки". Это абсолютно уникальное
    и безумное по своей смелости явление, цепляющее до глубины души всех тех, кто
    по-настоящему любит Музыку. Музыканты из М-Артель не боятся экспериментировать
    - они круто месят барокко, джаз и ска с истинно панковской искренностью и непосредственностью.
    Новая программа войдет в третий концептуальный альбом группы, включая композиции
    'Озорные панкушки', 'Похороны окурка', 'Про похмелье' и 'Один день из жизни кота
    Василия'. Веселье, игра воображения и никакого джазового снобизма! Успейте услышать
    это первыми.
