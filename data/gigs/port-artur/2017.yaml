- id: 63447
  date: '2017-02-17'
  time: '21:00'
  band_name: Sharon Lewis (USA)
  club_id: 775
  club_name: Портъ Артуръ
  club_token: port-artur
  comments: "\"Мощный и проникновенный голос Sharon Lewis - это восьмое чудо света\
    \ в мире музыки\" Howard Reich, музыкальный критик Chicago Tribune.\r\n\r\nSharon\
    \ Lewis сравнивают с Aretha Franklin, Etta James и Koko Taylor. За годы музыкальной\
    \ карьеры Sharon Lewis выступала на одной сцене с такими блюзовыми и соул-легендами,\
    \ как Koko Taylor, Son Seals, Denise LaSalle, Robben Ford, Coco Montoya, Billy\
    \ Branch, Melvin Taylor, Sugar Blue, Mumford & Sons и многими другими. На протяжении\
    \ нескольких лет она является хедлайнером Chicago Blues Festival и резидентом\
    \ двух главных чикагских блюзовых клубов Buddy Guy's Legends и Rosa's lounge.\
    \ В 2009 году журнал Soul Patrol Magazine включил Sharon Lewis и ее бэнд Texas\
    \ Fire в ТОП-15 лучших \"живых\" блюзовых групп США, а престижный журнал Blues\
    \ Revue назвал альбом The Real Deal в числе лучших альбомов 2011 года. Альбомы\
    \ Sharon Lewis&Texas Fire выходят на главном блюзовом лейбле Чикаго Delmark Records,\
    \ который выпускает только лучших современных блюзменов."
- id: 63448
  date: '2017-02-18'
  time: '21:00'
  band_name: 'The Jumping Cats . Cпециальный гость: Jose Luis Pardo'
  club_id: 775
  club_name: Портъ Артуръ
  club_token: port-artur
  comments: "Команда The Jumping Cat продолжает работает над международными блюзовыми\
    \ проектами. В этот раз специальным гостем Котом станет их большой друг - Jose\
    \ Luis Pardo. Гитарист и вокалист, директор блюзовой школы Мадрида. Яркий и виртуозный\
    \ Музыкант со своим уникальным стилем. Артист понимающий блюз изнутри, участник\
    \ и хедлайнер европейских блюзовых фестивалей, записавший множество сольных альбомов\
    \ и отыгравший сотни концертов с американскими музыкантами.  \r\nНа последнем\
    \ альбом Хосе \"Ruccula for Dracula\" сыграли в том числе пианист Kenny \"Blues\
    \ Boss\" Wayne и классик Чикагского блюза Bob Stroger. \r\nThe Jumping Cats и\
    \ Хосе - старые друзья, которым уже есть что вспомнить (как концерты в России,\
    \ так и гастроли в Испании). Поэтому каждый концерт проекта будет наполнен не\
    \ только прекрасной блюзовой музыкой, но и дружбой и взаимопониманием"
