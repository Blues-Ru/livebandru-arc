- id: 62964
  date: '2017-01-13'
  time: '21:00'
  band_name: Добраночь
  club_id: 775
  club_name: Портъ Артуръ
  club_token: port-artur
  price: бесплатный
  comments: "\"Добраночь\" была основана в 1998 году во Франции, куда компанию друзей-музыкантов\
    \ из Петербурга привела тяга к путешествиям и новым музыкальным впечатлениям.\r\
    \n После нескольких лет странствий группа вернулась на Родину, чтобы обрести новый\
    \ состав и новое звучание. \"Добраночь\" исполняет еврейскую, цыганскую и балканскую\
    \ народную музыку, опираясь на глубокое знание традиций, богатый опыт путешествий\
    \ и общения с народными музыкантами разных стран. Репертуар коллектива также включает\
    \ в себя русские песни времен расцвета духовых оркестров. За время своего существования\
    \ \"Добраночь\" посетила с гастролями более двадцати стран мира и записала шесть\
    \ альбомов. \r\nНередко музыканты спускаются со сцены и играют прямо среди слушателей,\
    \ как это делали их предшественники, играя на свадьбах лет сто назад."
