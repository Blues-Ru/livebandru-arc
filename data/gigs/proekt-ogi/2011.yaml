- id: 23044
  date: '2011-11-30'
  time: '22:00'
  band_id: 199
  band_name: PsycheDelta Blues Band
  band_token: psychedelta
  club_id: 59
  club_name: Проект О.Г.И.
  club_token: proekt-ogi
  price: 250 руб.
  comments: 'Участников "PsycheDelta Blues Band " собрала вместе любовь к дельта-блюзу
    и выросшему из него чикагскому блюзу пятидесятых - музыке, обладающей собственной
    неповторимой притягательностью, которую современный блюз, находящийся под сильным
    влиянием рока, практически утратил. В чем же здесь секрет? Похоже, музыкантам
    "Психодельты" удалось найти ответ: все дело в движении, которым полны традиционные
    блюзовые ритмы: шаффл, буги, диддли-бо, румба-блюз. Сыгранная правильно и с душой,
    эта музыка становится по-настоящему живой: она как будто дышит и вибрирует, раскачивается
    на месте или чуть-чуть ускоряется, вовлекая музыкантов и слушателей в единый энергетический
    поток. Эта вибрация - идеальное средство для передачи энергии и чувства со сцены
    в зал и обратно; сами же музыканты говорят просто: "качает" или "не качает", и
    все понятно без лишних слов. Но не менее важны песни, которые "Психодельта" исполняет:
    чудесные народные, отобранные многими поколениями блюзменов, или же авторские
    вещи, тоже давно вошедшие в традицию. Лаконичные блюзовые тексты оказываются на
    удивление многоплановыми: большая их часть, как полагается, повествует о любовных
    страданиях, причем эмоции варьируются от тихой грусти до яростного выяснения отношений,
    но есть в них и радость, и ирония, и надежда на лучшее, и всегда -  чувство собственного
    достоинства. "Блюз может дойти до грани истерики, но, в отличие от рока, никогда
    ее не переходит, - говорит певица и идеолог группы Тамара Зарицкая. - Вообще все
    эти песни на самом деле про меня. Это истории из нашей жизни или слова, которые
    я бы хотела кому-то сказать, но по разным причинам не могу. Здорово, что есть
    куда все это излить, такой драйв получается! А иногда так тянет повыть, как Хаулин
    Вулф - где еще такое возможно?". Еще одна важнейшая составляющая этой музыки -
    импровизация. Все музыканты группы немного импровизируют по ходу исполнения: расходятся,
    обыгрывая разные ритмические рисунки, сходятся вместе на риффах или отвечают друг
    другу, но настоящая возможность проявить себя - это, конечно, инструментальные
    соло. В отличие от большинства блюзовых групп,  "Психодельта" опирается не на
    гитару, а на духовую секцию: губную гармонику и саксофон. Каждый инструменталист
    не только добавляет в общий звук свой характер и индивидуальную манеру, но и "раскрашивает"
    его в соответствии со своими музыкальными предпочтениями: в саксофонных соло  Андрея
    Калинина заметно влияние джаза и фанка,  акустическая гитара Эстеля ближе к этнике,
    ну а харпер Сот - обладатель чистейшей фолк-блюзовой манеры.  Все вместе, поддержанные
    мощной и аутентичной ритм-секцией, они рассказывают свои музыкальные истории каждый
    раз по-разному, но всегда с ощущением живого драйва и неподдельного блюза.'
