  date: '2011-11-24'
  time: '21:00'
  band_id: 512
  band_name: Marimba Plus
  band_token: marimba-plus
  club_id: 145
  club_name: Радио Сити
  club_token: radio-city
  price: 400-600 руб.
  comments: "Концерт-презентация новой программы\r\n\"ПУТЕШЕСТВИЕ ПО МИРУ\"\r\n\r\n\
    24 ноября в клубе \"РадиоСити\" ансамбль Marimba Plus представляет свою новую\
    \ программу \"Путешествие по миру\". Самые разные страны и самые сочные музыкальные\
    \ краски предстанут перед зрителями в этот вечер. Африка - Восток - Болгария -\
    \ Молдавия - Грузия - Испания, и все дальше и дальше...\r\n\r\nMarimba Plus завоевал\
    \ популярность благодаря индивидуальному стилю - они искусно смешивают мировые\
    \ культуры и современные музыкальные стили. Джаз - этно - электро.  Музыка Marimba\
    \ Plus - это яркие композиции, полные драйва и целого урагана ритмов, искрящийся\
    \ микс музыкальных красок самых разных народов и времен, стилевые эксперименты\
    \ и импровизации, танцевальные мелодии и вокал, меняющийся от этники до скета.\r\
    \n\r\nПроект \"Путешествие по миру\" - это продолжение успеха фестиваля \"Этнодрайв!\"\
    , который Marimba Plus проводит в течение 2 лет. В рамках фестиваля с Marimba\
    \ Plus работали российские и зарубежные звезды стиля world music (Adrian Sanchez\
    \ (Испания), Хуун Хуур Ту, Сергей Старостин, и др.).\r\n\r\nСпециальной гостьей\
    \ этого концерта станет Таис Урумидис - певица с мощной энергетикой: гипнотизирующая\
    \ и заряжающая с первых же секунд. У Таис сильный глубокий чувственный голос и\
    \ естественная чарующая музыкальность.\r\n\r\n24 ноября - 21.00\r\nКлуб \"РАДИО\
    \ СИТИ bar & kitchen\"\r\nhttp://www.radiocitybar.ru\r\n(м. Маяковская, ул. Садовая\
    \ Б., 5, в здании гостиницы \"Пекин\",\r\nзаказ столиков по тел. +7 (495) 363-42-23)"
