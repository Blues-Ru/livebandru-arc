- id: 40523
  date: '2013-12-07'
  time: '20:00'
  band_id: 453
  band_name: Jazzеlectro и Надежда Рафаилиди
  band_token: jazzelectro-i-nadezhda-rafailidi
  club_id: 145
  club_name: Радио Сити
  club_token: radio-city
  price: бесплатный
  comments: "В программе представлены популярные джазовые композиции в инструментальном\
    \ и вокальном исполнении в стилях - мейнстрим, фьюжн, калипсо, а так же авторские\
    \ пьесы. Современное звучание, рожденное традициями классического джаза, глубина\
    \ восприятия музыки, профессионализм и интуиция придают творчеству коллектива\
    \ неповторимый почерк.\r\nСостав:\r\nОЛЕГ АГЕЕВ (тенор-саксофон, сопрано-саксофон,\
    \ бас-кларнет, флейта)\r\nНАДЕЖДА РАФАИЛИДИ (вокал)\r\nАЛЕКСЕЙ КАЛЯПИЧЕВ (клавишные\
    \ инструменты)\r\nСЕРГЕЙ СОКУЛЕР (бас-гитара, контрабас)\r\nАРКАДИЙ БАКЛАГИН (ударные\
    \ инструменты)\r\n\r\nСолист оркестра Левона Оганезова Олег Агеев - руководитель\
    \ коллектива, аранжировщик. Работал в оркестре под управлением Олега Лундстрема,\
    \ в Московском квинтете саксофонистов Владимира Зарембы, группе \"XL\" Вадима\
    \ Эйленкрига и других коллективах, проявляя себя как мулитиинструменталист, играющий\
    \ на саксофонах, флейте, бас-кларнете, исполняющий и эстраду, и джаз.\r\nНадежда\
    \ Рафаилиди - бессменная солистка джаз-группы, лауреат международного джазового\
    \ фестиваля, все годы сотрудничества является украшением коллектива, тонко чувствует\
    \  джазовую палитру, исполняет и традиционный джаз, и музыку в стиле босанова,\
    \ и эстрадную музыку. Современная джазовая певица, профессионально владеющая красивым\
    \ голосом, придает неповторимый шарм каждому концертному выступлению. Работала\
    \ с ведущими джазовыми музыкантами России, в творческом сотрудничестве  с Левоном\
    \ Оганезовым, Анатолием Силиным, Фондом \"Таланты мира\" под руководством Давида\
    \ Гвинианидзе, выступает на крупнейших российских и международных турнирах по\
    \ спортивным танцам с вокальной программой.\r\nСердце ансамбля - солист оркестра\
    \ Левона Оганезова, участник проекта \"Жизнь прекрасна\" Аркадий Баклагин. Его\
    \ игра на ударных инструментах, его ритмы украшали ансамбли - \"Арсенал\" Алексея\
    \ Козлова и \"Эстамп\".\r\nСергей Сокулер - бас-гитарист, композитор, аранжировщик.\
    \ Работал с популярным эстрадным артистом Ираклием, работает с вокалистками: Намгар,\
    \ Софи Окран, Людмилой Соколовой и другими.\r\nАлексей Каляпичев - пианист, композитор,\
    \ аранжировщик. Работал с композитором Алексеем Рыбниковым, с ведущими артистами\
    \ и музыкантами: Николаем Арутюновым, Ираклием, Аленой Свиридовой, Натальей Власовой,\
    \ Дмитрием Четверговым, Алексеем Беловым, и другими. Работал в группе \"Мечтать!\"\
    .\r\nПриглашаем вас на выступления джаз-квартета Олега Агеева!"
