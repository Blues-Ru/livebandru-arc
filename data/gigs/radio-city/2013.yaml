- id: 40539
  date: '2013-12-11'
  time: '20:00'
  band_name: Moscow Newzz и Владимир Нелюбин "От Блюза до Рока"
  club_id: 145
  club_name: Радио Сити
  club_token: radio-city
  price: бесплатный
  comments: "Кавер-версии зарубежных хитов прошлых лет в неожиданных аранжировках\
    \ с уникальным гитарным соло!\r\nВ программе только хиты: от Carlos Santana и\
    \ Gary Moore до Deep Purple и AC/DC\r\nВ репертуаре кавер- программы - многобразие\
    \ джаза, блюза и его поджанров: ритм-н-блюза, свинга, латино с фанком до рок-н-ролла!\r\
    \n10 лет на сцене - это опыт, профессионализм, мастерство!\r\n\"Владимир Нелюбин\
    \ & Moscow Newzz\" - это эксклюзивный коллектив, не имеющий аналогов. Мощный драйв\
    \ и виртуозные гитарные соло фронтмена, поддержанные командой профессиональных\
    \ музыкантов создают эффектное зрелище, которое никого не оставляет равнодушным.\
    \ Репертуар коллектива состоит из сильнейших хитов поп- и рок-музыки, а также\
    \ авторских произведений\r\nПроект \"Владимир Нелюбин & Moscow Newzz\" возник\
    \ в 2003 году как итог пятилетней работы высококлассного российского гитариста\
    \ в европейских коллективах. В составе группы 14 человек! За плечами сотни концертов\
    \ и выступлений, десятки городов России, ближнего и дальнего зарубежья. И только\
    \ спустя 10 лет группа начинает выступать в клубах ... Роскошь живого концерта\
    \ с мощной энергетикой и оригинальной программой наконец стала доступной для многих."
