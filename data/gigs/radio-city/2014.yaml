- id: 42677
  date: '2014-04-26'
  time: '20:00'
  band_name: Катрин Фермэ (вокал,США)
  club_id: 145
  club_name: Радио Сити
  club_token: radio-city
  price: 700 / 1000 / 1500 руб.
  comments: "Джаз и R&B вокалистка Кэтрин Фэрмэ стала обладателем звездной репутации\
    \ на мировой джазовой сцене. Музыкант музыкантов с диапазоном в 5 октав и гипнотическим\
    \ зажигающим присутствием на сцене. Ее музыкальные достижения так же велики, как\
    \ и разнообразны. Ее дебютный альбом MOONDANCE был назван нью-йоркским журналом\
    \ в Апреле 2013 года одним из хитов продаж среди CD! Она заслужила звание не только\
    \ преуспевающей вокалистки в стиле джаз, соул и R&B , но так же аранжировщика,\
    \ композитора, автора текстов и пианистки. Так же, как легендарные Сара Вон, Арета\
    \ Франклин и новоявленные знаменитости, такие как Рэйчел Фаррел и Алисия Кииз,\
    \ которые тоже владеют клавишами, композицией и мастерством аранжировки. Кэтрин\
    \ добилась расположения публики от Нью-Йорка до Европы, Африки, Средней Азии.\r\
    \nЭта афро-американская певица родилась в Нью-Йорке, но росла в соседнем округе\
    \ Вестчестер, где ее родители владели баром-рестораном, в котором каждый уик-энд\
    \ давали представление известные музыканты. Благодаря любви отца Фармэ к музыке,\
    \ Кэтрин была представлена легендарному джазовому певцу Л.Бэйкеру, который стал\
    \ брать ее на бэк-вокал. Она говорила: \" Я увидела тогда так много шоу-программ,\
    \ среди которых Джеймс Браун, \"Temptations\", \"Supremes\", Джексон файв и список\
    \ можно продолжить, что джаз буквально чмокнул меня еще в детстве!...\". \"Эта\
    \ музыка была для меня обычным делом и я это чувствовала до мозга костей...Мне\
    \ не нужно было это искать...\".\r\nКэтрин Фэрмэ получила бакалавра музыки в Бостонской\
    \ консерватории, изучая фортепиано и классический вокал как вторую специальность.\
    \ Впоследствии певица продолжила обучение этим дисциплинам в Нью-Йорке.\r\nПосле\
    \ окончания консерватории Кэтрин сделала первое свое профессиональное шоу заграницей-\
    \ в Принцесс-отеле на Бермудских островах. Там она проработала шесть месяцев,\
    \ после чего вернулась в Нью-Йорк, где быстро была принята обществом джазовых\
    \ музыкантов города. Оказалось, что она делит сцену с такими великими, как Эдди\
    \ Чембли, Кирк Лайтси, Джон Хикс, Уолтер Бишоп, Мервин Спаркс и другие. А Брук\
    \ Бентон, услышав о ней, всоре добавил молодую Кэтрин в свою римейк-программу,\
    \ которую записывал с Диной Вашингтон в 60-е годы."
