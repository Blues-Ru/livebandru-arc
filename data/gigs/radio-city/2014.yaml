    \nКоллектив выступает на концертных площадках клубов: Алексея Козлова, Игоря Бутмана,\
    \ \"Союз Композиторов\", \"Эссе\", \"Арт-клуба\", \"Б2\", \"Рэй\", \"Март\" и\
    \ других.\r\nНедавно, квинтетом Дмитрия Яковлева был записан диск с авторской\
    \ программой, в записи которого принимали участие музыканты коллектива, лауреаты\
    \ джазовых фестивалей:\r\nАнтон Залетаев (тенор-саксофон, флейта) - один из лучших\
    \ музыкантов российской джазовой сцены. Сотрудничавший с Германом Лукьяновым,\
    \ Игорем Бутманом и другими звездами российского джаза, участник огромного количества\
    \ джазовых проектов.\r\nПетр Востоков (труба) - яркий представитель молодого поколения\
    \ джаза. Работал в оркестре Олега Лундстрема. Создатель собственного биг-бэнда.\r\
    \nВладимир Кольцов-Крутов (контрабас) - много лет выступал на Нью-Йоркской джазовой\
    \ сцене, сотрудничает практически со всеми ведущими российскими джазменами, один\
    \ из самых востребованных басистов на российской сцене.\r\nПавел Тимофеев (барабаны)\
    \ - лауреат джазовых фестивалей, участник фестиваля в Монтре, музыкант ансамбля\
    \ \"Impulse Band\", трио Даниила Крамера, работает в постоянном составе группы\
    \ \"Несчастный случай\", один из ведущих барабанщиков российского джаза."
