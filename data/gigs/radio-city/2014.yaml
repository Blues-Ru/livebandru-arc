  date: '2014-03-08'
  time: '20:00'
  band_name: Алвон Джонсон - джаз, блюз (США)
  club_id: 145
  club_name: Радио Сити
  club_token: radio-city
  price: 700 / 1000 / 1500 руб.
  comments: "Победитель всеамериканского конкурса \"Гитарист года- 2005\", дважды\
    \ лучший в национальном конкурсе \"Король блюза\" (2006 и 2007), в недавнем прошлом\
    \ участник прославленной вокальной группы \"The Coasters\" - Алвон Джонсон - приезжает\
    \ в Россию!\r\nАлвон Джонсон - вокалист, гитарист и шоумен. За ним стоит целая\
    \ музыкальная эпоха и уникальные творческие встречи.\r\nБроско и лаконично: он\
    \ работал с блюзовой величиной Номер Один Джоном Ли Хукером, его учителя Уэс Монтгомери,\
    \ Джими Хендрикс и Франк Синатра! Появление Алвона перед зрителями- это целый\
    \ спектакль. Развевая по ветру полы белого смокинга и прикрываясь такой же белой\
    \ шляпой, он кружит по сцене наподобие ворона, высмеивая какую-либо идею политеса,\
    \ да и скуки вообще. Он определенно наделен еще и даром комедианта. Не зря из\
    \ всей тусовки блюзово-джазовых музыкантов именно его в свои постановки приглашал\
    \ Ред Фокс, известный на всю Америку основоположник жанра stand-up-комедии.\r\n\
    Музыкант крайне щепетилен в выборе репертуара, каждый его новый диск - продуманный,\
    \ выверенный шаг. Критики едины во мнении о его альбомах. \"Как жаль, что такой\
    \ музыки мало, и невозможно слушать ее день за днем, не отрываясь\" - пишет о\
    \ нем Майкл Элисон в TheGlobalMuse.Com. \"Чикаго затоплен блюзовыми талантами,\
    \ но Алвон Джонсон - один из самых лучших\" - это уже Грэг Фрирксен, ведущий из\
    \ общественного радио в штате Иллинойс. В новом альбоме \"Гитары и Автомобили\"\
    \ Алвон Джонсон не собирается сбавлять обороты - по итогам 2008 года диск вошел\
    \ в десятку лучших по оценкам журнала \"Real Blues\".\r\nВсе, к чему он прикасается,\
    \ становится золотом, по крайней мере, верхний слой с растиражированных композиций\
    \ он снимает легко и небрежно. Он реанимировал \"Hoochie Coochie Man\", сделав\
    \ свою авторскую версию на грани гротеска и неприличия. И \"Чарли Браун\" с \"\
    Ядовитым Плющом\" звучат в исполнении Алвона свежо."
