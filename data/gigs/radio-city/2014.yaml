  price: Вход свободный
  comments: "Творческий тандем Ксении Лебедевой (певицы-композитора) и Евгения Лебедева\
    \ (пианиста, композитора, аранжировщика). Свой творческий путь Ксения начала в\
    \ составе уже ставшей легендарной группе \"Sunlight\". Первый альбом Xenya \"\
    FindYourWay\" был записан в 2008 в Бостоне,штат Массачусетс в известной студии\
    \ Blue Jay. С 2009 по 2012 Ксения и Евгений жили и работали в Нью-Йорке, США выступая\
    \ на разных площадках и в клубах, сотрудничая с такими известными музыкантами\
    \ как Marcus Miller, Jack Dejohnette, George Garzone, Terry Lynne Carrington,\
    \ David \"Fuze\" Fiuczynski, и восходящими звездами :Evan Marien (по мнению журнала\"\
    Guitar Player\" был назван самым интересным бас гитаристом современности) Михаил\
    \ Тарасов, более известный как \"Svoy\" (музыкант,композитор,продюсер) победитель\
    \ Billboard-charting multi-Independent Music Award.\r\nЭкспериментируя с разными\
    \ стилями и жанрами \"Хenique\" обретает свое звучание, основанное на сильных\
    \ мелодических линиях, проникновенной лирике, современных ритмах и аранжировках.\
    \ \r\nОдной из главных задач проекта является достижение максимально плотного\
    \ звучания минимальными средствами.\r\nСостав музыкантов:\r\nКсения Лебедева -\
    \ вокал\r\nЕвгений Лебедев - клавишные\r\nПетр Ившин - ударные\r\nЕвгений Лебедев\
    \ Участник многих фестивалей джаза: \"Усадьба Jazz\" (Москва), \"Джаз в саду Эрмитаж\"\
    , \"Евразия\", Международный фестиваль в Минске (2002), VI Московский международный\
    \ фестиваль памяти Уиллиса Коновера (2001), \"Русская Ночь в Давосе\" (Швейцария\
    \ 2005), \"Lionel Hampton Jazz Festival\" (США 2005), Tanglewood Jazz Festival\
    \ (США, 2009) и т.д. Лауреат Московского фестиваля джаза молодых исполнителей\
    \ в 1999-м и 2001-м годах. В сентябре 2010 года на \"Jazz Hoeilaart International\
    \ Contest\" в Бельгии Евгений получил специальный приз как лучший солист и взял\
    \ Гран-При вместе со своей группой \"Evgeny Lebedev World Trio\".\r\nПетр Ившин\
    \ - один из самых востребованных барабанщиков России. Ученик таких известных преподавателей,\
    \ как Е.Гречищев, В.Онищук, П.Петрухин, М.Ковалевский, А.Осейчук. В 2002 году\
    \ вошел в первый состав группы \"Sunlight\", первопроходцев джаз-фанка в современной\
    \ России. Попутно работал в Квартете Анатолия Кролла, \"Игорь Бойко Бэнд\", с\
    \ Вячеславом Горским, Олегом Киреевым, в \"Funky Land\" Феликса Лахути, \"Квинтете\
    \ Антона Горбунова\", \"Vision of Sоund\", Трио Дмитрия Илугдина, в \"Pervoe Solnce\"\
    \ Владимира Голоухова, Трио Алима Насаева, в группе Сергея Чипенко \"Транс-Атлантик\"\
    , где ему довелось сыграть с такими известными музыкантами, как Chuck Loeb, Eric\
    \ Marienthal, Dave Koz, Phil Perry, Brian Simpson. В 2010 году на сцене \"Крокус-Сити\
    \ холла\" играл в концерте легенды мирового джаза, саксофониста David Sanborn."
