  band_id: 567
  band_name: Jazz Dance Orchestra
  band_token: jazz-dance-orchestra
  club_id: 145
  club_name: Радио Сити
  club_token: radio-city
  price: 500/700 руб.
  comments: "Не пропустите музыкальные превращения 5 апреля в \"Radio City\", \r\n\
    ведь на сцену выйдет самый модный джаз-бэнд страны Jazz Dance Orchestra!\r\nJazz\
    \ Dance Orchestra - это модный, в прямом смысле слова, танцующий джаз-бэнд, который\
    \ смешивает несовместимые на первый взгляд музыкальные стили: house превращается\
    \ в свинг, поп - в джайв, а r'n'b - в буги-вуги, получается взрывной коктейль\
    \ из поп-музыки, клубных миксов и самых зажигательных ритмов джаза. Мировые хиты\
    \ поп- и рок-музыки обретают новую жизнь в свежей звуковой трактовке этого оркестра.\r\
    \nКажется, этому коллективу подвластны абсолютно все музыкальные стили, а главное,\
    \ что в результате получаются веселые, танцевальные и совершенно непохожие на\
    \ оригинал композиции.\r\nКомпозиции Jazz Dance Orchestra можно услышать в эфире\
    \ российских джазовых и лаундж радиостанций, а также в модных ресторанах и кафе.\
    \ \r\nОркестр радует слушателей своими выступлениями на фестивалях, премиях, церемониях\
    \ и статусных мероприятиях среди которых: \"Усадьба Джаз\", \"Джаз в саду Эрмитаж\"\
    , \"Lady in Jazz\", \"Вдох\", \"Джаз Коктебель\", Московский международный кинофестиваль,\
    \ Санкт-Петербургский кинофестиваль и многие другие. Jazz Dance Orchestra - частый\
    \ гость на телевизионных каналах,  среди которых Первый канал, НТВ, \"Россия\"\
    , \"Москва24\", \"Дождь\" и др.\r\nТысячи скачиваний на различных ресурсах в сети\
    \ Интернет - чем не подтверждение успеха Jazz Dance Orchestra? Причем многие Интернет-пользователи\
    \ даже не предполагают, что это - российский коллектив, играющий в лучших западных\
    \ традициях.\r\nВ 2014 году коллектив отметил свое десятилетие выходом в свет\
    \ альбома русских народных песен \"Русский сувенир\"."
