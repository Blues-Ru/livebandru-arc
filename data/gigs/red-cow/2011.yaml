  comments: "Banderas Blues Band, как группа состоялась именно в Киеве, (это произошло\
    \ весной 1998 г. когда их лидер по прозвищу Banderas играл в Biker Pub). Потом\
    \ они еще целых два года играли во многих известных клубах столицы: Buddy Guy\
    \ Blues Club, Alcapone, Cowboy Club, Joss, River Palas, Dejavu и др. После их\
    \ след теряется где то в Москве. Прошло долгих 10 лет. Клубы, где они когда то\
    \ выступали, в большинстве своем уже давно сменили названия или закрылись афиши\
    \ истлели на столбах, но имя группы навсегда осталось в сердцах ее старых фанов.\
    \ 10 лет не прошли даром. И если тогда Banderas Blues Band были просто веселой\
    \ зажигательной командой, вышедшей из байкерской среды, то сейчас, пройдя огонь,\
    \ воду и медные трубы они стали зрелыми музыкантами, профессионалами своего дела,\
    \ которым есть что сказать и показать. Этим летом они не по детски зажгли в Котебеле,\
    \ а сейчас после небольшого клубного турне по городам Украины, едут в столицу,\
    \ желая обрести былую славу и новых фанов. Советую не пропустить эти концерты,\
    \ так как не известно, когда еще посчастливится их увидеть и услышать вновь. \r\
    \n\r\nВход свободный!"
