- id: 35263
  date: '2013-04-10'
  time: '21:00'
  band_name: Modern Blues Masters, USA -Phil Wiggins, Guy Davis, Samuel James
  club_id: 74
  club_name: Ритм Блюз Кафе
  club_token: rnb-cafe
  price: 500 руб.
  comments: "Трое мужчин в самом блюзовом соку! Есть опыт за плечами, в душе есть\
    \ жаркая страсть, есть мастерство в игре и понимание в общении с публикой тоже\
    \ есть. Еще есть солидный набор регалий и почетных знаков отличия от музыкальных,\
    \ культурных и исторических организаций, включая Blues Awards (в прошлом W.C.Handy\
    \ Awards) - высшей премии американского блюзового сообщества.\r\n\r\nВсе играют\
    \ музыку с древними блюзовыми корнями и с чутким восприятием сегодняшних веяний.\
    \ Все хорошо помнят, откуда родом их музыка, которая открыла им двери в огромный\
    \ мир и увлекла в странствия по всему свету.\r\n\r\nПриезд этой троицы в Россию\
    \ - подарок всем любителям акустического блюза в самом традиционном блюзовом наборе:\
    \ голос, гитара, губная гармоника плюс правильный прихлоп и притоп. Тот, который\
    \ вгоняет в транс или поднимает с места так, что ноги сами идут в пляс.\r\n\r\n\
    \r\n\r\nГай Дэвис, харпер и гитарист, первый альбом выпустил 35 лет тому назад.\
    \ Он из известной нью-йоркской актерской семьи, и театр для него дом родной. Потому\
    \ у него за плечами уже несколько театральных постановок (в том числе и на Бродвее),\
    \ где он был автором, режиссером, исполнителем главной роли и, прежде всего, музыкантом!\
    \ Его прошлогодний двойной альбом - сага о вымышленном персонаже по имени Fishy\
    \ Waters. Для тех, кто знает, что Мадди Уотерс пел Catfish Blues, уже все понятно.\
    \ Но Дэвиса интересовала не собственно биография великого блюзмена, а общая блюзовая\
    \ история во всех ее радостных и безрадостных сторонах. Он сам родом из большого\
    \ города, но с блюзом был знаком с детства отнюдь не понаслышке. Для него нет\
    \ в этой музыке секретов, но он очарован ее тайной... В его концертах всегда есть\
    \ атмосфера таинства и фокусов, блюзовой поэзии, веселого изящного наигрыша, или\
    \ коварной ворожбы и глубокого колдовства.\r\n\r\n\r\nФил Виггинс, харпер. На\
    \ протяжении десятилетий в дуэте с гитаристом Джоном Цепасом был последним из\
    \ истинных представителей древнего блюзового Пидмонтского (Подгорного) стиля -\
    \ очень редкого ныне. Деликатного аналога европейского менуэта в черной музыке,\
    \ строгого к чистоте звука (в отличие от Дельта-блюза), где искренность чувств\
    \ маскируется внешней виртуозностью... Но глубоко отчаянного в своих экстремальных\
    \ проявлениях. В 2009 г. Джон Цефас умер, и это была тяжелая потеря как для блюза,\
    \ так и лично для Виггинса. Взаимопонимание в их дуэте было идеальным. Но Виггинс\
    \ продолжает играть тот блюз, который их связывал когда-то.\r\n\r\n\r\n\r\nСамюэл\
    \ Джеймс чуть моложе своих партнеров, но и он не новичок на сцене. Себя именует\
    \ \"трубадуром\", подразумевая изрядную долю романтической пылкости в своей игре.\
    \ Увлекаясь, он действительно словно погружается в транс, наигрывая удивительную\
    \ смесь традиционного старого блюза с собственными фантазиями в голове. Он в плену\
    \ объемного звучания любимой гитары-добро, аккорды чередуются с каскадами слайдовых\
    \ пробегов, ногой отбивая ритм с фатальной четкостью метронома.\r\n\r\nВсе трое\
    \ участников программы настолько яркие, самобытные и глубокие, что знакомству\
    \ с каждым стоило бы посвятить отдельный вечер. Но гастрольная судьба (и всяческие\
    \ неблюзовые обстоятельства) свели вместе их пути в России. Свой российский тур\
    \ они завершат в Москве и пропустить их концерт было бы непростительно с точки\
    \ зрения каждого, для кого современность традиционного блюза - понятна, прочувствована\
    \ и едва ли не буквально осязаема.\r\n\r\nПередачи, посвященные участникам фестиваля,\
    \ слушайте в Программе \"Весь Этот Блюз\"\r\n\r\nКонцерт состоится 10-го апреля\
