  time: '20:00'
  band_name: Diamond Hand
  club_id: 74
  club_name: Ритм Блюз Кафе
  club_token: rnb-cafe
  price: 400 руб.
  comments: "Diamond Hand - одна из немногих команд на всем постсоветском пространстве,\
    \ избравшая своим главным и единственным жанром аутентичное рокабилли. Это не\
    \ переделка старинных мелодий в современные композиции, о нет! Если \"Бриллиантовая\
    \ рука\" берется за какую-то песню, будьте уверены, вы ни за что не сможете догадаться,\
    \ что это современный вариант. В большинстве своем эти музыканты специализируются\
    \ на мелодиях, которые в свое время пользовались бешеной популярностью, но сегодня\
    \ незаслуженно забыты.\r\n\r\nЗа двенадцать лет своего существования эти ребята\
    \ стали желанными гостями на лучших концертных площадках России и соседних государств.\
    \ Кроме качественной музыки, своим слушателям они всегда дарят живое общение и\
    \ мощный заряд позитивной энергии."
- id: 45562
  date: '2014-08-16'
  time: '20:00'
  band_name: Jakenife
  club_id: 74
  club_name: Ритм Блюз Кафе
  club_token: rnb-cafe
  price: 400 руб.
  comments: "JACKKNIFE Rockabilly Trio (ДЖЕКНАЙФ Рокабилли Трио) было сформировано\
    \ в начале 2001-го года в городе Ростове-на-Дону тремя студентами ростовского\
    \ радиоколледжа, одержимыми решимостью воспроизвести все песни с рок-н-ролл-пластинок,\
    \ что обладают таким потрясающим эффектом. Первый концерт состоялся в день рождения\
    \ рок-н-ролла - 12-го апреля 2001-го года в клубе ЛИЛА.\r\n\r\nНеизменным лидером\
    \ трио стал Алексей Фетисов (контрабас, вокал). С его легкой руки в кратчайшие\
    \ сроки группа получила немалую известность не только на Юге, но так же за его\
    \ пределами, выступая как в клубах, так и на больших фестивальных сценах, сотрудничая\
    \ с другими исполнителями ритм-энд-блюза и рок-н-ролла.\r\n\r\nОсновываясь на\
    \ стиле таких исполнителей как Билл Хейли (Bill Haley), Джин Винсент (Gene Vincent),\
    \ Эдди Кокрэн (Eddie Cochran), Бадди Холли (Buddy Holly), Чак Берри (Chuck Berry)\
    \ и др., трио играет со свежим современным звучанием, веселой и эмоциональной\
    \ подачей, увлекая все больше людей уникальной музыкальной культурой, помогающей\
    \ творить и строить..."
