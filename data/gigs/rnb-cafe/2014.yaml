- id: 45541
  date: '2014-08-10'
  time: '18:30'
  band_name: Открытый Блюзовый Джем в Ритм н Блюз
  club_id: 74
  club_name: Ритм Блюз Кафе
  club_token: rnb-cafe
  price: 300 руб.
  comments: "Каждое воскресенье в нашем клубе происходит событие воистину, грандиозное!\
    \ С шести и до одиннадцати вечера продолжается своеобразный блюз-марафон - целых\
    \ пять часов непредсказуемого действа! Каждый может попробовать себя в роли блюзового\
    \ музыканта. Многие молодые блюзмены, успешно выступающие нынче начинали с наших\
    \ джемов и, будем надеяться, такое будет и впредь случаться. Многие наши блюзовые\
    \ мэтры и даже зарубежные гастролеры частенько не отказывают себе в удовольствии\
    \ спеть-сыграть перед сверхблагодарной воскресной публикой.\r\n\r\nВесь вечер\
    \ на сцене находится наш \"хаус-бэнд\" из опытнейших музыкантов:\r\n\r\nВадим\
    \ Иващенко - гитара, вокал\r\n\r\nЮрий Горелов - бас-гитара\r\n\r\nМихаил Юдин\
    \ - барабаны\r\n\r\nА теперь несколько напутственных слов...\r\n\r\nВсем участникам\
    \ гарантируется внимательное и бережное отношение, но пожалуйста, соблюдайте наши\
    \ правила:\r\n\r\n1. Джем блюзовый, поэтому приветствуется исполнение блюзовой\
    \ классики. Все остальное исключительно(!) по спец. согласованию с ведущим.\r\n\
    \r\n2. Это все-таки джем, поэтому выбирайте, пожалуйста, песни, которые наш хаус-бэнд\
    \ сможет легко подхватить.\r\n\r\n3. Если вам отказали в участии, или прервали\
    \ ваше выступление (что редко, но бывает), прежде чем обижаться, подумайте что\
    \ же не так и почему.\r\n\r\nВот здесь некоторые эпизоды джема\r\n\r\nСтоимость\
    \ билета -300 р\r\n\r\n*всем музыкантам участвующим в джеме - вход свободный!\r\
    \n\r\nЕсли вы группа, которая талантливо исполняет джаз-блюз-кантри\r\n\r\nна\
    \ английском языке, то мы вас ждем у нас в клубе."
