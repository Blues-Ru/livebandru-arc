- id: 46337
  date: '2014-09-28'
  time: '18:30'
  band_name: Открытый блюзовый джем в Ритм н Блюз кафе
  club_id: 74
  club_name: Ритм Блюз Кафе
  club_token: rnb-cafe
  price: 300 руб.
  comments: "Каждое воскресенье в Rhythm & Blues Cafe происходит событие воистину,\
    \ грандиозное!\r\n\r\nС шести и до одиннадцати вечера продолжается своеобразный\
    \ блюз-марафон - целых пять часов непредсказуемого действа!\r\n\r\nКаждый может\
    \ попробовать себя в роли блюзового музыканта.\r\n\r\nМногие молодые блюзмены,\
    \ успешно выступающие нынче, начинали с наших джемов и, будем надеяться, такое\
    \ будет и впредь случаться. Многие наши блюзовые мэтры и даже зарубежные гастролеры\
    \ частенько не отказывают себе в удовольствии спеть-сыграть перед сверхблагодарной\
    \ воскресной публикой.\r\n\r\n\r\nВесь вечер на сцене находится наш \"хаус-бэнд\"\
    \ из опытнейших музыкантов:\r\n\r\nВадим Иващенко - гитара, вокал\r\nЮрий Горелов\
    \ - бас-гитара\r\nМихаил Юдин - барабаны\r\n\r\nА теперь несколько напутственных\
    \ слов...\r\n\r\nВсем участникам гарантируется внимательное и бережное отношение,\
    \ но пожалуйста, соблюдайте наши правила:\r\n\r\n\r\n1. Джем блюзовый, поэтому\
    \ приветствуется исполнение блюзовой классики. Все остальное исключительно(!)\
    \ по спец. согласованию с ведущим.\r\n\r\n2. Это все-таки джем, поэтому выбирайте,\
    \ пожалуйста, песни, которые наш хаус-бэнд сможет легко подхватить.\r\n\r\n3.\
    \ Если вам отказали в участии, или прервали ваше выступление (что редко, но бывает),\
    \ прежде чем обижаться, подумайте, что же не так и почему.\r\nВот здесь некоторые\
    \ эпизоды джема\r\nСтоимость билета - 300р\r\n\r\n*всем музыкантам участвующим\
    \ в джеме - вход свободный!"
