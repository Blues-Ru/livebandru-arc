- id: 47166
  date: '2014-11-08'
  time: '20:30'
  band_name: Stanley Jordan
  club_id: 74
  club_name: Ритм Блюз Кафе
  club_token: rnb-cafe
  price: 1500 руб.
  comments: "Стэнли Джордан (англ. Stanley Jordan; 31 июля 1959, Чикаго) - американский\
    \ джаз-фьюжн гитарист, широко известен благодаря фортепианной технике игры на\
    \ гитаре.\r\n\r\nC шести лет серьезно занимался фортепиано. С одиннадцати лет,\
    \ подражая Джими Хендриксу и Карлосу Сантане, начал самостоятельно осваивать гитару.\r\
    \n\r\nСегодня Джордан широко известен благодаря своей феноменальной тэп-технике\
    \ - игре на гитарном грифе двумя руками, как на клавиатуре рояля. Уже первый его\
    \ диск \"Magic Touch\" (1985), где помимо ансамблевых композиций были сольные,\
    \ исполненные новым методом, произвел сенсацию. После этого Джордан стал желанным\
    \ гостем джазовых фестивалей в Европе и Америке, выступает с сольными концертами\
    \ и в ансамблях. \"Когда я его слышу, - обронил как-то ведущий фьюжн-гитарист\
    \ Джон Скофилд, - то думаю, что играют два гитариста\"."
