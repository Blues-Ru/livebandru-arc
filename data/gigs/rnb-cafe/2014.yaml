- id: 45530
  date: '2014-08-05'
  time: '21:00'
  band_name: DjangoBand
  club_id: 74
  club_name: Ритм Блюз Кафе
  club_token: rnb-cafe
  price: 300 руб.
  comments: '"DjangoBand" - камерный джазовый ансамбль, назвавшийся в честь легендарного
    цыганского гитариста Джанго Рейнхардта и проникшийся духом его вольного цыганского
    джаза. Стремительные нотные пассажи, исполненные со всей таборной страстью, приправлены
    еще и джазовым горячим свингом. Увлекательнейший полет импровизации в сферах,
    где молодой свинг-джаз 20-х и 30-х годов прошлого века переплетен с вековыми традициями
    бродячего народа. Но только ритм держится словно сам собой - в ансамбле нет ни
    бубнов, не барабанов. Два гитариста и контрабасист сами выдают ритм легкий и увлекательный.
    Познания музыкантов в области "джаз-мануш" поистине энциклопедические, а азарт
    игры как у молодых волчат на первой охоте. С той разницей, конечно, что энциклопедисты
    никогда не ошибаются, как бы горячо не были увлечены. "DjangoBand" - это коллектив
    фанатичных единомышленников, который играет не только произведения великого Джанго,
    но и авторские композиции.'
- id: 45563
  date: '2014-08-16'
  time: '21:00'
  band_name: eaZZyTOP
  club_id: 74
  club_name: Ритм Блюз Кафе
  club_token: rnb-cafe
  price: 800 руб.
  comments: Впервые на сцене Ритм н Блюз кафе!Группа eaZZyTop- типичное "гаражное"
    рок-трио,играющие громкую музыку,основанную на рифах блюз-роковой пергруженной
    гитары,на монументальном и несколько сухом бите барабанов,пульсирующим рисунке
    нот и хриплом вокале.Ребята с удовольствием играюх хиты ZZ TOP,а так же Jimi Hendrix,Kiss,Rolling
    Stones,Deep Purple и др. Легенд олд-скульного рока-все что мы так любим!Не пропустите!
