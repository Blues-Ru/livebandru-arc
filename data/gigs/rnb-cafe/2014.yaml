  band_name: Dr. Nick
  band_token: dr-nick
  club_id: 74
  club_name: Ритм Блюз Кафе
  club_token: rnb-cafe
  price: бесплатный
  comments: "Музыкальный кругозор Дмитрия Казанцева весьма широк, но Д-р Ник не всеяден:\
    \ выбирается только самое лучшее, и слушателю передает только в самом изысканном\
    \ виде. За годы работы авторитет проекта стал непререкаем. И приглашение принять\
    \ участие в концерте для музыкантов стало подтверждением высокого профессионального\
    \ статуса, а для слушателя - гарантией высочайшего уровня.\r\nПочему \"Ник\"?\
    \ Потому что так получилось, вот и все.\r\nЗато \"Доктор\" - так и есть по всем\
    \ трем статьям. Для здоровья полезно, музыкальная эрудиция - академического масштаба.\
    \ Ну и без колдовства и заклинаний тоже не обходится...\r\nВ этот раз коротать\
    \ вечерок планируется в компании  с ....."
- id: 45532
  date: '2014-08-06'
  time: '21:00'
  band_name: Алексей Лекс Блохин-Рок-ролл шоу.Специальный гость Денис Мажуков
  club_id: 74
  club_name: Ритм Блюз Кафе
  club_token: rnb-cafe
  price: 300 руб.
  comments: Алексей "Lex" Блохин - один из ярчайших представителей Московской музыкальной
    сцены. Пианист, певец, шоумен, - вот уже 20 лет он буквально "взрывает" как Российскую,
    так и зарубежную сцену благодаря своему блестящему, поистине многогранному таланту.
    В 2006 году Lex собирает группу "Lex и Команда". За этот относительно-короткий
    срок группа успела полюбиться и Московской публике, и в регионах, и стала желанным
    гостем как в клубах, так и на больших площадках. Фирменная "фишка" коллектива
    - самобытные интерпретации классического рок-н-ролла и рокабилли, аутентичная
    авторская программа, почти акробатическое шоу от Lex'a, и неизменно-мощный посыл
    позитива своим слушателям!
