  band_name: Dizzy Riders
  club_id: 74
  club_name: Ритм Блюз Кафе
  club_token: rnb-cafe
  price: бесплатный
  comments: "В творчестве Dizzy Riders основную роль играют ритм-н-блюз, фанк и соул.\
    \ Участники этой группы черпают вдохновение из пластинок американской звукозаписывающей\
    \ индустрии 60-70-ых годов. Подобную музыку принято исполнять большим составом\
    \ музыкантов, но к черту условности: немногочисленные Dizzy Riders берут огонь\
    \ на себя. Яркий, запоминающийся вокал и грув. Все по-настоящему, по-честному,\
    \ не менее зажигательно, чем у мастеров жанра!\r\n\r\n\"Какие-то группы обращают\
    \ на себя внимание моторной ритм-секцией, какие-то забойными гитарными соло. Основа\
    \ Dizzy Riders - харизма фронтмена, который держит на нерве каждую ноту, балансируя\
    \ на грани истеричности, но никогда в нее не скатываясь. Можно сказать, что так,\
    \ постепенно, у него выработался свой стиль, узнаваемый, интересный и отличающий\
    \ его от прочих московских фанкеров.\""
