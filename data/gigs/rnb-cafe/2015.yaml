  club_token: rnb-cafe
  price: 800 руб.
  comments: "Шизгара- кавер-проект, основанный легендами российского рока: Юрием Цалером\
    \ (гр. Мумий-Тролль) и Олегом Чубыкиным\r\n\r\nСостав:\r\nОлег Чубыкин  - вокал,\
    \ гитара\r\nЮрий Цалер (Мумий Тролль) - гитара\r\nОлег Цалер (гр. Олега Чубыкина)\
    \ - бас\r\nАнтон Лукьянчук (гр. Николая Носкова, Братья Гримм) - барабаны \r\n\
    \r\nВ начале 2013 года четверо известных музыкантов собрались в Москве, чтобы\
    \ просто поиграть любимую музыку.\r\n\r\nВстречайте - бессменный гитарист группы\
    \ \"Мумий-Тролль\" Юрий Цалер, штатный басист Н. Носкова - Олег Цалер, барабанщик\
    \ \"Братьев Грим\" Антон Лукьянчук, и известный рок-музыкант Олег Чубыкин.\r\n\
    \r\n\"Мы хотели создать такой проект, в котором мы могли бы отдохнуть от своих\
    \ музыкальных проектов и поиграть старые добрые песни из 60-х и 90-х. Мы сели\
    \ вместе и начали с того что отобрали свои любимые песни от \"California dreaming\"\
    \ до хитов Криса Ри и Робби Уильямса\", - вспоминает Олег Чубыкин.\r\n\r\nГлавным\
    \ отличием \"Шизгары\" от других кавер-групп можно наверное назвать особую музыкальность\
    \ артистов - труднее найти более опытных музыкантов, поездивших по концертным\
    \ площадкам России и студиям всего мира.\r\n\r\nФронтмен группы Олег Чубыкин,\
    \ известный российской публике по своим радио хитам \"Не случайно\" и \"Rain,\
    \ rain\", успел пожить в Великобритании и поет на английском совершенно без акцента.\
    \ Добавьте сюда гитарные соло одного из луших гитаристов России Юрия Цалера и\
    \ слаженную ритм секцию Олега Цалера и Антона Лукьянчука, и вы получите действительно\
    \ лучший кавер-проект России нашего времени!!!"
