  time: '20:30'
  band_name: Джем-рождения Layana Shary
  club_id: 74
  club_name: Ритм Блюз Кафе
  club_token: rnb-cafe
  price: 500 руб.
  comments: "Елена Шери - (певица,пианистка,автор песен) известная московской публике,\
    \ как ведущая блюзовых джемов в форматных клубах Москвы. С 2012г .участница блюзовых\
    \ фестивалей в городах России ( Москва, С.Петербург, Вологда, Архангельск, Нижний-Новгород\
    \ и др.), Латвии и Эстонии.\r\n\r\nВ концертах я представляю свое творчество блюз-соул-фанк-рокового\
    \ направлений. Но также люблю исполнять блюзовую классику 50-60х годов, кавер-версии\
    \ любимых ритменблюзовых и соул-исполнителей."
- id: 50305
  date: '2015-03-20'
  time: '20:30'
  band_id: 101
  band_name: RawCats'88
  band_token: raw-cats-88
  club_id: 74
  club_name: Ритм Блюз Кафе
  club_token: rnb-cafe
  price: 500 руб.
  comments: "Московская группа RawCats'88 играет в таких стилях как Rock'n'Roll, Boogie-Woogie,\
    \ Rockabilly, Swing.\r\n\r\nRawCats'88 образовались в 2004 году. И являются ярчайшим\
    \ представителем Московской Rock'n'Roll и Rockabilly сцены. За плечами группы\
    \ богатый опыт выступлений на фестивалях Rockabilly музыки при участии звезд российской\
    \ и зарубежной Rockabilly сцены (Мистер Твистер, Red Elvises, Jack Baymoore and\
