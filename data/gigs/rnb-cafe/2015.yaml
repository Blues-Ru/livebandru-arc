    name: Smitanaband
    token: smitana-band
- id: 50300
  date: '2015-03-17'
  time: '19:00'
  band_name: Новый день-Новый джем
  club_id: 74
  club_name: Ритм Блюз Кафе
  club_token: rnb-cafe
  price: бесплатный
  comments: "ТЕПЕРЬ ПО ВТОРНИКАМ, до одиннадцати вечера продолжается своеобразный\
    \ блюз-марафон - целых пять часов непредсказуемого действа! Каждый может попробовать\
    \ себя в роли блюзового музыканта. Многие молодые блюзмены, успешно выступающие\
    \ нынче начинали с наших джемов и, будем надеяться, такое будет и впредь случаться.\
    \ Многие наши блюзовые мэтры и даже зарубежные гастролеры частенько не отказывают\
    \ себе в удовольствии спеть-сыграть перед сверхблагодарной публикой.\r\n\r\nВесь\
    \ вечер на сцене находится наш \"хаус-бэнд\" из опытнейших музыкантов:\r\n\r\n\
    Вадим Иващенко - гитара, вокал\r\n\r\nЮрий Горелов - бас-гитара\r\n\r\nМихаил\
    \ Юдин - барабаны\r\n\r\nА теперь несколько напутственных слов...\r\n\r\nВсем\
    \ участникам гарантируется внимательное и бережное отношение, но пожалуйста, соблюдайте\
    \ наши правила:\r\n\r\n1. Джем блюзовый, поэтому приветствуется исполнение блюзовой\
    \ классики. Все остальное исключительно(!) по спец. согласованию с ведущим.\r\n\
    \r\n2. Это все-таки джем, поэтому выбирайте, пожалуйста, песни, которые наш хаус-бэнд\
    \ сможет легко подхватить.\r\n\r\n3. Если вам отказали в участии, или прервали\
    \ ваше выступление (что редко, но бывает), прежде чем обижаться, подумайте что\
    \ же не так и почему."
  extra_bands:
  - id: 297
    name: New Day Blues Band
    token: new-day-blues-band
- id: 50301
  date: '2015-03-18'
  time: '20:30'
  band_name: Rock-n-roll show/Михаил Шишкин
  club_id: 74
  club_name: Ритм Блюз Кафе
  club_token: rnb-cafe
  price: 300 руб.
  comments: "Каждую среду вечер рок н ролла с Дмитрием Смагиным.\r\n\r\nДмитрий Смагин\
    \ гитарист самой безудержной команды Москвы RAWCATS.\r\n\r\nНа этот раз Дмитрий\
    \ со своей верной спутницей - солнечно-оранжевой гитарой - представят вам лучшие\
    \ хиты рок н ролла, свига и кантри. Прекрасный теплый тембр голоса Дмитрия, изящная\
    \ игра на гитаре - все это по настоящему окунет вас в золотые времена 50-60 годов.\r\
    \n\r\nПомогают настоящие \"бродячие коты\" - неистовый контрабас Тимур Поповкин\
    \ и барабаны - Сергей Арнаутов.\r\n\r\nНовая программа, новые гости и, конечно\
    \ же, праздник - праздник рок н ролла.\""
