    фильмов. В 70-е годы Мехрдад принимал участие в проектах известных музыкальных
    коллективов: "Цветы" Стаса Намина, группы "Аракс" и других. В конце 70-х Мехрдад
    уехал в Лондон, стал профессиональным музыкантом, объездив множество стран с гастролями.
    В 2000-х Мехрдад Бади стал снова приезжать в Москву, где возобновил сотрудничество
    с коллегами, а с 2005 года выступает с музыкантами московской группы "Авеню" -
    коллективом, который существует с 1996 года и объединяет в своем составе профессионалов
