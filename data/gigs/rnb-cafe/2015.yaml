- id: 50896
  date: '2015-04-26'
  time: '20:00'
  band_name: Вадим Иващенко
  club_id: 74
  club_name: Ритм Блюз Кафе
  club_token: rnb-cafe
  price: 500 руб.
  comments: "Юбилейный концерт\r\n\r\nВадим Иващенко родился в 22.04.1975 в городе\
    \ Ростов-на-Дону. Являлся одним из лучших ростовских ритм-н-блюзовых музыкантов.\r\
    \n\r\nС 2001 года активный участник московской блюзовой и рок-н-ролльной сцены.\
    \ Сотрудничал со многоими музыкантами, среди которых: Михаил Мишурис, Михаил \"\
    Петрович\" Соколов, \"Мистер Твистер\", Доктор Аграновский, Дмитрий Казанцев и\
    \ многие другие. Неоднократно играл джемы с известными американскими и европейскими\
    \ Блюзменами, такими как Дюк Робиллард, Лейзи Лестер, Кит Данн, Джеймс Уиллер,\
    \ Джон Праймер, Лурри Белл, Перо Джо, \"Румфул оф блюз\", Уолтер Траут, Чарли\
    \ Бэйти и другими. В настоящее время выступает с собственной группой.\r\n\r\n\
    Вадим Иващенко - безусловно один из самых ярких и интересных российских гитаристов.\
    \ Импровизируя свободно и разнообразно, он демонстрирует в своих соло знание наследия\
    \ самых разных блюзовых столпов электрогитары - от Би Би и Фреди Кингов до Кларенса\
    \ \"Гейтмаута\" Брауна и Стиви Рея Воэна.  Превосходно обращается со слайдом,\
    \ вызывая в памяти великих Элмора Джеймса и \"Хаунтдога\" Тэйлора. Наиболее комфортно\
    \ Вадим чувствует себя в свинговой, джамп-блюзовой манере а-ля Тайни Краймз, Билл\
    \ Дженнингс, Чарли Бэйти и Холливуд Фэтс. В последнее время Вадим демонстрирует\
    \ увлечение мастерами кантри-гитары, и теперь в его соло можно услышать скорострельные\
    \ пассажи в духе Альберта Ли, твэнговые завывания Джеймса Бертона, и даже фингерпикинг\
    \ Чэта Эткинса и Мерла Тревиса. Кроме всего прочего Вадим - превосходный шоумен.\
    \ В его арсенале - масса трюков, таких например, как застовляющая зал реветь перепалка\
    \ супружеской парочки, озвученная в лицах посредством гитары в лучших традициях\
    \ Алберта Коллинза.\r\n\r\nВадим постоянно выступает со своей группой в основных\
    \ московских блюзовых и джазовых клубах."
