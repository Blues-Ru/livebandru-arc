  club_token: rnb-cafe
  price: бесплатный
  comments: "группа \"SMITANABAND\" исполняет собственные funk/blues/soul вещи, а\
    \ также композиции икон стиля, создавая для них стильные авторские аранжировки.\r\
    \n\r\nПрограмма Smitanaband преимущественно на английском языке.\r\n\r\n\"SMITANABAND\"\
    \ выступают на самых разных московских площадках - от ресторана \"carre blanc\"\
    \ и клубов \"cool train\" и \"мастерская\", до гольф-клубов и рублевки.\r\n\r\n\
    В начале 2012 группа выпустила альбом \"The Seeds by Smitanaband\"\r\n\r\nмузыканты\
    \ группы уже несколько лет сотрудничают с легендарной западной группой \"Parliament\
    \ Funkadelic\", вместе записывая треки."
  extra_bands:
