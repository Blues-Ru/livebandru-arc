- id: 50319
  date: '2015-03-26'
  time: '20:00'
  band_name: группа Стаса Намина "Цветы"
  club_id: 74
  club_name: Ритм Блюз Кафе
  club_token: rnb-cafe
  price: 1000 руб.
  comments: "\"Цветы\" - советская и российская рок-группа, с которой, по словам журнала\
    \ \"Итоги\", \"начинался весь отечественный неформат\". Одна из первых групп,\
    \ привнесших элемент рок-музыки на советскую эстраду. \"Цветы\" были созданы в\
    \ 1969 году гитаристом и автором песен Стасом Наминым. В 1973 году \"Цветы\" как\
    \ студенческий ансамбль выпустили на фирме \"Мелодия\" гибкие пластинки, которые\
    \ разошлись 7-миллионными тиражами. Получив огромную популярность в СССР, в 1974\
    \ году группа начала свою профессиональную гастрольную деятельность, в 1975 году\
    \ из-за конфликта с филармонией группа распалась, а затем приказом Министерства\
    \ культуры СССР была расформирована, ее название было запрещено, и лишь в 1977\
    \ году она восстановилась под новым именем \"Группа Стаса Намина\" и в 1978 году\
    \ начала гастролировать, оставаясь под запретом во всех центральных СМИ. В 1980\
    \ году во время олимпийской оттепели группе впервые удалось записать сольный альбом\
    \ на \"Мелодии\" \"Гимн солнцу\" и появиться на ТВ, после чего они опять попали\
    \ под запрет. До 1986 года продолжался период запретов и гонений[14][19], после\
    \ которого, с началом перестройки, началась другая жизнь: Группа Стаса Намина\
    \ \"Цветы\" стала гастролировать, выехала на Запад и за четыре года совершила\
    \ мировое турне. В 1989 году группа остановила свою деятельность и следующие десять\
    \ лет фактически не существовала\r\n\r\nСобравшись в 1999 году после перерыва,\
    \ \"Цветы\" отметили свое 30-летие юбилейным концертом, но и после этого не возвратились\
    \ в шоу-бизнес, а работали в Театре музыки и драмы Стаса Намина, участвуя в создании\
    \ мюзикла \"Волосы\", рок-оперы \"Иисус Христос - суперзвезда\" и других проектах.\r\
    \n\r\nВ свое 40-летие на новом витке жизни \"Цветы\" снова начали активную творческую\
    \ жизнь\". В 2009-2010 году группа записала на легендарной студии Abbey Road двойные\
    \ альбомы \"Назад в СССР\", в который вошли все их песни периода 1970-х, и \"\
    Распахни свое окно\", в который вошли их запрещенные песни 1980-х. После юбилейного\
    \ концерта 6 марта 2010 года выпущен на DVD, \"Цветы\", впервые более чем за 20\
    \ лет, опять вышли на большую сцену и возобновили регулярную гастрольную деятельность.\
    \ В 2012 году в концертном зале \"Крокус\" состоялся большой концерт группы, где\
    \ помимо их известных хитов и запрещенных песен 1980-х \"Цветы\" представили публике\
    \ современный, совершенно новый репертуар. Этот концерт выпущен на 2х DVD - Homo\
    \ sapiens/Человек разумный и Flower power/Власть цветов."
