    \ джаз клубе Rhythm & Blues Cafe!\r\n23 ОКТЯБРЯ, сбор гостей в 20:00\r\n\r\nПроведите\
    \ воскресный вечер вместе с самым ярким джаз-бендом столицы!\r\n\r\nBIG CITY JAZZ\
    \ SHOW - шоу-оркестр, в чьем репертуаре воплотились мотивы эпохи Великого Гэтсби,\
    \ драйв танцев стиляг, незабываемые постановки бродвейских мюзиклов и искрометные\
    \ джазовые импровизации!\r\n\r\nМузыканты BIG CITY, собирающие от концерта к концерту\
    \ полные залы, подготовили выступление, которое будет согревать Вас теплыми воспоминаниями!\r\
    \n\r\nВ программе известные джазовые композиции, буги-вуги, соул, рок-н-ролл,\
    \ джазовые интерпретации известных поп- и рок хитов. Головокружительный вихрь\
    \ музыки, танцев, интерактива со зрителями, по традиции живое выступление артистов,\
    \ стильная атмосфера RHYTHM & BLUES CAFE И ПОДАРКИ наполнят вас незабываемыми\
    \ эмоциями!\r\n__________________\r\n\r\nНачало: в 20:00\r\nАдрес: м.Александровский\
    \ сад, м. Боровицкая, м. Библиотека им. Ленина, Староваганьковский пер., 19, стр.\
    \ 2\r\n\r\nrhythm-blues-cafe.ru\r\nБилеты и заказ столиков: +7 (926) 555 14 15\r\
    \n\r\nСсылки на видео BIG CITY JAZZ SHOW: \r\nhttps://www.youtube.com/watch?v=lKBf07GJGhw"
