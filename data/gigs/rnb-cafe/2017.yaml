  price: от 800 руб.
  comments: "Встречайте самый романтический праздник в году вместе с умопомрачительном\
    \ джаз-бендом столицы!\r\n\r\nBIG CITY JAZZ SHOW - это кавер-группа, получившая\
    \ титул \"Лучшая Кавер-группа России\" по итогам конкурса Flash Hits!\r\n\r\n\
    Шоу, вдохновленное эпохой Великого Гэтсби, бродвейскими мюзиклами, искрометными\
    \ джазовыми импровизациями и, конечно, современными популярными направлениями!\
    \ \r\n\r\nМузыканты BIG CITY, собирающие от концерта к концерту полные залы, подготовили\
    \ выступление, которое будет согревать Вас теплыми воспоминаниями! \r\n\r\nВ программе\
    \ известные джазовые композиции, буги-вуги, соул, рок-н-ролл, джазовые интерпретации\
    \ известных поп- и рок хитов. \r\n\r\nГоловокружительный вихрь музыки, танцев,\
    \ интерактива со зрителями, по традиции живое выступление артистов, стильная атмосфера\
    \ Rhythm & Blues Cafe И ПОДАРКИ наполнят вас незабываемыми эмоциями!\r\n__________________\r\
    \n\r\nRhythm & Blues Cafe\r\n\r\nСбор гостей: в 20:00\r\n \r\nАдрес: ст. м. Александровский\
    \ сад, Библиотека им. Ленина, Боровицкая, Староваганьковский пер., д. 19, стр.\
    \ 2\r\n\r\nhttp://rhythm-blues-cafe.ru\r\n\r\nБилеты и заказ столиков: +7 (926)\
    \ 555 14 15\r\n\r\nСсылка на видео BIG CITY JAZZ SHOW: \r\nhttps://youtu.be/iMXXuFiVLoM"
