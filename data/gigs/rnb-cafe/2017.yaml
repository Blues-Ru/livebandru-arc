- id: 64046
  date: '2017-03-30'
  time: '20:00'
  band_name: BiG City Jazz Show
  club_id: 74
  club_name: Ритм Блюз Кафе
  club_token: rnb-cafe
  price: от 800 рублей
  comments: "Впусти в себя льющееся рекой веселье под конец рабочей недели!\r\n\r\n\
    30 марта у Вас появится возможность скрасить трудовые будни вместе с неугомонными\
    \ участниками шоу-оркестра, который сочетает в себе театрализованное представление,\
    \ кавер-версии на известнейшие мировые хиты и легендарные симфонии, не теряющие\
    \ своей вечной актуальности спустя многие десятилетия.\r\n\r\nBIG CITY JAZZ SHOW\
    \ - это фееричный музыкальный коктейль совершенно разных музыкальных направлений:\
    \ от зажигательного swing-a и rockabilly - до речитатива в дерзновенных hip-hop\
    \ традициях. Это - выстрел прямиком в душу, оркестровый бунт, способный задеть\
    \ за живое как самых искушенных меломанов, так и любителей современного звучания.\r\
    \n\r\nНа этот раз прицел направлен прямиком на историческое сердце Москвы - Староваганьковский\
    \ переулок, в котором в этот вечер будет как никогда шумно, ведь любой визит этих\
    \ ребят создает мощнейший эмоциональный двигатель, мощности которого хватает еще\
    \ на несколько недель вперед. \r\n\r\nВнесите разнообразие в воронку рабочих будней,\
    \ превратив ее в музыкальный смерч, насыщенный блистательными, музыкальными красками."
  extra_bands:
