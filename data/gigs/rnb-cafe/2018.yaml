  club_token: rnb-cafe
  price: бесплатный
  comments: "Тамара Оген Band\r\n\r\nBlues&Country\r\n\r\nБэнд Тамары Оген - московский\
    \ коллектив, который исполняет блюз и кантри разных эпох: и старый delta, и piedmont,\
    \ и блюз 50-х, и кантри 60-х, и совсем современные вещи, написанные знаменитым\
    \ блюзменом Joe Bonamassa, аранжировщиком и гитаристом Vilray.\r\n\r\n \r\n\r\n\
    Группу отличает большая любовь к редким, и оттого еще более притягательным песням\
    \ разных авторов - J.B.Lenoir, Stevie Ray Vaughan, Blind Blake, John Denver, Skip\
    \ James, Guy Davis, Bob Dylan, Roy Rogers, Blind Willie McTell и многих других.\r\
    \n\r\n \r\n\r\nОдна из отличительных черт Бэнда Тамары Оген - все песни в оригиналах\
    \ игрались на гитаре, но были переаранжированы для фортепиано-соло (программа\
    \ Тамары Оген \"Blues Mysteries\"). Впоследствии было решено обогатить их партиями\
    \ баса и барабанов.\r\n\r\n \r\n\r\nВ процессе работы над песнями порой рождаются\
    \ совершенно неожиданные решения ритмов, гармоний и мелодий. И это только радует:\
    \ песни обретают второе дыхание, начинают играть другими гранями - и открывают\
    \ еще больший простор для творчества.\r\n\r\n \r\n\r\nТамара Оген - вокал, фортепиано\r\
    \n\r\nВасилий Мотылец - бас-гитара\r\n\r\nДмитрий Лобанов - барабаны"
