- id: 40018
  date: '2013-11-25'
  time: '20:00'
  band_name: boom boom boom boom blues'n'talk show
  club_id: 725
  club_name: Дом у Дороги
  club_token: roadhouse
  price: бесплатный
  comments: "Так уж повелось, по понедельникам в Roadhouse Moscow (Дом у Дороги)концертов\
    \ нет, однако к гостям выйдут двое бравых мужчин в самом расцвете сил, два знаменитых\
    \ и высококвалифицированных специалиста в области отечественной и заграничной\
    \ блюзологии!\r\nОдин - Mikhail Mishouris принесет любимые виниловые пластинки\
    \ и сигары, другой - Andrei V. Evdokimov - самокрутки и объемистый интеллектуальный\
    \ багаж.\r\nОба вместе, сразу и по очереди, эти гиганты мысли и заслуженные деятели\
    \ околоблюзовых искусств начнут серьезные и не очень о блюзе вообще и чикагском\
    \ блюзе 70-х в частности, и если уж совсем точно, разговор пой дет о Великих -\
    \ Son Seals, Fenton Robinson и Jimmy Johnson.\r\nУже известно из практики предшествующих\
    \ передачи программ, что и легкомысленный треп в такой компании образуется сам\
    \ собой естественным образом.\r\nВот впечатления об одном из понедельников от\
    \ Михаила Мишуриса:\r\n\"На этот раз, мы были не \"блюз-комитет\" за столом на\
    \ сцене, а вполне себе живые, доступные люди в обществе себе подобных. То есть,\
    \ сидели вместе со всеми в зале, общались без микрофона. Вертушка тоже стояла\
    \ в зале. Мои пластинки разбирали по столам, рассматривали и задавали вопросы.\
    \ А вопросы были, я аж осип от общения (без микрофона то!). Атмосфера образовалась\
    \ точно такая, как я и хотел: абсолютно домашняя и расслабленная. Часа 4 трепа\
    \ и музыки пролетели незаметно. Ждем в понедельник снова!\"\r\nПрисоединяйтесь!\
    \ \r\nВход свободный"
