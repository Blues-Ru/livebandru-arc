  comments: "14 сентября ресторан \"Шантиль\" будет полон свежим дыханием группы \"\
    SMITANABAND\". Они освежат в нашей памяти великолепные мелодии икон джаза, блюза\
    \ и фанка, но только они могут исполнить их с легкостью, достаточной, чтобы они\
    \ зазвучали как в первый раз...\r\nНапример, в 70-х песню \"Dr. Feelgood\" пела\
    \ королева соула и r'n'b - Aretha Franklin. Спустя 40 лет группа \"SMITANABAND\"\
    \ сделала почти невозможное. Вновь подняв песню на отчаянную высоту по исполнению\
    \ и аранжировке, они срывают неизменные долгие овации за исполнение \"Д-р Все-Хорошо\"\
    .\r\nГруппа \"SMITANABAND\" исполняет jazz&blues каноны (Aretha Franklin, Ella\
    \ Fitzgerald, Duke Ellington, Telonius Monk), создавая для них стильные авторские\
    \ аранжировки, и собственные интригующие blues/soul/ jazz композиции. \r\n \r\n\
    \r\nСостав:\r\nНаташа \"Smitana\" Павлова - вокал, музыка\r\nАлександр Мельник\
    \ - ударные, музыка\r\nПавел Мартыненко - ритм-гитара, соло-гитара\r\nАся Шакирова\
    \ - клавиши\r\nАндрей Шило - бас-гитара\r\n\r\nПриобретайте билеты заранее по\
    \ адресу ресторана \"Шантиль\" или с курьерской доставкой (100 р. в пределах МКАД).\r\
    \n (499) 766-71-73,  916 439 30 95\r\n\r\n м. Белорусская, ул. Б.Грузинская, 57"
