  comments: "8 сентября в 20:00 у гостей ресторана \"Шантиль\" есть шанс очутиться\
    \ в парадоксальном и выразительном мире не_только_блюза. В этом мире справедливо\
    \ и гармонично правит коллектив INNA WORLD и его солистка ИННА, неоднократно названная\
    \ критиками и прессой \"русской Эдит Пиаф и Дженис Джоплин\". Вы уже представили,\
    \ какое это \"души скрещенье\"?\r\n\r\nНовая программа включает в себя кавер-версии\
    \ мировых хитов от 20-х до 90-х и удивительно чувственные и красивые собственные\
    \ композиции. Она начинает в тишине затаившего дыхание зала: \"Ju-u-ust leave\
    \ it to me-e!..\" - и с первых звуков выдыхает в пространство зала такую энергию,\
    \ которой хватило бы на планету. А где-то в середине начинает тихо звучать \"\
    Ain't No Sunshine\" и зрители превращаются в слух. А собственную композицию \"\
    Легко\" просто растаскивают на цитаты и поют потом на вечеринках хором.\r\n\r\n\
    В программе рядом джоплиновская \"Ball and Chain\" и блюз-посвящение \"Джанис\"\
    . Роскошная, как Faye Adams, \"Shake a hand\" и пружинящая \"Say, say, say\" Джексона/Маккартни.\
    \ От кокеровской \"Summer in the city\" летят искры, а \"Ain't No Sunshine\" так\
    \ вообще никто никогда не пел.\r\n\r\nСостав:\r\nИнна Тудакова - вокал, \r\nЕвгений\
    \ Кудряшов - гитара, \r\nСергей Кучменко - клавиши, \r\nАлексей Охонцев - бас-гитара,\
    \ \r\nДенис Дворников - ударные.\r\n\r\nВход: 500 р. (первый ряд) и 300 р.\r\n\
    \r\nПриобретайте билеты заранее по адресу ресторана \"Шантиль\" или с курьерской\
    \ доставкой (100 р. в пределах МКАД).\r\n (499) 766-71-73,  916 439 30 95\r\n\r\
    \n м. Белорусская, ул. Б.Грузинская, 57"
