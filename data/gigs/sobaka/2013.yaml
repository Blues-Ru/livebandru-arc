  comments: "Oldtime\\Delta\\Country\\Folk band\r\n\r\nАкустический дуэт Alcorub Band\
    \ был основан двумя новосибирцами - Арсением Брагинским и Михаилом Атласовым.\
    \ Объединившись на основе интереса к раннему афроамериканскому фольклору, рэгтайму,\
    \ блюзу из дельты Миссиссиппи и всему тому, что сейчас принято именовать Oldtime,\
    \ за тот недолгий срок, на протяжении которого они играют и выступают, прошли\
    \ довольно длинный путь и постоянно продолжают расширять репертуар и шлифовать\
    \ мастерство исполнения этого уникального направления музыки. Принципиально отказавшись\
    \ от большого количества инструментов, они сделали упор на осмысление классического\
    \ блюзового формата - голос и слайд-гитара. Постепенно стало появляться и большое\
    \ количество собственного песенного материала, а также стали сказываться определенные\
    \ кантри и прото-джазовые влияния. Песни, которыми полтора столетия дышит долина\
    \ великой американской реки, песни беспредельной печали и буйного, несмотря ни\
    \ на что, веселья, музыка товарных поездов и зловещих перекрестков, музыка, которую\
    \ редко можно услышать сейчас в живом исполнении. Alcorub Band."
