    \nВ качестве лидера различных ансамблей и как приглашенный музыкант активно концертировал\
    \ в родном городе, участвовал в городских, областных и международных джазовых\
    \ фестивалях. В 1991 году по приглашению консерватории Копенгагена \"Rytmisk Musikkonservatorium\"\
    \ играл в оркестре Marilyn Mazur. \r\nКак профессиональный музыкант часто участвует\
