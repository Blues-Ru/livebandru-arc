  comments: "\"Легендарио\" - кубинско-русский проект инструментальной музыки, в котором\
    \ затрагиваются различные музыкальные жанры, например, латин джаз с оттенками\
    \ кубинских ритмов (чача, сон, болеро и т.д.), блюз и соул. Подробное разнообразие\
    \ возможно, благодаря сочетанию саксофона, пианино, бас-гитары, перкуссии и барабанной\
    \ установки. \r\nГруппа \"Легендарио\" была создана недавно кубинским перкуссионистом\
    \ Юнески Руизом Вийамилом, объединившим музыкантов с богатым опытом, которые уже\
    \ известны публике по таким проектам, как \"Чангито\", Markscheider kunst, \"\
    Елена Ваенга\", \"Сабор латино\" и проч. \r\n\r\n\"Легендарио\" был тепло принят\
    \ публикой, что обещает скорое возвращение группы на сцену. \r\nЦель этого творческого\
    \ союза - поделиться нашим видением и ощущением музыки."
