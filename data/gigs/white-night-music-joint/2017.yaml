  comments: "Андрей Блинчевский - окончил Санкт-Петербургский музыкальный колледж\
    \ им. М.П. Мусоргского, класс Геннадия Гольштейна. Лауреат джазового конкурса\
    \ \"Осенний марафон\", проводимого Государственной филармонией джазовой музыки.\
    \ Выпускник Санкт-Петербургского университета культуры и искусств (факультет музыкального\
    \ искусства эстрады). Проходил стажировку в США по программе \"Open World\", обучался\
    \ в Dave Brubeck Institute под руководством знаменитых джазовых музыкантов: Dave\
    \ Brubeck, Marvin Stamm и др. \r\n\r\nПринимает активное участие в музыкальной\
    \ жизни Санкт-Петербурга, Москвы и других городов России и зарубежья, сотрудничает\
    \ с такими джазовыми музыкантами, как Джейсон Браун (Jason Brown, New York), Владимир\
    \ Нестеренко, Алексей Беккер, Дмитрий Братухин, Николай Сизов, Павел Тимофеев,\
    \ Николай Затолочный, Андрей Зимовец и мн. др. \r\n\r\nТрио Андрея Блинчевского\
    \ исполняет оригинальные версии джазовых стандартов, а также авторскую музыку.\
    \ \r\n\r\nАндрей Блинчевский - саксофон\r\nИлья Щеклеин - клавиши \r\nДмитрий\
    \ Семенищев - конрабас"
