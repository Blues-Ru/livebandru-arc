  club_name: White Night Music Joint
  club_token: white-night-music-joint
  comments: "Коллектив легенды джазовой трубы - Джона Маршалла. \r\nДжон успел посотрудничать\
    \ с такими великими джазменами как Диззи Гиллеспи, Бадди Рич, Лайнел Хэмптон,\
    \ Мэл Льюис, Джэри Малиган, Орнет Коулман, Джордж Коулман, Бак Клэйтон, Лони Хиллер.\
    \ \r\nМузыканты встретились в Германии несколько лет назад и с этого времени очень\
