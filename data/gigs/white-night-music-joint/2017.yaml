- id: 68356
  date: '2017-10-14'
  time: '20:00'
  band_name: FunCooLio
  club_id: 879
  club_name: White Night Music Joint
  club_token: white-night-music-joint
  comments: "коллектив из Латвии, исполняющий музыку в стиле Instumental funk/fusion/acid\
    \ jazz. \r\nНазвание коллектива состоит из двух слов: funk (название стиля) и\
    \ Coolio - известный R'n'B исполнитель, популярный в 90-х годах ХХ века. Ансамбль\
    \ исполняет свои оригинальные композиции используя уникальный звук органа Хаммонда.\
    \ \r\n\r\nХаризматичные рижане знают толк в музыкальных коктейлях - именно поэтому\
    \ стилистически их можно отнести именно к фьюжну. Смело экспериментируя с пропорциями,\
    \ они смешивают фанк, джаз, босса-нову и множество других направлений, что чревато\
    \ талантливейшими импровизациями, крепкой сценической сцепкой и неминуемо задорной\
    \ атмосферой, царящей на их выступлениях. Они ловко сочетают техническую академичность\
    \ и доступность формы, уверенно балансируя между музыкой для ушей и тела - не\
    \ танцевать на их концертах очень сложно. Не влюбиться в их обаяние - невозможно."
