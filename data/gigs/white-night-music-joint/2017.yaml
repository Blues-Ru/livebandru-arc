    \ лучшими музыкантами: Федором Кувайцевым (кларнет) и Валерием Ровинским (контрабас).\
    \ \r\n\r\nBitter Candy за 3 года существования успели расположить к себе петербургскую\
    \ публику изысканными инструментальными аранжировками и удивительными вокальными\
    \ импровизациями."
