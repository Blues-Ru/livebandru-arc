- id: 68357
  date: '2017-10-15'
  time: '20:00'
  band_name: Easy Winners
  club_id: 879
  club_name: White Night Music Joint
  club_token: white-night-music-joint
  comments: 'В России существует великое множество коллективов, исполняющих джаз 40-х
    - 70-х, но почти никто не обращается в своем творчестве к истокам и корням. Easy
    Winners - исключение из правил. Совершенно уникальный состав из шести профессиональных
    музыкантов. Помимо оригинальности музыкального репертуара (джаз 20-30гг. и его
    истоки), Easy Winners выделяется самобытностью своего музыкального инструментария:
    вместо привычных широкой публике барабанов - стиральная доска, вместо контрабаса
    - уникальный самодельный инструмент, исполняющий роль баса - басбидон (контрабасин,
    bidon-bass), банджо (инструмент с африканскими корнями), kazoo (инструмент, вообще
    не имеющий аналогов в европейской музыкальной традиции).'
