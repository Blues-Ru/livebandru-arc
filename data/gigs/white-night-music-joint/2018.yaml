- id: 71051
  date: '2018-03-08'
  time: '20:00'
  band_name: Дмитрий Носков и "Круглый Бенд" Алексея Круглова
  club_id: 879
  club_name: White Night Music Joint
  club_token: white-night-music-joint
  comments: "Дмитрий Носков - известный кинокомпозитор, автор музыки к нескольким\
    \ десяткам наиболее заметных отечественных фильмов (Салют - 7, Притяжение, Любовь\
    \ - морковь 1,2,3), презентовал концертную программу \"Я буду петь тебе как Фрэнк\"\
    \ вместе с большим джазовым оркестром Алексея Круглова в октябре 2017 года. Специально\
    \ для концерта были выкуплены 17 подлинных партитур, еще 4 созданы легендарным\
    \ отечественным джазменом Юрием Маркиным, который лично присутствовал на мероприятии\
    \ и высоко оценил качество исполнения материала музыкантами и, конечно, вокалистом\
    \ Дмитрием Носковым. Настолько близко к оригиналу, и внешне, и на слух, репертуар\
    \ Синатры не исполнял еще никто, кроме самого Фрэнка разумеется.\r\nАлексей Круглов\
    \ - основатель коллектива \"Круглый Бенд\", саксофонист, композитор, поэт, постановщик,\
    \ организатор фестиваля Лео Рекордс, один из лидеров нового джаза в России. В\
    \ 2012 году в опросах известного немецкого журнала Jazzthetik Алексей назван \"\
    Открытием года\", тогда же авторитетный британский Jazz Wise назвал Круглова \"\
    будущим джаза\". Несколько раз альбомы Алексея и \"Круглого Бенда\" входили в\
    \ число лучших альбомов месяца по версии Europe Jazz Media Chart. Оркестр выступил\
    \ на нескольких значимых форумах, в частности, на фестивале в честь 90-летия Джона\
    \ Колтрейна в музее Гараж.\r\n\r\nКонцертная программа Дмитрия Носкова и \"Круглого\
    \ Бенда\" с говорящим названием \"Я буду петь тебе как Фрэнк\" - это самые популярные\
    \ (Fly me to the moon, I've got you under my skin, My way и тд.), а также редко\
    \ исполняемые песни Фрэнка Синатры, под \"заголовком\" первого оригинального сингла\
    \ Дмитрия, в честь которого и была названа вся программа.\r\n\r\n8 марта вы услышите\
    \ около 30 хитов Фрэнка в исполнении секстета \"Круглый Бенд\" под управлением\
    \ саксофониста Алексея Круглова и вокалиста Дмитрия Носкова. По своему составу\
    \ и близости к оригиналу этот концерт станет почти точной реконструкцией концерта\
