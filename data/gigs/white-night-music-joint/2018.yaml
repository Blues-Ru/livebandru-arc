- id: 71058
  date: '2018-03-15'
  time: '20:00'
  band_name: Квартет Jazz W.A.V.E.
  club_id: 879
  club_name: White Night Music Joint
  club_token: white-night-music-joint
  comments: "Музыкальный союз Анны Новожиловой и Валерия Скворцова - дуэт Jazz W.A.V.E.\
    \ - смог привлечь внимание джазовых знатоков Москвы, Ярославля, Санкт-Петербурга,\
    \ Нью-Йорка,Тель-Авива и других городов и продолжает радовать петербургских джазовых\
    \ слушателей.\r\n\r\nВалерий Скворцов - академический пианист, познавший тонкости\
    \ джазовой гармонии и фактуры. Его музыкальный вкус и талант соединяет в себе\
    \ все направления джаза - от регтайм и блюза до джаз-рока, фанка, хип-хопа. Его\
    \ оригинальный подход по-новому окрашивает известные мелодии, предоставляя полную\
    \ свободу любым импровизационным моментам в концерте.\r\n\r\nВокалистку Анну Новожилову\
    \ смело можно назвать мастером инструментального вокала. Тонкое владение тембровыми\
    \ красками голоса - от народного до академического пения, чувствование стиля и\
    \ драматургии произведения, искрометный скэт - позволяют певице необычайно полно\
    \ раскрывать возможности певческого искусства, унося воображение слушателей в\
    \ разные времена и страны, будь то эпоха барокко, негритянская месса, рок-концерт\
    \ или лаунж-кафе.\r\n\r\nВ этот вечер к дуэту присоединятся замечательные питерские\
    \ музыканты.\r\nДмитрий Борисов, выпускник музыкального колледжа им. Мусоргского,\
    \ один из ведущих музыкантов и аранжировщиков оркестра п/у Г. Гараняна, виртуоз\
    \ контрабаса и бас-гитары.\r\nАндрей Иванов, так же выпускник колледжа им. Мусоргского,\
    \ один из самых востребованных барабанщиков Петербурга.\r\n\r\nПоэтому в программе\
    \ концерта прозвучат не только джазовые композиции, но и музыка композиторов прошлых\
    \ столетий, мировые хиты и известные отечественные песни. Конечно, все это будет\
    \ исполнено в авторских джазовых аранжировках, на прекрасной джазовой волне!"
