    \ импровизациями. Оригинален и состав коллектива, ведь несмотря на то, что это\
    \ квартет, каждый участник является ярким солистом! Техничность, слаженность в\
    \ исполнении, внимание к нюансам уже стали характерными чертами Four Ever Band.\
    \ Важно отметить и необычное сочетание инструментов: с одной стороны, блестяще\
    \ зарекомендовавший себя на джазовой сцене саксофон и в тоже время редко встречающийся\
    \ в джазе аккордеон! Приходите 23 ноября на вечерний концерт в WHITE NIGHT MUSIC\
