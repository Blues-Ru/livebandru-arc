  club_name: White Night Music Joint
  club_token: white-night-music-joint
  comments: "Константин Хазанович - один из самых талантливых представителей молодого\
    \ поколения петербургского джаза и современной музыкальной культуры. Пианист,\
    \ композитор, мульти-инструменталист, один из лучших кларнетистов России! Он многогранен\
    \ и универсален. За плечами Константина классическая консерватория по классу кларнета\
    \ г. Росток (Германия). Он мастерски исполняет музыку разных джазовых стилей,\
    \ но главным направлением остается традиционный джаз. В этом стиле Константин\
    \ чувствует себя свободно и уверенно, смело выражая через свои импровизации гамму\
    \ эмоций, глубокие ноты и смыслы музыки. В его творчестве есть место для других\
    \ не менее интересных стилей - он с удовольствием исполняет Latin, Pop, Funk.\r\
    \nКонстантин много времени уделяет сочинительству музыки. Он - талантливый композитор\
    \ с разносторонними взглядами, который не ограничивает себя определенными стилями.\
    \ Ему подвластны как классические сюиты, так и поп-песни. Константин - один из\
    \ немногих композиторов, развивающих направление \"джаз на русском языке\". Любители\
    \ джаза уже оценили треки из этой серии, многие из них стали хитами."
