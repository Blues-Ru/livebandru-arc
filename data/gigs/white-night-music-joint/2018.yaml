- id: 71065
  date: '2018-03-21'
  time: '20:00'
  band_name: David Post Jazz Vocalist (USA) and The jazz classic trio
  club_id: 879
  club_name: White Night Music Joint
  club_token: white-night-music-joint
  comments: "21 марта в White Night Music Joint будет особенный вечер. В концертной\
    \ программе будут участвовать Джон Маршалл, приглашенные артисты из Нью-Йорка,\
    \ а также Андрей Зимовец, Николай Затолочный, и Егор Крюковских.\r\n\r\nНевероятное\
    \ сочетание классической музыки и джазового вокала помогает Дэвиду направлять\
    \ свою музыку прямо в сердце слушателям. Его звучание сравнивают с Четом Бейкером\
    \ и Мелом Торме, но голос Дэвида - \"уникальное соединение чувственности, глубины\
    \ и контроля\" (Энн Макдональд).\r\nДэвид ( обладатель премии Грэмми) учился и\
    \ выступал вместе с Джоном Стоуэллом, Рэем Брауном (флюгельгорн), Дэйвом Холландом,\
    \ Бобби Макферрином, Джорджем Расселом, Доном Томпсоном, Кенни Уилером и Марком\
    \ Левином. На его творчество оказали большое влияние Дэйв Ламберт, Джон Хендрикс,\
    \ Энни Росс, Ширли Хорн и Нэнси Кинг. Дэвид записал заглавную песню к альбому\
    \ \"Here's to Life\" вместе с аранжировщиком Филом Мэтсоном, номинантом \"Грэмми\"\
    . Он был признан выдающимся вокалистом на Pacific Coast Jazz Festival. Дэвид выступил\
    \ вместе с Санкт-Петербургским Jazz Philarmonic Orchestra на джазовом фестивале\
    \ \"Свинг белой ночи - 2017\", который ежегодно проводится Государственной Филармонией\
    \ джазовой музыки совместно с Комитетом по культуре Правительства Санкт-Петербурга\
    \ с 1994 г.\r\n\r\nДжон Маршалл родился в Валаге, штат Нью-Йорк, в 1952 году.\
    \ С 1971 по 1991 год он работал и записывался с великими джазовыми исполнителями:\
    \ Бадди Рич, Мел Льюис, Лионель Хэмптон, Джерри Маллиган, Орнетт Коулман, Джордж\
    \ Коулман, Бак Клейтон, Марио Бауза и Диззи Гиллеспи.\r\nМаршалл постоянно работал\
    \ над совершенствованием своего ремесла, учился у великого преподавателя латуни\
    \ Кармине Карузо, а также джазового трубача Лонни Хиллиера. Он также возглавлял\
    \ джазовый квинтет \"Дом Боперы\" с 1987 по 1991.\r\n\r\nС 1996 года Джон выпустил\
    \ восемь компакт-дисков в качестве лидера или со-лидера, а еще несколько - специально\
    \ приглашенным гостем. Между тем его репутация продолжает расти благодаря многочисленным\
    \ концертам и компакт-дискам WDR Big Band."
