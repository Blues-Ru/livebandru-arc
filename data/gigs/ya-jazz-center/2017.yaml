  comments: "1 ноября (среда) в рамках фестиваля \"Джазовая провинция\" состоится\
    \ выступление трио Тима Дорофеева (Архангельск).\r\n\"Арт-ансамбль\" - это творческий\
    \ союз ярких индивидуальностей, объединяющий в единое целое музыкальные идеи.\
    \ Здесь гармонично сочетается стихия северной фольклорной музыки с ее контрастными\
    \ красками, образами и современный импровизационный язык, авторская музыка, написанная\
    \ Тимом Дорофеевым. В программах ансамбля часто участвуют известные Российские\
    \ и зарубежные джазовые музыканты, так же используется современная хореография\
    \ и видео-арт. \r\nСостав: \r\nТим Дорофеев (гитара)\r\nОлег Юданов (ударные)\r\
    \nКонстантин Седовин (флейта, вокал)\r\nБронирование билетов: 72-96-28 \r\nМесто:\
    \ Б. Октябрьская, 50"
