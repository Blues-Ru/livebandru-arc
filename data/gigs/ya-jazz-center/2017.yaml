    общению с музыкантами разных стран. "Grand Positive" исполняет еврейскую, цыганскую
    и балканскую народную музыку, как в аутентичном звучании, бережно сохраняя исполнительские
    традиции, так и смешивая ее с современными стилями и ритмами, придавая аранжировке,
    особый колорит.
